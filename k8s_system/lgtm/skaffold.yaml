apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: lgtm
build:
  local:
    push: true
    useDockerCLI: false
    useBuildkit: false
    concurrency: 1
  artifacts:
    - image: lgtm
      context: ./k8s_system/lgtm/docker
      docker:
        dockerfile: Dockerfile
manifests:
  kustomize:
    paths:
    - ./k8s_system/lgtm/deploy
deploy:
  kubectl:
    defaultNamespace: lgtm
