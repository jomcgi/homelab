name: ArgoCD Snapshot - PR

on:
  pull_request:
    paths:
      - 'charts/argocd/**'
      - 'overlays/**/application.yaml'
      - 'scripts/update-argocd-snapshot.sh'
      - '.github/workflows/argocd-snapshot-pr.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/argocd-preview

permissions:
  contents: read
  packages: write

jobs:
  build-pr-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set PR tag
        id: meta
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "tag=pr-${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "full_image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${PR_NUMBER}" >> $GITHUB_OUTPUT

      - name: Check if PR snapshot already exists
        id: check
        run: |
          if docker pull ${{ steps.meta.outputs.full_image }} 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ PR snapshot already exists, will update incrementally"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "📦 PR snapshot doesn't exist, will create from base"
          fi

      - name: Build/Update PR Snapshot
        run: |
          # Use PR-specific tag as base if it exists, otherwise latest
          if [[ "${{ steps.check.outputs.exists }}" == "true" ]]; then
            export BASE_TAG=pr-${{ github.event.pull_request.number }}
          else
            export BASE_TAG=latest
          fi

          export REGISTRY=${{ env.REGISTRY }}/${{ github.repository_owner }}
          export IMAGE_NAME=argocd-preview
          export NEW_TAG=pr-${{ github.event.pull_request.number }}
          export PUSH=true

          # Optional: Pre-load charts to speed up diffs
          export PRELOAD_CHARTS=true

          ./scripts/update-argocd-snapshot.sh

      - name: Comment on PR
        uses: actions/github-script@v7
        if: github.event.action == 'opened' || github.event.action == 'synchronize'
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const image = '${{ steps.meta.outputs.full_image }}';

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 ArgoCD Snapshot Ready

            Your PR snapshot has been built and pushed to the registry:

            \`\`\`
            ${image}
            \`\`\`

            ### Quick Diff
            To see what this PR will change:

            \`\`\`bash
            # Pull the PR snapshot
            docker pull ${image}

            # Run diff (uses cached PR image, ~5s)
            bazel run //tools/argocd:diff -- origin/main
            \`\`\`

            The snapshot will be re-used on subsequent pushes for fast iteration!
            `
            });

      - name: Output snapshot info
        run: |
          echo "✅ PR Snapshot published"
          echo ""
          echo "Image: ${{ steps.meta.outputs.full_image }}"
          echo ""
          echo "Use this snapshot for fast diffs:"
          echo "  docker pull ${{ steps.meta.outputs.full_image }}"
          echo "  SNAPSHOT_IMAGE=${{ steps.meta.outputs.full_image }} bazel run //tools/argocd:diff"
