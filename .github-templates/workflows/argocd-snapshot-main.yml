name: ArgoCD Snapshot - Main

on:
  push:
    branches:
      - main
    paths:
      - 'charts/argocd/**'
      - 'overlays/**/application.yaml'
      - 'scripts/**-argocd-snapshot.sh'
      - '.github/workflows/argocd-snapshot-*.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/argocd-preview

permissions:
  contents: read
  packages: write

jobs:
  promote-to-latest:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get merged PR number
        id: pr
        run: |
          # Extract PR number from merge commit message
          PR_NUMBER=$(git log --oneline -1 | grep -oP '#\K\d+' || echo "")

          if [[ -n "$PR_NUMBER" ]]; then
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "has_pr=true" >> $GITHUB_OUTPUT
            echo "✅ Found PR #$PR_NUMBER"
          else
            echo "has_pr=false" >> $GITHUB_OUTPUT
            echo "⚠️  No PR number found in commit message"
          fi

      - name: Re-tag PR snapshot as latest (fast path)
        if: steps.pr.outputs.has_pr == 'true'
        run: |
          PR_NUMBER=${{ steps.pr.outputs.pr_number }}
          PR_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${PR_NUMBER}
          LATEST_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          MAIN_SHA_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ github.sha }}

          echo "🏷️  Re-tagging PR snapshot as latest..."

          # Pull PR snapshot
          docker pull "$PR_IMAGE"

          # Re-tag
          docker tag "$PR_IMAGE" "$LATEST_IMAGE"
          docker tag "$PR_IMAGE" "$MAIN_SHA_IMAGE"

          # Push
          docker push "$LATEST_IMAGE"
          docker push "$MAIN_SHA_IMAGE"

          echo "✅ Re-tagged in ~2 seconds!"
          echo ""
          echo "Tags:"
          echo "  - $LATEST_IMAGE"
          echo "  - $MAIN_SHA_IMAGE"

      - name: Build new snapshot (slow path)
        if: steps.pr.outputs.has_pr == 'false'
        uses: actions/checkout@v4

      - name: Build from latest snapshot
        if: steps.pr.outputs.has_pr == 'false'
        run: |
          echo "⚠️  No PR snapshot found, building from latest..."

          export REGISTRY=${{ env.REGISTRY }}/${{ github.repository_owner }}
          export IMAGE_NAME=argocd-preview
          export BASE_TAG=latest
          export NEW_TAG=main-${{ github.sha }}
          export PUSH=true
          export PRELOAD_CHARTS=true

          ./scripts/update-argocd-snapshot.sh

          # Also tag as latest
          docker tag "$REGISTRY/$IMAGE_NAME:$NEW_TAG" "$REGISTRY/$IMAGE_NAME:latest"
          docker push "$REGISTRY/$IMAGE_NAME:latest"

      - name: Summary
        run: |
          echo "## ✅ ArgoCD Snapshot Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The \`latest\` snapshot now points to this commit:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ steps.pr.outputs.has_pr }}" == "true" ]]; then
            echo "**Method:** Fast re-tag from PR #${{ steps.pr.outputs.pr_number }} (~2s)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Method:** Incremental build from previous latest (~15s)" >> $GITHUB_STEP_SUMMARY
          fi
