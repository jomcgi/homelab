backend:
  replicas: 1
  vaultApiUrl: "http://obsidian-vault.obsidian.svc.cluster.local:8000"
  resources:
    requests:
      memory: "256Mi"
      cpu: "10m"
    limits:
      memory: "512Mi"

postgres:
  instances: 1
  storage:
    size: 2Gi

onepassword:
  enabled: true
  itemPath: "vaults/k8s-homelab/items/private-homepage"

cfIngress:
  private:
    enabled: true
    tier: trusted
    hostname: private.jomcgi.dev
    servicePort: 8000
    gateway:
      name: cloudflare-ingress
      namespace: envoy-gateway-system
    team: jomcgi
  todo:
    public:
      enabled: false
      tier: public
      hostname: todo.jomcgi.dev
      servicePort: 8000
      gateway:
        name: cloudflare-ingress
        namespace: envoy-gateway-system
      rateLimit:
        requests: 100
        unit: Minute
    admin:
      enabled: false
      tier: trusted
      hostname: todo-admin.jomcgi.dev
      servicePort: 8000
      gateway:
        name: cloudflare-ingress
        namespace: envoy-gateway-system
      team: jomcgi

chat:
  enabled: false # re-enable after adding DISCORD_BOT_TOKEN to 1Password
  llamaCppUrl: "http://llama-cpp.llama-cpp.svc.cluster.local:8080"
  embeddingUrl: "http://llama-cpp-embeddings.llama-cpp.svc.cluster.local:8080"
  searxngUrl: "http://monolith-searxng:8080"
