backend:
  replicas: 1

postgres:
  instances: 1
  storage:
    size: 2Gi

onepassword:
  enabled: true
  itemPath: "vaults/Homelab/items/private-homepage"

cfIngress:
  private:
    enabled: true
    tier: trusted
    hostname: private.jomcgi.dev
    servicePort: 8000
    gateway:
      name: cloudflare-ingress
      namespace: envoy-gateway-system
    team: jomcgi
  todo:
    public:
      enabled: true
      tier: public
      hostname: todo.jomcgi.dev
      servicePort: 8000
      gateway:
        name: cloudflare-ingress
        namespace: envoy-gateway-system
      rateLimit:
        requests: 100
        unit: Minute
    admin:
      enabled: true
      tier: trusted
      hostname: todo-admin.jomcgi.dev
      servicePort: 8000
      gateway:
        name: cloudflare-ingress
        namespace: envoy-gateway-system
      team: jomcgi
