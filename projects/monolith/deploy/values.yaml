backend:
  replicas: 1
  vaultApiUrl: "http://obsidian-vault.obsidian.svc.cluster.local:8000"
  clickhouseUrl: "http://chi-signoz-clickhouse-cluster-0-0.signoz.svc.cluster.local:8123"
  otelEndpoint: "http://signoz-k8s-infra-otel-agent.signoz.svc.cluster.local:4318/v1/traces"
  resources:
    requests:
      memory: "256Mi"
      cpu: "10m"
    limits:
      memory: "512Mi"

frontend:
  otelCollectorUrl: "http://signoz-k8s-infra-otel-agent.signoz.svc.cluster.local:4318"

postgres:
  instances: 1
  storage:
    size: 2Gi

onepassword:
  enabled: true
  itemPath: "vaults/k8s-homelab/items/private-homepage"

clickhouse:
  onepassword:
    itemPath: "vaults/k8s-homelab/items/signoz-clickhouse"

cfIngress:
  public:
    enabled: true
    tier: public
    hostname: public.jomcgi.dev
    servicePort: 3000
    gateway:
      name: cloudflare-ingress
      namespace: envoy-gateway-system
    rateLimit:
      requests: 100
      unit: Minute
  private:
    enabled: true
    tier: trusted
    hostname: private.jomcgi.dev
    servicePort: 3000
    gateway:
      name: cloudflare-ingress
      namespace: envoy-gateway-system
    team: jomcgi
  todo:
    public:
      enabled: false
      tier: public
      hostname: todo.jomcgi.dev
      servicePort: 8000
      gateway:
        name: cloudflare-ingress
        namespace: envoy-gateway-system
      rateLimit:
        requests: 100
        unit: Minute
    admin:
      enabled: false
      tier: trusted
      hostname: todo-admin.jomcgi.dev
      servicePort: 8000
      gateway:
        name: cloudflare-ingress
        namespace: envoy-gateway-system
      team: jomcgi

knowledge:
  enabled: true
  gitRemote: "https://github.com/jomcgi/obsidian-vault.git"
  headlessSync:
    vaultName: "jomcgi"
  onepassword:
    itemPath: "vaults/k8s-homelab/items/obsidian"

dashboards:
  cnpg-overview:
    enabled: true
    name: "CloudNativePG Overview"
    tags: "postgres,cnpg"
  monolith-red:
    enabled: true
    name: "Monolith RED Dashboard"
    tags: "monolith,red,performance,traces"

chat:
  enabled: true
  llamaCppUrl: "http://inference.inference.svc.cluster.local:8080"
  embeddingUrl: "http://inference-embeddings.inference.svc.cluster.local:8080"
  searxngUrl: "http://monolith-searxng:8080"
  changelogs:
    - name: "homelab"
      channelId: "1491186550472708117"
      githubRepo: "jomcgi/homelab"
      prompt: "professional"
      embedTitle: "Joe - Homelab"
      embedColor: "0x2ECC71"
      intervalHours: 1
      commitFilter: "^(feat)(\\(.+?\\))?!?:\\s"
      roastChance: 0.1
    - name: "colin-homelab"
      channelId: "1491186550472708117"
      githubRepo: "ColinCee/homelab"
      prompt: "professional"
      embedTitle: "Colin - Homelab"
      embedColor: "0x2ECC71"
      intervalHours: 1
      roastChance: 0.1
  onepassword:
    itemPath: "vaults/k8s-homelab/items/discord-bot"

gardener:
  enabled: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/litellm-claude-auth"
