backend:
  replicas: 1
  vaultApiUrl: "http://obsidian-vault.obsidian.svc.cluster.local:8000"
  resources:
    requests:
      memory: "256Mi"
      cpu: "10m"
    limits:
      memory: "512Mi"

postgres:
  instances: 1
  storage:
    size: 2Gi

onepassword:
  enabled: true
  itemPath: "vaults/k8s-homelab/items/private-homepage"

cfIngress:
  public:
    enabled: true
    tier: public
    hostname: public.jomcgi.dev
    servicePort: 3000
    gateway:
      name: cloudflare-ingress
      namespace: envoy-gateway-system
    rateLimit:
      requests: 100
      unit: Minute
  private:
    enabled: true
    tier: trusted
    hostname: private.jomcgi.dev
    servicePort: 3000
    gateway:
      name: cloudflare-ingress
      namespace: envoy-gateway-system
    team: jomcgi
  todo:
    public:
      enabled: false
      tier: public
      hostname: todo.jomcgi.dev
      servicePort: 8000
      gateway:
        name: cloudflare-ingress
        namespace: envoy-gateway-system
      rateLimit:
        requests: 100
        unit: Minute
    admin:
      enabled: false
      tier: trusted
      hostname: todo-admin.jomcgi.dev
      servicePort: 8000
      gateway:
        name: cloudflare-ingress
        namespace: envoy-gateway-system
      team: jomcgi

knowledge:
  enabled: true
  headlessSync:
    vaultName: "jomcgi"
  onepassword:
    itemPath: "vaults/k8s-homelab/items/obsidian"

dashboards:
  cnpg-overview:
    enabled: true
    name: "CloudNativePG Overview"
    tags: "postgres,cnpg"
  monolith-red:
    enabled: true
    name: "Monolith RED Dashboard"
    tags: "monolith,red,performance,traces"

chat:
  enabled: true
  llamaCppUrl: "http://llama-cpp.llama-cpp.svc.cluster.local:8080"
  embeddingUrl: "http://llama-cpp-embeddings.llama-cpp.svc.cluster.local:8080"
  searxngUrl: "http://monolith-searxng:8080"
  changelog:
    enabled: true
    channelId: "1491186550472708117"
    githubRepo: "jomcgi/homelab"
  onepassword:
    itemPath: "vaults/k8s-homelab/items/discord-bot"

gardener:
  enabled: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/litellm-claude-auth"
