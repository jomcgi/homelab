backend:
  replicas: 1
  vaultApiUrl: ""
  image:
    repository: ghcr.io/jomcgi/homelab/projects/monolith/backend
    tag: main
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "128Mi"
      cpu: "200m"
    limits:
      memory: "256Mi"

frontend:
  image:
    repository: ghcr.io/jomcgi/homelab/projects/monolith/frontend
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

postgres:
  instances: 1
  storage:
    size: 2Gi
    storageClass: ""
  pgvector:
    image: ghcr.io/cloudnative-pg/pgvector:0.8.2-202604021427-18-trixie

service:
  port: 8000

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

onepassword:
  enabled: false
  itemPath: ""

chat:
  enabled: false
  llamaCppUrl: ""
  embeddingUrl: ""
  searxngUrl: ""
  onepassword:
    itemPath: ""

cfIngress:
  private:
    enabled: true
    tier: trusted
    hostname: private.jomcgi.dev
    servicePort: 8000
    gateway:
      name: cloudflare-ingress
      namespace: envoy-gateway-system
    team: jomcgi
  todo:
    public:
      enabled: true
      tier: public
      hostname: todo.jomcgi.dev
      servicePort: 8000
      gateway:
        name: cloudflare-ingress
        namespace: envoy-gateway-system
      rateLimit:
        requests: 100
        unit: Minute
    admin:
      enabled: true
      tier: trusted
      hostname: todo-admin.jomcgi.dev
      servicePort: 8000
      gateway:
        name: cloudflare-ingress
        namespace: envoy-gateway-system
      team: jomcgi
