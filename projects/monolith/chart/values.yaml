backend:
  replicas: 1
  image:
    repository: ghcr.io/jomcgi/homelab/projects/monolith/backend
    tag: main
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "128Mi"
      cpu: "10m"
    limits:
      memory: "256Mi"

postgres:
  instances: 1
  storage:
    size: 2Gi
    storageClass: ""

service:
  port: 8000

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

onepassword:
  enabled: false
  itemPath: ""

cfIngress:
  private:
    enabled: true
    tier: trusted
    hostname: private.jomcgi.dev
    servicePort: 8000
    gateway:
      name: cloudflare-ingress
      namespace: envoy-gateway-system
    team: jomcgi
  todo:
    public:
      enabled: true
      tier: public
      hostname: todo.jomcgi.dev
      servicePort: 8000
      gateway:
        name: cloudflare-ingress
        namespace: envoy-gateway-system
      rateLimit:
        requests: 100
        unit: Minute
    admin:
      enabled: true
      tier: trusted
      hostname: todo-admin.jomcgi.dev
      servicePort: 8000
      gateway:
        name: cloudflare-ingress
        namespace: envoy-gateway-system
      team: jomcgi
