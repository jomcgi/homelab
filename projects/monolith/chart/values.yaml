backend:
  replicas: 1
  vaultApiUrl: ""
  image:
    repository: ghcr.io/jomcgi/homelab/projects/monolith/backend
    tag: main
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "128Mi"
      cpu: "200m"
    limits:
      memory: "256Mi"

frontend:
  image:
    repository: ghcr.io/jomcgi/homelab/projects/monolith/frontend
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

postgres:
  instances: 1
  storage:
    size: 10Gi
    storageClass: ""
  pgvector:
    image: ghcr.io/cloudnative-pg/pgvector:0.8.2-202604021427-18-trixie

service:
  port: 3000

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

onepassword:
  enabled: false
  itemPath: ""

knowledge:
  enabled: false
  gitRemote: ""
  headlessSync:
    image:
      repository: ghcr.io/jomcgi/homelab/projects/monolith/obsidian-image
      tag: latest
    vaultName: ""
  vault:
    mountPath: /vault
    sizeLimit: 10Gi
  onepassword:
    itemPath: ""
  resources:
    headlessSync:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "384Mi"

chat:
  enabled: false
  llamaCppUrl: ""
  embeddingUrl: ""
  searxngUrl: ""
  onepassword:
    itemPath: ""

# Knowledge gardener: LLM-driven decomposition of raw vault notes into
# typed knowledge artifacts via the claude Code CLI. Uses CLAUDE_CODE_OAUTH_TOKEN
# from the litellm-claude-auth 1Password item (same token as goose agents).
# Disabled by default for portability.
gardener:
  enabled: false
  onepassword:
    itemPath: ""

cfIngress:
  private:
    enabled: true
    tier: trusted
    hostname: private.jomcgi.dev
    servicePort: 3000
    gateway:
      name: cloudflare-ingress
      namespace: envoy-gateway-system
    team: jomcgi
  public:
    enabled: false
    tier: public
    hostname: public.jomcgi.dev
    servicePort: 3000
    gateway:
      name: cloudflare-ingress
      namespace: envoy-gateway-system
    rateLimit:
      requests: 100
      unit: Minute
