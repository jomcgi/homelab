apiVersion: v1
kind: Service
metadata:
  name: {{ include "monolith.fullname" . }}
  labels:
    {{- include "monolith.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: api
      protocol: TCP
  selector:
    {{- include "monolith.selectorLabels" . | nindent 4 }}
