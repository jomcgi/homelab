{{- if and .Values.knowledge.enabled .Values.knowledge.onepassword.itemPath }}
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ include "monolith.fullname" . }}-knowledge
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "monolith.labels" . | nindent 4 }}
spec:
  itemPath: {{ .Values.knowledge.onepassword.itemPath | quote }}
{{- end }}
