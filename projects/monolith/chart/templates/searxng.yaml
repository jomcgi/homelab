{{- if .Values.chat.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "monolith.fullname" . }}-searxng
  labels:
    {{- include "monolith.labels" . | nindent 4 }}
    app.kubernetes.io/component: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "monolith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: searxng
  template:
    metadata:
      labels:
        {{- include "monolith.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: searxng
    spec:
      containers:
        - name: searxng
          image: "docker.io/searxng/searxng:latest"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SEARXNG_BASE_URL
              value: "http://localhost:8080"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "monolith.fullname" . }}-searxng
  labels:
    {{- include "monolith.labels" . | nindent 4 }}
    app.kubernetes.io/component: searxng
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "monolith.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: searxng
{{- end }}
