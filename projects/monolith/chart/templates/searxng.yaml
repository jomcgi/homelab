{{- if .Values.chat.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monolith.fullname" . }}-searxng-settings
  labels:
    {{- include "monolith.labels" . | nindent 4 }}
data:
  settings.yml: |
    use_default_settings: true
    server:
      secret_key: "{{ include "monolith.fullname" . | sha256sum | trunc 32 }}"
      limiter: false
      public_instance: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "monolith.fullname" . }}-searxng
  labels:
    {{- include "monolith.labels" . | nindent 4 }}
    app.kubernetes.io/component: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "monolith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: searxng
  template:
    metadata:
      labels:
        {{- include "monolith.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: searxng
    spec:
      containers:
        - name: searxng
          image: "docker.io/searxng/searxng:latest"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SEARXNG_BASE_URL
              value: "http://localhost:8080"
            - name: SEARXNG_SETTINGS_PATH
              value: "/etc/searxng-config"
          volumeMounts:
            - name: settings
              mountPath: /etc/searxng-config
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: settings
          configMap:
            name: {{ include "monolith.fullname" . }}-searxng-settings
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "monolith.fullname" . }}-searxng
  labels:
    {{- include "monolith.labels" . | nindent 4 }}
    app.kubernetes.io/component: searxng
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "monolith.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: searxng
{{- end }}
