apiVersion: v1
kind: Service
metadata:
  name: {{ include "monolith.fullname" . }}-pg-metrics
  labels:
    {{- include "monolith.labels" . | nindent 4 }}
    app.kubernetes.io/component: database-metrics
spec:
  selector:
    cnpg.io/cluster: {{ include "monolith.fullname" . }}-pg
  ports:
    - name: metrics
      port: 9187
      targetPort: 9187
      protocol: TCP
