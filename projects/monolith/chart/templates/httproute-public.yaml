{{- if .Values.cfIngress.public.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "monolith.fullname" . }}-public
  labels:
    ingress-tier: {{ .Values.cfIngress.public.tier }}
spec:
  parentRefs:
    - name: {{ .Values.cfIngress.public.gateway.name }}
      namespace: {{ .Values.cfIngress.public.gateway.namespace }}
  hostnames:
    - {{ .Values.cfIngress.public.hostname | quote }}
  rules:
    # SvelteKit client assets — pass through without rewriting
    - matches:
        - path:
            type: PathPrefix
            value: /_app/
      backendRefs:
        - name: {{ include "monolith.fullname" . }}
          port: {{ .Values.cfIngress.public.servicePort | int }}
    # Everything else — rewrite to /public/
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /public/
      backendRefs:
        - name: {{ include "monolith.fullname" . }}
          port: {{ .Values.cfIngress.public.servicePort | int }}
---
{{- $rlParams := dict
  "name" (printf "%s-public" (include "monolith.fullname" .))
  "rateLimit" .Values.cfIngress.public.rateLimit
}}
{{- include "cf-ingress.rate-limit" $rlParams }}
{{- end }}
