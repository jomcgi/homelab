apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "monolith.fullname" . }}
  labels:
    {{- include "monolith.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "monolith.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "monolith.selectorLabels" . | nindent 8 }}
      annotations:
        instrumentation.opentelemetry.io/inject-python: "python"
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: api
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "monolith.fullname" . }}-pg-app
                  key: uri
            {{- if .Values.onepassword.enabled }}
            - name: ICAL_FEED_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "monolith.fullname" . }}-secrets
                  key: ICAL_FEED_URL
            {{- end }}
            {{- if .Values.backend.vaultApiUrl }}
            - name: VAULT_API_URL
              value: {{ .Values.backend.vaultApiUrl | quote }}
            {{- end }}
            - name: FRONTEND_HEALTH_URL
              value: "http://localhost:3000/"
            {{- if .Values.chat.enabled }}
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "monolith.fullname" . }}-chat-secrets
                  key: DISCORD_BOT_TOKEN
            - name: LLAMA_CPP_URL
              value: {{ .Values.chat.llamaCppUrl | quote }}
            - name: EMBEDDING_URL
              value: {{ .Values.chat.embeddingUrl | quote }}
            - name: SEARXNG_URL
              value: {{ .Values.chat.searxngUrl | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: API_BASE
              value: "http://localhost:8000"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
