apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "monolith.fullname" . }}
  labels:
    {{- include "monolith.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "monolith.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "monolith.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: app
      annotations: {}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: api
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "monolith.fullname" . }}-pg-app
                  key: uri
            {{- if .Values.onepassword.enabled }}
            - name: ICAL_FEED_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "monolith.fullname" . }}-secrets
                  key: ICAL_FEED_URL
            {{- end }}
            {{- if .Values.backend.vaultApiUrl }}
            - name: VAULT_API_URL
              value: {{ .Values.backend.vaultApiUrl | quote }}
            {{- end }}
            - name: FRONTEND_HEALTH_URL
              value: "http://localhost:3000/"
            {{- if .Values.chat.enabled }}
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "monolith.fullname" . }}-chat-secrets
                  key: DISCORD_BOT_TOKEN
            - name: LLAMA_CPP_URL
              value: {{ .Values.chat.llamaCppUrl | quote }}
            - name: EMBEDDING_URL
              value: {{ .Values.chat.embeddingUrl | quote }}
            - name: SEARXNG_URL
              value: {{ .Values.chat.searxngUrl | quote }}
            {{- if .Values.chat.changelog.enabled }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "monolith.fullname" . }}-chat-secrets
                  key: GITHUB_TOKEN
            - name: CHANGELOG_CHANNEL_ID
              value: {{ .Values.chat.changelog.channelId | quote }}
            - name: CHANGELOG_GITHUB_REPO
              value: {{ .Values.chat.changelog.githubRepo | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.gardener.enabled }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "monolith.fullname" . }}-gardener
                  key: ANTHROPIC_API_KEY
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- if .Values.knowledge.enabled }}
          volumeMounts:
            # Writable: the backend reconciler injects generated
            # `id:` frontmatter into notes that lack one so future
            # reconcile cycles have stable graph identity. The
            # obsidian headless-sync sidecar observes those writes
            # and propagates them through Obsidian's cloud sync,
            # so the backend + sidecar are coordinated writers
            # rather than racing writers.
            - name: vault
              mountPath: {{ .Values.knowledge.vault.mountPath }}
          {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
        {{- if .Values.knowledge.enabled }}
        - name: obsidian
          image: "{{ .Values.knowledge.headlessSync.image.repository }}:{{ .Values.knowledge.headlessSync.image.tag }}"
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: VAULT_PATH
              value: {{ .Values.knowledge.vault.mountPath }}
            - name: VAULT_NAME
              value: {{ .Values.knowledge.headlessSync.vaultName | quote }}
            - name: OBSIDIAN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ include "monolith.fullname" . }}-knowledge
                  key: email
            - name: OBSIDIAN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "monolith.fullname" . }}-knowledge
                  key: password
          readinessProbe:
            exec:
              command: ["test", "-f", "/tmp/ready"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: vault
              mountPath: {{ .Values.knowledge.vault.mountPath }}
          resources:
            {{- toYaml .Values.knowledge.resources.headlessSync | nindent 12 }}
        {{- end }}
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: API_BASE
              value: "http://localhost:8000"
            - name: OTEL_COLLECTOR_HTTP_URL
              value: "http://signoz-k8s-infra-otel-agent.signoz.svc.cluster.local:4318"
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      {{- if .Values.knowledge.enabled }}
      volumes:
        - name: vault
          emptyDir:
            sizeLimit: {{ .Values.knowledge.vault.sizeLimit }}
      {{- end }}
