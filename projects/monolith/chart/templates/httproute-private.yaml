{{- if .Values.cfIngress.private.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "monolith.fullname" . }}-private
  labels:
    ingress-tier: {{ .Values.cfIngress.private.tier }}
spec:
  parentRefs:
    - name: {{ .Values.cfIngress.private.gateway.name }}
      namespace: {{ .Values.cfIngress.private.gateway.namespace }}
  hostnames:
    - {{ .Values.cfIngress.private.hostname | quote }}
  rules:
    # SvelteKit client assets — pass through without rewriting
    - matches:
        - path:
            type: PathPrefix
            value: /_app/
      backendRefs:
        - name: {{ include "monolith.fullname" . }}
          port: {{ .Values.cfIngress.private.servicePort | int }}
    # Everything else — rewrite to /private/
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /private/
      backendRefs:
        - name: {{ include "monolith.fullname" . }}
          port: {{ .Values.cfIngress.private.servicePort | int }}
---
{{- $spParams := dict
  "name" (printf "%s-private" (include "monolith.fullname" .))
  "team" .Values.cfIngress.private.team
}}
{{- include "cf-ingress.security-policy" $spParams }}
{{- end }}
