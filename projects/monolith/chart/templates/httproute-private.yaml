{{- if .Values.cfIngress.private.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "monolith.fullname" . }}-private
  labels:
    ingress-tier: {{ .Values.cfIngress.private.tier }}
spec:
  parentRefs:
    - name: {{ .Values.cfIngress.private.gateway.name }}
      namespace: {{ .Values.cfIngress.private.gateway.namespace }}
  hostnames:
    - {{ .Values.cfIngress.private.hostname | quote }}
  rules:
    # SvelteKit client assets — pass through without rewriting
    - matches:
        - path:
            type: PathPrefix
            value: /_app/
      backendRefs:
        - name: {{ include "monolith.fullname" . }}
          port: {{ .Values.cfIngress.private.servicePort | int }}
    # Knowledge API — pass through to backend without rewriting
    - matches:
        - path:
            type: PathPrefix
            value: /api/knowledge
      timeouts:
        request: 600s
        backendRequest: 600s
      backendRefs:
        - name: {{ include "monolith.fullname" . }}
          port: {{ .Values.service.apiPort | int }}
    # Chat interface — SvelteKit SSR calls LLM backend, needs long timeout
    - matches:
        - path:
            type: PathPrefix
            value: /private/chat
      timeouts:
        request: 600s
        backendRequest: 600s
      backendRefs:
        - name: {{ include "monolith.fullname" . }}
          port: {{ .Values.cfIngress.private.servicePort | int }}
    # Everything else — SvelteKit reroute hook maps to /private/ internally
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "monolith.fullname" . }}
          port: {{ .Values.cfIngress.private.servicePort | int }}
---
{{- $spParams := dict
  "name" (printf "%s-private" (include "monolith.fullname" .))
  "team" .Values.cfIngress.private.team
}}
{{- include "cf-ingress.security-policy" $spParams }}
{{- end }}
