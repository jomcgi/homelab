apiVersion: db.atlasgo.io/v1alpha1
kind: AtlasMigration
metadata:
  name: {{ include "monolith.fullname" . }}
  labels:
    {{- include "monolith.labels" . | nindent 4 }}
spec:
  urlFrom:
    secretKeyRef:
      name: {{ include "monolith.fullname" . }}-pg-app
      key: uri
  dir:
    configMapRef:
      name: {{ include "monolith.fullname" . }}-migrations
