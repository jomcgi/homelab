apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "monolith.fullname" . }}-pg
  labels:
    {{- include "monolith.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.postgres.instances }}
  storage:
    size: {{ .Values.postgres.storage.size }}
    {{- if .Values.postgres.storage.storageClass }}
    storageClassName: {{ .Values.postgres.storage.storageClass }}
    {{- end }}
  postgresql:
    parameters:
      shared_buffers: "64MB"
      effective_cache_size: "128MB"
    extensions:
      - name: vector
        image:
          reference: {{ .Values.postgres.pgvector.image }}
  resources:
    requests:
      memory: "128Mi"
      cpu: "10m"
    limits:
      memory: "256Mi"
  bootstrap:
    initdb:
      database: monolith
      owner: app
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS vector
