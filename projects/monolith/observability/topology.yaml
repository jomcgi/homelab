cache_ttl: 900

groups:
  - id: monolith
    label: MONOLITH
    tier: critical
    ingress: true
    description: "fastapi + sveltekit"
    children: [home, knowledge, chat]
    slo:
      target: 99.0
      window: 30d

  - id: context-forge
    label: CONTEXT FORGE
    tier: critical
    ingress: true
    description: "mcp gateway"
    children: [k8s-mcp, argocd-mcp, signoz-mcp]
    slo:
      target: 99.0
      window: 30d

  - id: cluster
    label: CLUSTER
    tier: infra
    description: "k3s infrastructure"
    children:
      [
        argocd,
        signoz,
        envoy-gateway,
        longhorn,
        seaweedfs,
        otel-operator,
        linkerd,
      ]

nodes:
  # --- ingress / external ---
  - id: external
    label: EXTERNAL
    tier: ingress
    description: "webpage · claude · cli"
    metrics:
      - key: clients
        static: "webpage, claude, cli"

  - id: discord
    label: DISCORD
    tier: ingress
    description: "discord api"
    metrics:
      - key: service
        static: "discord api"

  # --- critical path ---
  - id: cloudflare
    label: CLOUDFLARE TUNNEL
    tier: critical
    description: "cloudflare tunnel"
    slo:
      target: 99.0
      window: 30d
      query: |
        WITH per_minute AS (
          SELECT intDiv(s.unix_milli, 60000) AS mb, max(s.value) AS ready
          FROM signoz_metrics.distributed_samples_v4 s
          WHERE s.fingerprint IN (
            SELECT DISTINCT fingerprint FROM signoz_metrics.distributed_time_series_v4
            WHERE metric_name = 'k8s.container.ready'
              AND JSONExtractString(labels, 'k8s.namespace.name') = 'envoy-gateway-system'
              AND JSONExtractString(labels, 'k8s.container.name') = 'cloudflared'
          ) AND s.unix_milli >= toUnixTimestamp(now() - INTERVAL 30 DAY) * 1000
          GROUP BY mb
        )
        SELECT round(countIf(ready >= 1) / count() * 100, 4) AS value FROM per_minute

  - id: home
    label: HOME
    tier: critical
    group: monolith
    description: "dashboard + notes + schedule"
    slo:
      target: 99.0
      window: 30d
      query: |
        WITH
        bad AS (
          SELECT intDiv(unix_milli, 60000) AS mb, sum(value) AS v
          FROM signoz_metrics.distributed_samples_v4
          WHERE fingerprint IN (
            SELECT DISTINCT fingerprint FROM signoz_metrics.distributed_time_series_v4
            WHERE metric_name = 'envoy_cluster_upstream_rq_xx'
              AND JSONExtractString(labels, 'envoy_cluster_name') LIKE '%monolith-public%'
              AND JSONExtractString(labels, 'envoy_response_code_class') = '5'
          ) AND unix_milli >= toUnixTimestamp(now() - INTERVAL 30 DAY) * 1000
          GROUP BY mb
        ),
        total AS (
          SELECT intDiv(unix_milli, 60000) AS mb, sum(value) AS v
          FROM signoz_metrics.distributed_samples_v4
          WHERE fingerprint IN (
            SELECT DISTINCT fingerprint FROM signoz_metrics.distributed_time_series_v4
            WHERE metric_name = 'envoy_cluster_upstream_rq_xx'
              AND JSONExtractString(labels, 'envoy_cluster_name') LIKE '%monolith-public%'
          ) AND unix_milli >= toUnixTimestamp(now() - INTERVAL 30 DAY) * 1000
          GROUP BY mb
        )
        SELECT round((1 - sum(coalesce(b.v, 0)) / sum(t.v)) * 100, 4) AS value
        FROM total t LEFT JOIN bad b ON t.mb = b.mb

