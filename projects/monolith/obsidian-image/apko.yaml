contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - bash
    - busybox
    - ca-certificates-bundle
    - nodejs

archs:
  - x86_64
  - aarch64

accounts:
  groups:
    - groupname: vault
      gid: 65532
  users:
    - username: vault
      uid: 65532
      gid: 65532
  run-as: 65532

environment:
  HOME: /home/vault

paths:
  - path: /home/vault
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /vault
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

entrypoint:
  command: /usr/local/bin/entrypoint.sh
