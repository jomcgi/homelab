# Default values for ArgoCD Image Updater
# These are sensible defaults that can be overridden per environment

argocd-image-updater:
  # Polling interval — 2m is the upstream default. 10s caused recurring
  # fork() exhaustion (cannot fork() for remote-https) with 7+ ImageUpdaters.
  extraArgs:
    - --interval
    - 2m

  # Image updater configuration
  config:
    # Supported registries
    registries:
      - name: ghcr
        prefix: ghcr.io
        api_url: https://ghcr.io
        credentials: pullsecret:argocd/ghcr-docker-config
        default: true

  # Git write-back configuration
  authScripts:
    enabled: true
    scripts:
      git-creds.sh: |
        #!/bin/sh
        # Use GitHub token from 1Password (read:packages + repo write)
        echo "username=argocd-image-updater"
        echo "password=$ARGOCD_IMAGE_UPDATER_TOKEN"

  # Environment variables for Git credentials
  env:
    - name: ARGOCD_IMAGE_UPDATER_TOKEN
      valueFrom:
        secretKeyRef:
          name: argocd-image-updater-token
          key: github_token

  # Service account with write access to ArgoCD Applications
  serviceAccount:
    create: true

  # Metrics for observability
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false

  # Resource limits — 1Gi provides headroom for git write-back operations
  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 1Gi
