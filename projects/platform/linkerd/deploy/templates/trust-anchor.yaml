{{- if .Values.certManager.enabled }}
---
# Self-signed ClusterIssuer for creating the root trust anchor
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: linkerd-trust-anchor-selfsigned
spec:
  selfSigned: {}

---
# Linkerd trust anchor certificate (root CA)
# This is the root of trust for all Linkerd mTLS certificates
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: linkerd-trust-anchor
  namespace: linkerd
spec:
  isCA: true
  commonName: root.linkerd.cluster.local
  secretName: linkerd-trust-anchor
  duration: 87600h  # 10 years
  renewBefore: 8760h  # Renew 1 year before expiration
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: linkerd-trust-anchor-selfsigned
    kind: ClusterIssuer
    group: cert-manager.io

---
# Issuer for Linkerd identity certificates
# This issuer is used by Linkerd to issue certificates to workloads
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: linkerd-trust-anchor
  namespace: linkerd
spec:
  ca:
    secretName: linkerd-trust-anchor

---
# Linkerd identity issuer certificate
# This is the intermediate CA that Linkerd uses to issue certificates to proxies
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: linkerd-identity-issuer
  namespace: linkerd
spec:
  isCA: true
  commonName: identity.linkerd.cluster.local
  secretName: linkerd-identity-issuer
  duration: 8760h  # 1 year
  renewBefore: 720h  # Renew 30 days before expiration
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: linkerd-trust-anchor
    kind: Issuer
    group: cert-manager.io
  usages:
    - cert sign
    - crl sign
    - server auth
    - client auth
{{- end }}
