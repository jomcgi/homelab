# Envoy Gateway cluster-specific overrides

gateway-helm:
  deployment:
    envoyGateway:
      # Keep control plane alive under node pressure
      priorityClassName: system-cluster-critical
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      securityContext:
        readOnlyRootFilesystem: true

  config:
    envoyGateway:
      provider:
        type: Kubernetes
