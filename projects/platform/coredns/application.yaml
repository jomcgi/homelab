apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coredns-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    targetRevision: main
    path: projects/platform/coredns
    helm:
      releaseName: coredns
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: false # Don't prune - K3s manages CoreDNS resources
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  # Ignore fields that K3s manages
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: coredns
      jsonPointers:
        - /data/NodeHosts
        - /metadata/annotations
        - /metadata/labels
