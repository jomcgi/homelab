# Cluster-specific overrides for OpenTelemetry Operator

# Enable all three auto-instrumentation languages
instrumentation:
  python:
    enabled: true
  nodejs:
    enabled: true
  go:
    enabled: true
    endpoint: http://signoz-k8s-infra-otel-agent.signoz.svc.cluster.local:4318
  # Namespaces to deploy Instrumentation CRs into
  namespaces:
    # Production
    - trips
    - api-gateway
    - mcp-servers
    - todo
    - agent-orchestrator
    - cluster-agents
    # Development
    - grimoire
    - marine
    - stargazer
