apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: signoz-dashboard-sidecar
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    targetRevision: HEAD
    path: projects/platform/signoz-addons/dashboard-sidecar
    helm:
      releaseName: signoz-dashboard-sidecar
      valueFiles:
        - values.yaml
        - values-prod.yaml
      ignoreMissingValueFiles: true
  destination:
    server: https://kubernetes.default.svc
    namespace: signoz
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
