# Environment-specific overrides for signoz-dashboard-sidecar

# Use the image from our container registry
image:
  repository: ghcr.io/jomcgi/homelab/projects/platform/signoz-addons/dashboard-sidecar/cmd
  # tag will be updated by argocd-image-updater
  tag: main@sha256:2b2d2230a9e5d67e4c7a486b43a537a4f079ecb8535a0a5c709bd0562047c67a
# GHCR image pull authentication
imagePullSecrets:
  - name: ghcr-imagepull-secret
imagePullSecret:
  enabled: true
# SigNoz configuration - use cluster-internal DNS
signoz:
  url: "http://signoz.signoz.svc.cluster.local:8080"
  # API key for SigNoz authentication (from 1Password)
  apiKeySecret:
    enabled: true
    create: true
# Watch all namespaces for dashboard ConfigMaps
watch:
  namespace: ""
# Reconcile every 5 minutes to enforce GitOps (drift correction)
reconcile:
  interval: "5m"
# Enable all bundled dashboards
dashboards:
  kubernetes-cluster-metrics:
    enabled: true
  kubernetes-pod-metrics-overall:
    enabled: true
  kubernetes-pod-metrics-detailed:
    enabled: true
  kubernetes-node-metrics-overall:
    enabled: true
  kubernetes-node-metrics-detailed:
    enabled: true
  kubernetes-pvc-metrics:
    enabled: true
  host-metrics:
    enabled: true
  signoz-ingestion-analysis:
    enabled: true
