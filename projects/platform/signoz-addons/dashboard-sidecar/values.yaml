# SigNoz Dashboard Sidecar configuration

image:
  repository: ghcr.io/jomcgi/homelab/projects/platform/signoz-addons/dashboard-sidecar/cmd
  tag: "" # Defaults to appVersion
  pullPolicy: IfNotPresent

# Image pull secrets for private registries
imagePullSecrets: []

# Image pull secret configuration (OnePassword)
imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

# SigNoz API configuration
signoz:
  # URL to SigNoz query-service (internal cluster DNS)
  url: "http://signoz.signoz.svc.cluster.local:8080"
  # API key for authentication (optional, leave empty if not required)
  apiKey: ""
  # Secret containing API key (alternative to apiKey)
  apiKeySecret:
    # Set to true to use a secret for the API key
    enabled: false
    # Set to true to create the OnePasswordItem for the API key
    create: false
    # Name of the Kubernetes secret
    name: "signoz-api-key"
    # Key within the secret containing the API key
    key: "api-key"
    # OnePassword configuration (used when create: true)
    onepassword:
      itemPath: "vaults/k8s-homelab/items/signoz"

# Watch configuration
watch:
  # Namespace to watch for dashboard ConfigMaps (empty = all namespaces)
  namespace: ""
  # Note: Label selector is hardcoded to "signoz.io/dashboard=true"

# Dashboard tagging
# All dashboards managed by this sidecar get "iac-managed" tag by default.
# ConfigMap annotations:
#   signoz.io/dashboard-name: "Custom Title"  - Override dashboard title
#   signoz.io/dashboard-tags: "tag1,tag2"     - Add custom tags (comma-separated)

# Reconciliation settings
reconcile:
  # How often to enforce desired state (drift correction)
  interval: "5m"

# Metrics configuration
metrics:
  enabled: true
  port: 9090

# Resource limits
resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}

# Pod annotations
podAnnotations: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Bundled dashboards to deploy as ConfigMaps
# Each entry creates a ConfigMap with the dashboard JSON
# Options per dashboard:
#   enabled: true/false  - Whether to deploy this dashboard
#   tags: "tag1,tag2"    - Custom tags (comma-separated, added to "iac-managed")
dashboards:
  # Kubernetes Infrastructure dashboards (from SigNoz/dashboards repo)
  kubernetes-cluster-metrics:
    enabled: true
    tags: "k8s,cluster"
  kubernetes-pod-metrics-overall:
    enabled: true
    tags: "k8s,pods"
  kubernetes-pod-metrics-detailed:
    enabled: true
    tags: "k8s,pods"
  kubernetes-node-metrics-overall:
    enabled: true
    tags: "k8s,nodes"
  kubernetes-node-metrics-detailed:
    enabled: true
    tags: "k8s,nodes"
  kubernetes-pvc-metrics:
    enabled: true
    tags: "k8s,storage"
  host-metrics:
    enabled: true
    tags: "infrastructure"
  # SigNoz self-monitoring
  signoz-ingestion-analysis:
    enabled: true
    tags: "signoz,monitoring"
