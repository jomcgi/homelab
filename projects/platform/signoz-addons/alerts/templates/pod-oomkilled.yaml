apiVersion: v1
kind: ConfigMap
metadata:
  name: pod-oomkilled-alert
  labels:
    signoz.io/alert: "true"
  annotations:
    signoz.io/alert-name: "Pod OOMKilled"
    signoz.io/severity: "critical"
    signoz.io/notification-channels: "incidentio"
data:
  alert.json: |
    {
      "alert": "Pod OOMKilled",
      "alertType": "METRICS_BASED_ALERT",
      "ruleType": "threshold_rule",
      "version": "v5",
      "broadcastToAll": false,
      "disabled": false,
      "evalWindow": "5m0s",
      "frequency": "1m0s",
      "severity": "critical",
      "labels": {
        "category": "pod-health",
        "environment": "production"
      },
      "annotations": {
        "summary": "Container {{ "{{" }} $labels.k8s_container_name {{ "}}" }} was OOMKilled",
        "description": "Container {{ "{{" }} $labels.k8s_container_name {{ "}}" }} in pod {{ "{{" }} $labels.k8s_pod_name {{ "}}" }} namespace {{ "{{" }} $labels.k8s_namespace_name {{ "}}" }} was terminated due to OOM"
      },
      "condition": {
        "compositeQuery": {
          "queries": [
            {
              "type": "builder_query",
              "spec": {
                "name": "A",
                "signal": "metrics",
                "stepInterval": 60,
                "aggregations": [
                  {
                    "timeAggregation": "increase",
                    "spaceAggregation": "sum",
                    "metricName": "k8s.container.restarts"
                  }
                ],
                "filter": {
                  "expression": "k8s.container.status.last_terminated_reason = 'OOMKilled'"
                },
                "groupBy": [
                  {
                    "name": "k8s.namespace.name",
                    "fieldDataType": "string",
                    "fieldContext": "resource"
                  },
                  {
                    "name": "k8s.pod.name",
                    "fieldDataType": "string",
                    "fieldContext": "resource"
                  },
                  {
                    "name": "k8s.container.name",
                    "fieldDataType": "string",
                    "fieldContext": "resource"
                  }
                ],
                "order": [],
                "disabled": false
              }
            }
          ],
          "panelType": "graph",
          "queryType": "builder"
        },
        "selectedQueryName": "A",
        "op": "1",
        "target": 0,
        "matchType": "1",
        "targetUnit": "",
        "thresholds": {
          "kind": "basic",
          "spec": [
            {
              "name": "critical",
              "target": 0,
              "targetUnit": "",
              "matchType": "1",
              "op": "1",
              "channels": ["incidentio"]
            }
          ]
        }
      },
      "preferredChannels": ["incidentio"]
    }
