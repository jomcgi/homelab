apiVersion: v1
kind: ConfigMap
metadata:
  name: pod-pending-alert
  labels:
    signoz.io/alert: "true"
  annotations:
    signoz.io/alert-name: "Pod Stuck Pending"
    signoz.io/severity: "warning"
    signoz.io/notification-channels: "incidentio"
data:
  alert.json: |
    {
      "alert": "Pod Stuck Pending",
      "alertType": "METRICS_BASED_ALERT",
      "ruleType": "threshold_rule",
      "version": "v5",
      "broadcastToAll": false,
      "disabled": false,
      "evalWindow": "15m0s",
      "frequency": "1m0s",
      "severity": "warning",
      "labels": {
        "category": "pod-health",
        "environment": "production"
      },
      "annotations": {
        "summary": "Pod {{ "{{" }} $labels.k8s_pod_name {{ "}}" }} stuck in Pending state",
        "description": "Pod {{ "{{" }} $labels.k8s_pod_name {{ "}}" }} in namespace {{ "{{" }} $labels.k8s_namespace_name {{ "}}" }} has been Pending for more than 15 minutes"
      },
      "condition": {
        "compositeQuery": {
          "queries": [
            {
              "type": "builder_query",
              "spec": {
                "name": "A",
                "signal": "metrics",
                "stepInterval": 60,
                "aggregations": [
                  {
                    "timeAggregation": "max",
                    "spaceAggregation": "max",
                    "metricName": "k8s.pod.phase"
                  }
                ],
                "groupBy": [
                  {
                    "name": "k8s.namespace.name",
                    "fieldDataType": "string",
                    "fieldContext": "resource"
                  },
                  {
                    "name": "k8s.pod.name",
                    "fieldDataType": "string",
                    "fieldContext": "resource"
                  }
                ],
                "order": [],
                "disabled": false
              }
            }
          ],
          "panelType": "graph",
          "queryType": "builder"
        },
        "selectedQueryName": "A",
        "op": "3",
        "target": 1,
        "matchType": "5",
        "targetUnit": "",
        "thresholds": {
          "kind": "basic",
          "spec": [
            {
              "name": "warning",
              "target": 1,
              "targetUnit": "",
              "matchType": "5",
              "op": "3",
              "channels": ["incidentio"]
            }
          ]
        }
      },
      "preferredChannels": ["incidentio"]
    }
