apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-app-degraded-alert
  labels:
    signoz.io/alert: "true"
  annotations:
    signoz.io/alert-name: "ArgoCD App Degraded"
    signoz.io/severity: "warning"
    signoz.io/notification-channels: "incidentio"
data:
  alert.json: |
    {
      "alert": "ArgoCD App Degraded",
      "alertType": "METRICS_BASED_ALERT",
      "ruleType": "threshold_rule",
      "version": "v5",
      "broadcastToAll": false,
      "disabled": false,
      "evalWindow": "5m0s",
      "frequency": "1m0s",
      "severity": "warning",
      "labels": {
        "service": "argocd",
        "category": "gitops"
      },
      "annotations": {
        "summary": "ArgoCD application is degraded",
        "description": "ArgoCD application {{ "{{" }} $labels.name {{ "}}" }} has health status Degraded"
      },
      "condition": {
        "compositeQuery": {
          "queries": [
            {
              "type": "builder_query",
              "spec": {
                "name": "A",
                "signal": "metrics",
                "stepInterval": 60,
                "aggregations": [
                  {
                    "timeAggregation": "count",
                    "spaceAggregation": "sum",
                    "metricName": "argocd_app_info"
                  }
                ],
                "filter": {
                  "expression": "health_status = 'Degraded'"
                },
                "groupBy": [
                  {
                    "name": "name",
                    "fieldDataType": "string",
                    "fieldContext": "tag"
                  },
                  {
                    "name": "namespace",
                    "fieldDataType": "string",
                    "fieldContext": "tag"
                  }
                ],
                "order": [],
                "disabled": false
              }
            }
          ],
          "panelType": "graph",
          "queryType": "builder"
        },
        "selectedQueryName": "A",
        "op": "1",
        "target": 0,
        "matchType": "1",
        "targetUnit": "",
        "thresholds": {
          "kind": "basic",
          "spec": [
            {
              "name": "warning",
              "target": 0,
              "targetUnit": "",
              "matchType": "1",
              "op": "1",
              "channels": ["incidentio"]
            }
          ]
        }
      },
      "preferredChannels": ["incidentio"]
    }
