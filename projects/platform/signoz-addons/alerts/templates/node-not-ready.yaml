apiVersion: v1
kind: ConfigMap
metadata:
  name: node-not-ready-alert
  labels:
    signoz.io/alert: "true"
  annotations:
    signoz.io/alert-name: "Node Not Ready"
    signoz.io/severity: "critical"
    signoz.io/notification-channels: "incidentio"
data:
  alert.json: |
    {
      "alert": "Node Not Ready",
      "alertType": "METRICS_BASED_ALERT",
      "ruleType": "threshold_rule",
      "version": "v5",
      "broadcastToAll": false,
      "disabled": false,
      "evalWindow": "5m0s",
      "frequency": "1m0s",
      "severity": "critical",
      "labels": {
        "category": "node-health",
        "environment": "production"
      },
      "annotations": {
        "summary": "Node {{ "{{" }} $labels.k8s_node_name {{ "}}" }} is not Ready",
        "description": "Kubernetes node {{ "{{" }} $labels.k8s_node_name {{ "}}" }} is not in Ready condition for 5 consecutive checks"
      },
      "condition": {
        "compositeQuery": {
          "queries": [
            {
              "type": "builder_query",
              "spec": {
                "name": "A",
                "signal": "metrics",
                "stepInterval": 60,
                "aggregations": [
                  {
                    "timeAggregation": "min",
                    "spaceAggregation": "min",
                    "metricName": "k8s.node.condition_ready"
                  }
                ],
                "groupBy": [
                  {
                    "name": "k8s.node.name",
                    "fieldDataType": "string",
                    "fieldContext": "resource"
                  }
                ],
                "order": [],
                "disabled": false
              }
            }
          ],
          "panelType": "graph",
          "queryType": "builder"
        },
        "selectedQueryName": "A",
        "op": "2",
        "target": 1,
        "matchType": "5",
        "targetUnit": "",
        "thresholds": {
          "kind": "basic",
          "spec": [
            {
              "name": "critical",
              "target": 1,
              "targetUnit": "",
              "matchType": "5",
              "op": "2",
              "channels": ["incidentio"]
            }
          ]
        }
      },
      "preferredChannels": ["incidentio"]
    }
