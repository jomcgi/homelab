apiVersion: v1
kind: ConfigMap
metadata:
  name: { { include "cloudflare-tunnel.fullname" . } }
  namespace: { { include "cloudflare-tunnel.namespace" . } }
  labels: { { - include "cloudflare-tunnel.labels" . | nindent 4 } }
data:
  config.yaml: |
    tunnel: {{ .Values.tunnel.name }}
    credentials-file: /etc/cloudflared/creds/credentials.json
    {{- if .Values.metrics.enabled }}
    metrics: {{ .Values.metrics.address }}
    {{- end }}
    no-autoupdate: {{ .Values.tunnel.noAutoupdate }}
    ingress:
    {{- range .Values.ingress.routes }}
    - hostname: {{ .hostname }}
      service: {{ .service }}
      {{- if .originRequest }}
      originRequest:
        {{- toYaml .originRequest | nindent 8 }}
      {{- end }}
    {{- end }}
    - service: {{ .Values.ingress.catchAll.service }}
