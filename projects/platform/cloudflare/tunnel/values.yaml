replicaCount: 2

overlayName: "" # Should be set by overlay (e.g., homelab, prod)

image:
  repository: cloudflare/cloudflared
  tag: "2025.4.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: "cloudflared"

serviceAccount:
  create: false
  name: ""

tunnel:
  id: "" # Will be set from secret when using OnePassword
  name: "" # Will be set from secret when using OnePassword
  # Protocol: auto (default), quic, or http2.
  # Note: http2 doesn't work with envoy transparent proxy enabled.
  protocol: ""
  # Disable cloudflared auto-update (recommended for container deployments)
  noAutoupdate: true

secret:
  # Options: onepassword, manual, external
  type: onepassword
  # For OnePassword operator integration
  onepassword:
    itemPath: ""
  # For manual secret creation (base64 encoded JSON)
  manual:
    credentialsJson: ""

ingress:
  routes: [] # Define routes in overlay values
  catchAll:
    service: http_status:404

service:
  type: ClusterIP
  port: 2000

resources: {}

priorityClassName: ""

topologySpreadConstraints: []

nodeSelector: {}

tolerations: []

affinity: {}

namespace:
  create: true
  name: cloudflare-tunnel

podSecurityContext: {}

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

livenessProbe:
  exec:
    command:
      - cloudflared
      - tunnel
      - --metrics
      - 127.0.0.1:2000
      - ready
  failureThreshold: 6 # Allow 6 failures (60s) before restarting - QUIC can have temporary hiccups
  initialDelaySeconds: 30 # Give tunnel time to connect
  periodSeconds: 10
  timeoutSeconds: 5

readinessProbe:
  exec:
    command:
      - cloudflared
      - tunnel
      - --metrics
      - 127.0.0.1:2000
      - ready
  failureThreshold: 3
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 5

metrics:
  enabled: true
  address: "127.0.0.1:2000"

# Envoy proxy sidecar for tracing and observability
envoy:
  enabled: false
  image:
    repository: envoyproxy/envoy
    tag: "v1.31-latest"
    pullPolicy: IfNotPresent
  # Admin interface
  admin:
    port: 9901
  # Proxy listener port
  proxy:
    port: 8000
  # Transparent proxy for intercepting outbound traffic
  transparentProxy:
    enabled: false
    # Port for transparent proxy listener (standard Istio port)
    port: 15001
    # Init container image with iptables
    iptablesImage: "docker.io/istio/proxyv2:1.20.0"
  # Envoy container security context
  securityContext:
    runAsUser: 65534
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  # OpenTelemetry tracing configuration
  tracing:
    enabled: true
    # SigNoz OTEL collector endpoint
    otlpEndpoint: "signoz-otel-collector.signoz.svc.cluster.local:4317"
    serviceName: "cloudflare-tunnel"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
