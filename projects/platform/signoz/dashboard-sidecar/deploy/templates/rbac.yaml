{{- if .Values.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "signoz-dashboard-sidecar.fullname" . }}
  labels:
    {{- include "signoz-dashboard-sidecar.labels" . | nindent 4 }}
rules:
  # Watch dashboard/alert/channel ConfigMaps across all namespaces
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Read secrets for value substitution in channel configs (e.g., PagerDuty routing keys)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "signoz-dashboard-sidecar.fullname" . }}
  labels:
    {{- include "signoz-dashboard-sidecar.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "signoz-dashboard-sidecar.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "signoz-dashboard-sidecar.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Role for managing state ConfigMap in the release namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "signoz-dashboard-sidecar.fullname" . }}-state
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "signoz-dashboard-sidecar.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "signoz-dashboard-sidecar.fullname" . }}-state
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "signoz-dashboard-sidecar.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "signoz-dashboard-sidecar.fullname" . }}-state
subjects:
  - kind: ServiceAccount
    name: {{ include "signoz-dashboard-sidecar.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
