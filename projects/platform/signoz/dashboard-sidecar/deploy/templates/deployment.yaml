apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "signoz-dashboard-sidecar.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "signoz-dashboard-sidecar.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "signoz-dashboard-sidecar.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "signoz-dashboard-sidecar.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "signoz-dashboard-sidecar.serviceAccountName" . }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- range .Values.imagePullSecrets }}
        - name: {{ .name }}
        {{- end }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ include "signoz-dashboard-sidecar.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: SIGNOZ_URL
              value: {{ .Values.signoz.url | quote }}
            {{- if .Values.signoz.apiKey }}
            - name: SIGNOZ_API_KEY
              value: {{ .Values.signoz.apiKey | quote }}
            {{- else if .Values.signoz.apiKeySecret.enabled }}
            - name: SIGNOZ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.signoz.apiKeySecret.name }}
                  key: {{ .Values.signoz.apiKeySecret.key }}
            {{- end }}
            - name: WATCH_NAMESPACE
              value: {{ .Values.watch.namespace | quote }}
            - name: STATE_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: RECONCILE_INTERVAL
              value: {{ .Values.reconcile.interval | quote }}
            - name: METRICS_ADDR
              value: ":{{ .Values.metrics.port }}"
          ports:
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.metrics.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.metrics.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
