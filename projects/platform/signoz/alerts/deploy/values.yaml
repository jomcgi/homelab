# SLO alert defaults
sloDefaults:
  severity: critical
  channels:
    - incidentio
  # Burn-fast: 14.4x burn rate, 5m eval window
  burnFast:
    evalWindow: "5m0s"
    frequency: "1m0s"
    matchType: "3"
  # Budget exhausted: 1x burn rate, 6h eval window
  budgetExhausted:
    evalWindow: "6h0m0s"
    frequency: "5m0s"
    matchType: "3"
