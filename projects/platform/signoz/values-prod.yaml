# k8s-infra subchart configuration
k8s-infra:
  presets:
    # Enable Prometheus annotation-based scraping for metrics from annotated pods/services
    # This allows scraping metrics from services with prometheus.io/scrape: "true" annotations
    # Used by ArgoCD metrics services and other standard Prometheus-compatible exporters
    prometheus:
      enabled: true
      # Use standard prometheus.io annotation prefix (ArgoCD, kube-state-metrics, etc.)
      annotationsPrefix: prometheus.io
      scrapeInterval: 30s
  otelAgent:
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        cpu: 500m
        memory: 500Mi
  otelDeployment:
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        cpu: 500m
        memory: 400Mi
    # Inject Cloudflare Access service token for Zero Trust bypass
    # Create a service token in Cloudflare Zero Trust dashboard:
    # Zero Trust > Access > Service Auth > Create Service Token
    additionalEnvs:
      CF_ACCESS_CLIENT_ID:
        valueFrom:
          secretKeyRef:
            name: synthetic-tests
            key: cloudflare-client-id
      CF_ACCESS_CLIENT_SECRET:
        valueFrom:
          secretKeyRef:
            name: synthetic-tests
            key: cloudflare-client-secret
    config:
      receivers:
        # Prometheus scraper for NATS JetStream metrics
        prometheus/nats:
          config:
            scrape_configs:
              - job_name: "nats"
                scrape_interval: 30s
                static_configs:
                  - targets:
                      - "nats.nats.svc.cluster.local:7777"
                    labels:
                      service: nats

        # Prometheus scraper for NVIDIA GPU metrics (DCGM exporter)
        prometheus/dcgm:
          config:
            scrape_configs:
              - job_name: "nvidia-dcgm"
                scrape_interval: 30s
                static_configs:
                  - targets:
                      - "nvidia-dcgm-exporter.gpu-operator.svc.cluster.local:9400"
                    labels:
                      service: nvidia-gpu

        # =============================================================================
        # Synthetic HTTP Health Checks
        # Monitors all public domains for availability and response time
        # Uses OpenTelemetry httpcheck receiver
        # =============================================================================

        # Kubernetes-hosted services (via Cloudflare Tunnel)
        # These require Cloudflare Zero Trust authentication bypass via service token headers
        httpcheck/k8s-services:
          collection_interval: 120s
          targets:
            # GitOps - ArgoCD
            - endpoint: https://argocd.jomcgi.dev
              method: GET
              headers:
                CF-Access-Client-Id: "${env:CF_ACCESS_CLIENT_ID}"
                CF-Access-Client-Secret: "${env:CF_ACCESS_CLIENT_SECRET}"
            # Storage management - Longhorn
            - endpoint: https://longhorn.jomcgi.dev
              method: GET
              headers:
                CF-Access-Client-Id: "${env:CF_ACCESS_CLIENT_ID}"
                CF-Access-Client-Secret: "${env:CF_ACCESS_CLIENT_SECRET}"
            # Observability - SigNoz
            - endpoint: https://signoz.jomcgi.dev
              method: GET
              headers:
                CF-Access-Client-Id: "${env:CF_ACCESS_CLIENT_ID}"
                CF-Access-Client-Secret: "${env:CF_ACCESS_CLIENT_SECRET}"
            # Image hosting (trips-nginx serves /health)
            - endpoint: https://img.jomcgi.dev/health
              method: GET
              headers:
                CF-Access-Client-Id: "${env:CF_ACCESS_CLIENT_ID}"
                CF-Access-Client-Secret: "${env:CF_ACCESS_CLIENT_SECRET}"
            # API gateway
            - endpoint: https://api.jomcgi.dev/status.json
              method: GET
              headers:
                CF-Access-Client-Id: "${env:CF_ACCESS_CLIENT_ID}"
                CF-Access-Client-Secret: "${env:CF_ACCESS_CLIENT_SECRET}"
            # Todo app (public - no auth needed but include for consistency)
            - endpoint: https://todo.jomcgi.dev
              method: GET
            # Todo admin (requires auth)
            - endpoint: https://todo-admin.jomcgi.dev
              method: GET
              headers:
                CF-Access-Client-Id: "${env:CF_ACCESS_CLIENT_ID}"
                CF-Access-Client-Secret: "${env:CF_ACCESS_CLIENT_SECRET}"
            # Cluster agents (internal health check - no public domain)
            - endpoint: http://cluster-agents.cluster-agents.svc.cluster.local:8080/health
              method: GET
            # Ships/Marine frontend
            - endpoint: https://ships.jomcgi.dev
              method: GET
              headers:
                CF-Access-Client-Id: "${env:CF_ACCESS_CLIENT_ID}"
                CF-Access-Client-Secret: "${env:CF_ACCESS_CLIENT_SECRET}"

        # Cloudflare Pages (static sites) - no auth required
        httpcheck/cloudflare-pages:
          targets:
            # Personal website
            - endpoint: https://jomcgi.dev
              method: GET
            # Hiking routes
            - endpoint: https://hikes.jomcgi.dev
              method: GET
            # Trip management UI
            - endpoint: https://trips.jomcgi.dev
              method: GET
          collection_interval: 120s

      service:
        pipelines:
          # Add NATS metrics to the scraper pipeline
          metrics/scraper:
            receivers:
              - prometheus/nats
              - prometheus/dcgm
              - httpcheck/k8s-services
              - httpcheck/cloudflare-pages
            processors:
              - k8sattributes
              - resourcedetection
              - batch
            exporters:
              - otlp

# signoz subchart configuration
# NOTE: k8s-infra is a sibling subchart (not nested inside signoz). Configure
# the OTel agent/deployment resources and receivers under the top-level k8s-infra key above.
signoz:
  clickhouse:
    resources:
      requests:
        cpu: 2
        memory: 5Gi
      limits:
        cpu: 4
        memory: 8Gi
    persistence:
      size: 150Gi
    # System table TTL settings (days) - prevents unbounded growth
    clickhouseOperator:
      queryLog:
        ttl: 7
      partLog:
        ttl: 7
      traceLog:
        ttl: 3
      metricLog:
        ttl: 7
      asynchronousMetricLog:
        ttl: 7
      sessionLog:
        ttl: 7
      zookeeperLog:
        ttl: 7
      processorsProfileLog:
        ttl: 3
      queryViewsLog:
        ttl: 7
    # Zookeeper is a subchart of clickhouse
    zookeeper:
      resources:
        requests:
          cpu: 100m
          memory: 1Gi
        limits:
          cpu: 1
          memory: 1.5Gi
  otelCollector:
    resources:
      requests:
        cpu: 200m
        memory: 2Gi
      limits:
        cpu: 2
        memory: 4Gi
