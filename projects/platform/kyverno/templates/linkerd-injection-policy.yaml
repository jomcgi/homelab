{{- if .Values.linkerdInjection.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-linkerd-namespace-annotation
  annotations:
    policies.kyverno.io/title: Auto-Enable Linkerd Injection for Namespaces
    policies.kyverno.io/category: Service Mesh
    policies.kyverno.io/severity: low
    policies.kyverno.io/description: |
      Automatically annotates namespaces with linkerd.io/inject=enabled
      to enable automatic Linkerd sidecar injection. This ensures all
      workloads get automatic distributed tracing and mTLS by default.
      ENABLED BY DEFAULT - opt-out with linkerd.io/inject: "disabled"
spec:
  background: {{ .Values.linkerdInjection.background }}
  validationFailureAction: Audit
  rules:
  - name: add-linkerd-injection-annotation
    skipBackgroundRequests: true
    match:
      any:
      - resources:
          kinds:
          - Namespace
    exclude:
      any:
      # Exclude system namespaces
      - resources:
          namespaces:
          {{- range .Values.linkerdInjection.excludeNamespaces }}
          - {{ . }}
          {{- end }}
      # Exclude namespaces that are already annotated
      - resources:
          selector:
            matchExpressions:
            - key: linkerd.io/inject
              operator: Exists
      # Explicit opt-out
      - resources:
          selector:
            matchLabels:
              linkerd.io/inject: "disabled"
    mutate:
      patchStrategicMerge:
        metadata:
          annotations:
            linkerd.io/inject: "enabled"
            linkerd.io/injected-by: "kyverno/inject-linkerd-namespace-annotation"
{{- end }}
