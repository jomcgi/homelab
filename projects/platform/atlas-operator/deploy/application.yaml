apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: atlas-operator
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: ghcr.io/ariga/charts
      chart: atlas-operator
      targetRevision: 0.7.28
      helm:
        releaseName: atlas-operator
        valueFiles:
          - $values/projects/platform/atlas-operator/deploy/values.yaml
    - repoURL: https://github.com/jomcgi/homelab.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: atlas-operator-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
