apiVersion: batch/v1
kind: Job
metadata:
  name: configure-longhorn-node-4-disks
  namespace: longhorn
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true #:
      serviceAccountName: longhorn-service-account
      restartPolicy: OnFailure
      containers:
        - securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 65534
          name: configure-disks
          image: alpine/kubectl:1.35.0
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for Longhorn node-4 to be created..."
              until kubectl get nodes.longhorn.io -n longhorn node-4 2>/dev/null; do
                echo "Waiting..."
                sleep 5
              done

              echo "Configuring additional disks for node-4..."
              echo "Note: nvme-01 is reserved for K3s ephemeral storage and excluded from Longhorn"
              kubectl patch nodes.longhorn.io -n longhorn node-4 --type=json -p='[
                {
                  "op": "add",
                  "path": "/spec/disks/nvme-02",
                  "value": {
                    "allowScheduling": true,
                    "diskType": "filesystem",
                    "evictionRequested": false,
                    "path": "/var/lib/longhorn/nvme-02",
                    "storageReserved": 107374182400,
                    "tags": ["nvme", "fast", "gpu"]
                  }
                },
                {
                  "op": "add",
                  "path": "/spec/disks/ssd-01",
                  "value": {
                    "allowScheduling": true,
                    "diskType": "filesystem",
                    "evictionRequested": false,
                    "path": "/var/lib/longhorn/ssd-01",
                    "storageReserved": 214748364800,
                    "tags": ["ssd", "large", "gpu"]
                  }
                }
              ]'

              echo "Disk configuration complete!"
              kubectl get nodes.longhorn.io -n longhorn node-4 -o jsonpath='{.spec.disks}'
