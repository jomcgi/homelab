# SeaweedFS shared infrastructure configuration
# Used by multiple projects for S3-compatible object storage

seaweedfs:
  global:
    enableSecurity: false
    monitoring:
      enabled: false

  master:
    enabled: true
    replicas: 1
    # Disable anti-affinity for single-node homelab
    affinity: ""
    # Pre-populate OTEL annotation to match Kyverno injection (prevents ArgoCD drift)
    # Prometheus annotations enable SigNoz autodiscovery
    podAnnotations:
      otel.injected-by: kyverno/inject-otel-env-vars
      prometheus.io/scrape: "true"
      prometheus.io/port: "9327"
    data:
      type: "persistentVolumeClaim"
      size: "1Gi"
      storageClass: "longhorn"
    logs:
      type: "emptyDir"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  volume:
    enabled: true
    replicas: 1
    # Disable anti-affinity for single-node homelab
    affinity: ""
    # Pre-populate OTEL annotation to match Kyverno injection (prevents ArgoCD drift)
    # Prometheus annotations enable SigNoz autodiscovery
    podAnnotations:
      otel.injected-by: kyverno/inject-otel-env-vars
      prometheus.io/scrape: "true"
      prometheus.io/port: "9327"
    dataDirs:
      - name: data
        type: "persistentVolumeClaim"
        size: "100Gi"
        storageClass: "longhorn"
        maxVolumes: 0
    idx:
      type: "emptyDir"
    # Regenerate missing .idx files from .dat files on startup.
    # The built-in move-idx init container moves .idx from /data to /idx (emptyDir),
    # but if the pod is rescheduled the emptyDir is lost and the .idx files are gone.
    # This init container runs weed fix to rebuild them.
    initContainers: |
      - name: seaweedfs-vol-fix-idx
        image: '{{ include "volume.image" . }}'
        imagePullPolicy: IfNotPresent
        command: ['/bin/sh', '-c']
        args:
          - |
            echo "Checking for missing idx files..."
            for dat in /data/*.dat; do
              [ -f "$dat" ] || continue
              base=$(basename "$dat" .dat)
              if [ ! -f "/idx/${base}.idx" ]; then
                if echo "$base" | grep -q '_'; then
                  collection=$(echo "$base" | sed 's/_[0-9]*$//')
                  volid=$(echo "$base" | grep -o '[0-9]*$')
                  echo "Regenerating idx: collection=$collection volumeId=$volid"
                  /usr/bin/weed fix -collection="$collection" -volumeId="$volid" /data
                else
                  echo "Regenerating idx: volumeId=$base"
                  /usr/bin/weed fix -volumeId="$base" /data
                fi
                if [ -f "/data/${base}.idx" ]; then
                  mv "/data/${base}.idx" /idx/
                  echo "Moved ${base}.idx to /idx/"
                fi
              fi
            done
            echo "idx check complete"
        volumeMounts:
          - name: data
            mountPath: /data
          - name: idx
            mountPath: /idx
    logs:
      type: "emptyDir"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  filer:
    enabled: true
    replicas: 1
    # Disable anti-affinity for single-node homelab
    affinity: ""
    # Pre-populate OTEL annotation to match Kyverno injection (prevents ArgoCD drift)
    # Prometheus annotations enable SigNoz autodiscovery
    podAnnotations:
      otel.injected-by: kyverno/inject-otel-env-vars
      prometheus.io/scrape: "true"
      prometheus.io/port: "9327"
    data:
      type: "persistentVolumeClaim"
      size: "5Gi"
      storageClass: "longhorn"
    logs:
      type: "emptyDir"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  s3:
    enabled: true
    replicas: 1
    port: 8333
    enableAuth: false
    # Pre-populate OTEL annotation to match Kyverno injection (prevents ArgoCD drift)
    # Prometheus annotations enable SigNoz autodiscovery
    podAnnotations:
      otel.injected-by: kyverno/inject-otel-env-vars
      prometheus.io/scrape: "true"
      prometheus.io/port: "9327"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
