{{- if .Values.deployController }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: agent-sandbox-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: agent-sandbox-controller
spec:
  serviceName: agent-sandbox-controller
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app: agent-sandbox-controller
  template:
    metadata:
      labels:
        app: agent-sandbox-controller
    spec:
      serviceAccountName: agent-sandbox-controller
      securityContext:
        runAsNonRoot: {{ .Values.controller.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.controller.securityContext.runAsUser }}
        fsGroup: {{ .Values.controller.securityContext.fsGroup }}
      containers:
        - name: agent-sandbox-controller
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
          args: ["--extensions"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
{{- end }}
