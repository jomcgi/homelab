# installCRDs gates CRD installation.
# Set to false when deploying agent-platform alongside an existing release that
# already owns the agent-sandbox CRDs (e.g., cluster-critical). Pass --skip-crds
# to `helm install` as well to suppress the crds/ directory.
installCRDs: true

# deployController gates the controller StatefulSet.
# Set to false when an existing release already runs the agent-sandbox controller.
deployController: true

controller:
  image:
    repository: registry.k8s.io/agent-sandbox/agent-sandbox-controller
    # Pinned to digest; ArgoCD Image Updater keeps this current.
    tag: "v0.1.1"
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    fsGroup: 65532
