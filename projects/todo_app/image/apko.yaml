contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - ca-certificates-bundle
    - git
    - openssh-client
    - tzdata

archs:
  - x86_64
  - aarch64

accounts:
  groups:
    - groupname: todo
      gid: 65532
  users:
    - username: todo
      uid: 65532
      gid: 65532
  run-as: 65532

environment:
  TZ: America/Los_Angeles
  HOME: /home/todo
  GIT_SSH_COMMAND: ssh -o StrictHostKeyChecking=no

paths:
  - path: /home/todo
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /home/todo/.ssh
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /data
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /app/static
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

entrypoint:
  command: /opt/app
