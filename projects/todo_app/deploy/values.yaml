replicaCount: 1

image:
  repository: ghcr.io/jomcgi/homelab/projects/todo_app/image
  tag: main
  pullPolicy: IfNotPresent

# Image pull secret for private GHCR registry
imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

git:
  repo: https://github.com/jomcgi/homelab.git
  branch: main
  dataPath: data/todo # Subdirectory in repo for todo data
  # Token secret for git authentication (created by OnePasswordItem)
  tokenSecret:
    name: git-token
    key: github_token
  # 1Password item path for the git token
  onePasswordItem: "vaults/k8s-homelab/items/argocd-image-updater"

service:
  public:
    port: 80
  admin:
    port: 8080

persistence:
  enabled: true
  storageClass: "" # Use cluster default
  size: 1Gi

resources:
  api:
    requests:
      memory: "24Mi"
      cpu: "5m"
    limits:
      memory: "24Mi"
      cpu: "5m"
  static:
    requests:
      memory: "16Mi"
      cpu: "5m"
    limits:
      memory: "16Mi"
      cpu: "5m"

## Pod security context
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

## Init container (git-clone) security context — needs root for chown
initSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - CHOWN
      - DAC_OVERRIDE

## API container security context (Go binary, uid 65532)
apiSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false # Needs write access to git repo for commits
  capabilities:
    drop:
      - ALL

## Static (nginx-unprivileged) container security context
staticSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false # nginx needs writable /tmp and /var/cache/nginx
  capabilities:
    drop:
      - ALL

# Pod affinity/anti-affinity rules
# Useful for RWO volumes to keep pod on same node and avoid volume reattachment delays
affinity: {}

adminUrl: https://todo-admin.jomcgi.dev

# Cloudflare ingress routing
cfIngress:
  public:
    enabled: true
    tier: public
    hostname: todo.jomcgi.dev
    servicePort: 80
    gateway:
      name: cloudflare-ingress
      namespace: envoy-gateway-system
    rateLimit:
      requests: 100
      unit: Minute
  admin:
    enabled: true
    tier: trusted
    hostname: todo-admin.jomcgi.dev
    servicePort: 8080
    gateway:
      name: cloudflare-ingress
      namespace: envoy-gateway-system
    team: jomcgi
