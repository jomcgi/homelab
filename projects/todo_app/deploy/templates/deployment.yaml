apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "todo.fullname" . }}
  labels:
    {{- include "todo.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate  # Required for RWO PVC - can't attach to multiple pods
  selector:
    matchLabels:
      {{- include "todo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "todo.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: ghcr-imagepull-secret
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: git-clone
          image: alpine/git:latest
          securityContext:
            {{- toYaml .Values.initSecurityContext | nindent 12 }}
          command:
            - sh
            - -c
            - |
              # Configure git credential helper to use token
              git config --global credential.helper 'store --file=/tmp/.git-credentials'
              echo "https://git:${GIT_TOKEN}@github.com" > /tmp/.git-credentials
              if [ -d /repo/.git ]; then
                # Valid git repo exists, update it
                cd /repo && git fetch origin && git reset --hard origin/{{ .Values.git.branch }}
              else
                # Either /repo doesn't exist, or it exists but is not a valid git repo
                # Clean up any existing contents and clone fresh
                rm -rf /repo/* /repo/.[!.]* 2>/dev/null || true
                git clone --branch {{ .Values.git.branch }} {{ .Values.git.repo }} /repo
              fi
              # Ensure data directory exists and is writable by API (uid 65532)
              mkdir -p /repo/{{ .Values.git.dataPath }}
              chown -R 65532:65532 /repo/{{ .Values.git.dataPath }}
          env:
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.git.tokenSecret.name }}
                  key: {{ .Values.git.tokenSecret.key }}
          volumeMounts:
            - name: repo
              mountPath: /repo
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.apiSecurityContext | nindent 12 }}
          ports:
            - name: api
              containerPort: 8080
          env:
            - name: DATA_DIR
              value: /repo/{{ .Values.git.dataPath }}
            - name: STATIC_DIR
              value: /app/static
            - name: GIT_ROOT
              value: /repo
            - name: GIT_REPO
              value: {{ .Values.git.repo }}
            - name: GIT_BRANCH
              value: {{ .Values.git.branch }}
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.git.tokenSecret.name }}
                  key: {{ .Values.git.tokenSecret.key }}
          volumeMounts:
            - name: repo
              mountPath: /repo
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
        - name: static
          image: nginxinc/nginx-unprivileged:alpine
          securityContext:
            {{- toYaml .Values.staticSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8081
          volumeMounts:
            - name: repo
              mountPath: /usr/share/nginx/html
              subPath: {{ .Values.git.dataPath }}/public
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
          resources:
            {{- toYaml .Values.resources.static | nindent 12 }}
      volumes:
        - name: repo
          persistentVolumeClaim:
            claimName: {{ include "todo.fullname" . }}
        - name: nginx-config
          configMap:
            name: {{ include "todo.fullname" . }}-nginx-config
