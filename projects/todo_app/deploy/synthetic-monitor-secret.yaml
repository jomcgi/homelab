# Synthetic Monitor Secret for todo namespace
# Provides CF-Access service token credentials for the todo-admin HTTPCheck CRD.
# References the same 1Password item as projects/platform/signoz/synthetic-monitor-secret.yaml
# so that the HTTPCheck operator in the todo namespace can authenticate through
# Cloudflare Zero Trust when probing https://todo-admin.jomcgi.dev.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: synthetic-tests
  namespace: todo
spec:
  itemPath: "vaults/k8s-homelab/items/synthetic-tests"
