# Production values for todo app
# Uses the homelab monorepo for data storage

# Enable image pull secret for private GHCR registry
imagePullSecret:
  enabled: true
git:
  # Uses the same 1Password item as argocd-image-updater (has repo write access)
  onePasswordItem: "vaults/k8s-homelab/items/argocd-image-updater"
persistence:
  storageClass: longhorn
  size: 5Gi # Larger since it contains the full repo
image:
  tag: main@sha256:de4fb2e6bafe71a7bee4c68b62d41d336a328ed4d0a62ec30cbe879ab61bb98e
  repository: ghcr.io/jomcgi/homelab/charts/todo
podAnnotations:
  instrumentation.opentelemetry.io/inject-go: "go"
  instrumentation.opentelemetry.io/otel-go-auto-target-exe: "/opt/app"
# Prefer to schedule on the same node to avoid volume reattachment delays
affinity:
  podAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: todo
            app.kubernetes.io/instance: todo
        topologyKey: kubernetes.io/hostname
