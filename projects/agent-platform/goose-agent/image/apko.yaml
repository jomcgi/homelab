contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - bash
    - busybox
    - ca-certificates-bundle
    - coreutils
    - git
    - gh
    - go
    - nodejs
    - openssh-client
    - pnpm
    - tzdata

archs:
  - x86_64
  - aarch64

accounts:
  groups:
    - groupname: goose-agent
      gid: 65532
  users:
    - username: goose-agent
      uid: 65532
      gid: 65532
  run-as: 65532

environment:
  TZ: Europe/Dublin
  HOME: /home/goose-agent
  GIT_SSH_COMMAND: ssh -o StrictHostKeyChecking=no

paths:
  - path: /home/goose-agent
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /home/goose-agent/.ssh
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /home/goose-agent/.config/goose
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /home/goose-agent/.claude
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /workspace
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

entrypoint:
  command: /usr/local/bin/goose
