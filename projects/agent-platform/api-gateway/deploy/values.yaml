replicaCount: 1

nginx:
  image:
    repository: nginx
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 48Mi
    limits:
      cpu: 100m
      memory: 48Mi

clusterInfo:
  enabled: true
  image:
    repository: alpine/kubectl
    tag: "1.35.0"
    pullPolicy: IfNotPresent
  # How often to update status.json (seconds)
  interval: 30
  # CDN cache settings for Cloudflare
  # These enable "stale-while-revalidate" so brief origin outages don't
  # immediately show UNREACHABLE to users
  cache:
    # Fresh cache duration (seconds) - CDN serves without checking origin
    maxAge: 30
    # Stale-while-revalidate duration (seconds) - CDN serves stale content
    # while fetching fresh in background. Total survivable downtime = maxAge + staleWhileRevalidate
    staleWhileRevalidate: 300
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 50m
      memory: 256Mi

# Backend services to route to
backends:
  trips:
    host: trips-nginx.trips.svc.cluster.local
    port: 80
  stargazer:
    host: stargazer-api.stargazer.svc.cluster.local
    port: 80

service:
  type: ClusterIP
  port: 80

serviceAccount:
  create: true
  name: ""

# SLO alert defaults
sloDefaults:
  severity: critical
  channels:
    - incidentio
  burnFast:
    evalWindow: "5m0s"
    frequency: "1m0s"
    matchType: "3"
  budgetExhausted:
    evalWindow: "6h0m0s"
    frequency: "5m0s"
    matchType: "3"

# SLO definitions
slos:
  - name: api-gateway
    metric: httpcheck.status
    filter: "http.url = 'https://api.jomcgi.dev/status.json'"
    op: "2"
    threshold: 1
