apiVersion: v2
name: vllm
description: A Helm chart for vLLM LLM inference server
version: 1.0.0
appVersion: "v0.11.0"
keywords:
  - llm
  - inference
  - vllm
  - gpu
home: https://docs.vllm.ai
sources:
  - https://github.com/vllm-project/vllm
  - https://github.com/vllm-project/production-stack
maintainers:
  - name: homelab
dependencies:
  - name: vllm-stack
    version: "0.1.0"
    repository: "https://vllm-project.github.io/production-stack"
annotations:
  org.opencontainers.image.source: "https://github.com/jomcgi/homelab"
  org.opencontainers.image.url: "https://github.com/jomcgi/homelab"
  org.opencontainers.image.licenses: "MPL-2.0"
