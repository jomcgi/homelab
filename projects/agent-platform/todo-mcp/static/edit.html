<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO - Edit</title>
    <link rel="icon" type="image/svg+xml" href="/favicon-admin.svg" />
    <style>
      :root {
        --base: #eff1f5;
        --text: #4c4f69;
        --subtext: #6c6f85;
        --surface: #ccd0da;
        --muted: #bcc0cc;
        --green: #40a02b;
        --red: #d20f39;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        background: var(--base);
        color: var(--text);
        font-family: monospace;
        padding: 2rem;
        max-width: 600px;
        margin: 0 auto;
      }
      header {
        border-bottom: 2px solid var(--text);
        padding-bottom: 1rem;
        margin-bottom: 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: normal;
        letter-spacing: 0.2em;
      }
      .status {
        font-size: 0.85rem;
        color: var(--subtext);
      }
      .status.saving {
        color: var(--muted);
      }
      .status.saved {
        color: var(--green);
      }
      .status.error {
        color: var(--red);
      }
      section {
        margin-bottom: 2.5rem;
      }
      h2 {
        font-size: 1rem;
        font-weight: normal;
        letter-spacing: 0.1em;
        color: var(--subtext);
        margin-bottom: 1rem;
      }
      .item {
        padding: 0.75rem 0;
        border-bottom: 1px solid var(--surface);
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      input[type="text"] {
        flex: 1;
        font-family: monospace;
        font-size: 1.1rem;
        padding: 0.5rem;
        border: 1px solid var(--surface);
        background: white;
        color: var(--text);
      }
      input[type="text"]:focus {
        outline: none;
        border-color: var(--text);
      }
      input[type="checkbox"] {
        width: 1.2rem;
        height: 1.2rem;
        cursor: pointer;
      }
      .actions {
        margin-top: 2rem;
        display: flex;
        gap: 1rem;
      }
      button {
        font-family: monospace;
        font-size: 0.9rem;
        padding: 0.5rem 1rem;
        border: 1px solid var(--surface);
        background: white;
        color: var(--text);
        cursor: pointer;
      }
      button:hover {
        border-color: var(--text);
      }
      button.danger {
        color: var(--red);
        border-color: var(--red);
      }
      button.danger:hover {
        background: var(--red);
        color: white;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>TODO</h1>
      <span id="status" class="status"></span>
    </header>

    <section>
      <h2>WEEKLY</h2>
      <div class="item">
        <input type="checkbox" id="weekly-done" />
        <input
          type="text"
          id="weekly-task"
          placeholder="The one thing that matters this week..."
        />
      </div>
    </section>

    <section>
      <h2>DAILY</h2>
      <div class="item">
        <input type="checkbox" id="daily-0-done" />
        <input type="text" id="daily-0-task" placeholder="Top priority..." />
      </div>
      <div class="item">
        <input type="checkbox" id="daily-1-done" />
        <input type="text" id="daily-1-task" placeholder="Second priority..." />
      </div>
      <div class="item">
        <input type="checkbox" id="daily-2-done" />
        <input type="text" id="daily-2-task" placeholder="Third priority..." />
      </div>
    </section>

    <div class="actions">
      <button id="reset-daily" class="danger">Reset Daily</button>
      <button id="reset-weekly" class="danger">Reset Weekly</button>
    </div>

    <script>
      let saveTimeout = null;
      const statusEl = document.getElementById("status");

      const setStatus = (text, className) => {
        statusEl.textContent = text;
        statusEl.className = "status " + className;
      };

      const loadData = async () => {
        try {
          const res = await fetch("/api/todo");
          if (!res.ok) throw new Error(res.status);
          const data = await res.json();

          document.getElementById("weekly-task").value =
            data.weekly?.task || "";
          document.getElementById("weekly-done").checked =
            data.weekly?.done || false;

          for (let i = 0; i < 3; i++) {
            const task = data.daily?.[i] || {};
            document.getElementById(`daily-${i}-task`).value = task.task || "";
            document.getElementById(`daily-${i}-done`).checked =
              task.done || false;
          }
        } catch (e) {
          setStatus("Failed to load", "error");
        }
      };

      const saveData = async () => {
        setStatus("Saving...", "saving");

        const data = {
          weekly: {
            task: document.getElementById("weekly-task").value,
            done: document.getElementById("weekly-done").checked,
          },
          daily: [0, 1, 2].map((i) => ({
            task: document.getElementById(`daily-${i}-task`).value,
            done: document.getElementById(`daily-${i}-done`).checked,
          })),
        };

        try {
          const res = await fetch("/api/todo", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });
          if (!res.ok) throw new Error(res.status);
          setStatus("Saved", "saved");
        } catch (e) {
          setStatus("Error saving", "error");
        }
      };

      const debouncedSave = () => {
        if (saveTimeout) clearTimeout(saveTimeout);
        saveTimeout = setTimeout(saveData, 500);
      };

      // Attach listeners to all inputs
      document.querySelectorAll("input").forEach((input) => {
        input.addEventListener("input", debouncedSave);
        input.addEventListener("change", debouncedSave);
      });

      // Reset buttons
      document
        .getElementById("reset-daily")
        .addEventListener("click", async () => {
          if (!confirm("Archive today and clear daily tasks?")) return;
          try {
            await fetch("/api/reset/daily", { method: "POST" });
            loadData();
            setStatus("Daily reset", "saved");
          } catch (e) {
            setStatus("Reset failed", "error");
          }
        });

      document
        .getElementById("reset-weekly")
        .addEventListener("click", async () => {
          if (!confirm("Archive today and clear ALL tasks?")) return;
          try {
            await fetch("/api/reset/weekly", { method: "POST" });
            loadData();
            setStatus("Weekly reset", "saved");
          } catch (e) {
            setStatus("Reset failed", "error");
          }
        });

      loadData();
    </script>
  </body>
</html>
