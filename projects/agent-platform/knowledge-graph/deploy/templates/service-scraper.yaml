{{- if .Values.scraper.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "knowledge-graph.fullname" . }}-scraper
  labels:
    {{- include "knowledge-graph.labels" . | nindent 4 }}
    app.kubernetes.io/component: scraper
spec:
  type: {{ .Values.scraper.service.type }}
  ports:
    - port: {{ .Values.scraper.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "knowledge-graph.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: scraper
{{- end }}
