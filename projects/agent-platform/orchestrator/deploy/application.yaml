apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-orchestrator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    path: projects/agent-platform/orchestrator/deploy
    targetRevision: HEAD
    helm:
      releaseName: agent-orchestrator
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-orchestrator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
