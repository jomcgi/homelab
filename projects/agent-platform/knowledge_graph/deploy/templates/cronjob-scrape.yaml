{{- if .Values.cronjob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "knowledge-graph.fullname" . }}-scrape
  labels:
    {{- include "knowledge-graph.labels" . | nindent 4 }}
    app.kubernetes.io/component: scraper
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  concurrencyPolicy: {{ .Values.cronjob.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.cronjob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronjob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.cronjob.backoffLimit }}
      activeDeadlineSeconds: {{ .Values.cronjob.activeDeadlineSeconds }}
      template:
        metadata:
          labels:
            {{- include "knowledge-graph.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: scraper
          annotations:
            linkerd.io/inject: disabled
        spec:
          {{- if .Values.imagePullSecret.enabled }}
          imagePullSecrets:
            - name: ghcr-imagepull-secret
          {{- end }}
          restartPolicy: OnFailure
          securityContext:
            # Known limitation: runs as root because aspect_rules_py venv writes
            # to the installation directory at runtime
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: scraper
              image: "{{ .Values.scraper.image.repository }}:{{ .Values.scraper.image.tag }}"
              imagePullPolicy: {{ .Values.scraper.image.pullPolicy }}
              args: ["scrape-all"]
              securityContext:
                readOnlyRootFilesystem: false
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              env:
                - name: HOME
                  value: /tmp
                - name: UV_CACHE_DIR
                  value: /tmp/.uv-cache
                - name: SCRAPER_SOURCES_YAML_PATH
                  value: /config/sources.yaml
                - name: SCRAPER_S3_ENDPOINT
                  value: {{ .Values.seaweedfs.endpoint | quote }}
                - name: SCRAPER_S3_BUCKET
                  value: {{ .Values.storage.bucket | quote }}
                {{- if .Values.notifications.slackWebhookUrl }}
                - name: SCRAPER_SLACK_WEBHOOK_URL
                  value: {{ .Values.notifications.slackWebhookUrl | quote }}
                - name: SCRAPER_SLACK_NOTIFY_MODE
                  value: "on_new_content"
                {{- end }}
              resources:
                {{- toYaml .Values.scraper.resources | nindent 16 }}
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: config
              configMap:
                name: {{ include "knowledge-graph.fullname" . }}-config
            - name: tmp
              emptyDir: {}
{{- end }}
