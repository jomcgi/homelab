{{- if and .Values.api.enabled (gt (int (.Values.api.replicas | default 1)) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "trips.fullname" . }}-api
  labels:
    {{- include "trips.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "trips.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
{{- end }}
