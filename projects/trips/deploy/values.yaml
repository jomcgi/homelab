# Production overrides for trips stack

# Enable GHCR image pull secret for private images
imagePullSecret:
  enabled: true

api:
  enabled: true
  # HA: 2 replicas with anti-affinity and PDB
  replicas: 2
  image:
    repository: ghcr.io/jomcgi/homelab/services/trips_api
    tag: main # Use branch tag from CI
  podAnnotations:
    instrumentation.opentelemetry.io/inject-python: "python"
