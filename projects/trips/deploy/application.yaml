apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trips
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: yukon-tracker
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    path: projects/trips/chart
    targetRevision: HEAD
    helm:
      releaseName: trips
      valueFiles:
        - values.yaml
        - ../deploy/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: trips
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
