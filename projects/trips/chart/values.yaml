extraLabels:
  app.kubernetes.io/part-of: yukon-tracker

# Trips application stack
# Includes: imgproxy, nginx routing, API server

# Image pull secret for private GHCR registry
imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

# Service account (required by homelab-library)
serviceAccount:
  create: false

# Cross-namespace service URLs
seaweedfs:
  endpoint: http://seaweedfs-s3.seaweedfs.svc.cluster.local:8333

nats:
  url: nats://nats.nats.svc.cluster.local:4222

# imgproxy configuration
imgproxy:
  enabled: true
  replicas: 2
  containerPort: 8080
  service:
    type: ClusterIP
    port: 8080
  image:
    repository: darthsim/imgproxy
    tag: "v3.25.0"
    pullPolicy: IfNotPresent
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  env:
    - name: IMGPROXY_USE_S3
      value: "true"
    - name: IMGPROXY_S3_ENDPOINT
      value: "http://seaweedfs-s3.seaweedfs.svc.cluster.local:8333"
    - name: IMGPROXY_S3_REGION
      value: "us-east-1"
    - name: AWS_ACCESS_KEY_ID
      value: "anonymous"
    - name: AWS_SECRET_ACCESS_KEY
      value: "anonymous"
    - name: IMGPROXY_QUALITY
      value: "90"
    - name: IMGPROXY_FORMAT_QUALITY
      value: "webp=92,avif=90,jpeg=90"
    - name: IMGPROXY_ENABLE_WEBP_DETECTION
      value: "true"
    - name: IMGPROXY_ENFORCE_WEBP
      value: "false"
    - name: IMGPROXY_CONCURRENCY
      value: "4"
    - name: IMGPROXY_MAX_SRC_RESOLUTION
      value: "50"
    - name: IMGPROXY_STRIP_METADATA
      value: "true"
    - name: IMGPROXY_STRIP_COLOR_PROFILE
      value: "false"
    - name: IMGPROXY_ALLOW_INSECURE_URLS
      value: "true"
  resources:
    requests:
      cpu: 10m
      memory: 75Mi
    limits:
      cpu: 10m
      memory: 75Mi

# nginx routing configuration
nginx:
  enabled: true
  replicas: 1
  containerPort: 8080
  service:
    type: ClusterIP
    port: 80
  image:
    repository: nginx
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 10
    readiness:
      path: /health
      initialDelaySeconds: 2
      periodSeconds: 5
  resources:
    requests:
      cpu: 5m
      memory: 16Mi
    limits:
      cpu: 5m
      memory: 16Mi

# API server configuration
api:
  enabled: true
  # Number of replicas (2+ enables anti-affinity and PDB)
  replicas: 1
  containerPort: 8000
  service:
    type: ClusterIP
    port: 8000
  # CORS allowed origins (comma-separated)
  corsOrigins: "https://trips.jomcgi.dev,http://localhost:5173,http://localhost:3000"
  image:
    repository: ghcr.io/jomcgi/homelab/projects/trips/backend
    tag: "latest"
    pullPolicy: Always
  # Known limitation: runs as root because aspect_rules_py venv writes to the installation directory at runtime
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 5
  resources:
    requests:
      cpu: 10m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 256Mi
  # Upload API authentication (from 1Password secret)
  auth:
    secretName: trips-api-key
    secretKey: credential

# S3 bucket for images
bucket: trips
