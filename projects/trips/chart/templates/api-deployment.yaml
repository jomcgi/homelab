{{- if .Values.api.enabled }}
{{- $_ := set .Values.api "podAnnotations" (merge (dict "config.linkerd.io/opaque-ports" "4222") (.Values.api.podAnnotations | default dict)) }}
{{- $_ := set .Values.api "env" (list
  (dict "name" "HOME" "value" "/tmp")
  (dict "name" "UV_CACHE_DIR" "value" "/tmp/.uv-cache")
  (dict "name" "NATS_URL" "value" .Values.nats.url)
  (dict "name" "S3_ENDPOINT" "value" .Values.seaweedfs.endpoint)
  (dict "name" "S3_BUCKET" "value" .Values.bucket)
  (dict "name" "TRIP_API_KEY" "valueFrom" (dict "secretKeyRef" (dict "name" .Values.api.auth.secretName "key" .Values.api.auth.secretKey "optional" true)))
  (dict "name" "CORS_ORIGINS" "value" .Values.api.corsOrigins)
) }}
{{- if gt (int (.Values.api.replicas | default 1)) 1 }}
{{- $antiAffinity := dict "podAntiAffinity" (dict "preferredDuringSchedulingIgnoredDuringExecution" (list (dict "weight" 100 "podAffinityTerm" (dict "labelSelector" (dict "matchLabels" (fromYaml (include "homelab.componentSelectorLabels" (dict "context" . "component" "api")))) "topologyKey" "kubernetes.io/hostname")))) }}
{{- $_ := set .Values "affinity" $antiAffinity }}
{{- end }}
{{- include "homelab.deployment" (dict "context" . "component" "api") }}
{{- end }}
