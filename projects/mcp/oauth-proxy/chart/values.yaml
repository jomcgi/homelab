# mcp-oauth-proxy configuration
# OAuth 2.1 proxy that authenticates MCP clients via Google OIDC
# and proxies requests to Context Forge with X-Forwarded-User headers.

image:
  repository: ghcr.io/obot-platform/mcp-oauth-proxy
  tag: "latest"
  pullPolicy: IfNotPresent

# Non-secret environment variables
config:
  # Google OIDC authorize endpoint
  OAUTH_AUTHORIZE_URL: "https://accounts.google.com"
  # OAuth scopes to request from Google
  SCOPES_SUPPORTED: "openid,email,profile"
  # Upstream MCP server URL (Context Forge ClusterIP)
  MCP_SERVER_URL: ""

# 1Password secret — provides OAUTH_CLIENT_ID, OAUTH_CLIENT_SECRET, ENCRYPTION_KEY
secret:
  name: mcp-oauth-proxy
  itemPath: ""

# PostgreSQL sidecar — replaces SQLite (upstream binary lacks CGO)
postgres:
  image:
    repository: postgres
    tag: "17-alpine"
  user: "mcp"
  database: "mcp_oauth"
  dsn: "postgres://mcp@localhost:5432/mcp_oauth?sslmode=disable"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsUser: 65532
  runAsGroup: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

networkPolicy:
  enabled: true
  gateway:
    podLabel: context-forge-gateway-mcp-stack-mcpgateway
