# ── Context Forge Gateway ──────────────────────────────────────────────────
mcp-stack:
  mcpContextForge:
    config:
      PLATFORM_ADMIN_EMAIL: "admin@jomcgi.dev"
      MCPGATEWAY_UI_ENABLED: "true"
    probes:
      startup:
        type: exec
        command: ["sh", "-c", "sleep 10"]
        timeoutSeconds: 15
        periodSeconds: 10
        failureThreshold: 18
      liveness:
        type: http
        path: /health
        port: 4444
        initialDelaySeconds: 60
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 5
    resources:
      requests:
        cpu: 50m
        memory: 1Gi
      limits:
        cpu: 200m
        memory: 1Gi
  migration:
    enabled: false
  postgres:
    persistence:
      storageClassName: longhorn

secret:
  itemPath: "vaults/k8s-homelab/items/context-forge"
