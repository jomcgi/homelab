{{- if .Values.networkPolicy.enabled }}
# ── Context Forge ingress (cross-namespace) ─────────────────────────────────
# Controls which namespaces can reach the gateway (MCP servers, sandboxes, OAuth proxy).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-ingress
  labels:
    {{- include "context-forge.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-mcp-stack-mcpgateway
  policyTypes:
    - Ingress
  ingress:
    {{- range .Values.networkPolicy.allowedNamespaces }}
    # {{ . }} namespace → Context Forge
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8000
    {{- end }}
    # OAuth Proxy → Context Forge (same namespace)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mcp-oauth-proxy
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8000
{{- end }}
