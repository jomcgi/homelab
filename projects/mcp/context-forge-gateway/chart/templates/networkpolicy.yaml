{{- if .Values.networkPolicy.enabled }}
# ── Default deny ────────────────────────────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  labels:
    {{- include "context-forge.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

# ── Allow DNS ───────────────────────────────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  labels:
    {{- include "context-forge.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Linkerd control plane (identity + destination)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: linkerd
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8086

# ── Context Forge internal traffic ──────────────────────────────────────────
# mcpgateway ↔ postgres ↔ redis ↔ migration (all mcp-stack components).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-internal
  labels:
    {{- include "context-forge.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - mcpcontextforge
          - mcp-stack-mcpcontextforge
          - mcp-stack-postgres
          - postgres
          - mcp-stack-redis
          - redis
          - mcp-stack-migration
          - agent-platform-mcp-stack
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - mcpcontextforge
                  - mcp-stack-mcpcontextforge
                  - mcp-stack-postgres
                  - postgres
                  - mcp-stack-redis
                  - redis
                  - mcp-stack-migration
                  - agent-platform-mcp-stack
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - mcpcontextforge
                  - mcp-stack-mcpcontextforge
                  - mcp-stack-postgres
                  - postgres
                  - mcp-stack-redis
                  - redis
                  - mcp-stack-migration
                  - agent-platform-mcp-stack

# ── Context Forge ingress (cross-namespace) ─────────────────────────────────
# MCP servers (registration + tool calls), sandbox pods, and OAuth proxy.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-ingress
  labels:
    {{- include "context-forge.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - mcpcontextforge
          - mcp-stack-mcpcontextforge
  policyTypes:
    - Ingress
  ingress:
    {{- range .Values.networkPolicy.allowedNamespaces }}
    # {{ . }} namespace → Context Forge
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8000
    {{- end }}
    # OAuth Proxy → Context Forge (same namespace)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mcp-oauth-proxy
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8000
{{- end }}
