{{- if .Values.oauthTest.enabled }}
# Temporary HTTPRoute for validating Cloudflare Managed OAuth (ADR 011).
# Routes mcp-test.jomcgi.dev directly to Context Forge, bypassing
# mcp-oauth-proxy. CF Access handles auth at the edge.
# Remove after Phase 0 validation is complete.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "context-forge.fullname" . }}-oauth-test
  labels:
    {{- include "context-forge.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.oauthTest.gatewayRef.name }}
      namespace: {{ .Values.oauthTest.gatewayRef.namespace }}
  hostnames:
    - {{ .Values.oauthTest.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
      backendRefs:
        - name: context-forge-gateway-mcp-stack-mcpgateway
          port: 80
{{- end }}
