apiVersion: v2
name: context-forge
description: MCP gateway aggregating observability and infrastructure tools
type: application
version: 3.0.0
appVersion: "1.0.0-RC1"
annotations:
  org.opencontainers.image.source: "https://github.com/jomcgi/homelab"
  org.opencontainers.image.url: "https://github.com/jomcgi/homelab"
  org.opencontainers.image.licenses: "MPL-2.0"
dependencies:
  # Upstream IBM mcp-stack chart, mirrored to our GHCR.
  # To update: clone the desired tag, package, and push:
  #   git clone --depth 1 --branch <tag> https://github.com/IBM/mcp-context-forge /tmp/cf
  #   helm package /tmp/cf/charts/mcp-stack
  #   echo $(gh auth token) | helm registry login ghcr.io -u jomcgi --password-stdin
  #   helm push mcp-stack-<version>.tgz oci://ghcr.io/jomcgi/homelab/charts
  # Then update the version below and run: helm dependency update charts/context-forge/
  # Switch to oci://ghcr.io/ibm/mcp-context-forge when IBM publishes 1.0.0.
  - name: mcp-stack
    repository: "oci://ghcr.io/jomcgi/homelab/charts"
    version: "1.0.0-RC-1"
  - name: homelab-library
    version: "0.4.0"
    repository: "file://../../../shared/helm/homelab-library/chart"
