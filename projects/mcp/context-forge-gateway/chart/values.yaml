# Context Forge MCP Gateway
# Wraps upstream IBM mcp-stack chart with environment-specific config.

mcp-stack:
  mcpContextForge:
    image:
      repository: ghcr.io/ibm/mcp-context-forge
      tag: "v1.0.0-RC1"
      pullPolicy: IfNotPresent
    replicaCount: 1
    hpa:
      enabled: false
    ingress:
      enabled: false
    config:
      GUNICORN_WORKERS: "2"
      MCPGATEWAY_UI_ENABLED: "false"
      MCPGATEWAY_A2A_ENABLED: "false"
      LLMCHAT_ENABLED: "false"
      MCPGATEWAY_CATALOG_ENABLED: "false"
      MCPGATEWAY_DIRECT_PROXY_ENABLED: "false"
      MCPGATEWAY_BULK_IMPORT_ENABLED: "false"
    secret:
      AUTH_REQUIRED: "true"
      # JWT auth required for in-cluster registration jobs (charts/mcp-servers registration-job.yaml)
      MCP_CLIENT_AUTH_ENABLED: "true"
      MCP_REQUIRE_AUTH: "false"
      # mcp-oauth-proxy handles auth and injects X-Forwarded-User — see ADR 006
      TRUST_PROXY_AUTH: "true"
      PROXY_USER_HEADER: "X-Forwarded-User"
    extraEnvFrom:
      - secretRef:
          name: context-forge
    metrics:
      serviceMonitor:
        enabled: false # Requires prometheus-operator CRDs
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 512Mi

  postgres:
    persistence:
      storageClassName: ""
      size: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # Pin migration image to match the gateway — upstream defaults to :latest
  # which can apply migrations the pinned gateway version doesn't understand.
  migration:
    image:
      repository: ghcr.io/ibm/mcp-context-forge
      tag: "v1.0.0-RC1"
      pullPolicy: IfNotPresent

  redis:
    enabled: true
    resources:
      requests:
        cpu: 25m
        memory: 16Mi
      limits:
        cpu: 100m
        memory: 128Mi

  # Disable components we don't need
  pgadmin:
    enabled: false
  redisCommander:
    enabled: false
  minio:
    enabled: false
  mcpFastTimeServer:
    enabled: false

# 1Password secret — provides JWT_SECRET_KEY, AUTH_ENCRYPTION_SECRET, PLATFORM_ADMIN_EMAIL
secret:
  name: context-forge
  itemPath: ""

# NetworkPolicies disabled — Linkerd mTLS arrives on port 4143, not the
# app port, so K8s NetworkPolicies silently drop meshed traffic.
# Context Forge enforces auth at the application layer instead.
networkPolicy:
  enabled: false

# Temporary test route for Cloudflare Managed OAuth validation (ADR 011).
# Enable in deploy/values.yaml to create an HTTPRoute for mcp-test.jomcgi.dev.
oauthTest:
  enabled: false
  hostname: ""
  gatewayRef:
    name: cloudflare-ingress
    namespace: envoy-gateway-system
