contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - bash
    - ca-certificates-bundle
    - git
    - python-3.12
    - tzdata

archs:
  - x86_64
  - aarch64

accounts:
  groups:
    - groupname: vault
      gid: 65532
  users:
    - username: vault
      uid: 65532
      gid: 65532
  run-as: 65532

environment:
  TZ: Europe/Dublin
  HOME: /home/vault
  GIT_SSH_COMMAND: ssh -o StrictHostKeyChecking=no

paths:
  - path: /home/vault
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /home/vault/.ssh
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /data/vault
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

entrypoint:
  command: python3 -m vault_mcp.app.main
