apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "obsidian-vault.fullname" . }}
  labels:
    {{- include "obsidian-vault.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate  # Required for RWO PVC - can't attach to multiple pods
  selector:
    matchLabels:
      {{- include "obsidian-vault.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "obsidian-vault.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "obsidian-vault.fullname" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        {{- if .Values.headlessSync.enabled }}
        - name: headless-sync
          image: "{{ .Values.headlessSync.image.repository }}:{{ .Values.headlessSync.image.tag }}"
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command:
            - sh
            - -c
            - |
              set -e
              npm config set prefix "$HOME/.npm-global"
              export PATH="$HOME/.npm-global/bin:$PATH"
              npm install -g obsidian-headless
              ob login --email "$OBSIDIAN_EMAIL" --password "$OBSIDIAN_PASSWORD"
              ob sync-setup --vault "$VAULT_NAME" --path /vault --password "$OBSIDIAN_PASSWORD"
              cd /vault
              exec ob sync --continuous
          env:
            - name: HOME
              value: /home/vault
            - name: VAULT_NAME
              value: {{ .Values.headlessSync.vaultName | quote }}
            - name: OBSIDIAN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.obsidian.name }}
                  key: email
            - name: OBSIDIAN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.obsidian.name }}
                  key: password
          volumeMounts:
            - name: vault
              mountPath: /vault
            - name: home
              mountPath: /home/vault
          resources:
            {{- toYaml .Values.resources.headlessSync | nindent 12 }}
        {{- end }}
        - name: git-sidecar
          image: "{{ .Values.gitSidecar.image.repository }}:{{ .Values.gitSidecar.image.tag }}"
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command:
            - /scripts/git-sidecar.sh
          env:
            - name: HOME
              value: /home/vault
            - name: GIT_REMOTE
              value: {{ .Values.gitSidecar.remote | quote }}
            - name: GIT_BRANCH
              value: {{ .Values.gitSidecar.branch | quote }}
            - name: DEBOUNCE_SECONDS
              value: {{ .Values.gitSidecar.debounceSeconds | quote }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.obsidian.name }}
                  key: GITHUB_TOKEN
          volumeMounts:
            - name: vault
              mountPath: /vault
            - name: home
              mountPath: /home/vault
            - name: git-sidecar-script
              mountPath: /scripts
              readOnly: true
          resources:
            {{- toYaml .Values.resources.gitSidecar | nindent 12 }}
        - name: vault-mcp
          image: "{{ .Values.vaultMcp.image.repository }}:{{ .Values.vaultMcp.image.tag }}"
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: mcp
              containerPort: {{ .Values.vaultMcp.port }}
          env:
            - name: VAULT_PATH
              value: /vault
            - name: PORT
              value: {{ .Values.vaultMcp.port | quote }}
          volumeMounts:
            - name: vault
              mountPath: /vault
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.vaultMcp.port }}
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.vaultMcp.port }}
            initialDelaySeconds: 5
          resources:
            {{- toYaml .Values.resources.vaultMcp | nindent 12 }}
      volumes:
        - name: vault
          persistentVolumeClaim:
            claimName: {{ include "obsidian-vault.fullname" . }}
        - name: home
          emptyDir: {}
        - name: git-sidecar-script
          configMap:
            name: {{ include "obsidian-vault.fullname" . }}-git-sidecar
            defaultMode: 0755
