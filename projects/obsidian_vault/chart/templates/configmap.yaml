apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "obsidian-vault.fullname" . }}-git-sidecar
  labels:
    {{- include "obsidian-vault.labels" . | nindent 4 }}
data:
  git-sidecar.sh: |
    #!/bin/sh
    set -e

    VAULT_PATH="${VAULT_PATH:-/vault}"
    REMOTE="${GIT_REMOTE}"
    BRANCH="${GIT_BRANCH:-main}"
    DEBOUNCE="${DEBOUNCE_SECONDS:-10}"
    LOCKFILE="$VAULT_PATH/.git/mcp.lock"

    cd "$VAULT_PATH"

    # Mark vault path as safe (fsGroup chown triggers git's dubious ownership check)
    git config --global --add safe.directory "$VAULT_PATH"
    git config --global user.email "vault-sidecar@homelab.local"
    git config --global user.name "vault-sidecar"

    # Configure HTTPS auth if GITHUB_TOKEN is provided
    if [ -n "$GITHUB_TOKEN" ]; then
        git config --global credential.helper store
        printf 'https://x-access-token:%s@github.com\n' "$GITHUB_TOKEN" > ~/.git-credentials
        chmod 600 ~/.git-credentials
    fi

    # Ensure .gitignore excludes non-vault data (fastembed model cache, etc.)
    if ! grep -q '^\.cache/' .gitignore 2>/dev/null; then
        echo '.cache/' >> .gitignore
    fi

    # Remove model cache from git index if previously tracked (prevents OOM on git add -A)
    if [ -d .git ] && git ls-files --error-unmatch .cache/ >/dev/null 2>&1; then
        git rm -r --cached .cache/
        git commit -m "sync: untrack model cache"
    fi

    # Initialize git repo if needed
    if [ ! -d .git ]; then
        git init
        if [ -n "$REMOTE" ]; then
            git remote add origin "$REMOTE"
            # Pull existing history if any
            git fetch origin "$BRANCH" 2>/dev/null && \
                git checkout -B "$BRANCH" "origin/$BRANCH" 2>/dev/null || \
                git checkout -b "$BRANCH"
        fi
        # Initial commit of any existing files
        git add -A
        git diff --cached --quiet || git commit -m "sync: initial vault state"
    fi

    echo "Git sidecar started. Watching $VAULT_PATH for changes..."

    while true; do
        sleep "$DEBOUNCE"

        # Skip if MCP server is mid-operation
        if [ -f "$LOCKFILE" ]; then
            continue
        fi

        # Check for uncommitted changes
        if ! git diff --quiet || ! git diff --cached --quiet || \
           [ -n "$(git ls-files --others --exclude-standard)" ]; then
            git add -A
            git commit -m "sync: external changes"

            if [ -n "$REMOTE" ]; then
                git push origin "$BRANCH" 2>/dev/null || \
                    (git pull --rebase origin "$BRANCH" && git push origin "$BRANCH")
            fi
        fi
    done
