apiVersion: v1
kind: Service
metadata:
  name: {{ include "obsidian-vault.fullname" . }}
  labels:
    {{- include "obsidian-vault.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.vaultMcp.port }}
      targetPort: mcp
      protocol: TCP
      name: mcp
  selector:
    {{- include "obsidian-vault.selectorLabels" . | nindent 4 }}
