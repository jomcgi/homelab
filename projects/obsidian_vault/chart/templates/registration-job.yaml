{{- if .Values.gateway.url }}
apiVersion: batch/v1
kind: Job
metadata:
  name: register-{{ include "obsidian-vault.fullname" . }}
  labels:
    {{- include "obsidian-vault.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      annotations:
        linkerd.io/inject: disabled
      labels:
        {{- include "obsidian-vault.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for gateway at {{ .Values.gateway.url }}/health..."
              until curl -sf "{{ .Values.gateway.url }}/health" > /dev/null 2>&1; do
                echo "Gateway not ready, retrying in 5s..."
                sleep 5
              done
              echo "Gateway is healthy."
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
      containers:
        - name: register
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e

              TOKEN=$(python3 -c "
              import jwt, time, os, uuid
              payload = {
                  'sub': 'admin@jomcgi.dev',
                  'iat': int(time.time()),
                  'exp': int(time.time()) + 300,
                  'jti': str(uuid.uuid4()),
                  'aud': 'mcpgateway-api',
                  'iss': 'mcpgateway',
                  'is_admin': True,
                  'teams': None,
              }
              print(jwt.encode(payload, os.environ.get('JWT_SECRET_KEY', ''), algorithm='HS256'))
              ")

              SERVER_NAME="{{ include "obsidian-vault.fullname" . }}"
              SERVER_URL="http://{{ include "obsidian-vault.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.vaultMcp.port }}/mcp"

              # Idempotent: skip registration if the server already exists.
              RESPONSE=$(curl -s -w "\n%{http_code}" "{{ .Values.gateway.url }}/gateways" \
                -H "Authorization: Bearer ${TOKEN}")
              HTTP_CODE=$(echo "$RESPONSE" | tail -1)
              BODY=$(echo "$RESPONSE" | sed '$d')

              if [ "$HTTP_CODE" != "200" ]; then
                echo "ERROR: GET /gateways returned HTTP ${HTTP_CODE}"
                echo "$BODY"
                exit 1
              fi

              EXISTING_ID=$(echo "$BODY" | python3 -c "import sys,json; gws=json.load(sys.stdin); print(next((g['id'] for g in gws if g['name']=='${SERVER_NAME}'),''))")

              if [ -n "${EXISTING_ID}" ]; then
                echo "${SERVER_NAME} already registered (${EXISTING_ID}), skipping."
              else
                echo "Registering ${SERVER_NAME}..."
                REG_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "{{ .Values.gateway.url }}/gateways" \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d '{
                    "name": "'"${SERVER_NAME}"'",
                    "url": "'"${SERVER_URL}"'",
                    "transport": "STREAMABLEHTTP"
                  }')
                REG_CODE=$(echo "$REG_RESPONSE" | tail -1)
                REG_BODY=$(echo "$REG_RESPONSE" | sed '$d')

                if [ "$REG_CODE" != "200" ] && [ "$REG_CODE" != "201" ]; then
                  echo "ERROR: POST /gateways returned HTTP ${REG_CODE}"
                  echo "$REG_BODY"
                  exit 1
                fi
                echo "$REG_BODY"
              fi

              echo "Registration complete."
          envFrom:
            - secretRef:
                name: {{ .Values.gateway.secret.name }}
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
{{- end }}
