headlessSync:
  enabled: false
  vaultName: ""
  image:
    repository: node
    tag: "22-alpine"

gitSidecar:
  image:
    repository: alpine/git
    tag: "latest"
  remote: ""
  branch: "main"
  debounceSeconds: 10

persistence:
  size: 5Gi
  storageClass: ""

secrets:
  obsidian:
    name: obsidian
    itemPath: ""

podSecurityContext:
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

resources:
  headlessSync:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "384Mi"
  gitSidecar:
    requests:
      memory: "128Mi"
      cpu: "10m"
    limits:
      memory: "1Gi"

podAnnotations: {}
