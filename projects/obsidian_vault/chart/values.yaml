headlessSync:
  image:
    repository: node
    tag: "22-alpine"

gitSidecar:
  image:
    repository: alpine/git
    tag: "latest"
  remote: ""
  branch: "main"
  debounceSeconds: 10

vaultMcp:
  image:
    repository: ghcr.io/jomcgi/homelab/obsidian-vault-mcp
    tag: "latest"
  port: 8000

persistence:
  size: 5Gi
  storageClass: ""

secrets:
  obsidian:
    name: obsidian-credentials
    itemPath: ""
  github:
    name: github-deploy-key
    itemPath: ""

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

resources:
  headlessSync:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
  gitSidecar:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "64Mi"
  vaultMcp:
    requests:
      memory: "64Mi"
      cpu: "20m"
    limits:
      memory: "128Mi"

podAnnotations: {}
