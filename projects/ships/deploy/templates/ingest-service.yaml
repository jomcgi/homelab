{{- if .Values.ingest.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "marine.fullname" . }}-ingest
  labels:
    {{- include "marine.ingest.labels" . | nindent 4 }}
spec:
  type: {{ .Values.ingest.service.type }}
  ports:
    - port: {{ .Values.ingest.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "marine.ingest.selectorLabels" . | nindent 4 }}
{{- end }}
