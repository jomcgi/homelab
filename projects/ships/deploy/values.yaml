# Development overrides for marine services

# Enable image pull secret for GHCR
imagePullSecret:
  enabled: true
# Configure pods to use the image pull secret
imagePullSecrets:
  - name: ghcr-imagepull-secret
# AIS Ingest component
ingest:
  image:
    repository: ghcr.io/jomcgi/homelab/projects/ships/ingest
    pullPolicy: Always
  # Pre-populate OTEL annotation to match Kyverno injection (prevents ArgoCD drift)
  podAnnotations:
    otel.injected-by: kyverno/inject-otel-env-vars
    instrumentation.opentelemetry.io/inject-python: "python"
# Ships API component
api:
  image:
    repository: ghcr.io/jomcgi/homelab/projects/ships/backend
    pullPolicy: Always
  resources:
    requests:
      cpu: 100m
      memory: 900Mi
    limits:
      cpu: 100m
      memory: 900Mi
  # Increased tolerance for liveness probe during NATS message catchup
  # The API may be unresponsive while processing large backlogs
  livenessProbe:
    initialDelaySeconds: 120
    periodSeconds: 15
    timeoutSeconds: 30
    failureThreshold: 10
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 30
    failureThreshold: 360
  # Pre-populate OTEL annotation to match Kyverno injection (prevents ArgoCD drift)
  podAnnotations:
    otel.injected-by: kyverno/inject-otel-env-vars
    instrumentation.opentelemetry.io/inject-python: "python"
frontend:
  image:
    repository: ghcr.io/jomcgi/homelab/projects/ships/frontend
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
    limits:
      cpu: 10m
      memory: 100Mi
  # Pre-populate OTEL annotation to match Kyverno injection (prevents ArgoCD drift)
  podAnnotations:
    otel.injected-by: kyverno/inject-otel-env-vars
    instrumentation.opentelemetry.io/inject-nodejs: "nodejs"
