{{- if .Values.ingest.enabled }}
{{- $_ := set .Values.ingest "podAnnotations" (merge (default dict .Values.ingest.podAnnotations) (dict "config.linkerd.io/opaque-ports" "4222")) }}
{{- $_ := set .Values.ingest "env" (list
  (dict "name" "HOME" "value" "/tmp")
  (dict "name" "UV_CACHE_DIR" "value" "/tmp/.uv-cache")
  (dict "name" "SSL_CERT_FILE" "value" "/etc/ssl/certs/ca-certificates.crt")
  (dict "name" "NATS_URL" "value" .Values.nats.url)
  (dict "name" "AISSTREAM_URL" "value" .Values.aisstream.url)
  (dict "name" "BOUNDING_BOX" "value" .Values.aisstream.boundingBox)
  (dict "name" "AISSTREAM_API_KEY" "valueFrom" (dict "secretKeyRef" (dict "name" "marine" "key" "ais-stream-api-key")))
) }}
{{- include "homelab.deployment" (dict "context" . "component" "ingest") }}
{{- end }}
