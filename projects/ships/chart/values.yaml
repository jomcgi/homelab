# Marine Services Chart
# Combined AIS ingestion and Ships API services

# Shared settings
nameOverride: ""
fullnameOverride: ""

# Image pull secrets (shared by all components)
imagePullSecrets: []

# Image pull secret configuration (OnePassword)
imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

# Secret configuration for AISStream API key
secret:
  type: onepassword
  onepassword:
    itemPath: "vaults/k8s-homelab/items/marine"
  manual:
    apiKey: ""

# Service account (shared)
serviceAccount:
  create: true
  annotations: {}
  name: ""

# NATS configuration (shared)
nats:
  url: nats://nats.nats.svc.cluster.local:4222

# AISStream configuration (for ingest)
aisstream:
  url: wss://stream.aisstream.io/v0/stream
  # Americas coverage - Pacific to Atlantic, equator to Arctic
  # Format: [[[lat_min, lon_min], [lat_max, lon_max]]]
  # South: -2.5, West: -173, North: 71.4, East: -32
  boundingBox: "[[[-2.455379, -173.009262], [71.414709, -32.0327]]]"

# Pod security context (shared)
# Known limitation: runs as root because aspect_rules_py venv writes
# to the installation directory at runtime
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

# Container security context (shared)
securityContext:
  # Note: readOnlyRootFilesystem disabled because aspect_rules_py
  # creates a virtualenv at runtime (by design)
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

# =============================================================================
# AIS Ingest Component
# Streams vessel position reports from AISStream.io to NATS
# =============================================================================
ingest:
  enabled: true

  image:
    repository: ghcr.io/jomcgi/homelab/projects/ships/ingest
    tag: "main"
    pullPolicy: IfNotPresent

  # Single replica - no need for HA for data ingestion
  replicas: 1

  containerPort: 8000

  # Service configuration for health endpoint
  service:
    type: ClusterIP
    port: 8000

  # Health probes
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 30
      failureThreshold: 3
    readiness:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 10

  # Resource limits
  # Increased for global AIS coverage (~300 msg/sec)
  resources:
    requests:
      cpu: 20m
      memory: 100Mi
    limits:
      cpu: 20m
      memory: 100Mi

  # Pod annotations
  podAnnotations: {}

# =============================================================================
# Ships API Component
# REST API + WebSocket for real-time vessel data
# =============================================================================
api:
  enabled: true

  image:
    repository: ghcr.io/jomcgi/homelab/projects/ships/backend
    tag: "main"
    pullPolicy: IfNotPresent

  # Single replica required for SQLite (single-writer lock)
  replicas: 1

  containerPort: 8000

  # Persistent storage for SQLite database
  persistence:
    size: 20Gi
    storageClassName: longhorn
    # Path where the database is stored
    mountPath: /data

  # Service configuration
  service:
    type: ClusterIP
    port: 8000

  # CORS configuration
  cors:
    origins: "http://localhost:3000"

  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 900Mi
    limits:
      cpu: 100m
      memory: 900Mi

  # Health probes
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 6
    readiness:
      path: /ready
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 10
      failureThreshold: 360

  # Static env vars (UV/Python needs writable directories)
  env:
    - name: HOME
      value: /tmp
    - name: UV_CACHE_DIR
      value: /tmp/.uv-cache

  # Pod annotations
  podAnnotations: {}

# =============================================================================
# Frontend Component
# Bun-based server serving MapLibre UI + proxying to API
# =============================================================================
frontend:
  enabled: true

  image:
    repository: ghcr.io/jomcgi/homelab/projects/ships/frontend
    tag: "main"
    pullPolicy: IfNotPresent

  # Single replica
  replicas: 1

  containerPort: 3000

  # Directory containing built frontend assets
  publicDir: /app/public/dist

  # Pod security context (overrides global - frontend runs as non-root)
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

  # Container security context
  securityContext:
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  # Health probes
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 6
    readiness:
      path: /ready
      initialDelaySeconds: 30
      periodSeconds: 5
      failureThreshold: 60

  # Service configuration
  service:
    type: ClusterIP
    port: 80

  # Resource limits
  # Note: Low memory since build happens during CI, not at runtime
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
    limits:
      cpu: 10m
      memory: 100Mi

  # Pod annotations
  podAnnotations: {}
