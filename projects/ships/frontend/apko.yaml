contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - bun
    - ca-certificates-bundle

archs:
  - x86_64
  - aarch64

# Run server directly - dist is pre-built during CI
cmd: bun run /app/server.ts

work-dir: /app

accounts:
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  groups:
    - groupname: nonroot
      gid: 65532
  run-as: 65532

paths:
  - path: /app
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /app/public
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

environment:
  PORT: "3000"
  PUBLIC_DIR: /app/public
