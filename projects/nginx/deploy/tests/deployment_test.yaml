suite: api-gateway deployment tests
templates:
  - deployment.yaml
tests:
  - it: should create a deployment with correct name
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-api-gateway

  - it: should set correct replica count from values
    set:
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should use correct nginx image
    set:
      nginx.image.repository: nginx
      nginx.image.tag: "1.27-alpine"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: nginx:1.27-alpine

  - it: should set security context for non-root
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault

  - it: should have nginx container security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  - it: should include collector sidecar when enabled
    set:
      clusterInfo.enabled: true
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 2
      - equal:
          path: spec.template.spec.containers[1].name
          value: collector

  - it: should exclude collector sidecar when disabled
    set:
      clusterInfo.enabled: false
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1

  - it: should set resource limits for nginx
    set:
      nginx.resources.limits.cpu: 200m
      nginx.resources.limits.memory: 128Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 200m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 128Mi

  - it: should have liveness and readiness probes
    asserts:
      - isNotEmpty:
          path: spec.template.spec.containers[0].livenessProbe
      - isNotEmpty:
          path: spec.template.spec.containers[0].readinessProbe
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health

  - it: should mount nginx config from configmap
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: nginx-config
            mountPath: /etc/nginx/nginx.conf
            subPath: nginx.conf

  - it: should include init container for collector
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: init-collector
