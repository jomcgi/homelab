apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "api-gateway.fullname" . }}-nginx
  labels:
    {{- include "api-gateway.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent"';

        access_log /dev/stdout main;

        sendfile on;
        keepalive_timeout 65;

        # Temp paths for non-root
        client_body_temp_path /tmp/client_temp;
        proxy_temp_path /tmp/proxy_temp;
        fastcgi_temp_path /tmp/fastcgi_temp;
        uwsgi_temp_path /tmp/uwsgi_temp;
        scgi_temp_path /tmp/scgi_temp;

        server {
            listen 8080;
            server_name _;

            # Health check
            location /health {
                access_log off;
                return 200 'ok';
                add_header Content-Type text/plain;
            }

            # CORS: Allow requests from jomcgi.dev subdomains and localhost for dev
            set $cors_origin "";
            if ($http_origin ~* "^https://([a-z0-9-]+\.)?jomcgi\.dev$") {
                set $cors_origin $http_origin;
            }
            if ($http_origin ~* "^http://localhost(:[0-9]+)?$") {
                set $cors_origin $http_origin;
            }

            # Cluster info endpoint - serve static JSON
            # CDN caching: fresh for 30s, serve stale up to 5min while revalidating
            # This ensures brief origin outages don't show UNREACHABLE to users
            location = /cluster-info {
                alias /data/status.json;
                default_type application/json;
                add_header Cache-Control "public, s-maxage={{ .Values.clusterInfo.cache.maxAge }}, stale-while-revalidate={{ .Values.clusterInfo.cache.staleWhileRevalidate }}" always;
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
                add_header Access-Control-Max-Age "86400" always;
            }

            # Legacy endpoint for backwards compatibility
            location = /status.json {
                alias /data/status.json;
                default_type application/json;
                add_header Cache-Control "public, s-maxage={{ .Values.clusterInfo.cache.maxAge }}, stale-while-revalidate={{ .Values.clusterInfo.cache.staleWhileRevalidate }}" always;
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
                add_header Access-Control-Max-Age "86400" always;
            }

            # Trips API - proxy to trips-nginx (keep /trips/ prefix)
            # Note: CORS is handled by trips-api FastAPI middleware
            location /trips/ {
                proxy_pass http://{{ .Values.backends.trips.host }}:{{ .Values.backends.trips.port }};
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # WebSocket support
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_read_timeout 86400;
            }

            # Stargazer API - proxy to stargazer-api (strip /stargazer prefix)
            # Backend expects /best, /locations, /health - not /stargazer/best
            location /stargazer/ {
                proxy_pass http://{{ .Values.backends.stargazer.host }}:{{ .Values.backends.stargazer.port }}/;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # Cache headers are set by stargazer-api
            }

            # Root - return API info
            location = / {
                default_type application/json;
                return 200 '{"service":"api-gateway","endpoints":["/cluster-info","/trips/","/stargazer/"]}';
            }

            # Catch-all 404
            location / {
                return 404 '{"error":"not found"}';
                default_type application/json;
            }
        }
    }
