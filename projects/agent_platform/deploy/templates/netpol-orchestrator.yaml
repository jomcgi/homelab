{{- if and .Values.networkPolicy.enabled (index .Values "agent-orchestrator" "enabled") }}
# Orchestrator ingress: Envoy Gateway (HTTPRoute) + sandbox callbacks.
# Orchestrator egress: NATS (job queue) + sandbox pods (job management).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-orchestrator-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: agent-orchestrator
  policyTypes:
    - Ingress
  ingress:
    {{- if (index .Values "agent-orchestrator" "httpRoute" "enabled") }}
    # Envoy Gateway namespace → orchestrator (HTTPRoute traffic)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ (index .Values "agent-orchestrator" "httpRoute" "gatewayRef" "namespace") | default "envoy-gateway-system" }}
      ports:
        - protocol: TCP
          port: {{ (index .Values "agent-orchestrator" "config" "httpPort") | default 8080 }}
    {{- end }}
    # Sandbox pods → orchestrator (job status callbacks)
    - from:
        - podSelector:
            matchLabels:
              agents.x-k8s.io/sandbox-template: {{ (index .Values "goose-sandboxes" "sandboxTemplate" "name") | default "goose-agent" }}
      ports:
        - protocol: TCP
          port: {{ (index .Values "agent-orchestrator" "config" "httpPort") | default 8080 }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-orchestrator-egress
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: agent-orchestrator
  policyTypes:
    - Egress
  egress:
    # Orchestrator → NATS (publish/subscribe jobs)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nats
      ports:
        - protocol: TCP
          port: 4222
    # Orchestrator → sandbox pods (create sandboxes via API server)
    # This goes through the Kubernetes API, not direct pod-to-pod.
    # Allow egress to the API server.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
{{- end }}
