{{- if and .Values.networkPolicy.enabled (index .Values "agent-platform-mcp-servers" "enabled") }}
# Shared MCP server ingress: Context Forge (proxied tool calls + registration)
# or sandbox pods (direct access when gateway disabled).
# Per-server egress is defined in each server's networkPolicy field in the
# agent-platform-mcp-servers subchart. This template only covers shared ingress
# and the common Context Forge registration egress.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-mcp-servers-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: mcp-server
  policyTypes:
    - Ingress
  ingress:
    {{- if (index .Values "context-forge" "enabled") }}
    # Context Forge → MCP servers (proxied tool calls + registration)
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/instance
                operator: In
                values:
                  - {{ .Release.Name }}
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - mcpcontextforge
                  - mcp-stack-mcpcontextforge
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 3000
    {{- end }}
    {{- if not (index .Values "context-forge" "enabled") }}
    # Sandbox → MCP servers directly (gateway disabled)
    - from:
        - podSelector:
            matchLabels:
              agents.x-k8s.io/sandbox-template: {{ (index .Values "goose-sandboxes" "sandboxTemplate" "name") | default "goose-agent" }}
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 3000
    {{- end }}
{{- if (index .Values "context-forge" "enabled") }}
---
# MCP servers → Context Forge (registration jobs).
# Common to all servers that register with the gateway.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-mcp-servers-registration-egress
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: mcp-server
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/instance
                operator: In
                values:
                  - {{ .Release.Name }}
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - mcpcontextforge
                  - mcp-stack-mcpcontextforge
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8000
{{- end }}
{{- end }}
