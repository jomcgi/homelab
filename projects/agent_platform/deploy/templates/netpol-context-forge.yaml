{{- if and .Values.networkPolicy.enabled (index .Values "context-forge" "enabled") }}
# Context Forge ingress: sandbox pods, MCP OAuth proxy, and registration jobs.
# Context Forge internal traffic (postgres, redis) is allowed within the release.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-context-forge-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/instance
        operator: In
        values:
          - {{ .Release.Name }}
      - key: app.kubernetes.io/name
        operator: In
        values:
          - mcpcontextforge
          - mcp-stack-mcpcontextforge
  policyTypes:
    - Ingress
  ingress:
    # Sandbox pods → Context Forge (MCP tool calls)
    - from:
        - podSelector:
            matchLabels:
              agents.x-k8s.io/sandbox-template: {{ (index .Values "goose-sandboxes" "sandboxTemplate" "name") | default "goose-agent" }}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8000
    {{- if (index .Values "mcp-oauth-proxy" "enabled") }}
    # MCP OAuth Proxy → Context Forge (authenticated proxy)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mcp-oauth-proxy
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8000
    {{- end }}
    # MCP server registration jobs → Context Forge
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8000
---
# Allow context-forge internal traffic (mcpgateway ↔ postgres ↔ redis).
# All mcp-stack pods share the same release instance label.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-context-forge-internal
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow intra-release traffic (postgres, redis, mcpgateway)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Release.Name }}
  egress:
    # Allow intra-release traffic
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
