{{- if and .Values.networkPolicy.enabled (index .Values "context-forge" "enabled") }}
# Context Forge ingress: sandbox pods, MCP OAuth proxy, and registration jobs.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-context-forge-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/instance
        operator: In
        values:
          - {{ .Release.Name }}
      - key: app.kubernetes.io/name
        operator: In
        values:
          - mcpcontextforge
          - mcp-stack-mcpcontextforge
  policyTypes:
    - Ingress
  ingress:
    # Sandbox pods → Context Forge (MCP tool calls)
    - from:
        - podSelector:
            matchLabels:
              agents.x-k8s.io/sandbox-template: {{ (index .Values "goose-sandboxes" "sandboxTemplate" "name") | default "goose-agent" }}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8000
    {{- if (index .Values "mcp-oauth-proxy" "enabled") }}
    # MCP OAuth Proxy → Context Forge (authenticated proxy)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mcp-oauth-proxy
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8000
    {{- end }}
    # MCP server registration jobs → Context Forge
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: mcp-server
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8000
---
# Context Forge internal traffic: mcpgateway ↔ postgres ↔ redis ↔ migration.
# These are sub-subcharts of mcp-stack; we match on known component names.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-context-forge-internal
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/instance
        operator: In
        values:
          - {{ .Release.Name }}
      - key: app.kubernetes.io/name
        operator: In
        values:
          - mcpcontextforge
          - mcp-stack-mcpcontextforge
          - mcp-stack-postgres
          - postgres
          - mcp-stack-redis
          - redis
          - mcp-stack-migration
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/instance
                operator: In
                values:
                  - {{ .Release.Name }}
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - mcpcontextforge
                  - mcp-stack-mcpcontextforge
                  - mcp-stack-postgres
                  - postgres
                  - mcp-stack-redis
                  - redis
                  - mcp-stack-migration
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/instance
                operator: In
                values:
                  - {{ .Release.Name }}
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - mcpcontextforge
                  - mcp-stack-mcpcontextforge
                  - mcp-stack-postgres
                  - postgres
                  - mcp-stack-redis
                  - redis
                  - mcp-stack-migration
{{- end }}
