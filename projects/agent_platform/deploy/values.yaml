# ── Agent Platform Umbrella Chart ─────────────────────────────────────────────
# Default values for the agent-platform umbrella chart.
# All image references and config defaults live here so the packaged chart is
# self-contained. Environment-specific overrides (secrets, storage, domains)
# belong in a separate values file alongside the ArgoCD Application.

# ── Subchart: context-forge ──────────────────────────────────────────────────
# MCP gateway aggregating observability and infrastructure tools.
# Wraps the upstream IBM mcp-stack chart.
context-forge:
  enabled: true
  mcp-stack:
    mcpContextForge:
      image:
        repository: ghcr.io/ibm/mcp-context-forge
        tag: "v1.0.0-RC1"
        pullPolicy: IfNotPresent
      replicaCount: 1
      hpa:
        enabled: false
      ingress:
        enabled: false
      config:
        GUNICORN_WORKERS: "2"
        MCPGATEWAY_UI_ENABLED: "false"
        MCPGATEWAY_A2A_ENABLED: "false"
        LLMCHAT_ENABLED: "false"
        MCPGATEWAY_CATALOG_ENABLED: "false"
        MCPGATEWAY_DIRECT_PROXY_ENABLED: "false"
        MCPGATEWAY_BULK_IMPORT_ENABLED: "false"
      secret:
        AUTH_REQUIRED: "true"
        MCP_CLIENT_AUTH_ENABLED: "true"
        MCP_REQUIRE_AUTH: "false"
        TRUST_PROXY_AUTH: "true"
        PROXY_USER_HEADER: "X-Forwarded-User"
      extraEnvFrom:
        - secretRef:
            name: context-forge
      metrics:
        serviceMonitor:
          enabled: false
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 200m
          memory: 512Mi
    postgres:
      persistence:
        storageClassName: ""
        size: 1Gi
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 512Mi
    migration:
      image:
        repository: ghcr.io/ibm/mcp-context-forge
        tag: "v1.0.0-RC1"
        pullPolicy: IfNotPresent
    redis:
      enabled: true
      resources:
        requests:
          cpu: 25m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 128Mi
    pgadmin:
      enabled: false
    redisCommander:
      enabled: false
    minio:
      enabled: false
    mcpFastTimeServer:
      enabled: false
  secret:
    name: context-forge
    itemPath: ""

# ── Subchart: mcp-oauth-proxy ────────────────────────────────────────────────
# OAuth 2.1 proxy authenticating MCP clients via Google OIDC (ADR 006).
mcp-oauth-proxy:
  enabled: true
  image:
    repository: ghcr.io/obot-platform/mcp-oauth-proxy
    tag: "latest"
    pullPolicy: IfNotPresent
  config:
    OAUTH_AUTHORIZE_URL: "https://accounts.google.com"
    SCOPES_SUPPORTED: "openid,email,profile"
    MCP_SERVER_URL: ""
  secret:
    name: mcp-oauth-proxy
    itemPath: ""
  postgres:
    image:
      repository: docker.io/postgres
      tag: "17-alpine"
    user: "mcp"
    database: "mcp_oauth"
    dsn: "postgres://mcp@localhost:5432/mcp_oauth?sslmode=disable"
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    runAsUser: 65532
    runAsGroup: 65532
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# ── Subchart: agent-platform-mcp-servers ─────────────────────────────────────
# Deploys MCP servers with optional protocol translation and gateway registration.
agent-platform-mcp-servers:
  enabled: true
  translate:
    image:
      repository: ghcr.io/ibm/mcp-context-forge
      tag: "v1.0.0-RC1"
      pullPolicy: IfNotPresent
  gateway:
    url: ""
    secret:
      name: context-forge-gateway
      itemPath: ""
  alertDefaults:
    evalWindow: "10m0s"
    frequency: "2m0s"
    matchType: "5"
    severity: "critical"
    channels: []
  imageUpdater:
    gitRepository: ""
    gitBranch: ""
    gitSecret: ""
    applicationName: ""
    writeBackTarget: ""
  servers: []

# ── Subchart: agent-orchestrator ─────────────────────────────────────────────
# Orchestrates Goose agent jobs via REST API backed by NATS JetStream.
# natsUrl and sandboxNamespace are auto-wired from release metadata when empty.
agent-orchestrator:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/jomcgi/homelab/services/agent-orchestrator
    tag: main
    pullPolicy: IfNotPresent
  imagePullSecret:
    enabled: false
    create: true
    onepassword:
      itemPath: ""
  serviceAccount:
    create: true
    annotations: {}
    name: ""
  podAnnotations: {}
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  config:
    natsUrl: ""
    sandboxNamespace: ""
    sandboxTemplate: "goose-agent"
    maxRetries: "2"
    maxConcurrent: "5"
    httpPort: "8080"
    jobInactivityTimeout: "10m"
    jobMaxDuration: "168h"
  httpRoute:
    enabled: false
    hostname: ""
    gatewayRef:
      name: ""
      namespace: ""
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── Subchart: goose-sandboxes ────────────────────────────────────────────────
# SandboxTemplate + WarmPool for ephemeral Goose agent pods.
goose-sandboxes:
  enabled: true
  namespace:
    limitRange:
      cpu:
        request: "1"
        limit: "4"
      memory:
        request: 2Gi
        limit: 4Gi
    resourceQuota:
      pods: "15"
      requestsCpu: "16"
      requestsMemory: 32Gi
  sandboxTemplate:
    name: goose-agent
    image:
      repository: ghcr.io/jomcgi/homelab/goose-agent
      tag: main
    env:
      gooseProvider: claude-code
      gooseModel: claude-sonnet-4-6
      contextForgeUrl: ""
      repoOwner: ""
      repoName: ""
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
      limits:
        cpu: "4"
        memory: 8Gi
    extraEnv: []
    workspace:
      storageClassName: ""
      size: 20Gi
  warmPool:
    name: goose-pool
    size: 1
  secrets:
    useOnePassword: false
    claudeAuth:
      onePasswordItem: ""
      vault: ""
      secretName: "claude-auth"
      key: "CLAUDE_AUTH_TOKEN"
    agentSecrets:
      onePasswordItem: ""
      vault: ""
      secretName: "agent-secrets"
    mcpTokens:
      onePasswordItem: ""
      vault: ""
      secretName: "goose-mcp-tokens"
      key: "CI_DEBUG_MCP_TOKEN"
  orchestratorNamespace: ""
  agents: {}

# ── Subchart: agent-sandbox ──────────────────────────────────────────────────
# SandboxTemplate CRDs and controller.
agent-sandbox:
  enabled: true
  installCRDs: true
  deployController: true
  controller:
    image:
      repository: registry.k8s.io/agent-sandbox/agent-sandbox-controller
      tag: "v0.1.1"
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      fsGroup: 65532

# ── Subchart: nats ───────────────────────────────────────────────────────────
# NATS JetStream — required by agent-orchestrator for job queuing.
nats:
  enabled: true
  config:
    cluster:
      enabled: false
    jetstream:
      enabled: true
      fileStore:
        enabled: true
        dir: /data
        pvc:
          enabled: true
          size: 10Gi
          storageClassName: ""
  statefulSet:
    replicas: 1
