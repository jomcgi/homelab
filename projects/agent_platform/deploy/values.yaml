# ── Homelab environment overrides for agent-platform ─────────────────────────
# Only environment-specific config lives here. All defaults and image pins
# are baked into the chart via values.yaml + Bazel images={} map.

# NetworkPolicies disabled — Linkerd mTLS arrives on port 4143, not app ports,
# so K8s NetworkPolicies silently drop meshed traffic. Each service enforces
# auth at the application layer instead.
networkPolicy:
  enabled: false

# ── MCP Servers ──────────────────────────────────────────────────────────────
# Servers removed — MCP tools are being consolidated into the monolith.
# Gateway config retained for sandbox registration.
agent-platform-mcp-servers:
  gateway:
    url: "http://context-forge-gateway-mcp-stack-mcpgateway.mcp.svc.cluster.local:80"
    secret:
      itemPath: "vaults/k8s-homelab/items/context-forge"
  alertDefaults:
    channels:
      - pagerduty-homelab
  servers: []

# ── Agent Orchestrator ───────────────────────────────────────────────────────
agent-orchestrator:
  config:
    openaiBaseUrl: "http://llama-cpp.llama-cpp.svc.cluster.local:8080"
    openaiModel: "qwen3.6-27b"
    sandboxTemplate: "goose-agent"
    jobInactivityTimeout: "30m"
  podAnnotations:
    linkerd.io/inject: enabled
  httpRoute:
    enabled: true
    hostname: agents.jomcgi.dev
    gatewayRef:
      name: cloudflare-ingress
      namespace: envoy-gateway-system
  agentsConfig:
    agents:
      - id: ci-debug
        label: CI Debug
        icon: "🔬"
        bg: "#dbeafe"
        fg: "#1e40af"
        desc: Analyse CI/build failures using BuildBuddy logs
        category: analyse
        recipePath: projects/agent_platform/goose_agent/image/recipes/ci-debug.yaml
      - id: research
        label: Research
        icon: "🔍"
        bg: "#ede9fe"
        fg: "#5b21b6"
        desc: Research topics across the codebase
        category: analyse
        recipePath: projects/agent_platform/goose_agent/image/recipes/research.yaml
      - id: code-fix
        label: Code Fix
        icon: "🔧"
        bg: "#fef3c7"
        fg: "#92400e"
        desc: Fix code issues, open PRs, edit files
        category: action
        recipePath: projects/agent_platform/goose_agent/image/recipes/code-fix.yaml
      - id: bazel
        label: Bazel
        icon: "⚙"
        bg: "#d1fae5"
        fg: "#065f46"
        desc: Bazel build and configuration tasks
        category: action
        recipePath: projects/agent_platform/goose_agent/image/recipes/bazel.yaml
      - id: feature
        label: Feature
        icon: "🚀"
        bg: "#fce7f3"
        fg: "#9d174d"
        desc: Implement new features end-to-end with tests and PR
        category: action
        recipePath: projects/agent_platform/goose_agent/image/recipes/feature.yaml
      - id: pr-review
        label: PR Review
        icon: "👁"
        bg: "#f0fdf4"
        fg: "#166534"
        desc: Review a pull request for correctness, style, and security
        category: validate
        recipePath: projects/agent_platform/goose_agent/image/recipes/pr-review.yaml
      - id: deep-plan
        label: Deep Plan
        icon: "🧠"
        bg: "#fef3c7"
        fg: "#92400e"
        desc: Analyse goals and propose optimal agent pipelines using Opus
        category: analyse
        recipePath: projects/agent_platform/goose_agent/image/recipes/deep-plan.yaml
      - id: qa-test
        label: QA / Tests
        icon: "🧪"
        bg: "#eff6ff"
        fg: "#1e3a5f"
        desc: Generate tests for existing code or verify test coverage
        category: validate
        recipePath: projects/agent_platform/goose_agent/image/recipes/qa-test.yaml
      - id: web-research
        label: Web Research
        icon: "🌐"
        bg: "#e0e7ff"
        fg: "#3730a3"
        desc: Research any topic using web sources and cross-referenced findings
        category: analyse
        recipePath: projects/agent_platform/goose_agent/image/recipes/web-research.yaml
      - id: critic
        label: Critic
        icon: "⚖"
        bg: "#fef9c3"
        fg: "#854d0e"
        desc: Review upstream agent output for gaps, errors, and unverified claims
        category: validate
        recipePath: projects/agent_platform/goose_agent/image/recipes/critic.yaml
      - id: trip-planner
        label: Trip Planner
        icon: "🗺"
        bg: "#ccfbf1"
        fg: "#134e4a"
        desc: Plan trips with day-by-day itineraries and logistics
        category: action
        recipePath: projects/agent_platform/goose_agent/image/recipes/trip-planner.yaml
      - id: idea-capture
        label: Idea Capture
        icon: "💡"
        bg: "#fce7f3"
        fg: "#831843"
        desc: Capture freeform ideas as structured markdown notes
        category: action
        recipePath: projects/agent_platform/goose_agent/image/recipes/idea-capture.yaml
      - id: claude-config
        label: Claude Config
        icon: "🛠"
        bg: "#f3e8ff"
        fg: "#6b21a8"
        desc: Improve Claude Code configuration and open PRs with changes
        category: action
        recipePath: projects/agent_platform/goose_agent/image/recipes/claude-config.yaml
      - id: adr-writer
        label: ADR Writer
        icon: "📋"
        bg: "#dbeafe"
        fg: "#1e3a8a"
        desc: Author Architecture Decision Records with proper template
        category: action
        recipePath: projects/agent_platform/goose_agent/image/recipes/adr-writer.yaml

# ── Goose Sandboxes ─────────────────────────────────────────────────────────
goose-sandboxes:
  namespace:
    resourceQuota:
      pods: "15"
  sandboxTemplate:
    gitClone:
      repoUrl: "https://github.com/jomcgi/homelab.git"
      repoName: homelab
    extraEnv:
      - name: CONTEXT_FORGE_URL
        value: "http://context-forge-gateway-mcp-stack-mcpgateway.mcp.svc.cluster.local:80/mcp"
      - name: RECIPES_DIR
        value: /workspace/homelab/projects/agent_platform/goose_agent/image/recipes
      - name: DEEP_PLAN_RECIPE
        value: /workspace/homelab/projects/agent_platform/goose_agent/image/recipes/deep-plan.yaml
      - name: BUILDBUDDY_API_KEY
        valueFrom:
          secretKeyRef:
            name: agent-secrets
            key: BUILDBUDDY_API_KEY
            optional: true
      - name: GOOSE_GLOBAL_HINTS
        value: /workspace/homelab/projects/agent_platform/goose_agent/.goosehints
      - name: GOOSE_CONTEXT_STRATEGY
        value: summarize
      - name: GOOSE_AUTO_COMPACT_THRESHOLD
        value: "0.8"
      - name: GOOSE_SUBAGENT_MAX_TURNS
        value: "15"
      - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
        value: "http://signoz-otel-collector.signoz.svc.cluster.local:4318"
      - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
        value: "http://signoz-otel-collector.signoz.svc.cluster.local:4318"
      - name: OTEL_EXPORTER_OTLP_LOGS_ENDPOINT
        value: "http://signoz-otel-collector.signoz.svc.cluster.local:4318"
      - name: OTEL_TRACES_EXPORTER
        value: "otlp"
      - name: OTEL_METRICS_EXPORTER
        value: "otlp"
      - name: OTEL_LOGS_EXPORTER
        value: "otlp"
      - name: OTEL_SERVICE_NAME
        value: "goose-agent"
      - name: OTEL_RESOURCE_ATTRIBUTES
        value: "service.namespace=agent-platform,deployment.environment=prod"
    workspace:
      storageClassName: longhorn
  secrets:
    useOnePassword: true
    claudeAuth:
      onePasswordItem: litellm-claude-auth
      vault: k8s-homelab
    agentSecrets:
      onePasswordItem: agent-secrets
      vault: k8s-homelab

# ── NATS ─────────────────────────────────────────────────────────────────────
nats:
  config:
    jetstream:
      fileStore:
        pvc:
          storageClassName: longhorn
