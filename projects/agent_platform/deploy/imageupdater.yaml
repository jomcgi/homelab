apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: agent-platform
  namespace: argocd
spec:
  applicationRefs:
    - images:
        - alias: agent-platform-chart
          commonUpdateSettings:
            updateStrategy: digest
            forceUpdate: false
          imageName: ghcr.io/jomcgi/homelab/projects/agent_platform/chart
          manifestTargets:
            helm:
              name: ""
              tag: spec.sources[0].targetRevision
      namePattern: agent-platform
  namespace: argocd
  writeBackConfig:
    method: git:secret:argocd/argocd-image-updater-token
    gitConfig:
      repository: https://github.com/jomcgi/homelab.git
      branch: main
      writeBackTarget: helmvalues:projects/agent_platform/deploy/application.yaml
