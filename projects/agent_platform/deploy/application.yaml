apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-platform
  namespace: argocd
spec:
  project: default
  sources:
    # Chart from OCI registry (pushed by CI via Bazel helm_push)
    - repoURL: ghcr.io/jomcgi/homelab/charts
      chart: agent-platform
      targetRevision: 0.32.0
      helm:
        releaseName: agent-platform
        valueFiles:
          - $values/projects/agent_platform/deploy/values.yaml
    # Git repo for environment-specific values
    - repoURL: https://github.com/jomcgi/homelab.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-platform
  # Ignore fields injected by Kyverno/Linkerd mutation policies.
  # IMPORTANT: Do NOT ignore the entire env array — that prevents ArgoCD from
  # syncing new env vars added by the Helm chart.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - .spec.template.metadata.annotations."otel.injected-by"
        - .spec.template.metadata.annotations."linkerd.io/injected-by"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
