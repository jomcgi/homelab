fullnameOverride: "llama-cpp"

image:
  tag: "server-cuda-b8643"

imagePullSecret:
  enabled: true

modelVolume:
  enabled: true
  reference: "ghcr.io/jomcgi/models/google/gemma-4-26b-a4b-it:unsloth-gguf-ud-q4-k-m"
  mountPath: "/model-image"

server:
  nGpuLayers: 999
  ctxSize: 65536
  flashAttn: "on"
  cacheTypeK: "f16"
  cacheTypeV: "q8_0"
  threads: 8
  jinja: true
  extraArgs:
    - "--batch-size"
    - "2048"
    - "--ubatch-size"
    - "512"
    - "--parallel"
    - "1"
    - "--metrics"
    - "--alias"
    - "gemma-4-26b-a4b"

nodeSelector:
  kubernetes.io/hostname: node-4

podAnnotations:
  linkerd.io/inject: disabled

resources:
  requests:
    cpu: 2
    memory: "4Gi"
    nvidia.com/gpu: 1
  limits:
    memory: "8Gi"
    nvidia.com/gpu: 1
