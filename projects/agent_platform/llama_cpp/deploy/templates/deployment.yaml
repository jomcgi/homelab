apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llama-cpp.fullname" . }}
  labels:
    {{- include "llama-cpp.labels" . | nindent 4 }}
spec:
  replicas: 1
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "llama-cpp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "llama-cpp.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.runtimeClassName }}
      runtimeClassName: {{ . }}
      {{- end }}
      {{- if .Values.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: ghcr-imagepull-secret
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: llama-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.server.modelPath }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              {{- if .Values.server.mmproj }}
              MMPROJ_ARG="--mmproj {{ .Values.server.mmproj }}"
              {{- else }}
              MMPROJ=$(find {{ .Values.modelVolume.mountPath }} -maxdepth 2 -name 'mmproj*.gguf' -type f 2>/dev/null | head -1)
              MMPROJ_ARG=""
              if [ -n "$MMPROJ" ]; then
                echo "Auto-discovered mmproj: $MMPROJ"
                MMPROJ_ARG="--mmproj $MMPROJ"
              fi
              {{- end }}
              exec /app/llama-server \
                --model {{ .Values.server.modelPath | quote }} \
                $MMPROJ_ARG \
                {{ include "llama-cpp.serverArgs" . | indent 16 | trim }}
          {{- else }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Auto-discover the GGUF model file (exclude mmproj).
              # For split GGUF, the first shard (-00001-of-) sorts first and
              # llama.cpp auto-discovers siblings.
              MODEL=$(find {{ .Values.modelVolume.mountPath }} -maxdepth 2 -name '*.gguf' ! -name 'mmproj*' -type f | sort | head -1)
              if [ -z "$MODEL" ]; then
                echo "ERROR: no .gguf file found under {{ .Values.modelVolume.mountPath }}" >&2
                exit 1
              fi
              echo "Auto-discovered model: $MODEL"
              {{- if .Values.server.mmproj }}
              MMPROJ_ARG="--mmproj {{ .Values.server.mmproj }}"
              {{- else }}
              MMPROJ=$(find {{ .Values.modelVolume.mountPath }} -maxdepth 2 -name 'mmproj*.gguf' -type f 2>/dev/null | head -1)
              MMPROJ_ARG=""
              if [ -n "$MMPROJ" ]; then
                echo "Auto-discovered mmproj: $MMPROJ"
                MMPROJ_ARG="--mmproj $MMPROJ"
              fi
              {{- end }}
              exec /app/llama-server \
                --model "$MODEL" \
                $MMPROJ_ARG \
                {{ include "llama-cpp.serverArgs" . | indent 16 | trim }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.modelVolume.enabled }}
            - name: model
              mountPath: {{ .Values.modelVolume.mountPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.server.chatTemplate }}
            - name: chat-template
              mountPath: /etc/llama-cpp
              readOnly: true
            {{- end }}
            - name: dshm
              mountPath: /dev/shm
      volumes:
        {{- if .Values.modelVolume.enabled }}
        - name: model
          image:
            reference: {{ .Values.modelVolume.reference }}
            pullPolicy: IfNotPresent
        {{- end }}
        {{- if .Values.server.chatTemplate }}
        - name: chat-template
          configMap:
            name: {{ include "llama-cpp.fullname" . }}-chat-template
        {{- end }}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "1Gi"
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}