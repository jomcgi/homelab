fullnameOverride: "inference"

backend: "vllm"

image:
  llamaCpp:
    tag: "server-cuda-b8643"
  vllm:
    tag: "v0.19.1"

imagePullSecret:
  enabled: true

modelVolume:
  enabled: true
  reference: "ghcr.io/jomcgi/models/qwen/qwen3.6-27b:lorbus-qwen3.6-27b-int4-autoround"
  mountPath: "/model-image"

vllm:
  maxModelLen: 16384
  gpuMemoryUtilization: 0.95
  dtype: "auto"
  extraArgs:
    - "--served-model-name"
    - "qwen3.6-27b"
    - "--enforce-eager"
    - "--enable-auto-tool-choice"
    - "--tool-call-parser"
    - "qwen3_coder"
    - "--reasoning-parser"
    - "qwen3"

# vLLM runs as root and needs writable fs for compiled kernels
podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

nodeSelector:
  kubernetes.io/hostname: node-4

podAnnotations:
  linkerd.io/inject: disabled
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"

resources:
  requests:
    cpu: 4
    memory: "24Gi"
    nvidia.com/gpu: 1
  limits:
    memory: "32Gi"
    nvidia.com/gpu: 1

embeddings:
  enabled: true
  image:
    tag: "server-cuda-b8643"
  modelVolume:
    enabled: true
    reference: "ghcr.io/jomcgi/models/voyageai/voyage-4-nano:jsonmartin-gguf-q8-0"
    mountPath: "/model-image"
  llamaCpp:
    nGpuLayers: 0
    ctxSize: 8192
    flashAttn: "off"
    cacheTypeK: "f16"
    cacheTypeV: "f16"
    threads: 4
    jinja: false
    extraArgs:
      - "--embedding"
      - "--alias"
      - "voyage-4-nano"
      - "--metrics"
  nodeSelector:
    kubernetes.io/hostname: node-4
  podAnnotations:
    linkerd.io/inject: disabled
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
  resources:
    requests:
      cpu: 2
      memory: "2Gi"
    limits:
      memory: "4Gi"
