backend: "llama-cpp"

image:
  llamaCpp:
    repository: ghcr.io/ggml-org/llama.cpp
    tag: server-cuda
    pullPolicy: IfNotPresent
  vllm:
    repository: vllm/vllm-openai
    tag: latest
    pullPolicy: IfNotPresent

fullnameOverride: ""

imagePullSecret:
  enabled: false
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

modelVolume:
  enabled: false
  reference: ""
  mountPath: "/model-image"

server:
  host: "0.0.0.0"
  port: 8080

llamaCpp:
  nGpuLayers: 99
  ctxSize: 32768
  flashAttn: "on"
  cacheTypeK: "q8_0"
  cacheTypeV: "q4_0"
  threads: 8
  jinja: true
  modelPath: ""
  mmproj: ""
  chatTemplate: ""
  extraArgs: []

vllm:
  maxModelLen: 32768
  gpuMemoryUtilization: 0.95
  dtype: "auto"
  quantization: ""
  tokenizer: ""
  extraArgs: []

runtimeClassName: nvidia

nodeSelector: {}

strategy:
  type: Recreate

podAnnotations: {}

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 180

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

resources:
  requests:
    cpu: 4
    memory: "32Gi"
    nvidia.com/gpu: 1
  limits:
    memory: "48Gi"
    nvidia.com/gpu: 1

embeddings:
  enabled: false
  image:
    repository: ghcr.io/ggml-org/llama.cpp
    tag: server-cuda
    pullPolicy: IfNotPresent
  modelVolume:
    enabled: false
    reference: ""
    mountPath: "/model-image"
  llamaCpp:
    nGpuLayers: 0
    ctxSize: 8192
    flashAttn: "off"
    cacheTypeK: "f16"
    cacheTypeV: "f16"
    threads: 4
    jinja: false
    extraArgs:
      - "--embedding"
  runtimeClassName: null
  nodeSelector: {}
  podAnnotations: {}
  resources:
    requests:
      cpu: 2
      memory: "2Gi"
    limits:
      memory: "4Gi"
