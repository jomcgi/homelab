{{- if eq .Values.backend "vllm" }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "inference.fullname" . }}-vllm-cache
  labels:
    {{- include "inference.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
{{- end }}
