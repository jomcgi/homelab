{{- if .Values.initContainer.enabled }}
{{- range $modelSpec := (index .Values "vllm-stack").servingEngineSpec.modelSpec }}
{{- if not $modelSpec.imageVolume }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-{{ $modelSpec.name }}-init-patch
  namespace: {{ $.Release.Namespace }}
data:
  patch.json: |
    [
      {
        "op": "add",
        "path": "/spec/template/spec/initContainers",
        "value": [{
          "name": "model-downloader",
          "image": "{{ $.Values.initContainer.image }}",
          "command": [
            "/bin/bash",
            "-c",
            "set -e\necho 'Installing hf_transfer for fast downloads...'\npip install --no-cache-dir 'huggingface_hub[hf_transfer]'\n\necho 'Checking if model already exists...'\nif [ -d \"/data/hub/models--${MODEL_ID//\\/--}\" ]; then\n  echo 'Model already downloaded, skipping...'\n  exit 0\nfi\n\necho \"Downloading model: $MODEL_ID\"\nexport HF_HUB_ENABLE_HF_TRANSFER=1\npython3 -c \"\nfrom huggingface_hub import snapshot_download\nimport os\n\nmodel_id = os.environ['MODEL_ID']\ncache_dir = '/data'\ntoken = os.environ.get('HF_TOKEN')\n\nprint(f'Downloading {model_id} to {cache_dir}...')\nsnapshot_download(\n    repo_id=model_id,\n    cache_dir=cache_dir,\n    token=token,\n    resume_download=True\n)\nprint('Download complete!')\n\""
          ],
          "env": [
            {"name": "MODEL_ID", "value": "{{ $modelSpec.modelURL }}"},
            {{- if $modelSpec.huggingFaceToken }}
            {"name": "HF_TOKEN", "valueFrom": {"secretKeyRef": {"name": "{{ $modelSpec.huggingFaceToken.secretName }}", "key": "{{ $modelSpec.huggingFaceToken.secretKey }}"}}},
            {{- end }}
            {"name": "HF_HOME", "value": "/data"}
          ],
          "volumeMounts": [{"name": "vllm-storage", "mountPath": "/data"}],
          "resources": {{ $.Values.initContainer.resources | toJson }}
        }]
      }
    ]
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $.Release.Name }}-{{ $modelSpec.name }}-init-patcher
  namespace: {{ $.Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      serviceAccountName: {{ $.Release.Name }}-patcher
      restartPolicy: OnFailure
      containers:
      - name: patcher
        image: "{{ .Values.patcher.image.repository }}:{{ .Values.patcher.image.tag }}"
        command:
        - /bin/bash
        - -c
        - |
          set -e
          DEPLOYMENT="{{ $.Release.Name }}-{{ $modelSpec.name }}-deployment-vllm"

          echo "Waiting for deployment $DEPLOYMENT to exist..."
          until kubectl get deployment $DEPLOYMENT -n {{ $.Release.Namespace }}; do
            sleep 2
          done

          echo "Patching deployment with init container..."
          kubectl patch deployment $DEPLOYMENT -n {{ $.Release.Namespace }} \
            --type=json \
            --patch-file=/patch/patch.json

          echo "Patch applied successfully!"
        volumeMounts:
        - name: patch
          mountPath: /patch
      volumes:
      - name: patch
        configMap:
          name: {{ $.Release.Name }}-{{ $modelSpec.name }}-init-patch
{{- end }}
{{- end }}
{{- end }}
