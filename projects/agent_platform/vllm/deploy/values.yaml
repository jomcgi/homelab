# Default values for vLLM wrapper chart
# These are minimal defaults; override in projects/agent_platform/vllm/deploy/values.yaml

# Secret configuration for HuggingFace token
secret:
  # Set to true to create the secret
  create: false
  # Type of secret: "onepassword" or "manual"
  type: "onepassword"
  onepassword:
    # 1Password item path (e.g., "op://vault/item/field")
    itemPath: ""
  manual:
    # Manually provided HuggingFace token (only used if type is "manual")
    hfToken: ""

# Image pull secret for private GHCR registry (used by image volumes)
imagePullSecret:
  enabled: false
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

# Init container for fast model downloads using hf_transfer
initContainer:
  enabled: false
  image: python:3.12-slim
  resources:
    requests:
      cpu: 2
      memory: 4Gi
    limits:
      cpu: 4
      memory: 8Gi

# kubectl image used by patcher jobs (init-container, image-volume)
patcher:
  image:
    repository: alpine/kubectl
    tag: "1.35.0"

vllm-stack:
  # Minimal defaults - see overlay values for production configuration
  servingEngineSpec:
    modelSpec: []
