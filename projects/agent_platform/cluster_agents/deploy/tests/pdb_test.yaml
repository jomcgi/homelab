suite: cluster-agents PodDisruptionBudget tests
templates:
  - pdb.yaml
tests:
  - it: should not render PDB when disabled (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: should render PDB when enabled
    set:
      podDisruptionBudget.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PodDisruptionBudget
      - isAPIVersion:
          of: policy/v1

  - it: should use chart fullname for PDB name
    set:
      podDisruptionBudget.enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cluster-agents

  - it: should use default minAvailable of 1
    set:
      podDisruptionBudget.enabled: true
    asserts:
      - equal:
          path: spec.minAvailable
          value: 1

  - it: should use configured minAvailable
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: 2
    asserts:
      - equal:
          path: spec.minAvailable
          value: 2

  - it: should use selector labels matching deployment
    set:
      podDisruptionBudget.enabled: true
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: cluster-agents
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: should include standard labels
    set:
      podDisruptionBudget.enabled: true
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: cluster-agents
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
