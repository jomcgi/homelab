suite: cluster-agents regression tests
tests:
  - it: service should render with ClusterIP type
    template: service.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 8080
      - equal:
          path: spec.ports[0].targetPort
          value: http
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: cluster-agents

  - it: serviceaccount should render when create is true (default)
    template: serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cluster-agents

  - it: serviceaccount should not render when create is false
    template: serviceaccount.yaml
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: rbac should render ClusterRole and ClusterRoleBinding when serviceAccount.create is true
    template: rbac.yaml
    asserts:
      - hasDocuments:
          count: 2

  - it: rbac ClusterRole should have read-only permissions
    template: rbac.yaml
    documentIndex: 0
    asserts:
      - isKind:
          of: ClusterRole
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["pods", "nodes", "events", "namespaces"]
            verbs: ["get", "list", "watch"]

  - it: rbac ClusterRoleBinding should reference correct serviceaccount
    template: rbac.yaml
    documentIndex: 1
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: subjects[0].name
          value: RELEASE-NAME-cluster-agents

  - it: rbac should not render when serviceAccount.create is false
    template: rbac.yaml
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0
