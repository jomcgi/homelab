suite: cluster-agents Deployment tests
templates:
  - deployment.yaml
tests:
  - it: should not set priorityClassName when empty (default)
    asserts:
      - notExists:
          path: spec.template.spec.priorityClassName

  - it: should set priorityClassName when configured
    set:
      priorityClassName: system-cluster-critical
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: system-cluster-critical

  - it: should set priorityClassName for any non-empty value
    set:
      priorityClassName: system-node-critical
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: system-node-critical

  - it: should use rolling update strategy with zero downtime
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate
      - equal:
          path: spec.strategy.rollingUpdate.maxSurge
          value: 1
      - equal:
          path: spec.strategy.rollingUpdate.maxUnavailable
          value: 0

  - it: should set correct selector labels
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: cluster-agents
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: should set pod template labels matching selector
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: cluster-agents
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: should run as non-root user
    asserts:
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 65532

  - it: should have liveness and readiness probes on /health
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health

  - it: should set Linkerd skip-inbound-ports annotation by default
    # Regression: cluster-agents namespace has Linkerd injection enabled (via Kyverno).
    # SigNoz OTel httpcheck runs from the signoz namespace (outside the mesh).
    # Without this annotation, Linkerd intercepts inbound port 8080 connections from
    # unmeshed clients and drops them, causing the health check alert to fire.
    # This annotation is now set by default in values.yaml to ensure the fix is always active.
    asserts:
      - equal:
          path: spec.template.metadata.annotations["config.linkerd.io/skip-inbound-ports"]
          value: "8080"
