replicaCount: 1

image:
  repository: ghcr.io/jomcgi/homelab/projects/agent_platform/cluster_agents
  tag: main
  pullPolicy: IfNotPresent

imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  config.linkerd.io/skip-inbound-ports: "8080"

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 512Mi

config:
  signozUrl: "http://signoz.signoz.svc.cluster.local:8080"
  orchestratorUrl: "http://agent-platform-agent-orchestrator.agent-platform.svc.cluster.local:8080"
  httpPort: "8080"
  patrolInterval: "1h"
  githubRepo: "jomcgi/homelab"
  botAuthors: "ci-format-bot,argocd-image-updater,chart-version-bot"
  testCoverageInterval: "1h"
  readmeFreshnessInterval: "168h"
  rulesInterval: "24h"
  prFixInterval: "1h"
  prFixStaleThreshold: "1h"
  natsUrl: "nats://agent-platform-nats.agent-platform.svc.cluster.local:4222"

secrets:
  agentSecrets:
    onepassword:
      itemPath: "vaults/k8s-homelab/items/agent-secrets"

priorityClassName: ""

podDisruptionBudget:
  enabled: false
  minAvailable: 1

nodeSelector: {}
tolerations: []
affinity: {}
