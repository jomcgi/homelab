replicaCount: 1

image:
  repository: ghcr.io/jomcgi/homelab/projects/agent_platform/cluster_agents
  tag: main
  pullPolicy: IfNotPresent

imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  # cluster-agents namespace has Linkerd injection enabled (via Kyverno).
  # The SigNoz OTel httpcheck receiver runs from the signoz namespace, which is
  # outside the Linkerd mesh. Without this annotation, Linkerd intercepts and
  # drops inbound connections from unmeshed clients on port 8080, causing the
  # /health endpoint to be unreachable and firing the 'cluster-agents Unreachable'
  # alert (SigNoz rule ID: 019cda4d-9837-76b0-b625-0149055459fa).
  # A helm_annotation_test in BUILD and a unit test in deployment_test.yaml both
  # enforce this annotation is always present to prevent regression.
  config.linkerd.io/skip-inbound-ports: "8080"

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 512Mi

config:
  signozUrl: "http://signoz.signoz.svc.cluster.local:8080"
  orchestratorUrl: "http://agent-platform-agent-orchestrator.agent-platform.svc.cluster.local:8080"
  httpPort: "8080"
  patrolInterval: "1h"
  # sweepTimeout caps how long a single agent sweep (collect→analyze→execute) may run.
  # A hung HTTP call to SigNoz or the orchestrator cannot block the patrol loop beyond
  # this deadline. Must be well below patrolInterval (default 5m is intentionally low).
  # Set to "" to use the compiled-in default (5m).
  sweepTimeout: ""
  githubRepo: "jomcgi/homelab"
  githubBranch: "main"
  botAuthors: "ci-format-bot,argocd-image-updater,chart-version-bot"
  testCoverageInterval: "1h"
  readmeFreshnessInterval: "168h"
  rulesInterval: "24h"
  prFixInterval: "1h"
  prFixStaleThreshold: "1h"
  natsUrl: "nats://agent-platform-nats.agent-platform.svc.cluster.local:4222"

secrets:
  agentSecrets:
    onepassword:
      itemPath: "vaults/k8s-homelab/items/agent-secrets"

priorityClassName: ""

podDisruptionBudget:
  enabled: false
  minAvailable: 1

nodeSelector: {}
tolerations: []
affinity: {}
