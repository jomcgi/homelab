apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-agents
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ghcr.io/jomcgi/homelab/charts
    chart: cluster-agents
    targetRevision: 0.6.31
    helm:
      releaseName: cluster-agents
      # IMPORTANT: Do NOT add podAnnotations here. The chart-version-bot regenerates
      # valuesObject and will silently drop any annotations placed in this block.
      # The Linkerd skip-inbound-ports annotation lives in values.yaml (not here)
      # so it persists across chart version bumps. See deployment_test.yaml for
      # the regression test that enforces this.
      valuesObject:
        imagePullSecret:
          enabled: true
        priorityClassName: system-cluster-critical
        podDisruptionBudget:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: cluster-agents
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
