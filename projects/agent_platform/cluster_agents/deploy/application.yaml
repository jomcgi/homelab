apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-agents
  namespace: argocd
spec:
  project: default
  sources:
    # Chart from OCI registry (pushed by CI via Bazel helm_push)
    - repoURL: ghcr.io/jomcgi/homelab/charts
      chart: cluster-agents
      targetRevision: 0.2.0
      helm:
        releaseName: cluster-agents
        valueFiles:
          - $values/projects/agent_platform/cluster_agents/deploy/values.yaml
          - $values/projects/agent_platform/cluster_agents/deploy/values-prod.yaml
    # Git repo for environment-specific values
    - repoURL: https://github.com/jomcgi/homelab.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cluster-agents
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
