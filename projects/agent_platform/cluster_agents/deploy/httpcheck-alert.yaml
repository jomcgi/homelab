apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-agents-httpcheck-alert
  namespace: cluster-agents
  labels:
    signoz.io/alert: "true"
  annotations:
    signoz.io/alert-name: "cluster-agents Unreachable"
    signoz.io/severity: "critical"
    signoz.io/notification-channels: "incidentio"
data:
  alert.json: |
    {
      "alert": "cluster-agents Unreachable",
      "alertType": "METRICS_BASED_ALERT",
      "ruleType": "threshold_rule",
      "version": "v5",
      "broadcastToAll": false,
      "disabled": false,
      "evalWindow": "10m0s",
      "frequency": "2m0s",
      "severity": "critical",
      "labels": {
        "service": "cluster-agents",
        "environment": "production",
        "severity": "critical"
      },
      "annotations": {
        "summary": "cluster-agents at http://cluster-agents.cluster-agents.svc.cluster.local:8080/health is unreachable",
        "description": "HTTP health check has failed 5 consecutive times over 10 minutes. Check pod status and logs. Known cause: missing Linkerd annotation config.linkerd.io/skip-inbound-ports=8080 on the Deployment — Linkerd drops inbound connections from the unmeshed signoz namespace without it. Verify the annotation is present: kubectl get pod -n cluster-agents -o jsonpath='{.items[0].metadata.annotations}'."
      },
      "condition": {
        "compositeQuery": {
          "queries": [
            {
              "type": "builder_query",
              "spec": {
                "name": "A",
                "signal": "metrics",
                "stepInterval": 60,
                "aggregations": [
                  {
                    "timeAggregation": "avg",
                    "spaceAggregation": "avg",
                    "metricName": "httpcheck.status"
                  }
                ],
                "filter": {
                  "expression": "http.url = 'http://cluster-agents.cluster-agents.svc.cluster.local:8080/health'"
                },
                "groupBy": [],
                "order": [],
                "disabled": false
              }
            }
          ],
          "panelType": "graph",
          "queryType": "builder"
        },
        "selectedQueryName": "A",
        "op": "2",
        "target": 1,
        "matchType": "5",
        "targetUnit": "",
        "thresholds": {
          "kind": "basic",
          "spec": [
            {
              "name": "critical",
              "target": 1,
              "targetUnit": "",
              "matchType": "5",
              "op": "2",
              "channels": ["incidentio"]
            }
          ]
        }
      },
      "preferredChannels": ["incidentio"]
    }
