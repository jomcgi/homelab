apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-orchestrator-to-runner
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      agents.x-k8s.io/sandbox-template: {{ .Values.sandboxTemplate.name }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.orchestratorNamespace | default .Release.Namespace }}
      ports:
        - protocol: TCP
          port: 8081
