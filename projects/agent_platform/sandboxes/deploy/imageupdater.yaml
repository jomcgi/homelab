apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: goose-sandboxes
  namespace: argocd
spec:
  applicationRefs:
    - images:
        - alias: goose-agent
          commonUpdateSettings:
            updateStrategy: digest
            forceUpdate: false
          imageName: ghcr.io/jomcgi/homelab/goose-agent:main
          manifestTargets:
            helm:
              name: sandboxTemplate.image.repository
              tag: sandboxTemplate.image.tag
      namePattern: prod-goose-sandboxes
  namespace: argocd
  writeBackConfig:
    method: git:secret:argocd/argocd-image-updater-token
    gitConfig:
      repository: https://github.com/jomcgi/homelab.git
      branch: main
      writeBackTarget: helmvalues:values-prod.yaml
