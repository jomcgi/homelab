apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chat-bot
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ghcr.io/jomcgi/homelab/charts
    chart: chat-bot
    targetRevision: 0.4.2
    helm:
      releaseName: chat-bot
      valuesObject:
        imagePullSecret:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: chat-bot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
