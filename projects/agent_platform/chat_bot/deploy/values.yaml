replicaCount: 1

image:
  repository: ghcr.io/jomcgi/homelab/projects/agent-platform/chat-bot
  tag: main
  pullPolicy: IfNotPresent

imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

config:
  orchestratorUrl: "http://agent-platform-agent-orchestrator.agent-platform.svc.cluster.local:8080"
  llamaCppUrl: "http://llama-cpp.llama-cpp.svc.cluster.local:8080"
  natsUrl: "nats://agent-platform-nats.agent-platform.svc.cluster.local:4222"
  httpPort: "8080"

secrets:
  discordCredentials:
    onepassword:
      itemPath: "vaults/k8s-homelab/items/discord-bot"
  githubToken:
    onepassword:
      itemPath: "vaults/k8s-homelab/items/agent-secrets"

nodeSelector: {}
tolerations: []
affinity: {}
