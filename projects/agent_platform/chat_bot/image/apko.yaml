contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - nodejs-20
    - ca-certificates-bundle

archs:
  - x86_64
  - aarch64

cmd: node --import tsx /app/src/index.ts

work-dir: /app

accounts:
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  groups:
    - groupname: nonroot
      gid: 65532
  run-as: 65532

paths:
  - path: /app
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

environment:
  NODE_ENV: production
  HTTP_PORT: "8080"
