fullnameOverride: "llama-cpp-embeddings"

image:
  tag: "server-cuda-b8643"

imagePullSecret:
  enabled: true

modelVolume:
  enabled: true
  reference: "ghcr.io/jomcgi/models/voyageai/voyage-4-nano:gguf-q8-0"
  mountPath: "/model-image"

server:
  nGpuLayers: 0
  ctxSize: 8192
  flashAttn: "off"
  threads: 4
  jinja: false
  extraArgs:
    - "--embedding"
    - "--alias"
    - "voyage-4-nano"

nodeSelector:
  kubernetes.io/hostname: node-4

podAnnotations:
  linkerd.io/inject: disabled

resources:
  requests:
    cpu: 2
    memory: "2Gi"
  limits:
    memory: "4Gi"
