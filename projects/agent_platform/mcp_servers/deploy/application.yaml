apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-servers
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    path: projects/agent_platform/mcp_servers/deploy
    targetRevision: HEAD
    helm:
      releaseName: mcp-servers
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-servers
  # Ignore fields mutated by OTel operator, Kyverno, and Linkerd proxy injector
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - .spec.template.metadata.annotations
        - .spec.template.spec.containers
        - .spec.template.spec.initContainers
        - .spec.template.spec.volumes
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
