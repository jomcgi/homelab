imageUpdater:
  applicationName: "prod-mcp-servers"
  writeBackTarget: "helmvalues:values-prod.yaml"
servers:
- name: signoz-mcp
  image:
    repository: docker.io/signoz/signoz-mcp-server
    tag: "v0.0.5"
  port: 8000
  podAnnotations:
    instrumentation.opentelemetry.io/inject-python: "python"
  env:
  - name: SIGNOZ_URL
    value: "http://signoz.signoz.svc.cluster.local:8080"
  - name: TRANSPORT_MODE
    value: "http"
  - name: MCP_SERVER_PORT
    value: "8000"
  secret:
    name: signoz-mcp
    itemPath: "vaults/k8s-homelab/items/signoz-mcp"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  translate:
    enabled: false
  registration:
    enabled: true
    transport: "STREAMABLEHTTP"
  alert:
    enabled: true
    url: "http://signoz-mcp.mcp-servers.svc.cluster.local:8000/health"
- name: buildbuddy-mcp
  image:
    repository: ghcr.io/jomcgi/homelab/services/buildbuddy-mcp
    tag: "main@sha256:03679ba8c06b040313370910a09bfb6124ffd6ea180286bd024f0ed196800c19"
  port: 8000
  podAnnotations:
    instrumentation.opentelemetry.io/inject-python: "python"
  writableTmp: true
  env:
  - name: BUILDBUDDY_URL
    value: "https://app.buildbuddy.io"
  secret:
    name: buildbuddy-mcp
    itemPath: "vaults/k8s-homelab/items/buildbuddy-mcp"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  translate:
    enabled: false
  registration:
    enabled: true
    transport: "STREAMABLEHTTP"
  imageUpdater:
    enabled: true
  alert:
    enabled: true
    url: "http://buildbuddy-mcp.mcp-servers.svc.cluster.local:8000/health"
- name: kubernetes-mcp
  image:
    repository: ghcr.io/containers/kubernetes-mcp-server
    tag: "latest"
  port: 8080
  args:
  - "--port"
  - "8080"
  - "--disable-destructive"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  translate:
    enabled: false
  rbac:
    clusterRoleRules:
    - apiGroups: ["", "apps", "batch", "networking.k8s.io", "rbac.authorization.k8s.io"]
      resources: ["*"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["pods/exec", "pods/portforward", "pods/log"]
      verbs: ["create", "get"]
    - apiGroups: ["metrics.k8s.io"]
      resources: ["pods", "nodes"]
      verbs: ["get", "list"]
  registration:
    enabled: true
    transport: "STREAMABLEHTTP"
  alert:
    enabled: true
    url: "http://kubernetes-mcp.mcp-servers.svc.cluster.local:8080/mcp"
- name: argocd-mcp
  image:
    repository: ghcr.io/argoproj-labs/mcp-for-argocd
    tag: "v0.5.0"
  port: 3000
  writableTmp: true
  env:
  - name: ARGOCD_BASE_URL
    value: "http://argocd-server.argocd.svc.cluster.local:80"
  secret:
    name: argocd-mcp
    itemPath: "vaults/k8s-homelab/items/argocd-mcp"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  translate:
    enabled: false
  registration:
    enabled: true
    transport: "STREAMABLEHTTP"
  alert:
    enabled: true
    url: "http://argocd-mcp.mcp-servers.svc.cluster.local:3000/mcp"
- name: todo-mcp
  image:
    repository: ghcr.io/jomcgi/homelab/services/todo-mcp
    tag: "main@sha256:fba154fdb03848f15ba3128e5c56ef9a30d9a7808ef7ce35b1ff235eacc28f9d"
  port: 8000
  podAnnotations:
    instrumentation.opentelemetry.io/inject-python: "python"
  env:
  - name: TODO_URL
    value: "http://todo-admin.todo.svc.cluster.local:8080"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  translate:
    enabled: false
  registration:
    enabled: true
    transport: "STREAMABLEHTTP"
  imageUpdater:
    enabled: true
  alert:
    enabled: true
    url: "http://todo-mcp.mcp-servers.svc.cluster.local:8000/health"
- name: agent-orchestrator-mcp
  image:
    repository: ghcr.io/jomcgi/homelab/services/agent-orchestrator-mcp
    tag: "main@sha256:1b0c19da2c07927d12132f00acd4a8d4a93fa729adc46b252730d4f472f65840"
  port: 8000
  podAnnotations:
    instrumentation.opentelemetry.io/inject-python: "python"
  env:
  - name: ORCHESTRATOR_URL
    value: "http://agent-orchestrator.agent-orchestrator.svc.cluster.local:8080"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  translate:
    enabled: false
  registration:
    enabled: true
    transport: "STREAMABLEHTTP"
  imageUpdater:
    enabled: true
  alert:
    enabled: true
    url: "http://agent-orchestrator-mcp.mcp-servers.svc.cluster.local:8000/health"
