# Shared translate sidecar image (upstream IBM mcp-context-forge)
translate:
  image:
    repository: ghcr.io/ibm/mcp-context-forge
    tag: v1.0.0-RC1
    pullPolicy: IfNotPresent

# Context Forge gateway for registration jobs
gateway:
  url: ""
  secret:
    name: context-forge-gateway
    itemPath: ""

# HTTPCheck alert defaults (overridable per server)
alertDefaults:
  evalWindow: "10m0s"
  frequency: "2m0s"
  matchType: "5"
  severity: "critical"
  channels: []

# ArgoCD Image Updater defaults (for in-repo images)
imageUpdater:
  gitRepository: "https://github.com/jomcgi/homelab.git"
  gitBranch: "main"
  gitSecret: "argocd/argocd-image-updater-token"
  applicationName: "" # ArgoCD Application name (defaults to release name)
  writeBackTarget: "" # required if any server has imageUpdater.enabled

# MCP servers to deploy
servers: []
