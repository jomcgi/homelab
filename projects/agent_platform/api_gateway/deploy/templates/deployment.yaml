apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "api-gateway.fullname" . }}
  labels:
    {{- include "api-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "api-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/nginx-config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/collector-config: {{ include (print $.Template.BasePath "/collector-configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "api-gateway.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "api-gateway.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "api-gateway.fullname" . }}-nginx
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: collector-script
          configMap:
            name: {{ include "api-gateway.fullname" . }}-collector
            defaultMode: 0755
      initContainers:
        # Run collector once before nginx starts to ensure status.json exists
        - name: init-collector
          image: "{{ .Values.clusterInfo.image.repository }}:{{ .Values.clusterInfo.image.tag }}"
          imagePullPolicy: {{ .Values.clusterInfo.image.pullPolicy }}
          command: ["/scripts/collect.sh"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: collector-script
              mountPath: /scripts
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: [ALL]
          resources:
            {{- toYaml .Values.clusterInfo.resources | nindent 12 }}
      containers:
        - name: nginx
          image: "{{ .Values.nginx.image.repository }}:{{ .Values.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: [ALL]
          resources:
            {{- toYaml .Values.nginx.resources | nindent 12 }}
        {{- if .Values.clusterInfo.enabled }}
        - name: collector
          image: "{{ .Values.clusterInfo.image.repository }}:{{ .Values.clusterInfo.image.tag }}"
          imagePullPolicy: {{ .Values.clusterInfo.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                /scripts/collect.sh
                sleep {{ .Values.clusterInfo.interval }}
              done
          volumeMounts:
            - name: data
              mountPath: /data
            - name: collector-script
              mountPath: /scripts
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: [ALL]
          resources:
            {{- toYaml .Values.clusterInfo.resources | nindent 12 }}
        {{- end }}
