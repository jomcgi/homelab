apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "api-gateway.fullname" . }}-collector
  labels:
    {{- include "api-gateway.labels" . | nindent 4 }}
data:
  collect.sh: |
    #!/bin/sh
    set -e

    OUTPUT_FILE="/data/status.json"
    TEMP_FILE="/data/status.json.tmp"

    # Count control-plane nodes
    CP_TOTAL=$(kubectl get nodes -l node-role.kubernetes.io/control-plane=true --no-headers 2>/dev/null | wc -l | tr -d ' ')
    CP_READY=$(kubectl get nodes -l node-role.kubernetes.io/control-plane=true --no-headers 2>/dev/null | grep -c ' Ready' || echo "0")

    # Count GPU nodes (have nvidia.com/gpu.present label)
    GPU_TOTAL=$(kubectl get nodes -l nvidia.com/gpu.present=true --no-headers 2>/dev/null | wc -l | tr -d ' ')
    GPU_READY=$(kubectl get nodes -l nvidia.com/gpu.present=true --no-headers 2>/dev/null | grep -c ' Ready' || echo "0")

    # Get CPU average from metrics-server
    CPU_AVG=$(kubectl top nodes --no-headers 2>/dev/null | awk '{sum += $3} END {if (NR > 0) printf "%.0f", sum/NR; else print "0"}' | tr -d '%' || echo "0")

    # Get memory usage
    MEM_USED_MI=$(kubectl top nodes --no-headers 2>/dev/null | awk '{
      val = $4
      if (index(val, "Gi") > 0) { gsub("Gi", "", val); sum += val * 1024 }
      else if (index(val, "Mi") > 0) { gsub("Mi", "", val); sum += val }
    } END { printf "%.0f", sum }' || echo "0")
    MEM_USED_GB=$(awk "BEGIN {printf \"%.1f\", $MEM_USED_MI / 1024}")

    # Get total memory from node capacity
    MEM_TOTAL_KI=$(kubectl get nodes -o jsonpath='{range .items[*]}{.status.capacity.memory}{" "}{end}' 2>/dev/null | awk '{
      for (i=1; i<=NF; i++) {
        val = $i
        if (index(val, "Ki") > 0) { gsub("Ki", "", val); sum += val }
        else if (index(val, "Gi") > 0) { gsub("Gi", "", val); sum += val * 1024 * 1024 }
      }
    } END { printf "%.0f", sum }' || echo "0")
    MEM_TOTAL_GB=$(awk "BEGIN {printf \"%.0f\", $MEM_TOTAL_KI / 1024 / 1024}")

    # Try to get GPU metrics from DCGM exporter
    GPU_UTIL=""
    VRAM_USED=""
    VRAM_TOTAL=""
    if [ "$GPU_TOTAL" -gt 0 ]; then
      DCGM_METRICS=$(curl -s --connect-timeout 2 http://nvidia-dcgm-exporter.gpu-operator.svc:9400/metrics 2>/dev/null || echo "")
      if [ -n "$DCGM_METRICS" ]; then
        # DCGM metrics format: METRIC_NAME{labels} VALUE
        GPU_UTIL=$(echo "$DCGM_METRICS" | grep "^DCGM_FI_DEV_GPU_UTIL{" | awk '{print $NF}' | awk '{sum += $1; count++} END {if (count > 0) printf "%.0f", sum/count}')
        # VRAM in MiB from DCGM (FB = framebuffer)
        VRAM_USED_MIB=$(echo "$DCGM_METRICS" | grep "^DCGM_FI_DEV_FB_USED{" | awk '{print $NF}' | awk '{sum += $1} END {printf "%.0f", sum}')
        VRAM_FREE_MIB=$(echo "$DCGM_METRICS" | grep "^DCGM_FI_DEV_FB_FREE{" | awk '{print $NF}' | awk '{sum += $1} END {printf "%.0f", sum}')
        if [ -n "$VRAM_USED_MIB" ] && [ "$VRAM_USED_MIB" != "0" ]; then
          VRAM_USED=$(awk "BEGIN {printf \"%.1f\", $VRAM_USED_MIB / 1024}")
          # FB_FREE + FB_USED = Total
          VRAM_TOTAL=$(awk "BEGIN {printf \"%.0f\", ($VRAM_USED_MIB + $VRAM_FREE_MIB) / 1024}")
        fi
      fi
    fi

    # Get pod list with metadata (namespace,name,status) for Pod Matrix
    # Sort by: Failed first (visibility), then by namespace (texture blocks)
    # Output as JSON array directly using jq-style awk
    POD_JSON=$(kubectl get pods -A --no-headers -o jsonpath='{range .items[*]}{.metadata.namespace},{.metadata.name},{.status.phase}{"\n"}{end}' 2>/dev/null | \
      awk -F',' '{
        if ($3 == "Failed") print "0," $0
        else if ($3 == "Pending") print "1," $0
        else print "2," $0
      }' | sort -t',' -k1,1n -k2,2 | cut -d',' -f2- | \
      awk -F',' 'BEGIN { printf "[" }
        NR > 1 { printf "," }
        { printf "{\"ns\":\"%s\",\"name\":\"%s\",\"status\":\"%s\"}", $1, $2, $3 }
        END { printf "]" }')

    # Fallback to empty array if no pods
    [ -z "$POD_JSON" ] && POD_JSON="[]"

    # Get ArgoCD app-of-apps status (canada) for overall sync status
    ARGO_STATUS=$(kubectl get application -n argocd canada -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
    ARGO_REVISION=$(kubectl get application -n argocd canada -o jsonpath='{.status.sync.revision}' 2>/dev/null | cut -c1-7 || echo "")
    # Get the most recent deployment time from ALL ArgoCD applications
    # Iterates through all history entries (not just history[0] which is oldest)
    # and finds the most recent deployedAt timestamp
    ARGO_SYNCED_AT=$(kubectl get applications -n argocd -o jsonpath='{range .items[*]}{range .status.history[*]}{.deployedAt}{"\n"}{end}{end}' 2>/dev/null | sort -r | head -1 || echo "")

    # Generate timestamp
    TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

    # Build optional GPU fields
    GPU_FIELDS=""
    if [ -n "$GPU_UTIL" ]; then
      GPU_FIELDS=',"gpu_util":'$GPU_UTIL
    fi
    if [ -n "$VRAM_USED" ] && [ -n "$VRAM_TOTAL" ]; then
      GPU_FIELDS=$GPU_FIELDS',"vram":{"used":'$VRAM_USED',"total":'$VRAM_TOTAL'}'
    fi

    # Build gitops JSON with optional syncedAt
    GITOPS_JSON='{"status":"'"$ARGO_STATUS"'","revision":"'"$ARGO_REVISION"'"'
    if [ -n "$ARGO_SYNCED_AT" ]; then
      GITOPS_JSON=$GITOPS_JSON',"syncedAt":"'"$ARGO_SYNCED_AT"'"'
    fi
    GITOPS_JSON=$GITOPS_JSON'}'

    printf '{"updated_at":"%s","nodes":{"cp":{"total":%s,"ready":%s},"gpu":{"total":%s,"ready":%s}},"cpu":%s,"mem":{"used":%s,"total":%s},"pods":%s,"gitops":%s%s}\n' \
      "$TIMESTAMP" "$CP_TOTAL" "$CP_READY" "$GPU_TOTAL" "$GPU_READY" "$CPU_AVG" "$MEM_USED_GB" "$MEM_TOTAL_GB" "$POD_JSON" "$GITOPS_JSON" "$GPU_FIELDS" > "$TEMP_FILE"

    # Atomic move
    mv "$TEMP_FILE" "$OUTPUT_FILE"
    echo "Updated $OUTPUT_FILE at $TIMESTAMP"
