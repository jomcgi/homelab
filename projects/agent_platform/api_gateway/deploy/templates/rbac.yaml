{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "api-gateway.serviceAccountName" . }}
  labels:
    {{- include "api-gateway.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "api-gateway.fullname" . }}-cluster-info
  labels:
    {{- include "api-gateway.labels" . | nindent 4 }}
rules:
  # Read node information
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # Read pod information (for Pod Matrix)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Read metrics from metrics-server
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # Read ArgoCD applications for GitOps status
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "api-gateway.fullname" . }}-cluster-info
  labels:
    {{- include "api-gateway.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "api-gateway.fullname" . }}-cluster-info
subjects:
  - kind: ServiceAccount
    name: {{ include "api-gateway.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
