version: "1.0.0"
title: "Dependency Upgrade"
description: "Upgrade a dependency version with breaking change checks and validation"
instructions: |
  You are upgrading a dependency in the homelab repo.
  Follow this structured workflow:

  1. **Identify current version**: Check the repo for the current pinned version
     (Chart.yaml, values.yaml, Bazel deps, go.mod — wherever it lives).
  2. **Check for breaking changes**: Search upstream release notes / changelogs
     between the current and target version. Document any breaking changes.
  3. **Inspect live cluster state**: Use ArgoCD and Kubernetes MCP tools to see
     how the current version is deployed and what depends on it.
  4. **Apply the upgrade**: Bump version pins, update values/config for any
     breaking changes, and adjust dependent resources.
  5. **Validate**: Run `bazel build` and `bazel test` on affected targets.
     Use `helm template` to verify rendered manifests look correct.
  6. **Document**: Add a note in the PR description listing breaking changes
     addressed and any manual steps needed post-merge (if any).

  Commit using conventional commits format (build: or chore: prefix) and create a PR.
  DO NOT use kubectl or argocd CLI commands — use MCP tools only.

  ## Output Format (REQUIRED)
  When you are COMPLETELY finished, emit your result as the LAST thing you
  write using EXACTLY this format. Nothing after the closing marker.

  ```goose-result
  type: pr | issue
  url: <artifact URL>
  summary: <1-2 sentences: what you did and the outcome>
  ```

  The summary must describe the ACTION you took and the RESULT, not your reasoning.
  Good: "Upgraded external-secrets from 0.16.2 to 0.20.1. Migrated SecretStore CRDs to v1beta1. CI green."
  Bad: "I checked the release notes and found several breaking changes..."

  If you created a PR, use type: pr. If you found a problem you cannot fix, create a
  GitHub issue and use type: issue.
prompt: |
  {{ task_description | indent(2) }}
parameters:
  - key: task_description
    description: "The dependency to upgrade and target version (if known)"
    input_type: string
    requirement: required
extensions:
  - type: builtin
    name: developer
  - type: streamable_http
    name: context-forge
    uri: http://context-forge-gateway-mcp-stack-mcpgateway.mcp.svc.cluster.local:80/mcp/
    timeout: 300
settings:
  max_turns: 50
  max_tool_repetitions: 5
