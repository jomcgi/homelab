version: "1.0.0"
title: "Bazel Build"
description: "Fix or update Bazel build files and configurations"
instructions: |
  Fix or update Bazel build configurations in the homelab repo.
  Use BuildBuddy MCP tools to investigate build logs and test changes remotely.
  Run `format` to regenerate BUILD files after Go or Python source changes.
  Commit using conventional commits format (build: prefix) and create a PR.
  DO NOT use kubectl or argocd CLI commands.

  ## Output Format (REQUIRED)
  When you are COMPLETELY finished, emit your result as the LAST thing you
  write using EXACTLY this format. Nothing after the closing marker.

  ```goose-result
  type: pr | issue
  url: <artifact URL>
  summary: <1-2 sentences: what you did and the outcome>
  ```

  The summary must describe the ACTION you took and the RESULT, not your reasoning.
  Good: "Regenerated BUILD files after adding new Go package. PR passes CI."
  Bad: "I ran format and then checked the build output to see if it passed..."

  If you created a PR, use type: pr. If you found a problem you cannot fix, create a
  GitHub issue and use type: issue.
prompt: |
  {{ task_description }}
parameters:
  - key: task_description
    description: "The build issue or change to make"
    input_type: string
    requirement: required
extensions:
  - type: builtin
    name: developer
  - type: streamable_http
    name: context-forge
    uri: http://context-forge.mcp-gateway.svc.cluster.local:8000/mcp
    timeout: 300
    headers:
      Authorization: "Bearer ${CI_DEBUG_MCP_TOKEN}"
  - type: stdio
    name: github
    cmd: pnpm
    args: ["dlx", "@modelcontextprotocol/server-github"]
    env_keys: ["GITHUB_TOKEN"]
settings:
  max_turns: 50
  max_tool_repetitions: 5
