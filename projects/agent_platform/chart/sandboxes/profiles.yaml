# Profile definitions for Goose sandbox agents.
# This file documents available profiles and their tool scoping.
# It is not consumed by Helm — it serves as reference for humans.
#
# In-cluster agents access Context Forge via ClusterIP without auth (ADR 006).
# All registered MCP tools are available to every profile.
#
# To add a new profile:
#   1. Add entry here
#   2. Create recipe in goose_agent/image/recipes/<name>.yaml
#   3. Add profile name to validProfiles in bazel/tools/agent-run/main.go

profiles:
  ci-debug:
    description: "BuildBuddy tools only — for CI failure investigation"
    recipe: ci-debug.yaml

  code-fix:
    description: "No cluster tools — pure code changes"
    recipe: code-fix.yaml

  research:
    description: "Read-only cluster investigation — no code changes"
    recipe: research.yaml

  bazel:
    description: "BuildBuddy tools — for build system fixes"
    recipe: bazel.yaml
