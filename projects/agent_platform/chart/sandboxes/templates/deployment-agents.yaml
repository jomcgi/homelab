{{- range $name, $agent := .Values.agents }}
{{- if $agent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-{{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: agent-{{ $name }}
    app.kubernetes.io/component: agent
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-{{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-{{ $name }}
        app.kubernetes.io/component: agent
      annotations:
        checksum/prompt: {{ $agent.prompt | sha256sum }}
        linkerd.io/inject: disabled
    spec:
      serviceAccountName: goose-agent
      securityContext:
        runAsNonRoot: true
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      {{- if $.Values.sandboxTemplate.gitClone.enabled }}
      initContainers:
        - name: clone-repo
          image: "{{ $.Values.sandboxTemplate.image.repository }}:{{ $.Values.sandboxTemplate.image.tag }}"
          command: ["/bin/sh", "-c"]
          args:
            - |
              git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
              git clone --depth 1 {{ $.Values.sandboxTemplate.gitClone.repoUrl }} /workspace/{{ $.Values.sandboxTemplate.gitClone.repoName }}
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.sandboxTemplate.gitClone.secret.name }}
                  key: {{ $.Values.sandboxTemplate.gitClone.secret.key }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      {{- end }}
      containers:
        - name: goose
          image: "{{ $.Values.sandboxTemplate.image.repository }}:{{ $.Values.sandboxTemplate.image.tag }}"
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                goose run --text "$AGENT_PROMPT"
                echo "Agent exited, sleeping before restart..."
                sleep ${AGENT_POLL_INTERVAL:-300}
              done
          {{- if $.Values.sandboxTemplate.gitClone.enabled }}
          workingDir: /workspace/{{ $.Values.sandboxTemplate.gitClone.repoName }}
          {{- end }}
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          env:
            - name: AGENT_PROMPT
              valueFrom:
                configMapKeyRef:
                  name: agent-prompt-{{ $name }}
                  key: prompt
            - name: AGENT_POLL_INTERVAL
              value: {{ $agent.pollInterval | default 300 | quote }}
            - name: GOOSE_PROVIDER
              value: {{ $.Values.sandboxTemplate.env.gooseProvider }}
            - name: GOOSE_MODEL
              value: {{ $.Values.sandboxTemplate.env.gooseModel }}
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secrets.claudeAuth.secretName }}
                  key: {{ $.Values.secrets.claudeAuth.key }}
            - name: CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS
              value: "1"
            {{- if $.Values.sandboxTemplate.gitClone.enabled }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.sandboxTemplate.gitClone.secret.name }}
                  key: {{ $.Values.sandboxTemplate.gitClone.secret.key }}
            - name: GOOSE_WORKSPACE
              value: /workspace/{{ $.Values.sandboxTemplate.gitClone.repoName }}
            {{- end }}
            {{- if $.Values.sandboxTemplate.extraEnv }}
            {{- toYaml $.Values.sandboxTemplate.extraEnv | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml ($agent.resources | default $.Values.sandboxTemplate.resources) | nindent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          emptyDir: {}
---
{{- end }}
{{- end }}
