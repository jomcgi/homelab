apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: {{ .Values.sandboxTemplate.name }}
  namespace: {{ .Release.Namespace }}
spec:
  podTemplate:
    metadata:
      annotations:
        checksum/image: {{ .Values.sandboxTemplate.image.tag | sha256sum | trunc 16 | quote }}
    spec:
      serviceAccountName: goose-agent
      securityContext:
        runAsNonRoot: true
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: clone-repo
          image: "{{ .Values.sandboxTemplate.image.repository }}:{{ .Values.sandboxTemplate.image.tag }}"
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              git clone --depth 1 https://x-access-token:${GITHUB_TOKEN}@github.com/{{ .Values.sandboxTemplate.env.repoOwner }}/{{ .Values.sandboxTemplate.env.repoName }}.git /workspace/{{ .Values.sandboxTemplate.env.repoName }}
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.agentSecrets.secretName }}
                  key: GITHUB_TOKEN
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      containers:
        - name: goose
          image: "{{ .Values.sandboxTemplate.image.repository }}:{{ .Values.sandboxTemplate.image.tag }}"
          imagePullPolicy: Always
          command: ["agent-runner"]
          ports:
            - name: runner
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 2
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 2
            periodSeconds: 5
          workingDir: /workspace/{{ .Values.sandboxTemplate.env.repoName }}
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          env:
            - name: GOOSE_PROVIDER
              value: {{ .Values.sandboxTemplate.env.gooseProvider }}
            - name: GOOSE_MODEL
              value: {{ .Values.sandboxTemplate.env.gooseModel }}
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.claudeAuth.secretName }}
                  key: {{ .Values.secrets.claudeAuth.key }}
            - name: CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS
              value: "1"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.agentSecrets.secretName }}
                  key: GITHUB_TOKEN
            - name: BUILDBUDDY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.agentSecrets.secretName }}
                  key: BUILDBUDDY_API_KEY
                  optional: true
            - name: GOOSE_WORKSPACE
              value: /workspace/{{ .Values.sandboxTemplate.env.repoName }}
            {{- if .Values.sandboxTemplate.extraEnv }}
            {{- toYaml .Values.sandboxTemplate.extraEnv | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.sandboxTemplate.resources | nindent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          ephemeral:
            volumeClaimTemplate:
              spec:
                storageClassName: {{ .Values.sandboxTemplate.workspace.storageClassName }}
                accessModes: [ReadWriteOnce]
                resources:
                  requests:
                    storage: {{ .Values.sandboxTemplate.workspace.size }}
