{{- if .Values.secrets.useOnePassword }}
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: claude-auth
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/{{ .Values.secrets.claudeAuth.vault }}/items/{{ .Values.secrets.claudeAuth.onePasswordItem }}"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: agent-secrets
  namespace: {{ .Release.Namespace }}
spec:
  itemPath: "vaults/{{ .Values.secrets.agentSecrets.vault }}/items/{{ .Values.secrets.agentSecrets.onePasswordItem }}"
{{- end }}
