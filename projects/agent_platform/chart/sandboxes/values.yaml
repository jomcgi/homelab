namespace:
  limitRange:
    cpu:
      request: "1"
      limit: "4"
    memory:
      request: 2Gi
      limit: 4Gi
  resourceQuota:
    pods: "15"
    requestsCpu: "16"
    requestsMemory: 32Gi

sandboxTemplate:
  name: goose-agent
  image:
    repository: ghcr.io/jomcgi/homelab/projects/agent_platform/goose_agent/image
    tag: main
  # Git repository clone configuration for sandbox workspace.
  # When enabled, an initContainer clones the repo before the agent starts.
  gitClone:
    enabled: true
    # Full HTTPS clone URL (token auth is injected via secret).
    repoUrl: ""
    # Short repo name — used as workspace subdirectory (/workspace/<repoName>).
    repoName: ""
    # Kubernetes Secret containing the git auth token.
    secret:
      name: "agent-secrets"
      key: "GITHUB_TOKEN"
  env:
    gooseProvider: claude-code
    gooseModel: claude-sonnet-4-6
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi
  extraEnv: []
  workspace:
    storageClassName: ""
    size: 20Gi

warmPool:
  name: goose-pool
  size: 1

secrets:
  useOnePassword: false
  claudeAuth:
    onePasswordItem: ""
    vault: ""
    secretName: "claude-auth"
    key: "CLAUDE_AUTH_TOKEN"
  agentSecrets:
    onePasswordItem: ""
    vault: ""
    secretName: "agent-secrets"

# Namespace that agent-orchestrator runs in — used in NetworkPolicy ingress rule.
# When empty, uses podSelector (same namespace). Set when orchestrator is in a
# different namespace.
orchestratorNamespace: ""

# Long-lived agents — each entry generates a ConfigMap + Deployment.
agents: {}
