namespace:
  limitRange:
    cpu:
      request: "1"
      limit: "4"
    memory:
      request: 2Gi
      limit: 4Gi
  resourceQuota:
    pods: "15"
    requestsCpu: "16"
    requestsMemory: 32Gi

sandboxTemplate:
  name: goose-agent
  image:
    repository: ghcr.io/jomcgi/homelab/goose-agent
    tag: main
  env:
    gooseProvider: claude-code
    gooseModel: claude-sonnet-4-6
    contextForgeUrl: ""
    repoOwner: ""
    repoName: ""
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi
  extraEnv: []
  workspace:
    storageClassName: ""
    size: 20Gi

warmPool:
  name: goose-pool
  size: 1

secrets:
  useOnePassword: false
  claudeAuth:
    onePasswordItem: ""
    vault: ""
    secretName: "claude-auth"
    key: "CLAUDE_AUTH_TOKEN"
  agentSecrets:
    onePasswordItem: ""
    vault: ""
    secretName: "agent-secrets"
  mcpTokens:
    onePasswordItem: ""
    vault: ""
    secretName: "goose-mcp-tokens"
    key: "CI_DEBUG_MCP_TOKEN"

# Namespace that agent-orchestrator runs in — used in NetworkPolicy ingress rule.
# When empty, uses podSelector (same namespace). Set when orchestrator is in a
# different namespace.
orchestratorNamespace: ""

# Long-lived agents — each entry generates a ConfigMap + Deployment.
agents: {}
