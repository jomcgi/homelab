apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-orchestrator.fullname" . }}
  labels:
    {{- include "agent-orchestrator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "agent-orchestrator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/agents-config: {{ include (print $.Template.BasePath "/agents-configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "agent-orchestrator.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: ghcr-imagepull-secret
      {{- end }}
      serviceAccountName: {{ include "agent-orchestrator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.config.httpPort }}
          protocol: TCP
        env:
        - name: NATS_URL
          {{- $natsUrl := .Values.config.natsUrl | default (printf "nats://%s-nats:4222" .Release.Name) }}
          value: {{ $natsUrl | quote }}
        - name: SANDBOX_NAMESPACE
          {{- $sandboxNs := .Values.config.sandboxNamespace | default .Release.Namespace }}
          value: {{ $sandboxNs | quote }}
        - name: SANDBOX_TEMPLATE
          value: {{ .Values.config.sandboxTemplate | quote }}
        - name: MAX_RETRIES
          value: {{ .Values.config.maxRetries | quote }}
        - name: MAX_CONCURRENT
          value: {{ .Values.config.maxConcurrent | quote }}
        - name: HTTP_PORT
          value: {{ .Values.config.httpPort | quote }}
        - name: JOB_INACTIVITY_TIMEOUT
          value: {{ .Values.config.jobInactivityTimeout | quote }}
        - name: JOB_MAX_DURATION
          value: {{ .Values.config.jobMaxDuration | quote }}
        - name: RECONCILE_INTERVAL
          value: {{ .Values.config.reconcileInterval | quote }}
        {{- if .Values.config.inferenceUrl }}
        - name: INFERENCE_URL
          value: {{ .Values.config.inferenceUrl | quote }}
        {{- end }}
        volumeMounts:
        - name: agents-config
          mountPath: /etc/orchestrator
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      - name: agents-config
        configMap:
          name: {{ include "agent-orchestrator.fullname" . }}-agents
