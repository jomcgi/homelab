replicaCount: 1

image:
  repository: ghcr.io/jomcgi/homelab/projects/agent_platform/orchestrator
  tag: main
  pullPolicy: IfNotPresent

imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

config:
  # natsUrl and sandboxNamespace are auto-derived from Helm release metadata
  # when left empty (the default). Only set these explicitly when deploying
  # NATS or sandboxes outside this Helm release.
  #   natsUrl          → nats://<release-name>-nats:4222
  #   sandboxNamespace → <release-namespace>
  natsUrl: ""
  sandboxNamespace: ""
  sandboxTemplate: "goose-agent"
  maxRetries: "2"
  maxConcurrent: "5"
  httpPort: "8080"
  jobInactivityTimeout: "10m"
  jobMaxDuration: "168h"

# Pipeline composer agent/profile registry. Served via GET /agents so the
# frontend discovers available agents without hardcoding. Add new agents
# here to make them appear in the pipeline composer UI.
agentsConfig:
  agents:
    - id: ci-debug
      label: ci-debug
      icon: "⚙"
      bg: "#dbeafe"
      fg: "#1e40af"
      desc: Analyse CI/build failures, read logs
      category: tool
    - id: code-fix
      label: code-fix
      icon: "⚙"
      bg: "#dbeafe"
      fg: "#1e40af"
      desc: Fix code, open PRs, edit files
      category: tool
    - id: goose
      label: goose
      icon: "◈"
      bg: "#ede9fe"
      fg: "#5b21b6"
      desc: Autonomous coding sandbox
      category: tool
    - id: k8s-agent
      label: k8s-agent
      icon: "⚙"
      bg: "#dbeafe"
      fg: "#1e40af"
      desc: Kubernetes cluster operations
      category: tool
    - id: notify
      label: notify
      icon: "⬡"
      bg: "#d1fae5"
      fg: "#065f46"
      desc: Send slack/github notifications
      category: utility
    - id: grimoire
      label: grimoire
      icon: "⬡"
      bg: "#d1fae5"
      fg: "#065f46"
      desc: Query D&D knowledge graph
      category: utility
  profiles:
    - id: homelab
      meta: K3s
    - id: semgrep
      meta: work
    - id: gpu
      meta: RTX 4090

httpRoute:
  enabled: false
  hostname: ""
  gatewayRef:
    name: ""
    namespace: ""

nodeSelector: {}
tolerations: []
affinity: {}
