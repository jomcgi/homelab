replicaCount: 1

image:
  repository: ghcr.io/jomcgi/homelab/projects/agent_platform/orchestrator
  tag: main
  pullPolicy: IfNotPresent

imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

config:
  # natsUrl and sandboxNamespace are auto-derived from Helm release metadata
  # when left empty (the default). Only set these explicitly when deploying
  # NATS or sandboxes outside this Helm release.
  #   natsUrl          → nats://<release-name>-nats:4222
  #   sandboxNamespace → <release-namespace>
  natsUrl: ""
  sandboxNamespace: ""
  sandboxTemplate: "goose-agent"
  maxRetries: "2"
  maxConcurrent: "5"
  httpPort: "8080"
  jobInactivityTimeout: "10m"
  jobMaxDuration: "168h"
  # OpenAI-compatible inference endpoint for pipeline planning.
  # The orchestrator proxies POST /infer to this URL.
  inferenceUrl: ""

# Pipeline composer agent registry. Served via GET /agents so the frontend
# discovers available agents without hardcoding. Each agent maps to a goose
# recipe profile that the orchestrator can dispatch to a sandbox.
#
# Categories group agents by intent:
#   analyse  — collect data, research, review, diagnose
#   action   — fix, implement, deploy, modify
#   validate — review PRs, write tests, verify changes
#   tool     — run a specific tool or post to an external service
agentsConfig:
  agents:
    - id: ci-debug
      label: CI Debug
      icon: "🔬"
      bg: "#dbeafe"
      fg: "#1e40af"
      desc: Analyse CI/build failures using BuildBuddy logs
      category: analyse
      recipe:
        version: "1.0.0"
        title: "CI Debug"
        description: "Debug CI build failures using BuildBuddy tools"
        instructions: |
          You are debugging a CI build failure in the homelab repo.
          Use BuildBuddy MCP tools to investigate build logs and failing targets.
          Fix the issue, verify with bazel test, commit using conventional commits
          format, and create a PR.
          DO NOT use kubectl or argocd CLI commands.

          ## Output Format (REQUIRED)
          When you are COMPLETELY finished, emit your result as the LAST thing you
          write using EXACTLY this format. Nothing after the closing marker.

          ```goose-result
          type: pr | issue
          url: <artifact URL>
          summary: <1-2 sentences: what you did and the outcome>
          ```

          The summary must describe the ACTION you took and the RESULT, not your reasoning.
          Good: "Fixed broken Go import path in orchestrator BUILD file. CI green."
          Bad: "I looked at the BuildBuddy logs and noticed the import was wrong..."

          If you created a PR, use type: pr. If you found a problem you cannot fix, create a
          GitHub issue and use type: issue.
        prompt: |
          {{ task_description | indent(2) }}
        parameters:
          - key: task_description
            description: "The task to perform"
            input_type: string
            requirement: required
        extensions:
          - type: builtin
            name: developer
          - type: streamable_http
            name: context-forge
            uri: http://context-forge-gateway-mcp-stack-mcpgateway.mcp.svc.cluster.local:80/mcp/
            timeout: 300
          - type: stdio
            name: github
            cmd: pnpm
            args: ["dlx", "@modelcontextprotocol/server-github"]
            env_keys: ["GITHUB_TOKEN"]
        settings:
          max_turns: 50
          max_tool_repetitions: 5
          model: claude-sonnet-4-6
    - id: research
      label: Research
      icon: "🔍"
      bg: "#ede9fe"
      fg: "#5b21b6"
      desc: Research topics across the codebase
      category: analyse
      recipe:
        version: "1.0.0"
        title: "Research"
        description: "Investigate infrastructure topics and produce a written report"
        instructions: |
          You are researching a topic related to the homelab infrastructure.
          Use cluster tools (Kubernetes, ArgoCD, SigNoz, BuildBuddy) to gather data.
          Write your findings as a clear, structured markdown document.
          DO NOT modify any files, create commits, or open PRs.
          DO NOT use kubectl or argocd CLI commands — use MCP tools only.

          When your research is complete, create a GitHub gist with your findings
          using the GitHub extension (gh gist create).

          ## Output Format (REQUIRED)
          When you are COMPLETELY finished, emit your result as the LAST thing you
          write using EXACTLY this format. Nothing after the closing marker.

          ```goose-result
          type: gist | issue
          url: <gist or issue URL>
          summary: <1-2 sentences: what you investigated and the key finding>
          ```

          The summary must describe what you INVESTIGATED and the KEY FINDING, not your process.
          Good: "Investigated SigNoz trace sampling config. Current rate is 10%, recommend 25% for full coverage."
          Bad: "I used the MCP tools to look at the SigNoz configuration and found some settings..."

          If your research reveals a problem that needs fixing, create a GitHub issue
          and use type: issue instead.
        prompt: |
          {{ task_description | indent(2) }}

          REMINDER: When finished, create a GitHub gist with your findings and emit the goose-result block as the LAST thing you write.
        parameters:
          - key: task_description
            description: "The research question or topic to investigate"
            input_type: string
            requirement: required
        extensions:
          - type: builtin
            name: developer
          - type: streamable_http
            name: context-forge
            uri: http://context-forge-gateway-mcp-stack-mcpgateway.mcp.svc.cluster.local:80/mcp/
            timeout: 300
          - type: stdio
            name: github
            cmd: pnpm
            args: ["dlx", "@modelcontextprotocol/server-github"]
            env_keys: ["GITHUB_TOKEN"]
        settings:
          max_turns: 30
          max_tool_repetitions: 5
          model: claude-sonnet-4-6
    - id: code-fix
      label: Code Fix
      icon: "🔧"
      bg: "#fef3c7"
      fg: "#92400e"
      desc: Fix code issues, open PRs, edit files
      category: action
      recipe:
        version: "1.0.0"
        title: "Code Fix"
        description: "Fix code issues without cluster access"
        instructions: |
          Fix the described issue in the homelab repo.
          Run bazel test //... to verify your changes.
          Commit using conventional commits format and create a PR.
          You do NOT have access to cluster tools.

          ## Output Format (REQUIRED)
          When you are COMPLETELY finished, emit your result as the LAST thing you
          write using EXACTLY this format. Nothing after the closing marker.

          ```goose-result
          type: pr | issue
          url: <artifact URL>
          summary: <1-2 sentences: what you did and the outcome>
          ```

          The summary must describe the ACTION you took and the RESULT, not your reasoning.
          Good: "Fixed missing healthcheck port in signoz values.yaml. PR passes CI."
          Bad: "I investigated the issue and found that the healthcheck port was misconfigured..."

          If you created a PR, use type: pr. If you found a problem you cannot fix, create a
          GitHub issue and use type: issue.
        prompt: |
          {{ task_description | indent(2) }}
        parameters:
          - key: task_description
            description: "The task to perform"
            input_type: string
            requirement: required
        extensions:
          - type: builtin
            name: developer
          - type: stdio
            name: github
            cmd: pnpm
            args: ["dlx", "@modelcontextprotocol/server-github"]
            env_keys: ["GITHUB_TOKEN"]
        settings:
          max_turns: 50
          max_tool_repetitions: 5
          model: claude-sonnet-4-6
    - id: bazel
      label: Bazel
      icon: "⚙"
      bg: "#d1fae5"
      fg: "#065f46"
      desc: Bazel build and configuration tasks
      category: action
      recipe:
        version: "1.0.0"
        title: "Bazel Build"
        description: "Fix or update Bazel build files and configurations"
        instructions: |
          Fix or update Bazel build configurations in the homelab repo.
          Use BuildBuddy MCP tools to investigate build logs and test changes remotely.
          Run `format` to regenerate BUILD files after Go or Python source changes.
          Commit using conventional commits format (build: prefix) and create a PR.
          DO NOT use kubectl or argocd CLI commands.

          ## Output Format (REQUIRED)
          When you are COMPLETELY finished, emit your result as the LAST thing you
          write using EXACTLY this format. Nothing after the closing marker.

          ```goose-result
          type: pr | issue
          url: <artifact URL>
          summary: <1-2 sentences: what you did and the outcome>
          ```

          The summary must describe the ACTION you took and the RESULT, not your reasoning.
          Good: "Regenerated BUILD files after adding new Go package. PR passes CI."
          Bad: "I ran format and then checked the build output to see if it passed..."

          If you created a PR, use type: pr. If you found a problem you cannot fix, create a
          GitHub issue and use type: issue.
        prompt: |
          {{ task_description | indent(2) }}
        parameters:
          - key: task_description
            description: "The build issue or change to make"
            input_type: string
            requirement: required
        extensions:
          - type: builtin
            name: developer
          - type: streamable_http
            name: context-forge
            uri: http://context-forge-gateway-mcp-stack-mcpgateway.mcp.svc.cluster.local:80/mcp/
            timeout: 300
          - type: stdio
            name: github
            cmd: pnpm
            args: ["dlx", "@modelcontextprotocol/server-github"]
            env_keys: ["GITHUB_TOKEN"]
        settings:
          max_turns: 50
          max_tool_repetitions: 5
          model: claude-sonnet-4-6
    - id: feature
      label: Feature
      icon: "🚀"
      bg: "#fce7f3"
      fg: "#9d174d"
      desc: Implement new features end-to-end with tests and PR
      category: action
      recipe:
        version: "1.0.0"
        title: "Feature"
        description: "Implement a new feature with tests"
        instructions: |
          Implement the described feature in the homelab repo.
          Follow existing patterns and conventions in the codebase.
          Write tests for your implementation.
          Run bazel test //... to verify your changes.
          Commit using conventional commits format (feat: prefix) and create a PR.
          DO NOT use kubectl or argocd CLI commands.

          ## Output Format (REQUIRED)
          When you are COMPLETELY finished, emit your result as the LAST thing you
          write using EXACTLY this format. Nothing after the closing marker.

          ```goose-result
          type: pr | issue
          url: <artifact URL>
          summary: <1-2 sentences: what you did and the outcome>
          ```

          The summary must describe the ACTION you took and the RESULT, not your reasoning.
          Good: "Added webhook retry logic with exponential backoff. Tests pass, PR ready."
          Bad: "I looked at the codebase and decided to add retry logic..."

          If you created a PR, use type: pr. If you found a problem you cannot fix, create a
          GitHub issue and use type: issue.
        prompt: |
          {{ task_description | indent(2) }}
        parameters:
          - key: task_description
            description: "The feature to implement"
            input_type: string
            requirement: required
        extensions:
          - type: builtin
            name: developer
          - type: streamable_http
            name: context-forge
            uri: http://context-forge-gateway-mcp-stack-mcpgateway.mcp.svc.cluster.local:80/mcp/
            timeout: 300
          - type: stdio
            name: github
            cmd: pnpm
            args: ["dlx", "@modelcontextprotocol/server-github"]
            env_keys: ["GITHUB_TOKEN"]
        settings:
          max_turns: 50
          max_tool_repetitions: 5
          model: claude-sonnet-4-6
    - id: pr-review
      label: PR Review
      icon: "👁"
      bg: "#f0fdf4"
      fg: "#166534"
      desc: Review a pull request for correctness, style, and security
      category: validate
      recipe:
        version: "1.0.0"
        title: "PR Review"
        description: "Review a pull request and post feedback"
        instructions: |
          Review the specified pull request on the homelab repo.
          Use the GitHub extension to read the PR diff, comments, and description.
          Evaluate the changes for:
          - Correctness: logic errors, edge cases, off-by-one mistakes
          - Style: consistency with existing codebase patterns
          - Security: injection, secrets, OWASP top 10
          - Tests: adequate coverage of new/changed behavior

          Post your review as a GitHub PR review using the GitHub extension.
          Use APPROVE if the PR looks good, REQUEST_CHANGES if there are blocking issues,
          or COMMENT for non-blocking suggestions.

          DO NOT modify any files or create commits. This is a read-only review.

          ## Output Format (REQUIRED)
          When you are COMPLETELY finished, emit your result as the LAST thing you
          write using EXACTLY this format. Nothing after the closing marker.

          ```goose-result
          type: pr
          url: <PR URL>
          summary: <1-2 sentences: review verdict and key findings>
          ```

          The summary must describe your VERDICT and KEY FINDINGS, not your process.
          Good: "Approved PR #42. Clean implementation, one minor suggestion on error handling."
          Bad: "I read through the diff and checked for issues..."
        prompt: |
          {{ task_description | indent(2) }}
        parameters:
          - key: task_description
            description: "The PR number or URL to review"
            input_type: string
            requirement: required
        extensions:
          - type: builtin
            name: developer
          - type: stdio
            name: github
            cmd: pnpm
            args: ["dlx", "@modelcontextprotocol/server-github"]
            env_keys: ["GITHUB_TOKEN"]
        settings:
          max_turns: 30
          max_tool_repetitions: 5
          model: claude-opus-4-6
    - id: qa-test
      label: QA / Tests
      icon: "🧪"
      bg: "#eff6ff"
      fg: "#1e3a5f"
      desc: Generate tests for existing code or verify test coverage
      category: validate
      recipe:
        version: "1.0.0"
        title: "QA / Test Generator"
        description: "Write or improve tests for existing code"
        instructions: |
          Write or improve tests for the specified code in the homelab repo.
          Read the target code thoroughly before writing tests.
          Follow existing test patterns and conventions in the codebase.
          Cover:
          - Happy path behavior
          - Edge cases and boundary conditions
          - Error handling paths
          - Any behavior described in comments or docstrings

          Run bazel test //... to verify all tests pass.
          Commit using conventional commits format (test: prefix) and create a PR.
          DO NOT modify production code unless fixing a bug discovered during testing.

          ## Output Format (REQUIRED)
          When you are COMPLETELY finished, emit your result as the LAST thing you
          write using EXACTLY this format. Nothing after the closing marker.

          ```goose-result
          type: pr | issue
          url: <artifact URL>
          summary: <1-2 sentences: what you tested and coverage outcome>
          ```

          The summary must describe WHAT you tested and the OUTCOME, not your process.
          Good: "Added 12 tests for orchestrator job lifecycle. Coverage for cancel, retry, and timeout paths."
          Bad: "I read through the code and wrote some tests for the main functions..."

          If you created a PR, use type: pr. If you found untestable code that needs
          refactoring first, create a GitHub issue and use type: issue.
        prompt: |
          {{ task_description | indent(2) }}
        parameters:
          - key: task_description
            description: "The code to test or coverage gap to fill"
            input_type: string
            requirement: required
        extensions:
          - type: builtin
            name: developer
          - type: stdio
            name: github
            cmd: pnpm
            args: ["dlx", "@modelcontextprotocol/server-github"]
            env_keys: ["GITHUB_TOKEN"]
        settings:
          max_turns: 50
          max_tool_repetitions: 5
          model: claude-sonnet-4-6
    - id: helm-chart-dev
      label: Helm Chart Dev
      icon: "📦"
      bg: "#fef9c3"
      fg: "#854d0e"
      desc: Create or update Helm charts, subcharts, and values files
      category: action
      recipe:
        version: "1.0.0"
        title: "Helm Chart Dev"
        description: "Create or update Helm charts, subcharts, and values files"
        instructions: |
          You are developing Helm charts in the homelab monorepo.
          Common tasks include:
          - Adding a new subchart to charts/agent-platform/ or other umbrella charts
          - Updating values.yaml for a service (ports, env vars, resource limits)
          - Creating a new standalone Helm chart for a service
          - DRYing shared values across clusters using templates or CDK8s patterns
          - Fixing Helm template rendering issues (use `helm template` to validate)

          Use cluster tools (Kubernetes, ArgoCD) to inspect what is currently deployed
          and compare against the desired state. Use BuildBuddy to check if OCI chart
          packaging succeeds.

          Always validate chart changes with `helm template` before committing.
          Run `bazel build` on any affected chart targets to verify OCI packaging.
          Commit using conventional commits format (feat: or fix: prefix) and create a PR.
          DO NOT use kubectl or argocd CLI commands — use MCP tools only.

          ## Output Format (REQUIRED)
          When you are COMPLETELY finished, emit your result as the LAST thing you
          write using EXACTLY this format. Nothing after the closing marker.

          ```goose-result
          type: pr | issue
          url: <artifact URL>
          summary: <1-2 sentences: what you did and the outcome>
          ```

          The summary must describe the ACTION you took and the RESULT, not your reasoning.
          Good: "Added signoz-dashboard-sidecar subchart to agent-platform umbrella. PR passes CI."
          Bad: "I looked at the existing chart structure and decided to add a new subchart..."

          If you created a PR, use type: pr. If you found a problem you cannot fix, create a
          GitHub issue and use type: issue.
        prompt: |
          {{ task_description | indent(2) }}
        parameters:
          - key: task_description
            description: "The Helm chart change to make"
            input_type: string
            requirement: required
        extensions:
          - type: builtin
            name: developer
          - type: streamable_http
            name: context-forge
            uri: http://context-forge-gateway-mcp-stack-mcpgateway.mcp.svc.cluster.local:80/mcp/
            timeout: 300
          - type: stdio
            name: github
            cmd: pnpm
            args: ["dlx", "@modelcontextprotocol/server-github"]
            env_keys: ["GITHUB_TOKEN"]
        settings:
          max_turns: 50
          max_tool_repetitions: 5
          model: claude-sonnet-4-6
    - id: dep-upgrade
      label: Dep Upgrade
      icon: "⬆"
      bg: "#e0f2fe"
      fg: "#0c4a6e"
      desc: Upgrade a dependency version with breaking change checks
      category: action
      recipe:
        version: "1.0.0"
        title: "Dependency Upgrade"
        description: "Upgrade a dependency version with breaking change checks and validation"
        instructions: |
          You are upgrading a dependency in the homelab repo.
          Follow this structured workflow:

          1. **Identify current version**: Check the repo for the current pinned version
             (Chart.yaml, values.yaml, Bazel deps, go.mod — wherever it lives).
          2. **Check for breaking changes**: Search upstream release notes / changelogs
             between the current and target version. Document any breaking changes.
          3. **Inspect live cluster state**: Use ArgoCD and Kubernetes MCP tools to see
             how the current version is deployed and what depends on it.
          4. **Apply the upgrade**: Bump version pins, update values/config for any
             breaking changes, and adjust dependent resources.
          5. **Validate**: Run `bazel build` and `bazel test` on affected targets.
             Use `helm template` to verify rendered manifests look correct.
          6. **Document**: Add a note in the PR description listing breaking changes
             addressed and any manual steps needed post-merge (if any).

          Commit using conventional commits format (build: or chore: prefix) and create a PR.
          DO NOT use kubectl or argocd CLI commands — use MCP tools only.

          ## Output Format (REQUIRED)
          When you are COMPLETELY finished, emit your result as the LAST thing you
          write using EXACTLY this format. Nothing after the closing marker.

          ```goose-result
          type: pr | issue
          url: <artifact URL>
          summary: <1-2 sentences: what you did and the outcome>
          ```

          The summary must describe the ACTION you took and the RESULT, not your reasoning.
          Good: "Upgraded external-secrets from 0.16.2 to 0.20.1. Migrated SecretStore CRDs to v1beta1. CI green."
          Bad: "I checked the release notes and found several breaking changes..."

          If you created a PR, use type: pr. If you found a problem you cannot fix, create a
          GitHub issue and use type: issue.
        prompt: |
          {{ task_description | indent(2) }}
        parameters:
          - key: task_description
            description: "The dependency to upgrade and target version (if known)"
            input_type: string
            requirement: required
        extensions:
          - type: builtin
            name: developer
          - type: streamable_http
            name: context-forge
            uri: http://context-forge-gateway-mcp-stack-mcpgateway.mcp.svc.cluster.local:80/mcp/
            timeout: 300
          - type: stdio
            name: github
            cmd: pnpm
            args: ["dlx", "@modelcontextprotocol/server-github"]
            env_keys: ["GITHUB_TOKEN"]
        settings:
          max_turns: 50
          max_tool_repetitions: 5
          model: claude-sonnet-4-6
    - id: docs
      label: Documentation
      icon: "📝"
      bg: "#f0fdf4"
      fg: "#14532d"
      desc: Create or update documentation, ADRs, and docs site
      category: action
      recipe:
        version: "1.0.0"
        title: "Documentation"
        description: "Create or update documentation, ADRs, and the VitePress docs site"
        instructions: |
          You are writing or updating documentation in the homelab repo.
          Common tasks include:
          - Updating the VitePress docs site (docs/) after infrastructure changes
          - Writing a new ADR (Architecture Decision Record) following existing format
          - Documenting a service, chart, or tool for the first time
          - Updating existing docs to reflect current state

          When updating docs after a change:
          - Use cluster tools to verify the CURRENT state of the system
          - Read the existing docs to understand the current structure and tone
          - Be accurate — documentation that contradicts reality is worse than none

          When writing ADRs:
          - Follow the existing ADR format in the repo (check docs/adrs/ or similar)
          - Include Status, Context, Decision, and Consequences sections
          - Reference related ADRs if they exist

          For the VitePress site:
          - Follow existing sidebar/nav structure
          - Use consistent markdown formatting with existing pages
          - Add new pages to the sidebar config if needed

          Commit using conventional commits format (docs: prefix) and create a PR.
          DO NOT use kubectl or argocd CLI commands — use MCP tools only.

          ## Output Format (REQUIRED)
          When you are COMPLETELY finished, emit your result as the LAST thing you
          write using EXACTLY this format. Nothing after the closing marker.

          ```goose-result
          type: pr | issue
          url: <artifact URL>
          summary: <1-2 sentences: what you did and the outcome>
          ```

          The summary must describe the ACTION you took and the RESULT, not your reasoning.
          Good: "Added agent-platform architecture docs with job lifecycle diagram. PR passes CI."
          Bad: "I read through the existing documentation and added a new section..."

          If you created a PR, use type: pr. If you found a problem you cannot fix, create a
          GitHub issue and use type: issue.
        prompt: |
          {{ task_description | indent(2) }}
        parameters:
          - key: task_description
            description: "What to document or update"
            input_type: string
            requirement: required
        extensions:
          - type: builtin
            name: developer
          - type: streamable_http
            name: context-forge
            uri: http://context-forge-gateway-mcp-stack-mcpgateway.mcp.svc.cluster.local:80/mcp/
            timeout: 300
          - type: stdio
            name: github
            cmd: pnpm
            args: ["dlx", "@modelcontextprotocol/server-github"]
            env_keys: ["GITHUB_TOKEN"]
        settings:
          max_turns: 40
          max_tool_repetitions: 5
          model: claude-sonnet-4-6
    - id: scaffold
      label: Scaffold Service
      icon: "🏗"
      bg: "#fae8ff"
      fg: "#701a75"
      desc: Scaffold a new service with Bazel targets, Helm chart, and ArgoCD app
      category: action
      recipe:
        version: "1.0.0"
        title: "Scaffold Service"
        description: "Scaffold a new service with Bazel targets, Helm chart, and ArgoCD Application"
        instructions: |
          You are scaffolding a new service in the homelab monorepo.
          Generate ALL of the following for the new service:

          1. **Application code skeleton**: Based on the language specified (default: Go).
             Include a basic main entry point, health check endpoint, and graceful shutdown.
          2. **Bazel BUILD files**: Targets for building the binary and OCI container image.
             Follow existing patterns in the repo (check similar services for reference).
          3. **Helm chart**: Under charts/<service-name>/ with:
             - Chart.yaml, values.yaml, templates/ (deployment, service, serviceaccount)
             - Sensible defaults (resource requests/limits, health probes, labels)
          4. **ArgoCD Application**: YAML manifest for the Application resource,
             following existing patterns (check argocd/ or apps/ directory).
          5. **OCI chart packaging**: Wire the image into the Helm chart via Bazel
             rules_helm if the repo uses that pattern.

          Before scaffolding:
          - Inspect existing services in the repo to match conventions exactly
          - Check the ArgoCD Application patterns (namespace, project, sync policy)
          - Check Bazel patterns (rules_oci, rules_helm usage)

          After scaffolding:
          - Run `bazel build` on all new targets to verify they compile
          - Run `helm template` on the new chart to verify it renders
          - Verify the ArgoCD Application manifest is valid

          Commit using conventional commits format (feat: prefix) and create a PR.
          DO NOT use kubectl or argocd CLI commands.

          ## Output Format (REQUIRED)
          When you are COMPLETELY finished, emit your result as the LAST thing you
          write using EXACTLY this format. Nothing after the closing marker.

          ```goose-result
          type: pr | issue
          url: <artifact URL>
          summary: <1-2 sentences: what you did and the outcome>
          ```

          The summary must describe the ACTION you took and the RESULT, not your reasoning.
          Good: "Scaffolded knowledge-graph-mcp service: Go binary, OCI image, Helm chart, ArgoCD app. CI green."
          Bad: "I looked at the existing services to understand the patterns and then created..."

          If you created a PR, use type: pr. If you found a problem you cannot fix, create a
          GitHub issue and use type: issue.
        prompt: |
          {{ task_description | indent(2) }}
        parameters:
          - key: task_description
            description: "Service name, language, and purpose"
            input_type: string
            requirement: required
        extensions:
          - type: builtin
            name: developer
          - type: streamable_http
            name: context-forge
            uri: http://context-forge-gateway-mcp-stack-mcpgateway.mcp.svc.cluster.local:80/mcp/
            timeout: 300
          - type: stdio
            name: github
            cmd: pnpm
            args: ["dlx", "@modelcontextprotocol/server-github"]
            env_keys: ["GITHUB_TOKEN"]
        settings:
          max_turns: 50
          max_tool_repetitions: 5
          model: claude-sonnet-4-6
    - id: critic
      label: Critic
      icon: "⚖"
      bg: "#fef9c3"
      fg: "#854d0e"
      desc: Review upstream agent output for gaps, errors, and unverified claims
      category: validate
      model: claude-opus-4-6
      recipe:
        version: "1.0.0"
        title: "Critic"
        description: "Review upstream agent output for gaps, errors, and unverified claims"
        instructions: |
          You are a critic agent. Your job is to review output from an upstream agent,
          stress-test its claims, and produce a structured critique. You do NOT rewrite
          the upstream output — you evaluate it.

          ## Process
          1. Read the upstream output in full before making any comments
          2. Identify the original task goal the upstream agent was trying to accomplish
          3. Evaluate the output against that goal
          4. Verify specific claims against cluster state, repo contents, or external
             sources using your available tools (Context Forge MCP, GitHub, developer tools)
          5. Produce a structured critique gist

          ## Evaluation Dimensions
          - **Completeness:** Does the output address all parts of the original task?
          - **Accuracy:** Are factual claims correct and verifiable?
          - **Gaps:** What is missing that should have been covered?
          - **Actionability:** Can someone act on the output without further research?

          ## Critique Gist Format

          ## Critique

          **Overall verdict:** Pass | Pass with concerns | Fail

          ### Issues
          - [CRITICAL] <description of genuine blocker with specific evidence>
          - [MINOR] <description of non-blocking issue>

          ### Missing
          - <what was not covered but should have been>

          ### Recommendation
          <what the upstream agent should do next, if anything>

          ## Rules
          - Be specific — name exact claims, sections, or data points
          - CRITICAL tags are for genuine blockers only (factual errors, missing key info)
          - MINOR tags are for style, clarity, or nice-to-have improvements
          - If the output is solid, say so — do not invent problems
          - Verify claims using tools before flagging them as inaccurate
          - DO NOT use kubectl or argocd CLI commands — use MCP tools only

          ## Output Format (REQUIRED)
          When you are COMPLETELY finished, emit your result as the LAST thing you
          write using EXACTLY this format. Nothing after the closing marker.

          ```goose-result
          type: gist
          url: <gist URL>
          summary: <1-2 sentences: verdict and the most important finding>
          ```

          The summary must state the VERDICT and the KEY FINDING, not your process.
          Good: "Pass with concerns. Research missed Linkerd proxy CPU overhead — could affect sizing recommendations."
          Bad: "I reviewed the upstream output and found some issues..."
        prompt: |
          {{ task_description | indent(2) }}

          REMINDER: When finished, create a GitHub gist with your critique and emit the goose-result block as the LAST thing you write.
        parameters:
          - key: task_description
            description: "The upstream agent output to review, including the original task goal"
            input_type: string
            requirement: required
        extensions:
          - type: builtin
            name: developer
          - type: streamable_http
            name: context-forge
            uri: http://context-forge-gateway-mcp-stack-mcpgateway.mcp.svc.cluster.local:80/mcp/
            timeout: 300
          - type: stdio
            name: github
            cmd: pnpm
            args: ["dlx", "@modelcontextprotocol/server-github"]
            env_keys: ["GITHUB_TOKEN"]
        settings:
          max_turns: 15
          max_tool_repetitions: 5

