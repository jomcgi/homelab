replicaCount: 1

image:
  repository: ghcr.io/jomcgi/homelab/projects/agent_platform/orchestrator
  tag: main
  pullPolicy: IfNotPresent

imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

config:
  # natsUrl and sandboxNamespace are auto-derived from Helm release metadata
  # when left empty (the default). Only set these explicitly when deploying
  # NATS or sandboxes outside this Helm release.
  #   natsUrl          → nats://<release-name>-nats:4222
  #   sandboxNamespace → <release-namespace>
  natsUrl: ""
  sandboxNamespace: ""
  sandboxTemplate: "goose-agent"
  maxRetries: "2"
  maxConcurrent: "5"
  httpPort: "8080"
  jobInactivityTimeout: "10m"
  jobMaxDuration: "168h"
  reconcileInterval: "60s"
  inferenceUrl: ""

httpRoute:
  enabled: false
  hostname: ""
  gatewayRef:
    name: ""
    namespace: ""

nodeSelector: {}
tolerations: []
affinity: {}
