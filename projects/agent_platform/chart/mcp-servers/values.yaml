# Shared translate sidecar image (upstream IBM mcp-context-forge).
# Used when a server runs in stdio-to-HTTP translate mode.
translate:
  image:
    repository: ghcr.io/ibm/mcp-context-forge
    tag: v1.0.0-RC1
    pullPolicy: IfNotPresent

# Context Forge gateway URL + credentials for post-install registration jobs.
gateway:
  url: "" # REQUIRED when any server has registration.enabled: true
  secret:
    name: context-forge-gateway
    itemPath: "vaults/k8s-homelab/items/context-forge"

# ArgoCD Image Updater defaults for digest write-back.
imageUpdater:
  gitRepository: "https://github.com/jomcgi/homelab.git"
  gitBranch: "main"
  gitSecret: "argocd/argocd-image-updater-token"
  applicationName: "" # ArgoCD Application name (defaults to release name)
  writeBackTarget: "" # required if any server has imageUpdater.enabled: true

# MCP servers to deploy.
# Use a LIST (not a map/dict) so ArgoCD Image Updater write-back can address
# entries by index: servers[N].image.tag.
#
# Minimal native-HTTP server example:
#   servers:
#     - name: my-mcp-server
#       image:
#         repository: ghcr.io/example/my-mcp-server
#         tag: "v1.0.0"
#       port: 8080
#       args: []
#       env: []
#       secret:               # optional: 1Password-managed Secret (envFrom)
#         name: my-secret
#         itemPath: "vaults/k8s-homelab/items/my-secret"
#       writableTmp: false
#       rbac:
#         clusterRoleRules: []
#         clusterRole: ""
#       resources: {}
#       podAnnotations: {}
#       networkPolicy:        # optional: per-server NetworkPolicy rules
#         ingress:            # raw K8s NetworkPolicyIngressRule list
#           - from:
#               - namespaceSelector:
#                   matchLabels:
#                     kubernetes.io/metadata.name: argocd
#             ports:
#               - { protocol: TCP, port: 8080 }
#         egress:             # raw K8s NetworkPolicyEgressRule list
#           - to:
#               - namespaceSelector:
#                   matchLabels:
#                     kubernetes.io/metadata.name: argocd
#             ports:
#               - { protocol: TCP, port: 8080 }
#       registration:         # optional: post-install Context Forge registration
#         enabled: false
#         transport: STREAMABLEHTTP
#       imageUpdater:         # optional: ArgoCD Image Updater digest pin
#         enabled: false
#         strategy: digest
#         forceUpdate: false
#
# Translate-mode (stdio → HTTP) example:
#   servers:
#     - name: stdio-mcp-server
#       translate:
#         enabled: true
#         command: "uvx my-mcp-server"
#         port: 8080
#         resources: {}
#       writableTmp: true
#       env: []
#       secret:
#         name: my-secret
#         itemPath: "vaults/k8s-homelab/items/my-secret"
#       registration:
#         enabled: true
#         transport: STREAMABLEHTTP
servers: []
