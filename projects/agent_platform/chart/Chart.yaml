apiVersion: v2
name: agent-platform
description: Agent platform — umbrella chart bundling goose sandboxes and supporting components
type: application
version: 0.36.0
appVersion: "0.2.0"
annotations:
  org.opencontainers.image.source: "https://github.com/jomcgi/homelab"
  org.opencontainers.image.url: "https://github.com/jomcgi/homelab/tree/main/projects/agent_platform/chart"
  org.opencontainers.image.licenses: "MPL-2.0"
dependencies:
  - name: goose-sandboxes
    version: "0.1.0"
    repository: "file://./sandboxes"
    condition: goose-sandboxes.enabled

  - name: agent-orchestrator
    version: "0.12.0"
    repository: "file://./orchestrator"
    condition: agent-orchestrator.enabled

  - name: nats
    version: "2.12.3"
    repository: "https://nats-io.github.io/k8s/helm/charts/"
    condition: nats.enabled

  - name: agent-sandbox
    version: "0.1.0"
    repository: "file://./agent-sandbox"
    condition: agent-sandbox.enabled
