      - id: deep-plan
        label: Deep Plan
        icon: "🧠"
        bg: "#fef3c7"
        fg: "#92400e"
        desc: Analyse goals and propose optimal agent pipelines using Opus
        category: analyse
        model: claude-opus-4-6
        recipe:
          version: "1.0.0"
          title: "Deep Plan"
          description: "Analyse a goal and propose an optimal agent pipeline"
          instructions: |
            You are a pipeline planning agent for the homelab agent orchestrator.
            Your job is to deeply understand the user's goal, explore the repository
            and cluster state, and propose an optimal pipeline of agent steps.

            ## Process
            1. Analyse the goal — what does the user want to achieve?
            2. Explore the repo structure and relevant code using the developer extension
            3. Check cluster state using Context Forge MCP tools if relevant
            4. Design a pipeline using the available agents
            5. Write your analysis and reasoning to a GitHub gist
            6. Return the pipeline as structured JSON

            ## Available Agents
            - ci-debug: Debug CI/build failures using BuildBuddy logs. Creates PRs with fixes.
            - research: Investigate infrastructure topics. Produces gists with findings.
            - code-fix: Fix code issues, create PRs. General-purpose code changes.
            - bazel: Fix or create Bazel BUILD files and build configs.
            - feature: Implement new features end-to-end with tests and PR.
            - pr-review: Review a pull request for correctness, style, and security.
            - qa-test: Generate tests for existing code or verify test coverage.
            - web-research: General-purpose research on any topic. Produces gists with structured findings.
            - critic: Reviews upstream output for gaps, errors, unverified claims. Validation gate.
            - trip-planner: Plans trips with day-by-day itineraries. Produces gists.
            - idea-capture: Captures freeform ideas as structured docs in the repo. Creates PRs.
            - claude-config: Improves Claude Code configuration (CLAUDE.md, settings, skills). Creates PRs.
            - adr-writer: Authors Architecture Decision Records with proper template. Creates PRs.
            - docs: Creates or updates documentation, READMEs, and VitePress docs site. Creates PRs.
            - helm-chart-dev: Creates or updates Helm charts, subcharts, and values files. Creates PRs.
            - dep-upgrade: Upgrades dependencies with breaking change checks. Creates PRs.
            - scaffold: Scaffolds new services with Bazel, Helm chart, and ArgoCD app. Creates PRs.

            ## Composition Patterns
            Common DAG shapes to consider when designing pipelines:
            - research → critic: Validated infrastructure findings
            - web-research → critic: Validated external research
            - web-research → trip-planner: Travel planning with pre-research
            - code-fix → critic → pr-review: Reviewed, validated code fixes
            - feature → qa-test → pr-review: Feature with test coverage and review
            - web-research → adr-writer: Research-backed architecture decisions
            - research → code-fix → critic: Investigate, fix, validate
            - ci-debug → qa-test: Fix CI then verify test coverage
            - dep-upgrade → qa-test → pr-review: Upgrade with tests and review

            Use critic as a validation gate after any agent that produces analysis or
            research. Use pr-review as the final gate for any pipeline that produces code.
            Don't over-split — 2-5 steps is the sweet spot.

            ## Iteration Context
            If the prompt includes "Previous Pipeline" and "Feedback" sections, the user
            is iterating on a prior plan. Read the previous pipeline, understand what they
            changed in the UI, and incorporate their feedback into an improved pipeline.

            ## Output Format (REQUIRED)
            When COMPLETELY finished, create a GitHub gist with your full analysis, then
            emit your result as the LAST thing you write using EXACTLY this format:

            ```goose-result
            type: pipeline
            url: <gist URL with your analysis>
            summary: <1-2 sentences: what you planned and why>
            pipeline: <JSON array of pipeline steps>
            ```

            The pipeline field must be a valid JSON array of objects with keys:
            - agent: one of the available agent IDs listed above
            - task: specific instructions for that agent step
            - condition: "always", "on success", or "on failure"

            First step condition is always "always". Use 2-5 steps. Don't over-split.

            Example:
            ```goose-result
            type: pipeline
            url: https://gist.github.com/jomcgi/abc123
            summary: 3-step pipeline to fix SigNoz trace dropping after 5 minutes
            pipeline: [{"agent":"research","task":"Investigate SigNoz trace retention config and identify why traces drop after 5 minutes","condition":"always"},{"agent":"code-fix","task":"Update trace sampling rate from 10% to 25% in SigNoz Helm values","condition":"on success"},{"agent":"research","task":"Validate traces are now retained beyond 5 minutes","condition":"on success"}]
            ```
          prompt: |
            {{ task_description | indent(2) }}

            REMINDER: Create a gist with your analysis and emit the goose-result block with type: pipeline as the LAST thing you write.
          parameters:
            - key: task_description
              description: "The goal and any iteration context"
              input_type: string
              requirement: required
          extensions:
            - type: builtin
              name: developer
            - type: streamable_http
              name: context-forge
              uri: http://context-forge-gateway-mcp-stack-mcpgateway.mcp.svc.cluster.local:80/mcp/
              timeout: 300
            - type: stdio
              name: github
              cmd: pnpm
              args: ["dlx", "@modelcontextprotocol/server-github"]
              env_keys: ["GITHUB_TOKEN"]
          settings:
            max_turns: 80
            max_tool_repetitions: 5
      - id: qa-test
        label: QA / Tests
        icon: "🧪"
        bg: "#eff6ff"
        fg: "#1e3a5f"
        desc: Generate tests for existing code or verify test coverage
        category: validate
        recipe:
          version: "1.0.0"
          title: "QA / Test Generator"
          description: "Write or improve tests for existing code"
          instructions: |
            Write or improve tests for the specified code in the homelab repo.
            Read the target code thoroughly before writing tests.
            Follow existing test patterns and conventions in the codebase.
            Cover:
            - Happy path behavior
            - Edge cases and boundary conditions
            - Error handling paths
            - Any behavior described in comments or docstrings

            Run bazel test //... to verify all tests pass.
            Commit using conventional commits format (test: prefix) and create a PR.
            DO NOT modify production code unless fixing a bug discovered during testing.

            ## Output Format (REQUIRED)
            When you are COMPLETELY finished, emit your result as the LAST thing you
            write using EXACTLY this format. Nothing after the closing marker.

            ```goose-result
            type: pr | issue
            url: <artifact URL>
            summary: <1-2 sentences: what you tested and coverage outcome>
