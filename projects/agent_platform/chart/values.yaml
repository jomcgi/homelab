            - type: stdio
              name: github
              cmd: pnpm
              args: ["dlx", "@modelcontextprotocol/server-github"]
              env_keys: ["GITHUB_TOKEN"]
          settings:
            max_turns: 30
            max_tool_repetitions: 5
