# ── Agent Platform Umbrella Chart ─────────────────────────────────────────────
# Default values for the agent-platform umbrella chart.
# All image references and config defaults live here so the packaged chart is
# self-contained. Environment-specific overrides (secrets, storage, domains)
# belong in a separate values file alongside the ArgoCD Application.

# ── Network Policy ───────────────────────────────────────────────────────────
# When enabled, deploys a default-deny baseline + per-service allow rules.
# Traffic flows:
#   Internet → Envoy Gateway → Orchestrator (HTTPRoute)
#   Orchestrator → NATS (job queue) + K8s API (sandbox creation)
#   Sandbox → MCP Gateway/servers + internet (GitHub, npm, etc.)
#   Context Forge internal: mcpgateway ↔ postgres ↔ redis
networkPolicy:
  enabled: true
  # CIDR of the Kubernetes API server. Restricts API server egress rules to
  # this range instead of 0.0.0.0/0. Leave empty to allow any destination on
  # ports 443/6443 (less restrictive but works on any cluster).
  apiServerCidr: ""
  # Context Forge gateway location — used by MCP server registration egress,
  # MCP server ingress, and sandbox egress NetworkPolicies.
  # Set to empty/null to disable gateway-related policies.
  gateway:
    namespace: mcp
    podLabels:
      - mcpcontextforge
      - mcp-stack-mcpcontextforge
    ports:
      - 80
      - 8000

# ── Subchart: agent-platform-mcp-servers ─────────────────────────────────────
# Deploys MCP servers with optional protocol translation and gateway registration.
agent-platform-mcp-servers:
  enabled: true
  translate:
    image:
      repository: ghcr.io/ibm/mcp-context-forge
      tag: "v1.0.0-RC1"
      pullPolicy: IfNotPresent
  gateway:
    url: ""
    secret:
      name: context-forge-gateway
      itemPath: ""
  alertDefaults:
    evalWindow: "10m0s"
    frequency: "2m0s"
    matchType: "5"
    severity: "critical"
    channels: []
  imageUpdater:
    gitRepository: ""
    gitBranch: ""
    gitSecret: ""
    applicationName: ""
    writeBackTarget: ""
  servers: []

# ── Subchart: agent-orchestrator ─────────────────────────────────────────────
# Orchestrates Goose agent jobs via REST API backed by NATS JetStream.
# natsUrl and sandboxNamespace are auto-wired from release metadata when empty.
agent-orchestrator:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/jomcgi/homelab/projects/agent_platform/orchestrator
    tag: main
    pullPolicy: IfNotPresent
  imagePullSecret:
    enabled: false
    create: true
    onepassword:
      itemPath: ""
  serviceAccount:
    create: true
    annotations: {}
    name: ""
  podAnnotations: {}
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  config:
    natsUrl: ""
    sandboxNamespace: ""
    sandboxTemplate: "goose-agent"
    maxRetries: "2"
    maxConcurrent: "5"
    httpPort: "8080"
    jobInactivityTimeout: "10m"
    jobMaxDuration: "168h"
    inferenceUrl: ""
  agentsConfig:
    agents:
      - id: ci-debug
        label: CI Debug
        icon: "🔬"
        bg: "#dbeafe"
        fg: "#1e40af"
        desc: Analyse CI/build failures using BuildBuddy logs
        category: analyse
        recipePath: projects/agent_platform/goose_agent/image/recipes/ci-debug.yaml
      - id: research
        label: Research
        icon: "🔍"
        bg: "#ede9fe"
        fg: "#5b21b6"
        desc: Research topics across the codebase
        category: analyse
        recipePath: projects/agent_platform/goose_agent/image/recipes/research.yaml
      - id: code-fix
        label: Code Fix
        icon: "🔧"
        bg: "#fef3c7"
        fg: "#92400e"
        desc: Fix code issues, open PRs, edit files
        category: action
        recipePath: projects/agent_platform/goose_agent/image/recipes/code-fix.yaml
      - id: bazel
        label: Bazel
        icon: "⚙"
        bg: "#d1fae5"
        fg: "#065f46"
        desc: Bazel build and configuration tasks
        category: action
        recipePath: projects/agent_platform/goose_agent/image/recipes/bazel.yaml
      - id: feature
        label: Feature
        icon: "🚀"
        bg: "#fce7f3"
        fg: "#9d174d"
        desc: Implement new features end-to-end with tests and PR
        category: action
        recipePath: projects/agent_platform/goose_agent/image/recipes/feature.yaml
      - id: pr-review
        label: PR Review
        icon: "👁"
        bg: "#f0fdf4"
        fg: "#166534"
        desc: Review a pull request for correctness, style, and security
        category: validate
        recipePath: projects/agent_platform/goose_agent/image/recipes/pr-review.yaml
      - id: deep-plan
        label: Deep Plan
        icon: "🧠"
        bg: "#fef3c7"
        fg: "#92400e"
        desc: Analyse goals and propose optimal agent pipelines using Opus
        category: analyse
        recipePath: projects/agent_platform/goose_agent/image/recipes/deep-plan.yaml
      - id: qa-test
        label: QA / Tests
        icon: "🧪"
        bg: "#eff6ff"
        fg: "#1e3a5f"
        desc: Generate tests for existing code or verify test coverage
        category: validate
        recipePath: projects/agent_platform/goose_agent/image/recipes/qa-test.yaml
      - id: web-research
        label: Web Research
        icon: "🌐"
        bg: "#e0e7ff"
        fg: "#3730a3"
        desc: Research any topic using web sources and cross-referenced findings
        category: analyse
        recipePath: projects/agent_platform/goose_agent/image/recipes/web-research.yaml
      - id: critic
        label: Critic
        icon: "⚖"
        bg: "#fef9c3"
        fg: "#854d0e"
        desc: Review upstream agent output for gaps, errors, and unverified claims
        category: validate
        recipePath: projects/agent_platform/goose_agent/image/recipes/critic.yaml
      - id: trip-planner
        label: Trip Planner
        icon: "🗺"
        bg: "#ccfbf1"
        fg: "#134e4a"
        desc: Plan trips with day-by-day itineraries and logistics
        category: action
        recipePath: projects/agent_platform/goose_agent/image/recipes/trip-planner.yaml
      - id: idea-capture
        label: Idea Capture
        icon: "💡"
        bg: "#fce7f3"
        fg: "#831843"
        desc: Capture freeform ideas as structured markdown notes
        category: action
        recipePath: projects/agent_platform/goose_agent/image/recipes/idea-capture.yaml
      - id: claude-config
        label: Claude Config
        icon: "🛠"
        bg: "#f3e8ff"
        fg: "#6b21a8"
        desc: Improve Claude Code configuration and open PRs with changes
        category: action
        recipePath: projects/agent_platform/goose_agent/image/recipes/claude-config.yaml
      - id: adr-writer
        label: ADR Writer
        icon: "📋"
        bg: "#dbeafe"
        fg: "#1e3a8a"
        desc: Author Architecture Decision Records with proper template
        category: action
        recipePath: projects/agent_platform/goose_agent/image/recipes/adr-writer.yaml
  httpRoute:
    enabled: false
    hostname: ""
    gatewayRef:
      name: ""
      namespace: ""
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── Subchart: goose-sandboxes ────────────────────────────────────────────────
# SandboxTemplate + WarmPool for ephemeral Goose agent pods.
goose-sandboxes:
  enabled: true
  namespace:
    limitRange:
      cpu:
        request: "1"
        limit: "4"
      memory:
        request: 2Gi
        limit: 4Gi
    resourceQuota:
      pods: "15"
      requestsCpu: "16"
      requestsMemory: 32Gi
  sandboxTemplate:
    name: goose-agent
    image:
      repository: ghcr.io/jomcgi/homelab/projects/agent_platform/goose_agent/image
      tag: main
    env:
      gooseProvider: claude-code
      gooseModel: claude-sonnet-4-6
      contextForgeUrl: ""
      repoOwner: ""
      repoName: ""
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
      limits:
        cpu: "4"
        memory: 8Gi
    extraEnv: []
    workspace:
      storageClassName: ""
      size: 20Gi
  warmPool:
    name: goose-pool
    size: 1
  secrets:
    useOnePassword: false
    claudeAuth:
      onePasswordItem: ""
      vault: ""
      secretName: "claude-auth"
      key: "CLAUDE_AUTH_TOKEN"
    agentSecrets:
      onePasswordItem: ""
      vault: ""
      secretName: "agent-secrets"
  orchestratorNamespace: ""
  agents: {}

# ── Subchart: agent-sandbox ──────────────────────────────────────────────────
# SandboxTemplate CRDs and controller.
agent-sandbox:
  enabled: true
  installCRDs: true
  deployController: true
  controller:
    image:
      repository: registry.k8s.io/agent-sandbox/agent-sandbox-controller
      tag: "v0.1.1"
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      fsGroup: 65532

# ── Subchart: memgraph-shared ────────────────────────────────────────────────
# Optional vendored Memgraph graph database. Disabled by default.
# Enable with memgraph-shared.enabled=true and override values as needed.
# Temporary vendor: includes priorityClassName patch (memgraph/helm-charts#212)
# pending upstream release.
memgraph-shared:
  enabled: false

# ── Subchart: nats ───────────────────────────────────────────────────────────
# NATS JetStream — required by agent-orchestrator for job queuing.
nats:
  enabled: true
  config:
    cluster:
      enabled: false
    jetstream:
      enabled: true
      fileStore:
        enabled: true
        dir: /data
        pvc:
          enabled: true
          size: 10Gi
          storageClassName: ""
  statefulSet:
    replicas: 1
