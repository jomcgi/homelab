apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: context-forge
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    path: projects/agent_platform/context_forge/deploy
    targetRevision: HEAD
    helm:
      releaseName: context-forge
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
