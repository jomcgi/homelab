apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: memgraph
  namespace: argocd
spec:
  project: default
  sources:
    # Chart from OCI registry (pushed by CI via Bazel helm_push)
    - repoURL: ghcr.io/jomcgi/homelab/charts
      chart: memgraph
      targetRevision: 0.2.16
      helm:
        releaseName: memgraph
        valueFiles:
          - $values/projects/memgraph/deploy/values.yaml
    # Git repo for environment-specific values
    - repoURL: https://github.com/jomcgi/homelab.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: memgraph
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
