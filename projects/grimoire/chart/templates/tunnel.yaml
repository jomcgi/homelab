{{- if .Values.tunnel.enabled }}
apiVersion: cloudflare.jomcgi.dev/v1alpha1
kind: Tunnel
metadata:
  name: {{ include "grimoire.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "grimoire.labels" . | nindent 4 }}
spec:
  hostname: {{ .Values.tunnel.hostname }}
  service:
    name: {{ include "grimoire.fullname" . }}-frontend
    port: {{ .Values.frontend.service.port }}
  paths:
    - path: /ws
      service:
        name: {{ include "grimoire.fullname" . }}-ws-gateway
        port: {{ .Values.wsGateway.service.port }}
{{- end }}
