# Frontend — Nginx serving static React build
frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/jomcgi/homelab/projects/grimoire/frontend
    tag: main
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 5m
      memory: 32Mi
    limits:
      cpu: 5m
      memory: 32Mi

# WebSocket Gateway — Go binary proxying Gemini Live + game relay
wsGateway:
  replicas: 1
  containerPort: 8080
  cfAccessTeam: ""
  image:
    repository: ghcr.io/jomcgi/homelab/projects/grimoire/ws-gateway
    tag: main
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
  probes:
    liveness:
      path: /healthz
      initialDelaySeconds: 5
    readiness:
      path: /readyz
      initialDelaySeconds: 5
  resources:
    requests:
      cpu: 5m
      memory: 16Mi
    limits:
      cpu: 5m
      memory: 16Mi
  podAnnotations: {}

# Redis — ephemeral pub/sub + session state
redis:
  replicaCount: 1
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
    portName: redis
    targetPort: redis
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 10m
      memory: 16Mi

# ServiceAccount
serviceAccount:
  create: true
  automount: false
  name: ""
  annotations: {}

# NetworkPolicy
networkPolicy:
  enabled: true

# Grimoire secrets (synced from 1Password via OnePasswordItem)
grimoireSecret:
  enabled: true
  name: grimoire
  onepassword:
    itemPath: "vaults/k8s-homelab/items/grimoire"

# Cloudflare Tunnel (disabled — routing handled by shared cloudflare-tunnel chart)
tunnel:
  enabled: false
  hostname: grimoire.jomcgi.dev

# Image pull secret for private GHCR registry
imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

nameOverride: ""
fullnameOverride: ""

# ArgoCD Image Updater (automatic digest-based image updates)
imageUpdater:
  enabled: false
  images: []
  writeBack:
    method: ""
    repository: ""
    branch: main
    target: ""

# Image Updater secret for git write-back (generated by ExternalSecret)
imageUpdaterSecret:
  enabled: false
