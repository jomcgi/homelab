# Development overrides for stargazer

# Stargazer service image
image:
  repository: ghcr.io/jomcgi/homelab/projects/stargazer
  tag: "main"
  pullPolicy: IfNotPresent
# Persistent storage
persistence:
  enabled: true
  storageClass: longhorn
  accessMode: ReadWriteMany # Allow multiple pods to access the same volume
  size: 5Gi
# Resource limits — pyosmium streams a 120MB OSM PBF in T7 (extract_roads).
# 256Mi OOMed in <1 min; 512Mi OOMed at ~10 min into T7. The BackReferenceWriter
# holds a way→node index for ~5M Scottish nodes plus working set; raising to
# 2Gi to escape the doubling treadmill. We can right-size later once we see a
# real run-to-completion peak.
resources:
  limits:
    cpu: 100m
    memory: 2Gi
  requests:
    cpu: 100m
    memory: 2Gi
# OpenTelemetry configuration
config:
  opentelemetry:
    enabled: true
    serviceName: "stargazer"
    # OTEL collector endpoint (SigNoz)
    # otlpEndpoint: "http://signoz-otel-collector.signoz:4317"
    otlpEndpoint: ""
# Enable API server for data access
api:
  enabled: true
  replicas: 1
  httproute:
    enabled: true
    hostname: api.jomcgi.dev
    # Path prefix for stargazer API
    pathPrefix: /stargazer
# Enable web server for dev
webServer:
  enabled: true
  replicas: 1
# Enable test data until CronJob runs successfully
testData:
  enabled: true
# Enable image pull secret for GHCR
imagePullSecret:
  enabled: true
# Configure pods to use the image pull secret
imagePullSecrets:
  - name: ghcr-imagepull-secret
podAnnotations:
  otel.injected-by: kyverno/inject-otel-env-vars
