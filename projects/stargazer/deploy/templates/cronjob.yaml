apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "stargazer.fullname" . }}
  labels:
    {{- include "stargazer.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  concurrencyPolicy: {{ .Values.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.backoffLimit }}
      activeDeadlineSeconds: {{ .Values.activeDeadlineSeconds }}
      template:
        metadata:
          annotations:
            checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
            # Disable Linkerd sidecar injection - sidecars prevent Job completion
            # because they don't know when the main container finishes
            linkerd.io/inject: disabled
            {{- with .Values.podAnnotations }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          labels:
            {{- include "stargazer.selectorLabels" . | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          {{- if .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- range .Values.imagePullSecrets }}
            - name: {{ .name }}
            {{- end }}
          {{- end }}
          serviceAccountName: {{ include "stargazer.serviceAccountName" . }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
          - name: {{ .Chart.Name }}
            securityContext:
              {{- toYaml .Values.securityContext | nindent 14 }}
            image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
            imagePullPolicy: {{ .Values.image.pullPolicy }}
            # Use image entrypoint (Bazel binary with deps in runfiles)
            # NOT "python3 -m" which uses system Python without dependencies
            env:
            - name: DATA_DIR
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stargazer.fullname" . }}
                  key: data-dir
            - name: BOUNDS_NORTH
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stargazer.fullname" . }}
                  key: bounds-north
            - name: BOUNDS_SOUTH
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stargazer.fullname" . }}
                  key: bounds-south
            - name: BOUNDS_WEST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stargazer.fullname" . }}
                  key: bounds-west
            - name: BOUNDS_EAST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stargazer.fullname" . }}
                  key: bounds-east
            - name: GRID_SPACING_M
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stargazer.fullname" . }}
                  key: grid-spacing-m
            - name: ROAD_BUFFER_M
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stargazer.fullname" . }}
                  key: road-buffer-m
            - name: COLOR_TOLERANCE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stargazer.fullname" . }}
                  key: color-tolerance
            - name: MIN_ASTRONOMY_SCORE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stargazer.fullname" . }}
                  key: min-astronomy-score
            - name: FORECAST_HOURS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stargazer.fullname" . }}
                  key: forecast-hours
            - name: MET_NORWAY_USER_AGENT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stargazer.fullname" . }}
                  key: met-norway-user-agent
            - name: MET_NORWAY_RATE_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stargazer.fullname" . }}
                  key: met-norway-rate-limit
            - name: OTEL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stargazer.fullname" . }}
                  key: otel-enabled
            - name: OTEL_SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stargazer.fullname" . }}
                  key: otel-service-name
            {{- if .Values.config.opentelemetry.otlpEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stargazer.fullname" . }}
                  key: otel-otlp-endpoint
            {{- end }}
            volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.config.dataDir }}
            {{- end }}
            resources:
              {{- toYaml .Values.resources | nindent 14 }}
          volumes:
          {{- if .Values.persistence.enabled }}
          - name: data
            persistentVolumeClaim:
              claimName: {{ include "stargazer.fullname" . }}-data
          {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
