suite: stargazer api deployment tests
templates:
  - deployment-api.yaml
  - service-api.yaml
tests:
  - it: should create api deployment when enabled
    template: deployment-api.yaml
    set:
      api.enabled: true
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-stargazer-api

  - it: should not create api deployment when disabled
    template: deployment-api.yaml
    set:
      api.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should have component label
    template: deployment-api.yaml
    set:
      api.enabled: true
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: api

  - it: should set correct replica count
    template: deployment-api.yaml
    set:
      api.enabled: true
      api.replicas: 2
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: should use nginx-unprivileged image
    template: deployment-api.yaml
    set:
      api.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: nginxinc/nginx-unprivileged:alpine

  - it: should have liveness and readiness probes
    template: deployment-api.yaml
    set:
      api.enabled: true
    asserts:
      - isNotEmpty:
          path: spec.template.spec.containers[0].livenessProbe
      - isNotEmpty:
          path: spec.template.spec.containers[0].readinessProbe
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health

  - it: should set api security context
    template: deployment-api.yaml
    set:
      api.enabled: true
      api.securityContext.allowPrivilegeEscalation: false
      api.securityContext.runAsNonRoot: true
      api.securityContext.runAsUser: 101
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 101

  - it: should set resource limits
    template: deployment-api.yaml
    set:
      api.enabled: true
      api.resources.limits.cpu: 200m
      api.resources.limits.memory: 256Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 200m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi

  - it: should mount nginx config as read-only
    template: deployment-api.yaml
    set:
      api.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: nginx-config
            mountPath: /etc/nginx/conf.d/
            readOnly: true

  - it: should mount data volume when persistence enabled
    template: deployment-api.yaml
    set:
      api.enabled: true
      persistence.enabled: true
      config.dataDir: /data
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data
            readOnly: true

  - it: should mount testdata when test mode enabled
    template: deployment-api.yaml
    set:
      api.enabled: true
      persistence.enabled: false
      testData.enabled: true
      config.dataDir: /data
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: testdata
            mountPath: /data/output
            readOnly: true
