apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "stargazer.fullname" . }}
  labels:
    {{- include "stargazer.labels" . | nindent 4 }}
data:
  data-dir: {{ .Values.config.dataDir | quote }}
  # Geographic bounds
  bounds-north: {{ .Values.config.bounds.north | quote }}
  bounds-south: {{ .Values.config.bounds.south | quote }}
  bounds-west: {{ .Values.config.bounds.west | quote }}
  bounds-east: {{ .Values.config.bounds.east | quote }}
  # Processing parameters
  grid-spacing-m: {{ .Values.config.gridSpacingM | quote }}
  road-buffer-m: {{ .Values.config.roadBufferM | quote }}
  color-tolerance: {{ .Values.config.colorTolerance | quote }}
  min-astronomy-score: {{ .Values.config.minAstronomyScore | quote }}
  forecast-hours: {{ .Values.config.forecastHours | quote }}
  # MET Norway API
  met-norway-user-agent: {{ .Values.config.metNorwayUserAgent | quote }}
  met-norway-rate-limit: {{ .Values.config.metNorwayRateLimit | quote }}
  # OpenTelemetry
  otel-enabled: {{ .Values.config.opentelemetry.enabled | quote }}
  otel-service-name: {{ .Values.config.opentelemetry.serviceName | quote }}
  {{- if .Values.config.opentelemetry.otlpEndpoint }}
  otel-otlp-endpoint: {{ .Values.config.opentelemetry.otlpEndpoint | quote }}
  {{- end }}
