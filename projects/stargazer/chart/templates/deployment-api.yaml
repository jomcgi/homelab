{{- if .Values.api.enabled }}
{{- $fullname := include "homelab.fullname" . }}
{{- $volumes := list
  (dict "name" "nginx-config" "configMap" (dict "name" (printf "%s-nginx" $fullname)))
  (dict "name" "cache" "emptyDir" (dict))
  (dict "name" "run" "emptyDir" (dict))
}}
{{- $mounts := list
  (dict "name" "nginx-config" "mountPath" "/etc/nginx/conf.d/" "readOnly" true)
  (dict "name" "cache" "mountPath" "/var/cache/nginx")
  (dict "name" "run" "mountPath" "/var/run")
}}
{{- if .Values.persistence.enabled }}
  {{- $volumes = append $volumes (dict "name" "data" "persistentVolumeClaim" (dict "claimName" (printf "%s-data" $fullname))) }}
  {{- $mounts = append $mounts (dict "name" "data" "mountPath" .Values.config.dataDir "readOnly" true) }}
{{- else if .Values.testData.enabled }}
  {{- $volumes = append $volumes (dict "name" "testdata" "configMap" (dict "name" (printf "%s-testdata" $fullname))) }}
  {{- $mounts = append $mounts (dict "name" "testdata" "mountPath" (printf "%s/output" .Values.config.dataDir) "readOnly" true) }}
{{- end }}
{{- $_ := set .Values.api "volumes" $volumes }}
{{- $_ := set .Values.api "volumeMounts" $mounts }}
{{- if and .Values.podAnnotations (not .Values.api.podAnnotations) }}
{{- $_ := set .Values.api "podAnnotations" .Values.podAnnotations }}
{{- end }}
{{- include "homelab.deployment" (dict "context" . "component" "api") }}
{{- end }}
