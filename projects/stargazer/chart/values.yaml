# CronJob schedule (every 6 hours)
schedule: "0 */6 * * *"

# Job configuration
backoffLimit: 3
activeDeadlineSeconds: 3600 # 1 hour timeout
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 3
concurrencyPolicy: Forbid # Don't run if previous job still running

image:
  repository: ghcr.io/jomcgi/homelab/projects/stargazer
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false # Needs write for /data

# Resource limits for processing geospatial data
resources:
  limits:
    cpu: 100m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Persistent storage for data
persistence:
  enabled: true
  storageClass: longhorn
  accessMode: ReadWriteOnce
  size: 5Gi

nodeSelector: {}

tolerations: []

affinity: {}

# Application configuration
config:
  # Data directory (must match PVC mount)
  dataDir: "/data"

  # Geographic bounds for Scotland
  bounds:
    north: 60.86 # Shetland
    south: 54.63 # Scottish Borders
    west: -8.65 # Outer Hebrides
    east: -0.76 # Aberdeenshire coast

  # Processing parameters
  gridSpacingM: 5000 # 5km grid
  roadBufferM: 1000 # 1km from roads
  colorTolerance: 15 # RGB matching
  minAstronomyScore: 60 # Weather score threshold
  forecastHours: 72 # Look ahead

  # MET Norway API
  metNorwayUserAgent: "stargazer/1.0 github.com/jomcgi/homelab"
  metNorwayRateLimit: 15

  # OpenTelemetry configuration
  opentelemetry:
    enabled: true
    serviceName: "stargazer"
    otlpEndpoint: ""

# API server configuration
api:
  enabled: false
  replicas: 1
  # Nginx image used for serving static API data
  image:
    repository: nginxinc/nginx-unprivileged
    tag: "alpine"
    pullPolicy: IfNotPresent
  containerPort: 8080
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 30
    readiness:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 10
  # CORS configuration
  cors:
    # Access-Control-Allow-Origin header value
    allowOrigin: "*"
  # Paths to output data files (absolute paths in container)
  dataPaths:
    best: /data/output/best_locations.json
    locations: /data/output/forecasts_scored.json
  service:
    type: ClusterIP
    port: 80
  # Security context for nginx-unprivileged
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 101 # nginx user in nginx-unprivileged image
  resources:
    limits:
      cpu: 5m
      memory: 32Mi
    requests:
      cpu: 5m
      memory: 32Mi
  httproute:
    enabled: false
    hostname: api.jomcgi.dev
    gateway: api-gateway
    gatewayNamespace: api-gateway

# Test data configuration
testData:
  enabled: false

# ArgoCD Image Updater (automatic digest-based image updates)
imageUpdater:
  enabled: false
  images: []
  writeBack:
    method: ""
    repository: ""
    branch: main
    target: ""

# Image pull secret configuration
imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"
