suite: stargazer cronjob tests
templates:
  - cronjob.yaml
tests:
  - it: should create a cronjob
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: metadata.name
          value: RELEASE-NAME-stargazer

  - it: should use correct schedule
    set:
      schedule: "0 */6 * * *"
    asserts:
      - equal:
          path: spec.schedule
          value: "0 */6 * * *"

  - it: should set correct concurrency policy
    set:
      concurrencyPolicy: Forbid
    asserts:
      - equal:
          path: spec.concurrencyPolicy
          value: Forbid

  - it: should set job history limits
    set:
      successfulJobsHistoryLimit: 3
      failedJobsHistoryLimit: 3
    asserts:
      - equal:
          path: spec.successfulJobsHistoryLimit
          value: 3
      - equal:
          path: spec.failedJobsHistoryLimit
          value: 3

  - it: should set backoff limit
    set:
      backoffLimit: 3
    asserts:
      - equal:
          path: spec.jobTemplate.spec.backoffLimit
          value: 3

  - it: should set active deadline
    set:
      activeDeadlineSeconds: 3600
    asserts:
      - equal:
          path: spec.jobTemplate.spec.activeDeadlineSeconds
          value: 3600

  - it: should use correct image
    set:
      image.repository: ghcr.io/jomcgi/homelab/projects/stargazer
      image.tag: "v1.0.0"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: ghcr.io/jomcgi/homelab/projects/stargazer:v1.0.0

  - it: should have restart policy OnFailure
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.restartPolicy
          value: OnFailure

  - it: should disable linkerd sidecar injection
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.metadata.annotations["linkerd.io/inject"]
          value: disabled

  - it: should mount data volume when persistence enabled
    set:
      persistence.enabled: true
      config.dataDir: /data
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data

  - it: should set resource limits
    set:
      resources.limits.cpu: 2000m
      resources.limits.memory: 4Gi
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.limits.cpu
          value: 2000m
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.limits.memory
          value: 4Gi

  - it: should set security context
    set:
      securityContext.allowPrivilegeEscalation: false
      securityContext.readOnlyRootFilesystem: false
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
