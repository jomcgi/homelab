# This rule is not used by the project cloudflare itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over tunnels.tunnels.cloudflare.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cloudflare
    app.kubernetes.io/managed-by: kustomize
  name: cloudflaretunnel-admin-role
rules:
  - apiGroups:
      - tunnels.tunnels.cloudflare.io
    resources:
      - cloudflaretunnels
    verbs:
      - "*"
  - apiGroups:
      - tunnels.tunnels.cloudflare.io
    resources:
      - cloudflaretunnels/status
    verbs:
      - get
