{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cloudflare-operator.fullname" . }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cloudflare-operator.fullname" . }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "cloudflare-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}