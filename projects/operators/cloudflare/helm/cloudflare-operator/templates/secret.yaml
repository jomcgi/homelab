{{- if .Values.cloudflareCredentials.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.cloudflareCredentials.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{- if .Values.cloudflareCredentials.apiToken }}
  CLOUDFLARE_API_TOKEN: {{ .Values.cloudflareCredentials.apiToken | b64enc }}
  {{- end }}
  {{- if .Values.cloudflareCredentials.accountId }}
  CLOUDFLARE_ACCOUNT_ID: {{ .Values.cloudflareCredentials.accountId | b64enc }}
  {{- end }}
{{- end }}