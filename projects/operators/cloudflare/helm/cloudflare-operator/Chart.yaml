apiVersion: v2
name: cloudflare-operator
description: A Helm chart for the Cloudflare Tunnel Operator with Gateway API support
type: application
version: 0.2.0
appVersion: "latest"
keywords:
  - cloudflare
  - tunnel
  - operator
  - kubernetes
  - gateway-api
  - zero-trust
maintainers:
  - name: jomcgi
    url: https://github.com/jomcgi/homelab
sources:
  - https://github.com/jomcgi/homelab/tree/main/operators/cloudflare

# Gateway API CRDs are installed separately via envoy-gateway in projects/platform/envoy/
# No Helm dependency needed - the operator expects Gateway API to be pre-installed

annotations:
  org.opencontainers.image.source: "https://github.com/jomcgi/homelab"
  org.opencontainers.image.url: "https://github.com/jomcgi/homelab"
  org.opencontainers.image.licenses: "MPL-2.0"
