# Default values for cloudflare-operator

nameOverride: ""
fullnameOverride: ""

# Controller manager configuration
controllerManager:
  # Container image configuration
  image:
    repository: ghcr.io/jomcgi/homelab/projects/operators/cloudflare
    tag: sha-8687034 # Use SHA tags for precise version tracking
    pullPolicy: Always

  # Resources configuration
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Replica count (2+ for HA with leader election)
  replicas: 2

  # Pod annotations
  podAnnotations: {}

  # Pod labels
  podLabels: {}

  # Security context
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - "ALL"

  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  # Node selector
  nodeSelector: {}

  # Tolerations
  tolerations: []

  # Affinity
  affinity: {}

  # Environment variables
  env:
    # Cloudflare API credentials
    cloudflareApiToken:
      secretName: cloudflare-credentials
      secretKey: CLOUDFLARE_API_TOKEN
    cloudflareAccountId:
      secretName: cloudflare-credentials
      secretKey: CLOUDFLARE_ACCOUNT_ID

  # Health probe configuration
  healthProbeBindAddress: ":8081"
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10

  # Metrics configuration
  metrics:
    bindAddress: ":8443"

  # Enable daemon mode to auto-create default tunnel
  enableDaemon: true

  # Cloudflared image configuration
  # This image is used for the cloudflared daemon pods created by the operator
  # If not set, defaults to cloudflare/cloudflared:2025.11.1
  cloudflaredImage: ""

  # OpenTelemetry tracing configuration using standard OTEL environment variables
  # See: https://opentelemetry.io/docs/specs/otel/configuration/sdk-environment-variables/
  tracing:
    # OTEL_EXPORTER_OTLP_ENDPOINT - The OTLP endpoint (e.g., "otel-collector.observability.svc:4317")
    # If empty, tracing is disabled
    endpoint: ""

    # OTEL_SERVICE_NAME - Service name (default: "cloudflare-operator")
    serviceName: "cloudflare-operator"

    # OTEL_SERVICE_VERSION - Service version (default: "dev")
    serviceVersion: ""

    # OTEL_TRACES_SAMPLER - Sampler type (default: "parentbased_traceidratio")
    # Options: always_on, always_off, traceidratio, parentbased_always_on,
    #          parentbased_always_off, parentbased_traceidratio
    sampler: "parentbased_traceidratio"

    # OTEL_TRACES_SAMPLER_ARG - Sampler argument (default: "1.0" = 100%)
    # For traceidratio samplers, this is the sampling probability (0.0-1.0)
    samplerArg: "1.0"

    # OTEL_SDK_DISABLED - Set to "true" to completely disable the SDK (default: "false")
    disabled: false

# Service Account configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set, a name is generated using the fullname template
  name: ""

# RBAC configuration
rbac:
  # Specifies whether RBAC resources should be created
  create: true

# Custom Resource Definitions
crds:
  # Specifies whether CRDs should be installed
  install: true

# Namespace configuration
# Note: The namespace is determined by the helm install -n flag
# Set createNamespace to true if you want Helm to create the namespace
createNamespace: false

# Image pull secrets
imagePullSecrets: []

# Cloudflare credentials configuration
cloudflareCredentials:
  # Create the secret (set to false if secret already exists or using external secret operator)
  create: true
  # Secret name
  secretName: cloudflare-credentials
  # API token (only used if create is true)
  apiToken: ""
  # Account ID (only used if create is true)
  accountId: ""

# Gateway API configuration
gatewayAPI:
  # Enable Gateway API controllers
  enabled: true

  # GatewayClass configuration
  gatewayClass:
    # Create GatewayClass resource
    create: true
    # GatewayClass name
    name: cloudflare
    # Controller name (must match operator's controller name)
    controllerName: github.com/jomcgi/homelab/operators/cloudflare

  # Default Gateway configuration (created in daemon mode)
  defaultGateway:
    # Create default Gateway resource
    create: true
    # Gateway name
    name: cloudflare-gateway
    # Gateway namespace
    namespace: cloudflare-operator-system
    # Listeners configuration
    listeners:
      - name: https
        protocol: HTTPS
        port: 443

# Extra resources to deploy (e.g., 1Password secrets)
# Example:
# extraResources:
#   - apiVersion: onepassword.com/v1
#     kind: OnePasswordItem
#     metadata:
#       name: cloudflare-credentials
#     spec:
#       itemPath: "vaults/Infrastructure/items/Cloudflare-API"
extraResources: []
