suite: cloudflare-operator-test noauth service tests
templates:
  - noauth-deployment.yaml
  - noauth-service.yaml
tests:
  - it: should create noauth deployment when enabled
    template: noauth-deployment.yaml
    set:
      noauth.enabled: true
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cloudflare-operator-test-noauth

  - it: should not create noauth deployment when disabled
    template: noauth-deployment.yaml
    set:
      noauth.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use correct image
    template: noauth-deployment.yaml
    set:
      noauth.enabled: true
      image.repository: hashicorp/http-echo
      image.tag: "1.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: hashicorp/http-echo:1.0

  - it: should set correct replica count
    template: noauth-deployment.yaml
    set:
      noauth.enabled: true
      noauth.replicas: 2
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: should set resource limits
    template: noauth-deployment.yaml
    set:
      noauth.enabled: true
      noauth.resources.limits.cpu: 100m
      noauth.resources.limits.memory: 64Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 64Mi

  - it: should create noauth service when enabled
    template: noauth-service.yaml
    set:
      noauth.enabled: true
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cloudflare-operator-test-noauth

  - it: should not create noauth service when disabled
    template: noauth-service.yaml
    set:
      noauth.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should expose correct port
    template: noauth-service.yaml
    set:
      noauth.enabled: true
      noauth.port: 5678
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 5678
