{{- if .Values.auth.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloudflare-operator-test.fullname" . }}-auth
  labels:
    {{- include "cloudflare-operator-test.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
  annotations:
    # Cloudflare operator annotations
    cloudflare.ingress.hostname: {{ .Values.auth.hostname }}
    cloudflare.zero-trust.policy: {{ .Values.auth.policy }}
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "cloudflare-operator-test.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: auth
{{- end }}
