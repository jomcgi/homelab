{{- if .Values.noauth.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloudflare-operator-test.fullname" . }}-noauth
  labels:
    {{- include "cloudflare-operator-test.labels" . | nindent 4 }}
    app.kubernetes.io/component: noauth
  annotations:
    # Cloudflare operator annotations
    cloudflare.ingress.hostname: {{ .Values.noauth.hostname }}
    cloudflare.zero-trust.enabled: "false"
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "cloudflare-operator-test.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: noauth
{{- end }}
