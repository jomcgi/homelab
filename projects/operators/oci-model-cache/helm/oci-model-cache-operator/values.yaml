nameOverride: ""
fullnameOverride: ""

controllerManager:
  image:
    repository: ghcr.io/jomcgi/homelab/projects/operators/oci-model-cache
    tag: latest
    pullPolicy: Always

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  replicas: 1

  podAnnotations: {}
  podLabels: {}

  securityContext:
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    seccompProfile:
      type: RuntimeDefault
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - "ALL"

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  nodeSelector: {}
  tolerations: []
  affinity: {}

  copyImage:
    repository: ghcr.io/jomcgi/homelab/bazel/tools/hf2oci
    tag: main

  # -- nodeSelector applied to sync Job pods (model download/push).
  # Use this to pin heavy sync workloads to worker nodes and keep control plane healthy.
  syncNodeSelector: {}

  # -- Memory request/limit for sync Job containers.
  # When syncMemoryLimit is set, GOMEMLIMIT is automatically configured to 80% of the
  # limit so the Go GC applies back-pressure before the kubelet OOMKills.
  syncMemoryRequest: ""
  syncMemoryLimit: ""

  # -- Max concurrent layer uploads/downloads for sync Job containers.
  # Passed as --max-parallel to hf2oci (0 or empty = auto from GOMEMLIMIT, fallback 100).
  syncMaxParallel: ""

  env:
    ociRegistry: "ghcr.io/jomcgi/models"
    syncServiceAccount: ""

  healthProbeBindAddress: ":8081"
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10

  metrics:
    bindAddress: ":8443"

  tracing:
    endpoint: ""
    serviceName: "oci-model-cache-operator"
    serviceVersion: ""
    sampler: "parentbased_traceidratio"
    samplerArg: "1.0"
    disabled: false

serviceAccount:
  create: true
  annotations: {}
  name: ""

syncServiceAccount:
  create: true
  name: ""

rbac:
  create: true

crds:
  install: true

createNamespace: false

imagePullSecrets: []

registryPushSecret: ""

hfToken:
  # -- Create a Secret (OnePasswordItem or manual). If false, use existingSecret.
  create: false
  # -- Name of a pre-existing Secret containing the HF token
  existingSecret: ""
  # -- Key within the Secret
  secretKey: "hf_token"
  # -- Secret type when create=true: "onepassword" or "manual"
  type: "onepassword"
  onepassword:
    itemPath: ""
  manual:
    token: ""

webhook:
  enabled: true
  # -- Create a namespace-scoped self-signed Issuer for the webhook cert
  createSelfSignedIssuer: true
  # -- Override the cert-manager Issuer name (defaults to fullname-selfsigned)
  certIssuer: ""
  # -- Issuer kind: "Issuer" (namespace) or "ClusterIssuer"
  certIssuerKind: ""

imageUpdater:
  enabled: false
  images: []
  writeBack:
    method: ""
    repository: ""
    branch: main
    target: ""

extraResources: []
