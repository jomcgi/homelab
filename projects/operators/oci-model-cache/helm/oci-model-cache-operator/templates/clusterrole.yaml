---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "oci-model-cache-operator.fullname" . }}-manager-role
  labels:
    {{- include "oci-model-cache-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - oci-model-cache.jomcgi.dev
  resources:
  - modelcaches
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - oci-model-cache.jomcgi.dev
  resources:
  - modelcaches/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - oci-model-cache.jomcgi.dev
  resources:
  - modelcaches/finalizers
  verbs:
  - update
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - patch
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
