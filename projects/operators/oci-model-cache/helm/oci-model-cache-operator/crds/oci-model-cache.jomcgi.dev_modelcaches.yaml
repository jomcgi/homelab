apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: modelcaches.oci-model-cache.jomcgi.dev
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
spec:
  group: oci-model-cache.jomcgi.dev
  names:
    kind: ModelCache
    listKind: ModelCacheList
    plural: modelcaches
    singular: modelcache
    shortNames:
      - mc
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Repo
          type: string
          jsonPath: .spec.repo
        - name: Format
          type: string
          jsonPath: .status.format
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: ModelCache caches a HuggingFace model as an OCI artifact.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - repo
                - registry
              properties:
                repo:
                  type: string
                  description: HuggingFace repository (e.g. "bartowski/Llama-3.2-1B-Instruct-GGUF")
                registry:
                  type: string
                  description: Target OCI registry (e.g. "ghcr.io/jomcgi/models")
                revision:
                  type: string
                  description: HuggingFace revision (default "main")
                  default: "main"
                file:
                  type: string
                  description: GGUF filename prefix selector for multi-quantization repos
                tag:
                  type: string
                  description: OCI tag override
                modelDir:
                  type: string
                  description: In-image model directory path
                ttl:
                  type: string
                  description: Time-to-live for this cache entry (e.g. "24h", "7d")
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                    required:
                      - type
                      - status
                      - lastTransitionTime
                phase:
                  type: string
                  enum:
                    - Pending
                    - Resolving
                    - Syncing
                    - Ready
                    - Failed
                resolvedRef:
                  type: string
                digest:
                  type: string
                resolvedRevision:
                  type: string
                format:
                  type: string
                fileCount:
                  type: integer
                totalSize:
                  type: integer
                  format: int64
                syncJobName:
                  type: string
                errorMessage:
                  type: string
                permanent:
                  type: boolean
                lastState:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                observedPhase:
                  type: string
