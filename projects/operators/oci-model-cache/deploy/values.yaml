imagePullSecrets:
  - name: ghcr-pull-secret
controllerManager:
  image:
    repository: ghcr.io/jomcgi/homelab/projects/operators/oci-model-cache
    tag: "" # Pinned at build time by helm_images_values
    pullPolicy: Always
  tracing:
    serviceName: "oci-model-cache-operator"
    serviceVersion: "dev"
    sampler: "parentbased_traceidratio"
    samplerArg: "1.0"
  copyImage:
    repository: ghcr.io/jomcgi/homelab/bazel/tools/hf2oci
    tag: main
  syncNodeSelector:
    kubernetes.io/hostname: node-4
  syncMemoryRequest: "4Gi"
  syncMemoryLimit: "8Gi"
  syncMaxParallel: "8"
  env:
    ociRegistry: "ghcr.io/jomcgi/models"
registryPushSecret: "oci-model-cache-operator-hf-token"
hfToken:
  create: true
  type: "onepassword"
  onepassword:
    itemPath: "vaults/k8s-homelab/items/oci-model-cache"
imageUpdater:
  enabled: false
extraResources:
  - apiVersion: onepassword.com/v1
    kind: OnePasswordItem
    metadata:
      name: ghcr-pull-secret
    spec:
      itemPath: "vaults/k8s-homelab/items/argocd-image-updater"
    type: "kubernetes.io/dockerconfigjson"
