apiVersion: controlflow.io/v1alpha1
kind: StateMachine

metadata:
  name: ModelCache
  group: oci-model-cache.jomcgi.dev
  version: v1alpha1

status:
  phaseField: phase
  conditionsField: conditions

fieldGroups:
  resolveResult:
    resolvedRef: string
    digest: string
    resolvedRevision: string
    format: string
    fileCount: int
    totalSize: int64
  syncJob:
    syncJobName: string
  errorInfo:
    errorMessage: string
    permanent: bool
    lastState: string

states:
  - name: Pending
    initial: true

  - name: Resolving
    requeue: 10s
    fieldGroups: [resolveResult]

  - name: Syncing
    requeue: 30s
    fieldGroups: [resolveResult, syncJob]

  - name: Ready
    requeue: 6h
    fieldGroups: [resolveResult]

  - name: Failed
    error: true
    requeue: 5m
    fieldGroups: [errorInfo]

transitions:
  - from: Pending
    to: Resolving
    action: Resolved
    params:
      - resolvedRef: string
      - digest: string
      - resolvedRevision: string
      - format: string
      - fileCount: int
      - totalSize: int64

  - from: Pending
    to: Ready
    action: CacheHit
    params:
      - resolvedRef: string
      - digest: string
      - resolvedRevision: string
      - format: string
      - fileCount: int
      - totalSize: int64

  - from: Resolving
    to: Syncing
    action: JobCreated
    params:
      - syncJobName: string

  - from: Syncing
    to: Ready
    action: SyncComplete
    params:
      - resolvedRef: string
      - digest: string
      - resolvedRevision: string
      - format: string
      - fileCount: int
      - totalSize: int64

  - from: [Pending, Resolving, Syncing]
    to: Failed
    action: MarkFailed
    params:
      - errorMessage: string
      - permanent: bool
      - lastState: string

  - from: Failed
    to: Pending
    action: Retry
    guard: retryable

  - from: Ready
    to: Pending
    action: Resync

guards:
  retryable:
    description: "Can retry if failure is not permanent"
    condition: "!s.Permanent"

errorHandling:
  maxRetries: 5
  backoff:
    base: 30s
    multiplier: 2
    max: 5m
    jitter: 0.1

specChangeHandling:
  enabled: true
  observedGenerationField: observedGeneration

observability:
  onTransition: true
  otelTracing: true
  embedDiagram: true
  metrics: true
