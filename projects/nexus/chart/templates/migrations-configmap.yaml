apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nexus.fullname" . }}-migrations
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
data:
  {{- range $path, $_ := .Files.Glob "migrations/*.sql" }}
  {{ base $path }}: |
    {{- $.Files.Get $path | nindent 4 }}
  {{- end }}
  atlas.sum: |
    {{- .Files.Get "migrations/atlas.sum" | nindent 4 }}
