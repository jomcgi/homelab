# BuildBuddy Workflows configuration
# Triggered via API from GitHub Actions for persistent analysis cache

actions:
  - name: "Build"
    triggers:
      # Disabled - we trigger via ExecuteWorkflow API from GitHub Actions
      push:
        disabled: true
      pull_request:
        disabled: true

    # BuildBuddy VMs have persistent Bazel server = warm analysis cache
    bazel_commands:
      - "build //..."

  - name: "Test"
    triggers:
      push:
        disabled: true
      pull_request:
        disabled: true

    bazel_commands:
      - "test //..."

  - name: "Push"
    triggers:
      push:
        disabled: true
      pull_request:
        disabled: true

    # Container push - requires GITHUB_TOKEN and GITHUB_ACTOR from API call
    # Login to GitHub Container Registry before pushing
    bazel_commands:
      - "run //images:push_all"

    # Setup script to authenticate with GHCR
    # Environment variables (GITHUB_TOKEN, GITHUB_ACTOR) are passed via ExecuteWorkflow API
    setup_script: |
      #!/bin/bash
      set -euo pipefail
      echo "Logging into GitHub Container Registry..."
      echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
      echo "✅ Logged into ghcr.io as $GITHUB_ACTOR"

# Git configuration
git_repo_default_branch: "main"

# BuildBuddy will use your .bazelrc configuration automatically
# The remote cache and RBE are already configured there
