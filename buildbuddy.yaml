actions:
  # Format check - runs formatters and gazelle, verifies no changes needed
  # Runs in parallel with Test action
  - name: "Format check"
    container_image: "ubuntu-24.04"
    resource_requests:
      disk: "30GB"  # Slightly larger for format tools
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    steps:
      - run: |
          # Skip if commit is from argocd-image-updater
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            echo "Skipping argocd-image-updater commit"
            exit 0
          fi
          # Run full format (includes formatters + gazelle)
          bazel run //tools/format:fast_format
          if ! git diff --exit-code; then
            echo "ERROR: Code not formatted or BUILD files out of sync."
            echo "Run 'format' locally to fix."
            echo ""
            echo "Changes detected:"
            git --no-pager diff
            exit 1
          fi

  # Test and push - sequential steps ensure push only happens after test passes
  - name: "Test and push"
    container_image: "ubuntu-24.04"
    resource_requests:
      disk: "75GB"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    steps:
      - run: |
          # Skip if commit is from argocd-image-updater
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            echo "Skipping argocd-image-updater commit"
            exit 0
          fi
          # Exclude external tests (GHCR validation) - run in separate job
          bazel test //... --config=ci --deleted_packages=tools/python --test_tag_filters=-external

      - run: |
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            exit 0
          fi
          # Only push images on main branch (not PRs)
          branch="${GIT_BRANCH:-${GITHUB_REF_NAME:-}}"
          if [ "${branch}" != "main" ] && [ "${branch}" != "refs/heads/main" ]; then
            echo "Skipping image push for non-main branch: ${branch:-unknown}"
            exit 0
          fi
          # GHCR_TOKEN set in BuildBuddy Settings → Secrets
          echo "$GHCR_TOKEN" | docker login ghcr.io -u jomcgi --password-stdin
          bazel run //images:push_all --config=ci


  # GHCR Validation - validates pushed images without downloading blobs
  # Runs in parallel with other actions, fast (just API calls)
  # On main branch: applies "main" tag after successful validation
  - name: "GHCR Validation"
    container_image: "ubuntu-24.04"
    resource_requests:
      disk: "30GB"  # Bazel needs space for external/ dependencies even for analysis
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    steps:
      - run: |
          # Skip if commit is from argocd-image-updater
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            echo "Skipping argocd-image-updater commit"
            exit 0
          fi
          # GHCR_TOKEN set in BuildBuddy Settings → Secrets
          export GITHUB_TOKEN="$GHCR_TOKEN"
          # Only run GHCR validation tests (tagged "ghcr")
          # These tests are non-hermetic but fast - just manifest checks
          # Pass GITHUB_TOKEN to test sandbox for GHCR authentication
          bazel test //... --config=ci --test_tag_filters=ghcr --test_env=GITHUB_TOKEN

      # Tag validated images with "main" tag (only on main branch)
      - run: |
          # Skip if commit is from argocd-image-updater
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            exit 0
          fi

          # Only tag on main branch
          branch="${GIT_BRANCH:-${GITHUB_REF_NAME:-}}"
          if [ "${branch}" != "main" ] && [ "${branch}" != "refs/heads/main" ]; then
            echo "Skipping tag application for non-main branch: ${branch:-unknown}"
            exit 0
          fi

          echo "Applying 'main' tag to validated images..."

          # GHCR_TOKEN set in BuildBuddy Settings → Secrets
          export GITHUB_TOKEN="$GHCR_TOKEN"

          # Get crane from Bazel (ensures consistent version)
          CRANE=$(bazel run --run_under=echo @rules_oci//oci:crane)

          # Authenticate to GHCR
          echo "$GHCR_TOKEN" | $CRANE auth login ghcr.io -u jomcgi --password-stdin

          # Tag all validated model images with "main"
          # These correspond to the GHCR validation tests that just passed
          for model in qwen2_5_0_5b_gguf qwen2_5_0_5b_st qwen3_30b_a3b_awq; do
            repo="ghcr.io/jomcgi/homelab/models/${model}"

            # List all tags and find the most recent timestamp tag
            # Timestamp format: YYYY.MM.DD.HH.MM.SS-shortsha
            latest_tag=$($CRANE ls "${repo}" 2>/dev/null | \
              grep -E '^[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.' | \
              sort -r | head -1)

            if [ -z "$latest_tag" ]; then
              echo "WARNING: No timestamp tag found for ${model}, skipping..."
              continue
            fi

            echo "✓ Tagging ${repo}:${latest_tag} as 'main'"
            $CRANE tag "${repo}:${latest_tag}" main
          done

          echo "✓ All validated images tagged with 'main'"


