actions:
  # Format check - runs formatters and gazelle, auto-commits fixes on PR branches
  # Runs in parallel with Test and Push images
  - name: "Format check"
    container_image: "ubuntu-24.04"
    max_retries: 2
    resource_requests:
      memory: "8GB"
      disk: "20GB"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
        merge_with_base: false
    steps:
      - run: |
          # Skip automated commits to avoid loops
          AUTHOR="$(git log -1 --format='%an')"
          if [ "$AUTHOR" = "argocd-image-updater" ] || [ "$AUTHOR" = "ci-format-bot" ]; then
            echo "Skipping automated commit from $AUTHOR"
            exit 0
          fi

          # Run all formatters, generators, and gazelle in a single Bazel invocation.
          # This replaces the previous 3-call approach (bazel build + fast-format.sh + bazel run gazelle)
          # with one gRPC session, reducing transient connection failures.
          bazel run //bazel/tools/format:format --config=ci

          # Validate grep-based generate scripts against bazel query
          ./bazel/images/validate-generate-scripts.sh

          # Reject non-ASCII characters in commit messages.
          # Wrangler Pages (Cloudflare) fails with error 8000111 when commits
          # in the deployed branch contain non-ASCII characters (smart quotes,
          # em-dashes, arrows, etc.). Check all commits since origin/main.
          ./bazel/tools/git/check-commit-msg-ascii.sh --all origin/main

          # Check for formatting changes
          if git diff --exit-code; then
            echo "All files formatted correctly"
            exit 0
          fi

          # On main, fail — formatting must be correct before merge
          current_branch=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
          if [ "$current_branch" = "main" ]; then
            echo "ERROR: Code not formatted or BUILD files out of sync."
            echo "Run 'format' locally to fix."
            git --no-pager diff
            exit 1
          fi

          # On PR branches, auto-commit formatting fixes
          echo "Auto-committing formatting fixes..."
          git config user.name "ci-format-bot"
          git config user.email "ci-format-bot@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GHCR_TOKEN}@github.com/jomcgi/homelab.git"
          git add -u
          git commit -m "style: auto-format"
          git push origin HEAD:"$current_branch"
          echo "Formatting fixes pushed to $current_branch"

  # Test — runs in parallel with Push images (no dependency between them).
  # PR merge is gated on Test passing; Push images is informational on PRs.
  - name: "Test"
    container_image: "ubuntu-24.04"
    max_retries: 1
    resource_requests:
      cpu: "6"
      memory: "10GB"
      disk: "60GB"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
        merge_with_base: false
    steps:
      - run: |
          # Skip automated commits (no code to test)
          AUTHOR="$(git log -1 --format='%an')"
          if [ "$AUTHOR" = "argocd-image-updater" ]; then
            echo "Skipping automated commit from $AUTHOR"
            exit 0
          fi
          bazel test //... --config=ci --deleted_packages=bazel/tools/python --test_tag_filters=-external

  # Push images — runs in parallel with Test (no dependency).
  # PR images are tagged with the source branch name (not "main"),
  # so ArgoCD Image Updater ignores them. This ensures image builds are
  # verified before merge. PR merge is still gated on Test passing.
  - name: "Push images"
    container_image: "ubuntu-24.04"
    max_retries: 1
    resource_requests:
      cpu: "6"
      memory: "10GB"
      disk: "60GB"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
        merge_with_base: false
    steps:
      - run: |
          # Skip automated commits (digest-only bumps, nothing to push)
          AUTHOR="$(git log -1 --format='%an')"
          if [ "$AUTHOR" = "argocd-image-updater" ]; then
            echo "Skipping automated commit from $AUTHOR"
            exit 0
          fi

          # GHCR_TOKEN set in BuildBuddy Settings → Secrets
          echo "$GHCR_TOKEN" | docker login ghcr.io -u jomcgi --password-stdin
          bazel run //bazel/images:push_all --config=ci --stamp

  # Push pages — runs on main only, in parallel with Test and Push images
  - name: "Push pages"
    container_image: "ubuntu-24.04"
    max_retries: 1
    resource_requests:
      disk: "20GB"
    triggers:
      push:
        branches:
          - "main"
    steps:
      - run: |
          # Skip automated commits (digest-only bumps, no pages to deploy)
          AUTHOR="$(git log -1 --format='%an')"
          if [ "$AUTHOR" = "argocd-image-updater" ]; then
            echo "Skipping automated commit from $AUTHOR"
            exit 0
          fi

          # CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID set in BuildBuddy Settings → Secrets
          bazel run //projects/websites:push_all_pages --config=ci

  # Manifest diff — renders Helm manifests from main and PR, posts diff as PR comment
  # Runs in parallel with other actions (no depends_on), non-blocking (informational only)
  - name: "Manifest diff"
    container_image: "ubuntu-24.04"
    max_retries: 1
    resource_requests:
      disk: "20GB"
    triggers:
      pull_request:
        branches:
          - "*"
        merge_with_base: false
    steps:
      - run: ./bazel/helm/ci-diff-manifests.sh
