actions:
  # Format check - runs formatters and gazelle, auto-commits fixes on PR branches
  # Runs in parallel with Test action
  - name: "Format check"
    container_image: "ubuntu-24.04"
    resource_requests:
      disk: "30GB" # Slightly larger for format tools
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
        merge_with_base: false
    steps:
      - run: |
          # Skip automated commits to avoid loops
          AUTHOR="$(git log -1 --format='%an')"
          if [ "$AUTHOR" = "argocd-image-updater" ] || [ "$AUTHOR" = "ci-format-bot" ]; then
            echo "Skipping automated commit from $AUTHOR"
            exit 0
          fi

          # Build formatter tools and gazelle via Bazel and add to PATH
          bazel build \
            @aspect_rules_lint//format:ruff \
            @aspect_rules_lint//format:shfmt \
            @aspect_rules_lint//format:gofumpt \
            @buildifier_prebuilt//:buildifier \
            //bazel/tools/format:prettier \
            //:gazelle
          BAZEL_BIN=$(bazel info bazel-bin)
          # Create a local bin dir with symlinks to Bazel-built tools
          TOOLS_BIN="$PWD/.ci-tools/bin"
          mkdir -p "$TOOLS_BIN"
          for tool in ruff shfmt gofumpt buildifier prettier; do
            bin=$(find -L "$BAZEL_BIN" -name "$tool" -type f -perm /111 2>/dev/null | head -1)
            if [ -n "$bin" ]; then
              ln -sf "$bin" "$TOOLS_BIN/$tool"
            fi
          done
          ln -sf "$BAZEL_BIN/gazelle_binary_/gazelle_binary" "$TOOLS_BIN/gazelle"
          export PATH="$TOOLS_BIN:$PATH"

          # Run standalone format (formatters + generate scripts)
          # Skip standalone gazelle in CI — bazel run handles it below
          SKIP_GAZELLE=1 ./bazel/tools/format/fast-format.sh

          # Run gazelle via Bazel for accurate Go dependency resolution.
          # The standalone gazelle binary lacks Bazel module context needed to
          # map Go imports to @com_github_* labels.
          bazel run //:gazelle 2>&1 | grep -v "^INFO:"

          # Validate grep-based generate scripts against bazel query
          ./scripts/validate-generate-scripts.sh

          # Reject non-ASCII characters in commit messages.
          # Wrangler Pages (Cloudflare) fails with error 8000111 when commits
          # in the deployed branch contain non-ASCII characters (smart quotes,
          # em-dashes, arrows, etc.). Check all commits since origin/main.
          ./bazel/tools/git/check-commit-msg-ascii.sh --all origin/main

          # Check for formatting changes
          if git diff --exit-code; then
            echo "All files formatted correctly"
            exit 0
          fi

          # On main, fail — formatting must be correct before merge
          current_branch=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
          if [ "$current_branch" = "main" ]; then
            echo "ERROR: Code not formatted or BUILD files out of sync."
            echo "Run 'format' locally to fix."
            git --no-pager diff
            exit 1
          fi

          # On PR branches, auto-commit formatting fixes
          echo "Auto-committing formatting fixes..."
          git config user.name "ci-format-bot"
          git config user.email "ci-format-bot@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GHCR_TOKEN}@github.com/jomcgi/homelab.git"
          git add -u
          git commit -m "style: auto-format"
          git push origin HEAD:"$current_branch"
          echo "Formatting fixes pushed to $current_branch"

  # Test - runs full test suite on every push and PR
  # "Push images" and "Push pages" both depend on this and run in parallel after it succeeds
  - name: "Test"
    container_image: "ubuntu-24.04"
    resource_requests:
      cpu: "8"
      memory: "12GB"
      disk: "75GB"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
        merge_with_base: false
    steps:
      - run: |
          # Skip image-updater commits (digest-only bumps, no code to test)
          AUTHOR="$(git log -1 --format='%an')"
          if [ "$AUTHOR" = "argocd-image-updater" ]; then
            echo "Skipping automated commit from $AUTHOR"
            exit 0
          fi
          bazel test //... --config=ci --deleted_packages=bazel/tools/python --test_tag_filters=-external

  # Push images — runs on main only, after "Test" passes
  # Previously also ran on PRs, but BuildBuddy resolves GIT_BRANCH to the
  # target branch ("main") for PR events, causing PR images to overwrite
  # the "main" tag and deploy broken code via ArgoCD Image Updater.
  - name: "Push images"
    container_image: "ubuntu-24.04"
    resource_requests:
      cpu: "8"
      memory: "12GB"
      disk: "75GB"
    depends_on: ["Test"]
    triggers:
      push:
        branches:
          - "main"
    steps:
      - run: |
          # Skip image-updater commits (digest-only bumps, nothing to push)
          AUTHOR="$(git log -1 --format='%an')"
          if [ "$AUTHOR" = "argocd-image-updater" ]; then
            echo "Skipping automated commit from $AUTHOR"
            exit 0
          fi

          # GHCR_TOKEN set in BuildBuddy Settings → Secrets
          echo "$GHCR_TOKEN" | docker login ghcr.io -u jomcgi --password-stdin
          bazel run //bazel/images:push_all --config=ci --stamp

  # Push pages — runs on main only, parallel with "Push images", after "Test" passes
  # No dependency on "Push images" — static site deploys are independent of container images
  - name: "Push pages"
    container_image: "ubuntu-24.04"
    resource_requests:
      disk: "30GB"
    depends_on: ["Test"]
    triggers:
      push:
        branches:
          - "main"
    steps:
      - run: |
          # Skip image-updater commits (digest-only bumps, no pages to deploy)
          AUTHOR="$(git log -1 --format='%an')"
          if [ "$AUTHOR" = "argocd-image-updater" ]; then
            echo "Skipping automated commit from $AUTHOR"
            exit 0
          fi

          # CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID set in BuildBuddy Settings → Secrets
          bazel run //websites:push_all_pages --config=ci
