actions:
  # Format check - runs formatters and gazelle, verifies no changes needed
  # Runs in parallel with Test action
  - name: "Format check"
    container_image: "ubuntu-24.04"
    resource_requests:
      disk: "30GB" # Slightly larger for format tools
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    steps:
      - run: |
          # Skip if commit is from argocd-image-updater
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            echo "Skipping argocd-image-updater commit"
            exit 0
          fi

          # Build formatter tools via Bazel and add to PATH
          # TODO: Replace with OCI tools image once homelab-tools includes formatters
          bazel build \
            @aspect_rules_lint//format:ruff \
            @aspect_rules_lint//format:shfmt \
            @aspect_rules_lint//format:gofumpt \
            @buildifier_prebuilt//:buildifier \
            //tools/format:prettier \
            //:gazelle_binary
          BAZEL_BIN=$(bazel info bazel-bin)
          # Create a local bin dir with symlinks to Bazel-built tools
          TOOLS_BIN="$PWD/.ci-tools/bin"
          mkdir -p "$TOOLS_BIN"
          for tool in ruff shfmt gofumpt buildifier prettier gazelle; do
            bin=$(find -L "$BAZEL_BIN" -name "$tool" -type f -perm /111 2>/dev/null | head -1)
            if [ -n "$bin" ]; then
              ln -sf "$bin" "$TOOLS_BIN/$tool"
            fi
          done
          export PATH="$TOOLS_BIN:$PATH"

          # Run standalone format
          ./tools/format/fast-format.sh

          # Validate grep-based generate scripts against bazel query
          ./scripts/validate-generate-scripts.sh

          if ! git diff --exit-code; then
            echo "ERROR: Code not formatted or BUILD files out of sync."
            echo "Run 'format' locally to fix."
            echo ""
            echo "Changes detected:"
            git --no-pager diff
            exit 1
          fi

  # Test and push - runs test suite, pushes images on main branch
  - name: "Test and push"
    container_image: "ubuntu-24.04"
    resource_requests:
      cpu: "8"
      memory: "12GB"
      disk: "75GB"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    steps:
      - run: |
          # Skip if commit is from argocd-image-updater
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            echo "Skipping argocd-image-updater commit"
            exit 0
          fi
          bazel test //... --config=ci --deleted_packages=tools/python --test_tag_filters=-external

      # Push images on main branch only
      - run: |
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            exit 0
          fi

          current_branch=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
          if [ "$current_branch" != "main" ]; then
            echo "Skipping image push on non-main branch: $current_branch"
            exit 0
          fi

          # GHCR_TOKEN set in BuildBuddy Settings → Secrets
          echo "$GHCR_TOKEN" | docker login ghcr.io -u jomcgi --password-stdin
          bazel run //images:push_all --config=ci --stamp

      # Deploy CF Pages on main branch only
      # CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID set in BuildBuddy Settings → Secrets
      - run: |
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            exit 0
          fi

          current_branch=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
          if [ "$current_branch" != "main" ]; then
            echo "Skipping pages deploy on non-main branch: $current_branch"
            exit 0
          fi

          bazel run //websites:push_all_pages --config=ci
