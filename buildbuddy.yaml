actions:
  # Format check - runs formatters and gazelle, verifies no changes needed
  # Runs in parallel with Test action
  - name: "Format check"
    container_image: "ubuntu-24.04"
    resource_requests:
      disk: "30GB" # Slightly larger for format tools
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    steps:
      - run: |
          # Skip if commit is from argocd-image-updater
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            echo "Skipping argocd-image-updater commit"
            exit 0
          fi
          # Run full format (includes formatters + gazelle)
          bazel run //tools/format:fast_format
          if ! git diff --exit-code; then
            echo "ERROR: Code not formatted or BUILD files out of sync."
            echo "Run 'format' locally to fix."
            echo ""
            echo "Changes detected:"
            git --no-pager diff
            exit 1
          fi

  # Test and push - runs test suite, pushes service images on main branch
  # Model images are pushed manually via: bazel run //models:<model>.push
  - name: "Test and push"
    container_image: "ubuntu-24.04"
    resource_requests:
      disk: "75GB"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    steps:
      - run: |
          # Skip if commit is from argocd-image-updater
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            echo "Skipping argocd-image-updater commit"
            exit 0
          fi
          # Exclude external tests (GHCR validation) - run in separate job
          bazel test //... --config=ci --deleted_packages=tools/python --test_tag_filters=-external

      # Push service images (excludes models) on main branch only
      - run: |
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            exit 0
          fi

          current_branch=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
          if [ "$current_branch" != "main" ]; then
            echo "Skipping image push on non-main branch: $current_branch"
            exit 0
          fi

          # GHCR_TOKEN set in BuildBuddy Settings → Secrets
          echo "$GHCR_TOKEN" | docker login ghcr.io -u jomcgi --password-stdin
          bazel run //images:push_services --config=ci --stamp

  # GHCR Validation - validates pushed images without downloading blobs
  # Runs on ALL branches, applies branch-specific tag after validation
  # Main branch: tags as "main" for ArgoCD Image Updater
  # PR branches: tags as branch name for testing
  - name: "GHCR Validation"
    container_image: "ubuntu-24.04"
    resource_requests:
      disk: "30GB" # Bazel needs space for external/ dependencies even for analysis
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    steps:
      - run: |
          # Skip if commit is from argocd-image-updater
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            echo "Skipping argocd-image-updater commit"
            exit 0
          fi

          current_branch=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
          echo "Running GHCR validation for branch: $current_branch"

          # GHCR_TOKEN set in BuildBuddy Settings → Secrets
          export GITHUB_TOKEN="$GHCR_TOKEN"
          export CI=true  # Enable timestamp tag discovery

          # Run GHCR validation tests (tagged "ghcr")
          # Validates latest timestamp-tagged images before applying branch tag
          # Enable network access for RBE runners (required for GHCR API calls)
          bazel test //... --config=ci --test_tag_filters=ghcr --test_env=GITHUB_TOKEN --test_env=CI --remote_header=x-buildbuddy-platform.dockerNetwork=bridge

      # Tag validated images with branch name (e.g., "main", "fix/some-feature")
      - run: |
          # Skip if commit is from argocd-image-updater
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            exit 0
          fi

          # Get current branch name for tagging
          current_branch=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")

          # Sanitize branch name for container tag (replace / with -)
          branch_tag=$(echo "$current_branch" | sed 's/\//-/g')

          echo "Applying '$branch_tag' tag to validated images..."

          # GHCR_TOKEN set in BuildBuddy Settings → Secrets
          export GITHUB_TOKEN="$GHCR_TOKEN"

          # Get crane binary from Bazel's external cache
          # Crane is downloaded by the toolchain but not exposed as a runnable target
          # Find it in the Bazel output directory
          CRANE=$(find $(bazel info output_base 2>/dev/null)/external -name crane -type f -executable 2>/dev/null | grep linux_amd64 | head -1)

          if [ -z "$CRANE" ] || [ ! -x "$CRANE" ]; then
            echo "ERROR: Could not find crane binary in Bazel cache"
            exit 1
          fi

          echo "Using crane: $CRANE"

          # Authenticate to GHCR
          echo "$GHCR_TOKEN" | $CRANE auth login ghcr.io -u jomcgi --password-stdin

          # Tag all validated model images with branch tag
          # These correspond to the GHCR validation tests that just passed
          for model in qwen2_5_0_5b_gguf qwen2_5_0_5b_st qwen3_30b_a3b_awq; do
            repo="ghcr.io/jomcgi/homelab/models/${model}"

            # List all tags and find the most recent timestamp tag
            # Timestamp format: YYYY.MM.DD.HH.MM.SS-shortsha
            latest_tag=$($CRANE ls "${repo}" 2>/dev/null | \
              grep -E '^[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.' | \
              sort -r | head -1)

            if [ -z "$latest_tag" ]; then
              echo "WARNING: No timestamp tag found for ${model}, skipping..."
              continue
            fi

            echo "✓ Tagging ${repo}:${latest_tag} as '$branch_tag'"
            $CRANE tag "${repo}:${latest_tag}" "$branch_tag"
          done

          echo "✓ All validated images tagged with '$branch_tag'"

  # Deploy CF Pages - runs in parallel with other actions, main branch only
  - name: "Deploy Pages"
    container_image: "ubuntu-24.04"
    resource_requests:
      disk: "30GB"
    triggers:
      push:
        branches:
          - "main"
    steps:
      - run: |
          # Skip if commit is from argocd-image-updater
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            echo "Skipping argocd-image-updater commit"
            exit 0
          fi
          # CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID set in BuildBuddy Settings → Secrets
          bazel run //websites:push_all_pages --config=ci
