actions:
  # Format check - runs formatters and gazelle, verifies no changes needed
  # Runs in parallel with Test action
  - name: "Format check"
    container_image: "ubuntu-24.04"
    resource_requests:
      disk: "30GB"  # Slightly larger for format tools
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    steps:
      - run: |
          # Skip if commit is from argocd-image-updater
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            echo "Skipping argocd-image-updater commit"
            exit 0
          fi
          # Run full format (includes formatters + gazelle)
          bazel run //tools/format:fast_format
          if ! git diff --exit-code; then
            echo "ERROR: Code not formatted or BUILD files out of sync."
            echo "Run 'format' locally to fix."
            echo ""
            echo "Changes detected:"
            git --no-pager diff
            exit 1
          fi

  # Test and push - sequential steps ensure push only happens after test passes
  - name: "Test and push"
    container_image: "ubuntu-24.04"
    resource_requests:
      disk: "75GB"
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    steps:
      - run: |
          # Skip if commit is from argocd-image-updater
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            echo "Skipping argocd-image-updater commit"
            exit 0
          fi
          # Exclude external tests (GHCR validation) - run in separate job
          bazel test //... --config=ci --deleted_packages=tools/python --test_tag_filters=-external

      - run: |
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            exit 0
          fi
          # Only push images on main branch (not PRs)
          branch="${GIT_BRANCH:-${GITHUB_REF_NAME:-}}"
          if [ "${branch}" != "main" ] && [ "${branch}" != "refs/heads/main" ]; then
            echo "Skipping image push for non-main branch: ${branch:-unknown}"
            exit 0
          fi
          # GHCR_TOKEN set in BuildBuddy Settings → Secrets
          echo "$GHCR_TOKEN" | docker login ghcr.io -u jomcgi --password-stdin
          bazel run //images:push_all --config=ci


  # GHCR Validation - validates pushed images without downloading blobs
  # Runs in parallel with other actions, fast (just API calls)
  - name: "GHCR Validation"
    container_image: "ubuntu-24.04"
    resource_requests:
      disk: "10GB"  # Minimal - no model downloads
    triggers:
      push:
        branches:
          - "main"
      pull_request:
        branches:
          - "*"
    steps:
      - run: |
          # Skip if commit is from argocd-image-updater
          if [ "$(git log -1 --format='%an')" = "argocd-image-updater" ]; then
            echo "Skipping argocd-image-updater commit"
            exit 0
          fi
          # GHCR_TOKEN set in BuildBuddy Settings → Secrets
          export GITHUB_TOKEN="$GHCR_TOKEN"
          # Only run GHCR validation tests (tagged "ghcr")
          # These tests are non-hermetic but fast - just manifest checks
          bazel test //... --config=ci --test_tag_filters=ghcr


