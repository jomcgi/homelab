apiVersion: v1
kind: Namespace
metadata:
  name: onepassword-operator
  labels:
    name: onepassword-operator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: onepassword-operator
  namespace: onepassword-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: onepassword-operator
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["onepassword.com"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: onepassword-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: onepassword-operator
subjects:
- kind: ServiceAccount
  name: onepassword-operator
  namespace: onepassword-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onepassword-operator
  namespace: onepassword-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onepassword-operator
  template:
    metadata:
      labels:
        app: onepassword-operator
    spec:
      serviceAccountName: onepassword-operator
      containers:
      - name: operator
        image: 1password/onepassword-operator:latest
        env:
        - name: WATCH_NAMESPACE
          value: ""
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: OPERATOR_NAME
          value: "onepassword-operator"
        - name: OP_CONNECT_HOST
          valueFrom:
            secretKeyRef:
              name: onepassword-token
              key: connect-host
        - name: OP_CONNECT_TOKEN
          valueFrom:
            secretKeyRef:
              name: onepassword-token
              key: connect-token
        resources:
          requests:
            memory: 128Mi
            cpu: 100m
          limits:
            memory: 256Mi
            cpu: 200m
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Secret
metadata:
  name: onepassword-token
  namespace: onepassword-operator
type: Opaque
data:
  # These will need to be populated with your actual 1Password Connect values
  # connect-host: <base64-encoded-connect-host>
  # connect-token: <base64-encoded-connect-token>
  connect-host: ""
  connect-token: ""