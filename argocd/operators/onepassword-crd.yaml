apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: onepassworditems.onepassword.com
spec:
  group: onepassword.com
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              itemPath:
                type: string
                description: "Reference to the 1Password item"
              secretKey:
                type: string
                description: "The key within the secret to store the value"
            required:
            - itemPath
          status:
            type: object
            properties:
              phase:
                type: string
                enum: ["Pending", "Synced", "Failed"]
              message:
                type: string
    additionalPrinterColumns:
    - name: Status
      type: string
      jsonPath: .status.phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: onepassworditems
    singular: onepassworditem
    kind: OnePasswordItem
    shortNames:
    - op-item