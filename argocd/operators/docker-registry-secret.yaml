apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: docker-registry-secret
  namespace: argocd
spec:
  itemPath: "vaults/Infrastructure/items/Docker Registry"
  secretKey: "dockerconfigjson"
---
apiVersion: v1
kind: Secret
metadata:
  name: docker-config
  namespace: argocd
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: "" # This will be populated by the 1Password operator