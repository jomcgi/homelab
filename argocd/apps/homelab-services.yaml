apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: homelab-services
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/jomcgi/homelab.git
      revision: HEAD
      directories:
      - path: cluster/services/*
  template:
    metadata:
      name: '{{path.basename}}'
      namespace: argocd
      labels:
        app.kubernetes.io/name: '{{path.basename}}'
        app.kubernetes.io/part-of: homelab
    spec:
      project: default
      source:
        repoURL: https://github.com/jomcgi/homelab.git
        targetRevision: HEAD
        path: '{{path}}'
        kustomize:
          buildOptions: --load-restrictor LoadRestrictionsNone
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      # Pre-sync hook for services that need container builds
      operation:
        sync:
          hooks:
          - name: kaniko-build
            argocd.argoproj.io/hook: PreSync
            argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
            argocd.argoproj.io/sync-wave: "-1"