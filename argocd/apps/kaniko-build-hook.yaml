apiVersion: v1
kind: ConfigMap
metadata:
  name: kaniko-build-script
  namespace: argocd
data:
  build.sh: |
    #!/bin/bash
    set -e
    
    SERVICE_NAME="${SERVICE_NAME:-unknown}"
    SERVICE_PATH="${SERVICE_PATH:-cluster/services/${SERVICE_NAME}}"
    
    echo "🔍 Checking if ${SERVICE_NAME} needs container build..."
    
    # Check if service has a Dockerfile or build context
    if [ -f "${SERVICE_PATH}/Dockerfile" ] || [ -f "${SERVICE_PATH}/api/Dockerfile" ]; then
      echo "📦 Building container for ${SERVICE_NAME}..."
      
      # Determine build context
      if [ -f "${SERVICE_PATH}/api/Dockerfile" ]; then
        BUILD_CONTEXT="${SERVICE_PATH}/api"
        DOCKERFILE_PATH="${SERVICE_PATH}/api/Dockerfile"
      else
        BUILD_CONTEXT="${SERVICE_PATH}"
        DOCKERFILE_PATH="${SERVICE_PATH}/Dockerfile"
      fi
      
      # Generate image tag from git commit
      GIT_COMMIT=$(git rev-parse --short HEAD)
      IMAGE_TAG="${GIT_COMMIT}"
      
      # Build with Kaniko
      /kaniko/executor \
        --context="${BUILD_CONTEXT}" \
        --dockerfile="${DOCKERFILE_PATH}" \
        --destination="jomcgi/${SERVICE_NAME}:${IMAGE_TAG}" \
        --destination="jomcgi/${SERVICE_NAME}:latest" \
        --cache=true \
        --cache-ttl=24h
      
      # Update kustomization with new image tag
      if [ -f "${SERVICE_PATH}/deploy/kustomization.yaml" ]; then
        sed -i "s|newTag:.*|newTag: ${IMAGE_TAG}|" "${SERVICE_PATH}/deploy/kustomization.yaml"
      fi
      
      echo "✅ Build completed for ${SERVICE_NAME}:${IMAGE_TAG}"
    else
      echo "⏭️  No container build needed for ${SERVICE_NAME}"
    fi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kaniko-build-{{path.basename}}
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: kaniko
        image: gcr.io/kaniko-project/executor:latest
        command: ["/bin/sh"]
        args:
        - -c
        - |
          # Install git for commit info
          apk add --no-cache git
          
          # Clone the repository
          git clone https://github.com/jomcgi/homelab.git /workspace
          cd /workspace
          
          # Set environment variables
          export SERVICE_NAME={{path.basename}}
          export SERVICE_PATH={{path}}
          
          # Run build script
          /scripts/build.sh
        env:
        - name: DOCKER_CONFIG
          value: /kaniko/.docker
        volumeMounts:
        - name: docker-config
          mountPath: /kaniko/.docker
          readOnly: true
        - name: build-script
          mountPath: /scripts
          readOnly: true
        resources:
          requests:
            memory: 1Gi
            cpu: 500m
          limits:
            memory: 2Gi
            cpu: 1000m
      volumes:
      - name: docker-config
        secret:
          secretName: docker-config
      - name: build-script
        configMap:
          name: kaniko-build-script
          defaultMode: 0755