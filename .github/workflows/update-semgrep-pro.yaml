name: Update Semgrep Artifacts

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      semgrep_version:
        description: "Semgrep version (leave empty for latest)"
        required: false

concurrency:
  group: update-semgrep-pro
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup crane
        uses: imjasonh/setup-crane@v0.4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install semgrep
        env:
          SEMGREP_VERSION_INPUT: ${{ inputs.semgrep_version }}
        run: |
          set -euo pipefail
          if [ -n "${SEMGREP_VERSION_INPUT}" ]; then
            pip install "semgrep==${SEMGREP_VERSION_INPUT}"
          else
            pip install semgrep
          fi

      - name: Determine semgrep version
        id: version
        run: |
          set -euo pipefail
          SEMGREP_VERSION=$(python3 -c "from semgrep import __VERSION__; print(__VERSION__)")
          if ! [[ "${SEMGREP_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "ERROR: unexpected semgrep version format: ${SEMGREP_VERSION}"
            exit 1
          fi
          echo "semgrep_version=${SEMGREP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "date_tag=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "Semgrep version: ${SEMGREP_VERSION}"
          echo "Date tag: $(date -u +%Y%m%d)"

      - name: Download all artifacts
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
          SEMGREP_VERSION: ${{ steps.version.outputs.semgrep_version }}
        run: |
          set -euo pipefail

          # --- Helper: wait for background jobs and fail if any errored ---
          wait_all() {
            local failed=0
            for pid in "$@"; do
              wait "$pid" || failed=1
            done
            if [ "$failed" -ne 0 ]; then
              echo "ERROR: one or more background downloads failed"
              exit 1
            fi
          }

          # --- OSS engines (from PyPI wheels) ---
          download_oss_engines() {
            declare -A PLATFORMS=(
              ["amd64"]="manylinux2014_x86_64"
              ["arm64"]="manylinux2014_aarch64"
              ["osx-arm64"]="macosx_11_0_arm64"
              ["osx-x86_64"]="macosx_10_14_x86_64"
            )

            local pids=()
            for arch in "${!PLATFORMS[@]}"; do
              (
                platform="${PLATFORMS[$arch]}"
                dir="artifacts/oss-engine-${arch}"
                mkdir -p "${dir}"

                echo "[oss-engine-${arch}] Fetching PyPI wheel URL..."
                WHEEL_URL=$(curl --compressed -sSf "https://pypi.org/pypi/semgrep/${SEMGREP_VERSION}/json" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for f in data['urls']:
              if '${platform}' in f['filename'] and f['packagetype'] == 'bdist_wheel':
                  print(f['url'])
                  break
          else:
              print('ERROR: no wheel found for ${platform}', file=sys.stderr)
              sys.exit(1)
          ")

                echo "[oss-engine-${arch}] Downloading wheel: ${WHEEL_URL##*/}"
                curl --compressed -sSfL -o "/tmp/semgrep-${arch}.whl" "${WHEEL_URL}"

                # Wheel layout: {name}-{version}.data/purelib/semgrep/bin/semgrep-core
                unzip -p "/tmp/semgrep-${arch}.whl" "*/semgrep/bin/semgrep-core" > "${dir}/semgrep-core"
                chmod 755 "${dir}/semgrep-core"

                SIZE=$(stat --format=%s "${dir}/semgrep-core")
                echo "[oss-engine-${arch}] Extracted (${SIZE} bytes)"
                if [ "${SIZE}" -lt 30000000 ]; then
                  echo "ERROR: oss-engine-${arch} is suspiciously small (${SIZE} bytes, expected >30MB)"
                  exit 1
                fi

                rm -f "/tmp/semgrep-${arch}.whl"
              ) &
              pids+=($!)
            done
            wait_all "${pids[@]}"
            echo "All OSS engines downloaded."
          }

          # --- Pro engines ---
          download_pro_engines() {
            declare -A PLATFORMS=(
              ["amd64"]="manylinux"
              ["arm64"]="linux-arm64"
              ["osx-arm64"]="osx-arm64"
              ["osx-x86_64"]="osx-x86_64"
            )

            local pids=()
            for arch in "${!PLATFORMS[@]}"; do
              (
                platform="${PLATFORMS[$arch]}"
                dir="artifacts/engine-${arch}"
                mkdir -p "${dir}"

                echo "[engine-${arch}] Downloading pro engine..."
                curl --compressed -sSfL \
                  -H "Authorization: Bearer ${SEMGREP_APP_TOKEN}" \
                  "https://semgrep.dev/api/agent/deployments/deepbinary/${platform}?version=${SEMGREP_VERSION}" \
                  -o "${dir}/semgrep-core-proprietary"

                chmod 755 "${dir}/semgrep-core-proprietary"

                SIZE=$(stat --format=%s "${dir}/semgrep-core-proprietary")
                echo "[engine-${arch}] Downloaded (${SIZE} bytes)"
                if [ "${SIZE}" -lt 50000000 ]; then
                  echo "ERROR: engine-${arch} is suspiciously small (${SIZE} bytes, expected >50MB)"
                  exit 1
                fi
              ) &
              pids+=($!)
            done
            wait_all "${pids[@]}"
            echo "All pro engines downloaded."
          }

          # --- Pro rule packs ---
          download_rules() {
            local pids=()
            for lang in golang python javascript kubernetes; do
              (
                dir="artifacts/rules-${lang}"
                mkdir -p "${dir}"

                echo "[rules-${lang}] Downloading..."
                curl --compressed -sSfL \
                  -H "Authorization: Bearer ${SEMGREP_APP_TOKEN}" \
                  "https://semgrep.dev/c/p/${lang}" \
                  -o "${dir}/${lang}.yaml"

                echo "[rules-${lang}] Downloaded ($(stat --format=%s "${dir}/${lang}.yaml") bytes)"
              ) &
              pids+=($!)
            done
            wait_all "${pids[@]}"
            echo "All rule packs downloaded."
          }

          # --- SCA advisory rules ---
          download_sca_rules() {
            echo "[sca] Downloading supply-chain advisory rules..."
            # The scans/config endpoint requires User-Agent matching semgrep/<version>
            # and returns a JSON envelope with rules nested in a stringified rule_config field.
            curl --compressed -sSfL \
              -H "Authorization: Bearer ${SEMGREP_APP_TOKEN}" \
              -H "User-Agent: semgrep/${SEMGREP_VERSION}" \
              "https://semgrep.dev/api/agent/deployments/scans/config?dry_run=True&full_scan=True&semgrep_version=${SEMGREP_VERSION}&sca=True" \
              -o /tmp/sca-response.json

            echo "[sca] Splitting rules by ecosystem..."
            python3 -c "
          import json, sys, os
          from collections import defaultdict

          with open('/tmp/sca-response.json') as f:
              data = json.load(f)
          rule_config = data.get('rule_config')
          if not rule_config:
              print('ERROR: no rule_config in response', file=sys.stderr)
              sys.exit(1)
          all_rules = json.loads(rule_config).get('rules', [])
          print(f'[sca] Total advisory rules: {len(all_rules)}')

          namespace_to_eco = {'gomod': 'golang', 'pypi': 'python', 'npm': 'javascript'}

          by_eco = defaultdict(list)
          for rule in all_rules:
              dep = rule.get('r2c-internal-project-depends-on', {})
              for entry in dep.get('depends-on-either', []):
                  ns = entry.get('namespace', '')
                  eco = namespace_to_eco.get(ns)
                  if eco:
                      by_eco[eco].append(rule)
                      break

          for eco in ['golang', 'python', 'javascript']:
              rules = by_eco[eco]
              out_dir = f'artifacts/rules-sca-{eco}'
              os.makedirs(out_dir, exist_ok=True)
              out_path = f'{out_dir}/supply-chain.json'
              with open(out_path, 'w') as f:
                  json.dump({'rules': rules}, f, separators=(',', ':'))
              size = os.path.getsize(out_path)
              print(f'  [sca-{eco}] {len(rules)} rules ({size / 1024 / 1024:.1f} MB)')
              if size < 100000:
                  print(f'ERROR: {eco} rules file is suspiciously small ({size} bytes)', file=sys.stderr)
                  sys.exit(1)
          "

            rm -f /tmp/sca-response.json
            echo "[sca] Done."
          }

          # --- Run all four download groups in parallel ---
          download_oss_engines &
          pid_oss=$!
          download_pro_engines &
          pid_pro=$!
          download_rules &
          pid_rules=$!
          download_sca_rules &
          pid_sca=$!

          wait_all "$pid_oss" "$pid_pro" "$pid_rules" "$pid_sca"
          echo "All artifacts downloaded."

      - name: Package and push OCI artifacts
        id: digests
        env:
          DATE_TAG: ${{ steps.version.outputs.date_tag }}
        run: |
          set -euo pipefail

          DIGEST_DIR=$(mktemp -d)

          # content_hash DIR - deterministic hash of all files in a directory.
          # Used as an OCI tag so identical content produces the same digest.
          content_hash() {
            (cd "$1" && find . -type f | LC_ALL=C sort | xargs sha256sum | sha256sum | cut -d' ' -f1)
          }

          resolve_platform() {
            case "$1" in
              *osx-arm64)   echo "darwin/arm64" ;;
              *osx-x86_64)  echo "darwin/amd64" ;;
              *-arm64)      echo "linux/arm64" ;;
              *)            echo "linux/amd64" ;;
            esac
          }

          # Push a single artifact if its content has changed.
          # Computes a content hash tag, checks if the image already exists in
          # GHCR. If it does, reuses the existing manifest digest. Otherwise
          # pushes a new image tagged with both the content hash and date.
          # Usage: push_artifact <artifact-dir> <image-ref> <digest-key>
          push_artifact() {
            local artifact_dir="$1" image="$2" key="$3"
            local registry_image="${image%:*}"

            local hash
            hash=$(content_hash "${artifact_dir}")
            local content_tag="content-${hash:0:16}"

            local existing_digest
            existing_digest=$(crane digest "${registry_image}:${content_tag}" 2>/dev/null || echo "")

            if [ -n "${existing_digest}" ]; then
              echo "[${key}] Content unchanged (${content_tag}), reusing ${existing_digest}"
              echo "${key}=${existing_digest}" > "${DIGEST_DIR}/${key}"
              return
            fi

            local platform
            platform=$(resolve_platform "$image")

            echo "[${key}] Content changed (${content_tag}), packaging..."
            tar -cf "${artifact_dir}.tar" -C "${artifact_dir}" .

            echo "[${key}] Pushing ${image}..."
            crane append \
              -f "${artifact_dir}.tar" \
              -t "${image}" \
              --platform "${platform}"

            # Tag with content hash for future lookups
            crane tag "${image}" "${content_tag}"

            local digest
            digest=$(crane digest "${image}")
            echo "[${key}] Pushed -> ${digest}"
            echo "${key}=${digest}" > "${DIGEST_DIR}/${key}"
          }

          pids=()

          # Pro artifacts
          GHCR_PRO="ghcr.io/jomcgi/homelab/tools/semgrep-pro"
          for artifact in engine-amd64 engine-arm64 engine-osx-arm64 engine-osx-x86_64 rules-golang rules-python rules-javascript rules-kubernetes rules-sca-golang rules-sca-python rules-sca-javascript; do
            key="pro_${artifact//-/_}"
            push_artifact "artifacts/${artifact}" "${GHCR_PRO}/${artifact}:${DATE_TAG}" "${key}" &
            pids+=($!)
          done

          # OSS engine artifacts
          GHCR_OSS="ghcr.io/jomcgi/homelab/tools/semgrep"
          for artifact in oss-engine-amd64 oss-engine-arm64 oss-engine-osx-arm64 oss-engine-osx-x86_64; do
            image_name="${artifact#oss-}"
            key="oss_${image_name//-/_}"
            push_artifact "artifacts/${artifact}" "${GHCR_OSS}/${image_name}:${DATE_TAG}" "${key}" &
            pids+=($!)
          done

          # Wait for all pushes
          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=1
          done
          if [ "$failed" -ne 0 ]; then
            echo "ERROR: one or more OCI pushes failed"
            exit 1
          fi

          # Collect all digests into step outputs
          cat "${DIGEST_DIR}"/* >> "$GITHUB_OUTPUT"
          rm -rf "${DIGEST_DIR}"
          echo "All artifacts processed."

      - name: Update digest files if changed
        id: check
        env:
          # Pro digests
          DIGEST_PRO_ENGINE_AMD64: ${{ steps.digests.outputs.pro_engine_amd64 }}
          DIGEST_PRO_ENGINE_ARM64: ${{ steps.digests.outputs.pro_engine_arm64 }}
          DIGEST_PRO_ENGINE_OSX_ARM64: ${{ steps.digests.outputs.pro_engine_osx_arm64 }}
          DIGEST_PRO_ENGINE_OSX_X86_64: ${{ steps.digests.outputs.pro_engine_osx_x86_64 }}
          DIGEST_PRO_RULES_GOLANG: ${{ steps.digests.outputs.pro_rules_golang }}
          DIGEST_PRO_RULES_PYTHON: ${{ steps.digests.outputs.pro_rules_python }}
          DIGEST_PRO_RULES_JAVASCRIPT: ${{ steps.digests.outputs.pro_rules_javascript }}
          DIGEST_PRO_RULES_KUBERNETES: ${{ steps.digests.outputs.pro_rules_kubernetes }}
          DIGEST_PRO_RULES_SCA_GOLANG: ${{ steps.digests.outputs.pro_rules_sca_golang }}
          DIGEST_PRO_RULES_SCA_PYTHON: ${{ steps.digests.outputs.pro_rules_sca_python }}
          DIGEST_PRO_RULES_SCA_JAVASCRIPT: ${{ steps.digests.outputs.pro_rules_sca_javascript }}
          # OSS digests
          DIGEST_OSS_ENGINE_AMD64: ${{ steps.digests.outputs.oss_engine_amd64 }}
          DIGEST_OSS_ENGINE_ARM64: ${{ steps.digests.outputs.oss_engine_arm64 }}
          DIGEST_OSS_ENGINE_OSX_ARM64: ${{ steps.digests.outputs.oss_engine_osx_arm64 }}
          DIGEST_OSS_ENGINE_OSX_X86_64: ${{ steps.digests.outputs.oss_engine_osx_x86_64 }}
        run: |
          set -euo pipefail

          # Update pro digests
          PRO_FILE="bazel/semgrep/third_party/semgrep_pro/digests.bzl"
          cat > "${PRO_FILE}" << EOF
          """Semgrep Pro OCI artifact digests.

          Updated automatically by .github/workflows/update-semgrep-pro.yaml.
          Do not edit manually — changes will be overwritten.
          """

          SEMGREP_PRO_DIGESTS = {
              "engine_amd64": "${DIGEST_PRO_ENGINE_AMD64}",
              "engine_arm64": "${DIGEST_PRO_ENGINE_ARM64}",
              "engine_osx_arm64": "${DIGEST_PRO_ENGINE_OSX_ARM64}",
              "engine_osx_x86_64": "${DIGEST_PRO_ENGINE_OSX_X86_64}",
              "rules_golang": "${DIGEST_PRO_RULES_GOLANG}",
              "rules_python": "${DIGEST_PRO_RULES_PYTHON}",
              "rules_javascript": "${DIGEST_PRO_RULES_JAVASCRIPT}",
              "rules_kubernetes": "${DIGEST_PRO_RULES_KUBERNETES}",
              "rules_sca_golang": "${DIGEST_PRO_RULES_SCA_GOLANG}",
              "rules_sca_python": "${DIGEST_PRO_RULES_SCA_PYTHON}",
              "rules_sca_javascript": "${DIGEST_PRO_RULES_SCA_JAVASCRIPT}",
          }
          EOF

          # Update OSS digests
          OSS_FILE="bazel/semgrep/third_party/semgrep/digests.bzl"
          cat > "${OSS_FILE}" << EOF
          """Semgrep OSS engine OCI artifact digests.

          Updated automatically by .github/workflows/update-semgrep-pro.yaml.
          Do not edit manually — changes will be overwritten.
          """

          SEMGREP_DIGESTS = {
              "engine_amd64": "${DIGEST_OSS_ENGINE_AMD64}",
              "engine_arm64": "${DIGEST_OSS_ENGINE_ARM64}",
              "engine_osx_arm64": "${DIGEST_OSS_ENGINE_OSX_ARM64}",
              "engine_osx_x86_64": "${DIGEST_OSS_ENGINE_OSX_X86_64}",
          }
          EOF

          if git diff --quiet "${PRO_FILE}" "${OSS_FILE}"; then
            echo "No changes to digest files"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Digests changed:"
            git diff "${PRO_FILE}" "${OSS_FILE}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR with automerge
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATE_TAG: ${{ steps.version.outputs.date_tag }}
          SEMGREP_VERSION: ${{ steps.version.outputs.semgrep_version }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          BRANCH="update/semgrep-${DATE_TAG}"

          # Skip if a branch from a prior same-day run already exists
          if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null 2>&1; then
            echo "Branch ${BRANCH} already exists — skipping PR creation"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"
          git add bazel/semgrep/third_party/semgrep_pro/digests.bzl bazel/semgrep/third_party/semgrep/digests.bzl
          git commit -m "build(semgrep): update artifact digests"

          git push -u origin "${BRANCH}"

          gh pr create \
            --title "build(semgrep): update artifact digests" \
            --body "$(cat <<EOF
          ## Summary

          - Updates Semgrep OCI artifact digests (semgrep v${SEMGREP_VERSION})
          - Pro engine binaries: amd64, arm64, osx-arm64, osx-x86_64
          - Pro rule packs: golang, python, javascript, kubernetes
          - SCA advisory rules: golang, python, javascript (split by ecosystem)
          - OSS engine binaries: amd64, arm64, osx-arm64, osx-x86_64 (extracted from PyPI wheels)
          - Date tag: ${DATE_TAG}

          Auto-generated by the [Update Semgrep Artifacts](${WORKFLOW_URL}) workflow.
          EOF
          )"

          gh pr merge --auto --rebase
