name: Deploy External Secrets CRD

on:
  schedule:
    - cron: '0,30 * * * *'
  push:
    branches: [main]
    paths:
      - 'cluster/crd/external-secrets/**'
      - '.github/workflows/deploy-external-secrets-crd.yaml'
  workflow_dispatch:

env:
  SKAFFOLD_KUBECONFIG: /home/jomcgi/.kube/talos
  SKAFFOLD_ASSUME_YES: true

concurrency:
  group: deploy-external-secrets-crd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  external-secrets:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3
      - name: Skaffold External Secrets CRD
        run: |
          echo "🚀 Deploying external-secrets CRD..."
          skaffold run -f cluster/crd/external-secrets/skaffold.yaml
          echo "✅ external-secrets CRD deployment completed"