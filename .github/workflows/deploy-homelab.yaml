name: Deploy Homelab

on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches:
      - main
    paths:
      - 'cluster/**'
      - '.github/workflows/deploy-homelab.yaml'
  workflow_dispatch:
 

env:
  # Global Skaffold configuration
  SKAFFOLD_KUBECONFIG: /home/jomcgi/.kube/talos
  SKAFFOLD_ASSUME_YES: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-crds:
    runs-on: self-hosted
    timeout-minutes: 10
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include:
          - service: external-secrets
            path: cluster/crd/external-secrets/skaffold.yaml
          - service: longhorn
            path: cluster/crd/longhorn/skaffold.yaml
    steps:
      - uses: actions/checkout@v3
      - name: Deploy ${{ matrix.service }}
        id: deploy
        run: |
          echo "🚀 Deploying ${{ matrix.service }}..."
          skaffold run -f ${{ matrix.path }}
          echo "✅ ${{ matrix.service }} deployment completed"

  deploy-services:
    needs: [deploy-crds]
    runs-on: self-hosted
    timeout-minutes: 15
    if: |
      always() && 
      needs.deploy-crds.result == 'success'
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include:
          - service: cloudflare-tunnel
            path: cluster/services/cloudflare-tunnel/skaffold.yaml
            secrets-needed: true
          - service: grafana
            path: cluster/services/grafana-cloud/skaffold.yaml
            secrets-needed: true
          - service: obsidian
            path: cluster/services/obsidian/skaffold.yaml
            secrets-needed: false
          - service: open-webui
            path: cluster/services/open-webui/skaffold.yaml
            secrets-needed: true
          - service: otel-collector
            path: cluster/services/otel-collector/skaffold.yaml
            secrets-needed: true
          - service: obsidian-mcp
            path: cluster/services/obsidian-mcp/skaffold.yaml
            secrets-needed: true
    steps:
      - uses: actions/checkout@v3
      
      - name: Create secrets for ${{ matrix.service }}
        if: matrix.secrets-needed
        run: |
          case "${{ matrix.service }}" in
            "cloudflare-tunnel")
              echo "🔐 Creating Cloudflare Tunnel secrets..."
              kubectl create namespace cloudflare-tunnel --dry-run=client -o yaml | kubectl apply -f -
              kubectl create secret generic cloudflare-tunnel-credentials \
                --namespace=cloudflare-tunnel \
                --from-file=credentials.json=/home/jomcgi/.cloudflared/55d9c8bd-b6bf-4f67-bd5e-9219caf9c746.json \
                --dry-run=client -o yaml | kubectl apply -f -
              ;;
            "grafana")
              echo "🔐 Creating Grafana Cloud secrets..."
              kubectl apply -f cluster/services/grafana-cloud/namespace.yaml
              kubectl create secret generic grafana-cloud-secrets \
                --namespace=grafana \
                --from-literal=password="$GRAFANA_CLOUD_PASSWORD" \
                --from-literal=metrics-username="$GRAFANA_CLOUD_METRICS_USERNAME" \
                --from-literal=logs-username="$GRAFANA_CLOUD_LOGS_USERNAME" \
                --from-literal=otlp-username="$GRAFANA_CLOUD_OTLP_USERNAME" \
                --dry-run=client -o yaml | kubectl apply -f -
              ;;
            "open-webui")
              echo "🔐 Creating Open WebUI secrets..."
              kubectl create namespace open-webui --dry-run=client -o yaml | kubectl apply -f -
              kubectl create secret generic gemini-api-key \
                --namespace=open-webui \
                --from-literal=api-key="$GEMINI_API_KEY" \
                --dry-run=client -o yaml | kubectl apply -f -
              ;;
            "otel-collector")
              echo "🔐 Creating OpenTelemetry Collector secrets..."
              kubectl create namespace opentelemetry --dry-run=client -o yaml | kubectl apply -f -
              kubectl create secret generic otel-collector-secrets \
                --from-literal=honeycomb-api-key="$HONEYCOMB_API_SECRET" \
                -n opentelemetry -o yaml --dry-run=client | kubectl apply -f -
              ;;
            "obsidian-mcp")
              echo "🔐 Creating Obsidian MCP secrets..."
              kubectl create namespace obsidian-mcp --dry-run=client -o yaml | kubectl apply -f -
              kubectl create secret generic obsidian-mcp-config \
                --namespace=obsidian-mcp \
                --from-literal=github-token="${{ secrets.OBSIDIAN_GITHUB_PAT }}" \
                --dry-run=client -o yaml | kubectl apply -f -
              ;;
          esac
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GRAFANA_CLOUD_PASSWORD: ${{ secrets.GRAFANA_CLOUD_PASSWORD }}
          GRAFANA_CLOUD_METRICS_USERNAME: ${{ secrets.GRAFANA_CLOUD_METRICS_USERNAME }}
          GRAFANA_CLOUD_LOGS_USERNAME: ${{ secrets.GRAFANA_CLOUD_LOGS_USERNAME }}
          GRAFANA_CLOUD_OTLP_USERNAME: ${{ secrets.GRAFANA_CLOUD_OTLP_USERNAME }}
          OBSIDIAN_GITHUB_PAT: ${{ secrets.OBSIDIAN_GITHUB_PAT }}

      - name: Deploy ${{ matrix.service }}
        id: deploy
        run: |
          echo "🚀 Deploying ${{ matrix.service }}..."
          skaffold run -f ${{ matrix.path }}
          echo "✅ ${{ matrix.service }} deployment completed"
        env:
          GRAFANA_CLOUD_PASSWORD: ${{ secrets.GRAFANA_CLOUD_PASSWORD }}
          GRAFANA_CLOUD_METRICS_USERNAME: ${{ secrets.GRAFANA_CLOUD_METRICS_USERNAME }}
          GRAFANA_CLOUD_LOGS_USERNAME: ${{ secrets.GRAFANA_CLOUD_LOGS_USERNAME }}
          GRAFANA_CLOUD_OTLP_USERNAME: ${{ secrets.GRAFANA_CLOUD_OTLP_USERNAME }}
