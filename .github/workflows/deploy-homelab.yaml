
name: Deploy Homelab

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-homelab.yaml'
      - 'cluster/**/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-homelab:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v3
      - name: Create Secrets
        run: |
          kubectl create namespace cloudflare-tunnel --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic cloudflare-tunnel-credentials \
            --namespace=cloudflare-tunnel \
            --from-file=credentials.json=/home/jomcgi/.cloudflared/55d9c8bd-b6bf-4f67-bd5e-9219caf9c746.json \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create namespace open-webui --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic gemini-api-key \
            --namespace=open-webui \
            --from-literal=api-key="$GEMINI_API_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create namespace opentelemetry --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic otel-collector-secrets \
            --from-literal=honeycomb-api-key="$HONEYCOMB_API_SECRET" \
            -n opentelemetry -o yaml --dry-run=client | kubectl apply -f -

          kubectl create secret docker-registry docker-cfg \
            --namespace=github-webhook \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username=${DOCKER_USERNAME} \
            --docker-password=${DOCKER_TOKEN} \
            --dry-run=client -o yaml | kubectl apply --namespace=github-webhook -f -

          ssh-keyscan -t rsa github.com > github_known_hosts
          printf '%s\n' "$OBSIDIAN_REPO_DEPLOY_KEY" > ./id_ed25519_key

          kubectl create secret generic obsidian-repo-deploy-key \
            --namespace=obsidian \
            --from-file=id_ed25519=./id_ed25519_key \
            --from-file=known_hosts=./github_known_hosts \
            --dry-run=client -o yaml | kubectl apply -f -

        env:
          HONEYCOMB_API_SECRET: ${{secrets.HONEYCOMB_API_KEY}}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KUBECONFIG: /home/jomcgi/.kube/talos
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          OBSIDIAN_REPO_DEPLOY_KEY: ${{secrets.OBSIDIAN_REPO_DEPLOY_KEY}}
        
      - name: Deploy Cluster Services
        run:
          skaffold run -f cluster/services/skaffold.yaml
        env:
          KUBECONFIG: /home/jomcgi/.kube/talos