name: Deploy Homelab

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-homelab.yaml'
      - 'cluster/**'
      - 'services/**'
      - 'skaffold.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-homelab:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v3
      - name: Deploy Homelab
        run: |
          kubectl create secret generic otel-collector-secrets --from-literal=honeycomb-api-key=$HONEYCOMB_API_SECRET -n opentelemetry -o yaml --dry-run=client | kubectl apply -f -
          kubectl create secret generic obsidian-repo-deploy-key --from-literal=deploy-key=$OBSIDIAN_REPO_DEPLOY_KEY -n obsidian -o yaml --dry-run=client | kubectl apply -f -
          skaffold run -f skaffold.yaml --build-concurrency=0 --default-repo=registry.localhost:30500 --insecure-registry registry.localhost:30500
        env:
          HONEYCOMB_API_SECRET: ${{secrets.HONEYCOMB_API_KEY}}
          OBSIDIAN_REPO_DEPLOY_KEY: ${{secrets.OBSIDIAN_REPO_DEPLOY_KEY}}