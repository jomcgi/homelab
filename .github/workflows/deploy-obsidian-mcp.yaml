name: Deploy Obsidian MCP

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  push:
    branches: [main]
    paths:
      - 'cluster/services/obsidian-mcp/**'
      - '.github/workflows/deploy-obsidian-mcp.yaml'
  workflow_dispatch:

env:
  SKAFFOLD_KUBECONFIG: /home/jomcgi/.kube/talos
  SKAFFOLD_ASSUME_YES: true

concurrency:
  group: deploy-obsidian-mcp-${{ github.ref }}
  cancel-in-progress: false

jobs:
  obsidian-mcp:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v3
      
      - name: Create Obsidian MCP secrets
        run: |
          echo "🔐 Creating Obsidian MCP secrets..."
          kubectl create namespace obsidian-mcp --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic obsidian-mcp-config \
            --namespace=obsidian-mcp \
            --from-literal=github-token="${{ secrets.OBSIDIAN_GITHUB_PAT }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Skaffold Obsidian MCP
        run: |
          echo "🚀 Deploying obsidian-mcp..."
          skaffold run -f cluster/services/obsidian-mcp/skaffold.yaml
          echo "✅ obsidian-mcp deployment completed"