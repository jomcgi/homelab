name: CF Pages - Deploy jomcgi.dev

on:
  push:
    branches:
      - main
    paths:
      - 'websites/jomcgi.dev/**'
      - '.github/workflows/cf-pages-deploy-homepage.yaml'
  workflow_dispatch:

concurrency:
  group: cf-pages-deploy-homepage-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: homelab-runners
    name: Build and Deploy jomcgi.dev
    timeout-minutes: 5
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'websites/jomcgi.dev/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: websites/jomcgi.dev

      - name: Build site
        run: npm run build
        working-directory: websites/jomcgi.dev

      - name: Deploy jomcgi.dev to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=jomcgi-dev
          workingDirectory: websites/jomcgi.dev
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
