name: Update Hike Data to R2

on:
  # schedule:
  #   # Run every 30 minutes (aligned with other workflows)
  #   - cron: '0,30 * * * *'
  push:
    branches:
      - main
    paths:
      - 'projects/static_rewrite_find_good_hikes/build/**'
      - '.github/workflows/update-hike-data.yml'
  workflow_dispatch:  # Allow manual triggering

concurrency:
  group: update-hike-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: self-hosted
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'projects/static_rewrite_find_good_hikes/build/requirements.txt'

      - name: Install dependencies
        run: |
          echo "Installing Python dependencies for hike data generation..."
          cd projects/static_rewrite_find_good_hikes/build
          pip install -r requirements.txt

      - name: Clean up old R2 files
        run: |
          echo "Cleaning up old files from R2 bucket..."
          cd projects/static_rewrite_find_good_hikes
          python3 scripts/cleanup_r2.py
        env:
          CLOUDFLARE_S3_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_S3_ACCESS_KEY_ID }}
          CLOUDFLARE_S3_ACCESS_KEY_SECRET: ${{ secrets.CLOUDFLARE_S3_ACCESS_KEY_SECRET }}
          CLOUDFLARE_S3_ENDPOINT: ${{ secrets.CLOUDFLARE_S3_ENDPOINT }}
          R2_BUCKET_NAME: jomcgi-hikes

      - name: Generate bundled data
        run: |
          echo "Generating bundled hike data..."
          cd projects/static_rewrite_find_good_hikes/build
          python generate_bundle_direct.py
          echo "Bundle successfully uploaded to R2!"
        env:
          CLOUDFLARE_S3_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_S3_ACCESS_KEY_ID }}
          CLOUDFLARE_S3_ACCESS_KEY_SECRET: ${{ secrets.CLOUDFLARE_S3_ACCESS_KEY_SECRET }}
          CLOUDFLARE_S3_ENDPOINT: ${{ secrets.CLOUDFLARE_S3_ENDPOINT }}
          R2_BUCKET_NAME: jomcgi-hikes