name: Build GitHub Actions Runner Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/runners/Dockerfile"
      - ".github/workflows/gh-arc-runner-image.yaml"
  pull_request:
    paths:
      - ".github/runners/Dockerfile"
      - ".github/workflows/gh-arc-runner-image.yaml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/gh-arc-runner

jobs:
  build-and-push:
    name: Build and Push Runner Image
    runs-on: ubuntu-latest # Use GitHub-hosted runner to bootstrap
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-
            type=ref,event=pr

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .github/runners
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image pushed summary
        if: success() && github.event_name != 'pull_request'
        run: |
          echo "Successfully pushed runner image:"
          echo "${{ steps.meta.outputs.tags }}"
