name: Opentelemetry Collector

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-opentelemetry-collector.yaml'
      - 'cluster/opentelemetry-collector/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-opentelemetry-collector:
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v3
      - name: Deploy Opentelemetry Collector
        env:
          HONEYCOMB_API_KEY: ${{ secrets.HONEYCOMB_API_KEY }}
        run: |
          skaffold run -f cluster/opentelemetry-collector/skaffold.yaml