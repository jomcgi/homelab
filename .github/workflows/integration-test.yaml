name: Kubernetes Integration Test

on:
  pull_request:
    branches:
      - main

jobs:
  minikube-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Minikube
        uses: medyagh/setup-minikube@latest

      - name: Verify Minikube status
        run: minikube status

      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/v2.16.0/skaffold-linux-amd64
          chmod +x skaffold
          sudo mv skaffold /usr/local/bin/

      - name: Verify Skaffold installation
        run: skaffold version

      - name: Install helm
        uses: azure/setup-helm@v4.3.0

      - name: Install helm repos
        run: |
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo add longhorn https://charts.longhorn.io
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add open-webui https://helm.open-webui.com/
          helm repo add uptime-kuma https://dirsigler.github.io/uptime-kuma-helm
          helm repo update

      - name: Deploy CRDs
        run: skaffold run -f cluster/crd/skaffold.yaml

      - name: Deploy cloudflare-tunnel
        run: skaffold run -f cluster/services/cloudflare-tunnel/skaffold.yaml

      - name: Deploy github-webhook-handler
        run: skaffold run -f cluster/services/github-webhook-handler/skaffold.yaml

      - name: Deploy grafana-cloud
        run: skaffold run -f cluster/services/grafana-cloud/skaffold.yaml

      - name: Deploy obsidian
        run: skaffold run -f cluster/services/obsidian/skaffold.yaml

      - name: Deploy open-webui
        run: skaffold run -f cluster/services/open-webui/skaffold.yaml

      - name: Deploy otel-collector
        run: skaffold run -f cluster/services/otel-collector/skaffold.yaml

      - name: Deploy uptime-kuma
        run: skaffold run -f cluster/services/uptime-kuma/skaffold.yaml

      - name: Run Health and Configuration Checks
        run: |
          chmod +x scripts/integration-test-checks.sh
          scripts/integration-test-checks.sh

      - name: Run integration tests
        run: echo "Running integration tests..."
