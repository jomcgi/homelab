name: CF Pages - Deploy hikes.jomcgi.dev

on:
  schedule:
    - cron: "0,30 * * * *"
  push:
    branches:
      - main
    paths:
      - "websites/hikes.jomcgi.dev/**"
      - "services/hikes/**"
      - ".github/workflows/cf-pages-deploy-hikes.yaml"
  workflow_dispatch:

concurrency:
  group: cf-pages-deploy-hikes-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: homelab-runners # Needs Docker-in-Docker to pull and run images
    timeout-minutes: 10
    name: Update Hike Data

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built hikes update image
        run: docker pull ghcr.io/jomcgi/homelab/services/hikes/update_forecast:main

      - name: Run update container
        run: |
          docker run --rm \
            -e CLOUDFLARE_S3_ACCESS_KEY_ID="${{ secrets.CLOUDFLARE_S3_ACCESS_KEY_ID }}" \
            -e CLOUDFLARE_S3_ACCESS_KEY_SECRET="${{ secrets.CLOUDFLARE_S3_ACCESS_KEY_SECRET }}" \
            -e CLOUDFLARE_S3_ENDPOINT="${{ secrets.CLOUDFLARE_S3_ENDPOINT }}" \
            -e R2_BUCKET_NAME="jomcgi-hikes" \
            ghcr.io/jomcgi/homelab/services/hikes/update_forecast:main

  deploy:
    runs-on: homelab-runners
    name: Deploy hikes.jomcgi.dev
    timeout-minutes: 5
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Deploy hikes.jomcgi.dev to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=jomcgi-hikes
          workingDirectory: websites/hikes.jomcgi.dev
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
