name: CF Pages - Deploy Hikes

on:
  schedule:
    - cron: '0,30 * * * *'
  push:
    branches:
      - main
    paths:
      - 'websites/hikes/**'
      - '.github/workflows/cf-pages-deploy-hikes.yaml'
  workflow_dispatch:  # Allow manual deployment

jobs:
  update-data:
    runs-on: self-hosted
    timeout-minutes: 10
    name: Update Hike Data
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'websites/hikes/build/requirements.txt'

      - name: Install dependencies
        run: |
          echo "Installing Python dependencies for hike data generation..."
          cd websites/hikes/build
          pip install -r requirements.txt

      - name: Generate bundled data
        run: |
          echo "Generating bundled hike data..."
          cd websites/hikes/build
          python generate_bundle_direct.py
          echo "Bundle successfully uploaded to R2!"
        env:
          CLOUDFLARE_S3_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_S3_ACCESS_KEY_ID }}
          CLOUDFLARE_S3_ACCESS_KEY_SECRET: ${{ secrets.CLOUDFLARE_S3_ACCESS_KEY_SECRET }}
          CLOUDFLARE_S3_ENDPOINT: ${{ secrets.CLOUDFLARE_S3_ENDPOINT }}
          R2_BUCKET_NAME: jomcgi-hikes
  deploy:
    runs-on: self-hosted
    name: Deploy to Cloudflare Pages
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=jomcgi-hikes
          workingDirectory: websites/hikes
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
        
      
      - name: Output deployment URL
        run: |
          echo "Site deployed to Cloudflare Pages!"
          echo "Visit: https://static-hikes.jomcgi.dev"