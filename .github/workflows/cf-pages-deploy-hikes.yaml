name: Hikes - Update Forecast Data

on:
  schedule:
    - cron: "0,30 * * * *"
  push:
    branches:
      - main
    paths:
      - "projects/hikes/**"
      - ".github/workflows/cf-pages-deploy-hikes.yaml"
  workflow_dispatch:

concurrency:
  group: hikes-update-data-${{ github.ref }}
  cancel-in-progress: false

permissions:
  packages: read

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Update Hike Data

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built hikes update image
        run: docker pull ghcr.io/jomcgi/homelab/projects/hikes/update_forecast:main

      - name: Run update container
        run: |
          docker run --rm \
            -e CLOUDFLARE_S3_ACCESS_KEY_ID="${{ secrets.CLOUDFLARE_S3_ACCESS_KEY_ID }}" \
            -e CLOUDFLARE_S3_ACCESS_KEY_SECRET="${{ secrets.CLOUDFLARE_S3_ACCESS_KEY_SECRET }}" \
            -e CLOUDFLARE_S3_ENDPOINT="${{ secrets.CLOUDFLARE_S3_ENDPOINT }}" \
            -e R2_BUCKET_NAME="jomcgi-hikes" \
            ghcr.io/jomcgi/homelab/projects/hikes/update_forecast:main
