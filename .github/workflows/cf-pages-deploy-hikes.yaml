name: CF Pages - Deploy hikes.jomcgi.dev

on:
  schedule:
    - cron: '0,30 * * * *'
  push:
    branches:
      - main
    paths:
      - 'websites/hikes.jomcgi.dev/**'
      - '.github/workflows/cf-pages-deploy-hikes.yaml'
  workflow_dispatch:

concurrency:
  group: cf-pages-deploy-hikes-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: self-hosted
    timeout-minutes: 10
    name: Update Hike Data
    defaults:
      run:
        working-directory: websites/hikes.jomcgi.dev/update_forecast
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'websites/hikes.jomcgi.dev/update_forecast/requirements.txt'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Update forecast data for hikes.jomcgi.dev
        run: |
          python update.py
        env:
          CLOUDFLARE_S3_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_S3_ACCESS_KEY_ID }}
          CLOUDFLARE_S3_ACCESS_KEY_SECRET: ${{ secrets.CLOUDFLARE_S3_ACCESS_KEY_SECRET }}
          CLOUDFLARE_S3_ENDPOINT: ${{ secrets.CLOUDFLARE_S3_ENDPOINT }}
          R2_BUCKET_NAME: jomcgi-hikes

  test:
    runs-on: self-hosted
    timeout-minutes: 10
    name: Test hikes.jomcgi.dev
    defaults:
      run:
        working-directory: websites/hikes.jomcgi.dev
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'websites/hikes.jomcgi.dev/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test:ci

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: websites/hikes.jomcgi.dev/playwright-report/
          retention-days: 30

  deploy:
    runs-on: self-hosted
    name: Deploy hikes.jomcgi.dev
    needs: [test]
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Deploy hikes.jomcgi.dev to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=jomcgi-hikes
          workingDirectory: websites/hikes.jomcgi.dev
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}