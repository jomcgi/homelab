name: Container Registry

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-container-register.yaml'
      - 'cluster/container-register/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-container-registry:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Deploy Container Registry
        run: |
          skaffold run -f cluster/container-registry/skaffold.yaml