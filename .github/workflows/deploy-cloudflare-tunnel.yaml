name: Deploy Cloudflare Tunnel

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  push:
    branches: [main]
    paths:
      - 'cluster/services/cloudflare-tunnel/**'
      - '.github/workflows/deploy-cloudflare-tunnel.yaml'
  workflow_dispatch:

env:
  SKAFFOLD_KUBECONFIG: /home/jomcgi/.kube/talos
  SKAFFOLD_ASSUME_YES: true

concurrency:
  group: deploy-cloudflare-tunnel-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cloudflare-tunnel:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v3
      
      - name: Create Cloudflare Tunnel secrets
        run: |
          echo "🔐 Creating Cloudflare Tunnel secrets..."
          kubectl create namespace cloudflare-tunnel --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic cloudflare-tunnel-credentials \
            --namespace=cloudflare-tunnel \
            --from-file=credentials.json=/home/jomcgi/.cloudflared/55d9c8bd-b6bf-4f67-bd5e-9219caf9c746.json \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Skaffold Cloudflare Tunnel
        run: |
          echo "🚀 Deploying cloudflare-tunnel..."
          skaffold run -f cluster/services/cloudflare-tunnel/skaffold.yaml
          echo "✅ cloudflare-tunnel deployment completed"