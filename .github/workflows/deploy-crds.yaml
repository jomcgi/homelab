
name: Deploy CRDs

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-crds.yaml'
      - 'cluster/crd/**/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-crds:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v3
      - name: Deploy Cluster CRDs
        run:
          skaffold run -f cluster/crd/skaffold.yaml
        env:
          KUBECONFIG: /home/jomcgi/.kube/talos
