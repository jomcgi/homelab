name: Deploy CRDs

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  push:
    branches: [main]
    paths:
      - 'cluster/crd/**'
      - '.github/workflows/deploy-crds.yaml'
  workflow_dispatch:

env:
  SKAFFOLD_KUBECONFIG: /home/jomcgi/.kube/talos
  SKAFFOLD_ASSUME_YES: true

concurrency:
  group: deploy-crds-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-external-secrets:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3
      - name: Deploy External Secrets CRD
        run: |
          echo "🚀 Deploying external-secrets CRD..."
          skaffold run -f cluster/crd/external-secrets/skaffold.yaml
          echo "✅ external-secrets CRD deployment completed"

  deploy-longhorn:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3
      - name: Deploy Longhorn CRD
        run: |
          echo "🚀 Deploying longhorn CRD..."
          skaffold run -f cluster/crd/longhorn/skaffold.yaml
          echo "✅ longhorn CRD deployment completed"