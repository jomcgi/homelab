name: Garbage Collect Container Registry

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/gc-container-registry.yaml'
      - 'bin/container_registry_garbage_collection.py'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gc-container-registry:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Garbage Collect Container Registry
        run:
          printenv
          python3 ./bin/container_registry_garbage_collection.py --days 3 --no-dry-run
  
