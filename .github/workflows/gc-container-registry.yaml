name: Garbage Collect Container Registry

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gc-container-registry:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Garbage Collect Container Registry
        run:
          ./bin/container_registry_garbage_collection.py --days 3 --no-dry-run
  
