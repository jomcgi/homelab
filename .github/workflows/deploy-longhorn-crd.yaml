name: Deploy Longhorn CRD

on:
  schedule:
    - cron: '0 0 1,15 * *'
  push:
    branches: [main]
    paths:
      - 'cluster/crd/longhorn/**'
      - '.github/workflows/deploy-longhorn-crd.yaml'
  workflow_dispatch:

env:
  SKAFFOLD_KUBECONFIG: /home/jomcgi/.kube/talos
  SKAFFOLD_ASSUME_YES: true

concurrency:
  group: deploy-longhorn-crd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  longhorn:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3
      - name: Skaffold Longhorn CRD
        run: |
          echo "🚀 Deploying longhorn CRD..."
          skaffold run -f cluster/crd/longhorn/skaffold.yaml
          echo "✅ longhorn CRD deployment completed"
