name: Deploy OpenTelemetry Collector

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  push:
    branches: [main]
    paths:
      - 'cluster/services/otel-collector/**'
      - '.github/workflows/deploy-otel-collector.yaml'
  workflow_dispatch:

env:
  SKAFFOLD_KUBECONFIG: /home/jomcgi/.kube/talos
  SKAFFOLD_ASSUME_YES: true

concurrency:
  group: deploy-otel-collector-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v3
      
      - name: Create OpenTelemetry Collector secrets
        run: |
          echo "🔐 Creating OpenTelemetry Collector secrets..."
          kubectl create namespace opentelemetry --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic otel-collector-secrets \
            --from-literal=honeycomb-api-key="$HONEYCOMB_API_SECRET" \
            -n opentelemetry -o yaml --dry-run=client | kubectl apply -f -
        env:
          HONEYCOMB_API_SECRET: ${{ secrets.HONEYCOMB_API_SECRET }}

      - name: Deploy OpenTelemetry Collector
        run: |
          echo "🚀 Deploying otel-collector..."
          skaffold run -f cluster/services/otel-collector/skaffold.yaml
          echo "✅ otel-collector deployment completed"