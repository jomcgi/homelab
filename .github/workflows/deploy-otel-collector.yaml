
name: Deploy Opentelemetry Collector

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-otel-collector.yaml'
      - 'cluster/services/otel-collector/**/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-otel-collector:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v3
      - name: Create Opentelemetry Collector Secrets
        run: |
          kubectl create namespace opentelemetry --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic otel-collector-secrets \
            --from-literal=honeycomb-api-key="$HONEYCOMB_API_SECRET" \
            -n opentelemetry -o yaml --dry-run=client | kubectl apply -f -
        env:
          HONEYCOMB_API_SECRET: ${{secrets.HONEYCOMB_API_KEY}}
          KUBECONFIG: /home/jomcgi/.kube/talos
      - name: Deploy Opentelemetry Collector
        run:
          skaffold run -f cluster/services/otel-collector/skaffold.yaml
        env:
          KUBECONFIG: /home/jomcgi/.kube/talos