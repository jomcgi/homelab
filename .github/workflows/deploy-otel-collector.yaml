name: Deploy OpenTelemetry Collector

on:
  schedule:
    - cron: '0,30 * * * *'
  push:
    branches: [main]
    paths:
      - 'cluster/services/otel-collector/**'
      - '.github/workflows/deploy-otel-collector.yaml'
  workflow_dispatch:

env:
  SKAFFOLD_KUBECONFIG: /home/jomcgi/.kube/talos
  SKAFFOLD_ASSUME_YES: true

concurrency:
  group: deploy-otel-collector-${{ github.ref }}
  cancel-in-progress: false

jobs:
  otel-collector:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v3

      - name: Skaffold  OpenTelemetry Collector
        run: |
          echo "🚀 Deploying otel-collector..."
          skaffold run -f cluster/services/otel-collector/skaffold.yaml
          echo "✅ otel-collector deployment completed"