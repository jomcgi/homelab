name: Self-Hosted Runner Job

on:
  # Triggers the workflow on push events for all branches
  push:
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  local-job:
    runs-on: self-hosted
    
    steps:
      # Checks-out your repository
      - uses: actions/checkout@v3

      - name: Debug permissions
        run: |
          whoami
          id
          ls -la /var/lib/apt/lists/
          ls -la /var/cache/apt/
          sudo -l

      # Run commands directly on the runner
      - name: Run local commands
        run: |
          echo "Running on the self-hosted runner..."
          echo "Current directory: $(pwd)"
          echo "Hostname: $(hostname)"
          echo "Date: $(date)"
          echo "Uptime: $(uptime)"
          
          # Example: Install software (uncomment if needed)
          apt-get update
          # sudo apt-get install -y your-package-name
          
          # Example: Run a service or application
          # cd your-app-directory
          # npm install
          # npm run build
          
          echo "Job completed successfully!"