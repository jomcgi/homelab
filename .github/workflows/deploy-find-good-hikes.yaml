name: Deploy Find Good Hikes

on:
  schedule:
    - cron: '0 0 1,15 * *'  # Deploy on 1st and 15th of each month
  push:
    branches: [main]
    paths:
      - 'cluster/services/find-good-hikes/**'
      - '.github/workflows/deploy-find-good-hikes.yaml'
  workflow_dispatch:

env:
  SKAFFOLD_KUBECONFIG: /home/jomcgi/.kube/talos
  SKAFFOLD_ASSUME_YES: true

concurrency:
  group: deploy-find-good-hikes-${{ github.ref }}
  cancel-in-progress: false

jobs:
  find-good-hikes:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy Find Good Hikes
        run: |
          echo "🚀 Deploying find-good-hikes..."
          skaffold run -f cluster/services/find-good-hikes/skaffold.yaml
          echo "✅ find-good-hikes deployment completed"
