name: Deploy Homelab

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-cluster.yaml'
      - 'cluster/**'
      - 'services/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-cluster:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Deploy Cluster
        run: |
          kubectl create secret generic otel-collector-secrets --from-literal=honeycomb-api-key=$HONEYCOMB_API_SECRET -n opentelemetry -o yaml --dry-run=client | kubectl apply -f -
          skaffold run -f cluster/skaffold.yaml --build-concurrency=0 --default-repo=registry.localhost:5000
        env:
          HONEYCOMB_API_SECRET: ${{secrets.HONEYCOMB_API_KEY}}
  deploy-services:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Deploy Services
        run: |
          skaffold run -f services/skaffold.yaml --build-concurrency=0 --default-repo=registry.localhost:5000
    needs: deploy-cluster