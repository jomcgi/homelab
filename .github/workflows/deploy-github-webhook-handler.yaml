
name: Deploy GitHub Webhook Handler

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-github-webhook-handler.yaml'
      - 'cluster/services/github-webhook-handler/**/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-github-webhook-handler:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v3
      - name: Create GitHub Webhook Handler Secrets
        run: |
          kubectl create namespace github-webhook --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry docker-cfg \
            --namespace=github-webhook \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username=${DOCKER_USERNAME} \
            --docker-password=${DOCKER_TOKEN} \
            --dry-run=client -o yaml | kubectl apply --namespace=github-webhook -f -
        env:
          KUBECONFIG: /home/jomcgi/.kube/talos
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Deploy GitHub Webhook Handler
        run:
          skaffold run -f cluster/services/github-webhook-handler/skaffold.yaml
        env:
          KUBECONFIG: /home/jomcgi/.kube/talos