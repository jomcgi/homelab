name: Deploy Open WebUI

on:
  schedule:
    - cron: '0 0 * * *'  # Every day
  push:
    branches: [main]
    paths:
      - 'cluster/services/open-webui/**'
      - '.github/workflows/deploy-open-webui.yaml'
  workflow_dispatch:

env:
  SKAFFOLD_KUBECONFIG: /home/jomcgi/.kube/talos
  SKAFFOLD_ASSUME_YES: true

concurrency:
  group: deploy-open-webui-${{ github.ref }}
  cancel-in-progress: false

jobs:
  open-webui:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v3
      
      - name: Create Open WebUI secrets
        run: |
          echo "🔐 Creating Open WebUI secrets..."
          kubectl create namespace open-webui --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic gemini-api-key \
            --namespace=open-webui \
            --from-literal=api-key="$GEMINI_API_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Skaffold Open WebUI
        run: |
          echo "🚀 Deploying open-webui..."
          skaffold run -f cluster/services/open-webui/skaffold.yaml
          echo "✅ open-webui deployment completed"