
name: Deploy Talos Cluster

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-talos-cluster.yaml'
      - 'cluster/talos/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-talos-cluster:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v3
      - name: Deploy Cluster CRDs
        run:
          skaffold run -f cluster/talos/crd/skaffold.yaml
        env:
          KUBECONFIG: /home/jomcgi/.kube/talos
      - name: Create Secrets
        run: |
          kubectl create namespace cloudflare-tunnel --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic cloudflare-tunnel-credentials \
            --namespace=cloudflare-tunnel \
            --from-file=credentials.json=/home/jomcgi/.cloudflared/55d9c8bd-b6bf-4f67-bd5e-9219caf9c746.json \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create namespace open-webui --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic gemini-api-key \
            --namespace=open-webui \
            --from-literal=api-key="$GEMINI_API_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -
          
          skaffold run -f cluster/talos/secret-store/skaffold.yaml

        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KUBECONFIG: /home/jomcgi/.kube/talos          
      - name: Deploy Cluster Services
        run:
          skaffold run -f cluster/talos/skaffold.yaml
        env:
          KUBECONFIG: /home/jomcgi/.kube/talos