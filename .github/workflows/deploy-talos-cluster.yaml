
name: Deploy Talos Cluster

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-talos-cluster.yaml'
      - 'cluster/talos/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-talos-cluster:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v3
      - name: Deploy Cluster CRDs
        run:
          skaffold run -f cluster/talos/crd/skaffold.yaml
        env:
          KUBECONFIG: /home/jomcgi/.kube/talos
      - name: Create Secret Store
        run: |
          kubectl create secret generic github-app-private-key \
            --namespace=external-secrets \
            --from-literal=privateKey.pem="$GH_APP_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -
          skaffold run -f cluster/talos/secret-store/skaffold.yaml
        env:
          GH_APP_KEY: ${{ secrets.GH_SECRET_STORE_KEY }}
          KUBECONFIG: /home/jomcgi/.kube/talos          
      - name: Deploy Cluster Services
        run:
          skaffold run -f cluster/talos/skaffold.yaml
        env:
          KUBECONFIG: /home/jomcgi/.kube/talos