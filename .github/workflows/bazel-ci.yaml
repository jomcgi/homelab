name: Bazel CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual triggers
    inputs:
      force_push_all:
        description: 'Force push all images (ignore digest comparison)'
        required: false
        type: boolean
        default: false

jobs:
  build-test-push:
    name: Bazel - build, test & push
    # Skip CI on commits from argocd-image-updater to prevent build loops
    if: "github.event.head_commit.author.name != 'argocd-image-updater'"
    runs-on: homelab-runners

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bazelisk
        run: |
          curl -LO "https://github.com/bazelbuild/bazelisk/releases/download/v1.1.0/bazelisk-linux-amd64"
          mkdir -p "${GITHUB_WORKSPACE}/bin/"
          mv bazelisk-linux-amd64 "${GITHUB_WORKSPACE}/bin/bazel"
          chmod +x "${GITHUB_WORKSPACE}/bin/bazel"

      - name: Configure Bazel
        run: |
          cat >> user.bazelrc << EOF
          # BuildBuddy RBE configuration (already in .bazelrc)
          common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
          EOF

      - name: Test
        run: "${GITHUB_WORKSPACE}/bin/bazel --output_base=/mnt/bazel-cache/output_base test --config=ci //... --deleted_packages=tools/python"

      - name: Build all images
        run: |
          # Build all images (Bazel cache makes this fast for unchanged images)
          echo "📦 Building all images (cached builds are near-instant)..."
          "${GITHUB_WORKSPACE}/bin/bazel" --output_base=/mnt/bazel-cache/output_base build --config=ci //images:push_all

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images (digest-based)
        id: push-images
        run: |
          # Check if force push is requested
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.force_push_all }}" = "true" ]; then
            echo "🚀 Force push mode - pushing all images unconditionally"

            # Get all push targets
            ALL_TARGETS=$(bazel query 'kind("oci_push", //...)' --output label 2>/dev/null)

            PUSHED_COUNT=0
            for target in $ALL_TARGETS; do
              echo "Pushing $target..."
              "${GITHUB_WORKSPACE}/bin/bazel" --output_base=/mnt/bazel-cache/output_base run --config=ci "$target"
              ((PUSHED_COUNT++))
            done

            echo "pushed=$PUSHED_COUNT" >> $GITHUB_OUTPUT
            echo "skipped=0" >> $GITHUB_OUTPUT
            echo "mode=force" >> $GITHUB_OUTPUT
          else
            echo "🚀 Smart push mode - only pushing images with changed digests"

            # Use digest-based push script (via bazel run for hermetic tools)
            # Note: This script compares local digest with registry and only pushes if different
            if "${GITHUB_WORKSPACE}/bin/bazel" --output_base=/mnt/bazel-cache/output_base run --config=ci //scripts:push-if-digest-changed 2>&1 | tee /tmp/push-output.log; then
              # Parse output for summary
              PUSHED=$(grep -c "✓ Pushed" /tmp/push-output.log || echo "0")
              SKIPPED=$(grep -c "⊘ Unchanged" /tmp/push-output.log || echo "0")

              echo "pushed=$PUSHED" >> $GITHUB_OUTPUT
              echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
              echo "mode=smart" >> $GITHUB_OUTPUT
            else
              echo "⚠️  Digest comparison script failed, falling back to unconditional push"

              # Fallback: push all images
              ALL_TARGETS=$(bazel query 'kind("oci_push", //...)' --output label 2>/dev/null)
              PUSHED_COUNT=0
              for target in $ALL_TARGETS; do
                echo "Pushing $target..."
                "${GITHUB_WORKSPACE}/bin/bazel" --output_base=/mnt/bazel-cache/output_base run --config=ci "$target"
                ((PUSHED_COUNT++))
              done

              echo "pushed=$PUSHED_COUNT" >> $GITHUB_OUTPUT
              echo "skipped=0" >> $GITHUB_OUTPUT
              echo "mode=fallback" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Summary
        if: always()
        run: |
          MODE="${{ steps.push-images.outputs.mode }}"
          PUSHED="${{ steps.push-images.outputs.pushed }}"
          SKIPPED="${{ steps.push-images.outputs.skipped }}"

          if [ "$MODE" = "force" ]; then
            echo "✅ Force pushed $PUSHED image(s)"
          elif [ "$MODE" = "fallback" ]; then
            echo "✅ Pushed $PUSHED image(s) (fallback mode)"
          else
            echo "✅ Pushed $PUSHED image(s) with changed digests"
            echo "ℹ️  Skipped $SKIPPED image(s) (digest unchanged)"
          fi
