name: Bazel CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual triggers

jobs:
  build-test-push:
    name: Bazel - build, test & push
    runs-on: homelab-runners

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Build, Test, and Push run on BuildBuddy Workflows (persistent VMs with warm Bazel server)
      # Format check runs separately via auto-format.yaml workflow
      # Secrets (GITHUB_TOKEN, GITHUB_ACTOR) are stored in BuildBuddy, not passed via API
      - name: Build, Test & Push with BuildBuddy Workflows
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          echo "🚀 Triggering BuildBuddy Workflows for build, test, and push..."

          # Call BuildBuddy ExecuteWorkflow API
          response=$(curl -s -w "\n%{http_code}" -d '{
            "repo_url": "https://github.com/jomcgi/homelab",
            "branch": "${{ github.ref_name }}",
            "commit_sha": "${{ github.sha }}",
            "action_names": ["Build", "Test", "Push"],
            "async": false
          }' \
          -H "x-buildbuddy-api-key: $BUILDBUDDY_API_KEY" \
          -H 'Content-Type: application/json' \
          https://app.buildbuddy.io/api/v1/ExecuteWorkflow)

          # Parse response
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)

          echo "Response: $body"

          if [ "$http_code" != "200" ]; then
            echo "❌ Failed to execute BuildBuddy workflow (HTTP $http_code)"
            echo "$body"
            exit 1
          fi

          # Check if any action failed (status.code != 0)
          if echo "$body" | grep -q '"code":[^0]'; then
            echo "❌ One or more BuildBuddy actions failed"

            # Extract and display action statuses
            echo "$body" | python3 -c '
          import sys, json
          data = json.load(sys.stdin)
          for action in data.get("actionStatuses", []):
              name = action.get("actionName", "Unknown")
              inv_id = action.get("invocationId", "N/A")
              status = action.get("status", {})
              code = status.get("code", 0)
              message = status.get("message", "")

              if code != 0:
                  print(f"❌ {name}: Failed (code {code})")
                  print(f"   Invocation: https://app.buildbuddy.io/invocation/{inv_id}")
                  print(f"   Error: {message}")
              else:
                  print(f"✅ {name}: Success")
                  print(f"   Invocation: https://app.buildbuddy.io/invocation/{inv_id}")
          '
            exit 1
          fi

          echo "✅ BuildBuddy workflow completed successfully"
