name: Bazel CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  # Use BuildBuddy for remote caching (optional)
  USE_BUILDBUDDY: false

jobs:
  build-and-test:
    name: Build and Test
    runs-on: homelab-runners

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bazelisk
        run: |
          curl -LO "https://github.com/bazelbuild/bazelisk/releases/download/v1.1.0/bazelisk-linux-amd64"
          mkdir -p "${GITHUB_WORKSPACE}/bin/"
          mv bazelisk-linux-amd64 "${GITHUB_WORKSPACE}/bin/bazel"
          chmod +x "${GITHUB_WORKSPACE}/bin/bazel"
      - name: Configure Bazel
        run: |
          cat >> user.bazelrc << EOF
          build --config=ci
          build --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
          test --config=ci
          test --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
          EOF
      - name: Build
        run: "${GITHUB_WORKSPACE}/bin/bazel build //..."
      - name: Test
        run: "${GITHUB_WORKSPACE}/bin/bazel test //..."

  push-images:
    name: Push Container Images
    runs-on: homelab-runners
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bazelisk
        run: |
          curl -LO "https://github.com/bazelbuild/bazelisk/releases/download/v1.1.0/bazelisk-linux-amd64"
          mkdir -p "${GITHUB_WORKSPACE}/bin/"
          mv bazelisk-linux-amd64 "${GITHUB_WORKSPACE}/bin/bazel"
          chmod +x "${GITHUB_WORKSPACE}/bin/bazel"

      - name: Configure Bazel
        run: |
          cat >> user.bazelrc << EOF
          build --config=ci
          build --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
          EOF

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push all container images
        run: |
          # Find all oci_push targets
          IMAGES=$(bazel query "kind('oci_push', //...)" 2>/dev/null || echo "")

          if [ -z "$IMAGES" ]; then
            echo "No container images found to push"
            exit 0
          fi

          echo "Found images to push:"
          echo "$IMAGES"
          echo ""

          # Push each image (tags: latest, YYYY.MM.DD.HH.MM.SS-shortsha)
          for img in $IMAGES; do
            echo "================================================"
            echo "Pushing: $img"
            echo "================================================"

            # Push with multiple tags (configured via remote_tags in BUILD files)
            # Tags are automatically generated from workspace_status.sh:
            # - latest
            # - STABLE_IMAGE_TAG (timestamp-based: YYYY.MM.DD.HH.MM.SS-shortsha)
            bazel run $img
          done

      - name: Image push summary
        if: success()
        run: |
          echo "✅ Successfully pushed all container images"
          bazel query "kind('oci_push', //...)" 2>/dev/null | sed 's/^/  - /'
