name: Bazel CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual triggers

jobs:
  build-test-push:
    name: Bazel - build, test & push
    runs-on: homelab-runners

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bazelisk
        run: |
          curl -LO "https://github.com/bazelbuild/bazelisk/releases/download/v1.1.0/bazelisk-linux-amd64"
          mkdir -p "${GITHUB_WORKSPACE}/bin/"
          mv bazelisk-linux-amd64 "${GITHUB_WORKSPACE}/bin/bazel"
          chmod +x "${GITHUB_WORKSPACE}/bin/bazel"

      - name: Configure Bazel
        run: |
          cat >> user.bazelrc << EOF
          # BuildBuddy RBE configuration (already in .bazelrc)
          common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
          EOF

      - name: Test
        run: "${GITHUB_WORKSPACE}/bin/bazel --output_base=/mnt/bazel-cache/output_base test --config=ci //..."

      - name: Build images
        run: "${GITHUB_WORKSPACE}/bin/bazel --output_base=/mnt/bazel-cache/output_base build --config=ci //images:push_all"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push
        run: "${GITHUB_WORKSPACE}/bin/bazel --output_base=/mnt/bazel-cache/output_base run --config=ci //images:push_all"
