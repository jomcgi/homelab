name: Bazel CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual cache refresh

jobs:
  build-test-push:
    name: Bazel - build, test & push
    runs-on: bazel-runner

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clear Bazel cache on scheduled runs
        if: github.event_name == 'schedule'
        run: |
          echo "🧹 Clearing Bazel repository cache for fresh rebuild..."
          rm -rf /home/runner/.cache/bazel/repository_cache/* || true
          rm -rf /home/runner/.cache/bazel/output_base/external/* || true
          echo "✅ Cache cleared - will rebuild from scratch"

      - name: Install bazelisk
        run: |
          curl -LO "https://github.com/bazelbuild/bazelisk/releases/download/v1.1.0/bazelisk-linux-amd64"
          mkdir -p "${GITHUB_WORKSPACE}/bin/"
          mv bazelisk-linux-amd64 "${GITHUB_WORKSPACE}/bin/bazel"
          chmod +x "${GITHUB_WORKSPACE}/bin/bazel"

      # Note: No cache action needed - persistent runner maintains Bazel cache in PVC

      - name: Configure Bazel
        run: |
          cat >> user.bazelrc << EOF
          # Import CI-specific startup options (persistent output base)
          try-import %workspace%/.bazelrc.ci

          build --config=ci
          build --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
          test --config=ci
          test --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
          run --config=ci
          run --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
          EOF
      - name: Build
        run: "${GITHUB_WORKSPACE}/bin/bazel build //..."
      - name: Test
        run: "${GITHUB_WORKSPACE}/bin/bazel test //..."

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push
        run: |
          # Find all oci_push targets
          IMAGES=$("${GITHUB_WORKSPACE}/bin/bazel" query "kind('oci_push', //...)" 2>/dev/null || echo "")

          if [ -z "$IMAGES" ]; then
            echo "No container images found to push"
            exit 0
          fi

          echo "Found images to push:"
          echo "$IMAGES"
          echo ""

          # Push all images in parallel via Bazel
          # Tags are automatically generated from workspace_status.sh:
          # - STABLE_BRANCH_TAG (branch name: "main", "feature-xyz", etc.)
          # - STABLE_IMAGE_TAG (timestamp-based: YYYY.MM.DD.HH.MM.SS-shortsha)
          echo "Pushing all images in parallel..."
          "${GITHUB_WORKSPACE}/bin/bazel" build $IMAGES
          echo "✅ Successfully pushed all container images"
          "${GITHUB_WORKSPACE}/bin/bazel" query "kind('oci_push', //...)" 2>/dev/null | sed 's/^/  - /'
