name: Bazel CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual cache refresh

jobs:
  build-test-push:
    name: Bazel - build, test & push
    runs-on: homelab-runners

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clear Bazel cache on scheduled runs
        if: github.event_name == 'schedule'
        run: |
          echo "🧹 Clearing Bazel repository cache for fresh rebuild..."
          rm -rf /home/runner/.cache/bazel/repository_cache/* || true
          rm -rf /home/runner/.cache/bazel/output_base/external/* || true
          echo "✅ Cache cleared - will rebuild from scratch"

      - name: Install bazelisk
        run: |
          curl -LO "https://github.com/bazelbuild/bazelisk/releases/download/v1.1.0/bazelisk-linux-amd64"
          mkdir -p "${GITHUB_WORKSPACE}/bin/"
          mv bazelisk-linux-amd64 "${GITHUB_WORKSPACE}/bin/bazel"
          chmod +x "${GITHUB_WORKSPACE}/bin/bazel"

      # Note: No cache action needed - runners mount shared read-only cache from bazel-cache-seeder

      - name: Configure Bazel
        run: |
          cat >> user.bazelrc << EOF
          # Import CI-specific startup options (persistent output base)
          try-import %workspace%/.bazelrc.ci
          common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
          EOF

      - name: Format Check
        run: "${GITHUB_WORKSPACE}/bin/bazel run //tools/format:format_code.check"

      - name: Build
        run: "${GITHUB_WORKSPACE}/bin/bazel build //..."
      - name: Test
        run: "${GITHUB_WORKSPACE}/bin/bazel test //..."

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push
        run: |
          ${GITHUB_WORKSPACE}/bin/bazel run //images:push_all --
