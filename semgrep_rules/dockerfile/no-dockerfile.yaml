rules:
  - id: no-dockerfile
    languages: [dockerfile]
    severity: ERROR
    message: >-
      This repository uses apko exclusively for container images, not
      Dockerfiles. See charts/*/image/apko.yaml for examples. Migrate this
      image definition to an apko.yaml with rules_apko in Bazel.
    metadata:
      category: best-practices
      references:
        - https://edu.chainguard.dev/open-source/build-tools/apko/overview/
    pattern: FROM $IMAGE
