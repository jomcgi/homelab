rules:
  - id: no-privileged
    languages: [yaml]
    severity: ERROR
    message: >-
      Container is running in privileged mode. This grants the container
      root-equivalent capabilities on the host. Remove 'privileged: true'
      from securityContext.
    metadata:
      category: security
    patterns:
      - pattern-inside: |
          containers:
            ...
      - pattern: |
          securityContext:
            ...
            privileged: true
