nameOverride: ""
fullnameOverride: ""

controllerManager:
  image:
    repository: ghcr.io/jomcgi/homelab/operators/oci-model-cache
    tag: latest
    pullPolicy: Always

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  replicas: 1

  podAnnotations: {}
  podLabels: {}

  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - "ALL"

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  nodeSelector: {}
  tolerations: []
  affinity: {}

  copyImage:
    repository: ghcr.io/jomcgi/homelab/tools/hf2oci
    tag: main

  env:
    ociRegistry: "ghcr.io/jomcgi/models"
    syncServiceAccount: ""

  healthProbeBindAddress: ":8081"
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10

  metrics:
    bindAddress: ":8443"

  tracing:
    endpoint: ""
    serviceName: "oci-model-cache-operator"
    serviceVersion: ""
    sampler: "parentbased_traceidratio"
    samplerArg: "1.0"
    disabled: false

serviceAccount:
  create: true
  annotations: {}
  name: ""

syncServiceAccount:
  create: true
  name: ""

rbac:
  create: true

crds:
  install: true

createNamespace: false

imagePullSecrets: []

hfToken:
  # -- Create a Secret (OnePasswordItem or manual). If false, use existingSecret.
  create: false
  # -- Name of a pre-existing Secret containing the HF token
  existingSecret: ""
  # -- Key within the Secret
  secretKey: "hf_token"
  # -- Secret type when create=true: "onepassword" or "manual"
  type: "onepassword"
  onepassword:
    itemPath: ""
  manual:
    token: ""

webhook:
  enabled: true
  # -- Create a namespace-scoped self-signed Issuer for the webhook cert
  createSelfSignedIssuer: true
  # -- Override the cert-manager Issuer name (defaults to fullname-selfsigned)
  certIssuer: ""
  # -- Issuer kind: "Issuer" (namespace) or "ClusterIssuer"
  certIssuerKind: ""

imageUpdater:
  enabled: false
  images: []
  writeBack:
    method: ""
    repository: ""
    branch: main
    target: ""

extraResources: []
