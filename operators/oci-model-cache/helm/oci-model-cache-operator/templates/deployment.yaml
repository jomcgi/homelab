apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oci-model-cache-operator.fullname" . }}-controller-manager
  namespace: {{ .Release.Namespace }}
  labels:
    control-plane: controller-manager
    {{- include "oci-model-cache-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controllerManager.replicas }}
  selector:
    matchLabels:
      control-plane: controller-manager
      {{- include "oci-model-cache-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.controllerManager.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        control-plane: controller-manager
        {{- include "oci-model-cache-operator.selectorLabels" . | nindent 8 }}
        {{- with .Values.controllerManager.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "oci-model-cache-operator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.controllerManager.podSecurityContext | nindent 8 }}
      containers:
      - args:
        - --leader-elect
        - --health-probe-bind-address={{ .Values.controllerManager.healthProbeBindAddress }}
        {{- if ne .Values.controllerManager.metrics.bindAddress "0" }}
        - --metrics-bind-address={{ .Values.controllerManager.metrics.bindAddress }}
        {{- end }}
        image: "{{ .Values.controllerManager.image.repository }}:{{ .Values.controllerManager.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.controllerManager.image.pullPolicy }}
        name: manager
        securityContext:
          {{- toYaml .Values.controllerManager.securityContext | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: {{ .Values.controllerManager.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.controllerManager.livenessProbe.periodSeconds }}
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: {{ .Values.controllerManager.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.controllerManager.readinessProbe.periodSeconds }}
        resources:
          {{- toYaml .Values.controllerManager.resources | nindent 10 }}
        env:
        - name: OCI_REGISTRY
          value: {{ .Values.controllerManager.env.ociRegistry | quote }}
        - name: COPY_IMAGE
          value: "{{ .Values.controllerManager.copyImage.repository }}:{{ .Values.controllerManager.copyImage.tag }}"
        - name: SYNC_SERVICE_ACCOUNT
          value: {{ include "oci-model-cache-operator.syncServiceAccountName" . | quote }}
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        {{- with .Values.controllerManager.syncNodeSelector }}
        - name: SYNC_NODE_SELECTOR
          value: {{ . | toJson | quote }}
        {{- end }}
        {{- with .Values.controllerManager.syncMemoryRequest }}
        - name: SYNC_MEMORY_REQUEST
          value: {{ . | quote }}
        {{- end }}
        {{- with .Values.controllerManager.syncMemoryLimit }}
        - name: SYNC_MEMORY_LIMIT
          value: {{ . | quote }}
        {{- end }}
        {{- with .Values.controllerManager.syncMaxParallel }}
        - name: SYNC_MAX_PARALLEL
          value: {{ . | quote }}
        {{- end }}
        {{- if .Values.controllerManager.tracing.endpoint }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ .Values.controllerManager.tracing.endpoint | quote }}
        {{- end }}
        {{- if .Values.controllerManager.tracing.serviceName }}
        - name: OTEL_SERVICE_NAME
          value: {{ .Values.controllerManager.tracing.serviceName | quote }}
        {{- end }}
        {{- if .Values.controllerManager.tracing.serviceVersion }}
        - name: OTEL_SERVICE_VERSION
          value: {{ .Values.controllerManager.tracing.serviceVersion | quote }}
        {{- end }}
        {{- if .Values.controllerManager.tracing.sampler }}
        - name: OTEL_TRACES_SAMPLER
          value: {{ .Values.controllerManager.tracing.sampler | quote }}
        {{- end }}
        {{- if .Values.controllerManager.tracing.samplerArg }}
        - name: OTEL_TRACES_SAMPLER_ARG
          value: {{ .Values.controllerManager.tracing.samplerArg | quote }}
        {{- end }}
        {{- if .Values.controllerManager.tracing.disabled }}
        - name: OTEL_SDK_DISABLED
          value: "true"
        {{- end }}
        {{- if .Values.registryPushSecret }}
        - name: REGISTRY_PUSH_SECRET
          value: {{ .Values.registryPushSecret | quote }}
        {{- end }}
        {{- if or .Values.hfToken.create .Values.hfToken.existingSecret }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ include "oci-model-cache-operator.hfTokenSecretName" . }}
              key: {{ .Values.hfToken.secretKey }}
        - name: HF_TOKEN_SECRET
          value: {{ include "oci-model-cache-operator.hfTokenSecretName" . | quote }}
        - name: HF_TOKEN_SECRET_KEY
          value: {{ .Values.hfToken.secretKey | quote }}
        {{- end }}
        {{- if .Values.webhook.enabled }}
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        volumeMounts:
        - name: webhook-certs
          mountPath: /tmp/k8s-webhook-server/serving-certs
          readOnly: true
        {{- end }}
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]
      {{- if .Values.webhook.enabled }}
      volumes:
      - name: webhook-certs
        secret:
          secretName: {{ include "oci-model-cache-operator.fullname" . }}-webhook-cert
      {{- end }}
      terminationGracePeriodSeconds: 60
      {{- with .Values.controllerManager.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controllerManager.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controllerManager.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
