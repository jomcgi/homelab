# ConfigMap defining pre-defined policies
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflare-policies
  namespace: cloudflare-operator-system
data:
  personal-emails: "your-actual-policy-id-here"  # Replace with real Cloudflare policy ID
  team-emails: "another-policy-id-here"
  admin-emails: "admin-policy-id-here"
---
# Service using the pre-defined policy reference
apiVersion: v1
kind: Service
metadata:
  name: test-policy-ref-app
  annotations:
    cloudflare.io/hostname: test-policy-ref.jomcgi.dev
    cloudflare.io/access-enabled: "true"
    cloudflare.io/access-policy: "personal-emails"
spec:
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: test-policy-ref-app