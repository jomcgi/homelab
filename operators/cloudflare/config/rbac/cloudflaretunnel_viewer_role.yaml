# This rule is not used by the project cloudflare itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to tunnels.tunnels.cloudflare.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cloudflare
    app.kubernetes.io/managed-by: kustomize
  name: cloudflaretunnel-viewer-role
rules:
  - apiGroups:
      - tunnels.tunnels.cloudflare.io
    resources:
      - cloudflaretunnels
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - tunnels.tunnels.cloudflare.io
    resources:
      - cloudflaretunnels/status
    verbs:
      - get
