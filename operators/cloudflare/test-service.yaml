apiVersion: v1
kind: Service
metadata:
  name: test-app
  annotations:
    cloudflare.io/hostname: test.jomcgi.dev
    cloudflare.io/access-enabled: "true"
    cloudflare.io/access-policy: personal-access
    cloudflare.io/tunnel-name: test-tunnel
spec:
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: test-app