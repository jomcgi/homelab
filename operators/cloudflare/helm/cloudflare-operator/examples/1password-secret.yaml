# Example values for using 1Password operator to manage Cloudflare credentials
#
# Usage:
# helm install cloudflare-operator ./helm/cloudflare-operator -n cloudflare \
#   --create-namespace \
#   -f examples/1password-secret.yaml

# Disable Helm-managed secret creation
cloudflareCredentials:
  create: false
  secretName: cloudflare-credentials

# Create 1Password item that will generate the secret
extraResources:
  - apiVersion: onepassword.com/v1
    kind: OnePasswordItem
    metadata:
      name: cloudflare-credentials
    spec:
      itemPath: "vaults/Infrastructure/items/Cloudflare-API"
      # The 1Password operator will create a secret with this data:
      # data:
      #   CLOUDFLARE_API_TOKEN: <from 1password field>
      #   CLOUDFLARE_ACCOUNT_ID: <from 1password field>
