replicaCount: 1

terminationGracePeriodSeconds: 300

image:
  repository: cloudflare-operator
  tag: "latest"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Cloudflare configuration
cloudflare:
  # Use existing secret for credentials
  existingSecret: "cloudflare-creds"
  existingSecretKeys:
    apiToken: "api-token"
    accountId: "account-id"

# Operator configuration
operator:
  # Metrics configuration
  metrics:
    port: 8080
  
  # Health probe configuration
  health:
    port: 8081

# RBAC configuration
rbac:
  create: true

# Policy configuration
policies:
  # ConfigMap name for policy templates
  configMapName: "cloudflare-policies"
  # Create default policies ConfigMap
  createDefaults: true
  # Default policy templates
  defaults:
    personal-access:
      decision: allow
      include:
        - emails:
            - user@example.com
    team-access:
      decision: allow
      include:
        - emailDomains:
            - example.com

# Webhook configuration
webhook:
  enabled: true
  port: 9443

# Custom resources (for advanced users)
# This allows you to deploy additional resources like secrets from 1Password
customResources: []
# Example:
# customResources:
#   - apiVersion: onepassword.com/v1
#     kind: OnePasswordItem
#     metadata:
#       name: cloudflare-credentials
#     spec:
#       itemPath: vaults/Infrastructure/items/cloudflare-api

