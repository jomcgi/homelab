---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cloudflare-operator.fullname" . }}-cleanup-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-delete
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cloudflare-operator.fullname" . }}-cleanup-role
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-delete
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cloudflare-operator.fullname" . }}-cleanup-rolebinding
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-delete
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cloudflare-operator.fullname" . }}-cleanup-role
subjects:
- kind: ServiceAccount
  name: {{ include "cloudflare-operator.fullname" . }}-cleanup-sa
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cloudflare-operator.fullname" . }}-cleanup-check
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-delete
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "cloudflare-operator.fullname" . }}-cleanup-sa
      containers:
      - name: cleanup-check
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "✅ Cloudflare operator uninstalled"
          echo "Note: External Cloudflare resources may require manual cleanup if operator shutdown was interrupted"
          
          # List any remaining resources for visibility
          echo "Checking for remaining resources..."
          kubectl get secrets -l cloudflare.io/managed-by=cloudflare-operator -A || true
          kubectl get deployments -l cloudflare.io/managed-by=cloudflare-operator -A || true