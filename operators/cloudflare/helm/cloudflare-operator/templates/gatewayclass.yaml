{{- if and .Values.gatewayAPI.enabled .Values.gatewayAPI.gatewayClass.create }}
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gatewayAPI.gatewayClass.name }}
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
spec:
  controllerName: {{ .Values.gatewayAPI.gatewayClass.controllerName }}
  {{- if .Values.cloudflareCredentials.secretName }}
  parametersRef:
    group: ""
    kind: Secret
    name: {{ .Values.cloudflareCredentials.secretName }}
    namespace: {{ .Release.Namespace }}
  {{- end }}
{{- end }}
