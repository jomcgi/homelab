apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: access-policies.cloudflare.io
spec:
  group: cloudflare.io
  versions:
  - name: v1beta1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              decision:
                type: string
                enum: ["allow", "deny", "non_identity", "bypass"]
                default: "allow"
              include:
                type: array
                items:
                  type: object
                  properties:
                    emails:
                      type: array
                      items:
                        type: string
                    emailDomains:
                      type: array
                      items:
                        type: string
                    accessGroups:
                      type: array
                      items:
                        type: string
                    ips:
                      type: array
                      items:
                        type: string
                    countries:
                      type: array
                      items:
                        type: string
                    everyone:
                      type: boolean
              require:
                type: array
                items:
                  type: object
                  properties:
                    emails:
                      type: array
                      items:
                        type: string
                    emailDomains:
                      type: array
                      items:
                        type: string
                    accessGroups:
                      type: array
                      items:
                        type: string
                    ips:
                      type: array
                      items:
                        type: string
                    countries:
                      type: array
                      items:
                        type: string
              exclude:
                type: array
                items:
                  type: object
                  properties:
                    emails:
                      type: array
                      items:
                        type: string
                    emailDomains:
                      type: array
                      items:
                        type: string
                    accessGroups:
                      type: array
                      items:
                        type: string
                    ips:
                      type: array
                      items:
                        type: string
                    countries:
                      type: array
                      items:
                        type: string
              sessionDuration:
                type: string
                default: "24h"
            required:
            - decision
            - include
          status:
            type: object
            properties:
              policyId:
                type: string
              ready:
                type: boolean
                default: false
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                  required:
                  - type
                  - status
    additionalPrinterColumns:
    - name: Decision
      type: string
      jsonPath: .spec.decision
    - name: Ready
      type: boolean
      jsonPath: .status.ready
    - name: Policy ID
      type: string
      jsonPath: .status.policyId
  scope: Namespaced
  names:
    plural: access-policies
    singular: access-policy
    kind: AccessPolicy