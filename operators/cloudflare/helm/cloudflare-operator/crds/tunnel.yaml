apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tunnels.cloudflare.io
spec:
  group: cloudflare.io
  versions:
  - name: v1beta1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              name:
                type: string
              accountId:
                type: string
              config:
                type: object
                properties:
                  ingress:
                    type: array
                    items:
                      type: object
                      properties:
                        hostname:
                          type: string
                        service:
                          type: string
                        path:
                          type: string
                        originRequest:
                          type: object
                          properties:
                            connectTimeout:
                              type: string
                            tlsTimeout:
                              type: string
                            tcpKeepAlive:
                              type: string
                            noHappyEyeballs:
                              type: boolean
                            keepAliveConnections:
                              type: integer
                            keepAliveTimeout:
                              type: string
                            httpHostHeader:
                              type: string
                            originServerName:
                              type: string
                            caPool:
                              type: string
                            noTLSVerify:
                              type: boolean
                            disableChunkedEncoding:
                              type: boolean
                      required:
                      - service
                  originRequest:
                    type: object
                    properties:
                      connectTimeout:
                        type: string
                      tlsTimeout:
                        type: string
                      tcpKeepAlive:
                        type: string
                      noHappyEyeballs:
                        type: boolean
                      keepAliveConnections:
                        type: integer
                      keepAliveTimeout:
                        type: string
                      httpHostHeader:
                        type: string
                      originServerName:
                        type: string
                      caPool:
                        type: string
                      noTLSVerify:
                        type: boolean
                      disableChunkedEncoding:
                        type: boolean
              replicas:
                type: integer
                default: 2
                minimum: 1
              image:
                type: object
                properties:
                  repository:
                    type: string
                    default: "cloudflare/cloudflared"
                  tag:
                    type: string
                    default: "latest"
                  pullPolicy:
                    type: string
                    default: "IfNotPresent"
            required:
            - name
            - config
          status:
            type: object
            properties:
              tunnelId:
                type: string
              ready:
                type: boolean
                default: false
              deploymentName:
                type: string
              secretName:
                type: string
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                  required:
                  - type
                  - status
    additionalPrinterColumns:
    - name: Tunnel Name
      type: string
      jsonPath: .spec.name
    - name: Ready
      type: boolean
      jsonPath: .status.ready
    - name: Tunnel ID
      type: string
      jsonPath: .status.tunnelId
    - name: Replicas
      type: integer
      jsonPath: .spec.replicas
  scope: Namespaced
  names:
    plural: tunnels
    singular: tunnel
    kind: Tunnel