apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: zerotrust-applications.cloudflare.io
spec:
  group: cloudflare.io
  versions:
  - name: v1beta1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              serviceRef:
                type: object
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                - namespace
              hostname:
                type: string
              policyRef:
                type: string
              sessionDuration:
                type: string
                default: "24h"
              autoRedirectToIdentity:
                type: boolean
                default: true
              corsHeaders:
                type: object
                properties:
                  allowCredentials:
                    type: boolean
                  allowedMethods:
                    type: array
                    items:
                      type: string
                  allowedOrigins:
                    type: array
                    items:
                      type: string
                  allowedHeaders:
                    type: array
                    items:
                      type: string
                  maxAge:
                    type: integer
            required:
            - serviceRef
            - hostname
            - policyRef
          status:
            type: object
            properties:
              applicationId:
                type: string
              ready:
                type: boolean
                default: false
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                  required:
                  - type
                  - status
    additionalPrinterColumns:
    - name: Hostname
      type: string
      jsonPath: .spec.hostname
    - name: Policy
      type: string
      jsonPath: .spec.policyRef
    - name: Ready
      type: boolean
      jsonPath: .status.ready
    - name: Application ID
      type: string
      jsonPath: .status.applicationId
  scope: Namespaced
  names:
    plural: zerotrust-applications
    singular: zerotrust-application
    kind: ZeroTrustApplication