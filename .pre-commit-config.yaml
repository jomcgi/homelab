# Pre-commit configuration for homelab Kubernetes infrastructure
# Install: pip install pre-commit && pre-commit install
# Usage: Hooks run automatically on git commit, or manually with `pre-commit run --all-files`
# Documentation: https://pre-commit.com/

repos:
  # YAML syntax and style validation
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: YAML Linting
        description: Validate YAML syntax and enforce formatting (2-space indentation, line length)
        files: \\.ya?ml$
        args: [--strict]

  # Kubernetes manifest best practices and security validation
  - repo: https://github.com/stackrox/kube-linter
    rev: v0.6.8
    hooks:
      - id: kube-linter
        name: Kubernetes Linting
        description: Validate Kubernetes manifests against security best practices
        files: |
          (?x)^(
            charts/.*/templates/.*\.yaml|
            clusters/.*\.yaml|
            overlays/.*\.yaml
          )$
        args:
          - lint
          - --config=.kube-linter.yaml

