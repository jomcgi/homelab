default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: protect-main-branch
        name: Protect main branch
        entry: tools/git/protect-main.sh
        language: script
        always_run: true
        pass_filenames: false

      # Fast format - identical to CI's format check
      # Runs all formatters, script generators, and gazelle
      - id: format-code
        name: Format code
        entry: tools/format/fast-format.sh
        language: script
        always_run: true
        pass_filenames: false

      # Lock file updates - only when source files change
      - id: update-python-requirements
        name: Update Python requirements
        entry: tools/format/update-python-requirements-if-needed.sh
        language: script
        files: 'pyproject\.toml$'
        pass_filenames: false

      - id: update-apko-locks
        name: Update apko locks
        entry: tools/format/update-apko-locks.sh
        language: script
        files: 'apko\.yaml$'
        pass_filenames: false

      # Run format after rebase to catch formatting drift
      # Install with: pre-commit install --hook-type post-rewrite
      - id: post-rewrite-format
        name: Format after rebase
        entry: tools/git/post-rewrite-format.sh
        language: script
        always_run: true
        pass_filenames: false
        stages: [post-rewrite]
  - repo: local
    hooks:
      # Reject commit messages with non-ASCII characters (smart quotes,
      # em-dashes, arrows, etc.) — Wrangler Pages fails with error 8000111
      # when such characters appear in commit history.
      # Install with: pre-commit install --hook-type commit-msg
      - id: ascii-commit-msg
        name: Reject non-ASCII characters in commit message
        entry: tools/git/check-commit-msg-ascii.sh
        language: script
        stages: [commit-msg]
        always_run: true
        pass_filenames: true   # pre-commit passes the commit-msg file path

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - ci
          - chore
          - revert
  - repo: https://github.com/semgrep/pre-commit
    rev: v1.153.1
    hooks:
      - id: semgrep
        args: ['--config', 'semgrep_rules/', '--error']
        exclude: '^semgrep_rules/'
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
