# Homelab Monorepo - Tool and Task Management
# https://mise.jdx.dev/

[tools]
# Python for services
python = "3.11"
# Node for websites
node = "20"
# UV for fast Python package management
uv = "latest"

[env]
# Global environment variables
_.python.venv = { path = ".venv", create = true }

# Monorepo-wide tasks - config in pyproject.toml specifies what to check
[tasks.lint]
description = "Lint all Python code (with auto-fix)"
run = "ruff check . --fix"

[tasks.format]
description = "Format all Python code"
run = "ruff format ."

[tasks.typecheck]
description = "Type check all Python code"
run = "pyright"

[tasks.test]
description = "Run all Python tests"
run = "pytest"

[tasks.check]
description = "Run all checks (lint + typecheck)"
depends = ["lint", "typecheck"]

[tasks.install]
description = "Install Python dev dependencies"
run = "uv pip install ruff pyright pytest pytest-asyncio pytest-cov pre-commit"

[tasks.doctor]
description = "Check mise setup and tool versions"
run = """
#!/usr/bin/env bash
echo "🏥 Mise Doctor"
echo ""
mise doctor
echo ""
echo "📦 Installed Tools:"
mise list
echo ""
echo "✅ Setup complete"
"""
