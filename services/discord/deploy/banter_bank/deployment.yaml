apiVersion: apps/v1
kind: Deployment
metadata:
  name: banter-bank-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banter-bank
  template:
    metadata:
      labels:
        app: banter-bank
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              value: "password"
            - name: POSTGRES_HOST_AUTH_METHOD
              value: trust
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
