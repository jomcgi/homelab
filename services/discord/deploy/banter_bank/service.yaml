apiVersion: v1
kind: Service
metadata:
  name: banter-bank-postgres
spec:
  selector:
    app: banter-bank-postgres
  ports:
    - name: banter-bank-postgres
      protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: banter-bank-api
spec:
  selector:
    app: banter-bank-api
  ports:
    - protocol: TCP
      port: 22231
      targetPort: 9090
  type: LoadBalancer