apiVersion: skaffold/v4beta12
kind: Config
requires:
- path: ./github-webhook-handler


profiles:
- name: default
  activation:
  - command: run
  build:
    kaniko:
      skipUnusedStages: true
      reproducible: true
      cache:
        cacheCopyLayers: true
      tags:
      - latest
    cluster:
      dockerConfig:
        secretName: docker-cfg