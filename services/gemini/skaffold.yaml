apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: gemini

build:
  local:
    push: true
    useDockerCLI: false
    useBuildkit: false
    concurrency: 2
  artifacts:
    - image: gemini
      context: ./services/gemini/api

manifests:
  kustomize:
    paths:
    - ./services/gemini/deploy

deploy:
  kubectl:
    defaultNamespace: gemini
        
