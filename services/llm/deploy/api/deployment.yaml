apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm
  labels:
    app: llm
spec:
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 2
  selector:
    matchLabels:
      app: llm
  template:
    metadata:
      labels:
        app: llm
    spec:
      containers:
      - name: llm
        image:  llm
        ports:
        - containerPort: 9090
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://otel-opentelemetry-collector.otel-collector.svc.cluster.local:4318
        envFrom:
        - configMapRef:
            name: gemini
        - configMapRef:
            name: anthropic
        
