apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-handler
  labels:
    app: webhook-handler
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: webhook-handler
  template:
    metadata:
      labels:
        app: webhook-handler
    spec:
      containers:
      - name: webhook-handler
        image: github-action-uptime
        readinessProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 15
          periodSeconds: 20
        imagePullPolicy: Always
        ports:
        - containerPort: 9090 # github-webhook
          name: github-webhook
        resources:
          requests:
            cpu: 50m
            memory: 500Mi
          limits:
            cpu: 150m
            memory: 500Mi
        envFrom:
        - configMapRef:
            name: github-webhook-handler-config