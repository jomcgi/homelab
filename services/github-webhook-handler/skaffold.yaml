apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: github-action-uptime

build:
  artifacts:
  - image: github-action-uptime
    context: api
    kaniko:
      skipUnusedStages: true
      reproducible: true
      cache:
        cacheCopyLayers: true
      tags:
      - latest

manifests:
  kustomize:
    paths:
    - deploy

deploy:
  kubectl: {}
        
