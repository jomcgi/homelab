version: '3'

vars:
  DB_SKAFFOLD_PATH: services/discord_bots/skaffold.yaml

tasks:
  build:
    cmds:
      - skaffold build -f {{.DB_SKAFFOLD_PATH}} --default-repo {{.CONTAINER_REGISTRY}} --insecure-registry {{.CONTAINER_REGISTRY}}
  deploy:
    deps: [build]
    cmds:
      - skaffold run -f {{.DB_SKAFFOLD_PATH}} --default-repo {{.CONTAINER_REGISTRY}} --insecure-registry {{.CONTAINER_REGISTRY}} --tail
  delete:
    cmds:
      - skaffold delete -f {{.DB_SKAFFOLD_PATH}}