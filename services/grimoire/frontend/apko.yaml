contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - nginx
    - ca-certificates-bundle

archs:
  - x86_64
  - aarch64

cmd: nginx -g "daemon off;"

work-dir: /usr/share/nginx/html

accounts:
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  groups:
    - groupname: nonroot
      gid: 65532
  run-as: 65532

paths:
  - path: /usr/share/nginx/html
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/cache/nginx
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/run
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /tmp
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
