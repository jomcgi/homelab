version: '3'

vars:
  AC_SKAFFOLD_PATH: services/anaesthetic_calc/skaffold.yaml

tasks:
  build:
    cmds:
      - skaffold build -f {{.AC_SKAFFOLD_PATH}} --default-repo {{.CONTAINER_REGISTRY}} --insecure-registry {{.CONTAINER_REGISTRY}}
  deploy:
    deps: [build]
    cmds:
      - skaffold run -f {{.AC_SKAFFOLD_PATH}} --default-repo {{.CONTAINER_REGISTRY}} --insecure-registry {{.CONTAINER_REGISTRY}}
  delete:
    cmds:
      - skaffold delete -f {{.AC_SKAFFOLD_PATH}}