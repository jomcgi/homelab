apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: github-action-uptime

build:
  artifacts:
  - image: container-registry-service.container-registry.svc.cluster.local:5000/github-action-uptime
    context: api
    kaniko:
      skipUnusedStages: true
      cache: {}
  cluster:
    dockerConfig:
      secretName: docker-cfg

manifests:
  kustomize:
    paths:
    - deploy

deploy:
  kubectl: {}
        
