apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-ingress
  namespace: bootstrap
spec:
  project: homelab
  source:
    repoURL: https://github.com/jomcgi/homelab
    targetRevision: HEAD
    path: cluster/charts/cloudflare-tunnel
    helm:
      releaseName: cluster-ingress
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: bootstrap
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true