apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: https://charts.longhorn.io
    chart: longhorn
    targetRevision: 1.8.1
    helm:
      releaseName: longhorn
      values: |
        preUpgradeChecker:
          jobEnabled: false
      patches:
      - patch: |-
          - op: remove
            path: /spec/preserveUnknownFields
        target:
          group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          name: .*\.longhorn\.io
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true