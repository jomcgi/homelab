# Production overrides for obsidian-automation
# Following homelab GitOps patterns from clusters/homelab/cloudflare-tunnel/values.yaml

# Set overlay name for production
overlayName: "homelab"

# Production namespace configuration
namespace:
  create: true
  name: obsidian-automation

# OnePassword secret configuration for production
secrets:
  type: onepassword
  onepassword:
    vaultId: "k8s-homelab"
    itemPath: "vaults/k8s-homelab/items/obsidian-automation-credentials"
    secretName: "obsidian-automation-secrets"

# Production resource limits following homelab standards
obsidian:
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 200m
      memory: 1Gi

# Production persistence configuration using Longhorn
persistence:
  vaults:
    enabled: true
    storageClass: "longhorn"
    accessMode: ReadWriteOnce
    size: 10Gi
    annotations:
      longhorn.io/recurring-job-group: "default"

  config:
    enabled: true
    storageClass: "longhorn"
    accessMode: ReadWriteOnce
    size: 1Gi
    annotations:
      longhorn.io/recurring-job-group: "default"

  session:
    enabled: true
    storageClass: "longhorn"
    accessMode: ReadWriteOnce
    size: 1Gi
    annotations:
      longhorn.io/recurring-job-group: "default"

# Production observability configuration
observability:
  metrics:
    enabled: true
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
      prometheus.io/path: "/metrics"

# Production environment variables
obsidian:
  env:
    TZ: "America/New_York"
    CUSTOM_PORT: "8080"
    TITLE: "Obsidian Automation - Homelab"

# Security settings for production
networkPolicy:
  enabled: true