# SigNoz K8s Infra Agent Values for Homelab
# Collects logs, metrics, and traces from the Kubernetes cluster

global:
  clusterName: homelab
  storageClass: longhorn

# Name override for the k8s-infra chart
nameOverride: signoz-k8s-infra

# OTLP endpoint configuration - pointing to SigNoz collector in cluster
otelCollectorEndpoint: signoz-otel-collector.signoz.svc.cluster.local:4317
otelInsecure: true
insecureSkipVerify: true

# Presets for data collection
presets:
  # Enable OTLP exporter to send data to SigNoz
  otlpExporter:
    enabled: true

  # Debug exporter for troubleshooting (disabled in production)
  debugExporter:
    enabled: false
    verbosity: basic
    samplingInitial: 2
    samplingThereafter: 500

  # Logs collection from pods
  logsCollection:
    enabled: true
    startAt: end
    includeFilePath: true
    includeFileName: false
    include:
      - /var/log/pods/*/*/*.log
    blacklist:
      enabled: true
      signozLogs: true  # Exclude SigNoz's own logs to prevent feedback loop
      namespaces:
        - kube-system
        - kube-public
        - kube-node-lease
      pods:
        - hotrod
        - locust
      containers: []
      additionalExclude: []
    operators:
      - id: container-parser
        type: container

  # Host metrics collection
  hostMetrics:
    enabled: true
    rootPath: "/hostfs"
    collectionInterval: 30s
    scrapers:
      cpu: {}
      load: {}
      memory: {}
      disk:
        exclude:
          devices:
            - ^ram\d+$
            - ^zram\d+$
            - ^loop\d+$
            - ^fd\d+$
            - ^hd[a-z]\d+$
            - ^sd[a-z]\d+$
            - ^vd[a-z]\d+$
            - ^xvd[a-z]\d+$
            - ^nvme\d+n\d+p\d+$
          match_type: regexp
      filesystem:
        exclude_fs_types:
          fs_types:
            - autofs
            - binfmt_misc
            - bpf
            - cgroup2?
            - configfs
            - debugfs
            - devpts
            - devtmpfs
            - fusectl
            - hugetlbfs
            - iso9660
            - mqueue
            - nsfs
            - overlay
            - proc
            - procfs
            - pstore
            - rpc_pipefs
            - securityfs
            - selinuxfs
            - squashfs
            - sysfs
            - tracefs
          match_type: strict
        exclude_mount_points:
          mount_points:
            - /dev/*
            - /proc/*
            - /sys/*
            - /run/credentials/*
            - /run/k3s/containerd/*
            - /var/lib/docker/*
            - /var/lib/containers/storage/*
            - /var/lib/kubelet/*
            - /snap/*
          match_type: regexp
      network:
        exclude:
          interfaces:
            - ^veth.*$
            - ^docker.*$
            - ^br-.*$
            - ^flannel.*$
            - ^cali.*$
            - ^cbr.*$
            - ^cni.*$
            - ^dummy.*$
            - ^tailscale.*$
            - ^lo$
          match_type: regexp

  # Kubelet metrics collection
  kubeletMetrics:
    enabled: true
    collectionInterval: 30s
    authType: serviceAccount
    endpoint: ${env:K8S_HOST_IP}:10250
    insecureSkipVerify: true
    extraMetadataLabels:
      - container.id
      - k8s.volume.type
    metricGroups:
      - container
      - pod
      - node
      - volume
    metrics:
      k8s.node.cpu.usage:
        enabled: true
      k8s.node.uptime:
        enabled: true
      k8s.pod.cpu.usage:
        enabled: true
      k8s.pod.cpu_limit_utilization:
        enabled: true
      k8s.pod.cpu_request_utilization:
        enabled: true
      k8s.pod.memory_limit_utilization:
        enabled: true
      k8s.pod.memory_request_utilization:
        enabled: true
      k8s.pod.uptime:
        enabled: true
      container.cpu.usage:
        enabled: true
      k8s.container.cpu_limit_utilization:
        enabled: true
      k8s.container.cpu_request_utilization:
        enabled: true
      k8s.container.memory_limit_utilization:
        enabled: true
      k8s.container.memory_request_utilization:
        enabled: true
      container.uptime:
        enabled: true

  # Kubernetes attributes processor
  kubernetesAttributes:
    enabled: true
    passthrough: false
    filter:
      node_from_env_var: K8S_NODE_NAME
    podAssociation:
      - sources:
        - from: resource_attribute
          name: k8s.pod.ip
      - sources:
        - from: resource_attribute
          name: k8s.pod.uid
      - sources:
        - from: connection
    extractMetadatas:
      - k8s.namespace.name
      - k8s.deployment.name
      - k8s.statefulset.name
      - k8s.daemonset.name
      - k8s.cronjob.name
      - k8s.job.name
      - k8s.node.name
      - k8s.node.uid
      - k8s.pod.name
      - k8s.pod.uid
      - k8s.pod.start_time
    extractLabels: []
    extractAnnotations: []

  # Cluster metrics collection
  clusterMetrics:
    enabled: true
    collectionInterval: 30s
    resourceAttributes:
      k8s.pod.qos_class:
        enabled: true
      k8s.kubelet.version:
        enabled: true
      container.runtime:
        enabled: true
      container.runtime.version:
        enabled: true
      k8s.container.status.last_terminated_reason:
        enabled: true
    nodeConditionsToReport:
      - Ready
      - MemoryPressure
      - DiskPressure
      - PIDPressure
      - NetworkUnavailable
    allocatableTypesToReport:
      - cpu
      - memory
    metrics:
      k8s.node.condition:
        enabled: true
      k8s.pod.status_reason:
        enabled: true

  # Prometheus metrics scraping from pod annotations
  prometheus:
    enabled: false  # Enable if you have services with prometheus annotations
    annotationsPrefix: signoz.io
    scrapeInterval: 60s
    namespaceScoped: false
    includePodLabel: false
    includeContainerName: false

  # Resource detection
  resourceDetection:
    enabled: true
    timeout: 2s
    override: false
    envResourceAttributes: ""

  # Kubernetes events collection
  k8sEvents:
    enabled: true
    authType: serviceAccount
    namespaces: []  # Empty means all namespaces

# OtelAgent DaemonSet configuration
otelAgent:
  enabled: true
  name: signoz-otel-agent

  # Resource limits for the agent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL

  # Tolerations to run on all nodes
  tolerations:
    - operator: Exists

  # Service configuration
  service:
    type: ClusterIP
    internalTrafficPolicy: Local

  # Ports configuration
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      hostPort: 4317
      protocol: TCP
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      hostPort: 4318
      protocol: TCP
    metrics:
      enabled: true
      containerPort: 8888
      servicePort: 8888
      hostPort: 8888
      protocol: TCP
    health-check:
      enabled: true
      containerPort: 13133
      servicePort: 13133
      hostPort: 13133
      protocol: TCP

# OtelDeployment for cluster-level metrics
otelDeployment:
  enabled: true
  name: signoz-otel-deployment

  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL

  # Service configuration
  service:
    type: ClusterIP

  # Ports configuration
  ports:
    metrics:
      enabled: false
    health-check:
      enabled: true
      containerPort: 13133
      servicePort: 13133
      protocol: TCP