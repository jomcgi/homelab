apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-ingress
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab
    targetRevision: HEAD
    path: charts/cloudflare-tunnel
    helm:
      releaseName: cluster-ingress
      valueFiles:
        - values.yaml
        - ../../clusters/homelab/cloudflare-tunnel/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: bootstrap
  syncPolicy:
    automated:
      prune: true
      selfHeal: true