apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: homelab-

resources:
  - ./cloudflare-tunnel
  - ./bootstrap-namespace.yaml

configMapGenerator:
  - name: overlay-config
    namespace: bootstrap
    literals:
      - overlay-name=homelab
    options:
      disableNameSuffixHash: true

patches:
  - target:
      kind: Application
      name: cluster-ingress
    patch: |-
      - op: add
        path: /spec/source/helm/values
        value: |
          overlayName: homelab