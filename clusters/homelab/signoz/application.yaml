apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: signoz
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://charts.signoz.io
    targetRevision: 0.92.0
    chart: signoz
    helm:
      releaseName: signoz
      valueFiles:
        - clusters/homelab/signoz/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: signoz

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 10m

  revisionHistoryLimit: 10