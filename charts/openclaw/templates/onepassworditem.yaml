{{- if .Values.discord.enabled }}
{{- if eq .Values.discord.secret.type "onepassword" }}
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ include "openclaw.fullname" . }}-discord
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  itemPath: {{ .Values.discord.secret.onepassword.itemPath | quote }}
{{- end }}
{{- end }}
{{- if .Values.whatsapp.enabled }}
{{- if eq .Values.whatsapp.secret.type "onepassword" }}
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ include "openclaw.fullname" . }}-whatsapp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  itemPath: {{ .Values.whatsapp.secret.onepassword.itemPath | quote }}
{{- end }}
{{- end }}
