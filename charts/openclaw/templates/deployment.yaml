apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw.fullname" . }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  # OpenClaw does not support horizontal scaling - single replica only
  replicas: 1
  # Recreate strategy to avoid PVC multi-attach issues with single replica
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "openclaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "openclaw.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openclaw.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        {{- if .Values.initContainers.initConfig.enabled }}
        # init-config: Set up directories with correct permissions
        - name: init-config
          image: {{ .Values.initContainers.initConfig.image }}
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /home/openclaw/.openclaw/workspace
              chown -R 1000:1000 /home/openclaw
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: data
              mountPath: /home/openclaw
          resources:
            {{- toYaml .Values.initContainers.initConfig.resources | nindent 12 }}
        {{- end }}
        {{- if or .Values.initContainers.initSkills.enabled (gt (len .Values.clawhub.skills) 0) }}
        # init-skills: Install ClawHub skills
        - name: init-skills
          image: "{{ .Values.initContainers.initSkills.image | default .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          command:
            - /bin/sh
            - -c
            - |
              set -e
              export HOME=/home/openclaw
              cd /home/openclaw
              {{- range .Values.clawhub.skills }}
              echo "Installing skill: {{ . }}"
              clawhub install {{ . }}
              {{- end }}
              echo "Skills installed successfully"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /home/openclaw
          resources:
            {{- toYaml .Values.initContainers.initSkills.resources | nindent 12 }}
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Run the gateway server (not the CLI help menu)
          command:
            - node
            - dist/index.js
          args:
            - gateway
            - --allow-unconfigured
            - --bind
            - lan
            - --port
            - {{ .Values.server.port | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: HOME
              value: /home/openclaw
            {{- if .Values.gateway.token }}
            # Gateway WebSocket auth token (optional - Cloudflare Zero Trust handles external auth)
            - name: OPENCLAW_GATEWAY_TOKEN
              value: {{ .Values.gateway.token | quote }}
            {{- end }}
            - name: OPENCLAW_PORT
              value: {{ .Values.server.port | quote }}
            {{- if .Values.chromium.enabled }}
            - name: CHROMIUM_URL
              value: "http://localhost:{{ .Values.chromium.port }}"
            {{- end }}
            {{- if and .Values.auth.enabled (eq .Values.auth.method "api-key") }}
            # API key authentication for Anthropic
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.auth.existingSecret }}
                  name: {{ .Values.auth.existingSecret }}
                  {{- else }}
                  name: {{ include "openclaw.fullname" . }}-auth
                  {{- end }}
                  key: {{ .Values.auth.apiKeySecretKey }}
            {{- end }}
            {{- if and (eq .Values.llm.provider "openai-compatible") .Values.llm.apiKey }}
            # API key for openai-compatible backend (e.g., vLLM with auth)
            - name: OPENAI_API_KEY
              value: {{ .Values.llm.apiKey | quote }}
            {{- end }}
            {{- if .Values.discord.enabled }}
            # Discord bot token
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.fullname" . }}-discord
                  key: discord-bot-token
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- $hasWhatsappSecret := and .Values.whatsapp.enabled (eq .Values.whatsapp.secret.type "onepassword") }}
          {{- if or .Values.extraEnvFrom $hasWhatsappSecret }}
          envFrom:
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if $hasWhatsappSecret }}
            # WhatsApp credentials from 1Password
            - secretRef:
                name: {{ include "openclaw.fullname" . }}-whatsapp
            {{- end }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /home/openclaw
            # Writable directories for readOnlyRootFilesystem
            - name: tmp
              mountPath: /tmp
            {{- if and .Values.auth.enabled (eq .Values.auth.method "credentials-file") }}
            # Mount Claude credentials from secret
            - name: claude-credentials
              mountPath: /home/openclaw/.claude
              readOnly: true
            {{- end }}
        {{- if .Values.chromium.enabled }}
        # Chromium sidecar for browser automation
        - name: chromium
          image: {{ .Values.chromium.image }}
          ports:
            - name: chrome
              containerPort: {{ .Values.chromium.port }}
              protocol: TCP
          command:
            - chromium-browser
            - --headless
            - --disable-gpu
            - --no-sandbox
            - --remote-debugging-address=0.0.0.0
            - --remote-debugging-port={{ .Values.chromium.port }}
            {{- range .Values.chromium.extraFlags }}
            - {{ . | quote }}
            {{- end }}
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.chromium.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "openclaw.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        # Writable directories for readOnlyRootFilesystem
        - name: tmp
          emptyDir: {}
        {{- if and .Values.auth.enabled (eq .Values.auth.method "credentials-file") }}
        # Claude credentials file from secret
        - name: claude-credentials
          secret:
            secretName: {{ .Values.auth.existingSecret }}
            items:
              - key: {{ .Values.auth.credentialsSecretKey }}
                path: .credentials.json
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
