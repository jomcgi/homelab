{{- if and .Values.cloudflare.enabled .Values.cloudflare.zeroTrust.enabled }}
apiVersion: tunnels.cloudflare.io/v1
kind: CloudflareAccessPolicy
metadata:
  name: {{ include "openclaw.fullname" . }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  targetRef:
    group: ""
    kind: Service
    name: {{ include "openclaw.fullname" . }}
  application:
    name: {{ include "openclaw.fullname" . }}
    sessionDuration: {{ .Values.cloudflare.zeroTrust.sessionDuration | quote }}
  policies:
    - name: allow-users
      decision: allow
      rules:
        {{- if .Values.cloudflare.zeroTrust.allowedEmails }}
        - emails:
            {{- toYaml .Values.cloudflare.zeroTrust.allowedEmails | nindent 12 }}
        {{- end }}
        {{- if .Values.cloudflare.zeroTrust.allowedDomains }}
        - emailDomains:
            {{- toYaml .Values.cloudflare.zeroTrust.allowedDomains | nindent 12 }}
        {{- end }}
        {{- if .Values.cloudflare.zeroTrust.allowedGroups }}
        - groups:
            {{- toYaml .Values.cloudflare.zeroTrust.allowedGroups | nindent 12 }}
        {{- end }}
{{- end }}
