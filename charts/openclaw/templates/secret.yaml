{{/*
Secret for OpenClaw authentication.
Only created when auth is enabled, auth.method is "api-key", no existingSecret is specified,
and the user provides a direct apiKey value.
*/}}
{{- if and .Values.auth.enabled (eq .Values.auth.method "api-key") (not .Values.auth.existingSecret) .Values.auth.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openclaw.fullname" . }}-auth
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.apiKeySecretKey }}: {{ .Values.auth.apiKey | quote }}
{{- end }}
