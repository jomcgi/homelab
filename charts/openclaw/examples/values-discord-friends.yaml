## OpenClaw Configuration - Discord Friends Group Chat (Local Qwen)
## Uses local vLLM service with Qwen model + Discord channel
## Isolated instance for friends group chat, not using your Claude subscription
##
## Deploy with: helm install openclaw-friends ./charts/openclaw -f values-discord-friends.yaml
##
## SETUP STEPS:
## 1. Create Discord application at https://discord.com/developers/applications
## 2. Go to "Bot" tab, create bot, copy token
## 3. Enable "Message Content Intent" under "Privileged Gateway Intents"
## 4. Invite bot to your server with proper permissions (read/send messages)
## 5. Create the bot token secret:
##      kubectl create secret generic discord-bot-token \
##        --from-literal=DISCORD_BOT_TOKEN=your-bot-token-here \
##        -n openclaw
## 6. Update YOUR_GUILD_ID and channel settings below
## 7. Deploy: helm install openclaw-friends ./charts/openclaw -f values-discord-friends.yaml

## Distinct name for this instance
fullnameOverride: "openclaw-friends"

## LLM provider - local Qwen via vLLM (no Claude subscription costs)
llm:
  provider: "openai-compatible"
  model: "Qwen/Qwen2.5-Coder-32B-Instruct"
  baseUrl: "http://vllm.vllm.svc.cluster.local:8000/v1"
  ## vLLM NetworkPolicy configuration
  vllm:
    enabled: true
    namespace: "vllm"
    port: 8000
    podSelector:
      app.kubernetes.io/name: vllm

## No Anthropic auth needed (using local model)
auth:
  enabled: false

## Discord channel configuration
## See: https://docs.openclaw.ai/channels/discord
config:
  permissionMode: "default"
  extra:
    channels:
      discord:
        enabled: true
        # Token loaded from DISCORD_BOT_TOKEN env var (see extraEnvFrom)
        groupPolicy: "allowlist"
        historyLimit: 20
        replyToMode: "off"
        allowBots: false
        textChunkLimit: 2000
        maxLinesPerMessage: 17

        ## Direct message settings - disabled for group-only use
        dm:
          enabled: false

        ## Guild (Discord server) configuration
        guilds:
          ## Wildcard default: require @mention everywhere
          "*":
            requireMention: true
            reactionNotifications: "own"

          ## Your specific Discord server
          ## Replace YOUR_GUILD_ID with your server ID
          ## (Enable Developer Mode in Discord, right-click server -> Copy ID)
          "YOUR_GUILD_ID":
            slug: "friends"
            requireMention: true
            channels:
              ## Replace with your channel slug
              ## (channel name without #, e.g., "ai-chat" or "bot-spam")
              "ai-chat":
                allow: true
                requireMention: true
                ## Optional: restrict to specific Discord user IDs
                # users:
                #   - "123456789012345678"
                #   - "234567890123456789"

## Load Discord bot token from Kubernetes secret
extraEnvFrom:
  - secretRef:
      name: discord-bot-token

## Network policy - allow vLLM + Discord API (external HTTPS on 443)
networkPolicy:
  enabled: true
  allowClusterInternal: false

## Persistence
persistence:
  enabled: true
  storageClass: "longhorn"
  size: 5Gi

## Lower resources (model inference is on vLLM)
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 1Gi
