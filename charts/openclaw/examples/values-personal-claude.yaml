## OpenClaw Configuration - Personal Claude Instance with WhatsApp
## Uses Anthropic API with Claude subscription + WhatsApp channel
##
## Deploy with: helm install openclaw-personal ./charts/openclaw -f values-personal-claude.yaml
##
## WHATSAPP SETUP (requires one-time QR code scan):
## 1. Deploy the chart first
## 2. Exec into the pod: kubectl exec -it deployment/openclaw-personal -- /bin/sh
## 3. Run: openclaw channels login
## 4. Scan the QR code with WhatsApp (Settings -> Linked Devices)
## 5. Credentials are saved to PVC and persist across restarts
##
## See: https://docs.openclaw.ai/channels/whatsapp

## Use a distinct name to avoid conflicts with other instances
fullnameOverride: "openclaw-personal"

## LLM provider configuration - Anthropic Claude
llm:
  provider: "anthropic"
  model: "claude-sonnet-4-20250514"

## OpenClaw settings
config:
  permissionMode: "default"

## Authentication - use credentials file from local Claude CLI login
## First create the secret:
##   kubectl create secret generic openclaw-claude-creds \
##     --from-file=credentials.json=$HOME/.claude/.credentials.json
auth:
  enabled: true
  method: "credentials-file"
  existingSecret: "openclaw-claude-creds"
  credentialsSecretKey: "credentials.json"

## WhatsApp channel configuration
## NOTE: Requires one-time QR code pairing via kubectl exec (see above)
whatsapp:
  enabled: true
  ## WhatsApp uses QR code auth, not 1Password - credentials saved to PVC
  secret:
    type: "manual"  # WhatsApp credentials are created via QR scan, not pre-provisioned
  settings:
    ## DM policy: "pairing" requires approval code, "allowlist" for known contacts only
    dmPolicy: "pairing"
    groups:
      enabled: false  # Disable group chats for personal use

## Network policy - allow external HTTPS (Anthropic API + WhatsApp servers)
networkPolicy:
  enabled: true
  allowClusterInternal: false

## Persistence for conversation history AND WhatsApp credentials
## IMPORTANT: WhatsApp session persists here, don't delete this PVC!
persistence:
  enabled: true
  storageClass: "longhorn"
  size: 10Gi

## Resource limits for Claude (higher memory for complex tasks)
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    memory: 2Gi
