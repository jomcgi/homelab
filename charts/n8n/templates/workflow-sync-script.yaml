{{- if .Values.workflowSync.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "n8n.fullname" . }}-workflow-sync
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
data:
  sync-workflows.sh: |
    #!/bin/sh
    set -e

    N8N_URL="${N8N_URL:-http://localhost:5678}"
    API_KEY="${N8N_API_KEY}"
    WORKFLOW_DIR="${WORKFLOW_DIR:-/workflows}"
    MANAGED_SUFFIX="{{ .Values.workflowSync.managedSuffix }}"
    MANAGED_TAG="{{ .Values.workflowSync.managedTag }}"

    echo "========================================="
    echo "n8n Workflow GitOps Sync"
    echo "========================================="
    echo "n8n URL: ${N8N_URL}"
    echo "Workflow directory: ${WORKFLOW_DIR}"
    echo "Managed suffix: ${MANAGED_SUFFIX}"
    echo "Managed tag: ${MANAGED_TAG}"
    echo "========================================="

    # Wait for n8n API to be ready
    echo "Waiting for n8n to be ready..."
    MAX_RETRIES=60
    RETRY_COUNT=0
    until curl -sf "${N8N_URL}/healthz" > /dev/null 2>&1; do
      RETRY_COUNT=$((RETRY_COUNT + 1))
      if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
        echo "ERROR: n8n failed to become ready after ${MAX_RETRIES} attempts"
        exit 1
      fi
      echo "  Waiting... (attempt ${RETRY_COUNT}/${MAX_RETRIES})"
      sleep 2
    done
    echo "✓ n8n is ready!"

    # Count workflow files
    WORKFLOW_COUNT=$(find "${WORKFLOW_DIR}" -name "*.json" -type f 2>/dev/null | wc -l)
    if [ "$WORKFLOW_COUNT" -eq 0 ]; then
      echo "No workflow files found in ${WORKFLOW_DIR}"
      echo "Skipping workflow sync."
      exit 0
    fi
    echo "Found ${WORKFLOW_COUNT} workflow file(s) to process"
    echo ""

    # Get all existing workflows from n8n
    echo "Fetching existing workflows from n8n..."
    EXISTING_WORKFLOWS=$(curl -sf "${N8N_URL}/api/v1/workflows" \
      -H "X-N8N-API-KEY: ${API_KEY}" 2>/dev/null || echo '{"data":[]}')
    EXISTING_COUNT=$(echo "$EXISTING_WORKFLOWS" | jq -r '.data | length')
    echo "✓ Found ${EXISTING_COUNT} existing workflow(s) in n8n"
    echo ""

    # Process each workflow file
    PROCESSED=0
    CREATED=0
    UPDATED=0
    FAILED=0

    for workflow_file in "${WORKFLOW_DIR}"/*.json; do
      [ -f "$workflow_file" ] || continue

      PROCESSED=$((PROCESSED + 1))
      WORKFLOW_BASENAME=$(basename "$workflow_file")

      echo "[$PROCESSED/$WORKFLOW_COUNT] Processing: ${WORKFLOW_BASENAME}"

      # Read and validate workflow JSON
      if ! WORKFLOW_JSON=$(cat "$workflow_file" 2>/dev/null); then
        echo "  ✗ ERROR: Failed to read file"
        FAILED=$((FAILED + 1))
        continue
      fi

      # Extract original workflow name
      ORIGINAL_NAME=$(echo "$WORKFLOW_JSON" | jq -r '.name // empty')
      if [ -z "$ORIGINAL_NAME" ]; then
        echo "  ✗ ERROR: Workflow has no name field"
        FAILED=$((FAILED + 1))
        continue
      fi

      # Construct managed workflow name
      MANAGED_NAME="${ORIGINAL_NAME}${MANAGED_SUFFIX}"
      echo "  Original name: ${ORIGINAL_NAME}"
      echo "  Managed name: ${MANAGED_NAME}"

      # Clean and prepare workflow JSON for import
      # - Remove id (will be assigned by n8n or preserved on update)
      # - Remove webhookId from all nodes (regenerated by n8n)
      # - Remove instanceId from meta
      # - Update workflow name to include managed suffix
      # - Add/update tags to include managed tag
      CLEAN_WORKFLOW=$(echo "$WORKFLOW_JSON" | jq --arg name "$MANAGED_NAME" --arg tag "$MANAGED_TAG" '
        # Remove instance-specific fields
        del(.id) |

        # Remove webhookId from all nodes
        if .nodes then
          .nodes |= map(del(.webhookId))
        else . end |

        # Remove instanceId from meta
        if .meta then
          .meta |= del(.instanceId)
        else . end |

        # Update workflow name
        .name = $name |

        # Add/update tags (ensure managed tag is present)
        if .tags then
          if (.tags | map(.name) | index($tag)) then
            .
          else
            .tags += [{"name": $tag}]
          end
        else
          .tags = [{"name": $tag}]
        end
      ')

      # Check if workflow already exists by name
      EXISTING_ID=$(echo "$EXISTING_WORKFLOWS" | jq -r \
        --arg name "$MANAGED_NAME" \
        '.data[] | select(.name == $name) | .id')

      if [ -n "$EXISTING_ID" ] && [ "$EXISTING_ID" != "null" ]; then
        # Update existing workflow
        echo "  → Updating existing workflow (ID: ${EXISTING_ID})"

        # For updates, we need to preserve the ID
        CLEAN_WORKFLOW=$(echo "$CLEAN_WORKFLOW" | jq --arg id "$EXISTING_ID" '.id = $id')

        if curl -sf "${N8N_URL}/api/v1/workflows/${EXISTING_ID}" \
          -X PUT \
          -H "X-N8N-API-KEY: ${API_KEY}" \
          -H "Content-Type: application/json" \
          -d "$CLEAN_WORKFLOW" > /dev/null 2>&1; then
          echo "  ✓ Successfully updated workflow"
          UPDATED=$((UPDATED + 1))
        else
          echo "  ✗ ERROR: Failed to update workflow"
          FAILED=$((FAILED + 1))
        fi
      else
        # Create new workflow
        echo "  → Creating new workflow"

        if curl -sf "${N8N_URL}/api/v1/workflows" \
          -X POST \
          -H "X-N8N-API-KEY: ${API_KEY}" \
          -H "Content-Type: application/json" \
          -d "$CLEAN_WORKFLOW" > /dev/null 2>&1; then
          echo "  ✓ Successfully created workflow"
          CREATED=$((CREATED + 1))
        else
          echo "  ✗ ERROR: Failed to create workflow"
          FAILED=$((FAILED + 1))
        fi
      fi

      echo ""
    done

    # Summary
    echo "========================================="
    echo "Workflow Sync Summary"
    echo "========================================="
    echo "Total processed: ${PROCESSED}"
    echo "Created:         ${CREATED}"
    echo "Updated:         ${UPDATED}"
    echo "Failed:          ${FAILED}"
    echo "========================================="

    if [ "$FAILED" -gt 0 ]; then
      echo "WARNING: Some workflows failed to sync"
      exit 1
    fi

    echo "✓ All workflows synced successfully!"
    exit 0
{{- end }}
