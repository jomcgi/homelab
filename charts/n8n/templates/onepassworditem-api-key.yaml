{{- if .Values.workflowSync.enabled }}
{{- if eq .Values.workflowSync.apiKeySecret.type "onepassword" }}
---
# N8N API Key Secret
# Used by workflow sync job to interact with n8n API for GitOps workflow management
# Type: Opaque (contains api-key field)
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ .Values.workflowSync.apiKeySecret.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  itemPath: {{ .Values.workflowSync.apiKeySecret.onepassword.itemPath | quote }}
{{- end }}
{{- end }}
