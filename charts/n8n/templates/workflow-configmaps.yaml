{{- if .Values.workflowSync.enabled }}
{{- range .Values.workflowSync.workflows }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-workflow-{{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "n8n.labels" $ | nindent 4 }}
    app.kubernetes.io/component: workflow
    workflow-sync: "enabled"
data:
  {{ .name }}.json: |
    {{- .definition | nindent 4 }}
{{- end }}
{{- end }}
