{{- if and .Values.workflowSync.enabled .Values.workflowSync.driftDetection.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "n8n.fullname" . }}-workflow-sync
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
    app.kubernetes.io/component: workflow-sync
spec:
  schedule: {{ .Values.workflowSync.driftDetection.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.workflowSync.driftDetection.successfulJobsHistoryLimit | default 3 }}
  failedJobsHistoryLimit: {{ .Values.workflowSync.driftDetection.failedJobsHistoryLimit | default 3 }}
  jobTemplate:
    metadata:
      labels:
        {{- include "n8n.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: workflow-sync
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "n8n.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: workflow-sync
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ include "n8n.fullname" . }}
          {{- with .Values.workflowSync.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: workflow-sync
              image: {{ .Values.workflowSync.image.repository }}:{{ .Values.workflowSync.image.tag | default "latest" }}
              imagePullPolicy: {{ .Values.workflowSync.image.pullPolicy | default "IfNotPresent" }}
              env:
                - name: N8N_URL
                  value: "http://{{ include "n8n.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:80/api/v1"
                - name: N8N_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.workflowSync.apiKeySecret.name | default "n8n-api-key" }}
                      key: {{ .Values.workflowSync.apiKeySecret.key | default "api-key" }}
                - name: WORKFLOW_DIR
                  value: "/workflows"
                - name: MANAGED_SUFFIX
                  value: {{ .Values.workflowSync.managedSuffix | quote }}
                - name: MANAGED_TAG
                  value: {{ .Values.workflowSync.managedTag | quote }}
                - name: LOG_LEVEL
                  value: {{ .Values.workflowSync.logLevel | default "info" | quote }}
                {{- if .Values.workflowSync.telemetry.enabled }}
                - name: ENABLE_TELEMETRY
                  value: "true"
                - name: OTLP_ENDPOINT
                  value: {{ .Values.workflowSync.telemetry.otlpEndpoint | quote }}
                {{- else }}
                - name: ENABLE_TELEMETRY
                  value: "false"
                {{- end }}
              volumeMounts:
                - name: workflows
                  mountPath: /workflows
                  readOnly: true
              resources:
                {{- toYaml .Values.workflowSync.resources | nindent 16 }}
              securityContext:
                runAsNonRoot: true
                runAsUser: 65532
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                seccompProfile:
                  type: RuntimeDefault
          volumes:
            - name: workflows
              projected:
                sources:
                  {{- range .Values.workflowSync.workflows }}
                  - configMap:
                      name: n8n-workflow-{{ .name }}
                  {{- end }}
{{- end }}
