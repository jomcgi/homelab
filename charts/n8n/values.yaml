# Workflow GitOps Sync Configuration
workflowSync:
  # Enable workflow sync from ConfigMaps to n8n
  enabled: false

  # Suffix appended to workflow names to indicate GitOps management
  # Example: "my-workflow" becomes "my-workflow [git-managed]"
  managedSuffix: " [git-managed]"

  # Tag added to all managed workflows for identification
  managedTag: "gitops-managed"

  # Log level (debug, info, warn, error)
  logLevel: "info"

  # Docker image for workflow syncer
  image:
    repository: ghcr.io/jomcgi/homelab/n8n-workflow-syncer
    tag: "latest"  # Override with specific version in production
    pullPolicy: IfNotPresent

  # API key secret reference
  apiKeySecret:
    name: "n8n-api-key"
    key: "api-key"

  # List of workflow ConfigMap names to sync
  # Example: ["n8n-workflow-joe-phone-tracker", "n8n-workflow-other"]
  workflowConfigMaps: []

  # OpenTelemetry configuration
  telemetry:
    enabled: false
    # OTLP endpoint (e.g., "signoz-otel-collector.signoz.svc.cluster.local:4317")
    otlpEndpoint: ""

  # Drift detection via CronJob
  driftDetection:
    enabled: false
    # Schedule in cron format (default: every 30 minutes)
    schedule: "*/30 * * * *"
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3

  # Resource limits
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

n8n:
  main:
    # Persistence using Longhorn
    persistence:
      enabled: true
      storageClass: "longhorn"
      size: 10Gi