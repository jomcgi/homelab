# AIS Ingest Service
# Streams vessel position reports from AISStream.io to NATS

# Image configuration
image:
  repository: ghcr.io/jomcgi/homelab/services/ais-ingest
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# Single replica - no need for HA for data ingestion
replicas: 1

# Secret configuration for AISStream API key
secret:
  type: onepassword
  onepassword:
    itemPath: "vaults/k8s-homelab/items/marine"
  manual:
    apiKey: ""

# NATS configuration
nats:
  url: nats://nats.nats.svc.cluster.local:4222

# AISStream configuration
aisstream:
  url: wss://stream.aisstream.io/v0/stream
  # Pacific Northwest bounding box: BC/WA coast
  # SW corner (46.876152, -129.552155) to NE corner (51.413769, -121.213531)
  boundingBox: "[[[46.876152, -129.552155], [51.413769, -121.213531]]]"

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
# Note: Running as root because aspect_rules_py venv needs to write
# to the installation directory. TODO: Fix image to run as non-root
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  # Note: readOnlyRootFilesystem disabled because aspect_rules_py
  # creates a virtualenv at runtime (by design)
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Service configuration for health endpoint
service:
  type: ClusterIP
  port: 8000

# Resource limits
resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Image pull secret configuration
imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"
