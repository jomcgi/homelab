{{- if .Values.sandboxes.limitRange.enabled }}
apiVersion: v1
kind: LimitRange
metadata:
  name: {{ include "openhands.fullname" . }}-sandbox-limits
  namespace: {{ .Values.kubernetes.sandboxNamespace }}
  labels:
    {{- include "openhands.labels" . | nindent 4 }}
spec:
  limits:
  - default:
      cpu: {{ .Values.sandboxes.limitRange.defaultCpu | quote }}
      memory: {{ .Values.sandboxes.limitRange.defaultMemory | quote }}
    defaultRequest:
      cpu: {{ .Values.sandboxes.limitRange.defaultRequestCpu | quote }}
      memory: {{ .Values.sandboxes.limitRange.defaultRequestMemory | quote }}
    type: Container
{{- end }}
