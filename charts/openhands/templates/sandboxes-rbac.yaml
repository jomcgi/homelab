apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "openhands.fullname" . }}-sandbox-manager
  namespace: {{ .Values.kubernetes.sandboxNamespace }}
  labels:
    {{- include "openhands.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: [pods]
  verbs: [create, get, list, watch, delete]
- apiGroups: [""]
  resources: [pods/log]
  verbs: [get]
- apiGroups: [""]
  resources: [pods/exec]
  verbs: [create]
- apiGroups: [""]
  resources: [services]
  verbs: [create, get, delete]
- apiGroups: [""]
  resources: [persistentvolumeclaims]
  verbs: [create, get, list, delete]
- apiGroups: [networking.k8s.io]
  resources: [ingresses]
  verbs: [create, get, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "openhands.fullname" . }}-sandbox-manager
  namespace: {{ .Values.kubernetes.sandboxNamespace }}
  labels:
    {{- include "openhands.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "openhands.fullname" . }}-sandbox-manager
subjects:
- kind: ServiceAccount
  name: {{ include "openhands.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
