apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openhands.fullname" . }}-litellm
  labels:
    {{- include "openhands.litellm.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "openhands.litellm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openhands.litellm.selectorLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- if .Values.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: ghcr-imagepull-secret
      {{- end }}
      serviceAccountName: {{ include "openhands.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: litellm
          image: "{{ .Values.litellm.image.repository }}:{{ .Values.litellm.image.tag }}"
          imagePullPolicy: {{ .Values.litellm.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: LITELLM_LOG
              value: "ERROR"
            - name: LITELLM_MASTER_KEY
              value: {{ .Values.llm.apiKey | quote }}
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-sdk-token
                  key: CLAUDE_AUTH_TOKEN
          resources:
            {{- toYaml .Values.litellm.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
              httpHeaders:
                - name: Authorization
                  value: Bearer {{ .Values.llm.apiKey }}
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
              httpHeaders:
                - name: Authorization
                  value: Bearer {{ .Values.llm.apiKey }}
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: claude-home
              mountPath: /home/claude
            - name: tmp
              mountPath: /tmp
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: claude-home
          emptyDir: {}
        - name: tmp
          emptyDir: {}
