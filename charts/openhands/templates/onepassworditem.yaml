{{- if .Values.secrets.claudeSdkToken.itemPath }}
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: claude-sdk-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openhands.labels" . | nindent 4 }}
spec:
  itemPath: {{ .Values.secrets.claudeSdkToken.itemPath | quote }}
{{- end }}
{{- if .Values.secrets.openhandsSecrets.itemPath }}
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: openhands-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openhands.labels" . | nindent 4 }}
spec:
  itemPath: {{ .Values.secrets.openhandsSecrets.itemPath | quote }}
{{- end }}
