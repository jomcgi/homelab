apiVersion: v1
kind: Service
metadata:
  name: {{ include "openhands.fullname" . }}
  labels:
    {{- include "openhands.app.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "openhands.app.selectorLabels" . | nindent 4 }}
