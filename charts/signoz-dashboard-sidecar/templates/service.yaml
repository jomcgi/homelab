{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "signoz-dashboard-sidecar.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "signoz-dashboard-sidecar.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "signoz-dashboard-sidecar.selectorLabels" . | nindent 4 }}
{{- end }}
