# Default values for gh-arc
# This chart deploys both the GitHub Actions Runner Controller and runner scale sets

# Secret configuration for GitHub authentication
secret:
  # Type of secret: onepassword, manual, or external
  type: onepassword
  onepassword:
    # Path to 1Password item containing GitHub PAT
    # Format: "vaults/{vault-name}/items/{item-name}"
    itemPath: "vaults/k8s-homelab/items/gh-arc"
  manual:
    # Only used if type=manual
    githubToken: ""
  # If type=external, you must create a secret named "gh-arc-secret"
  # in the deployment namespace with key "github_token"

# GitHub configuration
github:
  # Repository or organization URL for runners
  configUrl: "https://github.com/jomcgi/homelab"

# Runner scale set configuration
runners:
  # Runner scale set name
  name: "homelab-runners"
  # Minimum and maximum runners
  minRunners: 0
  maxRunners: 3

# Controller configuration (gha-runner-scale-set-controller subchart)
gha-runner-scale-set-controller:
  # Controller configuration
  replicaCount: 1

  # Security context following homelab security standards
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  # Resource limits to prevent resource exhaustion
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Service account
  serviceAccount:
    create: true
    annotations: {}
    name: "arc-controller"

  # Metrics for observability
  metrics:
    controllerManagerAddr: ":8080"
    listenerAddr: ":8080"
    listenerEndpoint: "/metrics"

# Runner scale set configuration (gha-runner-scale-set subchart)
gha-runner-scale-set:
  # GitHub configuration - will be overridden by parent values
  githubConfigUrl: "https://github.com/jomcgi/homelab"

  # Reference to the secret containing GitHub PAT
  githubConfigSecret: "gh-arc-secret"

  # Runner configuration
  runnerScaleSetName: "homelab-runners"

  # Minimum and maximum runners
  minRunners: 0
  maxRunners: 3

  # Container mode configuration
  containerMode:
    type: "kubernetes"

  # Template for runner pods
  template:
    spec:
      # Security context following homelab security standards
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]

        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          # Note: readOnlyRootFilesystem cannot be true for runners as they need to write
          readOnlyRootFilesystem: false

        # Resource limits
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: "500m"
            memory: 1Gi

        # Volume mounts for workspace
        volumeMounts:
        - name: work
          mountPath: /home/runner/_work

      volumes:
      - name: work
        emptyDir: {}

  # Controller service account (deployed in same namespace)
  controllerServiceAccount:
    namespace: "gh-arc-runners"
    name: "arc-controller"

  # Metrics for observability
  listenerTemplate:
    spec:
      containers:
      - name: listener
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
