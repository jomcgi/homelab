{{- if eq .Values.secret.type "onepassword" }}
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: gh-arc-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  itemPath: {{ .Values.secret.onepassword.itemPath | quote }}
{{- else if eq .Values.secret.type "manual" }}
apiVersion: v1
kind: Secret
metadata:
  name: gh-arc-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  github_token: {{ required "GitHub PAT is required when using manual secret type" .Values.secret.manual.githubToken | quote }}
{{- end }}
{{- /* For external secrets, no resource is created - user must provide existing secret */ -}}
{{- /*
Expected secret structure when using OnePassword:
The OnePassword item should contain a field named "PAT" which contains the GitHub Personal Access Token
with the following permissions:
- repo (for private repositories)
- admin:org (for organization runners)
- admin:repo_hook (for webhooks)

This secret will be used by both the ARC controller and runner scale sets to authenticate with GitHub API.
*/ -}}
