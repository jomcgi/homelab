apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "context-forge.fullname" . }}
  labels:
    {{- include "context-forge.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "context-forge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "context-forge.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
              protocol: TCP
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: {{ .Values.gateway.port | quote }}
            - name: GUNICORN_WORKERS
              value: "2"
            - name: DATABASE_URL
              value: "sqlite:////data/context-forge.db"
            - name: AUTH_REQUIRED
              value: "false"
            - name: MCP_CLIENT_AUTH_ENABLED
              value: "false"
            - name: MCPGATEWAY_UI_ENABLED
              value: "false"
            - name: MCPGATEWAY_ADMIN_API_ENABLED
              value: "true"
            - name: API_ALLOW_BASIC_AUTH
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: register-script
              mountPath: /config
              readOnly: true
          lifecycle:
            postStart:
              exec:
                command: ["/bin/sh", "/config/register-gateways.sh"]
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
        {{- if .Values.signoz.enabled }}
        - name: signoz-mcp
          image: "{{ .Values.signoz.image.repository }}:{{ .Values.signoz.image.tag }}"
          imagePullPolicy: {{ .Values.signoz.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
          ports:
            - name: signoz-mcp
              containerPort: {{ .Values.signoz.port }}
              protocol: TCP
          env:
            - name: SIGNOZ_URL
              value: {{ .Values.signoz.url | quote }}
            - name: TRANSPORT_MODE
              value: "http"
            - name: MCP_SERVER_PORT
              value: {{ .Values.signoz.port | quote }}
            - name: SIGNOZ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: SIGNOZ_API_KEY
          resources:
            {{- toYaml .Values.signoz.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: data
          emptyDir: {}
        - name: register-script
          configMap:
            name: {{ include "context-forge.fullname" . }}-config
            defaultMode: 0755
