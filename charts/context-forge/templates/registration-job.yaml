{{- /*
  Helm post-install/post-upgrade hook that registers downstream MCP servers
  with the Context Forge gateway via its admin API.
  Uses the gateway image (has Python + PyJWT) to mint a short-lived JWT.
*/ -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "context-forge.fullname" . }}-register-servers
  labels:
    {{- include "context-forge.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "context-forge.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: register
          image: "{{ (index .Values "mcp-stack" "mcpContextForge" "image" "repository") }}:{{ (index .Values "mcp-stack" "mcpContextForge" "image" "tag") }}"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e

              GATEWAY_URL="http://{{ .Release.Name }}-mcp-stack-mcpgateway:80"

              echo "Waiting for gateway at ${GATEWAY_URL}/health..."
              until curl -sf "${GATEWAY_URL}/health" > /dev/null 2>&1; do
                echo "Gateway not ready, retrying in 5s..."
                sleep 5
              done
              echo "Gateway is healthy."

              # Mint a short-lived JWT for admin API authentication
              TOKEN=$(python3 -c "
              import jwt, time, os
              payload = {
                  'sub': 'registration-job',
                  'iat': int(time.time()),
                  'exp': int(time.time()) + 300,
                  'aud': 'mcpgateway-api',
                  'iss': 'mcpgateway',
              }
              print(jwt.encode(payload, os.environ.get('JWT_SECRET_KEY', ''), algorithm='HS256'))
              ")

              # Delete existing registration if present (idempotent re-registration)
              curl -sf -X DELETE "${GATEWAY_URL}/gateways/{{ .Values.registration.signoz.name }}" \
                -H "Authorization: Bearer ${TOKEN}" || true

              # Register SigNoz MCP server
              echo "Registering {{ .Values.registration.signoz.name }}..."
              curl -sf -X POST "${GATEWAY_URL}/gateways" \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                  "name": "{{ .Values.registration.signoz.name }}",
                  "url": "{{ .Values.registration.signoz.url }}",
                  "transport": "{{ .Values.registration.signoz.transport }}"
                }'

              echo ""
              echo "Registration complete."
          envFrom:
            - secretRef:
                name: {{ .Values.secret.name }}
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
