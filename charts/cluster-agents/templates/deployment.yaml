apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cluster-agents.fullname" . }}
  labels:
    {{- include "cluster-agents.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "cluster-agents.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cluster-agents.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: ghcr-imagepull-secret
      {{- end }}
      serviceAccountName: {{ include "cluster-agents.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.port }}
          protocol: TCP
        env:
        - name: NATS_URL
          value: {{ .Values.config.natsUrl | quote }}
        - name: LLM_URL
          value: {{ .Values.config.llmUrl | quote }}
        - name: LLM_MODEL
          value: {{ .Values.config.llmModel | quote }}
        - name: ARGOCD_URL
          value: {{ .Values.config.argocdUrl | quote }}
        - name: ORCHESTRATOR_URL
          value: {{ .Values.config.orchestratorUrl | quote }}
        - name: GITHUB_REPO
          value: {{ .Values.config.githubRepo | quote }}
        - name: HTTP_PORT
          value: {{ .Values.config.httpPort | quote }}
        - name: PATROL_INTERVAL
          value: {{ .Values.config.patrolInterval | quote }}
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-token-cluster-agents
              key: credential
        - name: ARGOCD_TOKEN
          valueFrom:
            secretKeyRef:
              name: argocd-token-cluster-agents
              key: credential
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
