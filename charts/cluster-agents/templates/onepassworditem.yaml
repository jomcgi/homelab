apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: github-token-cluster-agents
  labels:
    {{- include "cluster-agents.labels" . | nindent 4 }}
spec:
  itemPath: {{ .Values.secrets.githubToken.onepassword.itemPath | quote }}
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: argocd-token-cluster-agents
  labels:
    {{- include "cluster-agents.labels" . | nindent 4 }}
spec:
  itemPath: {{ .Values.secrets.argocdToken.onepassword.itemPath | quote }}
