replicaCount: 1

image:
  repository: ghcr.io/jomcgi/homelab/services/cluster-agents
  tag: main
  pullPolicy: IfNotPresent

imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

config:
  natsUrl: "nats://nats.nats.svc.cluster.local:4222"
  llmUrl: "http://llama-cpp.llama-cpp.svc.cluster.local:8080"
  llmModel: "default"
  argocdUrl: "http://argocd-server.argocd.svc.cluster.local"
  orchestratorUrl: "http://agent-orchestrator.agent-orchestrator.svc.cluster.local:8080"
  githubRepo: "jomcgi/homelab"
  httpPort: "8080"
  patrolInterval: "5m"

secrets:
  githubToken:
    onepassword:
      itemPath: "vaults/k8s-homelab/items/github-token-cluster-agents"
  argocdToken:
    onepassword:
      itemPath: "vaults/k8s-homelab/items/argocd-token-cluster-agents"

nodeSelector: {}
tolerations: []
affinity: {}
