controller:
  image:
    repository: registry.k8s.io/agent-sandbox/agent-sandbox-controller
    tag: v0.1.1
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    fsGroup: 65532
