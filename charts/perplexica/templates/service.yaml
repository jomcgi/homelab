apiVersion: v1
kind: Service
metadata:
  name: {{ include "perplexica.fullname" . }}
  labels:
    {{- include "perplexica.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "perplexica.selectorLabels" . | nindent 4 }}
---
{{- if .Values.service.searxng.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "perplexica.fullname" . }}-searxng
  labels:
    {{- include "perplexica.labels" . | nindent 4 }}
    app.kubernetes.io/component: searxng
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.searxng.port }}
      targetPort: searxng
      protocol: TCP
      name: searxng
  selector:
    {{- include "perplexica.selectorLabels" . | nindent 4 }}
{{- end }}
