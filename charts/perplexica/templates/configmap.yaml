{{- if .Values.searxng.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "perplexica.fullname" . }}-searxng
  labels:
    {{- include "perplexica.labels" . | nindent 4 }}
data:
  settings.yml: |
    # SearXNG Configuration
    # Generated by Helm chart

    use_default_settings: true

    general:
      instance_name: {{ .Values.searxng.settings.instanceName | quote }}
      debug: false
      privacypolicy_url: false
      contact_url: false
      enable_metrics: false

    search:
      safe_search: 0
      autocomplete: ""
      default_lang: "en"
      formats:
        {{- range .Values.searxng.settings.formats }}
        - {{ . }}
        {{- end }}

    server:
      port: {{ .Values.searxng.port }}
      bind_address: "0.0.0.0"
      secret_key: "ultrasecretkey"
      limiter: {{ .Values.searxng.settings.limiter }}
      public_instance: false
      image_proxy: false

    outgoing:
      request_timeout: {{ .Values.searxng.settings.requestTimeout }}
      useragent_suffix: ""
      pool_connections: 100
      pool_maxsize: 20

    engines:
      {{- range $name, $config := .Values.searxng.settings.engines }}
      - name: {{ $name }}
        disabled: {{ $config.disabled }}
      {{- end }}
{{- end }}
