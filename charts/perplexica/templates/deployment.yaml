apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "perplexica.fullname" . }}
  labels:
    {{- include "perplexica.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "perplexica.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "perplexica.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "perplexica.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        # init-config: Set up directories with correct permissions
        - name: init-config
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /home/perplexica/data
              chown -R 1000:1000 /home/perplexica
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: data
              mountPath: /home/perplexica/data
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
      containers:
        # Main Perplexica container
        - name: perplexica
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            # SearXNG URL (sidecar in same pod)
            - name: SEARXNG_API_URL
              value: "http://localhost:{{ .Values.searxng.port }}"
            {{- if .Values.llm.baseUrl }}
            # LLM configuration via environment (overrides config.toml)
            - name: OPENAI_API_BASE
              value: {{ .Values.llm.baseUrl | quote }}
            {{- end }}
            {{- if .Values.llm.apiKey }}
            - name: OPENAI_API_KEY
              value: {{ .Values.llm.apiKey | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /home/perplexica/data
            - name: tmp
              mountPath: /tmp

        {{- if .Values.searxng.enabled }}
        # SearXNG sidecar container
        - name: searxng
          image: "{{ .Values.searxng.image.repository }}:{{ .Values.searxng.image.tag }}"
          imagePullPolicy: {{ .Values.searxng.image.pullPolicy }}
          ports:
            - name: searxng
              containerPort: {{ .Values.searxng.port }}
              protocol: TCP
          env:
            - name: SEARXNG_BASE_URL
              value: "http://localhost:{{ .Values.searxng.port }}"
            - name: INSTANCE_NAME
              value: {{ .Values.searxng.settings.instanceName | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.searxng.resources | nindent 12 }}
          volumeMounts:
            - name: searxng-config
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
            - name: searxng-tmp
              mountPath: /tmp
        {{- end }}

        {{- if and (eq .Values.embedding.provider "local") .Values.embedding.ollama.enabled }}
        # Ollama sidecar for local embeddings
        - name: ollama
          image: {{ .Values.embedding.ollama.image }}
          ports:
            - name: ollama
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.embedding.ollama.resources | nindent 12 }}
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
        {{- end }}

      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "perplexica.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
        {{- if .Values.searxng.enabled }}
        - name: searxng-config
          configMap:
            name: {{ include "perplexica.fullname" . }}-searxng
        - name: searxng-tmp
          emptyDir: {}
        {{- end }}
        {{- if and (eq .Values.embedding.provider "local") .Values.embedding.ollama.enabled }}
        - name: ollama-data
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
