# NATS JetStream configuration for homelab
# This is shared infrastructure for multiple projects
# Storage isolation is enforced at the stream level (max_bytes per stream)

nats:
  # Mark NATS port as opaque for Linkerd (binary protocol)
  # Pin to node-4 which has SSD storage for high-volume streams
  podTemplate:
    merge:
      metadata:
        annotations:
          config.linkerd.io/opaque-ports: "4222"
      spec:
        nodeSelector:
          kubernetes.io/hostname: node-4

  config:
    # Single-node cluster for homelab
    cluster:
      enabled: false

    # Enable JetStream for persistent messaging
    jetstream:
      enabled: true

      fileStore:
        enabled: true
        dir: /data

        pvc:
          enabled: true
          size: 50Gi
          storageClassName: longhorn
          # Single replica on node-4 (has most storage)
          annotations:
            numberOfReplicas: "1"

    # Enable monitoring endpoint for Prometheus exporter
    monitor:
      enabled: true
      port: 8222

  # Prometheus metrics exporter sidecar
  promExporter:
    enabled: true
    image:
      repository: natsio/prometheus-nats-exporter
      tag: 0.18.0
    port: 7777
    merge:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

  # Container configuration
  container:
    image:
      repository: nats
      tag: "2.10.24-alpine"
      pullPolicy: IfNotPresent

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # Single replica for homelab
  statefulSet:
    replicas: 1

  # Service configuration
  service:
    enabled: true
    ports:
      nats:
        enabled: true
        port: 4222
    # Prometheus scrape annotations for SigNoz
    merge:
      metadata:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "7777"
          prometheus.io/path: "/metrics"
