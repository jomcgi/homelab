apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "signoz-mcp.fullname" . }}
  labels:
    {{- include "signoz-mcp.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "signoz-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "signoz-mcp.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: signoz-mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: mcp
              containerPort: {{ .Values.port }}
              protocol: TCP
          env:
            - name: SIGNOZ_BACKEND_URL
              value: {{ .Values.signozBackendUrl | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.secret.name }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 5
            periodSeconds: 10
