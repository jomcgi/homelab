# SigNoz MCP Server
# Standalone deployment providing SigNoz observability tools via MCP protocol.

image:
  repository: docker.io/signoz/signoz-mcp-server
  tag: "v0.0.5"
  pullPolicy: IfNotPresent

port: 8000

signozBackendUrl: "http://signoz.signoz.svc.cluster.local:8080"

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

# 1Password secret for SIGNOZ_API_KEY
secret:
  name: signoz-mcp
  itemPath: "vaults/k8s-homelab/items/signoz-mcp"
