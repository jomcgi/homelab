{{- if eq .Values.secret.type "onepassword" }}
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ include "fizzy.fullname" . }}-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fizzy.labels" . | nindent 4 }}
spec:
  itemPath: {{ .Values.secret.onepassword.itemPath | quote }}
{{- end }}
---
{{- if .Values.smtp.enabled }}
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ include "fizzy.fullname" . }}-smtp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fizzy.labels" . | nindent 4 }}
spec:
  itemPath: {{ .Values.smtp.onepassword.itemPath | quote }}
{{- end }}
