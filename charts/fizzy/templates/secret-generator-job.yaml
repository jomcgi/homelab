{{/*
Job to generate SECRET_KEY_BASE if it doesn't exist.
Runs as an ArgoCD PreSync hook before the main deployment.
*/}}
{{- if not .Values.secrets.secretKeyBase.existingSecret }}
{{- if not .Values.secrets.secretKeyBase.value }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "fizzy.fullname" . }}-generate-secret
  labels:
    {{- include "fizzy.labels" . | nindent 4 }}
  annotations:
    # ArgoCD hook: run before syncing other resources
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        {{- include "fizzy.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "fizzy.fullname" . }}-secret-generator
      containers:
      - name: generate-secret
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          SECRET_NAME="{{ include "fizzy.secretName" . }}"
          NAMESPACE="{{ .Release.Namespace }}"

          # Check if secret already exists
          if kubectl get secret "$SECRET_NAME" -n "$NAMESPACE" >/dev/null 2>&1; then
            echo "Secret $SECRET_NAME already exists, skipping generation"
            exit 0
          fi

          # Generate random SECRET_KEY_BASE (128 alphanumeric chars)
          SECRET_KEY_BASE=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 128 | head -n 1)

          # Create the secret
          kubectl create secret generic "$SECRET_NAME" \
            --namespace "$NAMESPACE" \
            --from-literal=SECRET_KEY_BASE="$SECRET_KEY_BASE"

          # Add resource-policy annotation to preserve on uninstall
          kubectl annotate secret "$SECRET_NAME" \
            --namespace "$NAMESPACE" \
            "helm.sh/resource-policy=keep"

          echo "Secret $SECRET_NAME created successfully"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fizzy.fullname" . }}-secret-generator
  labels:
    {{- include "fizzy.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "fizzy.fullname" . }}-secret-generator
  labels:
    {{- include "fizzy.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "fizzy.fullname" . }}-secret-generator
  labels:
    {{- include "fizzy.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
subjects:
- kind: ServiceAccount
  name: {{ include "fizzy.fullname" . }}-secret-generator
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "fizzy.fullname" . }}-secret-generator
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
