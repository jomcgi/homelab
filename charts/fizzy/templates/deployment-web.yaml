apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fizzy.fullname" . }}-web
  labels:
    {{- include "fizzy.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  # SQLite requires Recreate strategy (single writer)
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "fizzy.webSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "fizzy.webSelectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "fizzy.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: web
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        env:
        - name: RAILS_ENV
          value: {{ .Values.rails.env | quote }}
        - name: RAILS_LOG_TO_STDOUT
          value: {{ .Values.rails.logToStdout | quote }}
        - name: RAILS_SERVE_STATIC_FILES
          value: {{ .Values.rails.serveStaticFiles | quote }}
        - name: DATABASE_ADAPTER
          value: "sqlite"
        - name: SECRET_KEY_BASE
          valueFrom:
            secretKeyRef:
              {{- if eq .Values.secret.type "existing" }}
              name: {{ .Values.secret.existing.name }}
              key: {{ .Values.secret.existing.key }}
              {{- else }}
              name: {{ include "fizzy.fullname" . }}-credentials
              key: secret_key_base
              {{- end }}
        {{- if .Values.smtp.enabled }}
        - name: SMTP_ADDRESS
          valueFrom:
            secretKeyRef:
              name: {{ include "fizzy.fullname" . }}-smtp
              key: smtp_address
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: {{ include "fizzy.fullname" . }}-smtp
              key: smtp_port
        - name: SMTP_DOMAIN
          valueFrom:
            secretKeyRef:
              name: {{ include "fizzy.fullname" . }}-smtp
              key: smtp_domain
        - name: SMTP_USER_NAME
          valueFrom:
            secretKeyRef:
              name: {{ include "fizzy.fullname" . }}-smtp
              key: smtp_user_name
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "fizzy.fullname" . }}-smtp
              key: smtp_password
        {{- end }}
        livenessProbe:
          httpGet:
            path: {{ .Values.healthCheck.path }}
            port: http
          initialDelaySeconds: {{ .Values.healthCheck.initialDelaySeconds }}
          periodSeconds: {{ .Values.healthCheck.periodSeconds }}
          timeoutSeconds: {{ .Values.healthCheck.timeoutSeconds }}
          failureThreshold: {{ .Values.healthCheck.failureThreshold }}
        readinessProbe:
          httpGet:
            path: {{ .Values.healthCheck.path }}
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.web.resources | nindent 10 }}
        volumeMounts:
        - name: tmp
          mountPath: /rails/tmp
        - name: cache
          mountPath: /rails/tmp/cache
        {{- if .Values.persistence.enabled }}
        - name: storage
          mountPath: /rails/storage
        {{- end }}
        {{- if .Values.smtp.enabled }}
        - name: smtp-config
          mountPath: /rails/config/initializers/smtp.rb
          subPath: smtp.rb
        {{- end }}
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      {{- if .Values.persistence.enabled }}
      - name: storage
        persistentVolumeClaim:
          claimName: {{ include "fizzy.fullname" . }}-storage
      {{- end }}
      {{- if .Values.smtp.enabled }}
      - name: smtp-config
        configMap:
          name: {{ include "fizzy.fullname" . }}-smtp-config
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
