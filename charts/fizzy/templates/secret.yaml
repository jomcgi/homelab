{{/*
Auto-generate SECRET_KEY_BASE if not provided via existingSecret or value.
Uses lookup to preserve the generated secret across helm upgrades.
*/}}
{{- $secretName := include "fizzy.secretName" . }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $secretKeyBase := "" }}

{{- if .Values.secrets.secretKeyBase.existingSecret }}
  {{/* Using external secret - don't create this one */}}
{{- else }}
  {{/* Generate or reuse SECRET_KEY_BASE */}}
  {{- if $existingSecret }}
    {{- $secretKeyBase = index $existingSecret.data "SECRET_KEY_BASE" | b64dec }}
  {{- else if .Values.secrets.secretKeyBase.value }}
    {{- $secretKeyBase = .Values.secrets.secretKeyBase.value }}
  {{- else }}
    {{/* Auto-generate: 128 alphanumeric chars (~744 bits entropy, exceeds Rails requirement) */}}
    {{- $secretKeyBase = randAlphaNum 128 }}
  {{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "fizzy.labels" . | nindent 4 }}
  annotations:
    # Preserve secret across helm uninstall/reinstall
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  SECRET_KEY_BASE: {{ $secretKeyBase | quote }}
  {{- if .Values.secrets.railsMasterKey.value }}
  RAILS_MASTER_KEY: {{ .Values.secrets.railsMasterKey.value | quote }}
  {{- end }}
  {{- if .Values.secrets.vapid.privateKey }}
  VAPID_PRIVATE_KEY: {{ .Values.secrets.vapid.privateKey | quote }}
  VAPID_PUBLIC_KEY: {{ .Values.secrets.vapid.publicKey | quote }}
  {{- end }}
{{- end }}
