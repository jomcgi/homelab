## Fizzy Helm Chart Configuration
## Kanban tracking tool by 37signals (Basecamp)
## Uses the Solid trifecta: Solid Queue, Solid Cache, Solid Cable (all DB-backed)

image:
  repository: ghcr.io/basecamp/fizzy
  pullPolicy: IfNotPresent
  tag: "main"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

## Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

## Pod Security Context (Rails app runs as non-root user 1000)
podSecurityContext:
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

## Container Security Context
securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  readOnlyRootFilesystem: false  # Rails needs tmp directories
  capabilities:
    drop:
      - ALL

## Rails Environment Configuration
rails:
  # Rails environment
  env: "production"

  # Log to stdout for container logging
  logToStdout: true

  # Serve static files (Thruster handles this)
  serveStaticFiles: true

## Database Configuration
## Fizzy supports SQLite (simple, single-replica) or MySQL (HA-capable)
database:
  # Database adapter: "sqlite" or "mysql"
  # SQLite is simpler for dev/homelab, MySQL for production HA
  adapter: sqlite

  ## SQLite configuration (used when adapter: sqlite)
  sqlite:
    # Path inside container for SQLite database
    path: "/rails/storage/production.sqlite3"

  ## MySQL configuration (used when adapter: mysql)
  mysql:
    # Use existing secret containing DATABASE_URL
    existingSecret: ""
    secretKey: "DATABASE_URL"
    # Or configure individually (used if existingSecret is empty)
    host: ""
    port: 3306
    name: "fizzy_production"
    username: ""
    password: ""

## Persistence for SQLite and Rails storage (Active Storage, etc.)
persistence:
  enabled: true
  storageClass: "longhorn"
  accessMode: ReadWriteOnce
  size: 5Gi
  annotations: {}

## Secrets Configuration
secrets:
  # SECRET_KEY_BASE is REQUIRED for Rails to boot
  # Generate with: openssl rand -hex 64
  secretKeyBase:
    existingSecret: ""
    secretKey: "SECRET_KEY_BASE"
    value: ""

  # RAILS_MASTER_KEY is NOT needed for self-hosted deployments
  # (It decrypts Basecamp's credentials.yml.enc which you can't use anyway)
  # Only set this if you build your own image with custom credentials
  railsMasterKey:
    existingSecret: ""
    secretKey: "RAILS_MASTER_KEY"
    value: ""

  # VAPID keys for web push notifications (optional)
  # Only needed if you want PWA "install as app" push notifications
  vapid:
    existingSecret: ""
    privateKeySecretKey: "VAPID_PRIVATE_KEY"
    publicKeySecretKey: "VAPID_PUBLIC_KEY"
    privateKey: ""
    publicKey: ""

## Web Deployment (Puma + Thruster)
web:
  # Number of replicas (use 1 for SQLite, can scale with MySQL)
  replicas: 1

  # Resource limits
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

  # Autoscaling (optional)
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

## Worker Deployment (Solid Queue)
worker:
  # Enable Solid Queue worker
  enabled: true

  # Number of replicas
  replicas: 1

  # Command to run workers
  command: ["bin/jobs"]

  # Resource limits
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi

  # Autoscaling (optional)
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

## Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 80  # Thruster listens on 80
  annotations: {}

## Health checks
## Fizzy uses standard Rails health check endpoint
healthCheck:
  path: "/up"
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

## Node selector
nodeSelector: {}

## Tolerations
tolerations: []

## Affinity rules
affinity: {}

## Pod annotations
podAnnotations: {}

## Pod labels
podLabels: {}

## Deployment strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
