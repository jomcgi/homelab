# Runners chart values
# This chart deploys the GitHub Actions Runner Scale Set

# GitHub configuration
github:
  configUrl: "https://github.com/jomcgi/homelab"

# Controller configuration (in separate namespace)
controller:
  namespace: "gh-arc-controller"
  serviceAccountName: "arc-controller"
  secretName: "gh-arc-secret"

# Secret configuration for GitHub authentication
secret:
  # Type of secret: "onepassword" or "manual"
  type: "onepassword"

  # 1Password configuration (when type=onepassword)
  onepassword:
    itemPath: "vaults/k8s-homelab/items/gh-arc"

  # Manual secret configuration (when type=manual)
  # manual:
  #   githubToken: "ghp_your_token_here"

# Runner configuration
runners:
  name: "homelab-runners"
  minRunners: 0
  maxRunners: 3

# Runner scale set configuration
gha-runner-scale-set:
  githubConfigUrl: "https://github.com/jomcgi/homelab"

  # Reference secret in controller namespace
  githubConfigSecret: "gh-arc-secret"

  runnerScaleSetName: "homelab-runners"
  minRunners: 0
  maxRunners: 3

  # Reference controller in separate namespace
  controllerServiceAccount:
    namespace: "gh-arc-controller"
    name: "arc-controller"

  # Enable Docker-in-Docker for building container images
  containerMode:
    type: "dind"

  # Runner pod template
  template:
    spec:
      containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]
        resources:
          limits:
            cpu: 2000m
            memory: 4Gi
          requests:
            cpu: 500m
            memory: 1Gi

  listenerTemplate:
    spec:
      containers:
      - name: listener
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
