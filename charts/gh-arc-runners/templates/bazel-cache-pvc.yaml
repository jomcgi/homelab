{{- if .Values.bazelCache.enabled }}
---
# Persistent volume for Bazel repository cache
# Shared across all runners with ReadWriteMany for concurrent access
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bazel-repository-cache
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: gh-arc-runners
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  accessModes:
    - ReadWriteMany  # Multiple runners can mount simultaneously
  storageClassName: {{ .Values.bazelCache.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.bazelCache.size }}
{{- end }}
