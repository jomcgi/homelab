{{- if .Values.secret.create }}
{{- if eq .Values.secret.type "onepassword" }}
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: gh-arc-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  itemPath: {{ .Values.secret.onepassword.itemPath | quote }}
{{- else if eq .Values.secret.type "manual" }}
apiVersion: v1
kind: Secret
metadata:
  name: gh-arc-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  github_token: {{ required "GitHub PAT is required" .Values.secret.manual.githubToken | quote }}
{{- end }}
{{- end }}
