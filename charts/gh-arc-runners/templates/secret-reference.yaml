{{- /*
This chart references the gh-arc-secret from the gh-arc-controller namespace.
The secret is created by the gh-arc-controller chart.

Cross-namespace secret reference requires the secret to exist in gh-arc-controller namespace.
The AutoscalingRunnerSet will access it via the githubConfigSecret field.

Note: Kubernetes does not allow cross-namespace secret references by default.
The secret needs to be copied to this namespace or accessed via the controller.
*/ -}}

{{- if .Values.secret.create }}
# Create a Role in controller namespace to allow reading the secret
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gh-arc-secret-reader
  namespace: {{ .Values.controller.namespace }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["{{ .Values.controller.secretName }}"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gh-arc-secret-reader
  namespace: {{ .Values.controller.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gh-arc-secret-reader
subjects:
- kind: ServiceAccount
  name: {{ .Values.controller.serviceAccountName }}
  namespace: {{ .Values.controller.namespace }}
{{- end }}
