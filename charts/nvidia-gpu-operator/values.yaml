# Default values for nvidia-gpu-operator
# This is a wrapper chart for the official NVIDIA GPU Operator

gpu-operator:
  # Operator configuration
  operator:
    defaultRuntime: containerd

  # Driver configuration
  driver:
    enabled: true
    # Build drivers from source (pre-compiled not available for all kernels)
    usePrecompiled: false

  # Toolkit configuration
  toolkit:
    enabled: true
    # K3s-specific containerd paths
    env:
      - name: CONTAINERD_CONFIG
        value: /var/lib/rancher/k3s/agent/etc/containerd/config.toml
      - name: CONTAINERD_SOCKET
        value: /run/k3s/containerd/containerd.sock

  # Device plugin configuration
  devicePlugin:
    enabled: true

  # DCGM exporter for GPU metrics
  dcgmExporter:
    enabled: true
    # Force GPU access for monitoring without requesting nvidia.com/gpu resources
    # This tells nvidia-container-runtime to inject GPU devices and NVML library
    env:
      - name: NVIDIA_VISIBLE_DEVICES
        value: "all"
      - name: NVIDIA_DRIVER_CAPABILITIES
        value: "utility"
    # Export metrics for Prometheus
    serviceMonitor:
      enabled: true
    # SigNoz scrape configuration
    podAnnotations:
      signoz.io/scrape: "true"
      signoz.io/port: "9400"
      signoz.io/path: "/metrics"

  # GPU Feature Discovery
  gfd:
    enabled: true
    env:
      - name: GFD_DEVICE_DISCOVERY_STRATEGY
        value: nvml

  # Node Feature Discovery (for GPU node labeling)
  nfd:
    enabled: true

  # MIG (Multi-Instance GPU) manager - disabled by default
  migManager:
    enabled: false

  # vGPU - disabled for consumer GPUs
  vgpuManager:
    enabled: false

  # vGPU device manager - disabled for consumer GPUs
  vgpuDeviceManager:
    enabled: false
