apiVersion: v1
kind: Service
metadata:
  name: {{ include "claude-desktop.fullname" . }}
  labels:
    {{- include "claude-desktop.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.xpra.port }}
      targetPort: xpra
      protocol: TCP
      name: xpra
  selector:
    {{- include "claude-desktop.selectorLabels" . | nindent 4 }}
