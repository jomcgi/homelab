# Upstream Envoy Gateway Helm chart configuration
gateway-helm:
  config:
    envoyGateway:
      gateway:
        controllerName: gateway.envoyproxy.io/gatewayclass-controller

# GatewayClass configuration
gatewayClass:
  enabled: true
  name: envoy
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  description: "Envoy Gateway for cluster ingress with OTEL tracing"

# Gateway configuration
gateway:
  enabled: true
  name: cluster-ingress
  port: 80
  allowedRoutes:
    namespacesFrom: All
  # OTEL tracing configuration
  tracing:
    enabled: false  # Override in overlay to enable
    envoyProxyName: otel-tracing
    otlpService: signoz-otel-collector
    otlpNamespace: signoz
    otlpPort: 4317
    samplingRate: 100

# HTTPRoutes configuration
httpRoutes:
  enabled: false  # Override in overlay with actual routes
  routes: []
  # Example route structure (define in overlay):
  # - name: argocd
  #   hostname: argocd.jomcgi.dev
  #   serviceName: argocd-server
  #   serviceNamespace: argocd
  #   servicePort: 80
