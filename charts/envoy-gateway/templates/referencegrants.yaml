{{- if .Values.httpRoutes.enabled }}
{{- $namespaces := dict }}
{{- range .Values.httpRoutes.routes }}
  {{- $_ := set $namespaces .serviceNamespace true }}
{{- end }}
{{- range $namespace, $_ := $namespaces }}
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-envoy-gateway
  namespace: {{ $namespace }}
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: {{ $.Release.Namespace }}
  to:
    - group: ""
      kind: Service
{{- end }}
{{- end }}
