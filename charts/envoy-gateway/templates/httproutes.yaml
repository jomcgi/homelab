{{- if .Values.httpRoutes.enabled }}
{{- range .Values.httpRoutes.routes }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
spec:
  parentRefs:
    - name: {{ $.Values.gateway.name }}
      namespace: {{ $.Release.Namespace }}
  hostnames:
    - {{ .hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ .serviceName }}
          namespace: {{ .serviceNamespace }}
          port: {{ .servicePort }}
      {{- with .timeout }}
      timeouts:
        request: {{ . }}
      {{- end }}
{{- end }}
{{- end }}
