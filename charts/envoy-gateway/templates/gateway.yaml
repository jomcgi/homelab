{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Release.Namespace }}
  {{- if .Values.gateway.tracing.enabled }}
  annotations:
    gateway.envoyproxy.io/envoy-proxy: {{ .Values.gateway.tracing.envoyProxyName }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.gatewayClass.name }}
  listeners:
    - name: http
      protocol: HTTP
      port: {{ .Values.gateway.port }}
      allowedRoutes:
        namespaces:
          from: {{ .Values.gateway.allowedRoutes.namespacesFrom }}
{{- end }}
