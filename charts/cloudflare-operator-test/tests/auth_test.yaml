suite: cloudflare-operator-test auth service tests
templates:
  - auth-deployment.yaml
  - auth-service.yaml
tests:
  - it: should create auth deployment when enabled
    template: auth-deployment.yaml
    set:
      auth.enabled: true
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cloudflare-operator-test-auth

  - it: should not create auth deployment when disabled
    template: auth-deployment.yaml
    set:
      auth.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use correct image
    template: auth-deployment.yaml
    set:
      auth.enabled: true
      image.repository: hashicorp/http-echo
      image.tag: "1.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: hashicorp/http-echo:1.0

  - it: should set correct replica count
    template: auth-deployment.yaml
    set:
      auth.enabled: true
      auth.replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should set resource limits
    template: auth-deployment.yaml
    set:
      auth.enabled: true
      auth.resources.limits.cpu: 200m
      auth.resources.limits.memory: 128Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 200m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 128Mi

  - it: should create auth service when enabled
    template: auth-service.yaml
    set:
      auth.enabled: true
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cloudflare-operator-test-auth

  - it: should not create auth service when disabled
    template: auth-service.yaml
    set:
      auth.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should expose correct port
    template: auth-service.yaml
    set:
      auth.enabled: true
      auth.port: 5678
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 5678
