apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-oauth-proxy.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp-oauth-proxy.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "mcp-oauth-proxy.selectorLabels" . | nindent 4 }}
