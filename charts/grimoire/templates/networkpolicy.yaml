{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "grimoire.fullname" . }}-redis
  labels:
    {{- include "grimoire.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  podSelector:
    matchLabels:
      {{- include "grimoire.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "grimoire.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: ws-gateway
      ports:
        - protocol: TCP
          port: {{ .Values.redis.service.port }}
{{- end }}
