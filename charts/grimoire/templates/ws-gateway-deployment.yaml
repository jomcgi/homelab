apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grimoire.fullname" . }}-ws-gateway
  labels:
    {{- include "grimoire.labels" . | nindent 4 }}
    app.kubernetes.io/component: ws-gateway
spec:
  replicas: {{ .Values.wsGateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "grimoire.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ws-gateway
  template:
    metadata:
      labels:
        {{- include "grimoire.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ws-gateway
    spec:
      {{- if .Values.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: ghcr-imagepull-secret
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ws-gateway
          image: "{{ .Values.wsGateway.image.repository }}:{{ .Values.wsGateway.image.tag }}"
          imagePullPolicy: {{ .Values.wsGateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.geminiSecret.name }}
                  key: key
            - name: REDIS_ADDR
              value: "{{ include "grimoire.fullname" . }}-redis:{{ .Values.redis.service.port }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
          resources:
            {{- toYaml .Values.wsGateway.resources | nindent 12 }}
