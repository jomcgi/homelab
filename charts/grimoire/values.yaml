# Frontend — Nginx serving static React build
frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/jomcgi/homelab/services/grimoire-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 50m
      memory: 64Mi

# WebSocket Gateway — Go binary proxying Gemini Live + game relay
wsGateway:
  replicaCount: 1
  image:
    repository: ghcr.io/jomcgi/homelab/services/grimoire-ws-gateway
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Redis — ephemeral pub/sub + session state
redis:
  replicaCount: 1
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Gemini API key secret (synced from 1Password via OnePasswordItem)
geminiSecret:
  enabled: true
  name: gemini-api-key
  onepassword:
    itemPath: "vaults/Homelab/items/grimoire-gemini-api-key"

# Cloudflare Tunnel
tunnel:
  enabled: true
  hostname: grimoire.jomcgi.dev

# Image pull secret for private GHCR registry
imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

nameOverride: ""
fullnameOverride: ""

# ArgoCD Image Updater (automatic digest-based image updates)
imageUpdater:
  enabled: false
  images: []
  writeBack:
    method: ""
    repository: ""
    branch: main
    target: ""
