# Frontend — Nginx serving static React build
frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/jomcgi/homelab/services/grimoire-frontend
    tag: main
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 64Mi

# WebSocket Gateway — Go binary proxying Gemini Live + game relay
wsGateway:
  replicaCount: 1
  cfAccessTeam: ""
  image:
    repository: ghcr.io/jomcgi/homelab/services/grimoire-ws-gateway
    tag: main
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Redis — ephemeral pub/sub + session state
redis:
  replicaCount: 1
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 128Mi

# API Service — REST CRUD + RAG query handler
api:
  replicaCount: 1
  image:
    repository: ghcr.io/jomcgi/homelab/services/grimoire-api
    tag: main
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
  env:
    gcpProjectID: "grimoire-prod"
    firestoreDatabase: "grimoire"
    cfAccessTeam: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Chunk Writer — NATS consumer, upserts to Firestore
chunkWriter:
  replicaCount: 1
  image:
    repository: ghcr.io/jomcgi/homelab/services/grimoire-chunk-writer
    tag: main
    pullPolicy: Always
  env:
    natsURL: "nats://nats.nats.svc.cluster.local:4222"
    gcpProjectID: "grimoire-prod"
    firestoreDatabase: "grimoire"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Ingest Job — PDF processing, on-demand
ingest:
  image:
    repository: ghcr.io/jomcgi/homelab/services/grimoire-ingest
    tag: main
    pullPolicy: Always
  env:
    natsURL: "nats://nats.nats.svc.cluster.local:4222"
    seaweedfsEndpoint: "http://seaweedfs-s3.seaweedfs.svc.cluster.local:8333"
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi

# GCP service account for Firestore + Gemini API access
gcpServiceAccount:
  enabled: true
  secretName: grimoire
  secretKey: gcp_service_account
  mountPath: /var/run/secrets/gcp/sa.json

# ServiceAccount
serviceAccount:
  create: true
  automount: false
  name: ""
  annotations: {}

# NetworkPolicy
networkPolicy:
  enabled: true

# Grimoire secrets (synced from 1Password via OnePasswordItem)
grimoireSecret:
  enabled: true
  name: grimoire
  onepassword:
    itemPath: "vaults/k8s-homelab/items/grimoire"

# Cloudflare Tunnel (disabled — routing handled by shared cloudflare-tunnel chart)
tunnel:
  enabled: false
  hostname: grimoire.jomcgi.dev

# Image pull secret for private GHCR registry
imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

nameOverride: ""
fullnameOverride: ""

# ArgoCD Image Updater (automatic digest-based image updates)
imageUpdater:
  enabled: false
  images: []
  writeBack:
    method: ""
    repository: ""
    branch: main
    target: ""

# Image Updater secret for git write-back (generated by ExternalSecret)
imageUpdaterSecret:
  enabled: false
