apiVersion: v2
name: grimoire
description: Self-hosted D&D campaign manager with AI-assisted DMing
type: application
version: 0.1.0
appVersion: "0.1.0"
maintainers:
  - name: homelab
keywords:
  - dnd
  - tabletop
  - campaign-manager
  - gemini
  - websocket
annotations:
  org.opencontainers.image.source: "https://github.com/jomcgi/homelab"
  org.opencontainers.image.url: "https://github.com/jomcgi/homelab"
  org.opencontainers.image.licenses: "MPL-2.0"
  dev-deploy.enabled: "true"
  dev-deploy.value-overrides: |
    imagePullSecret.enabled=false
    imagePullSecret.create=false
    geminiSecret.enabled=false
    tunnel.enabled=false
    imageUpdater.enabled=false
    networkPolicy.enabled=false
