replicaCount: 1

image:
  repository: ghcr.io/jomcgi/homelab/services/agent-orchestrator
  tag: main
  pullPolicy: IfNotPresent

imagePullSecret:
  enabled: false
  create: true
  useOnePassword: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

config:
  natsUrl: "nats://nats.nats.svc.cluster.local:4222"
  sandboxNamespace: "goose-sandboxes"
  sandboxTemplate: "goose-agent"
  maxRetries: "2"
  maxConcurrent: "5"
  httpPort: "8080"
  jobInactivityTimeout: "10m"
  jobMaxDuration: "168h"

nodeSelector: {}
tolerations: []
affinity: {}
