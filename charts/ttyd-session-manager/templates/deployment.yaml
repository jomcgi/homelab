apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ttyd-session-manager.fullname" . }}
  namespace: {{ .Values.sessionNamespace }}
  labels:
    {{- include "ttyd-session-manager.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ttyd-session-manager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- if .Values.envoy.backend.enabled }}
      annotations:
        checksum/envoy-config: {{ include (print $.Template.BasePath "/envoy-configmap.yaml") . | sha256sum }}
      {{- end }}
      labels:
        {{- include "ttyd-session-manager.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      {{- if .Values.envoy.backend.enabled }}
      - name: envoy
        image: "{{ .Values.envoy.backend.image.repository }}:{{ .Values.envoy.backend.image.tag }}"
        imagePullPolicy: {{ .Values.envoy.backend.image.pullPolicy }}
        args:
        - -c
        - /etc/envoy/envoy.yaml
        ports:
        - containerPort: {{ .Values.envoy.backend.proxy.port }}
          name: envoy-proxy
          protocol: TCP
        - containerPort: {{ .Values.envoy.backend.admin.port }}
          name: envoy-admin
          protocol: TCP
        volumeMounts:
        - name: envoy-config
          mountPath: /etc/envoy
          readOnly: true
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 65534
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        {{- with .Values.envoy.backend.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /ready
            port: {{ .Values.envoy.backend.admin.port }}
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: {{ .Values.envoy.backend.admin.port }}
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
      {{- end }}
      - name: api-server
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8081
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: DEFAULT_WORKER_IMAGE_REPOSITORY
          value: {{ .Values.workerImage.repository | quote }}
        - name: DEFAULT_WORKER_IMAGE_TAG
          value: {{ .Values.workerImage.tag | quote }}
        - name: API_KEYS_SECRET_NAME
          value: {{ .Values.apiKeys.secretName | quote }}
        - name: ANTHROPIC_SECRET_KEY
          value: {{ .Values.apiKeys.anthropicSecretKey | quote }}
        - name: GOOGLE_SECRET_KEY
          value: {{ .Values.apiKeys.googleSecretKey | quote }}
        - name: BUILDBUDDY_SECRET_KEY
          value: {{ .Values.apiKeys.buildbuddySecretKey | quote }}
        - name: OTEL_ENABLED
          value: {{ .Values.opentelemetry.enabled | quote }}
        - name: OTEL_ENDPOINT
          value: {{ .Values.opentelemetry.endpoint | quote }}
        {{- if .Values.proxy.http }}
        - name: HTTP_PROXY
          value: {{ .Values.proxy.http | quote }}
        {{- end }}
        {{- if .Values.proxy.https }}
        - name: HTTPS_PROXY
          value: {{ .Values.proxy.https | quote }}
        {{- end }}
        {{- if .Values.proxy.noProxy }}
        - name: NO_PROXY
          value: {{ .Values.proxy.noProxy | quote }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
      {{- if .Values.envoy.backend.enabled }}
      volumes:
      - name: envoy-config
        configMap:
          name: {{ include "ttyd-session-manager.fullname" . }}-envoy-backend
          items:
          - key: envoy.yaml
            path: envoy.yaml
      {{- end }}
