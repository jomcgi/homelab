apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ttyd-session-manager.fullname" . }}
  namespace: {{ .Values.sessionNamespace }}
  labels:
    {{- include "ttyd-session-manager.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ttyd-session-manager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ttyd-session-manager.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: api-server
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: CLAUDE_CODE_SECRET_NAME
          value: {{ .Values.claudeCode.secretName | quote }}
        - name: CLAUDE_CODE_SECRET_KEY
          value: {{ .Values.claudeCode.secretKey | quote }}
        - name: OTEL_ENABLED
          value: {{ .Values.opentelemetry.enabled | quote }}
        - name: OTEL_ENDPOINT
          value: {{ .Values.opentelemetry.endpoint | quote }}
        {{- if .Values.proxy.http }}
        - name: HTTP_PROXY
          value: {{ .Values.proxy.http | quote }}
        {{- end }}
        {{- if .Values.proxy.https }}
        - name: HTTPS_PROXY
          value: {{ .Values.proxy.https | quote }}
        {{- end }}
        {{- if .Values.proxy.noProxy }}
        - name: NO_PROXY
          value: {{ .Values.proxy.noProxy | quote }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
