{{- if .Values.onePassword.enabled }}
---
# GHCR Pull Secret (for Kubernetes image pulls)
# Allows ttyd-session-manager to pull private images from GitHub Container Registry
# Type: kubernetes.io/dockerconfigjson (used for imagePullSecrets)
apiVersion: onepassword.com/v1
kind: OnePasswordItem
type: kubernetes.io/dockerconfigjson
metadata:
  name: {{ .Values.onePassword.secretName }}-dockerconfig
  namespace: {{ .Values.sessionNamespace }}
  labels:
    {{- include "ttyd-session-manager.labels" . | nindent 4 }}
spec:
  itemPath: {{ .Values.onePassword.itemPath | quote }}
{{- end }}
