{{- if .Values.claudeCode.secretName }}
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ .Values.claudeCode.secretName }}
  namespace: {{ .Values.sessionNamespace }}
  labels:
    {{- include "ttyd-session-manager.labels" . | nindent 4 }}
spec:
  itemPath: "vaults/k8s-homelab/items/ttyd-session-manager"
{{- end }}
