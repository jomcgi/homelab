apiVersion: v1
kind: Service
metadata:
  name: {{ include "ttyd-session-manager.fullname" . }}
  namespace: {{ .Values.sessionNamespace }}
  labels:
    {{- include "ttyd-session-manager.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      {{- if .Values.envoy.backend.enabled }}
      targetPort: envoy-proxy  # Target Envoy sidecar when enabled
      {{- else }}
      targetPort: {{ .Values.service.targetPort }}
      {{- end }}
      protocol: TCP
      name: http
  selector:
    {{- include "ttyd-session-manager.selectorLabels" . | nindent 4 }}
