{{- if .Values.apiKeys.secretName }}
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ .Values.apiKeys.secretName }}
  namespace: {{ .Values.sessionNamespace }}
  labels:
    {{- include "ttyd-session-manager.labels" . | nindent 4 }}
spec:
  itemPath: "{{ .Values.apiKeys.onePasswordItemPath }}"
{{- end }}
