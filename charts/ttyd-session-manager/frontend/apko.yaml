contents:
  repositories:
    - https://packages.wolfi.dev/os
    - https://packages.cgr.dev/extras
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    - https://packages.cgr.dev/extras/chainguard-extras.rsa.pub
  packages:
    - nginx
    - ca-certificates

archs:
  - x86_64
  - aarch64

entrypoint:
  command: /usr/sbin/nginx -g "daemon off;"

accounts:
  groups:
    - groupname: nginx
      gid: 101
  users:
    - username: nginx
      uid: 101
      gid: 101
  run-as: nginx

paths:
  - path: /var/lib/nginx
    type: directory
    uid: 101
    gid: 101
    permissions: 0755
  - path: /var/lib/nginx/tmp
    type: directory
    uid: 101
    gid: 101
    permissions: 0755
  - path: /var/log/nginx
    type: directory
    uid: 101
    gid: 101
    permissions: 0755
  - path: /var/run
    type: directory
    uid: 101
    gid: 101
    permissions: 0755

work-dir: /usr/share/nginx/html

environment:
  PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

annotations:
  org.opencontainers.image.title: "ttyd-session-manager-frontend"
  org.opencontainers.image.description: "Frontend for TTYD Session Manager"
