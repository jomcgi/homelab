replicaCount: 1

image:
  repository: ghcr.io/jomcgi/homelab/charts/ttyd-session-manager/backend
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
  - name: ttyd-session-manager-github-dockerconfig

serviceAccount:
  create: true
  name: ttyd-session-manager

rbac:
  create: true

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

sessionNamespace: ttyd-sessions

onePassword:
  enabled: true
  itemPath: "vaults/k8s-homelab/items/ttyd-session-manager"
  secretName: ttyd-session-manager-github

# Claude Code configuration
claudeCode:
  # Secret containing CLAUDE_CODE_OAUTH_TOKEN
  secretName: ttyd-session-manager-claude
  secretKey: oauth_token

# OpenTelemetry configuration for session pods
opentelemetry:
  enabled: true
  endpoint: "http://signoz-otel-collector.signoz.svc.cluster.local:4317"

# HTTP proxy configuration (optional)
proxy:
  http: ""
  https: ""
  noProxy: ""
