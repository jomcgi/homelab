replicaCount: 1

image:
  repository: ghcr.io/jomcgi/ttyd-session-manager
  pullPolicy: IfNotPresent
  tag: "latest"

serviceAccount:
  create: true
  name: ttyd-session-manager

rbac:
  create: true

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

sessionNamespace: ttyd-sessions

onePassword:
  enabled: true
  itemPath: "vaults/k8s-homelab/items/ttyd-session-manager"
  secretName: ttyd-session-manager-github
