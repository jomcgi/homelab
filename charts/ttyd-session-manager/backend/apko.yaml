contents:
  repositories:
    - https://dl-cdn.alpinelinux.org/alpine/v3.19/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.19/community
  packages:
    - alpine-base
    - ttyd
    - git
    - fish
    - curl
    - wget
    - vim
    - nano
    - bash
    - ca-certificates
    - openssh-client
    - make
    - gcc
    - g++
    - python3
    - py3-pip
    - nodejs
    - npm

archs:
  - x86_64
  - aarch64

cmd: /usr/bin/fish

environment:
  EDITOR: vim
  TERM: xterm-256color
  FISH_GREETING: ""

work-dir: /workspace

paths:
  - path: /workspace
    type: directory
    permissions: 0o755
  - path: /root/.config/fish
    type: directory
    permissions: 0o755
  - path: /root/.config/fish/config.fish
    type: file
    permissions: 0o644
    contents: |
      set -g fish_greeting ""
      set -gx EDITOR vim
      set -gx TERM xterm-256color
