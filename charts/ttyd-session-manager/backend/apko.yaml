contents:
  repositories:
    - https://packages.wolfi.dev/os
    - https://packages.cgr.dev/extras
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    - https://packages.cgr.dev/extras/chainguard-extras.rsa.pub
  packages:
    - git
    - fish
    - curl
    - bash
    - python3
    - py3-pip
    - nodejs
    - npm
    - bazelisk
    - openssh
    # Kubernetes tools
    - kubectl    # Kubernetes CLI (for cluster inspection)
    - helm       # Helm package manager (for chart operations)
    # Code formatters and linters
    - shfmt      # Shell script formatter
    - yamllint   # YAML linter
    # Dev/debugging tools
    - coreutils  # ls, find, cat, head, tail, etc.
    - findutils  # find, xargs
    - grep       # grep
    - ripgrep    # rg (required by opencode for code search)
    - tree       # tree
    - vim        # text editor
    - busybox    # which, and other utilities

archs:
  - x86_64
  - aarch64

cmd: /usr/bin/fish

environment:
  PATH: /usr/local/lib/node_modules/.bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  EDITOR: vim
  TERM: xterm-256color
  FISH_GREETING: ""
  HOME: /home/user

work-dir: /workspace

accounts:
  users:
    - username: user
      uid: 1000
      gid: 1000
  groups:
    - groupname: user
      gid: 1000
  run-as: 1000

paths:
  - path: /workspace
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
  - path: /home/user
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
  - path: /home/user/.config
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
  - path: /home/user/.config/fish
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
  - path: /home/user/.local
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
  - path: /home/user/.local/share
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
  - path: /home/user/.local/share/fish
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
  - path: /home/user/.config/opencode
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
  # Note: Fish config files (setup-bazelrc.fish and bazel.fish) are added via pkg_tar in BUILD file
  # Note: OpenCode config (opencode-config.json) is added via pkg_tar in BUILD file
