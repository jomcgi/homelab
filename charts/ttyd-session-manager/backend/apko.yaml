contents:
  repositories:
    - https://packages.wolfi.dev/os
    - https://packages.cgr.dev/extras
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    - https://packages.cgr.dev/extras/chainguard-extras.rsa.pub
  packages:
    - git
    - fish
    - curl
    - bash
    - python3
    - py3-pip
    - nodejs
    - npm

archs:
  - x86_64
  - aarch64

cmd: /usr/bin/fish

environment:
  EDITOR: vim
  TERM: xterm-256color
  FISH_GREETING: ""

work-dir: /workspace

paths:
  - path: /workspace
    type: directory
    permissions: 0o755
  - path: /root/.config/fish
    type: directory
    permissions: 0o755
