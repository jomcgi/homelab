# tmux configuration for low-latency terminal sessions
# Optimized for ttyd-session-manager

# CRITICAL: Reduce escape time from default 500ms to 20ms
# This eliminates the noticeable delay after Escape key presses
# 20ms is fast enough for escape sequence detection but doesn't impact reliability
set-option -sg escape-time 20

# Reduce status line update interval (reduces CPU overhead)
# Default is 15s, setting to 30s provides good balance
set-option -g status-interval 30

# Increase history limit for better scrollback (doesn't affect latency)
set-option -g history-limit 50000

# Enable mouse support for convenience
set-option -g mouse on

# Use vi key bindings in copy mode
set-window-option -g mode-keys vi
