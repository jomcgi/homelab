{{- if .Values.persistence.data.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "freshrss.fullname" . }}-data
  labels:
    {{- include "freshrss.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
  {{- with .Values.persistence.data.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - {{ .Values.persistence.data.accessMode }}
  {{- if .Values.persistence.data.storageClass }}
  storageClassName: {{ .Values.persistence.data.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.data.size }}
{{- end }}

{{- if .Values.persistence.extensions.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "freshrss.fullname" . }}-extensions
  labels:
    {{- include "freshrss.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
  {{- with .Values.persistence.extensions.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - {{ .Values.persistence.extensions.accessMode }}
  {{- if .Values.persistence.extensions.storageClass }}
  storageClassName: {{ .Values.persistence.extensions.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.extensions.size }}
{{- end }}
