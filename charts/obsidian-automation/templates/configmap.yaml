apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "obsidian-automation.fullname" . }}-scripts
  namespace: {{ include "obsidian-automation.namespace" . }}
  labels:
    {{- include "obsidian-automation.labels" . | nindent 4 }}
    app.kubernetes.io/component: configuration
data:
  {{- if .Values.playwrightAuth.enabled }}
  auth.sh: |
    #!/bin/bash
    set -e
    echo "Starting Playwright authentication..."

    # Check for required credentials (Requirement 1.1)
    if [ -z "$OBSIDIAN_EMAIL" ] || [ -z "$OBSIDIAN_PASSWORD" ]; then
      echo "ERROR: Missing OBSIDIAN_EMAIL or OBSIDIAN_PASSWORD credentials"
      exit 1
    fi

    # Check session file for existing valid session (Requirement 3.1)
    SESSION_FILE="/session/auth.json"
    if [ -f "$SESSION_FILE" ]; then
      echo "Found existing session file, checking validity..."
      SESSION_EXPIRY=$(jq -r '.expiresAt' "$SESSION_FILE" 2>/dev/null || echo "null")
      CURRENT_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

      if [ "$SESSION_EXPIRY" != "null" ] && [ "$SESSION_EXPIRY" != "" ]; then
        # Convert timestamps for comparison
        EXPIRY_TIMESTAMP=$(date -d "$SESSION_EXPIRY" +%s 2>/dev/null || echo "0")
        CURRENT_TIMESTAMP=$(date +%s)

        if [ "$EXPIRY_TIMESTAMP" -gt "$CURRENT_TIMESTAMP" ]; then
          echo "Session still valid, skipping authentication"

          # Still verify REST API is available (Requirement 1.3)
          echo "Verifying REST API plugin availability..."
          MAX_RETRIES=10
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -f -s http://localhost:27124/health >/dev/null 2>&1; then
              echo "REST API plugin verified and responding"
              exit 0
            fi
            echo "Waiting for REST API to be available (attempt $((RETRY_COUNT+1))/$MAX_RETRIES)..."
            sleep 5
            RETRY_COUNT=$((RETRY_COUNT+1))
          done

          # Requirement 1.4: Fail if REST API plugin not available
          echo "ERROR: REST API plugin not available after verification"
          exit 1
        fi
      fi

      echo "Session expired or invalid, proceeding with fresh authentication"
    fi

    # Install required packages
    echo "Installing required packages..."
    apt-get update -qq
    apt-get install -y -qq curl jq

    # Install Node.js and Playwright
    echo "Installing Node.js and Playwright..."
    curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
    apt-get install -y -qq nodejs
    npm install -g playwright@1.40.0

    # Install browser if needed (Requirement 1.3)
    if [ ! -d "/tmp/browsers" ]; then
      echo "Installing Chromium browser..."
      export PLAYWRIGHT_BROWSERS_PATH="/tmp/browsers"
      npx playwright install chromium
    fi

    # Run authentication with retry logic (Requirement 1.1 - retry up to 3 times with exponential backoff)
    MAX_AUTH_RETRIES=3
    AUTH_RETRY_COUNT=0
    BACKOFF_TIME=1

    while [ $AUTH_RETRY_COUNT -lt $MAX_AUTH_RETRIES ]; do
      echo "Authentication attempt $((AUTH_RETRY_COUNT+1))/$MAX_AUTH_RETRIES..."

      # Create Playwright authentication script
      cat > /tmp/auth.js <<'EOF'
    const { chromium } = require('playwright');
    const fs = require('fs').promises;

    (async () => {
      const browser = await chromium.launch({
        headless: true,
        args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
      });
      const context = await browser.newContext({
        viewport: { width: 1280, height: 720 },
        userAgent: 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
      });
      const page = await context.newPage();

      try {
        console.log('Navigating to Obsidian login...');
        await page.goto('https://obsidian.md/account', { waitUntil: 'networkidle' });

        // Handle login form
        console.log('Looking for login form...');
        await page.waitForSelector('input[type="email"], input[name="email"], #email', { timeout: 10000 });

        // Fill credentials
        const emailSelector = await page.$('input[type="email"]') ||
                             await page.$('input[name="email"]') ||
                             await page.$('#email');
        const passwordSelector = await page.$('input[type="password"]') ||
                                await page.$('input[name="password"]') ||
                                await page.$('#password');

        if (!emailSelector || !passwordSelector) {
          throw new Error('Could not find email or password input fields');
        }

        await emailSelector.fill(process.env.OBSIDIAN_EMAIL);
        await passwordSelector.fill(process.env.OBSIDIAN_PASSWORD);

        // Submit form
        console.log('Submitting login form...');
        const submitButton = await page.$('button[type="submit"]') ||
                           await page.$('input[type="submit"]') ||
                           await page.$('button:has-text("Sign in")') ||
                           await page.$('button:has-text("Login")');

        if (submitButton) {
          await submitButton.click();
        } else {
          await page.keyboard.press('Enter');
        }

        // Wait for successful login - look for account dashboard or profile
        console.log('Waiting for successful login...');
        await page.waitForFunction(
          () => window.location.href.includes('/account') ||
                window.location.href.includes('/dashboard') ||
                document.querySelector('[data-testid="user-menu"]') !== null ||
                document.querySelector('.user-profile') !== null,
          { timeout: 30000 }
        );

        console.log('Login successful!');

        // Extract session cookies
        const cookies = await context.cookies();
        const sessionCookies = cookies.filter(cookie =>
          cookie.name.includes('session') ||
          cookie.name.includes('auth') ||
          cookie.name.includes('token') ||
          cookie.domain.includes('obsidian.md')
        );

        const sessionData = {
          authenticated: true,
          timestamp: new Date().toISOString(),
          expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString(), // 24 hours
          syncEnabled: true,
          vaultId: "default",
          cookies: sessionCookies
        };

        // Save session to file (Requirement 3.2)
        await fs.writeFile('/session/auth.json', JSON.stringify(sessionData, null, 2));
        console.log('Session saved successfully');

        // Create a marker file for successful authentication
        await fs.writeFile('/session/.authenticated', new Date().toISOString());
        console.log('Authentication marker created');

      } catch (error) {
        console.error('Authentication failed:', error.message);
        console.error('Current URL:', await page.url());

        // Take screenshot for debugging
        try {
          await page.screenshot({ path: '/tmp/auth-failure.png', fullPage: true });
          console.log('Debug screenshot saved to /tmp/auth-failure.png');
        } catch (screenshotError) {
          console.error('Failed to take screenshot:', screenshotError.message);
        }

        process.exit(1);
      } finally {
        await browser.close();
      }
    })();
    EOF

      # Run authentication script with timeout
      echo "Running Playwright authentication script..."
      timeout 60 node /tmp/auth.js
      AUTH_RESULT=$?

      if [ $AUTH_RESULT -eq 0 ]; then
        echo "Authentication successful!"

        # Verify REST API plugin is available (Requirement 1.3)
        echo "Verifying REST API plugin availability..."
        API_RETRY_COUNT=0
        API_MAX_RETRIES=20

        while [ $API_RETRY_COUNT -lt $API_MAX_RETRIES ]; do
          # Check if Obsidian is running and REST API is responding
          if curl -f -s http://localhost:27124/health >/dev/null 2>&1; then
            echo "REST API plugin verified and responding"
            exit 0
          fi

          # Also check for the authentication marker
          if [ -f "/session/.authenticated" ]; then
            echo "Authentication completed, REST API should be available soon..."
          fi

          echo "Waiting for REST API plugin (attempt $((API_RETRY_COUNT+1))/$API_MAX_RETRIES)..."
          sleep 5
          API_RETRY_COUNT=$((API_RETRY_COUNT+1))
        done

        # Requirement 1.4: Fail if REST API plugin not available after sync
        echo "ERROR: REST API plugin not available after authentication"
        echo "This might indicate that Obsidian sync has not completed or the REST API plugin is not installed"
        exit 1

      elif [ $AUTH_RESULT -eq 124 ]; then
        echo "Authentication timed out after 60 seconds"
        AUTH_RETRY_COUNT=$((AUTH_RETRY_COUNT+1))
      else
        echo "Authentication script failed with exit code: $AUTH_RESULT"
        AUTH_RETRY_COUNT=$((AUTH_RETRY_COUNT+1))
      fi

      # Exponential backoff before retry
      if [ $AUTH_RETRY_COUNT -lt $MAX_AUTH_RETRIES ]; then
        echo "Retrying authentication in ${BACKOFF_TIME}s..."
        sleep $BACKOFF_TIME
        BACKOFF_TIME=$((BACKOFF_TIME * 2))  # Exponential backoff: 1s, 2s, 4s
      fi
    done

    # If we get here, all authentication attempts failed
    echo "ERROR: Authentication failed after $MAX_AUTH_RETRIES attempts"
    echo "Check credentials and network connectivity"

    # Clean up any partial session data
    rm -f /session/auth.json /session/.authenticated

    exit 1
  {{- end }}

  sync-monitor.sh: |
{{ .Values.syncMonitor.script | indent 4 }}