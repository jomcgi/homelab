{{- if .Values.sessionMaintenance.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "obsidian-automation.fullname" . }}-session-maintenance
  namespace: {{ include "obsidian-automation.namespace" . }}
  labels:
    {{- include "obsidian-automation.labels" . | nindent 4 }}
    app.kubernetes.io/component: session-maintenance
  annotations:
    {{- with .Values.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  schedule: "0 */6 * * *"  # Run every 6 hours (Requirements 4.1)
  concurrencyPolicy: Forbid  # Prevent concurrent runs
  successfulJobsHistoryLimit: {{ .Values.sessionMaintenance.successfulJobsHistoryLimit | default 3 }}
  failedJobsHistoryLimit: {{ .Values.sessionMaintenance.failedJobsHistoryLimit | default 1 }}
  startingDeadlineSeconds: {{ .Values.sessionMaintenance.startingDeadlineSeconds | default 300 }}
  jobTemplate:
    metadata:
      labels:
        {{- include "obsidian-automation.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: session-maintenance
    spec:
      template:
        metadata:
          labels:
            {{- include "obsidian-automation.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: session-maintenance
        spec:
          serviceAccountName: {{ include "obsidian-automation.serviceAccountName" . }}
          {{- with .Values.podSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          restartPolicy: Never
          containers:
          - name: session-checker
            image: "{{ .Values.images.sessionMaintenance.repository }}:{{ .Values.images.sessionMaintenance.tag }}"
            imagePullPolicy: {{ .Values.images.sessionMaintenance.pullPolicy }}
            command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "Session Maintenance CronJob started at $(date)"

              # Install curl if not available (bitnami/kubectl might not have it)
              if ! command -v curl >/dev/null 2>&1; then
                echo "Installing curl..."
                apt-get update -qq && apt-get install -y curl || apk add --no-cache curl || echo "Warning: Could not install curl"
              fi

              echo "Checking Obsidian REST API health endpoint..."

              # Define the service endpoint for the REST API check (Requirement 4.1)
              SERVICE_NAME="{{ include "obsidian-automation.fullname" . }}"
              NAMESPACE="{{ include "obsidian-automation.namespace" . }}"
              API_ENDPOINT="http://${SERVICE_NAME}.${NAMESPACE}.svc.cluster.local:{{ .Values.service.ports.api.port }}"

              # Check if REST API is responsive (Requirement 4.1)
              echo "Testing API endpoint: $API_ENDPOINT/health"
              TIMEOUT_SECONDS="${CURL_TIMEOUT:-10}"

              if curl -f -s -m "$TIMEOUT_SECONDS" "$API_ENDPOINT/health" >/dev/null 2>&1; then
                echo "✓ REST API is responsive - session is healthy"
                echo "No action needed"
                exit 0
              else
                echo "✗ REST API is not responsive - authentication may be needed"
                echo "Triggering re-authentication by deleting the StatefulSet pod..."

                # Delete the StatefulSet pod to trigger re-authentication (Requirement 4.2)
                # The StatefulSet will automatically recreate the pod with initContainer authentication
                POD_NAME="${SERVICE_NAME}-0"

                echo "Attempting to delete pod: $POD_NAME in namespace: $NAMESPACE"
                if kubectl delete pod "$POD_NAME" --namespace="$NAMESPACE" --ignore-not-found=true --timeout=30s; then
                  echo "✓ Successfully deleted pod $POD_NAME"
                  echo "StatefulSet will recreate pod and run authentication process"
                  echo "Session maintenance completed successfully"
                else
                  echo "✗ Failed to delete pod $POD_NAME"
                  echo "This may indicate RBAC permission issues or the pod doesn't exist"
                  exit 1
                fi
              fi
            env:
            - name: CURL_TIMEOUT
              value: {{ .Values.sessionMaintenance.apiTimeout | default "10" | quote }}
            securityContext:
              {{- toYaml .Values.securityContext | nindent 14 }}
            resources:
              {{- toYaml .Values.sessionMaintenance.resources | nindent 14 }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}