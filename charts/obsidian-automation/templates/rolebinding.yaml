{{- if .Values.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "obsidian-automation.fullname" . }}-session-maintenance
  namespace: {{ include "obsidian-automation.namespace" . }}
  labels:
    {{- include "obsidian-automation.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "obsidian-automation.fullname" . }}-session-maintenance
subjects:
- kind: ServiceAccount
  name: {{ include "obsidian-automation.serviceAccountName" . }}
  namespace: {{ include "obsidian-automation.namespace" . }}
{{- end }}