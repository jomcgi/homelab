apiVersion: v1
kind: Service
metadata:
  name: {{ include "obsidian-automation.fullname" . }}
  namespace: {{ include "obsidian-automation.namespace" . }}
  labels:
    {{- include "obsidian-automation.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- if .Values.service.clusterIP }}
  clusterIP: {{ .Values.service.clusterIP }}
  {{- end }}
  ports:
    # REST API port (Requirement 2.1)
    - port: {{ .Values.service.ports.api.port }}
      targetPort: {{ .Values.service.ports.api.targetPort }}
      protocol: {{ .Values.service.ports.api.protocol }}
      name: api
    # Web UI port (optional debugging)
    - port: {{ .Values.service.ports.web.port }}
      targetPort: {{ .Values.service.ports.web.targetPort }}
      protocol: {{ .Values.service.ports.web.protocol }}
      name: web
    # Prometheus metrics port (from sync-monitor sidecar)
    - port: {{ .Values.service.ports.metrics.port }}
      targetPort: {{ .Values.service.ports.metrics.targetPort }}
      protocol: {{ .Values.service.ports.metrics.protocol }}
      name: metrics
  selector:
    {{- include "obsidian-automation.selectorLabels" . | nindent 4 }}