{{- if eq .Values.secrets.type "onepassword" }}
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ include "obsidian-automation.secretName" . }}
  namespace: {{ include "obsidian-automation.namespace" . }}
  labels:
    {{- include "obsidian-automation.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  itemPath: {{ required "OnePassword itemPath is required when using onepassword secret type" .Values.secrets.onepassword.itemPath | quote }}
  {{- if .Values.secrets.onepassword.vaultId }}
  # Optional: Specify vault ID if not included in itemPath
  # Format: "vaults/{vault-id}/items/{item-name}"
  {{- end }}
{{- else if eq .Values.secrets.type "manual" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "obsidian-automation.secretName" . }}
  namespace: {{ include "obsidian-automation.namespace" . }}
  labels:
    {{- include "obsidian-automation.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{- if .Values.secrets.manual.data }}
  {{- range $key, $value := .Values.secrets.manual.data }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
  {{- else }}
  # Default secret keys for obsidian-automation
  # These should be provided via values or overlay configuration
  obsidian-email: ""      # Base64 encoded Obsidian Sync email
  obsidian-password: ""   # Base64 encoded Obsidian Sync password
  rest-api-key: ""        # Base64 encoded REST API authentication key
  {{- end }}
{{- end }}
{{- /*
For external secrets type, no resource is created - user must provide existing secret
The secret should contain the following keys:
- obsidian-email: Obsidian Sync authentication email
- obsidian-password: Obsidian Sync authentication password
- rest-api-key: REST API authentication key for securing service endpoints

Expected secret structure when using OnePassword:
The OnePassword item should contain fields with these exact names:
- obsidian-email: Obsidian Sync account email
- obsidian-password: Obsidian Sync account password
- rest-api-key: Generated API key for REST endpoint security

These credentials will be mounted as environment variables in containers
per requirements 7.1 and 7.2 for secure credential management.
*/ -}}