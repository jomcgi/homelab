# Global configuration
replicaCount: 1
overlayName: ""  # Should be set by overlay (e.g., homelab, prod)

# Common image configuration
imageRegistry: docker.io
imagePullPolicy: IfNotPresent

# Container images configuration
images:
  obsidian:
    repository: linuxserver/obsidian
    tag: "1.7.7"
    pullPolicy: IfNotPresent
  playwright:
    repository: mcr.microsoft.com/playwright
    tag: "v1.40.0-jammy"
    pullPolicy: IfNotPresent
  syncMonitor:
    repository: curlimages/curl
    tag: "8.5.0"
    pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: "obsidian-automation"

# Service configuration
service:
  type: ClusterIP
  # Support for headless service (useful for StatefulSets)
  clusterIP: ""
  annotations: {}
  # Multiple ports for different services
  ports:
    # REST API port (Requirement 2.1)
    api:
      port: 27124
      targetPort: 27124
      protocol: TCP
    # Web UI port (optional debugging)
    web:
      port: 3001
      targetPort: 3001
      protocol: TCP
    # Prometheus metrics port (from sync-monitor sidecar)
    metrics:
      port: 8080
      targetPort: 8080
      protocol: TCP

# Ingress configuration
ingress:
  enabled: false

# Security configuration - following homelab standards
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Main Obsidian container configuration
obsidian:
  enabled: true

  # Environment variables
  env:
    PUID: "1000"
    PGID: "1000"
    TZ: "America/New_York"
    CUSTOM_PORT: "8080"
    SUBFOLDER: "/"
    KEYBOARD: "en-us-qwerty"
    TITLE: "Obsidian Automation"

  # Resource limits per requirement 9.1
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 512Mi

  # Volume mounts for write access per requirement 8.2
  volumeMounts:
    - name: vaults
      mountPath: /vaults
      readOnly: false
    - name: config
      mountPath: /config
      readOnly: false
    - name: session
      mountPath: /config/.config/obsidian
      readOnly: false
    - name: tmp
      mountPath: /tmp
      readOnly: false

  # Health checks - pointing to sync monitor sidecar
  # Requirement 5.4: Readiness probe marks pod not ready after 3 consecutive failures
  livenessProbe:
    httpGet:
      path: /health
      port: 8081  # Sync monitor health port
    initialDelaySeconds: 180  # Allow time for authentication and sync setup
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /ready
      port: 8081  # Sync monitor health port
    initialDelaySeconds: 120  # Allow time for authentication
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3  # Requirement 5.4: Mark not ready after 3 failures

# Playwright authentication init container
playwrightAuth:
  enabled: true

  # Resource limits
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

  # Environment variables
  env:
    PLAYWRIGHT_BROWSERS_PATH: "/tmp/browsers"

  # Volume mounts
  volumeMounts:
    - name: session
      mountPath: /session
      readOnly: false
    - name: tmp
      mountPath: /tmp
      readOnly: false

  # Script for authentication
  script: |
    #!/bin/bash
    set -e
    echo "Starting Playwright authentication..."

    # Check for required credentials (Requirement 1.1)
    if [ -z "$OBSIDIAN_EMAIL" ] || [ -z "$OBSIDIAN_PASSWORD" ]; then
      echo "ERROR: Missing OBSIDIAN_EMAIL or OBSIDIAN_PASSWORD credentials"
      exit 1
    fi

    # Check session file for existing valid session
    SESSION_FILE="/session/auth.json"
    if [ -f "$SESSION_FILE" ]; then
      echo "Found existing session file, checking validity..."
      SESSION_EXPIRY=$(jq -r '.expiresAt' "$SESSION_FILE" 2>/dev/null || echo "0")
      CURRENT_TIME=$(date +%s)
      EXPIRY_TIME=$(date -d "$SESSION_EXPIRY" +%s 2>/dev/null || echo "0")

      if [ "$EXPIRY_TIME" -gt "$CURRENT_TIME" ]; then
        echo "Session still valid, skipping authentication"

        # Still verify REST API is available (Requirement 1.3)
        echo "Verifying REST API plugin availability..."
        MAX_RETRIES=10
        RETRY_COUNT=0
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          if curl -f -s http://localhost:27124/health >/dev/null 2>&1; then
            echo "REST API plugin verified and responding"
            exit 0
          fi
          echo "Waiting for REST API to be available (attempt $((RETRY_COUNT+1))/$MAX_RETRIES)..."
          sleep 5
          RETRY_COUNT=$((RETRY_COUNT+1))
        done

        # Requirement 1.4: Fail if REST API plugin not available
        echo "ERROR: REST API plugin not available after verification"
        exit 1
      fi
    fi

    # Install browser if needed
    if [ ! -d "/tmp/browsers" ]; then
      echo "Installing Chromium browser..."
      npx playwright install chromium
    fi

    # Run authentication with retry logic (Requirement 1.1 - retry up to 3 times)
    MAX_AUTH_RETRIES=3
    AUTH_RETRY_COUNT=0
    BACKOFF_TIME=1

    while [ $AUTH_RETRY_COUNT -lt $MAX_AUTH_RETRIES ]; do
      echo "Authentication attempt $((AUTH_RETRY_COUNT+1))/$MAX_AUTH_RETRIES..."

      # Create Playwright authentication script
      cat > /tmp/auth.js <<'EOF'
      const { chromium } = require('playwright');
      const fs = require('fs').promises;

      (async () => {
        const browser = await chromium.launch({ headless: true });
        const context = await browser.newContext();
        const page = await context.newPage();

        try {
          console.log('Navigating to Obsidian login...');
          await page.goto('https://obsidian.md/login');

          // Login with credentials
          await page.fill('input[type="email"]', process.env.OBSIDIAN_EMAIL);
          await page.fill('input[type="password"]', process.env.OBSIDIAN_PASSWORD);
          await page.click('button[type="submit"]');

          // Wait for successful login
          await page.waitForURL('**/vault/**', { timeout: 30000 });
          console.log('Login successful!');

          // Extract session data
          const cookies = await context.cookies();
          const sessionData = {
            authenticated: true,
            timestamp: new Date().toISOString(),
            expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString(),
            syncEnabled: true,
            cookies: cookies
          };

          // Save session to file
          await fs.writeFile('/session/auth.json', JSON.stringify(sessionData, null, 2));
          console.log('Session saved successfully');

        } catch (error) {
          console.error('Authentication failed:', error.message);
          process.exit(1);
        } finally {
          await browser.close();
        }
      })();
    EOF

      # Run authentication script
      if node /tmp/auth.js; then
        echo "Authentication successful!"

        # Verify REST API plugin is available (Requirement 1.3)
        echo "Verifying REST API plugin availability..."
        API_RETRY_COUNT=0
        API_MAX_RETRIES=20

        while [ $API_RETRY_COUNT -lt $API_MAX_RETRIES ]; do
          if curl -f -s http://localhost:27124/health >/dev/null 2>&1; then
            echo "REST API plugin verified and responding"
            exit 0
          fi
          echo "Waiting for REST API plugin (attempt $((API_RETRY_COUNT+1))/$API_MAX_RETRIES)..."
          sleep 5
          API_RETRY_COUNT=$((API_RETRY_COUNT+1))
        done

        # Requirement 1.4: Fail if REST API plugin not available
        echo "ERROR: REST API plugin not available after sync"
        exit 1
      else
        AUTH_RETRY_COUNT=$((AUTH_RETRY_COUNT+1))
        if [ $AUTH_RETRY_COUNT -lt $MAX_AUTH_RETRIES ]; then
          echo "Authentication failed, retrying in ${BACKOFF_TIME}s..."
          sleep $BACKOFF_TIME
          BACKOFF_TIME=$((BACKOFF_TIME * 2))  # Exponential backoff
        fi
      fi
    done

    echo "ERROR: Authentication failed after $MAX_AUTH_RETRIES attempts"
    exit 1

# Sync monitor sidecar container
syncMonitor:
  enabled: true

  # Resource limits
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 32Mi

  # Monitoring interval in seconds
  interval: 60

  # Volume mounts
  volumeMounts:
    - name: vaults
      mountPath: /vaults
      readOnly: true
    - name: session
      mountPath: /session
      readOnly: true
    - name: tmp
      mountPath: /tmp
      readOnly: false

  # Monitoring script
  script: |
    #!/bin/bash
    set -e

    # Initialize metrics
    echo "sync_monitor_started $(date +%s)" > /tmp/metrics.prom

    while true; do
      echo "Checking sync status at $(date)"

      # Check vault synchronization status
      if [ -d "/vaults" ]; then
        vault_count=$(find /vaults -name "*.md" -type f | wc -l)
        echo "obsidian_vault_files_total $vault_count" > /tmp/metrics.prom
      fi

      # Check session validity
      if [ -f "/session/session.json" ]; then
        echo "obsidian_session_valid 1" >> /tmp/metrics.prom
      else
        echo "obsidian_session_valid 0" >> /tmp/metrics.prom
      fi

      echo "obsidian_sync_check_timestamp $(date +%s)" >> /tmp/metrics.prom

      sleep {{ .Values.syncMonitor.interval }}
    done

# Session checker CronJob
sessionChecker:
  enabled: true

  # CronJob schedule - check every hour
  schedule: "0 * * * *"

  # Resource limits
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

  # Volume mounts
  volumeMounts:
    - name: session
      mountPath: /session
      readOnly: false
    - name: tmp
      mountPath: /tmp
      readOnly: false

  # Session validation script
  script: |
    #!/bin/bash
    set -e

    echo "Starting session validation at $(date)"

    # Check if session file exists and is valid
    if [ -f "/session/session.json" ]; then
      # Parse session timestamp (implementation depends on session format)
      echo "Session file found, validating..."

      # If session is expired or invalid, trigger re-authentication
      # This logic will be refined during template implementation
      echo "Session validation completed"
    else
      echo "No session file found, authentication may be needed"
    fi

    echo "Session check completed at $(date)"

# Persistent volume configuration per requirement 9.5
persistence:
  # Vault storage - 10Gi as per requirement 9.5
  vaults:
    enabled: true
    storageClass: "longhorn"
    accessMode: ReadWriteOnce
    size: 10Gi
    mountPath: /vaults
    annotations: {}

  # Configuration storage - 1Gi as per requirement 9.5
  config:
    enabled: true
    storageClass: "longhorn"
    accessMode: ReadWriteOnce
    size: 1Gi
    mountPath: /config
    annotations: {}

  # Session storage - 1Gi as per requirement 9.5
  session:
    enabled: true
    storageClass: "longhorn"
    accessMode: ReadWriteOnce
    size: 1Gi
    mountPath: /config/.config/obsidian
    annotations: {}

# Temporary volumes (emptyDir)
tmpVolumes:
  tmp:
    enabled: true
    sizeLimit: 500Mi
    mountPath: /tmp

# Secret management via 1Password operator
secrets:
  # Options: onepassword, manual, external
  type: onepassword

  # OnePassword operator integration
  onepassword:
    vaultId: ""  # To be set in overlay
    itemPath: "obsidian-automation/credentials"
    secretName: "obsidian-automation-secrets"

  # Manual secret creation (for testing/development)
  manual:
    secretName: "obsidian-automation-secrets"
    data: {}

# Service Account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 0
  maxUnavailable: 1

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Node selection
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}

# Namespace configuration
namespace:
  create: false
  name: "default"

# Observability configuration
observability:
  # Prometheus metrics
  metrics:
    enabled: true
    port: 8080
    path: /metrics
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
      prometheus.io/path: "/metrics"

  # Logging configuration
  logging:
    level: info
    format: json

  # Tracing (if needed for user-facing services)
  tracing:
    enabled: false
    jaegerEndpoint: ""

# Additional labels to apply to all resources
labels: {}

# Additional annotations to apply to all resources
annotations: {}

# Environment-specific overrides (will be set in overlays)
environment: {}

# Network policies (if microsegmentation needed)
networkPolicy:
  enabled: false
  labels: {}
  annotations: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from Cloudflare Tunnel namespace and within same namespace
    - from:
        # Allow from Cloudflare Tunnel (ingress namespace)
        - namespaceSelector:
            matchLabels:
              name: ingress
        # Allow communication within the same namespace
        - podSelector: {}
      ports:
        # REST API port (Requirement 2.1)
        - protocol: TCP
          port: 27124
        # Prometheus metrics port (from sync-monitor sidecar)
        - protocol: TCP
          port: 8080
        # Web UI port (optional, for debugging)
        - protocol: TCP
          port: 3001
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
        - namespaceSelector:
            matchLabels:
              name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS traffic to Obsidian Sync and external services
    - to: []  # Allow to any external destination
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
    # Allow access to 1Password operator
    - to:
        - namespaceSelector:
            matchLabels:
              name: onepassword
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8080
    # Allow access to Longhorn storage system
    - to:
        - namespaceSelector:
            matchLabels:
              name: longhorn-system
      ports:
        - protocol: TCP
          port: 9500
        - protocol: TCP
          port: 9501
        - protocol: TCP
          port: 9502
    # Allow communication within the same namespace
    - to:
        - podSelector: {}