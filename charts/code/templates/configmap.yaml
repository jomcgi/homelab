apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "code.fullname" . }}-init
  labels:
    {{- include "code.labels" . | nindent 4 }}
data:
  init.sh: |
    #!/bin/bash
    set -e

    echo "Initializing Claude Workspace..."

    # npm global directory on PVC (persists across restarts)
    export NPM_CONFIG_PREFIX="$HOME/.npm-global"
    export PATH="$NPM_CONFIG_PREFIX/bin:$PATH"
    mkdir -p "$NPM_CONFIG_PREFIX"

    # Add npm-global to PATH for fish shell
    mkdir -p "$HOME/.config/fish"
    if ! grep -q "npm-global" "$HOME/.config/fish/config.fish" 2>/dev/null; then
      echo 'set -gx PATH $HOME/.npm-global/bin $PATH' >> "$HOME/.config/fish/config.fish"
    fi

    # Install Claude Code if not already present
    if ! command -v claude &> /dev/null; then
        echo "Installing Claude Code..."
        npm install -g @anthropic-ai/claude-code
    else
        echo "Claude Code already installed"
    fi

    # Install cui-server if not already present
    if ! command -v cui-server &> /dev/null; then
        echo "Installing cui-server..."
        npm install -g cui-server
    else
        echo "cui-server already installed"
    fi

    # Configure cui-server
    # Note: authToken is required by cui-server, can't be disabled
    # nginx sidecar handles redirect to add token automatically
    mkdir -p ~/.cui
    cat > ~/.cui/config.json << EOF
    {
      "machine_id": "claude-workspace",
      "authToken": "{{ .Values.cui.authToken }}",
      "server": {
        "host": "0.0.0.0",
        "port": {{ .Values.cui.port }}
      },
      "interface": {
        "colorScheme": "dark",
        "notifications": {
          "enabled": false
        }
      },
      "gemini": {
        "apiKey": "${GEMINI_API_KEY}",
        "model": "gemini-2.0-flash"
      }
    }
    EOF

    # Git configuration
    git config --global user.name "${GIT_USER_NAME}"
    git config --global user.email "${GIT_USER_EMAIL}"
    git config --global credential.helper store
    git config --global init.defaultBranch main
    git config --global safe.directory '*'

    # Git credentials - use URL rewrite instead of credentials file to avoid permission issues
    # This rewrites https://github.com/ URLs to include the token automatically
    git config --global url."https://oauth2:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

    # opencode configuration (vLLM + Gemini only, NO Claude)
    mkdir -p ~/.config/opencode
    cat > ~/.config/opencode/config.json << EOF
    {
      "providers": {
        "gemini": {
          "apiKey": "${GEMINI_API_KEY:-}",
          "models": {{ .Values.gemini.models | toJson }}
        },
        "vllm": {
          "baseUrl": "{{ .Values.vllm.endpoint }}",
          "apiKey": "not-needed",
          "models": ["{{ .Values.vllm.model }}"]
        }
      },
      "defaults": {
        "provider": "vllm",
        "model": "{{ .Values.vllm.model }}"
      },
      "theme": "dark"
    }
    EOF

    # Claude Code directories
    mkdir -p ~/.claude
    mkdir -p ~/repos

    # Wait for git-sync sidecar to clone the homelab repo
    echo "Waiting for homelab repo (from git-sync sidecar)..."
    while [ ! -d "$HOME/repos/homelab/.git" ]; do
        sleep 2
    done
    echo "Homelab repo available"

    # Create homelab-worktree helper script for multi-agent workflows
    cat > "$NPM_CONFIG_PREFIX/bin/homelab-worktree" << 'SCRIPT'
    #!/bin/bash
    # Create a git worktree for the homelab repo in /tmp/
    # Usage: homelab-worktree <branch-name>
    #   Creates /tmp/homelab-<branch-name> with a new branch from origin/main
    #
    # Note: The main repo is read-only (owned by git-sync sidecar).
    # Worktrees are created in /tmp/ with full write access.

    set -e
    HOMELAB_DIR="$HOME/repos/homelab"

    if [ -z "$1" ]; then
        echo "Usage: homelab-worktree <branch-name>"
        echo "Creates a worktree at /tmp/homelab-<branch-name>"
        echo ""
        echo "Examples:"
        echo "  homelab-worktree fix/update-nginx"
        echo "  homelab-worktree feat/add-service"
        echo ""
        echo "Current worktrees:"
        git -C "$HOMELAB_DIR" worktree list 2>/dev/null || echo "  (none)"
        exit 1
    fi

    BRANCH="$1"
    WORKTREE_DIR="/tmp/homelab-${BRANCH//\//-}"

    # Check if worktree already exists
    if [ -d "$WORKTREE_DIR" ]; then
        echo "Worktree already exists: $WORKTREE_DIR"
        echo "To remove it: rm -rf $WORKTREE_DIR && git -C $HOMELAB_DIR worktree prune"
        exit 1
    fi

    # Create worktree with new branch from origin/main
    # (git-sync sidecar keeps origin/main up to date)
    git -C "$HOMELAB_DIR" worktree add -b "$BRANCH" "$WORKTREE_DIR" origin/main

    # Set up git config in the worktree for pushing
    cd "$WORKTREE_DIR"
    git config user.name "${GIT_USER_NAME:-Claude}"
    git config user.email "${GIT_USER_EMAIL:-claude@jomcgi.dev}"

    echo ""
    echo "Created worktree: $WORKTREE_DIR"
    echo "Branch: $BRANCH (from origin/main)"
    echo ""
    echo "Next steps:"
    echo "  cd $WORKTREE_DIR"
    echo "  # make changes..."
    echo "  git add . && git commit -m 'description'"
    echo "  git push -u origin $BRANCH"
    SCRIPT
    chmod +x "$NPM_CONFIG_PREFIX/bin/homelab-worktree"

    # Check Claude auth status
    echo ""
    if claude /doctor 2>&1 | grep -q "Not authenticated"; then
        echo "Claude Code not authenticated"
        echo "Run: kubectl exec -it deploy/{{ include "code.fullname" . }} -n {{ .Release.Namespace }} -- claude /login"
    else
        echo "Claude Code authenticated"
    fi

    echo "Workspace ready!"

    # Start cui-server (config already set in ~/.cui/config.json)
    exec cui-server

  nginx.conf: |
    worker_processes 1;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        access_log /dev/stdout;
        client_body_temp_path /tmp/client_body;
        proxy_temp_path /tmp/proxy;
        fastcgi_temp_path /tmp/fastcgi;
        uwsgi_temp_path /tmp/uwsgi;
        scgi_temp_path /tmp/scgi;

        map $cookie_cui_auth $redirect_to_token {
            "{{ .Values.cui.authToken }}" 0;
            default 1;
        }

        server {
            listen {{ .Values.proxy.port }};
            default_type text/html;

            # First request (no cookie or wrong token) - serve redirect page
            if ($redirect_to_token) {
                return 200 '<!DOCTYPE html><html><head><script>document.cookie="cui_auth={{ .Values.cui.authToken }};path=/;max-age=31536000";location.hash="token={{ .Values.cui.authToken }}";location.reload();</script></head><body>Redirecting...</body></html>';
            }

            # Subsequent requests (has cookie) - proxy to cui
            location / {
                proxy_pass http://127.0.0.1:{{ .Values.cui.port }};
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 86400;
                proxy_send_timeout 86400;
            }
        }
    }

  git-sync.sh: |
    #!/bin/bash
    # Git sync sidecar - runs as root, syncs homelab repo every 5 minutes
    # Files owned by root are read-only to the main container (uid 1000)
    set -e

    HOMELAB_DIR="/home/user/repos/homelab"
    SYNC_INTERVAL=300  # 5 minutes

    # Ensure repos directory exists with correct permissions
    mkdir -p /home/user/repos
    chown 1000:1000 /home/user/repos

    # Git configuration for root user
    git config --global user.name "git-sync"
    git config --global user.email "git-sync@localhost"
    git config --global safe.directory '*'

    # Set up credentials
    echo "https://oauth2:${GITHUB_TOKEN}@github.com" > /root/.git-credentials
    git config --global credential.helper store

    # Initial clone or sync
    if [ ! -d "$HOMELAB_DIR" ]; then
        echo "Cloning homelab repository..."
        git clone https://github.com/jomcgi/homelab.git "$HOMELAB_DIR"
    else
        echo "Syncing existing homelab repository..."
        cd "$HOMELAB_DIR"
        git fetch origin main
        git checkout main
        git reset --hard origin/main
    fi

    echo "Git sync sidecar running (interval: ${SYNC_INTERVAL}s)"

    # Sync loop
    while true; do
        sleep $SYNC_INTERVAL
        if [ -d "$HOMELAB_DIR" ]; then
            cd "$HOMELAB_DIR"
            git fetch origin main 2>/dev/null
            git reset --hard origin/main 2>/dev/null
            git worktree prune 2>/dev/null  # Clean up stale worktree references
            echo "[$(date)] Synced homelab repo to origin/main"
        fi
    done
