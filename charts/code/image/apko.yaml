contents:
  repositories:
    - https://packages.wolfi.dev/os
    - https://packages.cgr.dev/extras
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    - https://packages.cgr.dev/extras/chainguard-extras.rsa.pub
  packages:
    # Core tools
    - git
    - fish
    - curl
    - bash
    - openssh
    # Node.js for Claude Code and cui-server
    - nodejs-22
    - npm
    # Kubernetes tools (read-only cluster access)
    - kubectl
    - helm
    # Dev tools required by Claude Code
    - ripgrep    # Required for code search
    - coreutils  # ls, cat, head, tail, etc.
    - findutils  # find, xargs
    - grep
    - vim
    - busybox    # which, etc.
    # Python for scripts
    - python3
    - py3-pip

archs:
  - x86_64
  - aarch64

cmd: /usr/bin/fish

environment:
  PATH: /home/user/.npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  EDITOR: vim
  TERM: xterm-256color
  FISH_GREETING: ""
  HOME: /home/user

work-dir: /home/user

accounts:
  users:
    - username: user
      uid: 1000
      gid: 1000
  groups:
    - groupname: user
      gid: 1000
  run-as: 1000

paths:
  - path: /home/user
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
  - path: /home/user/.config
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
  - path: /home/user/.config/fish
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
  - path: /home/user/.config/opencode
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
  - path: /home/user/.local
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
  - path: /home/user/.npm-global
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
  - path: /home/user/.claude
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
  - path: /home/user/.cui
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
  - path: /home/user/repos
    type: directory
    uid: 1000
    gid: 1000
    permissions: 0o755
