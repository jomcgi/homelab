# Marine Services Chart
# Combined AIS ingestion and Ships API services

# Shared settings
nameOverride: ""
fullnameOverride: ""

# ArgoCD Image Updater (automatic digest-based image updates)
imageUpdater:
  enabled: false
  images: []
  writeBack:
    method: ""
    repository: ""
    branch: main
    target: ""

# Image pull secrets (shared by all components)
imagePullSecrets: []

# Image pull secret configuration (OnePassword)
imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

# Secret configuration for AISStream API key
secret:
  type: onepassword
  onepassword:
    itemPath: "vaults/k8s-homelab/items/marine"
  manual:
    apiKey: ""

# Service account (shared)
serviceAccount:
  create: true
  annotations: {}
  name: ""

# NATS configuration (shared)
nats:
  url: nats://nats.nats.svc.cluster.local:4222

# AISStream configuration (for ingest)
aisstream:
  url: wss://stream.aisstream.io/v0/stream
  # Americas coverage - Pacific to Atlantic, equator to Arctic
  # Format: [[[lat_min, lon_min], [lat_max, lon_max]]]
  # South: -2.5, West: -173, North: 71.4, East: -32
  boundingBox: "[[[-2.455379, -173.009262], [71.414709, -32.0327]]]"

# Pod security context (shared)
# Known limitation: runs as root because aspect_rules_py venv writes
# to the installation directory at runtime
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

# Container security context (shared)
securityContext:
  # Note: readOnlyRootFilesystem disabled because aspect_rules_py
  # creates a virtualenv at runtime (by design)
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

# =============================================================================
# AIS Ingest Component
# Streams vessel position reports from AISStream.io to NATS
# =============================================================================
ingest:
  enabled: true

  image:
    repository: ghcr.io/jomcgi/homelab/services/ais_ingest
    tag: "main"
    digest: "" # Set by ImageUpdater (e.g., sha256:abc123...)
    pullPolicy: IfNotPresent

  # Single replica - no need for HA for data ingestion
  replicas: 1

  # Service configuration for health endpoint
  service:
    type: ClusterIP
    port: 8000

  # Resource limits
  # Increased for global AIS coverage (~300 msg/sec)
  resources:
    requests:
      cpu: 20m
      memory: 100Mi
    limits:
      cpu: 20m
      memory: 100Mi

  # Pod annotations
  podAnnotations: {}

# =============================================================================
# Ships API Component
# REST API + WebSocket for real-time vessel data
# =============================================================================
api:
  enabled: true

  image:
    repository: ghcr.io/jomcgi/homelab/services/ships_api
    tag: "main"
    digest: "" # Set by ImageUpdater (e.g., sha256:abc123...)
    pullPolicy: IfNotPresent

  # Single replica required for SQLite (single-writer lock)
  replicas: 1

  # Persistent storage for SQLite database
  persistence:
    enabled: true
    size: 20Gi
    storageClassName: longhorn
    # Path where the database is stored
    mountPath: /data

  # Service configuration
  service:
    type: ClusterIP
    port: 8000

  # CORS configuration
  cors:
    origins: "http://localhost:3000"

  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 900Mi
    limits:
      cpu: 100m
      memory: 900Mi

  # Liveness probe - checks if container should be restarted
  # During catchup, the API may be unresponsive; increase tolerance
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 6

  # Readiness probe - checks if container can receive traffic
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 360

  # Pod annotations
  podAnnotations: {}

# =============================================================================
# Frontend Component
# Bun-based server serving MapLibre UI + proxying to API
# =============================================================================
frontend:
  enabled: true

  image:
    repository: ghcr.io/jomcgi/homelab/services/ships_frontend
    tag: "main"
    digest: "" # Set by ImageUpdater (e.g., sha256:abc123...)
    pullPolicy: IfNotPresent

  # Single replica
  replicas: 1

  # Directory containing built frontend assets
  publicDir: /app/public/projects/websites/ships.jomcgi.dev/dist

  # Service configuration
  service:
    type: ClusterIP
    port: 80

  # Resource limits
  # Note: Low memory since build happens during CI, not at runtime
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
    limits:
      cpu: 10m
      memory: 100Mi

  # Pod annotations
  podAnnotations: {}
