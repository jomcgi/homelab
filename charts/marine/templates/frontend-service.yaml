{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "marine.fullname" . }}-frontend
  labels:
    {{- include "marine.frontend.labels" . | nindent 4 }}
  annotations:
    # Cloudflare operator annotations
    cloudflare.ingress.hostname: {{ .Values.frontend.hostname }}
    {{- if .Values.frontend.zeroTrust.enabled }}
    cloudflare.zero-trust.policy: {{ .Values.frontend.zeroTrust.policy }}
    {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "marine.frontend.selectorLabels" . | nindent 4 }}
{{- end }}
