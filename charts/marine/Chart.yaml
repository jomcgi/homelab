apiVersion: v2
name: marine
description: Marine services - AIS vessel tracking and API
type: application
version: 0.1.0
appVersion: "0.1.0"
maintainers:
  - name: homelab
keywords:
  - ais
  - ships
  - vessels
  - maritime
  - tracking
  - api
annotations:
  org.opencontainers.image.source: "https://github.com/jomcgi/homelab"
  org.opencontainers.image.url: "https://github.com/jomcgi/homelab"
  org.opencontainers.image.licenses: "MPL-2.0"
  dev-deploy.enabled: "true"
  dev-deploy.value-overrides: |
    imagePullSecret.create=false
    imageUpdater.enabled=false
    secret.type=manual
    secret.manual.apiKey=dummy-for-testing
    ingest.image.digest=
    api.image.digest=
    frontend.image.digest=
