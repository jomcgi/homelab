{{- $needsPatcher := false }}
{{- if .Values.initContainer.enabled }}
{{-   $needsPatcher = true }}
{{- end }}
{{- range $modelSpec := (index .Values "vllm-stack").servingEngineSpec.modelSpec }}
{{-   if $modelSpec.imageVolume }}
{{-     $needsPatcher = true }}
{{-   end }}
{{- end }}
{{- if $needsPatcher }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-patcher
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-patcher
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-patcher
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-patcher
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-patcher
  namespace: {{ .Release.Namespace }}
{{- end }}
