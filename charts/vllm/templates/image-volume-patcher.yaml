{{- range $modelSpec := (index .Values "vllm-stack").servingEngineSpec.modelSpec }}
{{- if $modelSpec.imageVolume }}
{{- with $ -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-{{ $modelSpec.name }}-image-volume-patch
  namespace: {{ $.Release.Namespace }}
data:
  patch.json: |
    [
      {
        "op": "add",
        "path": "/spec/template/spec/volumes",
        "value": [
          {
            "name": "model-image",
            "image": {
              "reference": {{ $modelSpec.imageVolume.reference | quote }},
              "pullPolicy": "IfNotPresent"
            }
          },
          {
            "name": "shm",
            "emptyDir": {
              "medium": "Memory",
              "sizeLimit": {{ default "16Gi" $modelSpec.shmSize | quote }}
            }
          }
        ]
      },
      {
        "op": "add",
        "path": "/spec/template/spec/containers/0/volumeMounts",
        "value": [
          {
            "name": "model-image",
            "mountPath": {{ $modelSpec.imageVolume.mountPath | quote }},
            "readOnly": true
          },
          {
            "name": "shm",
            "mountPath": "/dev/shm"
          }
        ]
      }
    ]
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $.Release.Name }}-{{ $modelSpec.name }}-image-volume-patcher
  namespace: {{ $.Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      serviceAccountName: {{ $.Release.Name }}-patcher
      restartPolicy: OnFailure
      containers:
      - name: patcher
        image: "{{ .Values.patcher.image.repository }}:{{ .Values.patcher.image.tag }}"
        command:
        - /bin/bash
        - -c
        - |
          set -e
          DEPLOYMENT="{{ $.Release.Name }}-{{ $modelSpec.name }}-deployment-vllm"

          echo "Waiting for deployment $DEPLOYMENT to exist..."
          until kubectl get deployment $DEPLOYMENT -n {{ $.Release.Namespace }}; do
            sleep 2
          done

          echo "Patching deployment with image volume..."
          kubectl patch deployment $DEPLOYMENT -n {{ $.Release.Namespace }} \
            --type=json \
            --patch-file=/patch/patch.json

          echo "Patch applied successfully!"
        volumeMounts:
        - name: patch
          mountPath: /patch
      volumes:
      - name: patch
        configMap:
          name: {{ $.Release.Name }}-{{ $modelSpec.name }}-image-volume-patch
{{- end }}
{{- end }}
{{- end }}
