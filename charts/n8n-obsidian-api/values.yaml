replicaCount: 1

image:
  repository: ghcr.io/jomcgi/n8n-obsidian-api
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity: {}

# Application configuration
config:
  # Obsidian API URL (via Cloudflare Tunnel)
  obsidianApiUrl: "https://obsidian.jomcgi.dev"

  # Cloudflare service token for bypassing Access authentication
  # Cloudflare Access will inject Obsidian API credentials automatically
  # Stored in 1Password and synced via OnePasswordItem
  cloudflare:
    secretName: "cloudflare-service-token"
    clientIdKey: "client-id"
    clientSecretKey: "client-secret"

  # Service settings
  service:
    host: "0.0.0.0"
    port: 8080
    logLevel: "INFO"

  # OpenTelemetry configuration
  opentelemetry:
    enabled: true
    serviceName: "n8n-obsidian-api"
    # OTLP endpoint for sending traces (e.g., to SigNoz)
    # Leave empty to disable trace export
    otlpEndpoint: ""
    # otlpEndpoint: "http://signoz-otel-collector:4317"

# 1Password secret management
onePassword:
  enabled: true
  itemPath: "vaults/homelab/items/cloudflare-service-token-obsidian"
