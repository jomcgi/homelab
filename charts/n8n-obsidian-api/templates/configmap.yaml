apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "n8n-obsidian-api.fullname" . }}
  labels:
    {{- include "n8n-obsidian-api.labels" . | nindent 4 }}
data:
  obsidian-api-url: {{ .Values.config.obsidian.apiUrl | quote }}
  service-host: {{ .Values.config.service.host | quote }}
  service-port: {{ .Values.config.service.port | quote }}
  log-level: {{ .Values.config.service.logLevel | quote }}
  otel-enabled: {{ .Values.config.opentelemetry.enabled | quote }}
  otel-service-name: {{ .Values.config.opentelemetry.serviceName | quote }}
  {{- if .Values.config.opentelemetry.otlpEndpoint }}
  otel-otlp-endpoint: {{ .Values.config.opentelemetry.otlpEndpoint | quote }}
  {{- end }}
