{{- range .Values.imagePullSecrets }}
{{- if .onepassword }}
{{- if eq .onepassword.type "onepassword" }}
---
# GHCR Pull Secret (for Kubernetes image pulls)
# Allows n8n-obsidian-api to pull private images from GitHub Container Registry
# Type: kubernetes.io/dockerconfigjson (used for imagePullSecrets)
apiVersion: onepassword.com/v1
kind: OnePasswordItem
type: kubernetes.io/dockerconfigjson
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "n8n-obsidian-api.labels" $ | nindent 4 }}
spec:
  itemPath: {{ .onepassword.itemPath | quote }}
{{- end }}
{{- end }}
{{- end }}
