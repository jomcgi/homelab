apiVersion: v1
kind: LimitRange
metadata:
  name: sandbox-limits
  namespace: {{ .Release.Namespace }}
spec:
  limits:
    - type: Container
      default:
        cpu: {{ .Values.namespace.limitRange.cpu.limit }}
        memory: {{ .Values.namespace.limitRange.memory.limit }}
      defaultRequest:
        cpu: {{ .Values.namespace.limitRange.cpu.request }}
        memory: {{ .Values.namespace.limitRange.memory.request }}
