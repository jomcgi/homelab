apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: {{ .Values.sandboxTemplate.name }}
  namespace: {{ .Release.Namespace }}
spec:
  podTemplate:
    spec:
      serviceAccountName: goose-agent
      securityContext:
        runAsNonRoot: true
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: clone-repo
          image: "{{ .Values.sandboxTemplate.image.repository }}:{{ .Values.sandboxTemplate.image.tag }}"
          command: ["/bin/sh", "-c"]
          args:
            - |
              git clone --depth 1 https://x-access-token:${GITHUB_TOKEN}@github.com/{{ .Values.sandboxTemplate.env.repoOwner }}/{{ .Values.sandboxTemplate.env.repoName }}.git /workspace/{{ .Values.sandboxTemplate.env.repoName }}
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: GITHUB_TOKEN
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      containers:
        - name: goose
          image: "{{ .Values.sandboxTemplate.image.repository }}:{{ .Values.sandboxTemplate.image.tag }}"
          command: ["sleep", "infinity"]
          workingDir: /workspace/{{ .Values.sandboxTemplate.env.repoName }}
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          env:
            - name: GOOSE_PROVIDER
              value: {{ .Values.sandboxTemplate.env.gooseProvider }}
            - name: OPENAI_HOST
              value: {{ .Values.sandboxTemplate.env.litellmBaseUrl }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-creds
                  key: LITELLM_MASTER_KEY
            - name: GOOSE_MODEL
              value: {{ .Values.sandboxTemplate.env.gooseModel }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: GITHUB_TOKEN
            - name: BUILDBUDDY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: BUILDBUDDY_API_KEY
          resources:
            {{- toYaml .Values.sandboxTemplate.resources | nindent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          ephemeral:
            volumeClaimTemplate:
              spec:
                storageClassName: {{ .Values.sandboxTemplate.workspace.storageClassName }}
                accessModes: [ReadWriteOnce]
                resources:
                  requests:
                    storage: {{ .Values.sandboxTemplate.workspace.size }}
