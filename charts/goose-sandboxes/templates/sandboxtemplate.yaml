apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: {{ .Values.sandboxTemplate.name }}
  namespace: {{ .Release.Namespace }}
spec:
  podTemplate:
    spec:
      serviceAccountName: goose-agent
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: goose
          image: "{{ .Values.sandboxTemplate.image.repository }}:{{ .Values.sandboxTemplate.image.tag }}"
          command: ["/bin/sh", "-c"]
          args: ['goose run --text "$AGENT_TASK"']
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # Agent needs writable fs for git, npm, build tools
            capabilities:
              drop:
                - ALL
          env:
            - name: AGENT_TASK
              value: ""
            - name: GOOSE_PROVIDER
              value: {{ .Values.sandboxTemplate.env.gooseProvider }}
            - name: OPENAI_BASE_URL
              value: {{ .Values.sandboxTemplate.env.litellmBaseUrl }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-creds
                  key: LITELLM_MASTER_KEY
            - name: GOOSE_MODEL
              value: {{ .Values.sandboxTemplate.env.gooseModel }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: GITHUB_TOKEN
            - name: BUILDBUDDY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: BUILDBUDDY_API_KEY
          resources:
            {{- toYaml .Values.sandboxTemplate.resources | nindent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          ephemeral:
            volumeClaimTemplate:
              spec:
                storageClassName: {{ .Values.sandboxTemplate.workspace.storageClassName }}
                accessModes: [ReadWriteOnce]
                resources:
                  requests:
                    storage: {{ .Values.sandboxTemplate.workspace.size }}
