namespace:
  limitRange:
    cpu:
      request: "1"
      limit: "4"
    memory:
      request: 2Gi
      limit: 8Gi
  resourceQuota:
    pods: "5"
    requestsCpu: "8"
    requestsMemory: 16Gi

sandboxTemplate:
  name: goose-agent
  image:
    repository: ghcr.io/jomcgi/homelab/goose-agent
    tag: main
  env:
    # Goose uses Claude Code CLI as the LLM provider (no LiteLLM proxy needed).
    # The claude binary is baked into the image and authenticates via OAuth token.
    gooseProvider: claude-code
    gooseModel: claude-sonnet-4-6
    contextForgeUrl: http://context-forge.mcp-gateway.svc.cluster.local:8000/mcp
    repoOwner: jomcgi
    repoName: homelab
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi
  workspace:
    storageClassName: longhorn
    size: 20Gi

warmPool:
  name: goose-pool
  size: 1

secrets:
  claudeAuth:
    onePasswordItem: litellm-claude-auth
    vault: k8s-homelab
  agentSecrets:
    onePasswordItem: agent-secrets
    vault: k8s-homelab

# Long-lived agents — each entry generates a ConfigMap + Deployment.
# Prompt changes trigger pod restart via checksum annotation.
agents:
  ci-watcher:
    enabled: false
    prompt: |
      You are a CI watcher agent for the jomcgi/homelab GitHub repository.

      Your job is to continuously monitor open pull requests for CI failures
      and fix them.

      Use Claude Code's built-in /loop skill to poll every 5 minutes:

      /loop 5m check open PRs for CI failures and fix them

      When checking PRs:
      1. List open PRs: gh pr list --state open --json number,title,statusCheckRollup
      2. For each PR with failing checks:
         a. Check out the PR branch
         b. Read the CI failure logs (use BuildBuddy MCP tools)
         c. Diagnose and fix the issue
         d. Commit and push the fix
         e. Wait for CI to re-run and verify it passes
      3. If no PRs have failures, report all clear and wait for next poll

      Important:
      - Never force-push or rewrite history
      - Create fixup commits, not amends
      - If you can't fix a failure after 2 attempts, skip it and move on
      - Use conventional commit messages: fix(scope): description
