namespace:
  limitRange:
    cpu:
      request: "1"
      limit: "4"
    memory:
      request: 2Gi
      limit: 8Gi
  resourceQuota:
    pods: "5"
    requestsCpu: "8"
    requestsMemory: 16Gi

sandboxTemplate:
  name: goose-agent
  image:
    repository: ghcr.io/jomcgi/homelab/goose-agent
    tag: main
  env:
    # Goose uses Claude Code CLI as the LLM provider (no LiteLLM proxy needed).
    # The claude binary is baked into the image and authenticates via OAuth token.
    gooseProvider: claude-code
    gooseModel: claude-sonnet-4-6
    contextForgeUrl: http://context-forge.mcp-gateway.svc.cluster.local:8000/mcp
    repoOwner: jomcgi
    repoName: homelab
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi
  workspace:
    storageClassName: longhorn
    size: 20Gi

warmPool:
  name: goose-pool
  size: 1

secrets:
  claudeAuth:
    onePasswordItem: litellm-claude-auth
    vault: k8s-homelab
  agentSecrets:
    onePasswordItem: agent-secrets
    vault: k8s-homelab
