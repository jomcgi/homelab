                errorMessage:
                  description: ErrorMessage contains details if the phase is Error.
                  type: string
                observedGeneration:
                  description: ObservedGeneration reflects the generation of the most recently observed spec.
                  type: integer
                  format: int64
                conditions:
                  description: Conditions represent the latest available observations.
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
                    properties:
                      type:
                        description: Type of condition.
                        type: string
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      status:
                        description: Status of the condition, one of True, False, Unknown.
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      lastTransitionTime:
                        description: LastTransitionTime is when the condition last transitioned.
                        type: string
                        format: date-time
                      reason:
                        description: Reason is a programmatic identifier for the condition's last transition.
                        type: string
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      message:
                        description: Message is a human readable message indicating details.
                        type: string
                        maxLength: 32768
                      observedGeneration:
                        description: ObservedGeneration for this condition.
                        type: integer
                        format: int64
                        minimum: 0
