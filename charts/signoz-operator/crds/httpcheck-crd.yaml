spec:
  group: monitoring.jomcgi.dev
  names:
    kind: HTTPCheck
    listKind: HTTPCheckList
    plural: httpchecks
    singular: httpcheck
    shortNames:
      - hc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Endpoint
          type: string
          jsonPath: .spec.endpoint
          priority: 0
        - name: Method
          type: string
          jsonPath: .spec.method
          priority: 0
        - name: Interval
          type: string
          jsonPath: .spec.interval
