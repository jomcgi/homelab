{{- range .Values.servers }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  labels:
    {{- include "mcp-servers.labels" (dict "server" . "Chart" $.Chart) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "mcp-servers.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcp-servers.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        {{- if .translate.enabled }}
        - name: server
          image: "{{ .image.repository }}:{{ .image.tag }}"
          imagePullPolicy: {{ .image.pullPolicy | default "IfNotPresent" }}
          {{- with .env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .secret }}
          envFrom:
            - secretRef:
                name: {{ .secret.name }}
          {{- end }}
          stdin: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .resources | nindent 12 }}
        - name: translate
          image: "{{ $.Values.translate.image.repository }}:{{ $.Values.translate.image.tag }}"
          imagePullPolicy: {{ $.Values.translate.image.pullPolicy }}
          command: ["python3", "-m", "mcpgateway.translate"]
          args:
            - "--stdio"
            - {{ .translate.command | quote }}
            - "--expose-streamable-http"
            - "--port"
            - {{ .translate.port | default 8080 | quote }}
          ports:
            - name: mcp
              containerPort: {{ .translate.port | default 8080 }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 5
            periodSeconds: 10
        {{- else }}
        - name: server
          image: "{{ .image.repository }}:{{ .image.tag }}"
          imagePullPolicy: {{ .image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: mcp
              containerPort: {{ .port }}
              protocol: TCP
          {{- with .env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .secret }}
          envFrom:
            - secretRef:
                name: {{ .secret.name }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 5
            periodSeconds: 10
        {{- end }}
{{- end }}
