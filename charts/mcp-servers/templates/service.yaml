{{- range .Values.servers }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  labels:
    {{- include "mcp-servers.labels" (dict "server" . "Chart" $.Chart "Release" $.Release) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ include "mcp-servers.port" . }}
      targetPort: mcp
      protocol: TCP
      name: mcp
  selector:
    {{- include "mcp-servers.selectorLabels" (dict "server" . "Release" $.Release) | nindent 4 }}
{{- end }}
