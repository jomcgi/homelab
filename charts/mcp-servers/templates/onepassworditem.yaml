{{- range .Values.servers }}
{{- if .secret }}
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ .secret.name }}
  labels:
    {{- include "mcp-servers.labels" (dict "server" . "Chart" $.Chart) | nindent 4 }}
spec:
  itemPath: {{ .secret.itemPath | quote }}
{{- end }}
{{- end }}
