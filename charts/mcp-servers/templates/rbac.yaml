{{- range $server := $.Values.servers }}
{{- if $server.rbac }}
{{- if $server.rbac.clusterRoleRules }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-{{ $server.name }}
  labels:
    {{- include "mcp-servers.labels" (dict "server" $server "Chart" $.Chart "Release" $.Release) | nindent 4 }}
rules:
  {{- toYaml $server.rbac.clusterRoleRules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-{{ $server.name }}
  labels:
    {{- include "mcp-servers.labels" (dict "server" $server "Chart" $.Chart "Release" $.Release) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-{{ $server.name }}
subjects:
  - kind: ServiceAccount
    name: {{ $server.name }}
    namespace: {{ $.Release.Namespace }}
{{- else if $server.rbac.clusterRole }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-{{ $server.name }}
  labels:
    {{- include "mcp-servers.labels" (dict "server" $server "Chart" $.Chart "Release" $.Release) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $server.rbac.clusterRole }}
subjects:
  - kind: ServiceAccount
    name: {{ $server.name }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- range $server.rbac.namespaced }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-{{ $server.name }}-{{ .namespace }}
  namespace: {{ .namespace }}
  labels:
    {{- include "mcp-servers.labels" (dict "server" $server "Chart" $.Chart "Release" $.Release) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .role }}
subjects:
  - kind: ServiceAccount
    name: {{ $server.name }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
{{- end }}
