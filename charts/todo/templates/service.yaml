apiVersion: v1
kind: Service
metadata:
  name: {{ include "todo.fullname" . }}-public
  labels:
    {{- include "todo.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.public.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "todo.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "todo.fullname" . }}-admin
  labels:
    {{- include "todo.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.admin.port }}
      targetPort: api
      protocol: TCP
      name: api
  selector:
    {{- include "todo.selectorLabels" . | nindent 4 }}
