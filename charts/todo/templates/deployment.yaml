apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "todo.fullname" . }}
  labels:
    {{- include "todo.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "todo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "todo.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: git-clone
          image: alpine/git:latest
          command:
            - sh
            - -c
            - |
              if [ ! -d /repo/.git ]; then
                git clone --branch {{ .Values.git.branch }} {{ .Values.git.repo }} /repo
              else
                cd /repo && git fetch origin && git reset --hard origin/{{ .Values.git.branch }}
              fi
              # Ensure data directory exists
              mkdir -p /repo/{{ .Values.git.dataPath }}
          env:
            - name: GIT_SSH_COMMAND
              value: "ssh -i /ssh/id_rsa -o StrictHostKeyChecking=no"
          volumeMounts:
            - name: repo
              mountPath: /repo
            - name: git-ssh
              mountPath: /ssh
              readOnly: true
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: api
              containerPort: 8080
          env:
            - name: DATA_DIR
              value: /repo/{{ .Values.git.dataPath }}
            - name: GIT_ROOT
              value: /repo
            - name: GIT_REPO
              value: {{ .Values.git.repo }}
            - name: GIT_BRANCH
              value: {{ .Values.git.branch }}
            - name: GIT_SSH_COMMAND
              value: "ssh -i /ssh/id_rsa -o StrictHostKeyChecking=no"
          volumeMounts:
            - name: repo
              mountPath: /repo
            - name: git-ssh
              mountPath: /ssh
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
        - name: static
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: repo
              mountPath: /usr/share/nginx/html
              subPath: {{ .Values.git.dataPath }}/public
              readOnly: true
          resources:
            {{- toYaml .Values.resources.static | nindent 12 }}
      volumes:
        - name: repo
          persistentVolumeClaim:
            claimName: {{ include "todo.fullname" . }}
        - name: git-ssh
          secret:
            secretName: {{ .Values.git.secretName }}
            defaultMode: 0400
