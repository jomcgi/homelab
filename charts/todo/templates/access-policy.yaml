{{- if .Values.cloudflare.allowedEmails }}
apiVersion: tunnels.cloudflare.io/v1
kind: CloudflareAccessPolicy
metadata:
  name: {{ include "todo.fullname" . }}-admin
  labels:
    {{- include "todo.labels" . | nindent 4 }}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ include "todo.fullname" . }}-admin-route
  application:
    name: {{ include "todo.fullname" . }}-admin
    sessionDuration: "24h"
  policies:
    - name: allow-users
      decision: allow
      rules:
        - emails:
            {{- toYaml .Values.cloudflare.allowedEmails | nindent 12 }}
{{- end }}
