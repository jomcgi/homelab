<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        --base: #eff1f5;
        --text: #4c4f69;
        --subtext: #6c6f85;
        --surface: #ccd0da;
        --muted: #bcc0cc;
        --green: #40a02b;
        --red: #d20f39;
        --blue: #1e66f5;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        background: var(--base);
        color: var(--text);
        font-family: monospace;
        padding: 2rem;
        max-width: 600px;
        margin: 0 auto;
      }
      header {
        border-bottom: 2px solid var(--text);
        padding-bottom: 1rem;
        margin-bottom: 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: normal;
        letter-spacing: 0.2em;
      }
      h1 a {
        color: var(--text);
        text-decoration: none;
      }
      h1 a:hover {
        color: var(--blue);
      }
      .date {
        color: var(--subtext);
        font-size: 0.85rem;
        display: none;
      }
      .date.show {
        display: block;
      }
      section {
        margin-bottom: 2.5rem;
      }
      h2 {
        font-size: 1rem;
        font-weight: normal;
        letter-spacing: 0.1em;
        color: var(--subtext);
        margin-bottom: 1rem;
      }
      .item {
        padding: 0.75rem 0;
        border-bottom: 1px solid var(--surface);
      }
      .text {
        font-size: 1.1rem;
      }
      .empty {
        color: var(--muted);
      }
      .done {
        text-decoration: line-through;
        color: var(--green);
        opacity: 0.6;
      }
      .prompt a {
        color: var(--red);
        text-decoration: none;
      }
      .prompt a:hover {
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <header>
      <h1><a href="https://todo-admin.jomcgi.dev">TODO</a></h1>
      <span class="date" id="date-display"></span>
    </header>

    <section>
      <h2>WEEKLY</h2>
      <div class="item">
        <span id="weekly" class="text empty">...</span>
      </div>
    </section>

    <section>
      <h2>DAILY</h2>
      <div class="item">
        <span id="daily-0" class="text empty">...</span>
      </div>
      <div class="item">
        <span id="daily-1" class="text empty">...</span>
      </div>
      <div class="item">
        <span id="daily-2" class="text empty">...</span>
      </div>
    </section>

    <script>
      /**
       * Data Contract:
       * GET /api/weekly -> { task: string, done: boolean }
       * GET /api/daily  -> [{ task: string, done: boolean }, ...]
       * GET /{YYYY}/{MM}/{D}.md -> Markdown with ## Weekly and - [x]/[ ] format
       */

      const ADMIN_URL = "https://todo-admin.jomcgi.dev";
      const DATES = /*DATES_PLACEHOLDER*/ []; /*END_PLACEHOLDER*/

      const today = new Date().toISOString().split("T")[0];
      let currentIndex = DATES.indexOf(today);
      if (currentIndex === -1) currentIndex = DATES.length - 1;

      const formatDate = (dateStr) => {
        const d = new Date(dateStr + "T12:00:00");
        return d.toLocaleDateString("en-US", {
          weekday: "long",
          month: "long",
          day: "numeric",
        });
      };

      const isEmpty = (task) => !task?.task || task.task.trim() === "";
      const allEmpty = (items) => !items || items.every(isEmpty);

      const renderWeekly = (data) => {
        const el = document.getElementById("weekly");
        if (isEmpty(data)) {
          el.innerHTML = `<span class="prompt"><a href="${ADMIN_URL}">@jomcgi set your week</a></span>`;
          el.className = "text";
        } else {
          el.textContent = data.task;
          el.className = data.done ? "text done" : "text";
        }
      };

      const renderDaily = (items) => {
        const dailyItems = items || [];

        if (allEmpty(dailyItems)) {
          document.getElementById("daily-0").innerHTML =
            `<span class="prompt"><a href="${ADMIN_URL}">@jomcgi set your day</a></span>`;
          document.getElementById("daily-0").className = "text";
          document.getElementById("daily-1").textContent = "...";
          document.getElementById("daily-1").className = "text empty";
          document.getElementById("daily-2").textContent = "...";
          document.getElementById("daily-2").className = "text empty";
          return;
        }

        for (let i = 0; i < 3; i++) {
          const el = document.getElementById(`daily-${i}`);
          const item = dailyItems[i];
          if (item?.task) {
            el.textContent = item.task;
            el.className = item.done ? "text done" : "text";
          } else {
            el.textContent = "...";
            el.className = "text empty";
          }
        }
      };

      const renderDate = (isToday, dateStr) => {
        const dateEl = document.getElementById("date-display");
        if (isToday) {
          dateEl.classList.remove("show");
        } else {
          dateEl.textContent = formatDate(dateStr);
          dateEl.classList.add("show");
        }
      };

      const fetchWeekly = async () => {
        try {
          const res = await fetch("/api/weekly");
          if (!res.ok) throw new Error(res.status);
          return await res.json();
        } catch (e) {
          try {
            const res = await fetch("data.json");
            const data = await res.json();
            return data.weekly || {};
          } catch {
            return {};
          }
        }
      };

      const fetchDaily = async () => {
        try {
          const res = await fetch("/api/daily");
          if (!res.ok) throw new Error(res.status);
          return await res.json();
        } catch (e) {
          try {
            const res = await fetch("data.json");
            const data = await res.json();
            return data.daily || [];
          } catch {
            return [];
          }
        }
      };

      const fetchHistorical = async (dateStr) => {
        const [year, month, day] = dateStr.split("-");
        try {
          const res = await fetch(`/${year}/${month}/${parseInt(day)}.md`);
          if (!res.ok) throw new Error(res.status);
          const md = await res.text();

          const weeklyMatch = md.match(/## Weekly\n(.+)/);
          const dailyMatches = [...md.matchAll(/- \[([ x])\] (.+)/g)];

          return {
            weekly: { task: weeklyMatch?.[1] || "", done: false },
            daily: dailyMatches.map((m) => ({
              task: m[2],
              done: m[1] === "x",
            })),
          };
        } catch (e) {
          return { weekly: {}, daily: [] };
        }
      };

      const loadToday = async () => {
        const [weekly, daily] = await Promise.all([
          fetchWeekly(),
          fetchDaily(),
        ]);
        renderWeekly(weekly);
        renderDaily(daily);
        renderDate(true, null);
      };

      const loadHistorical = async (dateStr) => {
        const data = await fetchHistorical(dateStr);
        renderWeekly(data.weekly);
        renderDaily(data.daily);
        renderDate(false, dateStr);
      };

      const loadDate = async (index) => {
        currentIndex = index;
        const isToday = index === DATES.length - 1 || DATES.length === 0;

        if (isToday) {
          await loadToday();
        } else {
          await loadHistorical(DATES[index]);
        }
      };

      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft" && currentIndex > 0)
          loadDate(currentIndex - 1);
        if (e.key === "ArrowRight" && currentIndex < DATES.length - 1)
          loadDate(currentIndex + 1);
      });

      loadDate(currentIndex);
    </script>
  </body>
</html>
