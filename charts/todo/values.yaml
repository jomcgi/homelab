replicaCount: 1

image:
  repository: ghcr.io/jomcgi/homelab/charts/todo
  tag: main
  pullPolicy: IfNotPresent

# Image pull secret for private GHCR registry
imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

git:
  repo: https://github.com/jomcgi/homelab.git
  branch: main
  dataPath: data/todo # Subdirectory in repo for todo data
  # Token secret for git authentication (created by OnePasswordItem)
  tokenSecret:
    name: git-token
    key: github_token
  # 1Password item path for the git token
  onePasswordItem: "vaults/k8s-homelab/items/argocd-image-updater"

service:
  public:
    port: 80
  admin:
    port: 8080

cloudflare:
  publicHostname: todo.jomcgi.dev
  adminHostname: todo-admin.jomcgi.dev
  # Allowed emails for admin access (Cloudflare Zero Trust)
  allowedEmails:
    - joe@jomcgi.dev

persistence:
  enabled: true
  storageClass: "" # Use cluster default
  size: 1Gi

resources:
  api:
    requests:
      memory: "24Mi"
      cpu: "5m"
    limits:
      memory: "24Mi"
      cpu: "5m"
  static:
    requests:
      memory: "16Mi"
      cpu: "5m"
    limits:
      memory: "16Mi"
      cpu: "5m"

# Pod affinity/anti-affinity rules
# Useful for RWO volumes to keep pod on same node and avoid volume reattachment delays
affinity: {}

adminUrl: https://todo-admin.jomcgi.dev
