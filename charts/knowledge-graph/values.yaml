# --- Scraper Service ---
scraper:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/jomcgi/homelab/services/knowledge-graph-scraper
    tag: "latest"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources:
    requests:
      cpu: 10m
      memory: 256Mi
    limits:
      memory: 256Mi

# --- CronJob (batch scrape) ---
cronjob:
  enabled: true
  schedule: "0 */6 * * *"
  backoffLimit: 3
  activeDeadlineSeconds: 1800
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

# --- Embedder CronJob ---
embedder:
  enabled: true
  schedule: "30 */6 * * *"
  image:
    repository: ghcr.io/jomcgi/homelab/services/knowledge-graph-embedder
    tag: "latest"
    pullPolicy: Always
  backoffLimit: 2
  activeDeadlineSeconds: 3600
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 512Mi

# --- MCP Server ---
mcp:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/jomcgi/homelab/services/knowledge-graph-mcp
    tag: "latest"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources:
    requests:
      cpu: 10m
      memory: 256Mi
    limits:
      memory: 256Mi

# --- Shared ---
imagePullSecret:
  enabled: false
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

nameOverride: ""
fullnameOverride: ""

seaweedfs:
  endpoint: http://seaweedfs-s3.seaweedfs.svc.cluster.local:8333

qdrant:
  url: http://qdrant.qdrant.svc.cluster.local:6333
  collection: knowledge_graph

embedding:
  provider: ollama
  ollama:
    url: http://ollama.ollama.svc.cluster.local:11434
    model: nomic-embed-text

storage:
  bucket: knowledge

notifications:
  slackWebhookUrl: ""

# Sources to scrape (mounted as ConfigMap)
sources: []
#  - url: "https://example.com/feed.xml"
#    type: "rss"
#    name: "Example Blog"
