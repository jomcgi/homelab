{{- if .Values.scraper.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "knowledge-graph.fullname" . }}-scraper
  labels:
    {{- include "knowledge-graph.labels" . | nindent 4 }}
    app.kubernetes.io/component: scraper
spec:
  replicas: {{ .Values.scraper.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "knowledge-graph.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: scraper
  template:
    metadata:
      labels:
        {{- include "knowledge-graph.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: scraper
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.scraper.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: ghcr-imagepull-secret
      {{- end }}
      securityContext:
        # Known limitation: runs as root because aspect_rules_py venv writes
        # to the installation directory at runtime
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: scraper
          image: "{{ .Values.scraper.image.repository }}:{{ .Values.scraper.image.tag }}"
          imagePullPolicy: {{ .Values.scraper.image.pullPolicy }}
          args: ["serve"]
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.scraper.service.targetPort }}
              protocol: TCP
          env:
            - name: HOME
              value: /tmp
            - name: UV_CACHE_DIR
              value: /tmp/.uv-cache
            - name: SCRAPER_SOURCES_YAML_PATH
              value: /config/sources.yaml
            - name: SCRAPER_S3_ENDPOINT
              value: {{ .Values.seaweedfs.endpoint | quote }}
            - name: SCRAPER_S3_BUCKET
              value: {{ .Values.storage.bucket | quote }}
            {{- if .Values.notifications.slackWebhookUrl }}
            - name: SCRAPER_SLACK_WEBHOOK_URL
              value: {{ .Values.notifications.slackWebhookUrl | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.scraper.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "knowledge-graph.fullname" . }}-config
        - name: tmp
          emptyDir: {}
{{- end }}
