{{- if .Values.embedder.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "knowledge-graph.fullname" . }}-embedder
  labels:
    {{- include "knowledge-graph.labels" . | nindent 4 }}
    app.kubernetes.io/component: embedder
spec:
  schedule: {{ .Values.embedder.schedule | quote }}
  concurrencyPolicy: {{ .Values.embedder.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.embedder.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.embedder.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.embedder.backoffLimit }}
      activeDeadlineSeconds: {{ .Values.embedder.activeDeadlineSeconds }}
      template:
        metadata:
          labels:
            {{- include "knowledge-graph.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: embedder
          annotations:
            linkerd.io/inject: disabled
        spec:
          {{- if .Values.imagePullSecret.enabled }}
          imagePullSecrets:
            - name: ghcr-imagepull-secret
          {{- end }}
          restartPolicy: OnFailure
          securityContext:
            # Known limitation: runs as root because aspect_rules_py venv writes
            # to the installation directory at runtime
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: embedder
              image: "{{ .Values.embedder.image.repository }}:{{ .Values.embedder.image.tag }}"
              imagePullPolicy: {{ .Values.embedder.image.pullPolicy }}
              securityContext:
                readOnlyRootFilesystem: false
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              env:
                - name: HOME
                  value: /tmp
                - name: UV_CACHE_DIR
                  value: /tmp/.uv-cache
                - name: EMBEDDER_S3_ENDPOINT
                  value: {{ .Values.seaweedfs.endpoint | quote }}
                - name: EMBEDDER_S3_BUCKET
                  value: {{ .Values.storage.bucket | quote }}
                - name: EMBEDDER_QDRANT_URL
                  value: {{ .Values.qdrant.url | quote }}
                - name: EMBEDDER_QDRANT_COLLECTION
                  value: {{ .Values.qdrant.collection | quote }}
                - name: EMBEDDER_PROVIDER
                  value: {{ .Values.embedding.provider | quote }}
                - name: EMBEDDER_OLLAMA_URL
                  value: {{ .Values.embedding.ollama.url | quote }}
                - name: EMBEDDER_OLLAMA_MODEL
                  value: {{ .Values.embedding.ollama.model | quote }}
              resources:
                {{- toYaml .Values.embedder.resources | nindent 16 }}
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
{{- end }}
