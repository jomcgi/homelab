{{- if .Values.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "knowledge-graph.fullname" . }}-mcp
  labels:
    {{- include "knowledge-graph.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  replicas: {{ .Values.mcp.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "knowledge-graph.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp
  template:
    metadata:
      labels:
        {{- include "knowledge-graph.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mcp
      {{- with .Values.mcp.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: ghcr-imagepull-secret
      {{- end }}
      securityContext:
        # Known limitation: runs as root because aspect_rules_py venv writes
        # to the installation directory at runtime
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp
          image: "{{ .Values.mcp.image.repository }}:{{ .Values.mcp.image.tag }}"
          imagePullPolicy: {{ .Values.mcp.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.mcp.service.targetPort }}
              protocol: TCP
          env:
            - name: HOME
              value: /tmp
            - name: UV_CACHE_DIR
              value: /tmp/.uv-cache
            - name: MCP_S3_ENDPOINT
              value: {{ .Values.seaweedfs.endpoint | quote }}
            - name: MCP_S3_BUCKET
              value: {{ .Values.storage.bucket | quote }}
            - name: MCP_QDRANT_URL
              value: {{ .Values.qdrant.url | quote }}
            - name: MCP_QDRANT_COLLECTION
              value: {{ .Values.qdrant.collection | quote }}
            - name: MCP_PROVIDER
              value: {{ .Values.embedding.provider | quote }}
            - name: MCP_OLLAMA_URL
              value: {{ .Values.embedding.ollama.url | quote }}
            - name: MCP_OLLAMA_MODEL
              value: {{ .Values.embedding.ollama.model | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.mcp.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
