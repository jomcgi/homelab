apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "knowledge-graph.fullname" . }}-config
  labels:
    {{- include "knowledge-graph.labels" . | nindent 4 }}
data:
  sources.yaml: |
    sources:
    {{- range .Values.sources }}
      - url: {{ .url | quote }}
        type: {{ .type | quote }}
        {{- if .name }}
        name: {{ .name | quote }}
        {{- end }}
    {{- end }}
