replicaCount: 1

nginx:
  image:
    repository: nginx
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

clusterInfo:
  enabled: true
  image:
    repository: bitnami/kubectl
    tag: "latest"
    pullPolicy: IfNotPresent
  # How often to update status.json (seconds)
  interval: 5
  resources:
    requests:
      cpu: 5m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 32Mi

# Backend services to route to
backends:
  trips:
    host: trips-nginx.trips.svc.cluster.local
    port: 80

service:
  type: ClusterIP
  port: 80

serviceAccount:
  create: true
  name: ""
