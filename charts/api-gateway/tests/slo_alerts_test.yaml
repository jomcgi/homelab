suite: api-gateway SLO alert tests
templates:
  - slo-alerts.yaml
tests:
  - it: should create burn-fast ConfigMap
    asserts:
      - isKind:
          of: ConfigMap
        documentIndex: 0
      - equal:
          path: metadata.name
          value: api-gateway-slo-burn-fast
        documentIndex: 0

  - it: should create budget-exhausted ConfigMap
    asserts:
      - isKind:
          of: ConfigMap
        documentIndex: 1
      - equal:
          path: metadata.name
          value: api-gateway-slo-budget-exhausted
        documentIndex: 1

  - it: should have signoz alert label on both ConfigMaps
    asserts:
      - equal:
          path: metadata.labels["signoz.io/alert"]
          value: "true"
        documentIndex: 0
      - equal:
          path: metadata.labels["signoz.io/alert"]
          value: "true"
        documentIndex: 1

  - it: should have 5m0s evalWindow for burn-fast
    asserts:
      - matchRegex:
          path: data["alert.json"]
          pattern: '"evalWindow":\s*"5m0s"'
        documentIndex: 0

  - it: should have 6h0m0s evalWindow for budget-exhausted
    asserts:
      - matchRegex:
          path: data["alert.json"]
          pattern: '"evalWindow":\s*"6h0m0s"'
        documentIndex: 1

  - it: should use httpcheck.status metric in both alerts
    asserts:
      - matchRegex:
          path: data["alert.json"]
          pattern: '"metricName":\s*"httpcheck.status"'
        documentIndex: 0
      - matchRegex:
          path: data["alert.json"]
          pattern: '"metricName":\s*"httpcheck.status"'
        documentIndex: 1
