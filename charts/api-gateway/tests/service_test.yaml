suite: api-gateway service tests
templates:
  - service.yaml
tests:
  - it: should create a service with correct name
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-api-gateway

  - it: should use ClusterIP type by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose port 80 by default
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 80

  - it: should allow custom service type
    set:
      service.type: LoadBalancer
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer

  - it: should allow custom service port
    set:
      service.port: 8080
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8080

  - it: should have correct selector labels
    asserts:
      - isNotEmpty:
          path: spec.selector
