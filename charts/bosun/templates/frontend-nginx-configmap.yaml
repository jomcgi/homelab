apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bosun.fullname" . }}-nginx
  labels:
    {{- include "bosun.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        access_log /dev/stdout;
        error_log /dev/stderr warn;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        server_tokens off;

        # Temp paths for non-root
        client_body_temp_path /tmp/client_body;
        proxy_temp_path /tmp/proxy;
        fastcgi_temp_path /tmp/fastcgi;
        uwsgi_temp_path /tmp/uwsgi;
        scgi_temp_path /tmp/scgi;

        # WebSocket upgrade map
        map $http_upgrade $connection_upgrade {
            default upgrade;
            '' close;
        }

        # Backend upstream
        upstream bosun_backend {
            server {{ include "bosun.fullname" . }}-backend.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.backend.port }};
            keepalive 32;
        }

        # ttyd upstream (terminal)
        upstream bosun_ttyd {
            server {{ include "bosun.fullname" . }}-backend.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.backend.ttydPort }};
        }

        server {
            listen {{ .Values.frontend.port }};
            server_name _;

            # Health check (does not hit backend)
            location /health {
                access_log off;
                add_header Content-Type text/plain;
                return 200 'ok\n';
            }

            # Hashed assets — cache forever (content hash guarantees freshness)
            location /assets/ {
                root /usr/share/nginx/html/charts/bosun/frontend/dist;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }

            # SPA fallback — always revalidate so deploys are picked up immediately
            location / {
                root /usr/share/nginx/html/charts/bosun/frontend/dist;
                try_files $uri $uri/ /index.html;
                add_header Cache-Control "no-cache";
            }

            # WebSocket -> backend
            location /ws {
                proxy_pass http://bosun_backend;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 7d;
                proxy_send_timeout 7d;
                proxy_buffering off;
            }

            # REST API -> backend
            location /api/ {
                proxy_pass http://bosun_backend;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Connection "";
            }

            # Terminal (ttyd) -> backend
            location = /terminal {
                return 301 /terminal/;
            }
            location /terminal/ {
                proxy_pass http://bosun_ttyd/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 1h;
                proxy_send_timeout 1h;
                proxy_buffering off;
            }
        }
    }
