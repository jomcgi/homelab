apiVersion: v1
kind: Service
metadata:
  name: {{ include "bosun.fullname" . }}-backend
  labels:
    {{- include "bosun.labels" . | nindent 4 }}
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.backend.ttydPort }}
      targetPort: ttyd
      protocol: TCP
      name: ttyd
  selector:
    {{- include "bosun.selectorLabels" . | nindent 4 }}
    component: backend
