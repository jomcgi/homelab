apiVersion: v1
kind: Service
metadata:
  name: {{ include "bosun.fullname" . }}-frontend
  labels:
    {{- include "bosun.labels" . | nindent 4 }}
    component: frontend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "bosun.selectorLabels" . | nindent 4 }}
    component: frontend
