apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudflare-tunnel.fullname" . }}
  namespace: {{ include "cloudflare-tunnel.namespace" . }}
  labels:
    {{- include "cloudflare-tunnel.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cloudflare-tunnel.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.envoy.enabled }}
        checksum/envoy-config: {{ include (print $.Template.BasePath "/envoy-configmap.yaml") . | sha256sum }}
        {{- end }}
      labels:
        {{- include "cloudflare-tunnel.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.envoy.enabled .Values.envoy.transparentProxy.enabled }}
      initContainers:
      - name: iptables-init
        image: "{{ .Values.envoy.transparentProxy.iptablesImage }}"
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
          runAsUser: 0
          runAsNonRoot: false
        command:
        - sh
        - -c
        - |
          set -e
          echo "Setting up iptables rules for transparent proxy..."

          # Envoy user ID (same as envoy container)
          ENVOY_UID={{ .Values.envoy.securityContext.runAsUser | default 65534 }}
          ENVOY_PORT={{ .Values.envoy.transparentProxy.port }}

          # Create a new chain for Envoy redirect
          iptables -t nat -N ENVOY_REDIRECT || true
          iptables -t nat -F ENVOY_REDIRECT

          # Redirect all TCP traffic to Envoy transparent proxy port
          iptables -t nat -A ENVOY_REDIRECT -p tcp -j REDIRECT --to-port ${ENVOY_PORT}

          # Create chain for outbound traffic
          iptables -t nat -N ENVOY_OUTPUT || true
          iptables -t nat -F ENVOY_OUTPUT

          # Don't redirect traffic from Envoy itself (prevent loops)
          iptables -t nat -A ENVOY_OUTPUT -m owner --uid-owner ${ENVOY_UID} -j RETURN

          # Don't redirect localhost traffic
          iptables -t nat -A ENVOY_OUTPUT -d 127.0.0.1/32 -j RETURN

          # Redirect all other outbound TCP traffic to Envoy
          iptables -t nat -A ENVOY_OUTPUT -p tcp -j ENVOY_REDIRECT

          # Apply to all OUTPUT traffic
          iptables -t nat -A OUTPUT -j ENVOY_OUTPUT

          echo "iptables rules configured successfully"
          iptables -t nat -L -n -v
      {{- end }}
      containers:
      {{- if .Values.envoy.enabled }}
      - name: envoy
        image: "{{ .Values.envoy.image.repository }}:{{ .Values.envoy.image.tag }}"
        imagePullPolicy: {{ .Values.envoy.image.pullPolicy }}
        args:
        - -c
        - /etc/envoy/envoy.yaml
        ports:
        - containerPort: {{ .Values.envoy.proxy.port }}
          name: envoy-proxy
          protocol: TCP
        - containerPort: {{ .Values.envoy.admin.port }}
          name: envoy-admin
          protocol: TCP
        {{- if .Values.envoy.transparentProxy.enabled }}
        - containerPort: {{ .Values.envoy.transparentProxy.port }}
          name: tproxy
          protocol: TCP
        {{- end }}
        volumeMounts:
        - name: envoy-config
          mountPath: /etc/envoy
          readOnly: true
        - name: envoy-tmp
          mountPath: /tmp
        {{- with .Values.envoy.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.envoy.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- end }}
      - name: cloudflared
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        args:
        - tunnel
        - --config
        - /etc/cloudflared/config/config.yaml
        {{- if .Values.tunnel.protocol }}
        - --protocol
        - {{ .Values.tunnel.protocol }}
        {{- end }}
        - run
        {{- if eq .Values.secret.type "onepassword" }}
        - $(TUNNEL_ID)
        {{- else }}
        - {{ .Values.tunnel.id }}
        {{- end }}
        {{- if eq .Values.secret.type "onepassword" }}
        env:
        - name: TUNNEL_ID
          valueFrom:
            secretKeyRef:
              name: cloudflare-tunnel-credentials
              key: tunnel-id
        - name: TUNNEL_NAME
          valueFrom:
            secretKeyRef:
              name: cloudflare-tunnel-credentials
              key: tunnel-name
        {{- end }}
        ports:
        - containerPort: {{ .Values.service.port }}
          name: cloudflared
        {{- if .Values.livenessProbe }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 10 }}
        {{- end }}
        {{- if .Values.readinessProbe }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: config
          mountPath: /etc/cloudflared/config
          readOnly: true
        - name: creds
          mountPath: /etc/cloudflared/creds/credentials.json
          subPath: credentials
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      volumes:
      - name: creds
        secret:
          secretName: "cloudflare-tunnel-credentials"
      - name: config
        configMap:
          name: {{ include "cloudflare-tunnel.fullname" . }}
          items:
          - key: config.yaml
            path: config.yaml
      {{- if .Values.envoy.enabled }}
      - name: envoy-config
        configMap:
          name: {{ include "cloudflare-tunnel.fullname" . }}-envoy
          items:
          - key: envoy.yaml
            path: envoy.yaml
      - name: envoy-tmp
        emptyDir:
          medium: Memory
          sizeLimit: 64Mi
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}