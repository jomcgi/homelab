apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudflare-tunnel.fullname" . }}
  namespace: {{ include "cloudflare-tunnel.namespace" . }}
  labels:
    {{- include "cloudflare-tunnel.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cloudflare-tunnel.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.envoy.enabled }}
        checksum/envoy-config: {{ include (print $.Template.BasePath "/envoy-configmap.yaml") . | sha256sum }}
        {{- end }}
      labels:
        {{- include "cloudflare-tunnel.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      {{- if .Values.envoy.enabled }}
      - name: envoy
        image: "{{ .Values.envoy.image.repository }}:{{ .Values.envoy.image.tag }}"
        imagePullPolicy: {{ .Values.envoy.image.pullPolicy }}
        args:
        - -c
        - /etc/envoy/envoy.yaml
        ports:
        - containerPort: {{ .Values.envoy.proxy.port }}
          name: envoy-proxy
          protocol: TCP
        - containerPort: {{ .Values.envoy.admin.port }}
          name: envoy-admin
          protocol: TCP
        volumeMounts:
        - name: envoy-config
          mountPath: /etc/envoy
          readOnly: true
        - name: envoy-tmp
          mountPath: /tmp
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 65534
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        {{- with .Values.envoy.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /ready
            port: {{ .Values.envoy.admin.port }}
            scheme: HTTP
            host: 127.0.0.1
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: {{ .Values.envoy.admin.port }}
            scheme: HTTP
            host: 127.0.0.1
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
      {{- end }}
      - name: cloudflared
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        args:
        - tunnel
        - --config
        - /etc/cloudflared/config/config.yaml
        - run
        {{- if eq .Values.secret.type "onepassword" }}
        - $(TUNNEL_ID)
        {{- else }}
        - {{ .Values.tunnel.id }}
        {{- end }}
        {{- if eq .Values.secret.type "onepassword" }}
        env:
        - name: TUNNEL_ID
          valueFrom:
            secretKeyRef:
              name: cloudflare-tunnel-credentials
              key: tunnel-id
        - name: TUNNEL_NAME
          valueFrom:
            secretKeyRef:
              name: cloudflare-tunnel-credentials
              key: tunnel-name
        {{- end }}
        ports:
        - containerPort: {{ .Values.service.port }}
          name: cloudflared
        {{- if .Values.livenessProbe }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 10 }}
        {{- end }}
        {{- if .Values.readinessProbe }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: config
          mountPath: /etc/cloudflared/config
          readOnly: true
        - name: creds
          mountPath: /etc/cloudflared/creds/credentials.json
          subPath: credentials
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      volumes:
      - name: creds
        secret:
          secretName: "cloudflare-tunnel-credentials"
      - name: config
        configMap:
          name: {{ include "cloudflare-tunnel.fullname" . }}
          items:
          - key: config.yaml
            path: config.yaml
      {{- if .Values.envoy.enabled }}
      - name: envoy-config
        configMap:
          name: {{ include "cloudflare-tunnel.fullname" . }}-envoy
          items:
          - key: envoy.yaml
            path: envoy.yaml
      - name: envoy-tmp
        emptyDir:
          medium: Memory
          sizeLimit: 64Mi
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}