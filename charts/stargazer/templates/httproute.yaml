{{- if and .Values.api.enabled .Values.api.httproute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "stargazer.fullname" . }}-api
  labels:
    {{- include "stargazer.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  parentRefs:
    - name: {{ .Values.api.httproute.gateway }}
      namespace: {{ .Values.api.httproute.gatewayNamespace }}
  hostnames:
    - {{ .Values.api.httproute.hostname }}
  rules:
    {{- if .Values.api.httproute.pathPrefix }}
    - matches:
      - path:
          type: PathPrefix
          value: {{ .Values.api.httproute.pathPrefix }}
      filters:
      - type: URLRewrite
        urlRewrite:
          path:
            type: ReplacePrefixMatch
            replacePrefixMatch: /
      backendRefs:
      - name: {{ include "stargazer.fullname" . }}-api
        port: {{ .Values.api.service.port }}
    {{- else }}
    - backendRefs:
      - name: {{ include "stargazer.fullname" . }}-api
        port: {{ .Values.api.service.port }}
    {{- end }}
{{- end }}