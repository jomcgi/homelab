{{- if .Values.policies.ghcrSecretSync.enabled }}
---
# ClusterPolicy: Generate GHCR pull secret in all namespaces
# Clones the dockerconfigjson secret from argocd namespace to all application namespaces
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: sync-ghcr-pull-secret
  annotations:
    policies.kyverno.io/title: Sync GHCR Pull Secret to All Namespaces
    policies.kyverno.io/category: Secret Management
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Secret
    policies.kyverno.io/description: >-
      This policy generates a docker-registry secret for GHCR in each namespace
      by cloning the ghcr-docker-config secret from the argocd namespace.
      This allows all pods to pull private images from ghcr.io without per-namespace configuration.
spec:
  generateExisting: true
  rules:
    - name: sync-ghcr-secret
      skipBackgroundRequests: true
      match:
        any:
        - resources:
            kinds:
              - Namespace
            namespaceSelector:
              matchExpressions:
                - key: kubernetes.io/metadata.name
                  operator: NotIn
                  values:
                    - kube-system
                    - kube-public
                    - kube-node-lease
                    - argocd
                    - kyverno
      generate:
        apiVersion: v1
        kind: Secret
        name: ghcr-pull-secret
        namespace: "{{`{{request.object.metadata.name}}`}}"
        synchronize: true
        clone:
          namespace: argocd
          name: ghcr-docker-config
{{- end }}
{{- if .Values.policies.ghcrImagePullSecretInjection.enabled }}
---
# ClusterPolicy: Auto-inject imagePullSecrets into all pods
# Automatically adds ghcr-pull-secret to all pods cluster-wide
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-ghcr-pull-secret
  annotations:
    policies.kyverno.io/title: Inject GHCR Pull Secret into Pods
    policies.kyverno.io/category: Image Registry
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    pod-policies.kyverno.io/autogen-controllers: none
    policies.kyverno.io/description: >-
      This policy automatically injects imagePullSecrets into all pods to enable
      pulling private images from ghcr.io. It only affects pods that don't already
      have imagePullSecrets configured, preserving explicit configuration.
spec:
  background: true
  rules:
    - name: inject-image-pull-secret
      skipBackgroundRequests: true
      match:
        any:
        - resources:
            kinds:
              - Pod
            namespaceSelector:
              matchExpressions:
                - key: kubernetes.io/metadata.name
                  operator: NotIn
                  values:
                    - kube-system
                    - kube-public
                    - kube-node-lease
                    - kyverno
      # Only inject if imagePullSecrets is not already set
      preconditions:
        all:
        - key: "{{`{{ request.object.spec.imagePullSecrets || `}}`[]`{{` | length(@) }}`}}"
          operator: Equals
          value: 0
      mutate:
        patchStrategicMerge:
          spec:
            imagePullSecrets:
              - name: ghcr-pull-secret
{{- end }}
