# Default values for Kyverno
# These are sensible defaults that can be overridden per environment

# OpenTelemetry injection configuration
otelInjection:
  enabled: true
  background: true # Apply to existing AND new resources
  endpoint: "signoz-otel-collector.signoz.svc.cluster.local:4317"
  protocol: "grpc"
  targetKinds:
    - Deployment
    - StatefulSet
    - DaemonSet
  excludeNamespaces:
    - kube-system
    - kube-public
    - kube-node-lease

# Linkerd namespace injection configuration
linkerdInjection:
  enabled: true # Auto-enable Linkerd injection for all namespaces
  background: true # Apply to existing AND new namespaces
  excludeNamespaces:
    # System namespaces
    - kube-system
    - kube-public
    - kube-node-lease
    # Infrastructure that shouldn't be meshed
    - linkerd # Linkerd control plane itself
    - linkerd-cni # Linkerd CNI (if using CNI mode)
    - cert-manager # Certificate management
    - kyverno # Policy engine
    - argocd # GitOps controller
    - longhorn-system # Storage system
    # Observability (optional - can mesh these if desired)
    - signoz # SigNoz collector (avoid circular tracing)

kyverno:
  # Admission controller configuration
  admissionController:
    replicas: 1
    # Prometheus annotations enable SigNoz autodiscovery
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8000"
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
    securityContext:
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault

  # Background controller for existing resources
  backgroundController:
    enabled: true
    replicas: 1
    # Prometheus annotations enable SigNoz autodiscovery
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8000"
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi

  # Cleanup controller for policy reports
  cleanupController:
    enabled: true
    replicas: 1
    # Prometheus annotations enable SigNoz autodiscovery
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8000"
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 20m
        memory: 64Mi

  # Reports controller for policy results
  reportsController:
    enabled: true
    replicas: 1
    # Prometheus annotations enable SigNoz autodiscovery
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8000"
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi

  # Features
  features:
    autoUpdateWebhooks:
      enabled: true
    policyExceptions:
      enabled: true
      namespace: kyverno

  # Metrics and monitoring
  metricsService:
    enabled: true

  # CRD installation
  crds:
    install: true

  # Namespace exclusions
  config:
    excludeKyvernoNamespace: true
    resourceFilters:
      - "[*,kube-system,*]"
      - "[*,kube-public,*]"
      - "[*,kube-node-lease,*]"
      - "[Event,*,*]"
      - "[Node,*,*]"
      - "[APIService,*,*]"
      - "[TokenReview,*,*]"
      - "[SubjectAccessReview,*,*]"
      - "[SelfSubjectAccessReview,*,*]"
      - "[Binding,*,*]"
      - "[ReplicaSet,*,*]"
      - "[AdmissionReport,*,*]"
      - "[ClusterAdmissionReport,*,*]"
      - "[BackgroundScanReport,*,*]"
      - "[ClusterBackgroundScanReport,*,*]"
