{{- range .Values.servers }}
{{- if and .registration .registration.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: register-{{ .name }}
  labels:
    {{- include "agent-platform-mcp-servers.labels" (dict "name" .name "Chart" $.Chart "Release" $.Release) | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      annotations:
        linkerd.io/inject: disabled
      labels:
        {{- include "agent-platform-mcp-servers.selectorLabels" (dict "name" .name "Release" $.Release) | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-gateway
          image: "{{ $.Values.translate.image.repository }}:{{ $.Values.translate.image.tag }}"
          imagePullPolicy: {{ $.Values.translate.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              GATEWAY_URL="{{ $.Values.gateway.url }}"
              echo "Waiting for gateway at ${GATEWAY_URL}/health..."
              until curl -sf "${GATEWAY_URL}/health" > /dev/null 2>&1; do
                echo "Gateway not ready, retrying in 5s..."
                sleep 5
              done
              echo "Gateway is healthy."
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
      containers:
        - name: register
          image: "{{ $.Values.translate.image.repository }}:{{ $.Values.translate.image.tag }}"
          imagePullPolicy: {{ $.Values.translate.image.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e

              TOKEN=$(python3 -c "
              import jwt, time, os, uuid
              payload = {
                  'sub': 'admin@jomcgi.dev',
                  'iat': int(time.time()),
                  'exp': int(time.time()) + 300,
                  'jti': str(uuid.uuid4()),
                  'aud': 'mcpgateway-api',
                  'iss': 'mcpgateway',
                  'is_admin': True,
                  'teams': None,
              }
              print(jwt.encode(payload, os.environ.get('JWT_SECRET_KEY', ''), algorithm='HS256'))
              ")

              GATEWAY_URL="{{ $.Values.gateway.url }}"

              # Idempotent: skip if already registered.
              RESPONSE=$(curl -s -w "\n%{http_code}" "${GATEWAY_URL}/gateways" \
                -H "Authorization: Bearer ${TOKEN}")
              HTTP_CODE=$(echo "$RESPONSE" | tail -1)
              BODY=$(echo "$RESPONSE" | sed '$d')

              if [ "$HTTP_CODE" != "200" ]; then
                echo "ERROR: GET /gateways returned HTTP ${HTTP_CODE}"
                echo "$BODY"
                exit 1
              fi

              EXISTING_ID=$(echo "$BODY" | python3 -c "import sys,json; gws=json.load(sys.stdin); print(next((g['id'] for g in gws if g['name']=='{{ .name }}'),''))")

              if [ -n "${EXISTING_ID}" ]; then
                echo "{{ .name }} already registered (${EXISTING_ID}), skipping."
              else
                echo "Registering {{ .name }}..."
                REG_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${GATEWAY_URL}/gateways" \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d '{
                    "name": "{{ .name }}",
                    "url": "http://{{ .name }}.{{ $.Release.Namespace }}.svc.cluster.local:{{ include "agent-platform-mcp-servers.port" . }}/mcp",
                    "transport": "{{ .registration.transport | default "STREAMABLEHTTP" }}"
                  }')
                REG_CODE=$(echo "$REG_RESPONSE" | tail -1)
                REG_BODY=$(echo "$REG_RESPONSE" | sed '$d')

                if [ "$REG_CODE" != "200" ] && [ "$REG_CODE" != "201" ]; then
                  echo "ERROR: POST /gateways returned HTTP ${REG_CODE}"
                  echo "$REG_BODY"
                  exit 1
                fi
                echo "$REG_BODY"
              fi

              echo "Registration complete."
          envFrom:
            - secretRef:
                name: {{ $.Values.gateway.secret.name }}
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
{{- end }}
{{- end }}

{{- /* Gateway 1Password secret — only when at least one server has registration enabled */ -}}
{{- $hasRegistration := false }}
{{- range .Values.servers }}
{{- if and .registration .registration.enabled }}
{{- $hasRegistration = true }}
{{- end }}
{{- end }}
{{- if $hasRegistration }}
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ .Values.gateway.secret.name }}
  labels:
    {{- include "agent-platform-mcp-servers.labels" (dict "name" "gateway" "Chart" .Chart "Release" .Release) | nindent 4 }}
spec:
  itemPath: {{ .Values.gateway.secret.itemPath | quote }}
{{- end }}
