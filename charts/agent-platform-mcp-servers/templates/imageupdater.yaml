{{- range $index, $server := .Values.servers }}
{{- if and $server.imageUpdater $server.imageUpdater.enabled }}
---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: {{ $.Release.Name }}-{{ $server.name }}
  namespace: argocd
  labels:
    {{- include "agent-platform-mcp-servers.labels" (dict "name" $server.name "Chart" $.Chart "Release" $.Release) | nindent 4 }}
spec:
  applicationRefs:
    - images:
        - alias: {{ $server.name }}
          commonUpdateSettings:
            updateStrategy: {{ $server.imageUpdater.strategy | default "digest" }}
            forceUpdate: {{ $server.imageUpdater.forceUpdate | default false }}
          imageName: {{ $server.image.repository }}:{{ regexReplaceAll "@sha256:.*" $server.image.tag "" }}
          manifestTargets:
            helm:
              name: servers[{{ $index }}].image.repository
              tag: servers[{{ $index }}].image.tag
      namePattern: {{ $.Values.imageUpdater.applicationName | default $.Release.Name }}
  namespace: argocd
  writeBackConfig:
    method: git:secret:{{ $.Values.imageUpdater.gitSecret }}
    gitConfig:
      repository: {{ $.Values.imageUpdater.gitRepository }}
      branch: {{ $.Values.imageUpdater.gitBranch }}
      writeBackTarget: {{ $.Values.imageUpdater.writeBackTarget }}
{{- end }}
{{- end }}
