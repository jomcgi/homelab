{{- range .Values.servers }}
{{- if and .secret .secret.itemPath }}
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ .secret.name }}
  labels:
    {{- include "agent-platform-mcp-servers.labels" (dict "name" .name "Chart" $.Chart "Release" $.Release) | nindent 4 }}
spec:
  itemPath: {{ .secret.itemPath | quote }}
{{- end }}
{{- end }}
