# LiteLLM proxy with litellm-claude-code custom provider.
# Bridges OpenAI-compatible API (port 4000) to Claude Max subscription
# via the Claude Agent SDK.

image:
  repository: ghcr.io/cabinlab/litellm-claude-code
  tag: "latest"
  pullPolicy: IfNotPresent

config:
  LITELLM_LOG: "INFO"

# 1Password secrets
secrets:
  # Provides CLAUDE_AUTH_TOKEN for the custom provider
  claudeAuth:
    name: litellm-claude-auth
    itemPath: "vaults/k8s-homelab/items/litellm-claude-auth"
  # Provides LITELLM_MASTER_KEY — shared with agents as OPENAI_API_KEY
  apiKey:
    name: litellm-api-key
    itemPath: "vaults/k8s-homelab/items/litellm-api-key"

# LiteLLM config.yaml mounted as ConfigMap
litellmConfig:
  model_list:
    - model_name: claude-opus-4-6
      litellm_params:
        model: claude-agent-sdk/claude-opus-4-6
    - model_name: claude-sonnet-4-6
      litellm_params:
        model: claude-agent-sdk/claude-sonnet-4-6

resources:
  requests:
    cpu: "2"
    memory: 4Gi
  limits:
    cpu: "2"
    memory: 4Gi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsUser: 1001
  runAsGroup: 1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
