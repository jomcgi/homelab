# Bazel Cache Seeder - Maintains shared repository cache for CI runners
#
# This CronJob periodically runs Bazel builds to populate a shared cache PVC.
# The cache is then mounted read-only by all GitHub Actions runners, avoiding
# redundant downloads of toolchains and dependencies.

cronjob:
  # Run weekly on Sunday at 2am to refresh cache
  schedule: "0 2 * * 0"

  # Keep last 3 successful runs for debugging
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

  # Timeout after 2 hours (cache population can be slow)
  activeDeadlineSeconds: 7200

# Runner image (same as GitHub Actions runners)
image:
  repository: ghcr.io/jomcgi/homelab/gh-arc-runner
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-imagepull-secret

# Persistent volume for shared cache
persistence:
  enabled: true
  storageClass: longhorn
  accessMode: ReadWriteMany  # Allows concurrent reads + periodic writes
  size: 30Gi  # Larger than before since it's shared
  annotations:
    # Two replicas for availability
    longhorn.io/numberOfReplicas: "2"

# Resource limits for cache seeding job
resources:
  limits:
    cpu: 8000m
    memory: 8Gi
  requests:
    cpu: 2000m
    memory: 4Gi

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1001  # runner user
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

# Bazel configuration
bazel:
  # Bazelisk will be pre-installed in runner image
  # Commands to run to populate cache
  commands:
    - "bazel build //..."
    - "bazel test //... --build_tests_only"  # Cache test dependencies

# BuildBuddy API key (optional - enables remote cache)
buildbuddy:
  enabled: false
  # Expects secret with key: api-key
  secretName: buildbuddy-api-key
