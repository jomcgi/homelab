{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "claude-api.fullname" . }}
  labels:
    {{- include "claude-api.labels" . | nindent 4 }}
rules:
  # Read-only access to all resources (safe for observability)
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Allow port-forwarding for debugging
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["create"]
  # Allow exec into pods for debugging
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Allow logs access
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Allow creating jobs from cronjobs
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create"]
{{- end }}