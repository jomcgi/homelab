{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "claude-api.fullname" . }}-frontend
  labels:
    {{- include "claude-api.labels" . | nindent 4 }}
    component: frontend
spec:
  type: ClusterIP
  sessionAffinity: ClientIP  # Sticky sessions for WebSocket connections
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600  # 1 hour sticky session
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "claude-api.selectorLabels" . | nindent 4 }}
    component: frontend
{{- end }}