{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "claude-api.fullname" . }}-nginx-frontend
  labels:
    {{- include "claude-api.labels" . | nindent 4 }}
data:
  nginx-frontend.conf: |
    # Run as unprivileged user
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 4096;
        use epoll;
        multi_accept on;
    }

    http {
        # Performance optimizations
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        keepalive_requests 100;

        # Security
        server_tokens off;
        client_body_temp_path /tmp/client_temp;
        proxy_temp_path /tmp/proxy_temp;
        fastcgi_temp_path /tmp/fastcgi_temp;
        uwsgi_temp_path /tmp/uwsgi_temp;
        scgi_temp_path /tmp/scgi_temp;

        # Logging
        access_log /var/log/nginx/access.log combined buffer=32k flush=5s;

        # Upstream backend definition with health checks
        upstream claude_backend {
            # Use Kubernetes service DNS for backend discovery
            # This automatically load balances across backend pods
            server {{ include "claude-api.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }} max_fails=1 fail_timeout=10s;

            # Connection pooling for better performance
            keepalive 32;
            keepalive_requests 100;
            keepalive_timeout 60s;
        }

        # Cache zone for static assets
        proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static_cache:10m max_size=100m inactive=60m use_temp_path=off;

        server {
            listen 8080;
            server_name _;

            # Timeouts for long-running WebSocket connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;

            # Buffers for WebSocket
            proxy_buffering off;
            proxy_request_buffering off;

            # Health check endpoint (doesn't hit backend)
            location /health {
                access_log off;
                add_header Content-Type text/plain;
                return 200 'healthy\n';
            }

            # Frontend readiness check
            location /ready {
                access_log off;
                proxy_pass http://claude_backend/health;
                proxy_connect_timeout 2s;
                proxy_read_timeout 2s;
            }

            # Static files (if enabled)
            {{- if .Values.frontend.staticFiles }}
            location /static/ {
                root /usr/share/nginx/html;
                expires 1h;
                add_header Cache-Control "public, immutable";
                gzip_static on;
            }
            {{- end }}

            # API endpoints with caching where appropriate
            location /api/ {
                proxy_pass http://claude_backend;
                proxy_http_version 1.1;

                # Standard proxy headers
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # Connection reuse
                proxy_set_header Connection "";

                # Cache GET requests for certain endpoints
                set $no_cache 1;
                if ($request_method = GET) {
                    set $no_cache 0;
                }
                if ($uri ~* "/(health|metrics)") {
                    set $no_cache 1;
                }
                proxy_cache_bypass $no_cache;
                proxy_no_cache $no_cache;
                proxy_cache static_cache;
                proxy_cache_valid 200 1m;
                proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
                proxy_cache_background_update on;
                proxy_cache_lock on;
            }

            # WebSocket endpoint
            location /ws {
                proxy_pass http://claude_backend;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # WebSocket specific timeouts
                proxy_read_timeout 3600s;
                proxy_send_timeout 3600s;

                # Disable buffering for WebSocket
                proxy_buffering off;
            }

            # Main application
            location / {
                proxy_pass http://claude_backend;
                proxy_http_version 1.1;

                # Standard proxy headers
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # WebSocket support for all paths (Claude uses WebSockets everywhere)
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;

                # Connection pooling
                proxy_set_header Connection "";

                # Error handling with fallback
                proxy_intercept_errors on;
                error_page 502 503 504 /error.html;
            }

            # Error page
            location = /error.html {
                internal;
                default_type text/html;
                return 503 '<html><body><h1>Claude is temporarily unavailable</h1><p>The service is being updated. Please refresh in a few seconds.</p></body></html>';
            }
        }

        # WebSocket upgrade map
        map $http_upgrade $connection_upgrade {
            default upgrade;
            '' close;
        }
    }
{{- end }}