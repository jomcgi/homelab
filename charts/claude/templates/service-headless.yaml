{{- if .Values.statefulset.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "claude-api.fullname" . }}-headless
  labels:
    {{- include "claude-api.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  ports:
    - port: {{ .Values.service.port }}
      targetPort: backend
      protocol: TCP
      name: http
  selector:
    {{- include "claude-api.selectorLabels" . | nindent 4 }}
{{- end }}