apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claude-api.fullname" . }}
  labels:
    {{- include "claude-api.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "claude-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: {{ .Chart.Name }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "claude-api.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        # Nginx reverse proxy for WebSocket support with long timeouts
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-log
              mountPath: /var/log/nginx
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: backend
              containerPort: {{ .Values.api.port }}
              protocol: TCP
            - name: ttyd
              containerPort: 7681
              protocol: TCP
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: backend
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: backend
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          env:
            - name: HOME
              value: /home/user
            - name: PORT
              value: {{ .Values.api.port | quote }}
            - name: GIT_USER_NAME
              value: {{ .Values.git.name | quote }}
            - name: GIT_USER_EMAIL
              value: {{ .Values.git.email | quote }}
            - name: GEMINI_MODEL
              value: {{ .Values.gemini.model | quote }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "claude-api.fullname" . }}-secret
                  key: github_token
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "claude-api.fullname" . }}-secret
                  key: google_api_key
                  optional: true
            {{- if .Values.defaultWorkingDirectory }}
            - name: DEFAULT_WORKING_DIRECTORY
              value: {{ .Values.defaultWorkingDirectory | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: home
              mountPath: /home/user
            {{- if .Values.gitSync.enabled }}
            - name: repo
              mountPath: /repos/{{ .Values.gitSync.repoName }}
            {{- end }}
        {{- if .Values.gitSync.enabled }}
        # Git-sync sidecar to keep repo in sync
        - name: git-sync
          image: {{ .Values.gitSync.image }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
          env:
            - name: GITSYNC_REPO
              value: {{ .Values.gitSync.repo | quote }}
            - name: GITSYNC_REF
              value: {{ .Values.gitSync.branch | quote }}
            - name: GITSYNC_USERNAME
              value: oauth2
            - name: GITSYNC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "claude-api.fullname" . }}-secret
                  key: github_token
            - name: GITSYNC_ROOT
              value: /repo
            - name: GITSYNC_LINK
              value: current
            - name: GITSYNC_PERIOD
              value: {{ .Values.gitSync.period | quote }}
            - name: GITSYNC_ONE_TIME
              value: "false"
            # Clean up old worktrees after 1 hour
            - name: GITSYNC_STALE_WORKTREE_TIMEOUT
              value: "1h"
          volumeMounts:
            - name: repo
              mountPath: /repo
            - name: git-sync-tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
        {{- end }}
      volumes:
        - name: home
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "claude-api.fullname" . }}-home
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: nginx-config
          configMap:
            name: {{ include "claude-api.fullname" . }}-nginx
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-log
          emptyDir: {}
        {{- if .Values.gitSync.enabled }}
        - name: repo
          emptyDir: {}
        - name: git-sync-tmp
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
