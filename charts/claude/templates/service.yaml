apiVersion: v1
kind: Service
metadata:
  name: {{ include "claude-api.fullname" . }}
  labels:
    {{- include "claude-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  {{- if .Values.service.sessionAffinity }}
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: {{ .Values.service.sessionAffinityTimeout }}
  {{- end }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080  # nginx proxy
      protocol: TCP
      name: http
  selector:
    {{- include "claude-api.selectorLabels" . | nindent 4 }}
