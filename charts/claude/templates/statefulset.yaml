{{- if .Values.statefulset.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "claude-api.fullname" . }}
  labels:
    {{- include "claude-api.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "claude-api.fullname" . }}-headless
  replicas: {{ .Values.replicas }}
  podManagementPolicy: Parallel  # Start all pods in parallel for faster scaling
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0  # Update all pods
  selector:
    matchLabels:
      {{- include "claude-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: {{ .Chart.Name }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "claude-api.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "claude-api.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 30
      containers:
        # Nginx reverse proxy for WebSocket support
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 1
            timeoutSeconds: 1
            failureThreshold: 30
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]  # Grace period for connections to drain
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-log
              mountPath: /var/log/nginx
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: backend
              containerPort: {{ .Values.api.port }}
              protocol: TCP
            - name: ttyd
              containerPort: 7681
              protocol: TCP
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: backend
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: backend
            initialDelaySeconds: 5
            periodSeconds: 2
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 2
          {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: backend
            initialDelaySeconds: 0
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 60  # 2 minutes to start
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          env:
            - name: HOME
              value: /home/user
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: PORT
              value: {{ .Values.api.port | quote }}
            - name: GIT_USER_NAME
              value: {{ .Values.git.name | quote }}
            - name: GIT_USER_EMAIL
              value: {{ .Values.git.email | quote }}
            - name: GEMINI_MODEL
              value: {{ .Values.gemini.model | quote }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "claude-api.fullname" . }}-secret
                  key: github_token
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "claude-api.fullname" . }}-secret
                  key: google_api_key
                  optional: true
            - name: OPENCODE_CONFIG
              value: /etc/opencode/opencode.json
            {{- if .Values.defaultWorkingDirectory }}
            - name: DEFAULT_WORKING_DIRECTORY
              value: {{ .Values.defaultWorkingDirectory | quote }}
            {{- end }}
            {{- if .Values.defaultPermissionMode }}
            - name: DEFAULT_PERMISSION_MODE
              value: {{ .Values.defaultPermissionMode | quote }}
            {{- end }}
            {{- if .Values.repoSync.enabled }}
            - name: REPO_SYNC_URL
              value: {{ .Values.repoSync.repo | quote }}
            - name: REPO_SYNC_PATH
              value: /repos/{{ .Values.repoSync.repoName }}
            - name: REPO_SYNC_BRANCH
              value: {{ .Values.repoSync.branch | quote }}
            - name: REPO_SYNC_INTERVAL
              value: {{ .Values.repoSync.intervalSeconds | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: home
              mountPath: /home/user
            {{- if .Values.repoSync.enabled }}
            - name: home
              mountPath: /repos/{{ .Values.repoSync.repoName }}
              subPath: repos/{{ .Values.repoSync.repoName }}
            {{- end }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "claude-api.fullname" . }}-nginx
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-log
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: home
        labels:
          {{- include "claude-api.labels" . | nindent 10 }}
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
{{- end }}