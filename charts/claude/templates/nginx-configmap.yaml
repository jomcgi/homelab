apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "claude-api.fullname" . }}-nginx
  labels:
    {{- include "claude-api.labels" . | nindent 4 }}
data:
  nginx.conf: |
    user nginx nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        access_log /dev/stdout;
        error_log /dev/stderr warn;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;

        # Temp paths for non-root
        client_body_temp_path /tmp/client_body;
        proxy_temp_path /tmp/proxy;
        fastcgi_temp_path /tmp/fastcgi;
        uwsgi_temp_path /tmp/uwsgi;
        scgi_temp_path /tmp/scgi;

        server {
            listen 8080;
            server_name _;

            # Proxy all requests to backend
            location / {
                proxy_pass http://127.0.0.1:{{ .Values.api.port }};
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # WebSocket support
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";

                # Long timeouts for WebSocket connections (7 days)
                proxy_connect_timeout 7d;
                proxy_send_timeout 7d;
                proxy_read_timeout 7d;
            }

            # Health check
            location /health {
                access_log off;
                return 200 "healthy\n";
                add_header Content-Type text/plain;
            }

            # Dev server preview routing
            # Proxies /preview/:port/* to localhost:port/*
            # Example: /preview/5173/index.html → localhost:5173/index.html
            location ~ ^/preview/(\d+)/(.*)$ {
                set $preview_port $1;
                set $preview_path $2;

                # Proxy to the dev server running in the same pod
                proxy_pass http://127.0.0.1:$preview_port/$preview_path$is_args$args;
                proxy_http_version 1.1;

                # WebSocket support for HMR (Hot Module Reload)
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";

                # Standard proxy headers
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # Reasonable timeouts for dev servers
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }

            # Handle /preview/:port without trailing slash
            location ~ ^/preview/(\d+)$ {
                return 301 $scheme://$host/preview/$1/;
            }
        }
    }
