## Claude Web Interface Configuration
## Single pod with Claude Code session management

## Container image
image:
  repository: ghcr.io/jomcgi/homelab/charts/claude
  pullPolicy: Always  # Always pull since we use mutable 'main' tag
  tag: "main"

imagePullSecrets:
  - name: ghcr-pull-secret

nameOverride: ""
fullnameOverride: ""

## API server configuration
api:
  port: 3000

## Git configuration
git:
  name: "Joe McGinley"
  email: "joe@jomcgi.dev"

## Gemini configuration for voice transcription
gemini:
  model: "gemini-2.0-flash"

## Default working directory shown in UI when no conversation history exists
## When gitSync is enabled, this is automatically set to /repos/<repoName>/current
defaultWorkingDirectory: ""

## Default permission mode for Claude Code conversations
## Valid values: default, acceptEdits, bypassPermissions, plan
## Set to bypassPermissions to skip all permission prompts
defaultPermissionMode: ""

## Git-sync sidecar to keep a repo available for Claude to work with
## DEPRECATED: Use repoSync instead for simpler worktree-compatible sync
gitSync:
  enabled: false
  image: registry.k8s.io/git-sync/git-sync:v4.4.0
  repo: ""  # e.g., https://github.com/user/repo
  repoName: ""  # e.g., homelab (used for mount path)
  branch: main
  period: 60s  # Sync interval

## Custom repo sync (replaces git-sync sidecar)
## Clones repo on startup, runs periodic `git fetch` to keep refs fresh
## Works better with git worktrees for multi-agent workflows
repoSync:
  enabled: false
  repo: ""  # e.g., https://github.com/user/repo
  repoName: ""  # e.g., homelab (used for mount path)
  branch: main
  intervalSeconds: 60  # How often to run git fetch

## Service configuration
service:
  type: ClusterIP
  port: 3000

## Secret management via 1Password
secret:
  type: onepassword
  onepassword:
    itemPath: "vaults/k8s-homelab/items/claude.jomcgi.dev"

## Persistence configuration using Longhorn storage
persistence:
  enabled: true
  storageClass: "longhorn"
  accessMode: ReadWriteOnce
  size: 200Gi
  annotations:
    helm.sh/resource-policy: keep

## Resource limits (low request, burstable CPU)
resources:
  requests:
    cpu: "1"
    memory: "12Gi"
  limits:
    memory: "12Gi"

## Pod Security Context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

## Container Security Context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # Needs to write to home directory
  capabilities:
    drop:
      - ALL

## Liveness probe
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

## Readiness probe
readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

## Node selector
nodeSelector: {}

## Tolerations
tolerations: []

## Affinity rules
affinity: {}

## Pod annotations
podAnnotations:
  # Disable Linkerd injection to debug WebSocket timeout issues
  linkerd.io/inject: disabled
  # Mark ports as opaque to bypass Linkerd's HTTP detection
  # This prevents the default 10-second response timeout from killing WebSocket connections
  # Port 8080 (nginx) receives external traffic, port 3000 is the backend
  config.linkerd.io/opaque-ports: "8080,3000"

## Pod labels
podLabels: {}

## Deployment strategy (Recreate for stateful single-pod deployment)
strategy:
  type: Recreate

## Service Account configuration
serviceAccount:
  # Create a service account for the Claude pod
  create: true
  # Automatically mount the ServiceAccount token
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use (defaults to fullname)
  name: ""

## RBAC configuration
rbac:
  # Create ClusterRole and ClusterRoleBinding for read-only cluster access
  create: true
