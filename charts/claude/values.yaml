## Claude Web Interface Configuration
## Single pod with Claude Code session management

## Number of replicas (use 2+ with leader election for HA)
replicas: 2

## Container image
image:
  repository: ghcr.io/jomcgi/homelab/charts/claude
  pullPolicy: IfNotPresent # Use IfNotPresent since image updater uses immutable tags
  tag: "main" # Default tag, overridden by ArgoCD Image Updater

imagePullSecrets:
  - name: ghcr-pull-secret

nameOverride: ""
fullnameOverride: ""

## API server configuration
api:
  port: 3000

## Git configuration
git:
  name: "Joe McGinley"
  email: "joe@jomcgi.dev"

## Gemini configuration for voice transcription
gemini:
  model: "gemini-2.0-flash"

## Default working directory shown in UI when no conversation history exists
## When repoSync is enabled, this is automatically set to /repos/<repoName>
defaultWorkingDirectory: ""

## Default permission mode for Claude Code conversations
## Valid values: default, acceptEdits, bypassPermissions, plan
## Set to bypassPermissions to skip all permission prompts
defaultPermissionMode: ""

## Custom repo sync for keeping a repo available for Claude to work with
## Clones repo on startup, runs periodic `git fetch` to keep refs fresh
## Works better with git worktrees for multi-agent workflows
repoSync:
  enabled: false
  repo: "" # e.g., https://github.com/user/repo
  repoName: "" # e.g., homelab (used for mount path)
  branch: main
  intervalSeconds: 60 # How often to run git fetch

## Service configuration
service:
  type: ClusterIP
  port: 3000
  # Session affinity ensures requests from same client go to same pod
  sessionAffinity: false
  sessionAffinityTimeout: 3600 # 1 hour

## Secret management via 1Password
secret:
  type: onepassword
  onepassword:
    itemPath: "vaults/k8s-homelab/items/claude.jomcgi.dev"

## Persistence configuration using Longhorn storage
persistence:
  enabled: true
  storageClass: "longhorn"
  accessMode: ReadWriteOnce
  size: 200Gi
  annotations:
    helm.sh/resource-policy: keep

## Resource limits (low request, burstable CPU)
resources:
  requests:
    cpu: "1"
    memory: "12Gi"
  limits:
    memory: "12Gi"

## Pod Security Context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

## Container Security Context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false # Needs to write to home directory
  capabilities:
    drop:
      - ALL

## Liveness probe
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

## Readiness probe - aggressive for faster rollouts
readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5 # Start checking earlier
  periodSeconds: 2 # Check more frequently
  timeoutSeconds: 5
  successThreshold: 2 # Only need 2 successful checks
  failureThreshold: 3

## Node selector
nodeSelector: {}

## Tolerations
tolerations: []

## Affinity rules
affinity: {}

## Pod annotations
podAnnotations:
  # Disable Linkerd injection to debug WebSocket timeout issues
  linkerd.io/inject: disabled
  # Mark ports as opaque to bypass Linkerd's HTTP detection
  # This prevents the default 10-second response timeout from killing WebSocket connections
  # Port 8080 (nginx) receives external traffic, port 3000 is the backend
  config.linkerd.io/opaque-ports: "8080,3000"

## Pod labels
podLabels: {}

## Deployment strategy - RollingUpdate for zero downtime
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0 # Never take down the old pod until new one is ready
    maxSurge: 1 # Allow one extra pod during rollout

## Service Account configuration
serviceAccount:
  # Create a service account for the Claude pod
  create: true
  # Automatically mount the ServiceAccount token
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use (defaults to fullname)
  name: ""

## RBAC configuration
rbac:
  # Create ClusterRole and ClusterRoleBinding for read-only cluster access
  create: true

## Frontend deployment for HA and zero-downtime rollouts
frontend:
  # Enable separate frontend deployment
  enabled: false
  # Number of frontend replicas (stateless, can scale freely)
  replicas: 2
  # Frontend service configuration
  service:
    port: 8080
  # Pod annotations for frontend
  podAnnotations:
    linkerd.io/inject: disabled
    config.linkerd.io/opaque-ports: "8080"
  # Optional static files to serve
  staticFiles: false

## StatefulSet mode for HA deployments
## Each pod gets its own PVC, sessions are sticky to specific pods
statefulset:
  # Use StatefulSet instead of Deployment
  enabled: false
  # Pod management policy (Parallel = faster scaling)
  podManagementPolicy: Parallel

leaderElection:
  # Enable leader election for HA deployments
  enabled: true
  # kubectl image used for leader election sidecar
  image:
    repository: bitnami/kubectl
    tag: "latest"
    pullPolicy: IfNotPresent

## Nginx reverse proxy sidecar for WebSocket support
nginx:
  image:
    repository: nginx
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent
