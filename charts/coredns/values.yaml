# CoreDNS configuration values
# This configures the K3s-managed CoreDNS deployment

# ConfigMap settings
configMap:
  name: coredns
  namespace: kube-system

# Corefile configuration
# See: https://coredns.io/manual/toc/
corefile: |
  .:53 {
      errors
      health
      ready
      kubernetes cluster.local in-addr.arpa ip6.arpa {
        pods insecure
        fallthrough in-addr.arpa ip6.arpa
      }
      hosts /etc/coredns/NodeHosts {
        ttl 60
        reload 15s
        fallthrough
      }
      prometheus :9153
      # Use public DNS directly (Cloudflare + Google) instead of /etc/resolv.conf
      # This bypasses the router DNS which was timing out under load
      forward . 1.1.1.1 8.8.8.8 {
        prefer_udp
        max_concurrent 1000
      }
      cache 300
      loop
      reload
      loadbalance
      import /etc/coredns/custom/*.override
  }
  import /etc/coredns/custom/*.server

# DNS forwarders (configurable)
forwarders:
  - 1.1.1.1 # Cloudflare
  - 8.8.8.8 # Google

# Cache TTL in seconds
cacheTTL: 300

# Max concurrent forwards
maxConcurrent: 1000
