{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "trips.fullname" . }}-nginx-config
  labels:
    {{- include "trips.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent"';

        access_log /dev/stdout main;

        sendfile on;
        keepalive_timeout 65;

        # Temp directories for non-root
        client_body_temp_path /tmp/client_body;
        proxy_temp_path /tmp/proxy;
        fastcgi_temp_path /tmp/fastcgi;
        uwsgi_temp_path /tmp/uwsgi;
        scgi_temp_path /tmp/scgi;

        # Upstreams (cross-namespace)
        upstream seaweedfs {
            server {{ .Values.seaweedfs.endpoint | trimPrefix "http://" }};
        }

        upstream imgproxy {
            server {{ include "trips.fullname" . }}-imgproxy:8080;
        }

        server {
            listen 8080;
            server_name _;

            # Health check
            location /health {
                access_log off;
                return 200 'OK';
                add_header Content-Type text/plain;
            }

            # Full resolution images - direct to SeaweedFS
            location /full/ {
                rewrite ^/full/(.*)$ /{{ .Values.bucket }}/$1 break;
                proxy_pass http://seaweedfs;
                proxy_set_header Host $host;

                # Cache forever (images are immutable)
                add_header Cache-Control "public, max-age=31536000, immutable";
                add_header X-Cache-Status $upstream_cache_status;
            }

            # Thumbnails (300px) - imgproxy v3 format
            location /thumb/ {
                rewrite ^/thumb/(.*)$ /unsafe/rs:fit:300:300/q:85/plain/s3://{{ .Values.bucket }}/$1 break;
                proxy_pass http://imgproxy;
                proxy_set_header Host $host;

                add_header Cache-Control "public, max-age=31536000, immutable";
            }

            # Preview (1200px) - imgproxy v3 format
            location /preview/ {
                rewrite ^/preview/(.*)$ /unsafe/rs:fit:1200:1200/q:90/plain/s3://{{ .Values.bucket }}/$1 break;
                proxy_pass http://imgproxy;
                proxy_set_header Host $host;

                add_header Cache-Control "public, max-age=31536000, immutable";
            }

            # Gallery (600px) - imgproxy v3 format
            location /gallery/ {
                rewrite ^/gallery/(.*)$ /unsafe/rs:fit:600:600/q:88/plain/s3://{{ .Values.bucket }}/$1 break;
                proxy_pass http://imgproxy;
                proxy_set_header Host $host;

                add_header Cache-Control "public, max-age=31536000, immutable";
            }

            # Default - 404
            location / {
                return 404 'Not found';
            }
        }
    }
{{- end }}
