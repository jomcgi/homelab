{{- if .Values.imgproxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "trips.fullname" . }}-imgproxy
  labels:
    {{- include "trips.labels" . | nindent 4 }}
    app.kubernetes.io/component: imgproxy
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "trips.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: imgproxy
---
{{- end }}
{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "trips.fullname" . }}-nginx
  labels:
    {{- include "trips.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "trips.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
---
{{- end }}
{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "trips.fullname" . }}-api
  labels:
    {{- include "trips.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "trips.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
{{- end }}
