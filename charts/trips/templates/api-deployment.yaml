{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trips.fullname" . }}-api
  labels:
    {{- include "trips.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "trips.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "trips.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        # Mark NATS port as opaque for Linkerd
        config.linkerd.io/opaque-ports: "4222"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: NATS_URL
              value: {{ .Values.nats.url | quote }}
            - name: S3_ENDPOINT
              value: {{ .Values.seaweedfs.endpoint | quote }}
            - name: S3_BUCKET
              value: {{ .Values.bucket | quote }}
            - name: TRIP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.auth.secretName }}
                  key: {{ .Values.api.auth.secretKey }}
                  optional: true
            # CORS origins
            - name: CORS_ORIGINS
              value: "https://trips.jomcgi.dev,http://localhost:5173,http://localhost:3000"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
