{{- if .Values.imgproxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trips.fullname" . }}-imgproxy
  labels:
    {{- include "trips.labels" . | nindent 4 }}
    app.kubernetes.io/component: imgproxy
spec:
  replicas: {{ .Values.imgproxy.replicas }}
  selector:
    matchLabels:
      {{- include "trips.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: imgproxy
  template:
    metadata:
      labels:
        {{- include "trips.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: imgproxy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: imgproxy
          image: "{{ .Values.imgproxy.image.repository }}:{{ .Values.imgproxy.image.tag }}"
          imagePullPolicy: {{ .Values.imgproxy.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # S3 Configuration (SeaweedFS)
            - name: IMGPROXY_USE_S3
              value: "true"
            - name: IMGPROXY_S3_ENDPOINT
              value: {{ .Values.seaweedfs.endpoint | quote }}
            - name: IMGPROXY_S3_REGION
              value: "us-east-1"
            - name: AWS_ACCESS_KEY_ID
              value: "anonymous"
            - name: AWS_SECRET_ACCESS_KEY
              value: "anonymous"
            # Image Processing
            - name: IMGPROXY_QUALITY
              value: {{ .Values.imgproxy.config.quality | quote }}
            - name: IMGPROXY_FORMAT_QUALITY
              value: {{ .Values.imgproxy.config.formatQuality | quote }}
            - name: IMGPROXY_ENABLE_WEBP_DETECTION
              value: "true"
            - name: IMGPROXY_ENFORCE_WEBP
              value: "false"
            - name: IMGPROXY_CONCURRENCY
              value: {{ .Values.imgproxy.config.concurrency | quote }}
            - name: IMGPROXY_MAX_SRC_RESOLUTION
              value: {{ .Values.imgproxy.config.maxSrcResolution | quote }}
            - name: IMGPROXY_STRIP_METADATA
              value: "true"
            - name: IMGPROXY_STRIP_COLOR_PROFILE
              value: "false"
            # Security (internal only)
            - name: IMGPROXY_ALLOW_INSECURE_URLS
              value: "true"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.imgproxy.resources | nindent 12 }}
{{- end }}
