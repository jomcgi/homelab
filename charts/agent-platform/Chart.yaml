apiVersion: v2
name: agent-platform
description: Agent platform — umbrella chart bundling goose sandboxes, MCP servers, and supporting components
type: application
version: 0.6.0
appVersion: "0.1.0"
annotations:
  org.opencontainers.image.source: "https://github.com/jomcgi/homelab"
  org.opencontainers.image.licenses: "MPL-2.0"
dependencies:
  - name: context-forge
    version: "2.0.0"
    repository: "file://../context-forge"
    condition: contextForge.enabled

  - name: mcp-oauth-proxy
    version: "0.1.0"
    repository: "file://../mcp-oauth-proxy"
    condition: mcpOAuthProxy.enabled

  - name: agent-platform-mcp-servers
    version: "0.1.0"
    repository: "file://../agent-platform-mcp-servers"
    condition: agent-platform-mcp-servers.enabled
  - name: goose-sandboxes
    version: "0.1.0"
    repository: "file://../goose-sandboxes"
    condition: goose-sandboxes.enabled
  - name: agent-orchestrator
    version: "0.1.0"
    repository: "file://../agent-orchestrator"
    condition: agent-orchestrator.enabled
  - name: nats
    version: "2.12.3"
    repository: "https://nats-io.github.io/k8s/helm/charts/"
    condition: nats.enabled
  - name: agent-sandbox
    version: "0.1.0"
    repository: "file://../agent-sandbox"
    condition: agent-sandbox.enabled
