# ── Homelab environment values for agent-platform ─────────────────────────

# Top-level goose configuration (mirror into goose-sandboxes: below)
goose:
  image:
    repository: ghcr.io/jomcgi/homelab/goose-agent
    tag: main
  model: claude-sonnet-4-6
  provider: claude-code
  repo:
    owner: jomcgi
    name: homelab
  workspace:
    storageClassName: longhorn
    size: 20Gi

# Homelab uses 1Password Operator for secret management
secrets:
  useOnePassword: true
  claudeAuth:
    secretName: "claude-auth"
    key: "CLAUDE_AUTH_TOKEN"
  agentSecrets:
    secretName: "agent-secrets"
    keys:
      - GITHUB_TOKEN
      - BUILDBUDDY_API_KEY
  mcpTokens:
    secretName: "goose-mcp-tokens"
    key: "CI_DEBUG_MCP_TOKEN"

# ── MCP servers ────────────────────────────────────────────────────────────
agent-platform-mcp-servers:
  enabled: true
  servers:
    kubernetes-mcp:
      image:
        repository: ghcr.io/containers/kubernetes-mcp-server
        tag: "latest"
      port: 8080
      args:
        - "--port"
        - "8080"
        - "--disable-destructive"
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      rbac:
        clusterRoleRules:
          - apiGroups:
              [
                "",
                "apps",
                "batch",
                "networking.k8s.io",
                "rbac.authorization.k8s.io",
              ]
            resources: ["*"]
            verbs: ["get", "list", "watch"]
          - apiGroups: [""]
            resources: ["pods/exec", "pods/portforward", "pods/log"]
            verbs: ["create", "get"]
          - apiGroups: ["metrics.k8s.io"]
            resources: ["pods", "nodes"]
            verbs: ["get", "list"]

    argocd-mcp:
      image:
        repository: ghcr.io/argoproj-labs/mcp-for-argocd
        tag: "v0.5.0"
      port: 3000
      writableTmp: true
      env:
        - name: ARGOCD_BASE_URL
          value: "http://argocd-server.argocd.svc.cluster.local:80"
      secret:
        name: argocd-mcp
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi

# ── Goose sandboxes ────────────────────────────────────────────────────────
goose-sandboxes:
  enabled: true
  sandboxTemplate:
    image:
      repository: ghcr.io/jomcgi/homelab/goose-agent
      tag: main
    env:
      gooseProvider: claude-code
      gooseModel: claude-sonnet-4-6
      repoOwner: jomcgi
      repoName: homelab
    workspace:
      storageClassName: longhorn
      size: 20Gi
    extraEnv:
      - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
        value: "http://signoz-otel-collector.signoz.svc.cluster.local:4318"
      - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
        value: "http://signoz-otel-collector.signoz.svc.cluster.local:4318"
      - name: OTEL_EXPORTER_OTLP_LOGS_ENDPOINT
        value: "http://signoz-otel-collector.signoz.svc.cluster.local:4318"
      - name: OTEL_TRACES_EXPORTER
        value: "otlp"
      - name: OTEL_METRICS_EXPORTER
        value: "otlp"
      - name: OTEL_LOGS_EXPORTER
        value: "otlp"
      - name: OTEL_SERVICE_NAME
        value: "goose-agent"
      - name: OTEL_RESOURCE_ATTRIBUTES
        value: "service.namespace=goose-sandboxes,deployment.environment=prod"
  secrets:
    useOnePassword: true
    claudeAuth:
      onePasswordItem: litellm-claude-auth
      vault: k8s-homelab
      secretName: "claude-auth"
      key: "CLAUDE_AUTH_TOKEN"
    agentSecrets:
      onePasswordItem: agent-secrets
      vault: k8s-homelab
      secretName: "agent-secrets"
    mcpTokens:
      onePasswordItem: goose-mcp-tokens
      vault: k8s-homelab
      secretName: "goose-mcp-tokens"
      key: "CI_DEBUG_MCP_TOKEN"
