agent-platform-mcp-servers:
  enabled: true
  servers:
    kubernetes-mcp:
      image:
        repository: ghcr.io/containers/kubernetes-mcp-server
        tag: "latest"
      port: 8080
      args:
        - "--port"
        - "8080"
        - "--disable-destructive"
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      rbac:
        clusterRoleRules:
          - apiGroups:
              ["", "apps", "batch", "networking.k8s.io", "rbac.authorization.k8s.io"]
            resources: ["*"]
            verbs: ["get", "list", "watch"]
          - apiGroups: [""]
            resources: ["pods/exec", "pods/portforward", "pods/log"]
            verbs: ["create", "get"]
          - apiGroups: ["metrics.k8s.io"]
            resources: ["pods", "nodes"]
            verbs: ["get", "list"]

    argocd-mcp:
      image:
        repository: ghcr.io/argoproj-labs/mcp-for-argocd
        tag: "v0.5.0"
      port: 3000
      writableTmp: true
      env:
        - name: ARGOCD_BASE_URL
          value: "http://argocd-server.argocd.svc.cluster.local:80"
      secret:
        name: argocd-mcp
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
