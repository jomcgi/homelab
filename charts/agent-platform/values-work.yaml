# ── Work cluster values for agent-platform (Semgrep) ─────────────────────
# Fill in the REQUIRED fields below before deploying.
# Create K8s Secrets manually (no 1Password Operator at work cluster):
#   kubectl create secret generic claude-auth --from-literal=CLAUDE_AUTH_TOKEN=<token>
#   kubectl create secret generic agent-secrets --from-literal=GITHUB_TOKEN=<token>
#   kubectl create secret generic goose-mcp-tokens --from-literal=CI_DEBUG_MCP_TOKEN=""
# Note: BUILDBUDDY_API_KEY is not needed on the work cluster — it is optional in the chart.
# ──────────────────────────────────────────────────────────────────────────

# Top-level goose configuration (mirror into goose-sandboxes: below)
goose:
  image:
    repository: ghcr.io/jomcgi/homelab/goose-agent # public GHCR image, fine for work cluster
    tag: main
  model: claude-sonnet-4-6
  provider: claude-code
  repo:
    owner: "" # REQUIRED: fill in your GitHub org/user
    name: "" # REQUIRED: fill in your repository name
  workspace:
    storageClassName: "" # REQUIRED: fill in your cluster's storage class

# No 1Password Operator at work — use pre-existing K8s Secrets
secrets:
  useOnePassword: false
  claudeAuth:
    secretName: "claude-auth"
    key: "CLAUDE_AUTH_TOKEN"
  agentSecrets:
    secretName: "agent-secrets"
    keys:
      - GITHUB_TOKEN
  mcpTokens:
    secretName: "goose-mcp-tokens"
    key: "CI_DEBUG_MCP_TOKEN"

# ── Context Forge and OAuth Proxy — disabled at work cluster by default ────
contextForge:
  enabled: false
mcpOAuthProxy:
  enabled: false

# ── MCP servers — kubernetes-mcp and argocd-mcp are universal ─────────────
# servers uses a LIST (not a map) so Image Updater write-back can target
# entries by index: agent-platform-mcp-servers.servers[N].image.tag
agent-platform-mcp-servers:
  enabled: true
  servers:
    - name: kubernetes-mcp
      image:
        repository: ghcr.io/containers/kubernetes-mcp-server
        tag: "latest"
      port: 8080
      args:
        - "--port"
        - "8080"
        - "--disable-destructive"
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      rbac:
        clusterRoleRules:
          - apiGroups:
              [
                "",
                "apps",
                "batch",
                "networking.k8s.io",
                "rbac.authorization.k8s.io",
              ]
            resources: ["*"]
            verbs: ["get", "list", "watch"]
          - apiGroups: [""]
            resources: ["pods/exec", "pods/portforward", "pods/log"]
            verbs: ["create", "get"]
          - apiGroups: ["metrics.k8s.io"]
            resources: ["pods", "nodes"]
            verbs: ["get", "list"]

    - name: argocd-mcp
      image:
        repository: ghcr.io/argoproj-labs/mcp-for-argocd
        tag: "v0.5.0"
      port: 3000
      writableTmp: true
      env:
        - name: ARGOCD_BASE_URL
          value: "http://argocd-server.argocd.svc.cluster.local:80"
      secret:
        name: argocd-mcp
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi

# ── Goose sandboxes ────────────────────────────────────────────────────────
goose-sandboxes:
  enabled: true
  sandboxTemplate:
    image:
      repository: ghcr.io/jomcgi/homelab/goose-agent # public GHCR image
      tag: main
    env:
      gooseProvider: claude-code
      gooseModel: claude-sonnet-4-6
      repoOwner: "" # REQUIRED: fill in your GitHub org/user
      repoName: "" # REQUIRED: fill in your repository name
    workspace:
      storageClassName: "" # REQUIRED: fill in your cluster's storage class
      size: 10Gi
    # No BuildBuddy, no homelab-specific OTel annotations
    extraEnv: []
  secrets:
    useOnePassword: false
    claudeAuth:
      secretName: "claude-auth"
      key: "CLAUDE_AUTH_TOKEN"
    agentSecrets:
      secretName: "agent-secrets"
    mcpTokens:
      secretName: "goose-mcp-tokens"
      key: "CI_DEBUG_MCP_TOKEN"
