# Gateway API resource configuration
# Environment-specific overrides live in overlays/<env>/cloudflare-gateway/values.yaml

gatewayClass:
  name: homelab
  # Envoy Gateway controller name — must match the EnvoyGateway config
  controllerName: gateway.envoyproxy.io/gatewayclass-controller

gateway:
  name: homelab-gateway
  namespace: gateway
  # HTTP listener only for Phase 1; TLS termination deferred
  listener:
    port: 80

# HTTPRoutes to deploy (Phase 1 pilot routes)
# Each route entry creates an HTTPRoute and, if the backend is in a different
# namespace than the Gateway, a ReferenceGrant in the backend namespace.
routes: []
