{{- /*
Each route creates an HTTPRoute in the backend's namespace.
The HTTPRoute's parentRef points to the Gateway (cross-namespace is permitted by
the Gateway's allowedRoutes.namespaces.from: All).
The backendRef is in the same namespace as the HTTPRoute, so no ReferenceGrant needed.
*/}}
{{- range .Values.routes }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  namespace: {{ .backendNamespace }}
  labels:
    {{- include "cloudflare-gateway.labels" $ | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $.Values.gateway.name }}
      namespace: {{ $.Values.gateway.namespace }}
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - {{ .hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ .backendService }}
          port: {{ .backendPort }}
{{- end }}
