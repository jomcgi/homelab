rules:
  - id: no-print-in-service
    patterns:
      - pattern: print(...)
    message: >
      Use the `logging` module instead of `print()` in service code.
      `print()` is not structured, not configurable, and bypasses log-level
      filtering. Replace with `logger.info(...)`, `logger.warning(...)`, etc.
    languages: [python]
    severity: WARNING
    metadata:
      category: maintainability
      subcategory: logging
      confidence: HIGH
      likelihood: MEDIUM
      impact: LOW
      technology: [python]
      description: Avoid print() in services; use structured logging
    paths:
      include:
        - "services/**/*.py"
