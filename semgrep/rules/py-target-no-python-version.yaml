rules:
  - id: py-target-no-python-version
    patterns:
      - pattern: |
          py_binary(
            name = $NAME,
            ...
          )
      - pattern-not: |
          py_binary(
            name = $NAME,
            ...,
            python_version = ...,
            ...
          )
    message: >
      `py_binary` target `$NAME` is missing `python_version`. Without it Bazel
      uses the toolchain default, making the build non-hermetic — different
      developers or CI machines may use different Python interpreters. Set
      `python_version = "PY3"` (or the specific version required by the
      project) to ensure reproducible builds.
    languages: [python]
    severity: WARNING
    metadata:
      category: build
      subcategory: bazel
      confidence: HIGH
      likelihood: LOW
      impact: MEDIUM
      technology: [bazel, python]
      description: py_binary/py_library missing python_version makes build non-hermetic
    paths:
      include:
        - "**/BUILD"
        - "**/BUILD.bazel"
