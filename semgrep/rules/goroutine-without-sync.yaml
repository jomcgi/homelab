rules:
  - id: goroutine-without-sync
    patterns:
      - pattern: |
          go func() {
            ...
          }()
      - pattern-not-inside: |
          var $WG sync.WaitGroup
          ...
          go func() {
            ...
          }()
      - pattern-not-inside: |
          $WG := sync.WaitGroup{}
          ...
          go func() {
            ...
          }()
      - pattern-not-inside: |
          $G, $CTX = errgroup.WithContext(...)
          ...
          go func() {
            ...
          }()
      - pattern-not-inside: |
          $G := errgroup.Group{}
          ...
          go func() {
            ...
          }()
      - pattern-not-inside: |
          $G.Go(func() error {
            ...
          })
    message: >
      Anonymous goroutine launched without a `sync.WaitGroup` or
      `errgroup.Group` nearby. Without synchronisation the caller cannot wait
      for the goroutine to complete, cannot propagate errors, and the goroutine
      may outlive the parent process — causing goroutine leaks, data races on
      shared state, and panics after the main function returns. Use
      `errgroup.WithContext` for structured concurrency, or track with a
      `WaitGroup` when errors are not needed.
    languages: [go]
    severity: WARNING
    metadata:
      category: correctness
      subcategory: concurrency
      confidence: LOW
      likelihood: MEDIUM
      impact: HIGH
      technology: [go]
      description: Goroutine launched without errgroup/WaitGroup — risk of goroutine leak
