apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: service-ingress
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: https://github.com/jomcgi/homelab
    targetRevision: HEAD
    path: charts/cloudflare-tunnel
    helm:
      releaseName: service-ingress
      valueFiles:
        - values.yaml
        - ../../overlays/homelab-prod/cloudflare-tunnel/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod-cloudflare-tunnel
  syncPolicy:
    automated:
      prune: true
      selfHeal: true