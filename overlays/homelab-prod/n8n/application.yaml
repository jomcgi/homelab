apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 8gears.container-registry.com/library
    targetRevision: 1.0.15
    chart: n8n
    helm:
      releaseName: n8n
      values: |
        # Basic configuration
        replicaCount: 1

        image:
          repository: n8nio/n8n
          pullPolicy: IfNotPresent

        service:
          type: ClusterIP
          port: 80

        ingress:
          enabled: false

        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi

        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          fsGroup: 1000
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: false

        podSecurityContext:
          runAsNonRoot: true
          runAsUser: 1000
          fsGroup: 1000

        persistence:
          enabled: true
          storageClass: "longhorn"
          size: 10Gi

        n8n:
          database:
            type: sqlite
          basicAuth:
            enabled: false
          env:
            EXECUTIONS_MODE: regular
            GENERIC_TIMEZONE: America/Los_Angeles
            TZ: America/Los_Angeles
            N8N_SECURE_COOKIE: "false"
            EXECUTIONS_DATA_SAVE_ON_ERROR: all
            EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
            EXECUTIONS_DATA_SAVE_ON_PROGRESS: true
            EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: true

        livenessProbe:
          enabled: true
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30

        readinessProbe:
          enabled: true
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10

        podDisruptionBudget:
          enabled: false

        autoscaling:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: n8n
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true