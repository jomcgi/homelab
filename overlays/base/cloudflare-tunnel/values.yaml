secret:
  type: onepassword
  onepassword:
    itemPath: "vaults/k8s-$(OVERLAY_NAME)/items/cloudflare-tunnel"

podSecurityContext: {}

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop:
    - ALL
  seccompProfile:
    type: RuntimeDefault

fullnameOverride: "cloudflared"

service:
  type: ClusterIP
  port: 2000

namespace:
  create: true
  name: cloudflare-tunnel

livenessProbe:
  httpGet:
    path: /ready
    port: 2000
  failureThreshold: 1
  initialDelaySeconds: 10
  periodSeconds: 10

metrics:
  enabled: true
  address: "0.0.0.0:2000"

image:
  repository: cloudflare/cloudflared
  tag: "2025.4.0"
  pullPolicy: IfNotPresent

replicaCount: 2

ingress:
  routes: []
  catchAll:
    service: http_status:404