                "query": "SELECT `env` AS \"Deployment Environment\", metric_name AS \"Noramalized Metric Name\", `service.name` AS \"Service Name\", if(ceiling(divide(min(diff), 1000)) > 86400000, -1, ceiling(divide(min(diff), 1000))) AS max_diff_in_secs FROM (SELECT `env`, metric_name, `service.name`, unix_milli - lagInFrame(unix_milli, 1, 0) OVER rate_window AS diff FROM signoz_metrics.distributed_samples_v4 INNER JOIN (SELECT DISTINCT `env`, metric_name, JSONExtractString(labels, 'service.name') AS `service.name`, anyLast(fingerprint) AS fingerprint FROM signoz_metrics.time_series_v4_1day WHERE metric_name NOT LIKE 'signoz_%' AND (unix_milli >= intDiv($start_timestamp_ms, 86400000) * 86400000) AND (unix_milli < $end_timestamp_ms) GROUP BY `env`, metric_name, `service.name`) AS filtered_time_series USING fingerprint WHERE unix_milli >= (toUnixTimestamp(now() - toIntervalMinute(30)) * 1000) WINDOW rate_window as ( PARTITION BY fingerprint ORDER BY fingerprint, unix_milli)) WHERE diff > 0 GROUP BY `env`, metric_name, `service.name` ORDER BY `env`, metric_name, `service.name`"
              }
            ],
