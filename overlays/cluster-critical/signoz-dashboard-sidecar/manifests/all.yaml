# Source: signoz-dashboard-sidecar/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: signoz-dashboard-sidecar
  namespace: signoz
  labels:
    helm.sh/chart: signoz-dashboard-sidecar-0.1.0
    app.kubernetes.io/name: signoz-dashboard-sidecar
    app.kubernetes.io/instance: signoz-dashboard-sidecar
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: signoz-dashboard-sidecar
      app.kubernetes.io/instance: signoz-dashboard-sidecar
  template:
    metadata:
      labels:
        helm.sh/chart: signoz-dashboard-sidecar-0.1.0
        app.kubernetes.io/name: signoz-dashboard-sidecar
        app.kubernetes.io/instance: signoz-dashboard-sidecar
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: signoz-dashboard-sidecar
      securityContext:
        fsGroup: 65534
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: signoz-dashboard-sidecar
          image: "ghcr.io/jomcgi/homelab/signoz-dashboard-sidecar:0.1.0"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          env:
            - name: SIGNOZ_URL
              value: "http://signoz-query-service.signoz.svc.cluster.local:8080"
            - name: WATCH_NAMESPACE
              value: ""
            - name: STATE_NAMESPACE
              value: "signoz"
            - name: RECONCILE_INTERVAL
              value: "5m"
            - name: METRICS_ADDR
              value: ":9090"
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
