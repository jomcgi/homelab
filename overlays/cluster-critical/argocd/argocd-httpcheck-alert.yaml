apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-httpcheck-alert
  namespace: argocd
  labels:
    signoz.io/alert: "true"
  annotations:
    signoz.io/alert-name: "ArgoCD Unreachable"
    signoz.io/severity: "critical"
    signoz.io/notification-channels: "incidentio"
data:
  alert.json: |
    {
      "alert": "ArgoCD Unreachable",
      "alertType": "METRICS_BASED_ALERT",
      "ruleType": "threshold_rule",
      "version": "v5",
      "broadcastToAll": false,
      "disabled": false,
      "evalWindow": "10m0s",
      "frequency": "2m0s",
      "severity": "critical",
      "labels": {
        "service": "argocd",
        "environment": "production"
      },
      "annotations": {
        "summary": "ArgoCD at argocd.jomcgi.dev is unreachable",
        "description": "HTTP health check has failed 5 consecutive times over 10 minutes"
      },
      "condition": {
        "compositeQuery": {
          "queries": [
            {
              "type": "builder_query",
              "spec": {
                "name": "A",
                "signal": "metrics",
                "stepInterval": 60,
                "aggregations": [
                  {
                    "timeAggregation": "avg",
                    "spaceAggregation": "max",
                    "metricName": "httpcheck.status"
                  }
                ],
                "filter": {
                  "expression": "http.url = 'https://argocd.jomcgi.dev'"
                },
                "groupBy": [],
                "order": [],
                "disabled": false
              }
            }
          ],
          "panelType": "graph",
          "queryType": "builder"
        },
        "selectedQueryName": "A",
        "op": "2",
        "target": 1,
        "matchType": "5",
        "targetUnit": "",
        "thresholds": {
          "kind": "basic",
          "spec": [
            {
              "name": "critical",
              "target": 1,
              "targetUnit": "",
              "matchType": "5",
              "op": "2",
              "channels": ["incidentio"]
            }
          ]
        }
      },
      "preferredChannels": ["incidentio"]
    }
