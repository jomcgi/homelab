---
# ArgoCD Image Updater GitHub Token
# Permissions: read:packages (GHCR) + repo write (Git write-back)
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: argocd-image-updater-token
  namespace: argocd
spec:
  itemPath: "vaults/k8s-homelab/items/argocd-image-updater"
---
# GHCR Pull Secret (for Kubernetes image pulls)
# Permissions: read:packages only (least privilege)
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: ghcr-pull-secret
  namespace: argocd
spec:
  itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"
