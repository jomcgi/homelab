gateway-helm:
  config:
    envoyGateway:
      gateway:
        controllerName: gateway.envoyproxy.io/gatewayclass-controller

# Enable OTEL tracing to SigNoz
gateway:
  tracing:
    enabled: true

# Enable HTTPRoutes with all cluster services
httpRoutes:
  enabled: true
  routes:
    - name: argocd
      hostname: argocd.jomcgi.dev
      serviceName: argocd-server
      serviceNamespace: argocd
      servicePort: 80
    - name: longhorn
      hostname: longhorn.jomcgi.dev
      serviceName: longhorn-frontend
      serviceNamespace: longhorn
      servicePort: 80
    - name: n8n
      hostname: n8n.jomcgi.dev
      serviceName: n8n
      serviceNamespace: n8n
      servicePort: 80
    - name: freshrss
      hostname: feeds.jomcgi.dev
      serviceName: freshrss
      serviceNamespace: freshrss
      servicePort: 80
    - name: signoz
      hostname: signoz.jomcgi.dev
      serviceName: signoz
      serviceNamespace: signoz
      servicePort: 8080
    - name: ttyd
      hostname: code.jomcgi.dev
      serviceName: ttyd-session-manager-frontend
      serviceNamespace: ttyd-sessions
      servicePort: 80
      timeout: 90s  # WebSocket support
