apiVersion: v1
kind: ConfigMap
metadata:
  name: trips-pages-httpcheck-alert
  namespace: signoz
  labels:
    signoz.io/alert: "true"
  annotations:
    signoz.io/alert-name: "trips.jomcgi.dev Unreachable"
    signoz.io/severity: "warning"
    signoz.io/notification-channels: "pagerduty-homelab"
data:
  alert.json: |
    {
      "alert": "trips.jomcgi.dev Unreachable",
      "alertType": "METRICS_BASED_ALERT",
      "ruleType": "threshold_rule",
      "broadcastToAll": false,
      "disabled": false,
      "evalWindow": "10m0s",
      "frequency": "2m0s",
      "severity": "warning",
      "labels": {
        "service": "trips-pages",
        "environment": "production",
        "type": "cloudflare-pages"
      },
      "annotations": {
        "summary": "trips.jomcgi.dev is unreachable",
        "description": "HTTP health check has failed 5 consecutive times over 10 minutes."
      },
      "condition": {
        "compositeQuery": {
          "builderQueries": {
            "A": {
              "queryName": "A",
              "dataSource": "metrics",
              "aggregateOperator": "avg",
              "aggregateAttribute": {
                "key": "httpcheck.status",
                "dataType": "float64",
                "type": "Gauge"
              },
              "filters": {
                "items": [
                  {
                    "key": {"key": "http.url"},
                    "op": "=",
                    "value": "https://trips.jomcgi.dev"
                  }
                ]
              }
            }
          },
          "queryType": "builder"
        },
        "op": "<",
        "target": 1,
        "matchType": "5"
      },
      "preferredChannels": ["pagerduty-homelab"]
    }
