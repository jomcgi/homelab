apiVersion: v1
kind: ConfigMap
metadata:
  name: signoz-clickhouse-operator-etc-templatesd-files
  namespace: signoz
  labels:
    helm.sh/chart: clickhouse-24.1.18
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/instance: signoz
