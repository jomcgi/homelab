signoz:
  clickhouse:
    resources:
      requests:
        cpu: 2
        memory: 4Gi
      limits:
        cpu: 4
        memory: 8Gi
    persistence:
      size: 150Gi
    # System table TTL settings (days) - prevents unbounded growth
    clickhouseOperator:
      queryLog:
        ttl: 7
      partLog:
        ttl: 7
      traceLog:
        ttl: 3
      metricLog:
        ttl: 7
      asynchronousMetricLog:
        ttl: 7
      sessionLog:
        ttl: 7
      zookeeperLog:
        ttl: 7
      processorsProfileLog:
        ttl: 3
      queryViewsLog:
        ttl: 7
  zookeeper:
    resources:
      requests:
        cpu: 100m
        memory: 1Gi
      limits:
        cpu: 1
        memory: 1.5Gi
  otelCollector:
    resources:
      requests:
        cpu: 200m
        memory: 2Gi
      limits:
        cpu: 2
        memory: 2Gi
  k8sInfra:
    otelAgent:
      resources:
        requests:
          cpu: 100m
          memory: 300Mi
        limits:
          cpu: 500m
          memory: 400Mi
