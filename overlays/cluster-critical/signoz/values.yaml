# k8s-infra subchart configuration
k8s-infra:
  otelAgent:
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        cpu: 500m
        memory: 500Mi
  otelDeployment:
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        cpu: 500m
        memory: 400Mi
    config:
      receivers:
        # Prometheus scraper for NATS JetStream metrics
        prometheus/nats:
          config:
            scrape_configs:
              - job_name: "nats"
                scrape_interval: 30s
                static_configs:
                  - targets:
                      - "nats.nats.svc.cluster.local:7777"
                    labels:
                      service: nats
      service:
        pipelines:
          # Add NATS metrics to the scraper pipeline
          metrics/scraper:
            receivers:
              - prometheus/nats
            processors:
              - k8sattributes
              - resourcedetection
              - batch
            exporters:
              - otlp

signoz:
  clickhouse:
    resources:
      requests:
        cpu: 2
        memory: 3Gi
      limits:
        cpu: 4
        memory: 8Gi
    persistence:
      size: 150Gi
    # System table TTL settings (days) - prevents unbounded growth
    clickhouseOperator:
      queryLog:
        ttl: 7
      partLog:
        ttl: 7
      traceLog:
        ttl: 3
      metricLog:
        ttl: 7
      asynchronousMetricLog:
        ttl: 7
      sessionLog:
        ttl: 7
      zookeeperLog:
        ttl: 7
      processorsProfileLog:
        ttl: 3
      queryViewsLog:
        ttl: 7
    # Zookeeper is a subchart of clickhouse
    zookeeper:
      resources:
        requests:
          cpu: 100m
          memory: 1Gi
        limits:
          cpu: 1
          memory: 1.5Gi
  otelCollector:
    resources:
      requests:
        cpu: 200m
        memory: 2Gi
      limits:
        cpu: 2
        memory: 4Gi
  k8sInfra:
    otelAgent:
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
        limits:
          cpu: 500m
          memory: 500Mi
    otelDeployment:
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
        limits:
          cpu: 500m
          memory: 400Mi
