apiVersion: v1
kind: ConfigMap
metadata:
  name: node-pid-pressure-alert
  namespace: signoz
  labels:
    signoz.io/alert: "true"
  annotations:
    signoz.io/alert-name: "Node PID Pressure"
    signoz.io/severity: "warning"
    signoz.io/notification-channels: "pagerduty-homelab"
data:
  alert.json: |
    {
      "alert": "Node PID Pressure",
      "alertType": "METRICS_BASED_ALERT",
      "ruleType": "threshold_rule",
      "broadcastToAll": false,
      "disabled": false,
      "evalWindow": "5m0s",
      "frequency": "1m0s",
      "severity": "warning",
      "labels": {
        "category": "node-health",
        "environment": "production"
      },
      "annotations": {
        "summary": "Node {{ $labels.k8s_node_name }} has PID pressure",
        "description": "Kubernetes node {{ $labels.k8s_node_name }} is under PID pressure condition"
      },
      "condition": {
        "compositeQuery": {
          "builderQueries": {
            "A": {
              "queryName": "A",
              "dataSource": "metrics",
              "aggregateOperator": "max",
              "aggregateAttribute": {
                "key": "k8s.node.condition_pid_pressure",
                "dataType": "float64",
                "type": "Gauge"
              },
              "filters": {
                "items": []
              },
              "groupBy": [
                {"key": "k8s.node.name"}
              ]
            }
          },
          "queryType": "builder"
        },
        "op": ">",
        "target": 0,
        "matchType": "3"
      },
      "preferredChannels": ["pagerduty-homelab"]
    }
