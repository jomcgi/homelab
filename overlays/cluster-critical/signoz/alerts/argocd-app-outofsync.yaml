apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-app-outofsync-alert
  namespace: signoz
  labels:
    signoz.io/alert: "true"
  annotations:
    signoz.io/alert-name: "ArgoCD App OutOfSync"
    signoz.io/severity: "warning"
    signoz.io/notification-channels: "pagerduty-homelab"
data:
  alert.json: |
    {
      "alert": "ArgoCD App OutOfSync",
      "alertType": "METRICS_BASED_ALERT",
      "ruleType": "threshold_rule",
      "broadcastToAll": false,
      "disabled": false,
      "evalWindow": "5m0s",
      "frequency": "1m0s",
      "severity": "warning",
      "labels": {
        "service": "argocd",
        "category": "gitops"
      },
      "annotations": {
        "summary": "ArgoCD application is out of sync",
        "description": "ArgoCD application {{ $labels.name }} is OutOfSync for more than 5 minutes"
      },
      "condition": {
        "compositeQuery": {
          "builderQueries": {
            "A": {
              "queryName": "A",
              "dataSource": "metrics",
              "aggregateOperator": "count",
              "aggregateAttribute": {
                "key": "argocd_app_info",
                "dataType": "float64",
                "type": "Gauge"
              },
              "filters": {
                "items": [
                  {
                    "key": {"key": "sync_status"},
                    "op": "=",
                    "value": "OutOfSync"
                  }
                ]
              },
              "groupBy": [
                {"key": "name"},
                {"key": "namespace"}
              ]
            }
          },
          "queryType": "builder"
        },
        "op": ">",
        "target": 0,
        "matchType": "1"
      },
      "preferredChannels": ["pagerduty-homelab"]
    }
