apiVersion: v1
kind: ConfigMap
metadata:
  name: pod-restart-rate-alert
  namespace: signoz
  labels:
    signoz.io/alert: "true"
  annotations:
    signoz.io/alert-name: "Pod High Restart Rate"
    signoz.io/severity: "warning"
    signoz.io/notification-channels: "pagerduty-homelab"
data:
  alert.json: |
    {
      "alert": "Pod High Restart Rate",
      "alertType": "METRICS_BASED_ALERT",
      "ruleType": "threshold_rule",
      "version": "v5",
      "broadcastToAll": false,
      "disabled": false,
      "evalWindow": "15m0s",
      "frequency": "1m0s",
      "severity": "warning",
      "labels": {
        "category": "pod-health",
        "environment": "production"
      },
      "annotations": {
        "summary": "Pod {{ $labels.k8s_pod_name }} has high restart rate",
        "description": "Pod {{ $labels.k8s_pod_name }} in namespace {{ $labels.k8s_namespace_name }} has restarted more than 3 times in 15 minutes"
      },
      "condition": {
        "compositeQuery": {
          "queries": [
            {
              "type": "builder_query",
              "spec": {
                "name": "A",
                "signal": "metrics",
                "stepInterval": 60,
                "aggregations": [
                  {
                    "timeAggregation": "max",
                    "spaceAggregation": "max",
                    "metricName": "k8s.container.restarts"
                  }
                ],
                "filters": {
                  "items": [],
                  "op": "AND"
                },
                "groupBy": [
                  {
                    "name": "k8s.namespace.name",
                    "dataType": "string",
                    "type": "resource",
                    "isColumn": false
                  },
                  {
                    "name": "k8s.pod.name",
                    "dataType": "string",
                    "type": "resource",
                    "isColumn": false
                  }
                ],
                "order": [],
                "disabled": false
              }
            }
          ],
          "panelType": "graph",
          "queryType": "builder"
        },
        "selectedQueryName": "A",
        "thresholds": {
          "kind": "basic",
          "spec": [
            {
              "name": "warning",
              "target": 3,
              "targetUnit": "",
              "matchType": "1",
              "op": ">",
              "channels": ["pagerduty-homelab"]
            }
          ]
        }
      },
      "preferredChannels": ["pagerduty-homelab"]
    }
