apiVersion: v1
kind: ConfigMap
metadata:
  name: node-not-ready-alert
  namespace: signoz
  labels:
    signoz.io/alert: "true"
  annotations:
    signoz.io/alert-name: "Node Not Ready"
    signoz.io/severity: "critical"
    signoz.io/notification-channels: "pagerduty-homelab"
data:
  alert.json: |
    {
      "alert": "Node Not Ready",
      "alertType": "METRICS_BASED_ALERT",
      "ruleType": "threshold_rule",
      "broadcastToAll": false,
      "disabled": false,
      "evalWindow": "5m0s",
      "frequency": "1m0s",
      "severity": "critical",
      "labels": {
        "category": "node-health",
        "environment": "production"
      },
      "annotations": {
        "summary": "Node {{ $labels.k8s_node_name }} is not Ready",
        "description": "Kubernetes node {{ $labels.k8s_node_name }} is not in Ready condition for 5 consecutive checks"
      },
      "condition": {
        "compositeQuery": {
          "builderQueries": {
            "A": {
              "queryName": "A",
              "dataSource": "metrics",
              "aggregateOperator": "min",
              "aggregateAttribute": {
                "key": "k8s.node.condition_ready",
                "dataType": "float64",
                "type": "Gauge"
              },
              "filters": {
                "items": []
              },
              "groupBy": [
                {"key": "k8s.node.name"}
              ]
            }
          },
          "queryType": "builder"
        },
        "op": "<",
        "target": 1,
        "matchType": "5"
      },
      "preferredChannels": ["pagerduty-homelab"]
    }
