apiVersion: v1
kind: ConfigMap
metadata:
  name: pod-oomkilled-alert
  namespace: signoz
  labels:
    signoz.io/alert: "true"
  annotations:
    signoz.io/alert-name: "Pod OOMKilled"
    signoz.io/severity: "critical"
    signoz.io/notification-channels: "pagerduty-homelab"
data:
  alert.json: |
    {
      "alert": "Pod OOMKilled",
      "alertType": "METRICS_BASED_ALERT",
      "ruleType": "threshold_rule",
      "broadcastToAll": false,
      "disabled": false,
      "evalWindow": "5m0s",
      "frequency": "1m0s",
      "severity": "critical",
      "labels": {
        "category": "pod-health",
        "environment": "production"
      },
      "annotations": {
        "summary": "Container {{ $labels.k8s_container_name }} was OOMKilled",
        "description": "Container {{ $labels.k8s_container_name }} in pod {{ $labels.k8s_pod_name }} namespace {{ $labels.k8s_namespace_name }} was terminated due to OOM"
      },
      "condition": {
        "compositeQuery": {
          "builderQueries": {
            "A": {
              "queryName": "A",
              "dataSource": "metrics",
              "aggregateOperator": "max",
              "aggregateAttribute": {
                "key": "k8s.container.restarts",
                "dataType": "float64",
                "type": "Gauge"
              },
              "filters": {
                "items": [
                  {
                    "key": {"key": "k8s.container.status.last_terminated_reason"},
                    "op": "=",
                    "value": "OOMKilled"
                  }
                ]
              },
              "groupBy": [
                {"key": "k8s.namespace.name"},
                {"key": "k8s.pod.name"},
                {"key": "k8s.container.name"}
              ]
            }
          },
          "queryType": "builder"
        },
        "op": ">",
        "target": 0,
        "matchType": "1"
      },
      "preferredChannels": ["pagerduty-homelab"]
    }
