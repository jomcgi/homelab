apiVersion: v1
kind: ConfigMap
metadata:
  name: pod-oomkilled-alert
  namespace: signoz
  labels:
    signoz.io/alert: "true"
  annotations:
    signoz.io/alert-name: "Pod OOMKilled"
    signoz.io/severity: "critical"
    signoz.io/notification-channels: "pagerduty-homelab"
data:
  alert.json: |
    {
      "alert": "Pod OOMKilled",
      "alertType": "METRICS_BASED_ALERT",
      "ruleType": "threshold_rule",
      "version": "v5",
      "broadcastToAll": false,
      "disabled": false,
      "evalWindow": "5m0s",
      "frequency": "1m0s",
      "severity": "critical",
      "labels": {
        "category": "pod-health",
        "environment": "production"
      },
      "annotations": {
        "summary": "Container {{ $labels.k8s_container_name }} was OOMKilled",
        "description": "Container {{ $labels.k8s_container_name }} in pod {{ $labels.k8s_pod_name }} namespace {{ $labels.k8s_namespace_name }} was terminated due to OOM"
      },
      "condition": {
        "compositeQuery": {
          "queries": [
            {
              "type": "builder_query",
              "spec": {
                "name": "A",
                "signal": "metrics",
                "stepInterval": 60,
                "aggregations": [
                  {
                    "timeAggregation": "max",
                    "spaceAggregation": "max",
                    "metricName": "k8s.container.restarts"
                  }
                ],
                "filters": {
                  "items": [
                    {
                      "key": {
                        "key": "k8s.container.status.last_terminated_reason",
                        "dataType": "string",
                        "type": "resource",
                        "isColumn": false
                      },
                      "op": "=",
                      "value": "OOMKilled"
                    }
                  ],
                  "op": "AND"
                },
                "groupBy": [
                  {
                    "name": "k8s.namespace.name",
                    "dataType": "string",
                    "type": "resource",
                    "isColumn": false
                  },
                  {
                    "name": "k8s.pod.name",
                    "dataType": "string",
                    "type": "resource",
                    "isColumn": false
                  },
                  {
                    "name": "k8s.container.name",
                    "dataType": "string",
                    "type": "resource",
                    "isColumn": false
                  }
                ],
                "order": [],
                "disabled": false
              }
            }
          ],
          "panelType": "graph",
          "queryType": "builder"
        },
        "selectedQueryName": "A",
        "thresholds": {
          "kind": "basic",
          "spec": [
            {
              "name": "critical",
              "target": 0,
              "targetUnit": "",
              "matchType": "1",
              "op": ">",
              "channels": ["pagerduty-homelab"]
            }
          ]
        }
      },
      "preferredChannels": ["pagerduty-homelab"]
    }
