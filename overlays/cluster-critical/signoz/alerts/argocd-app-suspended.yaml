apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-app-suspended-alert
  namespace: signoz
  labels:
    signoz.io/alert: "true"
  annotations:
    signoz.io/alert-name: "ArgoCD App Suspended"
    signoz.io/severity: "info"
    signoz.io/notification-channels: "pagerduty-homelab"
data:
  alert.json: |
    {
      "alert": "ArgoCD App Suspended",
      "alertType": "METRICS_BASED_ALERT",
      "ruleType": "threshold_rule",
      "version": "v5",
      "broadcastToAll": false,
      "disabled": false,
      "evalWindow": "10m0s",
      "frequency": "1m0s",
      "severity": "info",
      "labels": {
        "service": "argocd",
        "category": "gitops"
      },
      "annotations": {
        "summary": "ArgoCD application is suspended",
        "description": "ArgoCD application {{ $labels.name }} has been Suspended for more than 10 minutes"
      },
      "condition": {
        "compositeQuery": {
          "queries": [
            {
              "type": "builder_query",
              "spec": {
                "name": "A",
                "signal": "metrics",
                "stepInterval": 60,
                "aggregations": [
                  {
                    "timeAggregation": "count",
                    "spaceAggregation": "sum",
                    "metricName": "argocd_app_info"
                  }
                ],
                "filters": {
                  "items": [
                    {
                      "key": {
                        "key": "health_status",
                        "dataType": "string",
                        "type": "tag",
                        "isColumn": false
                      },
                      "op": "=",
                      "value": "Suspended"
                    }
                  ],
                  "op": "AND"
                },
                "groupBy": [
                  {
                    "name": "name",
                    "dataType": "string",
                    "type": "tag",
                    "isColumn": false
                  },
                  {
                    "name": "namespace",
                    "dataType": "string",
                    "type": "tag",
                    "isColumn": false
                  }
                ],
                "order": [],
                "disabled": false
              }
            }
          ],
          "panelType": "graph",
          "queryType": "builder"
        },
        "selectedQueryName": "A",
        "thresholds": {
          "kind": "basic",
          "spec": [
            {
              "name": "info",
              "target": 0,
              "targetUnit": "",
              "matchType": "1",
              "op": ">",
              "channels": ["pagerduty-homelab"]
            }
          ]
        }
      },
      "preferredChannels": ["pagerduty-homelab"]
    }
