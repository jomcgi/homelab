# Kyverno Policy Engine Configuration
# Automatically enforces policies cluster-wide (imagePullSecrets, security, etc.)

# Admission controller configuration
admissionController:
  replicas: 2
  priorityClassName: system-cluster-critical

  # Resource limits
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  # Spread admission webhook pods across nodes for HA
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: admission-controller

  # Security context
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

# Background controller for existing resources
backgroundController:
  enabled: true
  replicas: 1
  priorityClassName: system-cluster-critical

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

# Cleanup controller for policy reports
cleanupController:
  enabled: true
  replicas: 1
  priorityClassName: system-cluster-critical

  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 20m
      memory: 64Mi

# Reports controller for policy results
reportsController:
  enabled: true
  replicas: 1
  priorityClassName: system-cluster-critical

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

# Features
features:
  # Enable auto-generation of policies for pod controllers
  autoUpdateWebhooks:
    enabled: true

  # Policy exception support
  policyExceptions:
    enabled: true
    namespace: kyverno

# Metrics and monitoring
metricsService:
  enabled: true

# CRD installation
crds:
  install: true

# Namespace exclusions (don't apply policies here)
config:
  excludeKyvernoNamespace: true
  # Exclude system namespaces from most policies
  resourceFilters:
    - "[*,kube-system,*]"
    - "[*,kube-public,*]"
    - "[*,kube-node-lease,*]"
    - "[Event,*,*]"
    - "[Node,*,*]"
    - "[APIService,*,*]"
    - "[TokenReview,*,*]"
    - "[SubjectAccessReview,*,*]"
    - "[SelfSubjectAccessReview,*,*]"
    - "[Binding,*,*]"
    - "[ReplicaSet,*,*]"
    - "[AdmissionReport,*,*]"
    - "[ClusterAdmissionReport,*,*]"
    - "[BackgroundScanReport,*,*]"
    - "[ClusterBackgroundScanReport,*,*]"
