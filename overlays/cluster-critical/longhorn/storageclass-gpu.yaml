apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-gpu
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  # Single replica - GPU workloads typically run on a single node
  numberOfReplicas: "1"

  # Target node-4 which has the GPU
  nodeSelector: "kubernetes.io/hostname:node-4"

  # Use the fast NVMe disks on node-4
  diskSelector: "nvme,gpu"

  # Standard settings
  staleReplicaTimeout: "30"
  fromBackup: ""
  fsType: "ext4"
  dataLocality: "strict-local" # Keep data on same node as workload
  unmapMarkSnapChainRemoved: "ignored"
  disableRevisionCounter: "true"
  dataEngine: "v1"
