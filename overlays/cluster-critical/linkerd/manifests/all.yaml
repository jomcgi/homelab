                                            `/abc`, but the path `/abcd` would not.
                                            \n Request Path | Prefix Match | Replace
                                            Prefix | Modified Path -------------|--------------|----------------|----------
                                            /foo/bar     | /foo         | /xyz           |
                                            /xyz/bar /foo/bar     | /foo         |
                                            /xyz/          | /xyz/bar /foo/bar     |
                                            /foo/        | /xyz           | /xyz/bar
                                            /foo/bar     | /foo/        | /xyz/          |
                                            /xyz/bar /foo         | /foo         |
                                            /xyz           | /xyz /foo/        | /foo
