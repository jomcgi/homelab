apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bazel-cache-seeder
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    targetRevision: main
    path: charts/bazel-cache-seeder
    helm:
      valueFiles:
        - values.yaml
        - ../../overlays/cluster-critical/bazel-cache-seeder/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: gh-arc  # Same namespace as runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false  # Namespace created by gh-arc-runners
