# Cluster-specific overrides for Bazel cache seeder

# Run daily at 3am (more frequent than weekly default)
cronjob:
  schedule: "0 3 * * *"

# Use existing image pull secret from gh-arc-runners
imagePullSecrets:
  - name: ghcr-imagepull-secret

# BuildBuddy disabled - not needed for cache seeding
# (CI runners still use BuildBuddy via user.bazelrc in GitHub Actions)
buildbuddy:
  enabled: false

# Larger cache for production use
persistence:
  size: 50Gi
  annotations:
    # Three replicas for better availability
    longhorn.io/numberOfReplicas: "3"
