apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-sandbox
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    path: charts/agent-sandbox
    targetRevision: HEAD
    helm:
      releaseName: agent-sandbox
      valueFiles:
        - values.yaml
        - ../../overlays/cluster-critical/agent-sandbox/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-sandbox-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
