apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openhands
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    path: charts/openhands
    targetRevision: HEAD
    helm:
      releaseName: openhands
      valueFiles:
        - values.yaml
        - ../../overlays/prod/openhands/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: openhands
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
