# Image pull secret for GHCR
imagePullSecret:
  enabled: true

# 1Password secret paths
secrets:
  claudeSdkToken:
    itemPath: "vaults/k8s-homelab/items/openhands-claude-proxy"
  openhandsSecrets:
    itemPath: "vaults/k8s-homelab/items/openhands"

# Kubernetes runtime
kubernetes:
  pvcStorageClass: "longhorn"

# Workspace persistence
app:
  persistence:
    storageClass: "longhorn"
