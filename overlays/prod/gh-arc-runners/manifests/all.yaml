# GHCR Pull Secret (for Kubernetes image pulls)
# Allows runners to pull private images from GitHub Container Registry
# Type: kubernetes.io/dockerconfigjson (used for imagePullSecrets)
apiVersion: onepassword.com/v1
kind: OnePasswordItem
type: kubernetes.io/dockerconfigjson
metadata:
  name: ghcr-imagepull-secret
  namespace: gh-arc-runners
  labels:
    app.kubernetes.io/name: gh-arc-runners
    app.kubernetes.io/instance: gh-arc-runners
    app.kubernetes.io/managed-by: Helm
spec:
  itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"
