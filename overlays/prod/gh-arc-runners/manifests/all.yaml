# Source: gh-arc-runners/templates/bazel-cache-pvc.yaml
# Persistent volume for Bazel repository cache
# Shared across all runners with ReadWriteMany for concurrent access
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bazel-repository-cache
  namespace: gh-arc-runners
  labels:
    app.kubernetes.io/name: gh-arc-runners
    app.kubernetes.io/instance: gh-arc-runners
    app.kubernetes.io/managed-by: Helm
spec:
  accessModes:
    - ReadWriteMany  # Multiple runners can mount simultaneously
  storageClassName: longhorn
  resources:
    requests:
      storage: 50Gi
