# Source: gh-arc-runners/charts/gha-runner-scale-set/templates/autoscalingrunnerset.yaml
apiVersion: actions.github.com/v1alpha1
kind: AutoscalingRunnerSet
metadata:
  name: homelab-runners
  namespace: gh-arc-runners
  labels:
    app.kubernetes.io/component: "autoscaling-runner-set"
    helm.sh/chart: gha-rs-0.9.3
    app.kubernetes.io/name: homelab-runners
    app.kubernetes.io/instance: homelab-runners
    app.kubernetes.io/version: "0.9.3"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: gha-rs
    actions.github.com/scale-set-name: homelab-runners
    actions.github.com/scale-set-namespace: gh-arc-runners
  annotations:
    actions.github.com/values-hash: f717c37dd975defa854b4f4821595339c6c02933468eba54386c9fdf1d6ff64
    actions.github.com/cleanup-manager-role-binding: homelab-runners-gha-rs-manager
    actions.github.com/cleanup-manager-role-name: homelab-runners-gha-rs-manager
    actions.github.com/cleanup-no-permission-service-account-name: homelab-runners-gha-rs-no-permission
spec:
  githubConfigUrl: https://github.com/jomcgi/homelab
  githubConfigSecret: gh-arc-secret
  runnerScaleSetName: homelab-runners
  maxRunners: 10
  minRunners: 1
  listenerTemplate:
    spec:
      securityContext:
        runAsNonRoot: true #:
      containers:
      - name: listener
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true

  template:
    spec:
      imagePullSecrets: 
        - name: ghcr-imagepull-secret
      securityContext: 
        fsGroup: 1001
      restartPolicy: Never
      serviceAccountName: homelab-runners-gha-rs-no-permission
      initContainers:
      - name: init-dind-externals
        
        image: ghcr.io/jomcgi/homelab/gh-arc-runner:latest
        command: ["cp"]
        args: ["-r", "-v", "/home/runner/externals/.", "/home/runner/tmpDir/"]
        volumeMounts:
          - name: dind-externals
            mountPath: /home/runner/tmpDir
      containers:
      - securityContext:
          allowPrivilegeEscalation: false
        name: runner
        
        command: 
          - /home/runner/run.sh
        image: 
          ghcr.io/jomcgi/homelab/gh-arc-runner:latest
        resources: 
          limits:
            ephemeral-storage: 100Gi
            memory: 8Gi
          requests:
            cpu: 4000m
            ephemeral-storage: 100Gi
            memory: 8Gi
        env:
          - name: DOCKER_HOST
            value: unix:///var/run/docker.sock
          - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
            value: "120"
        volumeMounts:
          - 
            mountPath: /mnt/bazel-cache
            name: bazel-cache
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /var/run
      - name: dind
        image: docker:dind
        args:
          - dockerd
          - --host=unix:///var/run/docker.sock
          - --group=$(DOCKER_GROUP_GID)
        env:
          - name: DOCKER_GROUP_GID
            value: "123"
        securityContext:
          allowPrivilegeEscalation: false #:
          privileged: true
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /var/run
          - name: dind-externals
            mountPath: /home/runner/externals
      
      volumes:
      - name: dind-sock
        emptyDir: {}
      - name: dind-externals
        emptyDir: {}
      
      - name: work
        emptyDir: {}
      
      - 
        name: bazel-cache
        persistentVolumeClaim:
          claimName: bazel-repository-cache
---
