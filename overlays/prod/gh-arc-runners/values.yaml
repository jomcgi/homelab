# Self-hosted GitHub Actions runners with persistent Bazel cache
# Supports Docker-in-Docker for container builds

# Persistent Bazel repository cache (safe to share between runners)
# IMPORTANT: Only repository_cache is shared. output_base uses per-runner ephemeral storage
# because it contains locks and per-runner state that cannot be shared.
bazelCache:
  enabled: true
  size: 10Gi  # ~5Gi for repository downloads, headroom for growth
  storageClassName: longhorn

secret:
  # Create the secret via OnePasswordItem
  create: true
  type: onepassword
  onepassword:
    itemPath: "vaults/k8s-homelab/items/gh-arc"

imagePullSecret:
  enabled: true
  # Create the secret via OnePasswordItem
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

github:
  configUrl: "https://github.com/jomcgi/homelab"

controller:
  namespace: "gh-arc-controller"
  serviceAccountName: "arc-controller"
  secretName: "gh-arc-secret"

gha-runner-scale-set:
  githubConfigUrl: "https://github.com/jomcgi/homelab"
  runnerScaleSetName: "homelab-runners"
  minRunners: 1
  maxRunners: 10

  controllerServiceAccount:
    namespace: "gh-arc-controller"
    name: "arc-controller"

  # Enable Docker-in-Docker for container builds
  containerMode:
    type: "dind"

  # Runner pod template
  template:
    spec:
      imagePullSecrets:
      - name: ghcr-imagepull-secret

      # Set fsGroup so mounted volumes are writable by runner user
      # Remove runAsNonRoot from pod level to allow DinD and init containers to run
      securityContext:
        runAsNonRoot: false  # Override default - set per-container instead
        fsGroup: 1001        # runner user GID (for volume permissions)

      containers:
      - name: runner
        # Security context for runner container (runs as non-root)
        securityContext:
          runAsUser: 1001   # runner user UID
          runAsGroup: 1001  # runner user GID
          runAsNonRoot: true
          allowPrivilegeEscalation: false
        image: ghcr.io/jomcgi/homelab/gh-arc-runner:latest
        command: ["/home/runner/run.sh"]

        resources:
          limits:
            memory: 8Gi     # Increased for Bazel with shared output_base cache
            ephemeral-storage: 100Gi  # Disk space for build artifacts in /home/runner/_work
          requests:
            cpu: 4000m      # 4 CPUs for parallel builds
            memory: 8Gi
            ephemeral-storage: 100Gi  # Reserve disk space for Bazel builds

        volumeMounts:
        - name: bazel-cache
          mountPath: /mnt/bazel-cache

      volumes:
      - name: bazel-cache
        persistentVolumeClaim:
          claimName: bazel-repository-cache

  listenerTemplate:
    spec:
      securityContext:
        runAsNonRoot: true #:
      containers:
      - name: listener
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
