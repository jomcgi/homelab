# Self-hosted GitHub Actions runners with remote cache
# Supports Docker-in-Docker for container builds with Bazel remote cache

secret:
  # Create the secret via OnePasswordItem
  create: true
  type: onepassword
  onepassword:
    itemPath: "vaults/k8s-homelab/items/gh-arc"

imagePullSecret:
  enabled: true
  # Create the secret via OnePasswordItem
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

github:
  configUrl: "https://github.com/jomcgi/homelab"

controller:
  namespace: "gh-arc-controller"
  serviceAccountName: "arc-controller"
  secretName: "gh-arc-secret"

gha-runner-scale-set:
  githubConfigUrl: "https://github.com/jomcgi/homelab"
  runnerScaleSetName: "homelab-runners"
  minRunners: 1
  maxRunners: 10

  controllerServiceAccount:
    namespace: "gh-arc-controller"
    name: "arc-controller"

  # Enable Docker-in-Docker for container image builds
  containerMode:
    type: "dind"

  # Runner pod template
  template:
    spec:
      imagePullSecrets:
      - name: ghcr-imagepull-secret

      # Shared read-only Bazel repository cache (external dependencies)
      # Mounted separately from output base to allow Bazel writes to output base
      volumes:
      - name: bazel-repo-cache
        persistentVolumeClaim:
          claimName: bazel-cache-seeder-cache
          readOnly: true

      containers:
      - name: runner
        image: ghcr.io/jomcgi/homelab/gh-arc-runner:latest
        command: ["/home/runner/run.sh"]

        # Mount shared repository cache at separate path (read-only)
        # Bazel configured via .bazelrc to use --repository_cache=/mnt/bazel-repo-cache/repository_cache
        # Output base remains on writable ephemeral storage at /home/runner/.cache/bazel
        volumeMounts:
        - name: bazel-repo-cache
          mountPath: /mnt/bazel-repo-cache
          readOnly: true

        resources:
          limits:
            memory: 2Gi     # More memory for parallel builds
          requests:
            cpu: 1000m
            memory: 2Gi

  listenerTemplate:
    spec:
      containers:
      - name: listener
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
