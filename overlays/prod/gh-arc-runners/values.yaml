# Self-hosted GitHub Actions runners with remote cache
# Supports Docker-in-Docker for container builds with Bazel remote cache

secret:
  # Create the secret via OnePasswordItem
  create: true
  type: onepassword
  onepassword:
    itemPath: "vaults/k8s-homelab/items/gh-arc"

imagePullSecret:
  enabled: true
  # Create the secret via OnePasswordItem
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

github:
  configUrl: "https://github.com/jomcgi/homelab"

controller:
  namespace: "gh-arc-controller"
  serviceAccountName: "arc-controller"
  secretName: "gh-arc-secret"

gha-runner-scale-set:
  githubConfigUrl: "https://github.com/jomcgi/homelab"
  runnerScaleSetName: "homelab-runners"
  minRunners: 1
  maxRunners: 10

  controllerServiceAccount:
    namespace: "gh-arc-controller"
    name: "arc-controller"

  # Enable Docker-in-Docker for container image builds
  containerMode:
    type: "dind"

  # Runner pod template
  # Note: Heavy builds (build/test/push) run on BuildBuddy Workflows with persistent VMs
  # Self-hosted runners only run lightweight tasks (format checks) that don't need cache
  template:
    spec:
      imagePullSecrets:
      - name: ghcr-imagepull-secret

      containers:
      - name: runner
        image: ghcr.io/jomcgi/homelab/gh-arc-runner:latest
        command: ["/home/runner/run.sh"]

        resources:
          limits:
            memory: 1Gi     # Reduced - only running format checks now
          requests:
            cpu: 500m
            memory: 1Gi

  listenerTemplate:
    spec:
      containers:
      - name: listener
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
