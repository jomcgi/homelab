# Self-hosted GitHub Actions runners
# Supports Docker-in-Docker for container builds

# Bazel cache configured via volumeClaimTemplates in gha-runner-scale-set.template
# Each runner gets its own RWO PVC (avoids Longhorn RWX I/O errors)
# Shared PVC approach disabled - see volumeClaimTemplates below
bazelCache:
  enabled: false

secret:
  # Create the secret via OnePasswordItem
  create: true
  type: onepassword
  onepassword:
    itemPath: "vaults/k8s-homelab/items/gh-arc"

imagePullSecret:
  enabled: true
  # Create the secret via OnePasswordItem
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

github:
  configUrl: "https://github.com/jomcgi/homelab"

controller:
  namespace: "gh-arc-controller"
  serviceAccountName: "arc-controller"
  secretName: "gh-arc-secret"

gha-runner-scale-set:
  githubConfigUrl: "https://github.com/jomcgi/homelab"
  runnerScaleSetName: "homelab-runners"
  minRunners: 1
  maxRunners: 2

  controllerServiceAccount:
    namespace: "gh-arc-controller"
    name: "arc-controller"

  # Enable Docker-in-Docker for container builds
  containerMode:
    type: "dind"

  # Runner pod template
  template:
    spec:
      imagePullSecrets:
      - name: ghcr-imagepull-secret

      # Remove runAsNonRoot from pod level to allow DinD containers to run
      securityContext:
        runAsNonRoot: false  # Override default - set per-container instead

      containers:
      - name: runner
        # Security context for runner container (runs as non-root)
        securityContext:
          runAsUser: 1001   # runner user UID
          runAsGroup: 1001  # runner user GID
          runAsNonRoot: true
          allowPrivilegeEscalation: false
        image: ghcr.io/jomcgi/homelab/gh-arc-runner:latest
        command: ["/home/runner/run.sh"]

        resources:
          limits:
            memory: 8Gi
            ephemeral-storage: 100Gi  # Disk space for build artifacts
          requests:
            cpu: 4000m      # 4 CPUs for parallel builds
            memory: 8Gi
            ephemeral-storage: 100Gi

        volumeMounts:
        - name: bazel-cache
          mountPath: /home/runner/.cache/bazel

      # Per-runner persistent cache (like StatefulSet volumeClaimTemplates)
      # Each runner pod gets its own RWO PVC for Bazel cache
      volumeClaimTemplates:
      - metadata:
          name: bazel-cache
        spec:
          accessModes: ["ReadWriteOnce"]
          storageClassName: longhorn
          resources:
            requests:
              storage: 50Gi

  listenerTemplate:
    spec:
      securityContext:
        runAsNonRoot: true #:
      containers:
      - name: listener
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
