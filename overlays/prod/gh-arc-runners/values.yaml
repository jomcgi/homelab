# Self-hosted GitHub Actions runners with remote cache
# Supports Docker-in-Docker for container builds with Bazel remote cache

# Persistent Bazel repository cache (shared across all runners)
bazelCache:
  enabled: true
  size: 10Gi
  storageClassName: longhorn

secret:
  # Create the secret via OnePasswordItem
  create: true
  type: onepassword
  onepassword:
    itemPath: "vaults/k8s-homelab/items/gh-arc"

imagePullSecret:
  enabled: true
  # Create the secret via OnePasswordItem
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

github:
  configUrl: "https://github.com/jomcgi/homelab"

controller:
  namespace: "gh-arc-controller"
  serviceAccountName: "arc-controller"
  secretName: "gh-arc-secret"

gha-runner-scale-set:
  githubConfigUrl: "https://github.com/jomcgi/homelab"
  runnerScaleSetName: "homelab-runners"
  minRunners: 1
  maxRunners: 10

  controllerServiceAccount:
    namespace: "gh-arc-controller"
    name: "arc-controller"

  # Enable Docker-in-Docker for container builds
  containerMode:
    type: "dind"

  # Runner pod template
  template:
    spec:
      imagePullSecrets:
      - name: ghcr-imagepull-secret

      # Set fsGroup so mounted volumes are writable by runner user
      securityContext:
        fsGroup: 1001  # runner user GID

      containers:
      - name: runner
        image: ghcr.io/jomcgi/homelab/gh-arc-runner:latest
        command: ["/home/runner/run.sh"]

        resources:
          limits:
            memory: 4Gi     # Increased for analysis + builds
          requests:
            cpu: 4000m      # 4 CPUs for parallel builds
            memory: 4Gi

        volumeMounts:
        - name: bazel-cache
          mountPath: /mnt/bazel-cache

      volumes:
      - name: bazel-cache
        persistentVolumeClaim:
          claimName: bazel-repository-cache

  listenerTemplate:
    spec:
      containers:
      - name: listener
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
