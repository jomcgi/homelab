# Self-hosted GitHub Actions runners with remote cache
# Supports Docker-in-Docker for container builds with Bazel remote cache

secret:
  # Create the secret via OnePasswordItem
  create: true
  type: onepassword
  onepassword:
    itemPath: "vaults/k8s-homelab/items/gh-arc"

imagePullSecret:
  enabled: true
  # Create the secret via OnePasswordItem
  create: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

github:
  configUrl: "https://github.com/jomcgi/homelab"

controller:
  namespace: "gh-arc-controller"
  serviceAccountName: "arc-controller"
  secretName: "gh-arc-secret"

gha-runner-scale-set:
  githubConfigUrl: "https://github.com/jomcgi/homelab"
  runnerScaleSetName: "homelab-runners"
  minRunners: 1
  maxRunners: 10

  controllerServiceAccount:
    namespace: "gh-arc-controller"
    name: "arc-controller"

  # Enable Docker-in-Docker for container image builds
  containerMode:
    type: "dind"

  # Runner pod template
  template:
    spec:
      imagePullSecrets:
      - name: ghcr-imagepull-secret

      # Shared Bazel repository cache source (read-only PVC)
      volumes:
      - name: bazel-repo-cache-source
        persistentVolumeClaim:
          claimName: bazel-cache-seeder-cache
          readOnly: true

      # Init container to copy shared cache to writable location
      initContainers:
      - name: copy-cache
        image: ghcr.io/jomcgi/homelab/gh-arc-runner:latest
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          echo "Copying shared repository cache to writable location..."
          mkdir -p /home/runner/.cache/bazel/repository_cache
          if [ -d /mnt/bazel-repo-cache-source/repository_cache ]; then
            rsync -a --info=progress2 /mnt/bazel-repo-cache-source/repository_cache/ /home/runner/.cache/bazel/repository_cache/
            echo "Cache copy complete. Size:"
            du -sh /home/runner/.cache/bazel/repository_cache
          else
            echo "Source cache not found, starting with empty cache"
          fi
        volumeMounts:
        - name: bazel-repo-cache-source
          mountPath: /mnt/bazel-repo-cache-source
          readOnly: true
        - name: work
          mountPath: /home/runner

      containers:
      - name: runner
        image: ghcr.io/jomcgi/homelab/gh-arc-runner:latest
        command: ["/home/runner/run.sh"]

        # No volume mounts needed - cache copied to writable location by init container

        resources:
          limits:
            memory: 2Gi     # More memory for parallel builds
          requests:
            cpu: 1000m
            memory: 2Gi

  listenerTemplate:
    spec:
      containers:
      - name: listener
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
