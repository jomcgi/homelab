# Environment-specific values for gh-arc-runners

secret:
  type: onepassword
  onepassword:
    itemPath: "vaults/k8s-homelab/items/gh-arc"

imagePullSecret:
  enabled: true
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

github:
  configUrl: "https://github.com/jomcgi/homelab"

controller:
  namespace: "gh-arc-controller"
  serviceAccountName: "arc-controller"
  secretName: "gh-arc-secret"

runners:
  name: "homelab-runners"
  minRunners: 0
  maxRunners: 3

gha-runner-scale-set:
  githubConfigUrl: "https://github.com/jomcgi/homelab"
  runnerScaleSetName: "homelab-runners"
  minRunners: 0
  maxRunners: 3

  controllerServiceAccount:
    namespace: "gh-arc-controller"
    name: "arc-controller"

  # Override to use standard runner image (no build tools needed)
  # Custom Bazel image only needed for bazel-runner
  template:
    spec:
      containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
