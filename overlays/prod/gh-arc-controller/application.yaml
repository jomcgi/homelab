apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gh-arc-controller
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab
    targetRevision: HEAD
    path: charts/gh-arc-controller
    helm:
      releaseName: gh-arc-controller
      valueFiles:
        - values.yaml
        - ../../overlays/prod/gh-arc-controller/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: gh-arc-controller
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
