apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gh-arc-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    targetRevision: HEAD
    path: charts/gh-arc-controller
    helm:
      releaseName: gh-arc-controller
      valueFiles:
        - values.yaml
        - ../../overlays/prod/gh-arc-controller/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: gh-arc-controller

  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/preserveUnknownFields

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
