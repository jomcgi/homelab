# Source: gh-arc-controller/charts/gha-runner-scale-set-controller/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gh-arc-controller-gha-rs-controller
  namespace: gh-arc-controller
  labels:
    helm.sh/chart: gha-rs-controller-0.9.3
    app.kubernetes.io/name: gha-rs-controller
    app.kubernetes.io/namespace: gh-arc-controller
    app.kubernetes.io/instance: gh-arc-controller
    app.kubernetes.io/version: "0.9.3"
    app.kubernetes.io/part-of: gha-rs-controller
    app.kubernetes.io/managed-by: Helm
    actions.github.com/controller-service-account-namespace: gh-arc-controller
    actions.github.com/controller-service-account-name: arc-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gha-rs-controller
      app.kubernetes.io/namespace: gh-arc-controller
      app.kubernetes.io/instance: gh-arc-controller
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: "manager"
      labels:
        app.kubernetes.io/part-of: gha-rs-controller
        app.kubernetes.io/component: controller-manager
        app.kubernetes.io/version: 0.9.3
        app.kubernetes.io/name: gha-rs-controller
        app.kubernetes.io/namespace: gh-arc-controller
        app.kubernetes.io/instance: gh-arc-controller
    spec:
      serviceAccountName: arc-controller
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: manager
        image: "ghcr.io/actions/gha-runner-scale-set-controller:0.9.3"
        imagePullPolicy: IfNotPresent
        args:
        - "--auto-scaling-runner-set-only"
        - "--log-level=debug"
        - "--log-format=text"
        - "--update-strategy=immediate"
        - "--listener-metrics-addr=:8080"
        - "--listener-metrics-endpoint=/metrics"
        - "--metrics-addr=:8080"
        - "--exclude-label-propagation-prefix=argocd.argoproj.io"
        - "--exclude-label-propagation-prefix=app.kubernetes.io"
        command:
        - "/manager"
        ports:
        - containerPort: 8080
          protocol: TCP
          name: metrics
        env:
        - name: CONTROLLER_MANAGER_CONTAINER_IMAGE
          value: "ghcr.io/actions/gha-runner-scale-set-controller:0.9.3"
        - name: CONTROLLER_MANAGER_POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
        securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      terminationGracePeriodSeconds: 10
      volumes:
      - name: tmp
        emptyDir: {}
