# Environment-specific values for gh-arc-controller

secret:
  type: onepassword
  onepassword:
    itemPath: "vaults/k8s-homelab/items/gh-arc"

gha-runner-scale-set-controller:
  flags:
    excludeLabelPropagationPrefixes:
      - "argocd.argoproj.io"
      - "app.kubernetes.io"

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
