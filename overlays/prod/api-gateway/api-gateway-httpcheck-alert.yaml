apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-httpcheck-alert
  namespace: api-gateway
  labels:
    signoz.io/alert: "true"
  annotations:
    signoz.io/alert-name: "api-gateway Unreachable"
    signoz.io/severity: "critical"
    signoz.io/notification-channels: "pagerduty-homelab"
data:
  alert.json: |
    {
      "alert": "api-gateway Unreachable",
      "alertType": "METRICS_BASED_ALERT",
      "ruleType": "threshold_rule",
      "broadcastToAll": false,
      "disabled": false,
      "evalWindow": "10m0s",
      "frequency": "2m0s",
      "severity": "critical",
      "labels": {
        "service": "api-gateway",
        "environment": "production"
      },
      "annotations": {
        "summary": "api-gateway at https://api.jomcgi.dev/status.json is unreachable",
        "description": "HTTP health check has failed 5 consecutive times over 10 minutes. This could indicate the service is down or Cloudflare auth is failing (3xx redirect)."
      },
      "condition": {
        "compositeQuery": {
          "builderQueries": {
            "A": {
              "queryName": "A",
              "dataSource": "metrics",
              "aggregateOperator": "avg",
              "aggregateAttribute": {
                "key": "httpcheck.status",
                "dataType": "float64",
                "type": "Gauge"
              },
              "filters": {
                "items": [
                  {
                    "key": {"key": "http.url"},
                    "op": "=",
                    "value": "https://api.jomcgi.dev/status.json"
                  }
                ]
              }
            }
          },
          "queryType": "builder"
        },
        "op": "<",
        "target": 1,
        "matchType": "5"
      },
      "preferredChannels": ["pagerduty-homelab"]
    }
