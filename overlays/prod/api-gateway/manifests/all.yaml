# Source: api-gateway/templates/collector-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-collector
  labels:
    helm.sh/chart: api-gateway-0.1.0
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/instance: api-gateway
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
data:
  collect.sh: |
    #!/bin/sh
    set -e

    OUTPUT_FILE="/data/status.json"
    TEMP_FILE="/data/status.json.tmp"

    # Count control-plane nodes
    CP_TOTAL=$(kubectl get nodes -l node-role.kubernetes.io/control-plane=true --no-headers 2>/dev/null | wc -l | tr -d ' ')
    CP_READY=$(kubectl get nodes -l node-role.kubernetes.io/control-plane=true --no-headers 2>/dev/null | grep -c ' Ready' || echo "0")

    # Count GPU nodes (have nvidia.com/gpu.present label)
    GPU_TOTAL=$(kubectl get nodes -l nvidia.com/gpu.present=true --no-headers 2>/dev/null | wc -l | tr -d ' ')
    GPU_READY=$(kubectl get nodes -l nvidia.com/gpu.present=true --no-headers 2>/dev/null | grep -c ' Ready' || echo "0")

    # Get CPU average from metrics-server
    CPU_AVG=$(kubectl top nodes --no-headers 2>/dev/null | awk '{sum += $3} END {if (NR > 0) printf "%.0f", sum/NR; else print "0"}' | tr -d '%' || echo "0")

    # Get memory usage
    MEM_USED_MI=$(kubectl top nodes --no-headers 2>/dev/null | awk '{
      val = $4
      if (index(val, "Gi") > 0) { gsub("Gi", "", val); sum += val * 1024 }
      else if (index(val, "Mi") > 0) { gsub("Mi", "", val); sum += val }
    } END { printf "%.0f", sum }' || echo "0")
    MEM_USED_GB=$(awk "BEGIN {printf \"%.1f\", $MEM_USED_MI / 1024}")

    # Get total memory from node capacity
    MEM_TOTAL_KI=$(kubectl get nodes -o jsonpath='{range .items[*]}{.status.capacity.memory}{" "}{end}' 2>/dev/null | awk '{
      for (i=1; i<=NF; i++) {
        val = $i
        if (index(val, "Ki") > 0) { gsub("Ki", "", val); sum += val }
        else if (index(val, "Gi") > 0) { gsub("Gi", "", val); sum += val * 1024 * 1024 }
      }
    } END { printf "%.0f", sum }' || echo "0")
    MEM_TOTAL_GB=$(awk "BEGIN {printf \"%.0f\", $MEM_TOTAL_KI / 1024 / 1024}")

    # Try to get GPU utilization from DCGM exporter
    GPU_UTIL=""
    if [ "$GPU_TOTAL" -gt 0 ]; then
      DCGM_METRICS=$(curl -s --connect-timeout 2 http://nvidia-dcgm-exporter.gpu-operator.svc:9400/metrics 2>/dev/null || echo "")
      if [ -n "$DCGM_METRICS" ]; then
        GPU_UTIL=$(echo "$DCGM_METRICS" | grep "^DCGM_FI_DEV_GPU_UTIL" | awk '{sum += $2; count++} END {if (count > 0) printf "%.0f", sum/count}')
      fi
    fi

    # Generate timestamp
    TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

    # Build JSON with optional GPU field
    if [ -n "$GPU_UTIL" ]; then
      printf '{"updated_at":"%s","nodes":{"cp":{"total":%s,"ready":%s},"gpu":{"total":%s,"ready":%s}},"cpu":%s,"mem":{"used":%s,"total":%s},"gpu":%s}\n' \
        "$TIMESTAMP" "$CP_TOTAL" "$CP_READY" "$GPU_TOTAL" "$GPU_READY" "$CPU_AVG" "$MEM_USED_GB" "$MEM_TOTAL_GB" "$GPU_UTIL" > "$TEMP_FILE"
    else
      printf '{"updated_at":"%s","nodes":{"cp":{"total":%s,"ready":%s},"gpu":{"total":%s,"ready":%s}},"cpu":%s,"mem":{"used":%s,"total":%s}}\n' \
        "$TIMESTAMP" "$CP_TOTAL" "$CP_READY" "$GPU_TOTAL" "$GPU_READY" "$CPU_AVG" "$MEM_USED_GB" "$MEM_TOTAL_GB" > "$TEMP_FILE"
    fi

    # Atomic move
    mv "$TEMP_FILE" "$OUTPUT_FILE"
    echo "Updated $OUTPUT_FILE at $TIMESTAMP"
---
# Source: api-gateway/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-nginx
  labels:
    helm.sh/chart: api-gateway-0.1.0
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/instance: api-gateway
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent"';

        access_log /dev/stdout main;

        sendfile on;
        keepalive_timeout 65;

        # Temp paths for non-root
        client_body_temp_path /tmp/client_temp;
        proxy_temp_path /tmp/proxy_temp;
        fastcgi_temp_path /tmp/fastcgi_temp;
        uwsgi_temp_path /tmp/uwsgi_temp;
        scgi_temp_path /tmp/scgi_temp;

        server {
            listen 8080;
            server_name _;

            # Health check
            location /health {
                access_log off;
                return 200 'ok';
                add_header Content-Type text/plain;
            }

            # Cluster info endpoint - serve static JSON
            location = /cluster-info {
                alias /data/status.json;
                default_type application/json;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Access-Control-Allow-Origin "*";
            }

            # Legacy endpoint for backwards compatibility
            location = /status.json {
                alias /data/status.json;
                default_type application/json;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Access-Control-Allow-Origin "*";
            }

            # Trips API - proxy to trips-nginx
            location /trips/ {
                proxy_pass http://trips-nginx.trips.svc.cluster.local:80/;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # WebSocket support
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_read_timeout 86400;
            }

            # Root - return API info
            location = / {
                default_type application/json;
                return 200 '{"service":"api-gateway","endpoints":["/cluster-info","/trips/"]}';
            }

            # Catch-all 404
            location / {
                return 404 '{"error":"not found"}';
                default_type application/json;
            }
        }
    }
