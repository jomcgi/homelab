apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    helm.sh/chart: api-gateway-0.1.0
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/instance: api-gateway
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
      app.kubernetes.io/instance: api-gateway
  template:
    metadata:
      annotations:
        checksum/nginx-config: 4a7b9030d1948c6a730ad5571acee63d0d70248327c56d43ce1c6521c7d2e7b6
        checksum/collector-config: 50e58317f126dbd6eab4c35d6ead79e6931990a2d49dc1af40a8476cda72d432
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/instance: api-gateway
    spec:
      serviceAccountName: api-gateway
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: nginx-config
          configMap:
            name: api-gateway-nginx
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: collector-script
          configMap:
            name: api-gateway-collector
            defaultMode: 0755
      initContainers:
        # Run collector once before nginx starts to ensure status.json exists
        - name: init-collector
          image: "bitnami/kubectl:latest"
          imagePullPolicy: IfNotPresent
          command: ["/scripts/collect.sh"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: collector-script
              mountPath: /scripts
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: [ALL]
          resources:
            limits:
              cpu: 50m
              memory: 32Mi
            requests:
              cpu: 5m
              memory: 16Mi
      containers:
        - name: nginx
          image: "nginx:1.27-alpine"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: [ALL]
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
        - name: collector
          image: "bitnami/kubectl:latest"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                /scripts/collect.sh
                sleep 5
              done
          volumeMounts:
            - name: data
              mountPath: /data
            - name: collector-script
              mountPath: /scripts
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: [ALL]
          resources:
            limits:
              cpu: 50m
              memory: 32Mi
            requests:
              cpu: 5m
              memory: 16Mi
