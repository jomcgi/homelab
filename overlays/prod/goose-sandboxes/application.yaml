apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goose-sandboxes
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    path: charts/goose-sandboxes
    targetRevision: HEAD
    helm:
      releaseName: goose-sandboxes
      valueFiles:
        - values.yaml
        - ../../overlays/prod/goose-sandboxes/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: goose-sandboxes
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
