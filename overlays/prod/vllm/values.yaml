# Secret configuration for HuggingFace token (1Password)
secret:
  create: true
  type: "onepassword"
  onepassword:
    itemPath: "vaults/k8s-homelab/items/vllm"

# Enable fast model downloads via init container
initContainer:
  enabled: true

vllm-stack:
  servingEngineSpec:
    # Deployment strategy: Recreate for single GPU (terminates old pod first)
    strategy:
      type: Recreate

    # Health checks (applied to all models)
    startupProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 60  # Allow 10 minutes for model download/load

    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 3

    modelSpec:
      - name: "granite-tiny"
        # Standard vLLM image (no LMCache)
        repository: "vllm/vllm-openai"
        tag: "latest"
        imagePullPolicy: IfNotPresent
        # Tiny Granite model (GGUF format, BF16)
        modelURL: "unsloth/granite-4.0-h-tiny-GGUF"
        replicaCount: 1

        # HuggingFace token from 1Password secret
        huggingFaceToken:
          secretName: "vllm-hf-token"
          secretKey: "hf_token"

        # Environment variables - inject HF_TOKEN from secret
        env:
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                name: vllm-hf-token
                key: hf_token
          - name: VLLM_LOGGING_LEVEL
            value: "INFO"

        # Resource allocation (dedicated GPU node - use generously)
        requestCPU: 10
        requestMemory: "32Gi"
        requestGPU: 1

        # Storage for model downloads (200Gi on node-4)
        pvcStorage: "200Gi"
        pvcAccessMode:
          - ReadWriteOnce
        pvcStorageClass: "longhorn-gpu"

        # Shared memory for GPU tensor operations
        shmSize: "16Gi"

        # vLLM engine configuration
        vllmConfig:
          # Granite supports massive context windows - take advantage of it!
          maxModelLen: 131072  # 128k tokens

          # Auto-detect optimal dtype
          dtype: "auto"

          # Additional performance flags
          extraArgs:
            - "--enable-chunked-prefill"    # Performance optimization
            - "--enable-prefix-caching"     # Cache common prefixes
            - "--gpu-memory-utilization"
            - "0.95"  # Use 95% of available VRAM (dedicated GPU)

        # Node affinity: schedule only on node-4 (GPU node with storage)
        nodeSelector:
          kubernetes.io/hostname: node-4

        # Security context (homelab security standards)
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault

        # Pod security context
        podSecurityContext:
          fsGroup: 65532
          seccompProfile:
            type: RuntimeDefault

        # Resource limits (match requests for GPU, allow CPU bursting)
        resources:
          requests:
            cpu: 10
            memory: "32Gi"
            nvidia.com/gpu: 1
          limits:
            cpu: 12
            memory: "48Gi"
            nvidia.com/gpu: 1

        # PVC annotations for Longhorn
        pvcAnnotations:
          helm.sh/resource-policy: keep

  # Router configuration (for request routing)
  routerSpec:
    enableRouter: true
    serviceDiscoveryMode: "k8s"
    routingLogic: "roundrobin"

    # Router resources (minimal)
    resources:
      requests:
        cpu: "400m"
        memory: "500Mi"
      limits:
        cpu: "1"
        memory: "1Gi"

    # Service configuration - ClusterIP only (internal access)
    service:
      type: ClusterIP
      port: 8080
      targetPort: 8000

  # Global security settings
  runtimeClassName: nvidia
