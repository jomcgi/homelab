# Secret configuration for HuggingFace token (1Password)
secret:
  create: true
  type: "onepassword"
  onepassword:
    itemPath: "vaults/k8s-homelab/items/vllm"

# Enable fast model downloads via init container
initContainer:
  enabled: true

vllm-stack:
  servingEngineSpec:
    # Deployment strategy: Recreate for single GPU (terminates old pod first)
    strategy:
      type: Recreate

    # Health checks (applied to all models)
    startupProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 357 # Allow 1 hour for large model (30B AWQ) initialization

    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 3

    modelSpec:
      - name: "qwen3-30b-instruct"
        # Standard vLLM image (no LMCache)
        repository: "vllm/vllm-openai"
        tag: "latest@sha256:014a95f21c9edf6abe0aea6b07353f96baa4ec291c427bb1176dc7c93a85845c"
        imagePullPolicy: IfNotPresent
        # Qwen3 30B Instruct with AWQ quantization (general-purpose, better for chat)
        modelURL: "QuixiAI/Qwen3-30B-A3B-AWQ"
        replicaCount: 1

        # HuggingFace token from 1Password secret
        huggingFaceToken:
          secretName: "vllm-hf-token"
          secretKey: "hf_token"

        # Environment variables - inject HF_TOKEN from secret
        env:
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                name: vllm-hf-token
                key: hf_token
          - name: VLLM_LOGGING_LEVEL
            value: "INFO"

        # Resource allocation (dedicated GPU node - low request, burstable)
        requestCPU: 2
        requestMemory: "32Gi"
        requestGPU: 1

        # Storage for model downloads (200Gi on node-4)
        pvcStorage: "200Gi"
        pvcAccessMode:
          - ReadWriteOnce
        pvcStorageClass: "longhorn-gpu"

        # Shared memory for GPU tensor operations
        shmSize: "16Gi"

        # vLLM engine configuration
        vllmConfig:
          # Reduced from 32k to fit within available KV cache memory (2.51 GiB)
          maxModelLen: 24576 # 24k tokens (vLLM estimated max: 27440)

          # AWQ quantization works with bfloat16
          dtype: "bfloat16"

          # Additional performance flags
          extraArgs:
            - "--enable-chunked-prefill" # Performance optimization
            - "--enable-prefix-caching" # Cache common prefixes
            - "--gpu-memory-utilization"
            - "0.85" # Reduced from 0.95 to leave headroom for CUDA graph compilation
            - "--cpu-offload-gb"
            - "15" # Increased from 10GB to offload more to CPU RAM (we have 32Gi available)
            - "--enable-auto-tool-choice" # Enable function/tool calling
            - "--tool-call-parser"
            - "hermes" # Use hermes parser for general Qwen3 instruct models
            # Note: quantization auto-detected from model config (compressed-tensors)

        # Node affinity: schedule only on node-4 (GPU node with storage)
        nodeSelector:
          kubernetes.io/hostname: node-4

        # Security context (homelab security standards)
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault

        # Pod security context
        podSecurityContext:
          fsGroup: 65532
          seccompProfile:
            type: RuntimeDefault

        # Resource limits (low request, burstable CPU, GPU pinned)
        resources:
          requests:
            cpu: 2
            memory: "32Gi"
            nvidia.com/gpu: 1
          limits:
            memory: "48Gi"
            nvidia.com/gpu: 1

        # PVC annotations for Longhorn
        pvcAnnotations:
          helm.sh/resource-policy: keep

      - name: "hermes-4-3-36b"
        # Standard vLLM image (same as Qwen3)
        repository: "vllm/vllm-openai"
        tag: "latest@sha256:014a95f21c9edf6abe0aea6b07353f96baa4ec291c427bb1176dc7c93a85845c"
        imagePullPolicy: IfNotPresent
        # Local path - model loaded from image volume (not HuggingFace)
        modelURL: "/models/hermes-4.3-36b-awq"
        replicaCount: 1

        # Image volume: mounts OCI model image directly (K8s 1.31+)
        # No PVC or init container needed - node caches the image layers
        imageVolume:
          reference: "ghcr.io/jomcgi/homelab/models/hermes_4_3_36b_awq:main"
          mountPath: "/models/hermes-4.3-36b-awq"

        # Shared memory for GPU tensor operations
        shmSize: "16Gi"

        env:
          - name: VLLM_LOGGING_LEVEL
            value: "INFO"

        # Resource allocation (40GB model with 30GB CPU offload)
        requestCPU: 4
        requestMemory: "48Gi"
        requestGPU: 1

        # vLLM engine configuration
        vllmConfig:
          maxModelLen: 32768 # 32k tokens - more KV cache headroom with 30GB offload

          # AWQ quantization works with bfloat16
          dtype: "bfloat16"

          # Additional performance flags
          extraArgs:
            - "--enable-chunked-prefill"
            - "--enable-prefix-caching"
            - "--gpu-memory-utilization"
            - "0.90"
            - "--cpu-offload-gb"
            - "30" # Offload 30GB to CPU RAM, maximize VRAM for KV cache
            - "--enable-auto-tool-choice"
            - "--tool-call-parser"
            - "hermes" # Hermes tool calling format (NousResearch Hermes models)

        # Node affinity: schedule only on node-4 (GPU node)
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - node-4

        # Resource limits (high memory for CPU offloading)
        resources:
          requests:
            cpu: 4
            memory: "48Gi"
            nvidia.com/gpu: 1
          limits:
            memory: "56Gi"
            nvidia.com/gpu: 1

  # Router configuration (for request routing)
  routerSpec:
    enableRouter: true
    serviceDiscoveryMode: "k8s"
    routingLogic: "roundrobin"

    # Router resources (minimal)
    resources:
      requests:
        cpu: "400m"
        memory: "500Mi"
      limits:
        cpu: "1"
        memory: "1Gi"

    # Service configuration - ClusterIP only (internal access)
    service:
      type: ClusterIP
      port: 8080
      targetPort: 8000

  # Global security settings
  runtimeClassName: nvidia
