# Secret configuration for HuggingFace token (1Password)
secret:
  create: true
  type: "onepassword"
  onepassword:
    itemPath: "vaults/k8s-homelab/items/vllm"

# Enable fast model downloads via init container
initContainer:
  enabled: true

vllm-stack:
  servingEngineSpec:
    # Deployment strategy: Recreate for single GPU (terminates old pod first)
    strategy:
      type: Recreate

    # Health checks (applied to all models)
    startupProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 360  # Allow 1 hour for model download/load

    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 3

    modelSpec:
      - name: "qwen3-coder-30b"
        # LMCache-enabled vLLM OpenAI-compatible server image
        repository: "lmcache/vllm-openai"
        tag: "latest"  # LMCache support
        imagePullPolicy: IfNotPresent
        # AWQ 4-bit quantization (vLLM native support)
        modelURL: "QuantTrio/Qwen3-Coder-30B-A3B-Instruct-AWQ"
        replicaCount: 1

        # LMCache: KV cache offloading to CPU RAM
        lmcacheConfig:
          enabled: true
          cpuOffloadingBufferSize: "20"  # 20GB CPU RAM for KV cache

        # HuggingFace token from 1Password secret
        huggingFaceToken:
          secretName: "vllm-hf-token"
          secretKey: "hf_token"

        # Environment variables - inject HF_TOKEN from secret
        env:
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                name: vllm-hf-token
                key: hf_token
          - name: VLLM_LOGGING_LEVEL
            value: "DEBUG"
          - name: HF_HUB_VERBOSITY
            value: "debug"
          - name: VLLM_LOG_STATS_INTERVAL
            value: "1"
          # Memory fragmentation fix for CUDA OOM
          - name: PYTORCH_CUDA_ALLOC_CONF
            value: "expandable_segments:True"

        # Resource allocation (dedicated node with 64GB total)
        requestCPU: 8
        requestMemory: "32Gi"
        requestGPU: 1

        # Storage for model downloads (200Gi on node-4)
        pvcStorage: "200Gi"
        pvcAccessMode:
          - ReadWriteOnce
        pvcStorageClass: "longhorn-gpu"

        # Shared memory for GPU tensor operations
        shmSize: "16Gi"

        # vLLM engine configuration
        vllmConfig:
          # Context window (32k with LMCache CPU offloading)
          maxModelLen: 32768

          # AWQ works with bfloat16
          dtype: "bfloat16"

          # Additional performance flags
          extraArgs:
            # MoE model requires expert-parallel (required by model card)
            - "--enable-expert-parallel"
            # Model uses compressed-tensors quantization (auto-detected)
            - "--enable-chunked-prefill"    # Performance optimization
            - "--enable-prefix-caching"     # Cache common prefixes
            - "--gpu-memory-utilization"
            - "0.95"  # Use 95% of available VRAM (dedicated GPU, no competition)
            - "--enable-auto-tool-choice"   # Enable automatic tool choice
            - "--tool-call-parser"
            - "qwen3_coder"                 # Tool call parser for Qwen3-Coder

        # Node affinity: schedule only on node-4 (GPU node with storage)
        nodeSelector:
          kubernetes.io/hostname: node-4

        # Security context (homelab security standards)
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault

        # Pod security context
        podSecurityContext:
          fsGroup: 65532
          seccompProfile:
            type: RuntimeDefault

        # Resource limits (match requests for GPU, allow CPU bursting)
        resources:
          requests:
            cpu: 8
            memory: "32Gi"
            nvidia.com/gpu: 1
          limits:
            cpu: 10
            memory: "48Gi"
            nvidia.com/gpu: 1

        # PVC annotations for Longhorn
        pvcAnnotations:
          helm.sh/resource-policy: keep

  # Router configuration (for request routing)
  routerSpec:
    enableRouter: true
    serviceDiscoveryMode: "k8s"
    routingLogic: "roundrobin"

    # Router resources (minimal)
    resources:
      requests:
        cpu: "400m"
        memory: "500Mi"
      limits:
        cpu: "1"
        memory: "1Gi"

    # Service configuration - ClusterIP only (internal access)
    service:
      type: ClusterIP
      port: 8080
      targetPort: 8000

  # Global security settings
  runtimeClassName: nvidia
