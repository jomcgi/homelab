# Secret configuration for HuggingFace token (1Password)
secret:
  create: true
  type: "onepassword"
  onepassword:
    itemPath: "vaults/k8s-homelab/items/vllm"

# GHCR image pull secret (for private image volumes)
imagePullSecret:
  enabled: true

# Enable fast model downloads via init container
initContainer:
  enabled: true

vllm-stack:
  servingEngineSpec:
    # Deployment strategy: Recreate for single GPU (terminates old pod first)
    strategy:
      type: Recreate

    # Health checks (applied to all models)
    startupProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 357 # Allow 1 hour for large model (30B AWQ) initialization

    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 3

    modelSpec:
      - name: "hermes-4-3-36b"
        # Standard vLLM image (same as Qwen3)
        repository: "vllm/vllm-openai"
        tag: "latest@sha256:014a95f21c9edf6abe0aea6b07353f96baa4ec291c427bb1176dc7c93a85845c"
        imagePullPolicy: IfNotPresent
        # GHCR pull secret for private image volume
        imagePullSecret: ghcr-imagepull-secret
        # Local path - model loaded from image volume (not HuggingFace)
        # Image mounts at /model-image, files inside at /models/hermes-4.3-36b-awq/
        modelURL: "/model-image/models/hermes-4.3-36b-awq"
        replicaCount: 1

        # Image volume: mounts OCI model image directly (K8s 1.31+)
        # No PVC or init container needed - node caches the image layers
        imageVolume:
          reference: "ghcr.io/jomcgi/homelab/models/hermes_4_3_36b_awq:main"
          mountPath: "/model-image"

        # Shared memory for GPU tensor operations
        shmSize: "16Gi"

        env:
          - name: VLLM_LOGGING_LEVEL
            value: "INFO"

        # Resource allocation - reduced memory request for 64GB node
        requestCPU: 4
        requestMemory: "40Gi"
        requestGPU: 1

        # vLLM engine configuration
        vllmConfig:
          maxModelLen: 16384 # 16k tokens - reduced from 32k for memory constraints

          # AWQ quantization works with bfloat16
          dtype: "bfloat16"

          # Additional performance flags
          extraArgs:
            - "--enforce-eager" # Disable CUDA graphs - workaround for AWQ Marlin + cpu_offload OOM bug
            - "--enable-chunked-prefill"
            - "--enable-prefix-caching"
            - "--gpu-memory-utilization"
            - "0.85"
            - "--cpu-offload-gb"
            - "17" # Offload 17GB to CPU - model uses 22.7GB VRAM, need headroom for KV cache
            - "--kv-cache-dtype"
            - "fp8_e4m3" # FP8 KV cache halves memory usage (RTX 4090 supports this)
            - "--enable-auto-tool-choice"
            - "--tool-call-parser"
            - "hermes" # Hermes tool calling format (NousResearch Hermes models)

        # Node affinity: schedule only on node-4 (GPU node)
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - node-4

        # Resource limits - tuned for 64GB node with reduced CPU offload
        resources:
          requests:
            cpu: 4
            memory: "40Gi"
            nvidia.com/gpu: 1
          limits:
            memory: "48Gi"
            nvidia.com/gpu: 1

  # Router configuration (for request routing)
  routerSpec:
    enableRouter: true
    serviceDiscoveryMode: "k8s"
    routingLogic: "roundrobin"

    # Router resources (minimal)
    resources:
      requests:
        cpu: "400m"
        memory: "500Mi"
      limits:
        cpu: "1"
        memory: "1Gi"

    # Service configuration - ClusterIP only (internal access)
    service:
      type: ClusterIP
      port: 8080
      targetPort: 8000

  # Global security settings
  runtimeClassName: nvidia
