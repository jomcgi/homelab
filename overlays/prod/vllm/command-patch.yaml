apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen3-coder-30b-deployment-vllm
  namespace: vllm
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true #:
      containers:
        - name: vllm
          # Remove "vllm" and "serve" from command for lmcache/vllm-openai image
          # The image entrypoint already runs the vLLM server
          command:
            - "QuantTrio/Qwen3-Coder-30B-A3B-Instruct-AWQ"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--max-model-len"
            - "32768"
            - "--dtype"
            - "bfloat16"
            - "--enable-expert-parallel"
            - "--enable-chunked-prefill"
            - "--enable-prefix-caching"
            - "--gpu-memory-utilization"
            - "0.95"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser"
            - "qwen3_coder"
            - "--kv-transfer-config"
            - '{"kv_connector":"LMCacheConnector","kv_role":"kv_both"}'
