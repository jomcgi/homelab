# Source: vllm/templates/init-container-patcher.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: vllm-qwen3-coder-30b-init-patcher
  namespace: vllm
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      serviceAccountName: vllm-patcher
      restartPolicy: OnFailure
      containers:
      - name: patcher
        image: bitnami/kubectl:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e
          DEPLOYMENT="vllm-qwen3-coder-30b-deployment-vllm"

          echo "Waiting for deployment $DEPLOYMENT to exist..."
          until kubectl get deployment $DEPLOYMENT -n vllm; do
            sleep 2
          done

          echo "Patching deployment with init container..."
          kubectl patch deployment $DEPLOYMENT -n vllm \
            --type=json \
            --patch-file=/patch/patch.json

          echo "Patch applied successfully!"
        volumeMounts:
        - name: patch
          mountPath: /patch
      volumes:
      - name: patch
        configMap:
          name: vllm-qwen3-coder-30b-init-patch
