# Source: vllm/templates/init-container-patcher.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-qwen3-coder-30b-init-patch
  namespace: vllm
data:
  patch.json: |
    [
      {
        "op": "add",
        "path": "/spec/template/spec/initContainers",
        "value": [{
          "name": "model-downloader",
          "image": "python:3.12-slim",
          "command": [
            "/bin/bash",
            "-c",
            "set -e\necho 'Installing hf_transfer for fast downloads...'\npip install --no-cache-dir 'huggingface_hub[hf_transfer]'\n\necho 'Checking if model already exists...'\nif [ -d \"/data/hub/models--${MODEL_ID//\\/--}\" ]; then\n  echo 'Model already downloaded, skipping...'\n  exit 0\nfi\n\necho \"Downloading model: $MODEL_ID\"\nexport HF_HUB_ENABLE_HF_TRANSFER=1\npython3 -c \"\nfrom huggingface_hub import snapshot_download\nimport os\n\nmodel_id = os.environ['MODEL_ID']\ncache_dir = '/data'\ntoken = os.environ.get('HF_TOKEN')\n\nprint(f'Downloading {model_id} to {cache_dir}...')\nsnapshot_download(\n    repo_id=model_id,\n    cache_dir=cache_dir,\n    token=token,\n    resume_download=True\n)\nprint('Download complete!')\n\""
          ],
          "env": [
            {"name": "MODEL_ID", "value": "cpatonn/Qwen3-Coder-30B-A3B-Instruct-AWQ-4bit"},
            {"name": "HF_TOKEN", "valueFrom": {"secretKeyRef": {"name": "vllm-hf-token", "key": "hf_token"}}},
            {"name": "HF_HOME", "value": "/data"}
          ],
          "volumeMounts": [{"name": "vllm-storage", "mountPath": "/data"}],
          "resources": {"limits":{"cpu":4,"memory":"8Gi"},"requests":{"cpu":2,"memory":"4Gi"}}
        }]
      }
    ]
