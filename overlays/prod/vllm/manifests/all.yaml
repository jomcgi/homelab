# Source: vllm/charts/vllm-stack/templates/deployment-router.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "vllm-deployment-router"
  namespace: vllm
  labels:
    environment: router
    release: router
spec:
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 100%
      maxUnavailable: 0
  selector:
    matchLabels:
      environment: router
      release: router
  template:
    metadata:
      labels:
        environment: router
        release: router
    spec:
      serviceAccountName: vllm-router-service-account
      containers:
      - name: router-container
        image: "lmcache/lmstack-router:latest"
        imagePullPolicy: "Always"
        args:
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
          - "--service-discovery"
          - "k8s"
          - "--k8s-namespace"
          - "vllm"
          - "--k8s-label-selector"
          - environment=test,release=test
          - "--routing-logic"
          - "roundrobin"
          - "--engine-stats-interval"
          - "15"
          - "--request-stats-window"
          - "60"
        resources:
          requests:
            cpu: "400m"
            memory: "500Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        ports:
          - name: "router-cport"
            containerPort: 8000

        livenessProbe:
          initialDelaySeconds: 30
          periodSeconds: 5
          failureThreshold: 3
          httpGet:
            path: /health
            port: 8000
---
# Source: vllm/charts/vllm-stack/templates/deployment-vllm-multi.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "vllm-qwen3-coder-30b-deployment-vllm"
  namespace: vllm
  labels:
    environment: test
    release: test
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      environment: test
      release: test
  progressDeadlineSeconds: 1200
  template:
    metadata:
      labels:
        environment: test
        release: test
    spec:
      containers:
        - name: "vllm"
          image: "vllm/vllm-openai:v0.11.0"

          command:
          - "vllm"
          - "serve"
          - "cpatonn/Qwen3-Coder-30B-A3B-Instruct-AWQ-4bit"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
          - "--max-model-len"
          - "32768"
          - "--dtype"
          - "bfloat16"
          - "--enable-chunked-prefill"
          - "--enable-prefix-caching"
          - "--gpu-memory-utilization"
          - "0.90"
          - "--enable-auto-tool-choice"
          - "--tool-call-parser"
          - "qwen3_coder"
          securityContext:
            runAsNonRoot: false
          imagePullPolicy: IfNotPresent
          env:
          - name: HF_HOME
            value: /data
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                key: hf_token
                name: vllm-hf-token
          ports:
            - name: "container-port"
              containerPort: 8000          
          startupProbe:
            failureThreshold: 360
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "16Gi"
              cpu: "8"
              nvidia.com/gpu: "1"
            limits:
              memory: "16Gi"
              cpu: "8"
              nvidia.com/gpu: "1"
          volumeMounts:
          - name: vllm-storage
            mountPath: /data
      volumes:
        - name: vllm-storage
          persistentVolumeClaim:
            claimName: "vllm-qwen3-coder-30b-storage-claim"
      runtimeClassName: nvidia
---
