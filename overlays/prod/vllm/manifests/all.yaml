# Source: vllm/charts/vllm-stack/templates/deployment-vllm-multi.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "vllm-qwen3-coder-30b-deployment-vllm"
  namespace: vllm
  labels:
    environment: test
    release: test
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      environment: test
      release: test
  progressDeadlineSeconds: 1200
  template:
    metadata:
      labels:
        environment: test
        release: test
    spec:
      containers:
        - name: "vllm"
          image: "vllm/vllm-openai:latest"

          command:
          - "vllm"
          - "serve"
          - "cpatonn/Qwen3-Coder-30B-A3B-Instruct-AWQ-4bit"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
          - "--max-model-len"
          - "32768"
          - "--dtype"
          - "bfloat16"
          - "--enable-chunked-prefill"
          - "--enable-prefix-caching"
          - "--gpu-memory-utilization"
          - "0.95"
          - "--cpu-offload-gb"
          - "10"
          securityContext:
            runAsNonRoot: false
          imagePullPolicy: IfNotPresent
          env:
          - name: HF_HOME
            value: /data
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                key: hf_token
                name: vllm-hf-token
          - name: VLLM_LOGGING_LEVEL
            value: INFO
          ports:
            - name: "container-port"
              containerPort: 8000          
          startupProbe:
            failureThreshold: 1800
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "32Gi"
              cpu: "10"
              nvidia.com/gpu: "1"
            limits:
              memory: "32Gi"
              cpu: "10"
              nvidia.com/gpu: "1"
          volumeMounts:
          - name: vllm-storage
            mountPath: /data
      volumes:
        - name: vllm-storage
          persistentVolumeClaim:
            claimName: "vllm-qwen3-coder-30b-storage-claim"
      runtimeClassName: nvidia
