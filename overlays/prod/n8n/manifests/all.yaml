# Source: n8n/templates/workflow-sync-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: n8n-workflow-sync-1
  labels:
    helm.sh/chart: n8n-1.0.0
    app.kubernetes.io/name: n8n
    app.kubernetes.io/instance: n8n
    app.kubernetes.io/version: "1.66.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: workflow-sync
  annotations:
    # ArgoCD PostSync hook - runs after successful sync
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
        app.kubernetes.io/instance: n8n
        app.kubernetes.io/component: workflow-sync
    spec:
      restartPolicy: OnFailure
      serviceAccountName: n8n
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: workflow-sync
          image: ghcr.io/jomcgi/homelab/n8n-workflow-syncer:latest
          imagePullPolicy: Always
          env:
            - name: N8N_URL
              value: "http://n8n.n8n.svc.cluster.local:80/api/v1"
            - name: N8N_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-api-key
                  key: api-key
            - name: WORKFLOW_DIR
              value: "/workflows"
            - name: MANAGED_SUFFIX
              value: " [git-managed]"
            - name: MANAGED_TAG
              value: "gitops-managed"
            - name: LOG_LEVEL
              value: "debug"
            - name: ENABLE_TELEMETRY
              value: "true"
            - name: OTLP_ENDPOINT
              value: "signoz-otel-collector.signoz.svc.cluster.local:4317"
          volumeMounts:
            - name: workflows
              mountPath: /workflows
              readOnly: true
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 200m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: workflows
          projected:
            sources:
              - configMap:
                  name: n8n-workflow-joe-phone-tracker
