n8n:
  main:
    config:
      WEBHOOK_URL: "http://n8n.jomcgi.dev"
    persistence:
      enabled: true
      type: dynamic
      storageClass: longhorn
      annotations:
        helm.sh/resource-policy: keep  # Prevent deletion on helm uninstall
      accessModes:
        - ReadWriteOnce
      size: 15Gi
