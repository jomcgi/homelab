# Enable workflow GitOps sync with Go syncer
workflowSync:
  enabled: true
  managedSuffix: " [git-managed]"
  managedTag: "gitops-managed"
  logLevel: "info"

  # Use specific image tag in production (update after CI/CD build)
  image:
    repository: ghcr.io/jomcgi/homelab/n8n-workflow-syncer
    tag: "latest"  # TODO: Pin to specific version after first build
    pullPolicy: Always  # Always pull to ensure we get the latest build

  # Image pull secrets for private GHCR images (managed by 1Password)
  imagePullSecrets:
    - name: ghcr-pull-secret
      onepassword:
        type: onepassword
        itemPath: "vaults/k8s-homelab/items/n8n-workflow-sync"

  # API key secret (managed by 1Password)
  apiKeySecret:
    name: "n8n-api-key"
    key: "api-key"
    type: onepassword
    onepassword:
      itemPath: "vaults/k8s-homelab/items/n8n-workflow-sync"

