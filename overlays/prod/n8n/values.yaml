  # OpenTelemetry tracing to SigNoz
  telemetry:
    enabled: true
    otlpEndpoint: "signoz-otel-collector.signoz.svc.cluster.local:4317"

  # Drift detection (re-sync every 30 minutes to catch manual changes)
  driftDetection:
    enabled: true
    schedule: "*/30 * * * *"

  resources:
    requests:
      cpu: "200m"  # Increased for better performance
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

n8n:
  main:
    config:
      WEBHOOK_URL: "http://n8n.jomcgi.dev"
      # Enable the public API for workflow sync
      N8N_API_ENABLED: "true"

    # Zero-downtime rolling updates
    # Strategy: Start new pod -> Wait for ready -> Terminate old pod
    # With SQLite (single replica), this creates new pod before terminating old one
    deploymentStrategy:
      type: RollingUpdate
      maxSurge: "1"          # Allow 1 extra pod during update
      maxUnavailable: "0"    # Never terminate all pods (zero downtime)

    # Health checks ensure new pod is ready before old pod terminates
    livenessProbe:
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1

    readinessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1

    persistence:
      enabled: true
      type: dynamic
      storageClass: longhorn
      annotations:
        helm.sh/resource-policy: keep
      accessModes:
        - ReadWriteOnce
      size: 15Gi
