apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-n8n
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    path: charts/n8n
    targetRevision: HEAD
    helm:
      releaseName: n8n
      valueFiles:
        - values.yaml
        - ../../overlays/prod/n8n/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: n8n
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        # Kubernetes API normalizes empty env arrays
        - /spec/template/spec/containers/0/env