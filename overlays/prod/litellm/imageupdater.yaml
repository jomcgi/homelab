apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: litellm
  namespace: argocd
spec:
  applicationRefs:
    - images:
        - alias: litellm
          commonUpdateSettings:
            updateStrategy: digest
            forceUpdate: false
          imageName: ghcr.io/cabinlab/litellm-claude-code:latest
          manifestTargets:
            helm:
              name: image.repository
              tag: image.tag
      namePattern: prod-litellm
  namespace: argocd
  writeBackConfig:
    method: git:secret:argocd/argocd-image-updater-token
    gitConfig:
      repository: https://github.com/jomcgi/homelab.git
      branch: main
      writeBackTarget: helmvalues:../../overlays/prod/litellm/values.yaml
