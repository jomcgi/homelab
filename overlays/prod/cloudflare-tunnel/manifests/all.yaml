# Source: cloudflare-tunnel/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: ingress
  labels:
    helm.sh/chart: cloudflare-tunnel-0.1.0
    app.kubernetes.io/name: cloudflare-tunnel
    app.kubernetes.io/instance: cluster-ingress
    app: cloudflared
    app.kubernetes.io/version: "2025.4.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflare-tunnel
      app.kubernetes.io/instance: cluster-ingress
      app: cloudflared
  template:
    metadata:
      annotations:
        checksum/config: 52984299d3e883145a68a45655d72db1f1be47aba696596178b0b0ddf494572e
        checksum/envoy-config: 9c0b260fe5faed6f6df6e3ab09dfc8b31025ead5ddadfa014fe3ea9c0dd27ee2
      labels:
        app.kubernetes.io/name: cloudflare-tunnel
        app.kubernetes.io/instance: cluster-ingress
        app: cloudflared
    spec:
      initContainers:
      - name: iptables-init
        image: "docker.io/istio/proxyv2:1.20.0"
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
          runAsUser: 0
          runAsNonRoot: false
        command:
        - sh
        - -c
        - |
          set -e
          echo "Setting up iptables rules for transparent proxy..."

          # Envoy user ID (same as envoy container)
          ENVOY_UID=65534
          ENVOY_PORT=15001

          # Create a new chain for Envoy redirect
          iptables -t nat -N ENVOY_REDIRECT || true
          iptables -t nat -F ENVOY_REDIRECT

          # Redirect all TCP traffic to Envoy transparent proxy port
          iptables -t nat -A ENVOY_REDIRECT -p tcp -j REDIRECT --to-port ${ENVOY_PORT}

          # Create chain for outbound traffic
          iptables -t nat -N ENVOY_OUTPUT || true
          iptables -t nat -F ENVOY_OUTPUT

          # Don't redirect traffic from Envoy itself (prevent loops)
          iptables -t nat -A ENVOY_OUTPUT -m owner --uid-owner ${ENVOY_UID} -j RETURN

          # Don't redirect localhost traffic
          iptables -t nat -A ENVOY_OUTPUT -d 127.0.0.1/32 -j RETURN

          # Redirect all other outbound TCP traffic to Envoy
          iptables -t nat -A ENVOY_OUTPUT -p tcp -j ENVOY_REDIRECT

          # Apply to all OUTPUT traffic
          iptables -t nat -A OUTPUT -j ENVOY_OUTPUT

          echo "iptables rules configured successfully"
          iptables -t nat -L -n -v
      containers:
      - name: envoy
        image: "envoyproxy/envoy:v1.31-latest"
        imagePullPolicy: IfNotPresent
        args:
        - -c
        - /etc/envoy/envoy.yaml
        ports:
        - containerPort: 8000
          name: envoy-proxy
          protocol: TCP
        - containerPort: 9901
          name: envoy-admin
          protocol: TCP
        - containerPort: 15001
          name: tproxy
          protocol: TCP
        volumeMounts:
        - name: envoy-config
          mountPath: /etc/envoy
          readOnly: true
        - name: envoy-tmp
          mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
          seccompProfile:
            type: RuntimeDefault
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
      - name: cloudflared
        image: "cloudflare/cloudflared:2025.4.0"
        imagePullPolicy: IfNotPresent
        args:
        - tunnel
        - --config
        - /etc/cloudflared/config/config.yaml
        - run
        - $(TUNNEL_ID)
        env:
        - name: TUNNEL_ID
          valueFrom:
            secretKeyRef:
              name: cloudflare-tunnel-credentials
              key: tunnel-id
        - name: TUNNEL_NAME
          valueFrom:
            secretKeyRef:
              name: cloudflare-tunnel-credentials
              key: tunnel-name
        ports:
        - containerPort: 2000
          name: cloudflared
        livenessProbe:
          exec:
            command:
            - cloudflared
            - tunnel
            - --metrics
            - 127.0.0.1:2000
            - ready
          failureThreshold: 3
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - cloudflared
            - tunnel
            - --metrics
            - 127.0.0.1:2000
            - ready
          failureThreshold: 3
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
        volumeMounts:
        - name: config
          mountPath: /etc/cloudflared/config
          readOnly: true
        - name: creds
          mountPath: /etc/cloudflared/creds/credentials.json
          subPath: credentials
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          seccompProfile:
            type: RuntimeDefault
      volumes:
      - name: creds
        secret:
          secretName: "cloudflare-tunnel-credentials"
      - name: config
        configMap:
          name: cloudflared
          items:
          - key: config.yaml
            path: config.yaml
      - name: envoy-config
        configMap:
          name: cloudflared-envoy
          items:
          - key: envoy.yaml
            path: envoy.yaml
      - name: envoy-tmp
        emptyDir:
          medium: Memory
          sizeLimit: 64Mi
