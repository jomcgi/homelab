secret:
  onepassword:
    itemPath: "vaults/k8s-homelab/items/cluster-cloudflare-tunnel"

namespace:
  create: true
  name: ingress

ingress:
  routes:
    # Route all traffic through Envoy Gateway for unified OTEL tracing
    # Gateway uses HTTPRoutes to route based on hostname
    - hostname: argocd.jomcgi.dev
      service: http://envoy-envoy-cluster-ingress-ecef9d60.envoy.svc.cluster.local:80
    - hostname: longhorn.jomcgi.dev
      service: http://envoy-envoy-cluster-ingress-ecef9d60.envoy.svc.cluster.local:80
    - hostname: n8n.jomcgi.dev
      service: http://envoy-envoy-cluster-ingress-ecef9d60.envoy.svc.cluster.local:80
    - hostname: feeds.jomcgi.dev
      service: http://envoy-envoy-cluster-ingress-ecef9d60.envoy.svc.cluster.local:80
    - hostname: signoz.jomcgi.dev
      service: http://envoy-envoy-cluster-ingress-ecef9d60.envoy.svc.cluster.local:80
    - hostname: code.jomcgi.dev
      service: http://envoy-envoy-cluster-ingress-ecef9d60.envoy.svc.cluster.local:80
      originRequest:
        keepAliveConnections: 100
        keepAliveTimeout: 90s
        tcpKeepAlive: 30s

# Disable Envoy sidecar - using centralized Envoy Gateway instead
envoy:
  enabled: false