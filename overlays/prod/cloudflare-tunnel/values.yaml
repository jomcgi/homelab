secret:
  onepassword:
    itemPath: "vaults/k8s-homelab/items/cluster-cloudflare-tunnel"

namespace:
  create: true
  name: ingress

ingress:
  routes:
    - hostname: argocd.jomcgi.dev
      service: http://argocd-server.argocd.svc.cluster.local:80
    - hostname: longhorn.jomcgi.dev
      service: http://longhorn-frontend.longhorn.svc.cluster.local:80
    - hostname: n8n.jomcgi.dev
      service: http://n8n.n8n.svc.cluster.local:80
    - hostname: feeds.jomcgi.dev
      service: http://freshrss.freshrss.svc.cluster.local:80
    - hostname: signoz.jomcgi.dev
      service: http://signoz.signoz.svc.cluster.local:8080
    - hostname: claude.jomcgi.dev
      service: http://claude.claude.svc.cluster.local:3000
      originRequest:
        keepAliveConnections: 100
        keepAliveTimeout: 90s
        tcpKeepAlive: 30s
    # OpenClaw personal instance (Claude + WhatsApp)
    - hostname: claw.jomcgi.dev
      service: http://openclaw-personal.openclaw.svc.cluster.local:18789
      originRequest:
        keepAliveConnections: 100
        keepAliveTimeout: 90s
        tcpKeepAlive: 30s
    # OpenClaw friends instance (Qwen + Discord)
    - hostname: claw-friends.jomcgi.dev
      service: http://openclaw-friends.openclaw.svc.cluster.local:18789
    # Shared image hosting (projects use /project-name/ prefix)
    - hostname: img.jomcgi.dev
      service: http://trips-nginx.trips.svc.cluster.local:80
    # Shared API hosting (route-based: /trips, /cluster-info, etc.)
    - hostname: api.jomcgi.dev
      service: http://api-gateway.api-gateway.svc.cluster.local:80
      originRequest:
        keepAliveConnections: 100
        keepAliveTimeout: 90s
        tcpKeepAlive: 30s

# Enable Envoy proxy sidecar with tracing to SigNoz
envoy:
  enabled: true
  # Enable transparent proxy to intercept all outbound traffic
  transparentProxy:
    enabled: true
  tracing:
    enabled: true
    serviceName: "cloudflare-tunnel-ingress"
