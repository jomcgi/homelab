secret:
  onepassword:
    itemPath: "vaults/k8s-homelab/items/cluster-cloudflare-tunnel"

namespace:
  create: true
  name: ingress

ingress:
  routes:
    - hostname: argocd.jomcgi.dev
      service: http://argocd-server.argocd.svc.cluster.local:80
    - hostname: longhorn.jomcgi.dev
      service: http://longhorn-frontend.longhorn.svc.cluster.local:80
    - hostname: n8n.jomcgi.dev
      service: http://n8n.n8n.svc.cluster.local:80
    - hostname: feeds.jomcgi.dev
      service: http://freshrss.freshrss.svc.cluster.local:80
    - hostname: signoz.jomcgi.dev
      service: http://signoz.signoz.svc.cluster.local:8080
    - hostname: code.jomcgi.dev
      service: http://ttyd-session-manager-frontend.ttyd-sessions.svc.cluster.local:80
      originRequest:
        keepAliveConnections: 100
        keepAliveTimeout: 90s
        tcpKeepAlive: 30s
    # Yukon Trip Tracker (path-based routing via nginx)
    - hostname: trips.jomcgi.dev
      service: http://trips-nginx.trips.svc.cluster.local:80
      originRequest:
        keepAliveConnections: 100
        keepAliveTimeout: 90s
        tcpKeepAlive: 30s

# Enable Envoy proxy sidecar with tracing to SigNoz
envoy:
  enabled: true
  # Enable transparent proxy to intercept all outbound traffic
  transparentProxy:
    enabled: true
  tracing:
    enabled: true
    serviceName: "cloudflare-tunnel-ingress"