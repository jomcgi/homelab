secret:
  onepassword:
    itemPath: "vaults/k8s-homelab/items/cluster-cloudflare-tunnel"

namespace:
  create: true
  name: ingress

ingress:
  routes:
    - hostname: agents.jomcgi.dev
      service: http://openhands.openhands.svc.cluster.local:3000
    - hostname: argocd.jomcgi.dev
      service: http://argocd-server.argocd.svc.cluster.local:80
    - hostname: longhorn.jomcgi.dev
      service: http://longhorn-frontend.longhorn.svc.cluster.local:80
    - hostname: n8n.jomcgi.dev
      service: http://n8n.n8n.svc.cluster.local:80
    - hostname: feeds.jomcgi.dev
      service: http://freshrss.freshrss.svc.cluster.local:80
    - hostname: signoz.jomcgi.dev
      service: http://signoz.signoz.svc.cluster.local:8080
    # Shared image hosting (projects use /project-name/ prefix)
    - hostname: img.jomcgi.dev
      service: http://trips-nginx.trips.svc.cluster.local:80
    # D&D campaign manager (nginx proxies /ws to ws-gateway internally)
    - hostname: grimoire.jomcgi.dev
      service: http://grimoire-frontend.grimoire.svc.cluster.local:8080
    # Shared API hosting (route-based: /trips, /cluster-info, etc.)
    - hostname: api.jomcgi.dev
      service: http://api-gateway.api-gateway.svc.cluster.local:80
      originRequest:
        keepAliveConnections: 100
        keepAliveTimeout: 90s
        tcpKeepAlive: 30s

# Ensure tunnel pods survive resource pressure from workload evictions
priorityClassName: system-cluster-critical

# Spread tunnel replicas across nodes for HA
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: cloudflare-tunnel

# Cloudflared container resources
resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Envoy proxy sidecar disabled - QUIC tunnel connections were cycling every
# ~60s with "timeout: no recent network activity", causing intermittent 503s.
# The iptables rules from the transparent proxy init container likely interfere
# with UDP conntrack for QUIC flows. Re-enable after investigating root cause.
envoy:
  enabled: false
