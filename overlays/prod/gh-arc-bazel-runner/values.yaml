# Persistent runner specifically for Bazel builds
# This runner maintains Bazel's repository cache across builds

secret:
  # Reuse existing secret from gh-arc-runners (same namespace)
  create: false
  type: onepassword
  onepassword:
    itemPath: "vaults/k8s-homelab/items/gh-arc"

imagePullSecret:
  enabled: true
  # Reuse existing secret from gh-arc-runners (same namespace)
  create: false
  onepassword:
    itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"

github:
  configUrl: "https://github.com/jomcgi/homelab"

controller:
  namespace: "gh-arc-controller"
  serviceAccountName: "arc-controller"
  secretName: "gh-arc-secret"

runners:
  name: "bazel-runner"
  minRunners: 1  # Always keep 1 runner alive for persistent cache
  maxRunners: 1  # Only need 1 for now

gha-runner-scale-set:
  githubConfigUrl: "https://github.com/jomcgi/homelab"
  runnerScaleSetName: "bazel-runner"
  minRunners: 1
  maxRunners: 1

  # Add labels to target this runner from workflows
  runnerGroup: "bazel-builds"

  controllerServiceAccount:
    namespace: "gh-arc-controller"
    name: "arc-controller"

  # Enable Docker-in-Docker for container image builds
  containerMode:
    type: "dind"

  # Runner pod template with persistent storage
  template:
    spec:
      imagePullSecrets:
      - name: ghcr-imagepull-secret
      containers:
      - name: runner
        image: ghcr.io/jomcgi/homelab/gh-arc-runner:latest
        command: ["/home/runner/run.sh"]

        # Mount persistent volume for Bazel cache
        volumeMounts:
        - name: bazel-cache
          mountPath: /home/runner/.cache/bazel

        resources:
          limits:
            cpu: 4000m      # More CPU for Bazel builds
            memory: 8Gi     # More memory for parallel builds
          requests:
            cpu: 1000m
            memory: 2Gi

      volumes:
      - name: bazel-cache
        persistentVolumeClaim:
          claimName: bazel-cache-pvc

  listenerTemplate:
    spec:
      containers:
      - name: listener
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi

# Create PVC for Bazel cache
persistence:
  enabled: true
  storageClass: "longhorn"
  size: 20Gi  # Single replica, easily recreatable
  accessMode: ReadWriteOnce
