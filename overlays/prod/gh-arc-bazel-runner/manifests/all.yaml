# Source: gh-arc-runners/charts/gha-runner-scale-set/templates/autoscalingrunnerset.yaml
apiVersion: actions.github.com/v1alpha1
kind: AutoscalingRunnerSet
metadata:
  name: bazel-runner
  namespace: gh-arc-runners
  labels:
    app.kubernetes.io/component: "autoscaling-runner-set"
    helm.sh/chart: gha-rs-0.9.3
    app.kubernetes.io/name: bazel-runner
    app.kubernetes.io/instance: bazel-runner
    app.kubernetes.io/version: "0.9.3"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: gha-rs
    actions.github.com/scale-set-name: bazel-runner
    actions.github.com/scale-set-namespace: gh-arc-runners
  annotations:
    actions.github.com/values-hash: cdd72402d8ce16d2bc2121fb4ae51422f440336eb20e681935473da0af523f4
    actions.github.com/cleanup-manager-role-binding: bazel-runner-gha-rs-manager
    actions.github.com/cleanup-manager-role-name: bazel-runner-gha-rs-manager
    actions.github.com/cleanup-no-permission-service-account-name: bazel-runner-gha-rs-no-permission
spec:
  githubConfigUrl: https://github.com/jomcgi/homelab
  githubConfigSecret: gh-arc-secret
  runnerScaleSetName: bazel-runner
  maxRunners: 3
  minRunners: 1
  listenerTemplate:
    spec:
      containers:
      - name: listener
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true

  template:
    spec:
      imagePullSecrets: 
        - name: ghcr-imagepull-secret
      securityContext: 
        fsGroup: 1001
      restartPolicy: Never
      serviceAccountName: bazel-runner-gha-rs-no-permission
      initContainers:
      - name: init-dind-externals
        
        image: ghcr.io/jomcgi/homelab/gh-arc-runner:latest
        command: ["cp"]
        args: ["-r", "-v", "/home/runner/externals/.", "/home/runner/tmpDir/"]
        volumeMounts:
          - name: dind-externals
            mountPath: /home/runner/tmpDir
      containers:
      - name: runner
        
        command: 
          - /home/runner/run.sh
        image: 
          ghcr.io/jomcgi/homelab/gh-arc-runner:latest
        resources: 
          limits:
            cpu: 8000m
            memory: 6Gi
          requests:
            cpu: 1000m
            memory: 2Gi
        env:
          - name: DOCKER_HOST
            value: unix:///var/run/docker.sock
          - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
            value: "120"
        volumeMounts:
          - 
            mountPath: /home/runner/.cache
            name: bazel-cache
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /var/run
      - name: dind
        image: docker:dind
        args:
          - dockerd
          - --host=unix:///var/run/docker.sock
          - --group=$(DOCKER_GROUP_GID)
        env:
          - name: DOCKER_GROUP_GID
            value: "123"
        securityContext:
          privileged: true
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /var/run
          - name: dind-externals
            mountPath: /home/runner/externals
      
      volumes:
      - name: dind-sock
        emptyDir: {}
      - name: dind-externals
        emptyDir: {}
      
      - name: work
        emptyDir: {}
      
      - 
        name: bazel-cache
        persistentVolumeClaim:
          claimName: prod-bazel-cache-pvc
