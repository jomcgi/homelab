apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bazel-cache-pvc
  namespace: gh-arc-runners
  annotations:
    # Single replica - this is just a cache, easily recreatable
    longhorn.io/numberOfReplicas: "1"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi  # Reduced since only 1 replica, can expand later if needed
