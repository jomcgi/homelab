apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seaweedfs-volume
  namespace: seaweedfs
  labels:
    app.kubernetes.io/name: seaweedfs
    helm.sh/chart: seaweedfs-4.0.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: seaweedfs
spec:
  serviceName: seaweedfs-volume
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs
      app.kubernetes.io/instance: seaweedfs
      app.kubernetes.io/component: volume
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seaweedfs
        helm.sh/chart: seaweedfs-4.0.0
        app.kubernetes.io/instance: seaweedfs
        app.kubernetes.io/component: volume
      
      annotations:
      
    spec:
      restartPolicy: Always
      
      terminationGracePeriodSeconds: 150
      enableServiceLinks: false
      serviceAccountName: "seaweedfs" # for deleting statefulset pods after migration
      initContainers:
        - name: seaweedfs-vol-move-idx
          image: chrislusf/seaweedfs:3.73
          imagePullPolicy: IfNotPresent
          command: [ '/bin/sh', '-c' ]
          args: [ 'if ls /data/*.idx  >/dev/null 2>&1; then mv /data/*.idx /idx/ ; fi; ' ]
          volumeMounts:
            - name: idx
              mountPath: /idx
            - name: data
              mountPath: /data
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:3.73
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: SEAWEEDFS_FULLNAME
              value: "seaweedfs"
            - name: WEED_CLUSTER_DEFAULT
              value: "sw"
            - name: WEED_CLUSTER_SW_FILER
              value: "seaweedfs-filer-client.seaweedfs:8888"
            - name: WEED_CLUSTER_SW_MASTER
              value: "seaweedfs-master.seaweedfs:9333"
          command:
            - "/bin/sh"
            - "-ec"
            - |
              exec /usr/bin/weed \
                -logdir=/logs \
                -v=1 \
                volume \
                -port=8080 \
                -metricsPort=9327 \
                -dir /data \
                -dir.idx=/idx \
                -max 0 \
                -ip.bind=0.0.0.0 \
                -readMode=proxy \
                -minFreeSpacePercent=7 \
                -ip=${POD_NAME}.${SEAWEEDFS_FULLNAME}-volume.seaweedfs \
                -compactionMBps=50 \
                -mserver=${SEAWEEDFS_FULLNAME}-master-0.${SEAWEEDFS_FULLNAME}-master.seaweedfs:9333
          volumeMounts:
            - name: data
              mountPath: "/data/"
            - name: logs
              mountPath: "/logs/"
            - name: idx
              mountPath: "/idx/"
            
          ports:
            - containerPort: 8080
              name: swfs-vol
            - containerPort: 9327
              name: metrics
            - containerPort: 18080
              name: swfs-vol-grpc
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
              scheme: 
            initialDelaySeconds: 15
            periodSeconds: 15
            successThreshold: 1
            failureThreshold: 100
            timeoutSeconds: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
              scheme: 
            initialDelaySeconds: 20
            periodSeconds: 90
            successThreshold: 1
            failureThreshold: 4
            timeoutSeconds: 30
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: idx
          emptyDir: {}
        - name: logs
          emptyDir: {}
      nodeSelector:
        kubernetes.io/arch: amd64
  volumeClaimTemplates:
