## Perplexica Production Configuration
## Self-hosted AI search engine with SearXNG metasearch

fullnameOverride: "perplexica"

## Pin images to specific versions to prevent rollout churn from :latest
image:
  tag: "v1.12.0"

## Disable linkerd injection (causes PostStartHook timeouts)
podAnnotations:
  linkerd.io/inject: disabled

## LLM: Use llama.cpp deployment with Hermes 4.3
llm:
  baseUrl: "http://llama-cpp.llama-cpp.svc.cluster.local:8080/v1"
  model: "hermes-4.3-36b"

## Embedding: llama-server doesn't support embeddings well for chat models
## Disable external embedding provider - Perplexica can work without embeddings
## or use its built-in local embedding support
embedding:
  provider: "local"

## SearXNG configuration
searxng:
  enabled: true
  image:
    tag: "2026.2.13-a2db6f650"
  settings:
    instanceName: "Homelab Search"
    ## Static secret key to prevent ConfigMap churn (randAlphaNum changes every sync)
    secretKey: "475795e9c97144931a97e7f8ab7f2ecb"
    ## Enable additional academic engines
    engines:
      google:
        disabled: false
      bing:
        disabled: false
      duckduckgo:
        disabled: false
      brave:
        disabled: false
      google_scholar:
        disabled: false
      arxiv:
        disabled: false
      semantic_scholar:
        disabled: false
      wikipedia:
        disabled: false
      github:
        disabled: false
      stackoverflow:
        disabled: false
      wolframalpha:
        disabled: false

## Expose SearXNG separately for direct browser access
service:
  searxng:
    enabled: true
    port: 8080

## Persistence on Longhorn
persistence:
  enabled: true
  storageClass: "longhorn"
  size: 2Gi

## Resources - moderate allocation for search workload
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    memory: 2.5Gi

## Network policy - allow external internet for SearXNG, llama-cpp for LLM
networkPolicy:
  enabled: true
  allowExternalInternet: true
  vllm:
    enabled: true
    namespace: "llama-cpp"
    port: 8080
    podSelector:
      app.kubernetes.io/name: llama-cpp
