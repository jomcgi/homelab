fullnameOverride: "llama-cpp"

imagePullSecret:
  enabled: true

modelVolume:
  enabled: true
  reference: "hf.co/bartowski/NousResearch_Hermes-4.3-36B-GGUF:NousResearch_Hermes-4.3-36B-IQ4_XS"
  mountPath: "/model-image"

server:
  nGpuLayers: 99
  noKvOffload: true
  ctxSize: 32768
  flashAttn: "on"
  cacheTypeK: "q8_0"
  cacheTypeV: "q4_0"
  threads: 8
  jinja: true
  extraArgs:
    - "--metrics"
    - "--alias"
    - "hermes-4.3-36b"

nodeSelector:
  kubernetes.io/hostname: node-4

podAnnotations:
  linkerd.io/inject: disabled

resources:
  requests:
    cpu: 4
    memory: "32Gi"
    nvidia.com/gpu: 1
  limits:
    memory: "48Gi"
    nvidia.com/gpu: 1
