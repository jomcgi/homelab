apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-llama-cpp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    path: charts/llama-cpp
    targetRevision: HEAD
    helm:
      releaseName: llama-cpp
      valueFiles:
        - values.yaml
        - ../../overlays/prod/llama-cpp/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: llama-cpp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
