imageUpdater:
  applicationName: "prod-mcp-servers"
  writeBackTarget: "helmvalues:../../overlays/prod/mcp-servers/values.yaml"
servers:
- name: signoz-mcp
  image:
    repository: docker.io/signoz/signoz-mcp-server
    tag: "v0.0.5"
  port: 8000
  env:
  - name: SIGNOZ_URL
    value: "http://signoz.signoz.svc.cluster.local:8080"
  - name: TRANSPORT_MODE
    value: "http"
  - name: MCP_SERVER_PORT
    value: "8000"
  secret:
    name: signoz-mcp
    itemPath: "vaults/k8s-homelab/items/signoz-mcp"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  translate:
    enabled: false
  registration:
    enabled: true
    transport: "STREAMABLEHTTP"
  alert:
    enabled: true
    url: "http://signoz-mcp.mcp-servers.svc.cluster.local:8000/health"
- name: buildbuddy-mcp
  image:
    repository: ghcr.io/jomcgi/homelab/services/buildbuddy-mcp
    tag: "main@sha256:329e6c0d3cca32397cdb47926142b4fcb6bbfc99f6e2edda2782a2bca54fb9b9"
  port: 8000
  writableTmp: true
  env:
  - name: BUILDBUDDY_URL
    value: "https://app.buildbuddy.io"
  secret:
    name: buildbuddy-mcp
    itemPath: "vaults/k8s-homelab/items/buildbuddy-mcp"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  translate:
    enabled: false
  registration:
    enabled: true
    transport: "STREAMABLEHTTP"
  imageUpdater:
    enabled: true
  alert:
    enabled: true
    url: "http://buildbuddy-mcp.mcp-servers.svc.cluster.local:8000/health"
- name: kubernetes-mcp
  image:
    repository: ghcr.io/containers/kubernetes-mcp-server
    tag: "latest"
  port: 8080
  args:
  - "--port"
  - "8080"
  - "--disable-destructive"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  translate:
    enabled: false
  rbac:
    clusterRoleRules:
    - apiGroups: ["", "apps", "batch", "networking.k8s.io", "rbac.authorization.k8s.io"]
      resources: ["*"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["pods/exec", "pods/portforward", "pods/log"]
      verbs: ["create", "get"]
    - apiGroups: ["metrics.k8s.io"]
      resources: ["pods", "nodes"]
      verbs: ["get", "list"]
  registration:
    enabled: true
    transport: "STREAMABLEHTTP"
  alert:
    enabled: true
    url: "http://kubernetes-mcp.mcp-servers.svc.cluster.local:8080/mcp"
