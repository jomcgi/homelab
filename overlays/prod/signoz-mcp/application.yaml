apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: signoz-mcp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    path: charts/signoz-mcp
    targetRevision: HEAD
    helm:
      releaseName: signoz-mcp
      valueFiles:
        - values.yaml
        - ../../overlays/prod/signoz-mcp/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-servers
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
