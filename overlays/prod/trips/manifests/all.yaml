apiVersion: apps/v1
kind: Deployment
metadata:
  name: trips-nginx
  labels:
    helm.sh/chart: trips-1.0.0
    app.kubernetes.io/name: trips
    app.kubernetes.io/instance: trips
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: yukon-tracker
    app.kubernetes.io/component: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trips
      app.kubernetes.io/instance: trips
      app.kubernetes.io/component: nginx
  template:
    metadata:
      annotations:
        checksum/config: 9a08b5eca2f5ab432df54a92754e9925fed58bfc43dfc30728f8dfc1aa42577f
      labels:
        app.kubernetes.io/name: trips
        app.kubernetes.io/instance: trips
        app.kubernetes.io/component: nginx
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: "nginx:1.27-alpine"
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 20m
              memory: 32Mi
      volumes:
        - name: config
          configMap:
            name: trips-nginx-config
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
