# Source: trips/templates/nginx-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: trips-nginx-config
  labels:
    helm.sh/chart: trips-1.0.0
    app.kubernetes.io/name: trips
    app.kubernetes.io/instance: trips
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: yukon-tracker
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent"';

        access_log /dev/stdout main;

        sendfile on;
        keepalive_timeout 65;

        # Temp directories for non-root
        client_body_temp_path /tmp/client_body;
        proxy_temp_path /tmp/proxy;
        fastcgi_temp_path /tmp/fastcgi;
        uwsgi_temp_path /tmp/uwsgi;
        scgi_temp_path /tmp/scgi;

        # Upstreams (cross-namespace)
        upstream seaweedfs {
            server seaweedfs-s3.seaweedfs.svc.cluster.local:8333;
        }

        upstream imgproxy {
            server trips-imgproxy:8080;
        }

        upstream api {
            server trips-api:8000;
        }

        # WebSocket connection upgrade map
        map $http_upgrade $connection_upgrade {
            default upgrade;
            '' close;
        }

        server {
            listen 8080;
            server_name _;

            # Health check
            location /health {
                access_log off;
                return 200 'OK';
                add_header Content-Type text/plain;
            }

            # === TRIPS PROJECT (/trips/) ===

            # Full resolution images - direct to SeaweedFS
            location /trips/full/ {
                rewrite ^/trips/full/(.*)$ /trips/$1 break;
                proxy_pass http://seaweedfs;
                proxy_set_header Host $host;

                # Cache forever (images are immutable)
                add_header Cache-Control "public, max-age=31536000, immutable";
                add_header X-Cache-Status $upstream_cache_status;
            }

            # Thumbnails (300px) - imgproxy v3 format
            location /trips/thumb/ {
                rewrite ^/trips/thumb/(.*)$ /unsafe/rs:fit:300:300/q:85/plain/s3://trips/$1 break;
                proxy_pass http://imgproxy;
                proxy_set_header Host $host;

                add_header Cache-Control "public, max-age=31536000, immutable";
            }

            # Preview (1200px) - imgproxy v3 format
            location /trips/preview/ {
                rewrite ^/trips/preview/(.*)$ /unsafe/rs:fit:1200:1200/q:90/plain/s3://trips/$1 break;
                proxy_pass http://imgproxy;
                proxy_set_header Host $host;

                add_header Cache-Control "public, max-age=31536000, immutable";
            }

            # Gallery (600px) - imgproxy v3 format
            location /trips/gallery/ {
                rewrite ^/trips/gallery/(.*)$ /unsafe/rs:fit:600:600/q:88/plain/s3://trips/$1 break;
                proxy_pass http://imgproxy;
                proxy_set_header Host $host;

                add_header Cache-Control "public, max-age=31536000, immutable";
            }
            # API endpoints
            location /trips/api/ {
                rewrite ^/trips/api/(.*)$ /api/$1 break;
                proxy_pass http://api;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # WebSocket endpoint
            location /trips/ws/ {
                rewrite ^/trips/ws/(.*)$ /ws/$1 break;
                proxy_pass http://api;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_read_timeout 86400;
            }

            # Default - 404
            location / {
                return 404 'Not found';
            }
        }
    }
