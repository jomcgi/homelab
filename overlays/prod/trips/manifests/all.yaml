# Source: trips/templates/api-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trips-api
  labels:
    helm.sh/chart: trips-1.0.0
    app.kubernetes.io/name: trips
    app.kubernetes.io/instance: trips
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: yukon-tracker
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trips
      app.kubernetes.io/instance: trips
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trips
        app.kubernetes.io/instance: trips
        app.kubernetes.io/component: api
      annotations:
        # Mark NATS port as opaque for Linkerd
        config.linkerd.io/opaque-ports: "4222"
    spec:
      imagePullSecrets:
        - name: ghcr-imagepull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "ghcr.io/jomcgi/homelab/services/trips-api:main"
          imagePullPolicy: Always
          securityContext:
            # Note: readOnlyRootFilesystem disabled because aspect_rules_py
            # creates a virtualenv at runtime (by design)
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            # UV/Python needs writable directories
            - name: HOME
              value: /tmp
            - name: UV_CACHE_DIR
              value: /tmp/.uv-cache
            - name: NATS_URL
              value: "nats://nats.nats.svc.cluster.local:4222"
            - name: S3_ENDPOINT
              value: "http://seaweedfs-s3.seaweedfs.svc.cluster.local:8333"
            - name: S3_BUCKET
              value: "trips"
            - name: TRIP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: trips-api-key
                  key: credential
                  optional: true
            # CORS origins
            - name: CORS_ORIGINS
              value: "https://trips.jomcgi.dev,http://localhost:5173,http://localhost:3000"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
# Source: trips/templates/imgproxy-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trips-imgproxy
  labels:
    helm.sh/chart: trips-1.0.0
    app.kubernetes.io/name: trips
    app.kubernetes.io/instance: trips
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: yukon-tracker
    app.kubernetes.io/component: imgproxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trips
      app.kubernetes.io/instance: trips
      app.kubernetes.io/component: imgproxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trips
        app.kubernetes.io/instance: trips
        app.kubernetes.io/component: imgproxy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: imgproxy
          image: "darthsim/imgproxy:v3.25.0"
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # S3 Configuration (SeaweedFS)
            - name: IMGPROXY_USE_S3
              value: "true"
            - name: IMGPROXY_S3_ENDPOINT
              value: "http://seaweedfs-s3.seaweedfs.svc.cluster.local:8333"
            - name: IMGPROXY_S3_REGION
              value: "us-east-1"
            - name: AWS_ACCESS_KEY_ID
              value: "anonymous"
            - name: AWS_SECRET_ACCESS_KEY
              value: "anonymous"
            # Image Processing
            - name: IMGPROXY_QUALITY
              value: "90"
            - name: IMGPROXY_FORMAT_QUALITY
              value: "webp=92,avif=90,jpeg=90"
            - name: IMGPROXY_ENABLE_WEBP_DETECTION
              value: "true"
            - name: IMGPROXY_ENFORCE_WEBP
              value: "false"
            - name: IMGPROXY_CONCURRENCY
              value: "4"
            - name: IMGPROXY_MAX_SRC_RESOLUTION
              value: "50"
            - name: IMGPROXY_STRIP_METADATA
              value: "true"
            - name: IMGPROXY_STRIP_COLOR_PROFILE
              value: "false"
            # Security (internal only)
            - name: IMGPROXY_ALLOW_INSECURE_URLS
              value: "true"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
