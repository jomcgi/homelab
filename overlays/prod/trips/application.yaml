apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trips
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: yukon-tracker
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    path: projects/trips/deploy
    targetRevision: HEAD
    helm:
      releaseName: trips
      valueFiles:
        - values.yaml
        - ../../../../overlays/prod/trips/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: trips
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
