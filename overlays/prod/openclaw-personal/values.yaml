## OpenClaw Personal Instance - Production Values
## Personal AI assistant with Claude + WhatsApp

fullnameOverride: "openclaw-personal"

## Disable linkerd injection (debugging PostStartHook timeouts)
podAnnotations:
  linkerd.io/inject: disabled

## LLM: Anthropic Claude
llm:
  provider: "anthropic"
  model: "claude-sonnet-4-20250514"

## Claude auth via 1Password-managed API key
auth:
  enabled: true
  method: "api-key"
  secret:
    type: "onepassword"
    onepassword:
      ## 1Password item must have field named "ANTHROPIC_API_KEY"
      itemPath: "vaults/k8s-homelab/items/anthropic"

## WhatsApp channel (QR code auth - run `openclaw channels login` after deploy)
whatsapp:
  enabled: true
  secret:
    type: "manual"
  settings:
    dmPolicy: "pairing"
    groups:
      enabled: false

## Cloudflare ingress (simple tunnel routing, no Zero Trust CRD)
cloudflare:
  enabled: true
  hostname: "claw.jomcgi.dev"

## Persistence
persistence:
  enabled: true
  storageClass: "longhorn"
  size: 10Gi

## Resources
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    memory: 2Gi
