apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-openclaw-friends
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    path: charts/openclaw
    targetRevision: HEAD
    helm:
      releaseName: openclaw-friends
      valueFiles:
        - values.yaml
        - ../../overlays/prod/openclaw-friends/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
