apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: knowledge-graph
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    targetRevision: HEAD
    path: charts/knowledge-graph
    helm:
      releaseName: knowledge-graph
      valueFiles:
        - values.yaml
        - ../../overlays/prod/knowledge-graph/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: knowledge-graph
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
