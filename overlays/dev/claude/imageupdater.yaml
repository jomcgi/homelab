apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: claude
  namespace: argocd
spec:
  applicationRefs:
  - images:
    - alias: claude
      commonUpdateSettings:
        updateStrategy: digest
        forceUpdate: false
      imageName: ghcr.io/jomcgi/homelab/charts/claude:main
      manifestTargets:
        helm:
          name: image.repository
          tag: image.tag
    namePattern: claude
  namespace: argocd
  writeBackConfig:
    method: git:secret:argocd/argocd-image-updater-token
    gitConfig:
      repository: https://github.com/jomcgi/homelab.git
      branch: main
      writeBackTarget: helmvalues:../../overlays/dev/claude/values.yaml
