# Dev environment overrides for claude
# Inherits defaults from charts/claude/values.yaml

# Git-sync sidecar to keep homelab repo available (read-only)
gitSync:
  enabled: true
  repo: https://github.com/jomcgi/homelab
  repoName: homelab
  branch: main
  period: 60s

# Default working directory - points to git-sync'd repo
defaultWorkingDirectory: "/repos/homelab/current"
