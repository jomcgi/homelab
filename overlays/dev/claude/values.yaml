# Dev environment overrides for claude
# Inherits defaults from charts/claude/values.yaml

# Container image - managed by ArgoCD Image Updater
# Uses digest strategy: only updates when image content actually changes
image:
  tag: "main@sha256:e67468896a491325acaa046a1296d4a7dd42d781bf59ef8065659a9d7dd6bde6"
  repository: ghcr.io/jomcgi/homelab/charts/claude
# Custom repo sync (replaces git-sync sidecar)
# Clones repo on startup and runs periodic git fetch
# Works with git worktrees for multi-agent workflows
repoSync:
  enabled: true
  repo: https://github.com/jomcgi/homelab
  repoName: homelab
  branch: main
  intervalSeconds: 60
# Default working directory - points to synced repo
defaultWorkingDirectory: "/repos/homelab"
# Bypass all permission prompts by default
# Claude Code will run tools without asking for confirmation
defaultPermissionMode: "bypassPermissions"
# Single replica with shared PVC for conversation persistence
# Digest-based image updates prevent unnecessary pod rolls
statefulset:
  enabled: false
replicas: 1
# Leader election not needed with single replica
leaderElection:
  enabled: false
# Session affinity not needed with single replica
service:
  sessionAffinity: false
# Shared PVC for conversation history persistence across restarts
persistence:
  size: 200Gi
