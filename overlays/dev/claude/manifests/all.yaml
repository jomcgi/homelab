apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: claude
  labels:
    helm.sh/chart: claude-0.1.0
    app.kubernetes.io/name: claude
    app.kubernetes.io/instance: claude
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
rules:
  # Read-only access to all resources (safe for observability)
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Allow port-forwarding for debugging
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["create"]
  # Allow exec into pods for debugging
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Allow logs access
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Allow creating jobs from cronjobs
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create"]
