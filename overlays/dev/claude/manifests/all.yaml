# Source: claude/templates/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: claude
  labels:
    helm.sh/chart: claude-0.1.0
    app.kubernetes.io/name: claude
    app.kubernetes.io/instance: claude
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  serviceName: claude-headless
  replicas: 2
  podManagementPolicy: Parallel  # Start all pods in parallel for faster scaling
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0  # Update all pods
  selector:
    matchLabels:
      app.kubernetes.io/name: claude
      app.kubernetes.io/instance: claude
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: claude
        config.linkerd.io/opaque-ports: 8080,3000
        linkerd.io/inject: disabled
      labels:
        app.kubernetes.io/name: claude
        app.kubernetes.io/instance: claude
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      serviceAccountName: claude
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        # Nginx reverse proxy for WebSocket support
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 1
            timeoutSeconds: 1
            failureThreshold: 30
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]  # Grace period for connections to drain
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-log
              mountPath: /var/log/nginx
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
        - name: claude
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
          image: "ghcr.io/jomcgi/homelab/charts/claude:2026.01.16.17.49.00-0bef7ac"
          imagePullPolicy: IfNotPresent
          ports:
            - name: backend
              containerPort: 3000
              protocol: TCP
            - name: ttyd
              containerPort: 7681
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: backend
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: backend
            initialDelaySeconds: 5
            periodSeconds: 2
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health
              port: backend
            initialDelaySeconds: 0
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 60  # 2 minutes to start
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          env:
            - name: HOME
              value: /home/user
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: PORT
              value: "3000"
            - name: GIT_USER_NAME
              value: "Joe McGinley"
            - name: GIT_USER_EMAIL
              value: "joe@jomcgi.dev"
            - name: GEMINI_MODEL
              value: "gemini-2.0-flash"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-secret
                  key: github_token
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-secret
                  key: google_api_key
                  optional: true
            - name: BUILDBUDDY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-secret
                  key: buildbuddy_api_key
                  optional: true
            - name: OPENCODE_CONFIG
              value: /etc/opencode/opencode.json
            - name: DEFAULT_WORKING_DIRECTORY
              value: "/repos/homelab"
            - name: DEFAULT_PERMISSION_MODE
              value: "bypassPermissions"
            - name: REPO_SYNC_URL
              value: "https://github.com/jomcgi/homelab"
            - name: REPO_SYNC_PATH
              value: /repos/homelab
            - name: REPO_SYNC_BRANCH
              value: "main"
            - name: REPO_SYNC_INTERVAL
              value: "60"
          resources:
            limits:
              memory: 12Gi
            requests:
              cpu: "1"
              memory: 12Gi
          volumeMounts:
            - name: home
              mountPath: /home/user
            - name: home
              mountPath: /repos/homelab
              subPath: repos/homelab
      volumes:
        - name: nginx-config
          configMap:
            name: claude-nginx
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-log
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: home
        labels:
          helm.sh/chart: claude-0.1.0
          app.kubernetes.io/name: claude
          app.kubernetes.io/instance: claude
          app.kubernetes.io/version: "1.0.0"
          app.kubernetes.io/managed-by: Helm
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 100Gi
