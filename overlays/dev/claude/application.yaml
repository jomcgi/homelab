apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: claude
  namespace: argocd
  # Image updates are managed by the ImageUpdater CRD in imageupdater.yaml
  annotations: {}
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab
    targetRevision: HEAD
    path: charts/claude
    helm:
      releaseName: claude
      valueFiles:
        - values.yaml
        - ../../overlays/dev/claude/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: claude
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
