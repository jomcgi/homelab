# Development overrides for marine services

# Enable image pull secret for GHCR
imagePullSecret:
  enabled: true
# Configure pods to use the image pull secret
imagePullSecrets:
- name: ghcr-imagepull-secret
# AIS Ingest component
ingest:
  image:
    repository: ghcr.io/jomcgi/homelab/services/ais-ingest
    tag: "2026.01.18.19.26.49-9b19e60"
    pullPolicy: Always
# Ships API component
api:
  image:
    repository: ghcr.io/jomcgi/homelab/services/ships-api
    tag: "2026.01.18.19.26.49-9b19e60"
    pullPolicy: Always
frontend:
  image:
    tag: 2026.01.18.19.26.49-9b19e60
    repository: ghcr.io/jomcgi/homelab/services/ships-frontend
  # Zero Trust access policy - disabled, manually configured in Cloudflare
  zeroTrust:
    policyId: ""
