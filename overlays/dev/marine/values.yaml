# Development overrides for marine services

# ArgoCD Image Updater
imageUpdater:
  enabled: true
  images:
  - alias: ingest
    imageName: ghcr.io/jomcgi/homelab/services/ais_ingest:main
    helm:
      name: ingest.image.repository
      tag: ingest.image.tag
  - alias: api
    imageName: ghcr.io/jomcgi/homelab/services/ships_api:main
    helm:
      name: api.image.repository
      tag: api.image.tag
  - alias: frontend
    imageName: ghcr.io/jomcgi/homelab/services/ships_frontend:main
    helm:
      name: frontend.image.repository
      tag: frontend.image.tag
  writeBack:
    method: git:secret:argocd/argocd-image-updater-token
    repository: https://github.com/jomcgi/homelab.git
    branch: main
    target: helmvalues:../../overlays/dev/marine/values.yaml
# Enable image pull secret for GHCR
imagePullSecret:
  enabled: true
# Configure pods to use the image pull secret
imagePullSecrets:
- name: ghcr-imagepull-secret
# AIS Ingest component
ingest:
  image:
    repository: ghcr.io/jomcgi/homelab/services/ais_ingest
    tag: latest@sha256:6c6a6bc57e6807f2c52a530dc2c1895679ae2511dcce819d70cc5da8102a5e13
    pullPolicy: Always
    digest: sha256:6c6a6bc57e6807f2c52a530dc2c1895679ae2511dcce819d70cc5da8102a5e13
  # Pre-populate OTEL annotation to match Kyverno injection (prevents ArgoCD drift)
  podAnnotations:
    otel.injected-by: kyverno/inject-otel-env-vars
# Ships API component
api:
  image:
    repository: ghcr.io/jomcgi/homelab/services/ships_api
    tag: latest@sha256:af41b804e33ba2cf962bd3c2e169faed71e80f2f5ef73ea91ef99198dcb1d632
    pullPolicy: Always
    digest: sha256:af41b804e33ba2cf962bd3c2e169faed71e80f2f5ef73ea91ef99198dcb1d632
  # Overprovisioned for catchup - reduce after caught up
  resources:
    requests:
      cpu: 1
      memory: 1Gi
    limits:
      memory: 10Gi
  # Increased tolerance for liveness probe during NATS message catchup
  # The API may be unresponsive while processing large backlogs
  livenessProbe:
    initialDelaySeconds: 120
    periodSeconds: 15
    timeoutSeconds: 30
    failureThreshold: 10
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 30
    failureThreshold: 360
  # Pre-populate OTEL annotation to match Kyverno injection (prevents ArgoCD drift)
  podAnnotations:
    otel.injected-by: kyverno/inject-otel-env-vars
frontend:
  image:
    repository: ghcr.io/jomcgi/homelab/services/ships_frontend
    tag: main@sha256:73f3952b857740bde3dd8f2d4978a617cbf12043ce411af01f5da61654ff7e6e
    digest: sha256:18d74880ab5c094f2fbcf4963076c43be208bdc6e9298096c10596c78452f5f1
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 512Mi
  # Zero Trust access policy - disabled, manually configured in Cloudflare
  zeroTrust:
    policyId: ""
  # Pre-populate OTEL annotation to match Kyverno injection (prevents ArgoCD drift)
  podAnnotations:
    otel.injected-by: kyverno/inject-otel-env-vars
