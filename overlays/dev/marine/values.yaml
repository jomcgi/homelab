# Development overrides for marine services

# Enable image pull secret for GHCR
imagePullSecret:
  enabled: true
# Configure pods to use the image pull secret
imagePullSecrets:
- name: ghcr-imagepull-secret
# AIS Ingest component
ingest:
  image:
    repository: ghcr.io/jomcgi/homelab/services/ais-ingest
    tag: "latest@sha256:bf6773517df17b434fa1bd7ed78ec6c09507856baf59aa479b76cc54a8b08cb8"
    pullPolicy: Always
  # Pre-populate OTEL annotation to match Kyverno injection (prevents ArgoCD drift)
  podAnnotations:
    otel.injected-by: kyverno/inject-otel-env-vars
# Ships API component
api:
  image:
    repository: ghcr.io/jomcgi/homelab/services/ships-api
    tag: "latest@sha256:29af318cbbfadc2036b8cbaab7416ae34f1cd605146d1df8639c4496e890e75e"
    pullPolicy: Always
  # Overprovisioned for catchup - reduce after caught up
  resources:
    requests:
      cpu: 1
      memory: 1Gi
    limits:
      memory: 10Gi
  # Pre-populate OTEL annotation to match Kyverno injection (prevents ArgoCD drift)
  podAnnotations:
    otel.injected-by: kyverno/inject-otel-env-vars
frontend:
  image:
    tag: main@sha256:f9c6db3208a94839c7733e10317721986435f52ae3255acb92073a19d67fb12f
    repository: ghcr.io/jomcgi/homelab/services/ships-frontend
  # Zero Trust access policy - disabled, manually configured in Cloudflare
  zeroTrust:
    policyId: ""
  # Pre-populate OTEL annotation to match Kyverno injection (prevents ArgoCD drift)
  podAnnotations:
    otel.injected-by: kyverno/inject-otel-env-vars
