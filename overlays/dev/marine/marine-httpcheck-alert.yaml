apiVersion: v1
kind: ConfigMap
metadata:
  name: marine-httpcheck-alert
  namespace: marine
  labels:
    signoz.io/alert: "true"
  annotations:
    signoz.io/alert-name: "marine Unreachable"
    signoz.io/severity: "warning"
    signoz.io/notification-channels: "pagerduty-homelab"
data:
  alert.json: |
    {
      "alert": "marine Unreachable",
      "alertType": "METRICS_BASED_ALERT",
      "ruleType": "threshold_rule",
      "version": "v5",
      "broadcastToAll": false,
      "disabled": false,
      "evalWindow": "10m0s",
      "frequency": "2m0s",
      "severity": "warning",
      "labels": {
        "service": "marine",
        "environment": "development"
      },
      "annotations": {
        "summary": "marine at ships.jomcgi.dev is unreachable",
        "description": "HTTP health check has failed 5 consecutive times over 10 minutes. This could indicate the service is down or Cloudflare auth is failing (3xx redirect)."
      },
      "condition": {
        "compositeQuery": {
          "queries": [
            {
              "type": "builder_query",
              "spec": {
                "name": "A",
                "signal": "metrics",
                "stepInterval": 60,
                "aggregations": [
                  {
                    "timeAggregation": "avg",
                    "spaceAggregation": "avg",
                    "metricName": "httpcheck.status"
                  }
                ],
                "filters": {
                  "items": [
                    {
                      "key": {
                        "key": "http.url",
                        "dataType": "string",
                        "type": "tag",
                        "isColumn": false
                      },
                      "op": "=",
                      "value": "https://ships.jomcgi.dev"
                    }
                  ],
                  "op": "AND"
                },
                "groupBy": [],
                "order": [],
                "disabled": false
              }
            }
          ],
          "panelType": "graph",
          "queryType": "builder"
        },
        "selectedQueryName": "A",
        "thresholds": {
          "kind": "basic",
          "spec": [
            {
              "name": "warning",
              "target": 1,
              "targetUnit": "",
              "matchType": "5",
              "op": "<",
              "channels": ["pagerduty-homelab"]
            }
          ]
        }
      },
      "preferredChannels": ["pagerduty-homelab"]
    }
