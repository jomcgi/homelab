apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: marine
  namespace: argocd
spec:
  applicationRefs:
    - images:
        - alias: ingest
          commonUpdateSettings:
            updateStrategy: digest
            forceUpdate: false
          imageName: ghcr.io/jomcgi/homelab/services/ais_ingest:main
          manifestTargets:
            helm:
              name: ingest.image.repository
              tag: ingest.image.digest
        - alias: api
          commonUpdateSettings:
            updateStrategy: digest
            forceUpdate: false
          imageName: ghcr.io/jomcgi/homelab/services/ships_api:main
          manifestTargets:
            helm:
              name: api.image.repository
              tag: api.image.digest
        - alias: frontend
          commonUpdateSettings:
            updateStrategy: digest
            forceUpdate: false
          imageName: ghcr.io/jomcgi/homelab/services/ships_frontend:main
          manifestTargets:
            helm:
              name: frontend.image.repository
              tag: frontend.image.digest
      namePattern: marine
  namespace: argocd
  writeBackConfig:
    method: git:secret:argocd/argocd-image-updater-token
    gitConfig:
      repository: https://github.com/jomcgi/homelab.git
      branch: main
      writeBackTarget: helmvalues:../../overlays/dev/marine/values.yaml
