      labels:
        app.kubernetes.io/name: marine
        app.kubernetes.io/instance: marine
        app.kubernetes.io/component: frontend
      annotations:
    spec:
      imagePullSecrets:
        - name: ghcr-imagepull-secret
      serviceAccountName: marine
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: "ghcr.io/jomcgi/homelab/services/ships-frontend:main@sha256:f4a098089718a696512175b896954e7b5b703a1583e68126584f7bb617c1f334"
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: API_URL
              value: "http://marine-api:8000"
            - name: PUBLIC_DIR
              value: /app/public/websites/ships.jomcgi.dev/dist
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 60
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
