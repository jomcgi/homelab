# Source: marine/templates/image-pull-secret.yaml
# GHCR Pull Secret (for Kubernetes image pulls)
# Allows marine services to pull private images from GitHub Container Registry
# Type: kubernetes.io/dockerconfigjson (used for imagePullSecrets)
apiVersion: onepassword.com/v1
kind: OnePasswordItem
type: kubernetes.io/dockerconfigjson
metadata:
  name: ghcr-imagepull-secret
  namespace: marine
  labels:
    helm.sh/chart: marine-0.1.0
    app.kubernetes.io/name: marine
    app.kubernetes.io/instance: marine
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"
