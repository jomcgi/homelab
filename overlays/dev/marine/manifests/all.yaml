# Source: marine/templates/api-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marine-api
  labels:
    helm.sh/chart: marine-0.1.0
    app.kubernetes.io/name: marine
    app.kubernetes.io/instance: marine
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: marine
      app.kubernetes.io/instance: marine
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: marine
        app.kubernetes.io/instance: marine
        app.kubernetes.io/component: api
      annotations:
        # Mark NATS port as opaque for Linkerd
        config.linkerd.io/opaque-ports: "4222"
    spec:
      imagePullSecrets:
        - name: ghcr-imagepull-secret
      serviceAccountName: marine
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "ghcr.io/jomcgi/homelab/services/ships-api:latest@sha256:efc8c87841507ab1cb31ade9b302ada87f0f6cc53da817b3f636853019f67d15"
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            # UV/Python needs writable directories
            - name: HOME
              value: /tmp
            - name: UV_CACHE_DIR
              value: /tmp/.uv-cache
            - name: NATS_URL
              value: "nats://nats.nats.svc.cluster.local:4222"
            - name: CORS_ORIGINS
              value: "http://localhost:3000"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 128Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
