# Source: marine/templates/ingest-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marine-ingest
  labels:
    helm.sh/chart: marine-0.1.0
    app.kubernetes.io/name: marine
    app.kubernetes.io/instance: marine
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: marine
      app.kubernetes.io/instance: marine
      app.kubernetes.io/component: ingest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: marine
        app.kubernetes.io/instance: marine
        app.kubernetes.io/component: ingest
      annotations:
        # Mark NATS port as opaque for Linkerd
        config.linkerd.io/opaque-ports: "4222"
    spec:
      imagePullSecrets:
        - name: ghcr-imagepull-secret
      serviceAccountName: marine
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ingest
          image: "ghcr.io/jomcgi/homelab/services/ais-ingest:latest@sha256:25d869b0be81ca6958db54e8c4f61382dbfb49e131e7e244f146dde1ae7c074b"
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            # UV/Python needs writable directories
            - name: HOME
              value: /tmp
            - name: UV_CACHE_DIR
              value: /tmp/.uv-cache
            # Point Python SSL to system CA certificates
            - name: SSL_CERT_FILE
              value: /etc/ssl/certs/ca-certificates.crt
            - name: NATS_URL
              value: "nats://nats.nats.svc.cluster.local:4222"
            - name: AISSTREAM_URL
              value: "wss://stream.aisstream.io/v0/stream"
            - name: BOUNDING_BOX
              value: "[[[46.876152, -129.552155], [51.413769, -121.213531]]]"
            - name: AISSTREAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: marine
                  key: ais-stream-api-key
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 20m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
