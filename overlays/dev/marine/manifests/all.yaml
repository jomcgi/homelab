# Source: marine/templates/ingest-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marine-ingest
  labels:
    helm.sh/chart: marine-0.1.0
    app.kubernetes.io/name: marine
    app.kubernetes.io/instance: marine
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: marine
      app.kubernetes.io/instance: marine
      app.kubernetes.io/component: ingest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: marine
        app.kubernetes.io/instance: marine
        app.kubernetes.io/component: ingest
      annotations:
        # Mark NATS port as opaque for Linkerd
        config.linkerd.io/opaque-ports: "4222"
        otel.injected-by: kyverno/inject-otel-env-vars
    spec:
      imagePullSecrets:
        - name: ghcr-imagepull-secret
      serviceAccountName: marine
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ingest
          image: "ghcr.io/jomcgi/homelab/services/ais-ingest:main@sha256:f1f4b610559997c7ae204f0ff7a66da4b7fe61c57c905ed36a19ba3db179342a"
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            # UV/Python needs writable directories
            - name: HOME
              value: /tmp
            - name: UV_CACHE_DIR
              value: /tmp/.uv-cache
            # Point Python SSL to system CA certificates
            - name: SSL_CERT_FILE
              value: /etc/ssl/certs/ca-certificates.crt
            - name: NATS_URL
              value: "nats://nats.nats.svc.cluster.local:4222"
            - name: AISSTREAM_URL
              value: "wss://stream.aisstream.io/v0/stream"
            - name: BOUNDING_BOX
              value: "[[[-2.455379, -173.009262], [71.414709, -32.0327]]]"
            - name: AISSTREAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: marine
                  key: ais-stream-api-key
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
# Source: marine/templates/api-deployment.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: marine-api
  labels:
    helm.sh/chart: marine-0.1.0
    app.kubernetes.io/name: marine
    app.kubernetes.io/instance: marine
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: api
spec:
  serviceName: marine-api
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: marine
      app.kubernetes.io/instance: marine
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: marine
        app.kubernetes.io/instance: marine
        app.kubernetes.io/component: api
      annotations:
        # Mark NATS port as opaque for Linkerd
        config.linkerd.io/opaque-ports: "4222"
        otel.injected-by: kyverno/inject-otel-env-vars
    spec:
      imagePullSecrets:
        - name: ghcr-imagepull-secret
      serviceAccountName: marine
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "ghcr.io/jomcgi/homelab/services/ships-api:latest@sha256:3ca2d8a633e7592a8500e69f901c4a07cde368c66142fa5f64b532d4bf3b6dfe"
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            # UV/Python needs writable directories
            - name: HOME
              value: /tmp
            - name: UV_CACHE_DIR
              value: /tmp/.uv-cache
            - name: NATS_URL
              value: "nats://nats.nats.svc.cluster.local:4222"
            - name: CORS_ORIGINS
              value: "http://localhost:3000"
            - name: DB_PATH
              value: /data/ships.db
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            # Allow longer startup for large replay
            failureThreshold: 360
          resources:
            limits:
              memory: 10Gi
            requests:
              cpu: 1
              memory: 1Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /data
      volumes:
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 20Gi
