apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ttyd-session-manager
  namespace: argocd
  annotations:
    # ArgoCD Image Updater configuration - watch backend, frontend, and worker images
    argocd-image-updater.argoproj.io/image-list: backend=ghcr.io/jomcgi/homelab/charts/ttyd-session-manager/backend, frontend=ghcr.io/jomcgi/homelab/charts/ttyd-session-manager/frontend, worker=ghcr.io/jomcgi/homelab/charts/ttyd-session-manager/ttyd-worker

    # Backend image configuration
    argocd-image-updater.argoproj.io/backend.update-strategy: latest
    argocd-image-updater.argoproj.io/backend.allow-tags: regexp:^main$
    argocd-image-updater.argoproj.io/backend.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/backend.helm.image-tag: image.tag

    # Frontend image configuration
    argocd-image-updater.argoproj.io/frontend.update-strategy: latest
    argocd-image-updater.argoproj.io/frontend.allow-tags: regexp:^main$
    argocd-image-updater.argoproj.io/frontend.helm.image-name: frontend.image.repository
    argocd-image-updater.argoproj.io/frontend.helm.image-tag: frontend.image.tag

    # Worker image configuration
    argocd-image-updater.argoproj.io/worker.update-strategy: latest
    argocd-image-updater.argoproj.io/worker.allow-tags: regexp:^main$
    argocd-image-updater.argoproj.io/worker.helm.image-name: workerImage.repository
    argocd-image-updater.argoproj.io/worker.helm.image-tag: workerImage.tag

    # Write back method - use argocd parameter override (faster than git writeback)
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab
    targetRevision: main
    path: charts/ttyd-session-manager
    helm:
      valueFiles:
        - values.yaml
        - ../../overlays/dev/ttyd-session-manager/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ttyd-sessions
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
