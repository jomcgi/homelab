apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ttyd-session-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab
    targetRevision: main
    path: charts/ttyd-session-manager
    helm:
      valueFiles:
        - values.yaml
        - ../../overlays/dev/ttyd-session-manager/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ttyd-sessions
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
