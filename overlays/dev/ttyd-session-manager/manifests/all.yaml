# Source: ttyd-session-manager/templates/session-rbac.yaml
# ClusterRole with read-only access to cluster resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ttyd-session-pods-reader
  labels:
    helm.sh/chart: ttyd-session-manager-0.1.0
    app.kubernetes.io/name: ttyd-session-manager
    app.kubernetes.io/instance: ttyd-session-manager
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
rules:
# Read-only access to core resources
- apiGroups: [""]
  resources:
    - pods
    - pods/log
    - services
    - endpoints
    - persistentvolumeclaims
    - persistentvolumes
    - configmaps
    - secrets  # metadata only, not secret data
    - namespaces
    - nodes
    - events
  verbs: ["get", "list", "watch"]

# Read-only access to apps resources
- apiGroups: ["apps"]
  resources:
    - deployments
    - daemonsets
    - replicasets
    - statefulsets
  verbs: ["get", "list", "watch"]

# Read-only access to batch resources
- apiGroups: ["batch"]
  resources:
    - jobs
    - cronjobs
  verbs: ["get", "list", "watch"]

# Read-only access to networking
- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
    - networkpolicies
  verbs: ["get", "list", "watch"]

# Read-only access to storage
- apiGroups: ["storage.k8s.io"]
  resources:
    - storageclasses
    - volumeattachments
  verbs: ["get", "list", "watch"]

# Read-only access to RBAC (for inspection)
- apiGroups: ["rbac.authorization.k8s.io"]
  resources:
    - roles
    - rolebindings
    - clusterroles
    - clusterrolebindings
  verbs: ["get", "list", "watch"]

# Read-only access to metrics
- apiGroups: ["metrics.k8s.io"]
  resources:
    - pods
    - nodes
  verbs: ["get", "list"]

# Read-only access to ArgoCD applications (if installed)
- apiGroups: ["argoproj.io"]
  resources:
    - applications
    - applicationsets
    - appprojects
  verbs: ["get", "list", "watch"]

# Read-only access to cert-manager (if installed)
- apiGroups: ["cert-manager.io"]
  resources:
    - certificates
    - certificaterequests
    - issuers
    - clusterissuers
  verbs: ["get", "list", "watch"]
