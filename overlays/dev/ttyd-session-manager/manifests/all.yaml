apiVersion: apps/v1
kind: Deployment
metadata:
  name: ttyd-session-manager
  namespace: ttyd-sessions
  labels:
    helm.sh/chart: ttyd-session-manager-0.1.0
    app.kubernetes.io/name: ttyd-session-manager
    app.kubernetes.io/instance: ttyd-session-manager
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ttyd-session-manager
      app.kubernetes.io/instance: ttyd-session-manager
  template:
    metadata:
      annotations:
        checksum/envoy-config: deb0b3b6581f0005b446a3b5813ebaf14242504e5c29ec7d770c276e4f620270
      labels:
        app.kubernetes.io/name: ttyd-session-manager
        app.kubernetes.io/instance: ttyd-session-manager
    spec:
      serviceAccountName: ttyd-session-manager
      imagePullSecrets:
        - name: ttyd-session-manager-github-dockerconfig
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: envoy
        image: "envoyproxy/envoy:v1.31-latest"
        imagePullPolicy: IfNotPresent
        args:
        - -c
        - /etc/envoy/envoy.yaml
        ports:
        - containerPort: 8080
          name: envoy-proxy
          protocol: TCP
        - containerPort: 9901
          name: envoy-admin
          protocol: TCP
        volumeMounts:
        - name: envoy-config
          mountPath: /etc/envoy
          readOnly: true
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 65534
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        livenessProbe:
          httpGet:
            path: /ready
            port: 9901
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: 9901
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
      - name: api-server
        image: "ghcr.io/jomcgi/homelab/charts/ttyd-session-manager/backend:2025.11.07.22.13.50-2b707ff"
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8081
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: API_KEYS_SECRET_NAME
          value: "ttyd-session-manager-api-keys"
        - name: ANTHROPIC_SECRET_KEY
          value: "anthropic_api_key"
        - name: GOOGLE_SECRET_KEY
          value: "google_api_key"
        - name: BUILDBUDDY_SECRET_KEY
          value: "buildbuddy_api_key"
        - name: OTEL_ENABLED
          value: "true"
        - name: OTEL_ENDPOINT
          value: "http://signoz-otel-collector.signoz.svc.cluster.local:4317"
        resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
      volumes:
      - name: envoy-config
        configMap:
          name: ttyd-session-manager-envoy-backend
          items:
          - key: envoy.yaml
            path: envoy.yaml
