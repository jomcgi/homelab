# Source: ttyd-session-manager/templates/frontend-nginx-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: ttyd-session-manager-frontend-nginx
  namespace: ttyd-sessions
  labels:
    helm.sh/chart: ttyd-session-manager-0.1.0
    app.kubernetes.io/name: ttyd-session-manager
    app.kubernetes.io/instance: ttyd-session-manager
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: frontend
data:
  nginx.conf: |
    # Run as nginx user
    user nginx nginx;

    # Worker processes
    worker_processes auto;

    # Error log to mounted emptyDir volume
    error_log /var/lib/nginx/logs/error.log warn;

    # PID file in mounted emptyDir volume
    pid /run/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        # Logging to stdout/stderr for container best practices
        access_log /dev/stdout;
        error_log /dev/stderr warn;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript
                   application/x-javascript application/xml+rss
                   application/javascript application/json;

        # Temp paths in mounted emptyDir volume
        client_body_temp_path /var/lib/nginx/tmp/client_body;
        proxy_temp_path /var/lib/nginx/tmp/proxy;
        fastcgi_temp_path /var/lib/nginx/tmp/fastcgi;
        uwsgi_temp_path /var/lib/nginx/tmp/uwsgi;
        scgi_temp_path /var/lib/nginx/tmp/scgi;

        server {
            listen 80;
            server_name _;

            root /usr/share/nginx/html;
            index index.html;

            # Security headers
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;

            # Serve frontend
            location / {
                try_files $uri $uri/ /index.html;
                # Cache-busting headers for HTML files
                add_header Cache-Control "no-cache, no-store, must-revalidate" always;
                add_header Pragma "no-cache" always;
                add_header Expires "0" always;
            }

            # Cache static assets (if they exist in the future)
            location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
                add_header Cache-Control "public, max-age=31536000, immutable" always;
                expires 1y;
                access_log off;
            }

            # Proxy API requests to backend
            location /api/ {
                proxy_pass http://ttyd-session-manager:8080;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # WebSocket support for /api/sessions/:id/terminal
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";

                # Timeouts for WebSocket
                proxy_connect_timeout 7d;
                proxy_send_timeout 7d;
                proxy_read_timeout 7d;
            }

            # Health check endpoint
            location /health {
                access_log off;
                return 200 "healthy\n";
                add_header Content-Type text/plain;
            }
        }
    }
