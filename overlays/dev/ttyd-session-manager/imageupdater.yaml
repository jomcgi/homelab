apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: ttyd-session-manager
  namespace: argocd
spec:
  namespace: argocd
  writeBackConfig:
    method: "git"
    gitConfig:
      repository: "https://github.com/jomcgi/homelab.git"
      branch: "main"
      writeBackTarget: "helmvalues:overlays/dev/ttyd-session-manager/values.yaml"
      credentials:
        secretRef:
          name: argocd-image-updater-token
          namespace: argocd
  applicationRefs:
    - namePattern: "ttyd-session-manager"
      images:
        - alias: "backend"
          imageName: "ghcr.io/jomcgi/homelab/charts/ttyd-session-manager/backend"
          commonUpdateSettings:
            updateStrategy: "alphabetical"
            allowTags: "regexp:^[0-9]{4}\\.[0-9]{2}\\.[0-9]{2}\\.[0-9]{2}\\.[0-9]{2}\\.[0-9]{2}-[0-9a-f]{7}$"
          manifestTargets:
            helm:
              name: "image.repository"
              tag: "image.tag"
        - alias: "frontend"
          imageName: "ghcr.io/jomcgi/homelab/charts/ttyd-session-manager/frontend"
          commonUpdateSettings:
            updateStrategy: "alphabetical"
            allowTags: "regexp:^[0-9]{4}\\.[0-9]{2}\\.[0-9]{2}\\.[0-9]{2}\\.[0-9]{2}\\.[0-9]{2}-[0-9a-f]{7}$"
          manifestTargets:
            helm:
              name: "frontend.image.repository"
              tag: "frontend.image.tag"
        - alias: "worker"
          imageName: "ghcr.io/jomcgi/homelab/charts/ttyd-session-manager/ttyd-worker"
          commonUpdateSettings:
            updateStrategy: "alphabetical"
            allowTags: "regexp:^[0-9]{4}\\.[0-9]{2}\\.[0-9]{2}\\.[0-9]{2}\\.[0-9]{2}\\.[0-9]{2}-[0-9a-f]{7}$"
          manifestTargets:
            helm:
              name: "workerImage.repository"
              tag: "workerImage.tag"
