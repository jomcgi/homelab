# Development environment overrides for ttyd-session-manager
# Image tags are managed by ArgoCD Image Updater

image:
  repository: ghcr.io/jomcgi/homelab/charts/ttyd-session-manager/backend
  tag: "2025.11.15.05.42.53-cc0ce9b" # argocd-image-updater
  pullPolicy: Always
frontend:
  enabled: true
  image:
    repository: ghcr.io/jomcgi/homelab/charts/ttyd-session-manager/frontend
    tag: "2025.11.15.05.42.53-cc0ce9b" # argocd-image-updater
    pullPolicy: Always
  # Enable cache busting to prevent browser caching issues in development
  cacheBusting:
    enabled: true
workerImage:
  repository: ghcr.io/jomcgi/homelab/charts/ttyd-session-manager/ttyd-worker
  tag: "2025.11.15.05.42.53-cc0ce9b" # argocd-image-updater
replicaCount: 1
sessionNamespace: ttyd-sessions
service:
  type: ClusterIP
  port: 8080
  targetPort: 8081 # Backend listens on 8081, Envoy proxies 8080->8081
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
serviceAccount:
  create: true
  name: ttyd-session-manager
onePassword:
  enabled: true
  itemPath: "vaults/k8s-homelab/items/ttyd-session-manager"

# Disable tracing for lower latency (optional - for testing)
# envoy:
#   backend:
#     tracing:
#       enabled: false
#   session:
#     tracing:
#       enabled: false
