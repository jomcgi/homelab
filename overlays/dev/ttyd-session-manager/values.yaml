# Development environment overrides for ttyd-session-manager

image:
  repository: ghcr.io/jomcgi/ttyd-session-manager
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

sessionNamespace: ttyd-sessions

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceAccount:
  create: true
  name: ttyd-session-manager

onePassword:
  enabled: true
  itemPath: "vaults/k8s-homelab/items/ttyd-session-manager"
