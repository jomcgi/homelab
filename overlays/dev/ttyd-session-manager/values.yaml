# Development environment overrides for ttyd-session-manager

image:
  repository: ghcr.io/jomcgi/homelab/charts/ttyd-session-manager/backend
  tag: "2025.11.07.22.13.50-2b707ff"
  pullPolicy: Always

frontend:
  enabled: true
  image:
    repository: ghcr.io/jomcgi/homelab/charts/ttyd-session-manager/frontend
    tag: "main"
    pullPolicy: Always

replicaCount: 1

sessionNamespace: ttyd-sessions

service:
  type: ClusterIP
  port: 8080
  targetPort: 8081  # Backend listens on 8081, Envoy proxies 8080->8081

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceAccount:
  create: true
  name: ttyd-session-manager

onePassword:
  enabled: true
  itemPath: "vaults/k8s-homelab/items/ttyd-session-manager"
