# Dev environment values for cloudflare-operator-test

# Public service (no auth)
noauth:
  enabled: true
  hostname: cf-noauth-test.jomcgi.dev
  text: "Hello from public service (no auth required) - DEV"

# Protected service (Zero Trust enabled)
auth:
  enabled: true
  hostname: cf-auth-test.jomcgi.dev
  policy: joe-only
  text: "Hello from protected service (Zero Trust enabled) - DEV"

# Use the default daemon tunnel
tunnel:
  name: default-daemon-tunnel
