---
# Source: cloudflare-operator-test/templates/auth-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: cloudflare-operator-test-auth
  labels:
    helm.sh/chart: cloudflare-operator-test-0.1.0
    app.kubernetes.io/name: cloudflare-operator-test
    app.kubernetes.io/instance: cloudflare-operator-test
    app.kubernetes.io/version: "1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: auth
  annotations:
    # Cloudflare operator annotations
    cloudflare.ingress.hostname: cf-auth-test.jomcgi.dev
    cloudflare.zero-trust.policy: joe-only
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: cloudflare-operator-test
    app.kubernetes.io/instance: cloudflare-operator-test
    app.kubernetes.io/component: auth
---
# Source: cloudflare-operator-test/templates/noauth-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: cloudflare-operator-test-noauth
  labels:
    helm.sh/chart: cloudflare-operator-test-0.1.0
    app.kubernetes.io/name: cloudflare-operator-test
    app.kubernetes.io/instance: cloudflare-operator-test
    app.kubernetes.io/version: "1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: noauth
  annotations:
    # Cloudflare operator annotations
    cloudflare.ingress.hostname: cf-noauth-test.jomcgi.dev
    cloudflare.zero-trust.enabled: "false"
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
