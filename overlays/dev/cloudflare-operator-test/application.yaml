apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-operator-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    targetRevision: HEAD
    path: charts/cloudflare-operator-test
    helm:
      valueFiles:
        - values.yaml
        - ../../overlays/dev/cloudflare-operator-test/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflare-operator-test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
