---
# Source: freshrss/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshrss
  labels:
    helm.sh/chart: freshrss-0.1.0
    app.kubernetes.io/name: freshrss
    app.kubernetes.io/instance: freshrss
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1  # Single replica due to persistent storage
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: freshrss
      app.kubernetes.io/instance: freshrss
  template:
    metadata:
      annotations:
        checksum/config: f6919a7e25300e1b0997f9db75fd3e533ac0b2b6134bcf0f36b6aec832a3d353
      labels:
        app.kubernetes.io/name: freshrss
        app.kubernetes.io/instance: freshrss
        app: freshrss
        environment: dev
    spec:
      serviceAccountName: freshrss
      securityContext:
        fsGroup: 33
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: freshrss
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
        image: "freshrss/freshrss:latest"
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        env:
        - name: TZ
          value: "America/New_York"
        - name: CRON_MIN
          value: "*/15"
        - name: FRESHRSS_ENV
          value: "development"
        - name: COPY_LOG_TO_SYSLOG
          value: "On"
        - name: COPY_SYSLOG_TO_STDERR
          value: "On"
        - name: LISTEN
          value: "0.0.0.0:80"
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 250m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
        volumeMounts:
        - name: data
          mountPath: /var/www/FreshRSS/data
        - name: extensions
          mountPath: /var/www/FreshRSS/extensions
        # Temporary writable directories required by FreshRSS
        - name: tmp
          mountPath: /tmp
        - name: apache-run
          mountPath: /var/run/apache2
        - name: apache-lock
          mountPath: /var/lock/apache2
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: freshrss-data
      - name: extensions
        persistentVolumeClaim:
          claimName: freshrss-extensions
      # Temporary emptyDir volumes for writable directories
      - name: tmp
        emptyDir: {}
      - name: apache-run
        emptyDir: {}
      - name: apache-lock
        emptyDir: {}
