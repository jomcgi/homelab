## Dev environment overrides for Fizzy

## Use SQLite for simplicity (no external database needed)
database:
  adapter: sqlite

## Persistence for SQLite and Rails storage
persistence:
  enabled: true
  storageClass: "longhorn"
  size: 2Gi

## Single replica (required for SQLite)
web:
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi

worker:
  replicas: 1
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 25m
      memory: 64Mi

## Secrets configuration
## Only SECRET_KEY_BASE is required - generate your own:
##
##   openssl rand -hex 64
##
## Then create 1Password item "fizzy-credentials" with SECRET_KEY_BASE field
##
## Note: RAILS_MASTER_KEY is NOT needed. That's for decrypting Basecamp's
## credentials.yml.enc which is baked into their image - you can't use it.
secrets:
  secretKeyBase:
    existingSecret: "fizzy-credentials"
    secretKey: "SECRET_KEY_BASE"

## Add dev-specific labels
podLabels:
  environment: dev
  app: fizzy
