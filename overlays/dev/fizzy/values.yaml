## Dev environment overrides for Fizzy

## Persistence for SQLite and Rails storage
persistence:
  enabled: true
  storageClass: "longhorn"
  size: 2Gi

## Single replica (required for SQLite)
## Puma starts 6 workers by default, each ~200MB, so needs 1.5Gi+
web:
  replicas: 1
  resources:
    limits:
      cpu: 1000m
      memory: 1536Mi
    requests:
      cpu: 100m
      memory: 1536Mi

worker:
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 50m
      memory: 1Gi

## Add dev-specific labels
podLabels:
  environment: dev
  app: fizzy
