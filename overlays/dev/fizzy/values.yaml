## Dev environment overrides for Fizzy

## Use SQLite for simplicity (no external database needed)
database:
  adapter: sqlite

## Persistence for SQLite and Rails storage
persistence:
  enabled: true
  storageClass: "longhorn"
  size: 2Gi

## Single replica (required for SQLite)
web:
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi

worker:
  replicas: 1
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 25m
      memory: 64Mi

## Secrets configuration
## Only RAILS_MASTER_KEY is required - get it from fizzy repo's config/master.key
##
## To deploy:
##   1. git clone https://github.com/basecamp/fizzy
##   2. Copy config/master.key content
##   3. Create 1Password item "fizzy-credentials" with RAILS_MASTER_KEY field
##
## Optional secrets (for push notifications):
##   - VAPID_PRIVATE_KEY / VAPID_PUBLIC_KEY (only if using PWA push)
secrets:
  railsMasterKey:
    existingSecret: "fizzy-credentials"
    secretKey: "RAILS_MASTER_KEY"
  # SECRET_KEY_BASE is usually in credentials.yml.enc, no need to set separately
  # VAPID keys only needed for web push notifications - uncomment if using:
  # vapid:
  #   existingSecret: "fizzy-credentials"
  #   privateKeySecretKey: "VAPID_PRIVATE_KEY"
  #   publicKeySecretKey: "VAPID_PUBLIC_KEY"

## Add dev-specific labels
podLabels:
  environment: dev
  app: fizzy
