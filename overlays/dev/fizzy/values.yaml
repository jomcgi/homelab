## Dev environment overrides for Fizzy

## Use SQLite for simplicity (no external database needed)
database:
  adapter: sqlite

## Persistence for SQLite and Rails storage
persistence:
  enabled: true
  storageClass: "longhorn"
  size: 2Gi  # Smaller for dev

## Single replica (required for SQLite)
web:
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi

worker:
  replicas: 1
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 25m
      memory: 64Mi

## Secrets configuration
## Create OnePasswordItem CRD for fizzy-credentials in 1Password
## Required secrets (no DATABASE_URL needed for SQLite):
##   - RAILS_MASTER_KEY: (clone fizzy repo, copy from config/master.key)
##   - SECRET_KEY_BASE: (generate with: openssl rand -hex 64)
##   - VAPID_PRIVATE_KEY: (generate with web-push gem)
##   - VAPID_PUBLIC_KEY: (generate with web-push gem)
secrets:
  railsMasterKey:
    existingSecret: "fizzy-credentials"
    secretKey: "RAILS_MASTER_KEY"
  secretKeyBase:
    existingSecret: "fizzy-credentials"
    secretKey: "SECRET_KEY_BASE"
  vapid:
    existingSecret: "fizzy-credentials"
    privateKeySecretKey: "VAPID_PRIVATE_KEY"
    publicKeySecretKey: "VAPID_PUBLIC_KEY"

## Add dev-specific labels
podLabels:
  environment: dev
  app: fizzy
