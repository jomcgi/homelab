apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fizzy
  namespace: argocd
  annotations:
    # ArgoCD Image Updater: track main tag by digest
    argocd-image-updater.argoproj.io/image-list: fizzy=ghcr.io/basecamp/fizzy
    argocd-image-updater.argoproj.io/fizzy.update-strategy: digest
    argocd-image-updater.argoproj.io/fizzy.allow-tags: regexp:^main$
    argocd-image-updater.argoproj.io/write-back-method: git
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab
    targetRevision: HEAD
    path: charts/fizzy
    helm:
      releaseName: fizzy
      valueFiles:
        - values.yaml
        - ../../overlays/dev/fizzy/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: fizzy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
