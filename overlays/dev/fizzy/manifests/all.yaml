# Source: fizzy/templates/secret-generator-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: fizzy-generate-secret
  labels:
    helm.sh/chart: fizzy-0.1.0
    app.kubernetes.io/name: fizzy
    app.kubernetes.io/instance: fizzy
    app.kubernetes.io/version: "main"
    app.kubernetes.io/managed-by: Helm
  annotations:
    # ArgoCD hook: run before syncing other resources
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fizzy
        app.kubernetes.io/instance: fizzy
    spec:
      restartPolicy: Never
      serviceAccountName: fizzy-secret-generator
      containers:
      - name: generate-secret
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          SECRET_NAME="fizzy-credentials"
          NAMESPACE="fizzy"

          # Check if secret already exists
          if kubectl get secret "$SECRET_NAME" -n "$NAMESPACE" >/dev/null 2>&1; then
            echo "Secret $SECRET_NAME already exists, skipping generation"
            exit 0
          fi

          # Generate random SECRET_KEY_BASE (128 alphanumeric chars)
          SECRET_KEY_BASE=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 128 | head -n 1)

          # Create the secret
          kubectl create secret generic "$SECRET_NAME" \
            --namespace "$NAMESPACE" \
            --from-literal=SECRET_KEY_BASE="$SECRET_KEY_BASE"

          # Add resource-policy annotation to preserve on uninstall
          kubectl annotate secret "$SECRET_NAME" \
            --namespace "$NAMESPACE" \
            "helm.sh/resource-policy=keep"

          echo "Secret $SECRET_NAME created successfully"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
