apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n-obsidian-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    path: charts/n8n-obsidian-api
    targetRevision: HEAD
    helm:
      releaseName: n8n-obsidian-api
      valueFiles:
        - values.yaml
        - ../../overlays/dev/n8n-obsidian-api/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: n8n
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
