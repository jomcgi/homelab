# Development overrides for n8n-obsidian-api

config:
  # Obsidian API URL via Cloudflare Tunnel
  obsidianApiUrl: "https://obsidian.jomcgi.dev"

  # Cloudflare service token for bypassing Access
  # Note: 1Password operator normalizes field names (CF_CLIENT_ACCESS_ID -> cf_client_access_id)
  cloudflare:
    secretName: "n8n-obsidian-api-credentials"
    clientIdKey: "cf_client_access_id"
    clientSecretKey: "cf_client_access_secret"

  opentelemetry:
    enabled: true
    serviceName: "n8n-obsidian-api"
    # TODO: Configure OTLP endpoint once SigNoz is deployed
    # otlpEndpoint: "http://signoz-otel-collector.signoz:4317"
    otlpEndpoint: ""

# 1Password integration
# Uses existing item with fields: CF_CLIENT_ACCESS_ID, CF_CLIENT_ACCESS_SECRET
# These credentials are used to bypass Cloudflare Access when calling the Obsidian API
onePassword:
  enabled: true
  itemPath: "vaults/k8s-homelab/items/obsidian-cloudflare"
