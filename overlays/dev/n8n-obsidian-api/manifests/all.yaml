# Source: n8n-obsidian-api/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-obsidian-api
  labels:
    helm.sh/chart: n8n-obsidian-api-0.1.0
    app.kubernetes.io/name: n8n-obsidian-api
    app.kubernetes.io/instance: n8n-obsidian-api
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n-obsidian-api
      app.kubernetes.io/instance: n8n-obsidian-api
  template:
    metadata:
      annotations:
        checksum/config: 88ae97570cdfaa547fd3651a2a052699ddf0c5f99aa9e7b131ac7a084691aef2
      labels:
        app.kubernetes.io/name: n8n-obsidian-api
        app.kubernetes.io/instance: n8n-obsidian-api
    spec:
      imagePullSecrets:
        - name: n8n-obsidian-api-ghcr
      serviceAccountName: n8n-obsidian-api
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: n8n-obsidian-api
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          seccompProfile:
            type: RuntimeDefault
        image: "ghcr.io/jomcgi/homelab/n8n-obsidian-api:latest"
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: OBSIDIAN_API_URL
          valueFrom:
            configMapKeyRef:
              name: n8n-obsidian-api
              key: obsidian-api-url
        - name: CLOUDFLARE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: n8n-obsidian-api-credentials
              key: CF_CLIENT_ACCESS_ID
        - name: CLOUDFLARE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: n8n-obsidian-api-credentials
              key: CF_ACCESS_CLIENT_SECRET
        - name: SERVICE_HOST
          valueFrom:
            configMapKeyRef:
              name: n8n-obsidian-api
              key: service-host
        - name: SERVICE_PORT
          valueFrom:
            configMapKeyRef:
              name: n8n-obsidian-api
              key: service-port
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: n8n-obsidian-api
              key: log-level
        - name: OTEL_ENABLED
          valueFrom:
            configMapKeyRef:
              name: n8n-obsidian-api
              key: otel-enabled
        - name: OTEL_SERVICE_NAME
          valueFrom:
            configMapKeyRef:
              name: n8n-obsidian-api
              key: otel-service-name
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
