# Source: ais-ingest/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ais-ingest
  labels:
    helm.sh/chart: ais-ingest-0.1.0
    app.kubernetes.io/name: ais-ingest
    app.kubernetes.io/instance: ais-ingest
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ais-ingest
      app.kubernetes.io/instance: ais-ingest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ais-ingest
        app.kubernetes.io/instance: ais-ingest
      annotations:
        # Mark NATS port as opaque for Linkerd
        config.linkerd.io/opaque-ports: "4222"
    spec:
      imagePullSecrets:
        - name: ghcr-imagepull-secret
      serviceAccountName: ais-ingest
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ais-ingest
          image: "ghcr.io/jomcgi/homelab/services/ais-ingest:2026.01.17.07.34.03-01c5a42"
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            # UV/Python needs writable directories
            - name: HOME
              value: /tmp
            - name: UV_CACHE_DIR
              value: /tmp/.uv-cache
            # rules_python bootstrap files need writable location for non-root
            - name: RULES_PYTHON_EXTRACT_ROOT
              value: /tmp
            - name: NATS_URL
              value: "nats://nats.nats.svc.cluster.local:4222"
            - name: AISSTREAM_URL
              value: "wss://stream.aisstream.io/v0/stream"
            - name: BOUNDING_BOX
              value: "[[[46.876152, -129.552155], [51.413769, -121.213531]]]"
            - name: AISSTREAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: marine
                  key: ais-stream-api-key
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 20m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
# Source: ais-ingest/templates/image-pull-secret.yaml
# GHCR Pull Secret (for Kubernetes image pulls)
# Allows ais-ingest to pull private images from GitHub Container Registry
# Type: kubernetes.io/dockerconfigjson (used for imagePullSecrets)
apiVersion: onepassword.com/v1
kind: OnePasswordItem
type: kubernetes.io/dockerconfigjson
metadata:
  name: ghcr-imagepull-secret
  namespace: ais-ingest
  labels:
    helm.sh/chart: ais-ingest-0.1.0
    app.kubernetes.io/name: ais-ingest
    app.kubernetes.io/instance: ais-ingest
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  itemPath: "vaults/k8s-homelab/items/ghcr-read-permissions"
---
# Source: ais-ingest/templates/onepassworditem.yaml
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: marine
  namespace: ais-ingest
  labels:
    helm.sh/chart: ais-ingest-0.1.0
    app.kubernetes.io/name: ais-ingest
    app.kubernetes.io/instance: ais-ingest
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  itemPath: "vaults/k8s-homelab/items/marine"
