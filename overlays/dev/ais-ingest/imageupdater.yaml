apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: ais-ingest
  namespace: argocd
spec:
  applicationRefs:
  - images:
    - alias: ais-ingest
      commonUpdateSettings:
        allowTags: regexp:^\d{4}\.\d{2}\.\d{2}\.\d{2}\.\d{2}\.\d{2}-[0-9a-f]{7}$
        updateStrategy: newest-build
        forceUpdate: false
      imageName: ghcr.io/jomcgi/homelab/services/ais-ingest
      manifestTargets:
        helm:
          name: image.repository
          tag: image.tag
    namePattern: ais-ingest
  namespace: argocd
  writeBackConfig:
    method: git:secret:argocd/argocd-image-updater-token
    gitConfig:
      repository: https://github.com/jomcgi/homelab.git
      branch: main
      writeBackTarget: helmvalues:../../overlays/dev/ais-ingest/values.yaml
