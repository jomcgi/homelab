apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ais-ingest
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    path: charts/ais-ingest
    targetRevision: HEAD
    helm:
      releaseName: ais-ingest
      valueFiles:
        - values.yaml
        - ../../overlays/dev/ais-ingest/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ais-ingest
  # Ignore fields injected by Kyverno policies (OTEL env vars)
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - .spec.template.metadata.annotations."otel.injected-by"
        - .spec.template.spec.containers[].env[] | select(.name | startswith("OTEL_"))
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
