apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stargazer
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    path: charts/stargazer
    targetRevision: HEAD
    helm:
      releaseName: stargazer
      valueFiles:
        - values.yaml
        - ../../overlays/dev/stargazer/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: stargazer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
