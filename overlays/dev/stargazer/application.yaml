apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stargazer
  namespace: argocd
  # Image updates are managed by the ImageUpdater CRD in imageupdater.yaml
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    path: projects/stargazer/deploy
    targetRevision: HEAD
    helm:
      releaseName: stargazer
      valueFiles:
        - values.yaml
        - ../../../overlays/dev/stargazer/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: stargazer
  # Ignore fields injected by Kyverno policies (OTEL env vars)
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - .spec.template.metadata.annotations."otel.injected-by"
        - .spec.template.spec.containers[].env
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
