apiVersion: v1
kind: ConfigMap
metadata:
  name: stargazer
  labels:
    helm.sh/chart: stargazer-0.1.0
    app.kubernetes.io/name: stargazer
    app.kubernetes.io/instance: stargazer
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
data:
  data-dir: "/data"
  # Geographic bounds
  bounds-north: "60.86"
  bounds-south: "54.63"
  bounds-west: "-8.65"
  bounds-east: "-0.76"
  # Processing parameters
  grid-spacing-m: "5000"
  road-buffer-m: "1000"
  color-tolerance: "15"
  min-astronomy-score: "60"
  forecast-hours: "72"
  # MET Norway API
  met-norway-user-agent: "stargazer/1.0 github.com/jomcgi/homelab"
  met-norway-rate-limit: "15"
  # OpenTelemetry
  otel-enabled: "true"
  otel-service-name: "stargazer"
