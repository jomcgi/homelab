# Source: stargazer/templates/deployment-api.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stargazer-api
  labels:
    helm.sh/chart: stargazer-0.1.0
    app.kubernetes.io/name: stargazer
    app.kubernetes.io/instance: stargazer
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stargazer
      app.kubernetes.io/instance: stargazer
      app.kubernetes.io/component: api
  template:
    metadata:
      annotations:
        otel.injected-by: kyverno/inject-otel-env-vars
      labels:
        app.kubernetes.io/name: stargazer
        app.kubernetes.io/instance: stargazer
        app.kubernetes.io/component: api
    spec:
      imagePullSecrets:
        - name: ghcr-imagepull-secret
      serviceAccountName: stargazer
      securityContext:
        {}
      containers:
      - name: api
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 101
        image: "nginxinc/nginx-unprivileged:alpine"
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/
          readOnly: true
        - name: cache
          mountPath: /var/cache/nginx
        - name: tmp
          mountPath: /tmp
        - name: run
          mountPath: /var/run
        - name: data
          mountPath: /data
          readOnly: true
      volumes:
      - name: nginx-config
        configMap:
          name: stargazer-nginx
      - name: cache
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      - name: run
        emptyDir: {}
      - name: data
        persistentVolumeClaim:
          claimName: stargazer-data
