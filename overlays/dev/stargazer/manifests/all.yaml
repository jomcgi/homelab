# Source: stargazer/templates/configmap-nginx.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: stargazer-nginx
  labels:
    helm.sh/chart: stargazer-0.1.0
    app.kubernetes.io/name: stargazer
    app.kubernetes.io/instance: stargazer
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: api
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;

        root /data;

        # Enable CORS
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";

        # JSON content type for data files
        location ~ \.json$ {
            add_header Content-Type application/json;
            add_header Access-Control-Allow-Origin *;
        }

        # Health check
        location /health {
            add_header Content-Type application/json;
            add_header Access-Control-Allow-Origin *;
            return 200 '{"status":"healthy"}';
        }

        # API endpoints with caching headers for Cloudflare CDN
        location /best {
            alias /data/output/best_locations.json;
            add_header Content-Type application/json;
            add_header Access-Control-Allow-Origin *;
            # Cache for 1 hour (data updates every 6 hours)
            add_header Cache-Control "public, max-age=3600, s-maxage=3600";
            add_header CDN-Cache-Control "max-age=3600";
            add_header X-Content-Type-Options "nosniff";

            # Add last-modified header based on file modification time
            add_header Last-Modified $date_gmt;
            etag on;

            # Fallback if file doesn't exist
            try_files $uri /empty;
        }

        location /locations {
            alias /data/output/forecasts_scored.json;
            add_header Content-Type application/json;
            add_header Access-Control-Allow-Origin *;
            # Cache for 1 hour
            add_header Cache-Control "public, max-age=3600, s-maxage=3600";
            add_header CDN-Cache-Control "max-age=3600";
            add_header X-Content-Type-Options "nosniff";

            # Add last-modified header based on file modification time
            add_header Last-Modified $date_gmt;
            etag on;

            # Fallback if file doesn't exist
            try_files $uri /empty;
        }

        # Empty response fallback
        location /empty {
            add_header Content-Type application/json;
            add_header Access-Control-Allow-Origin *;
            return 200 '[]';
        }

        # Default
        location / {
            add_header Content-Type text/html;
            return 200 '<html><body><h1>Stargazer Data API</h1><p>Endpoints: /best, /locations, /health</p></body></html>';
        }
    }
