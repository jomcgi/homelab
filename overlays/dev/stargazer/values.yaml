# Development overrides for stargazer

# Run every 6 hours
schedule: "0 */6 * * *"

# Use latest image for dev
image:
  repository: ghcr.io/jomcgi/homelab/services/stargazer
  tag: "latest"
  # Digest for pinning: @sha256:8122b4d2b5d27c54debaecd4a5a098a99801c10ed8e0b1ae282ae96571f46fed

# Persistent storage
persistence:
  enabled: true
  storageClass: longhorn
  size: 5Gi

# Resource limits
resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

# OpenTelemetry configuration
config:
  opentelemetry:
    enabled: true
    serviceName: "stargazer"
    # OTEL collector endpoint (SigNoz)
    # otlpEndpoint: "http://signoz-otel-collector.signoz:4317"
    otlpEndpoint: ""

# Enable API server for data access
api:
  enabled: true
  replicas: 1
  httproute:
    enabled: true
    hostname: api.jomcgi.dev

# Enable web server for dev
webServer:
  enabled: true
  replicas: 1
