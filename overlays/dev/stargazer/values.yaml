# Development overrides for stargazer

# Run every 6 hours
schedule: "0 */6 * * *"

# Use Python Alpine for dev (until proper image is built)
image:
  repository: python
  tag: "3.11-alpine"
  # TODO: Switch back to ghcr.io/jomcgi/homelab/services/stargazer:latest

# Persistent storage
persistence:
  enabled: true
  storageClass: longhorn
  accessMode: ReadWriteMany  # Allow multiple pods to access the same volume
  size: 5Gi

# Resource limits
resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

# OpenTelemetry configuration
config:
  opentelemetry:
    enabled: true
    serviceName: "stargazer"
    # OTEL collector endpoint (SigNoz)
    # otlpEndpoint: "http://signoz-otel-collector.signoz:4317"
    otlpEndpoint: ""

# Enable API server for data access
api:
  enabled: true
  replicas: 1
  httproute:
    enabled: true
    hostname: api.jomcgi.dev
    # Path prefix for stargazer API
    pathPrefix: /stargazer

# Enable web server for dev
webServer:
  enabled: true
  replicas: 1
