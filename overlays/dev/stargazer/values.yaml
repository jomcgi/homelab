# Development overrides for stargazer

# ArgoCD Image Updater
imageUpdater:
  enabled: true
  images:
    - alias: stargazer
      imageName: ghcr.io/jomcgi/homelab/services/stargazer:main
      helm:
        name: image.repository
        tag: image.tag
  writeBack:
    method: git:secret:argocd/argocd-image-updater-token
    repository: https://github.com/jomcgi/homelab.git
    branch: main
    target: helmvalues:../../overlays/dev/stargazer/values.yaml
# Run every 30 minutes
schedule: "0,30 * * * *"
# Stargazer service image
image:
  repository: ghcr.io/jomcgi/homelab/services/stargazer
  tag: "main@sha256:6831963f698e277c3220ff038bd28134879e1ca43d1c52804f8cefd8bca6730a"
  pullPolicy: IfNotPresent
# Persistent storage
persistence:
  enabled: true
  storageClass: longhorn
  accessMode: ReadWriteMany # Allow multiple pods to access the same volume
  size: 5Gi
# Resource limits
resources:
  limits:
    cpu: 100m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 256Mi
# OpenTelemetry configuration
config:
  opentelemetry:
    enabled: true
    serviceName: "stargazer"
    # OTEL collector endpoint (SigNoz)
    # otlpEndpoint: "http://signoz-otel-collector.signoz:4317"
    otlpEndpoint: ""
# Enable API server for data access
api:
  enabled: true
  replicas: 1
  httproute:
    enabled: true
    hostname: api.jomcgi.dev
    # Path prefix for stargazer API
    pathPrefix: /stargazer
# Enable web server for dev
webServer:
  enabled: true
  replicas: 1
# Enable test data until CronJob runs successfully
testData:
  enabled: true
# Enable image pull secret for GHCR
imagePullSecret:
  enabled: true
# Configure pods to use the image pull secret
imagePullSecrets:
  - name: ghcr-imagepull-secret
# Pre-populate OTEL annotation to match Kyverno injection (prevents ArgoCD drift)
podAnnotations:
  otel.injected-by: kyverno/inject-otel-env-vars
  instrumentation.opentelemetry.io/inject-python: "python"
