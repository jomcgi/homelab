apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: claude-desktop
  namespace: argocd
  annotations: {}
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    targetRevision: HEAD
    path: charts/claude-desktop
    helm:
      releaseName: claude-desktop
      valueFiles:
        - values.yaml
        - ../../overlays/dev/claude-desktop/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: claude-desktop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
