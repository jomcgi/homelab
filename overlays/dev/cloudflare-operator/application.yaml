apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-operator
  namespace: argocd
  annotations:
    # ArgoCD Image Updater configuration
    # Automatically updates cloudflare-operator to newest image from GitHub Container Registry
    argocd-image-updater.argoproj.io/image-list: operator=ghcr.io/jomcgi/cloudflare-operator
    argocd-image-updater.argoproj.io/operator.update-strategy: newest-build
    argocd-image-updater.argoproj.io/operator.allow-tags: regexp:^sha-[0-9a-f]{7}$
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab
    targetRevision: main
    path: operators/cloudflare/helm/cloudflare-operator
    helm:
      valueFiles:
        - ../../../../overlays/dev/cloudflare-operator/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflare
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true