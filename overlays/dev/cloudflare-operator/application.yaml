apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-operator
  namespace: argocd
  # Note: Image updates handled by imageupdater.yaml (ApplicationSet CRD approach)
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab.git
    targetRevision: main
    path: operators/cloudflare/helm/cloudflare-operator
    helm:
      valueFiles:
        - ../../../../overlays/dev/cloudflare-operator/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflare
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
