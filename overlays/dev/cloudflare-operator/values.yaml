cloudflareCredentials:
  create: false
  secretName: cloudflare-credentials
# Explicitly set imagePullSecrets for private GHCR images
imagePullSecrets:
- name: ghcr-pull-secret
# Container image
controllerManager:
  image:
    repository: ghcr.io/jomcgi/homelab/operators/cloudflare
    tag: main@sha256:b946e76d0dd94ff7865c42d9daf655ac13b457e60001c775d109f2f40d9d806e
    pullPolicy: Always
    # Enable OpenTelemetry tracing to SignoZ (OTEL upgraded to v1.38.0)
  # Note: OTEL_EXPORTER_OTLP_ENDPOINT is injected automatically by Kyverno cluster-wide
  tracing:
    # endpoint: ""  # Removed - injected by Kyverno policy
    serviceName: "cloudflare-operator"
    serviceVersion: "dev"
    sampler: "parentbased_traceidratio"
    samplerArg: "1.0"
extraResources:
- apiVersion: onepassword.com/v1
  kind: OnePasswordItem
  metadata:
    name: cloudflare-credentials
  spec:
    itemPath: "vaults/k8s-homelab/items/cloudflare"
# GHCR pull secret for private container images
- apiVersion: onepassword.com/v1
  kind: OnePasswordItem
  metadata:
    name: ghcr-pull-secret
  spec:
    itemPath: "vaults/k8s-homelab/items/argocd-image-updater"
  type: "kubernetes.io/dockerconfigjson"
