cloudflareCredentials:
  create: false
  secretName: cloudflare-credentials

# Explicitly set imagePullSecrets for private GHCR images
imagePullSecrets:
  - name: ghcr-pull-secret

# Container image - updated automatically by ArgoCD Image Updater
controllerManager:
  image:
    repository: ghcr.io/jomcgi/cloudflare-operator
    tag: latest  # Will be updated automatically by ArgoCD Image Updater
    pullPolicy: Always

# Disable OpenTelemetry tracing temporarily due to schema conflict
  tracing:
    disabled: true
    # TODO: Fix OpenTelemetry schema version conflict (1.26.0 vs 1.20.0)
    # endpoint: "signoz-otel-collector.signoz.svc.cluster.local:4317"
    # serviceName: "cloudflare-operator"
    # serviceVersion: "dev"
    # sampler: "parentbased_traceidratio"
    # samplerArg: "1.0"

extraResources:
  - apiVersion: onepassword.com/v1
    kind: OnePasswordItem
    metadata:
      name: cloudflare-credentials
    spec:
      itemPath: "vaults/k8s-homelab/items/cloudflare"

  # GHCR pull secret for private container images
  - apiVersion: onepassword.com/v1
    kind: OnePasswordItem
    metadata:
      name: ghcr-pull-secret
    spec:
      itemPath: "vaults/k8s-homelab/items/argocd-image-updater"
    type: "kubernetes.io/dockerconfigjson"