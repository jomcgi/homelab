---
# Docker registry secret for pulling images from GHCR
# Uses the read-only GHCR token from 1Password
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: cloudflare
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "username": "jomcgi",
          "password": "${GHCR_TOKEN}"
        }
      }
    }
---
# Job to populate the docker config secret with token from 1Password
# This runs after the OnePasswordItem creates the generic secret
apiVersion: batch/v1
kind: Job
metadata:
  name: create-ghcr-pull-secret
  namespace: cloudflare
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: ghcr-secret-creator
      restartPolicy: OnFailure
      containers:
      - name: create-secret
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          # Get token from 1Password secret
          TOKEN=$(kubectl get secret ghcr-pull-secret -n argocd -o jsonpath='{.data.github_token}' | base64 -d)

          # Create docker config JSON
          DOCKER_CONFIG=$(echo -n "jomcgi:$TOKEN" | base64 -w 0)

          # Create the secret
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=jomcgi \
            --docker-password="$TOKEN" \
            --namespace=cloudflare \
            --dry-run=client -o yaml | kubectl apply -f -
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ghcr-secret-creator
  namespace: cloudflare
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ghcr-secret-creator
  namespace: cloudflare
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ghcr-secret-creator
  namespace: cloudflare
subjects:
- kind: ServiceAccount
  name: ghcr-secret-creator
  namespace: cloudflare
roleRef:
  kind: Role
  name: ghcr-secret-creator
  apiGroup: rbac.authorization.k8s.io
---
# Allow the job to read the 1Password secret from argocd namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-ghcr-secret
  namespace: argocd
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["ghcr-pull-secret"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ghcr-secret-creator-cross-ns
  namespace: argocd
subjects:
- kind: ServiceAccount
  name: ghcr-secret-creator
  namespace: cloudflare
roleRef:
  kind: Role
  name: read-ghcr-secret
  apiGroup: rbac.authorization.k8s.io
