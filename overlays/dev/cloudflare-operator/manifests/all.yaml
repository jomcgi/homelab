# Source: cloudflare-operator/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-operator-controller-manager
  namespace: cloudflare
  labels:
    control-plane: controller-manager
    helm.sh/chart: cloudflare-operator-0.2.0
    app.kubernetes.io/name: cloudflare-operator
    app.kubernetes.io/instance: cloudflare-operator
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 2
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: cloudflare-operator
      app.kubernetes.io/instance: cloudflare-operator
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: cloudflare-operator
        app.kubernetes.io/instance: cloudflare-operator
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      serviceAccountName: cloudflare-operator-controller-manager
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - args:
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=:8443
        image: "ghcr.io/jomcgi/homelab/operators/cloudflare:2026.01.18.06.31.17-4abf106"
        imagePullPolicy: Always
        name: manager
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        env:
        - name: CLOUDFLARE_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflare-credentials
              key: CLOUDFLARE_API_TOKEN
        - name: CLOUDFLARE_ACCOUNT_ID
          valueFrom:
            secretKeyRef:
              name: cloudflare-credentials
              key: CLOUDFLARE_ACCOUNT_ID
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: OTEL_SERVICE_NAME
          value: "cloudflare-operator"
        - name: OTEL_SERVICE_VERSION
          value: "dev"
        - name: OTEL_TRACES_SAMPLER
          value: "parentbased_traceidratio"
        - name: OTEL_TRACES_SAMPLER_ARG
          value: "1.0"
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 60
