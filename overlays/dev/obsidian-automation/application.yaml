apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: obsidian-automation
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab
    targetRevision: HEAD
    path: charts/obsidian-automation
    helm:
      releaseName: obsidian-automation
      valueFiles:
        - values.yaml
        - ../../overlays/dev/obsidian-automation/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: obsidian-automation
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true