apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: bosun
  namespace: argocd
spec:
  applicationRefs:
    - images:
        - alias: backend
          commonUpdateSettings:
            updateStrategy: digest
            forceUpdate: false
          imageName: ghcr.io/jomcgi/homelab/charts/bosun/backend:main
          manifestTargets:
            helm:
              name: backend.image.repository
              tag: backend.image.tag
        - alias: frontend
          commonUpdateSettings:
            updateStrategy: digest
            forceUpdate: false
          imageName: ghcr.io/jomcgi/homelab/charts/bosun/frontend:main
          manifestTargets:
            helm:
              name: frontend.image.repository
              tag: frontend.image.tag
      namePattern: bosun
  namespace: argocd
  writeBackConfig:
    method: git:secret:argocd/argocd-image-updater-token
    gitConfig:
      repository: https://github.com/jomcgi/homelab.git
      branch: main
      writeBackTarget: helmvalues:../../overlays/dev/bosun/values.yaml
