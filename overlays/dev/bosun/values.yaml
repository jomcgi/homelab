backend:
  image:
    repository: ghcr.io/jomcgi/homelab/charts/bosun/backend
    tag: latest@sha256:c3ea51b677f76ebaa5b70e83e1685e80767fd4ad2a5fb19d5ecaac6521eb913a
frontend:
  image:
    repository: ghcr.io/jomcgi/homelab/charts/bosun/frontend
    tag: main@sha256:4477aff919b20e7869a0b7bb9c8880697acd621459a5a0baeb6aa85cc09617ce
gitSync:
  enabled: true
  repo: https://github.com/jomcgi/homelab
  branch: main
  intervalSeconds: 60
claudeBin: "/home/user/.npm-global/bin/claude"
# ArgoCD Image Updater
imageUpdater:
  enabled: true
  images:
  - alias: backend
    imageName: ghcr.io/jomcgi/homelab/charts/bosun/backend:main
    helm:
      name: backend.image.repository
      tag: backend.image.tag
  - alias: frontend
    imageName: ghcr.io/jomcgi/homelab/charts/bosun/frontend:main
    helm:
      name: frontend.image.repository
      tag: frontend.image.tag
  writeBack:
    method: git:secret:argocd/argocd-image-updater-token
    repository: https://github.com/jomcgi/homelab.git
    branch: main
    target: helmvalues:../../overlays/dev/bosun/values.yaml
