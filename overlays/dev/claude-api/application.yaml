apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: claude-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jomcgi/homelab
    targetRevision: HEAD
    path: charts/claude-api
    helm:
      releaseName: claude-api
      valueFiles:
        - values.yaml
        - ../../overlays/dev/claude-api/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: claude-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
