apiVersion: v1
kind: Secret
metadata:
  labels:
    app.kubernetes.io/component: grafana
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: kube-prometheus
    app.kubernetes.io/version: 11.2.1
  name: grafana-config
  namespace: monitoring
stringData:
  grafana.ini: |
    [date_formats]
    default_timezone = UTC

    [auth.anonymous]
    # enable anonymous access
    enabled = true
    # specify organization name that should be used for unauthenticated users
    org_name = Main Org.
    org_role = Viewer

    [security]
    admin_user = jomcgi
    admin_password = Killjoy123!

    [dashboards]
    default_home_dashboard_path = /grafana-dashboard-definitions/1/chat-summary/chat-summary.json
type: Opaque
