apiVersion: apps/v1
kind: Deployment
metadata:
  name: file_organizer_2000
  labels:
    app: file_organizer_2000
spec:
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 2
  selector:
    matchLabels:
      app: file_organizer_2000
  template:
    metadata:
      labels:
        app: file_organizer_2000
    spec:
      containers:
      - name: file_organizer_2000
        image:  file_organizer_2000
        ports:
        - containerPort: 3000
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
