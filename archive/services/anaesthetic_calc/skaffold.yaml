apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: homelab-services

build:
  local:
    push: true
    useDockerCLI: false
    useBuildkit: false
    concurrency: 2
  artifacts:
    - image: anaesthetic-calc
      context: ./services/anaesthetic_calc/app
    - image: calc-api
      context: ./services/anaesthetic_calc/api

manifests:
  kustomize:
    paths:
    - ./services/anaesthetic_calc/deploy

deploy:
  kubectl:
    defaultNamespace: anaesthetic-calc
        
