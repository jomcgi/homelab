rules:
  - id: no-context-background-in-reconcile
    patterns:
      - pattern: |
          func $R Reconcile($CTX context.Context, ...) (...) {
            ...
            context.Background()
            ...
          }
    message: >
      `context.Background()` used inside `Reconcile()`. The reconcile method
      receives a context (`$CTX`) that is already tied to the controller
      manager lifecycle — it will be cancelled on shutdown. Using
      `context.Background()` creates a detached context that ignores
      cancellation, preventing clean shutdown and leaking goroutines or
      requests. Pass the received context through instead.
    languages: [go]
    severity: ERROR
    metadata:
      category: correctness
      subcategory: kubernetes-operator
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      technology: [go, controller-runtime]
      description: Use the passed context in Reconcile, not context.Background()
