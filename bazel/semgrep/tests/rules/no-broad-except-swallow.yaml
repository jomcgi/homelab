rules:
  - id: no-broad-except-swallow
    patterns:
      - pattern: |
          try:
            ...
          except Exception as $E:
            $BODY
      - pattern-not: |
          try:
            ...
          except Exception as $E:
            ...
            raise
      - pattern-not: |
          try:
            ...
          except Exception as $E:
            ...
            raise $E
      - pattern-not: |
          try:
            ...
          except Exception as $E:
            ...
            logger.$METHOD(...)
      - pattern-not: |
          try:
            ...
          except Exception as $E:
            ...
            logging.$METHOD(...)
    message: >
      `except Exception as $E` block does not re-raise the exception or log it.
      This silently swallows all exceptions, hiding bugs and making failures
      invisible in production. Either log the exception (at minimum
      `logger.exception("...")`) or re-raise it with `raise`.
    languages: [python]
    severity: WARNING
    metadata:
      category: correctness
      subcategory: error-handling
      cwe: ["CWE-390: Detection of Error Condition Without Action"]
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [python]
      description: broad except clause that swallows exceptions without logging or re-raising
