rules:
  - id: unused-auth-variable
    patterns:
      # Match: FOO_API_KEY = os.getenv(...) at module level (assignment)
      - pattern: $KEY = os.getenv(...)
      - metavariable-regex:
          metavariable: $KEY
          regex: "^[A-Z_]*_API_KEY$"
      # Exclude if the variable is used in a comparison or function call below
      - pattern-not-inside: |
          ...
          if $KEY == ...:
            ...
      - pattern-not-inside: |
          ...
          if ... == $KEY:
            ...
      - pattern-not-inside: |
          ...
          if $KEY:
            ...
    message: >
      API key variable `$KEY` is read from the environment but never validated
      in a request handler. This is the same bug pattern as the trips_api auth
      bug: the key exists in config but no handler rejects requests that lack
      it. Add a FastAPI dependency or middleware that checks the key on each
      request.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      subcategory: authentication
      cwe: ["CWE-306: Missing Authentication for Critical Function"]
      confidence: MEDIUM
      likelihood: HIGH
      impact: HIGH
      technology: [python, fastapi]
      description: API key variable defined but never validated in request handlers
