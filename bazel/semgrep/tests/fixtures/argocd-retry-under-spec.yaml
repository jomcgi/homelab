# Tests for argocd-retry-under-spec rule.
# ArgoCD retry must be under spec.syncPolicy, not spec directly.
---
# ruleid: argocd-retry-under-spec
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app
  namespace: argocd
spec:
  retry:
    limit: 5
    backoff:
      duration: 5s
  project: default
  source:
    repoURL: https://github.com/example/repo
    targetRevision: HEAD
    path: deploy

---
# ok: argocd-retry-under-spec — retry correctly under syncPolicy
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/repo
    targetRevision: HEAD
    path: deploy
  syncPolicy:
    retry:
      limit: 5
      backoff:
        duration: 5s

---
# ok: argocd-retry-under-spec — no retry at all
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/repo
    targetRevision: HEAD
    path: deploy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
