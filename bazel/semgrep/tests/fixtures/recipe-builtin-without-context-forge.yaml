# Tests for recipe-builtin-without-context-forge rule.
# Recipes with type: builtin must also include type: streamable_http for context-forge.
---
# ruleid: recipe-builtin-without-context-forge
extensions:
  - type: builtin
    name: developer

---
# ruleid: recipe-builtin-without-context-forge
extensions:
  - type: builtin
    name: computer_use
  - type: stdio
    name: other-tool
    cmd: something

---
# ok: recipe-builtin-without-context-forge — has both builtin and streamable_http
extensions:
  - type: builtin
    name: developer
  - type: streamable_http
    name: context-forge
    uri: http://context-forge-gateway-mcp-stack-mcpgateway.mcp.svc.cluster.local:80/mcp/
    timeout: 300

---
# ok: recipe-builtin-without-context-forge — only streamable_http, no builtin
extensions:
  - type: streamable_http
    name: context-forge
    uri: http://example.com/mcp/
    timeout: 300

---
# ok: recipe-builtin-without-context-forge — no extensions at all
name: simple-recipe
description: A recipe with no extensions
