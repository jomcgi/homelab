# Tests for no-shared-preload-libraries-cnpg rule.
# CNPG 1.22+ supports image volume extensions via the extensions block with
# image.reference. The legacy approach requires extensions baked into the image.
---
# ruleid: no-shared-preload-libraries-cnpg
postgresql:
  parameters:
    shared_preload_libraries: "vector"

---
# ruleid: no-shared-preload-libraries-cnpg
postgresql:
  parameters:
    shared_preload_libraries: 'pg_stat_statements'

---
# ruleid: no-shared-preload-libraries-cnpg
postgresql:
  parameters:
    shared_preload_libraries: "vector,pg_stat_statements"

---
# ok: no-shared-preload-libraries-cnpg — uses the modern extensions block
spec:
  extensions:
    - name: vector
      version: "0.7.0"
      image:
        reference: "ghcr.io/cloudnative-pg/postgresql-pgvector:16"

---
# ok: no-shared-preload-libraries-cnpg — uses image.reference for OCI extension
spec:
  postgresql:
    parameters:
      max_connections: "200"
  extensions:
    - name: pg_stat_statements
      image:
        reference: "ghcr.io/cloudnative-pg/postgresql:16-plugins"
