# Test fixture for the no-discarded-json-marshal semgrep rule.
# The rule fires on Go code that discards the error from json.Marshal,
# risking nil/empty bytes being sent downstream on marshal failure.
#
# Live test coverage lives in:
#   bazel/semgrep/rules/golang/no-discarded-json-marshal.go
# which is picked up automatically by the golang_rules_test Bazel target.

---
# bad: short-variable declaration discards json.Marshal error
bad_short_decl: |
  data, _ := json.Marshal(payload)

---
# bad: assignment discards json.Marshal error
bad_assign: |
  var data []byte
  data, _ = json.Marshal(payload)

---
# ok: error is checked after short declaration
ok_check_short: |
  data, err := json.Marshal(payload)
  if err != nil {
      return nil, err
  }

---
# ok: both return values forwarded directly
ok_forward: |
  return json.Marshal(payload)

---
# ok: json.Unmarshal is a different function, not flagged
ok_unmarshal: |
  var out Foo
  err := json.Unmarshal(data, &out)
