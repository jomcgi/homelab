# Tests for no-valuesobject-helm-overrides rule.
# Overrideable Helm values (podAnnotations, podLabels, resources, etc.) found
# inside a valuesObject block should live in values.yaml instead for CI coverage.
---
# ruleid: no-valuesobject-helm-overrides
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-service
spec:
  source:
    helm:
      valuesObject:
        podAnnotations:
          prometheus.io/scrape: "true"
        replicaCount: 1

---
# ruleid: no-valuesobject-helm-overrides
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-service
spec:
  source:
    helm:
      valuesObject:
        image:
          tag: latest
        resources:
          limits:
            memory: 512Mi

---
# ruleid: no-valuesobject-helm-overrides
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-service
spec:
  source:
    helm:
      valuesObject:
        podLabels:
          team: platform
        config:
          key: value

---
# ruleid: no-valuesobject-helm-overrides
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-service
spec:
  source:
    helm:
      valuesObject:
        nodeSelector:
          kubernetes.io/arch: amd64

---
# ruleid: no-valuesobject-helm-overrides
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-service
spec:
  source:
    helm:
      valuesObject:
        tolerations:
          - key: "dedicated"
            operator: "Equal"

---
# ruleid: no-valuesobject-helm-overrides
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-service
spec:
  source:
    helm:
      valuesObject:
        env:
          - name: MY_VAR
            value: "hello"

---
# ok: no-valuesobject-helm-overrides — no valuesObject block
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-service
spec:
  source:
    helm:
      valueFiles:
        - values.yaml

---
# ok: no-valuesobject-helm-overrides — valuesObject without overrideable keys
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-service
spec:
  source:
    helm:
      valuesObject:
        replicaCount: 2
        image:
          repository: myrepo/myimage
          tag: "1.0.0"
        service:
          port: 8080

---
# ok: no-valuesobject-helm-overrides — ArgoCD-only toggles (imagePullSecret, priorityClassName, podDisruptionBudget) are safe
# Real-world pattern from cluster-agents: these keys are not Helm overrideable values
# that should live in values.yaml; they are ArgoCD deployment policy toggles.
# The Linkerd skip-inbound-ports annotation correctly lives in values.yaml, not here.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-agents
spec:
  source:
    helm:
      valuesObject:
        imagePullSecret:
          enabled: true
        priorityClassName: system-cluster-critical
        podDisruptionBudget:
          enabled: false
