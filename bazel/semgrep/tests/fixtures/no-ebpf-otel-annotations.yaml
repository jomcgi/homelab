# Tests for no-ebpf-otel-annotations rule.
# eBPF-based OTel auto-instrumentation annotations are not supported in this cluster —
# inject-* annotations add init containers that can crash or hang pods.
---
# ok: no-ebpf-otel-annotations
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ok-deployment
  annotations:
    app.kubernetes.io/name: my-service
spec:
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: app
          image: myapp:latest

---
# ruleid: no-ebpf-otel-annotations
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-go-deployment
spec:
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-go: "go"
    spec:
      containers:
        - name: app
          image: myapp:latest

---
# ruleid: no-ebpf-otel-annotations
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-python-deployment
  annotations:
    instrumentation.opentelemetry.io/inject-python: "true"
spec:
  template:
    spec:
      containers:
        - name: app
          image: myapp:latest
