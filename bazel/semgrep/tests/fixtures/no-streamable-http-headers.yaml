# Tests for no-streamable-http-headers rule.
# Goose recipes must not include 'headers:' in streamable_http extensions —
# Goose's serde_yaml rejects unknown fields with "Invalid recipe: did not find expected key".
---
# ruleid: no-streamable-http-headers
extensions:
  - type: streamable_http
    name: context-forge
    uri: http://my-mcp-server.mcp.svc.cluster.local:80/mcp/
    timeout: 300
    headers:
      Authorization: "Bearer ${CI_DEBUG_MCP_TOKEN}"

---
# ruleid: no-streamable-http-headers
extensions:
  - type: streamable_http
    name: another-server
    uri: http://other.svc.cluster.local/mcp
    headers:
      X-API-Key: "secret"
    timeout: 60

---
# ok: no-streamable-http-headers — env_keys is the correct pattern
extensions:
  - type: streamable_http
    name: context-forge
    uri: http://my-mcp-server.mcp.svc.cluster.local:80/mcp/
    timeout: 300
    env_keys:
      - MY_API_TOKEN

---
# ok: no-streamable-http-headers — in-cluster access with no auth
extensions:
  - type: streamable_http
    name: context-forge
    uri: http://context-forge-gateway-mcp-stack-mcpgateway.mcp.svc.cluster.local:80/mcp/
    timeout: 300

---
# ok: no-streamable-http-headers — headers in stdio type is a different rule
extensions:
  - type: stdio
    name: my-tool
    cmd: my-binary
    args: ["--flag"]
    env_keys:
      - GITHUB_TOKEN
