# Tests for require-tmp-emptydir rule.
---
# ok: require-tmp-emptydir
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ok-deployment
spec:
  template:
    spec:
      volumes:
        - name: tmp-dir
          emptyDir: {}
      containers:
        - name: app
          image: myapp:latest
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
          volumeMounts:
            - mountPath: /tmp
              name: tmp-dir

---
# ruleid: require-tmp-emptydir
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-deployment
spec:
  template:
    spec:
      containers:
        - name: app
          image: myapp:latest
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
          # no /tmp volumeMount
          ports:
            - containerPort: 8080
