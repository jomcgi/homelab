# Tests for pdb-minAvailable-blocks-eviction rule.
# The rule catches enabled PDBs with minAvailable: 1 on single-replica deployments
# (replicaCount: 1 explicitly, or replicaCount absent which defaults to 1).
---
# ok: pdb-minAvailable-blocks-eviction — PDB disabled, no eviction risk
replicaCount: 1
podDisruptionBudget:
  enabled: false
  minAvailable: 1

---
# ok: pdb-minAvailable-blocks-eviction — multiple replicas, minAvailable: 1 leaves budget
replicaCount: 3
podDisruptionBudget:
  enabled: true
  minAvailable: 1

---
# ok: pdb-minAvailable-blocks-eviction — uses maxUnavailable instead (correct pattern)
replicaCount: 1
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

---
# ok: pdb-minAvailable-blocks-eviction — minAvailable: 0 does not block eviction
replicaCount: 1
podDisruptionBudget:
  enabled: true
  minAvailable: 0

---
# ruleid: pdb-minAvailable-blocks-eviction
# replicaCount: 1 + minAvailable: 1 → zero disruption budget, blocks node drains
replicaCount: 1
podDisruptionBudget:
  enabled: true
  minAvailable: 1

---
# ruleid: pdb-minAvailable-blocks-eviction
# replicaCount absent (defaults to 1) + minAvailable: 1 → same zero-budget outcome
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  maxUnavailable: ~
