# Reference fixture for the unsafe-json-field-access semgrep rule.
# This file documents ok/bad patterns for human review.
# The actual semgrep test fixture is bazel/semgrep/rules/python/unsafe-json-field-access.py.

examples:
  bad:
    - description: direct key access after raise_for_status without try/except
      code: |
        resp = await client.get("https://api.example.com/data")
        resp.raise_for_status()
        value = resp.json()["key"]  # KeyError if response shape is unexpected

    - description: inline json field access without error handling
      code: |
        resp = session.get("https://api.example.com/token")
        resp.raise_for_status()
        token = resp.json()["access_token"]  # crashes on malformed response

  ok:
    - description: wrapped in try/except to handle KeyError
      code: |
        resp = await client.get("https://api.example.com/data")
        resp.raise_for_status()
        try:
            value = resp.json()["key"]
        except (KeyError, ValueError) as e:
            raise RuntimeError("unexpected response shape") from e

    - description: using .get() with a default avoids KeyError
      code: |
        resp = await client.get("https://api.example.com/data")
        resp.raise_for_status()
        value = resp.json().get("key")  # returns None instead of raising

    - description: access inside a broader try block
      code: |
        try:
            resp = await client.get("https://api.example.com/data")
            resp.raise_for_status()
            value = resp.json()["key"]
        except Exception as e:
            raise RuntimeError("request failed") from e
