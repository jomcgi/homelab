# Tests for the no-create-extension-sql semgrep rule.
#
# CNPG manages PostgreSQL extensions via image volumes (the `extensions:` block
# in the CNPG Cluster spec). Running CREATE EXTENSION in a migration conflicts
# with operator-managed extension lifecycle.
#
# Annotations:
#   # ruleid: no-create-extension-sql  — the next non-annotation line MUST be flagged
#   # ok: no-create-extension-sql      — the next non-annotation line MUST NOT be flagged

## Positive examples (should be flagged)

# ruleid: no-create-extension-sql
CREATE EXTENSION IF NOT EXISTS vector;

# ruleid: no-create-extension-sql
CREATE EXTENSION postgis;

# ruleid: no-create-extension-sql
create extension IF NOT EXISTS "uuid-ossp";

# ruleid: no-create-extension-sql
Create Extension pg_trgm WITH SCHEMA public;

## Negative examples (should not be flagged)

# ok: no-create-extension-sql — plain table creation is fine
CREATE TABLE IF NOT EXISTS messages (id UUID PRIMARY KEY, content TEXT);

# ok: no-create-extension-sql — comments about extensions are fine
-- extensions like vector are managed by CNPG via the Cluster spec extensions block

# ok: no-create-extension-sql — index creation is fine
CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_messages_content ON messages USING gin(content);
