# Tests for no-privileged rule.
# Containers must not run in privileged mode — it grants root-equivalent
# capabilities on the host node.
---
# ruleid: no-privileged
apiVersion: v1
kind: Pod
metadata:
  name: bad-privileged-pod
spec:
  containers:
    - name: app
      image: myapp:latest
      securityContext:
        privileged: true

---
# ruleid: no-privileged
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-deployment
spec:
  template:
    spec:
      containers:
        - name: app
          image: myapp:latest
          securityContext:
            privileged: true
            runAsNonRoot: true

---
# ok: no-privileged — securityContext without privileged
apiVersion: v1
kind: Pod
metadata:
  name: ok-pod
spec:
  containers:
    - name: app
      image: myapp:latest
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false

---
# ok: no-privileged — privileged explicitly false
apiVersion: v1
kind: Pod
metadata:
  name: ok-pod-explicit-false
spec:
  containers:
    - name: app
      image: myapp:latest
      securityContext:
        privileged: false
        runAsNonRoot: true

---
# ok: no-privileged — no securityContext at all
apiVersion: v1
kind: Pod
metadata:
  name: ok-pod-no-sc
spec:
  containers:
    - name: app
      image: myapp:latest
