# Reference fixture for the fastapi-bare-tuple-return semgrep rule.
# This file documents ok/bad patterns for human review.
# The actual semgrep test fixture is bazel/semgrep/rules/python/fastapi-bare-tuple-return.py.

examples:
  bad:
    - description: returning a bare (dict, 404) tuple from a FastAPI route handler
      code: |
        @app.get("/vessels/{mmsi}")
        async def get_vessel(mmsi: str):
            vessel = await db.get_vessel(mmsi)
            if vessel is None:
                return {"error": "Vessel not found"}, 404  # BUG: always returns HTTP 200 with JSON array
            return vessel

    - description: returning a bare (dict, 500) tuple for server errors (sync handler)
      code: |
        @app.post("/process")
        def process():
            try:
                result = do_work()
            except Exception:
                return {"error": "Internal error"}, 500  # BUG: FastAPI ignores the 500

    - description: returning a bare (dict, 403) tuple for permission errors
      code: |
        @app.get("/admin")
        async def admin_only():
            if not is_admin():
                return {"error": "Forbidden"}, 403  # BUG: client receives HTTP 200

  ok:
    - description: raise HTTPException with status_code and detail
      code: |
        from fastapi import HTTPException

        @app.get("/vessels/{mmsi}")
        async def get_vessel(mmsi: str):
            vessel = await db.get_vessel(mmsi)
            if vessel is None:
                raise HTTPException(status_code=404, detail="Vessel not found")
            return vessel

    - description: returning a plain dict (no tuple) — the most common correct pattern
      code: |
        @app.get("/data")
        async def data_route():
            return {"key": "value"}

    - description: >-
        2xx and 3xx codes are out of scope for this rule.
        Note: returning (dict, 200) is also a FastAPI anti-pattern (produces a JSON
        array instead of a plain dict), but it silently returns the right status code
        so it is less dangerous and is excluded to reduce noise.
      code: |
        @app.get("/ok")
        async def ok_route():
            return {"data": "value"}, 200

    - description: variable-bound status codes are out of scope (only literals are matched)
      code: |
        @app.get("/dynamic")
        async def dynamic_route():
            status_code = 404
            return {"error": "not found"}, status_code
