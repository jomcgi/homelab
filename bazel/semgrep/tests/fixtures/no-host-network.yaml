# Tests for no-host-network rule.
# Pods must not use host network namespace — it exposes the node's loopback
# device and allows snooping on other pods' network traffic.
---
# ruleid: no-host-network
apiVersion: v1
kind: Pod
metadata:
  name: bad-host-network
spec:
  hostNetwork: true
  containers:
    - name: app
      image: myapp:latest

---
# ruleid: no-host-network
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-deployment
spec:
  template:
    spec:
      hostNetwork: true
      containers:
        - name: app
          image: myapp:latest

---
# ok: no-host-network — hostNetwork not set (defaults to false)
apiVersion: v1
kind: Pod
metadata:
  name: ok-pod
spec:
  containers:
    - name: app
      image: myapp:latest

---
# ok: no-host-network — hostNetwork explicitly false
apiVersion: v1
kind: Pod
metadata:
  name: ok-pod-explicit-false
spec:
  hostNetwork: false
  containers:
    - name: app
      image: myapp:latest
