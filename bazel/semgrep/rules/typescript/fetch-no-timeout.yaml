rules:
  - id: fetch-no-timeout
    languages: [typescript, javascript]
    severity: WARNING
    message: >-
      fetch() called without AbortSignal.timeout(). In backend Node.js services,
      fetch has no default timeout — a hung upstream will hold the connection
      indefinitely. Pass `signal: AbortSignal.timeout(ms)` to prevent cascading
      failures.
    metadata:
      category: correctness
      subcategory: networking
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      technology: [typescript, javascript, fetch]
      description: fetch() missing AbortSignal.timeout() — will hang indefinitely on unresponsive upstreams
    patterns:
      - pattern: fetch(...)
      - pattern-not: "fetch(..., {signal: ..., ...})"
