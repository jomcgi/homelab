rules:
  - id: no-streamable-http-headers
    languages: [yaml]
    severity: ERROR
    message: >-
      The `headers` field is not supported in Goose recipe `streamable_http`
      extensions. Goose uses strict serde_yaml deserialization — unknown fields
      cause "Invalid recipe: did not find expected key" at runtime. Remove
      `headers` and use `env_keys` for secrets, or omit auth entirely for
      in-cluster MCP gateway access (MCP_REQUIRE_AUTH=false).
    metadata:
      category: correctness
    patterns:
      - pattern: |
          type: streamable_http
          ...
          headers: ...
