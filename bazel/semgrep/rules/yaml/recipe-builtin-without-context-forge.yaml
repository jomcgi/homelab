rules:
  - id: recipe-builtin-without-context-forge
    languages: [yaml]
    severity: WARNING
    message: >-
      Recipe YAML contains a 'type: builtin' extension but no
      'type: streamable_http' extension. Recipes using builtin extensions
      should include context-forge integration via streamable_http
      (see PR #1377). If context-forge is intentionally excluded,
      add a '# nosemgrep' comment.
    metadata:
      category: best-practices
    paths:
      include:
        - "**/recipes/*.yaml"
    patterns:
      - pattern: |
          extensions:
            - ...
            - type: builtin
              ...
            - ...
      - pattern-not: |
          extensions:
            - ...
            - type: streamable_http
              ...
            - ...
