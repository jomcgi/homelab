rules:
  - id: no-kubectl-mutate
    languages: [bash]
    severity: ERROR
    message: >-
      This cluster is managed via GitOps — kubectl is read-only. Do not use
      'kubectl $VERB' directly. Instead, edit the appropriate
      projects/<project>/<service>/deploy/values.yaml and let ArgoCD sync the change.
    metadata:
      category: best-practices
    patterns:
      - pattern: kubectl $VERB $...ARGS
      - metavariable-pattern:
          metavariable: $VERB
          patterns:
            - pattern-regex: "^(apply|patch|edit|scale|delete|create|replace|set)$"
