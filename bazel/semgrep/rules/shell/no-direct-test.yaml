rules:
  - id: no-direct-test
    languages: [bash]
    severity: ERROR
    message: >-
      Do not run test commands directly. Use 'bazel test' instead.
      Example: 'bazel test //services/my-service/...' or 'bazel test //...'.
    metadata:
      category: best-practices
    pattern-either:
      - pattern: go test $...ARGS
      - pattern: pytest $...ARGS
      - pattern: npm test
      - pattern: npm run test
