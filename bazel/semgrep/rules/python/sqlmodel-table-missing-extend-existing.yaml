rules:
  - id: sqlmodel-table-missing-extend-existing
    patterns:
      - pattern: |
          class $MODEL(SQLModel, table=True):
            __table_args__ = {..., "schema": $SCHEMA, ...}
      - pattern-not: |
          class $MODEL(SQLModel, table=True):
            __table_args__ = {..., "extend_existing": True, ...}
    message: >
      SQLModel table class `$MODEL` defines `__table_args__` with a `"schema"` key
      but is missing `"extend_existing": True`. When this model is imported from
      multiple modules (e.g., application code and test fixtures) SQLAlchemy raises
      `InvalidRequestError: Table already defined`. Add `"extend_existing": True`
      to `__table_args__` to allow re-registration of the table.
    languages: [python]
    severity: WARNING
    metadata:
      category: correctness
      subcategory: orm
      cwe: ["CWE-570: Expression is Always False"]
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [python, sqlmodel, sqlalchemy]
      description: SQLModel table with schema key missing extend_existing=True — causes InvalidRequestError on re-import
