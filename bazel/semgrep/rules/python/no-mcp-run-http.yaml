rules:
  - id: no-mcp-run-http
    patterns:
      - pattern: mcp.run(..., transport="http", ...)
    message: >
      Use `mcp.http_app()` + uvicorn instead of `mcp.run(transport="http")` —
      the latter spawns an opaque server that prevents adding custom routes like
      `/healthz` for Kubernetes liveness probes. See PR #1441 for the correct
      pattern.
    languages: [python]
    severity: WARNING
    metadata:
      category: correctness
      subcategory: networking
      confidence: HIGH
      likelihood: MEDIUM
      impact: MEDIUM
      technology: [python, mcp]
      description: mcp.run(transport="http") prevents custom routes like /healthz
