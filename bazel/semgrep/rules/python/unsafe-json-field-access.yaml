rules:
  - id: unsafe-json-field-access
    patterns:
      - pattern: $RESP.json()[$KEY]
      - pattern-not-inside: |
          try:
            ...
          except ...:
            ...
    message: >
      `$RESP.json()[$KEY]` accesses a JSON field directly without a surrounding
      `try/except` block. After `raise_for_status()` the HTTP status code is
      validated, but the JSON structure is not — a 200 OK response with an
      unexpected shape will raise an unhandled `KeyError` and crash the caller.
      Wrap the access in `try: ... except (KeyError, ValueError) as e: ...` or
      use `.get()` with a default value.
    languages: [python]
    severity: WARNING
    metadata:
      category: correctness
      subcategory: error-handling
      cwe: ["CWE-390: Detection of Error Condition Without Action"]
      confidence: HIGH
      likelihood: HIGH
      impact: MEDIUM
      technology: [python, httpx, requests]
      description: direct JSON field access without try/except — unexpected response shape causes unhandled KeyError
