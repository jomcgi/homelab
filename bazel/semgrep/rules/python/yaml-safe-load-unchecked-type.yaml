rules:
  - id: yaml-safe-load-unchecked-type
    pattern-either:
      - patterns:
          - pattern: |
              $DATA = yaml.safe_load(...)
              ...
              $DATA.$DICT_METHOD(...)
          - metavariable-regex:
              metavariable: $DICT_METHOD
              regex: '^(get|items|values|keys)$'
          - pattern-not: |
              $DATA = yaml.safe_load(...)
              ...
              isinstance($DATA, dict)
              ...
              $DATA.$DICT_METHOD(...)
          - pattern-not-inside: |
              if isinstance($DATA, dict):
                ...
      - patterns:
          - pattern: |
              $DATA = yaml.safe_load(...)
              ...
              $DATA[$KEY]
          - pattern-not: |
              $DATA = yaml.safe_load(...)
              ...
              isinstance($DATA, dict)
              ...
              $DATA[$KEY]
          - pattern-not-inside: |
              if isinstance($DATA, dict):
                ...
    message: >
      `yaml.safe_load()` return value used with dict methods without a prior
      `isinstance($DATA, dict)` check. `yaml.safe_load()` can return `None`,
      `list`, `str`, or `dict` depending on the document — calling `.get()`,
      `[key]`, `.items()`, `.values()`, or `.keys()` on a non-dict raises
      `AttributeError` or `TypeError`. Add `if not isinstance($DATA, dict): raise
      ValueError(...)` before accessing dict methods.
    languages: [python]
    severity: WARNING
    metadata:
      category: correctness
      subcategory: type-safety
      cwe: ["CWE-704: Incorrect Type Conversion or Cast"]
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: MEDIUM
      technology: [python, pyyaml]
      description: yaml.safe_load() result used as dict without isinstance check — can raise AttributeError on non-dict YAML
