rules:
  - id: no-permissionerror-for-write
    pattern-either:
      - patterns:
          - pattern: |
              try:
                ...
                open($FILE, $MODE)
                ...
              except PermissionError:
                ...
          - metavariable-regex:
              metavariable: $MODE
              regex: '"[waWAx][+bBtT]*"'
      - pattern: |
          try:
            ...
            $PATH.write_text(...)
            ...
          except PermissionError:
            ...
      - pattern: |
          try:
            ...
            $PATH.write_bytes(...)
            ...
          except PermissionError:
            ...
    message: >
      `except PermissionError` does not cover all filesystem write failures.
      `EROFS` (read-only filesystem, errno 30) and `ENOSPC` (no space left, errno 28)
      raise `OSError` — a superclass of `PermissionError` — so they will not be
      caught here. Replace with `except OSError` to handle all filesystem-level errors.
    languages: [python]
    severity: WARNING
    metadata:
      category: correctness
      subcategory: error-handling
      cwe: ["CWE-390: Detection of Error Condition Without Action"]
      confidence: HIGH
      likelihood: MEDIUM
      impact: MEDIUM
      technology: [python]
      description: except PermissionError misses EROFS and ENOSPC — catch OSError instead
