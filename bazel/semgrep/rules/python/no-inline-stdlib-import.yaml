rules:
  - id: no-inline-stdlib-import
    patterns:
      - pattern-inside: |
          def $FUNC(...):
            ...
      - pattern-either:
          - pattern: import $MOD
          - pattern: from $MOD import ...
      - metavariable-regex:
          metavariable: $MOD
          regex: ^(datetime|sqlalchemy|sqlalchemy\.exc|sqlalchemy\.orm|typing|os|sys|json|re|collections|functools|itertools|logging|dataclasses)$
    message: >
      Inline import of `$MOD` inside a function/method body. Move this import
      to module level at the top of the file. Inline imports of standard library
      and core dependencies add per-call overhead, hide the module's dependencies,
      and make the code harder to audit.
    languages: [python]
    severity: WARNING
    paths:
      exclude:
        - "*_test.py"
        - "**/tests/**"
    metadata:
      category: maintainability
      subcategory: imports
      confidence: HIGH
      likelihood: MEDIUM
      impact: LOW
      technology: [python]
      description: inline import of standard library or core dependency module inside a function/method body
