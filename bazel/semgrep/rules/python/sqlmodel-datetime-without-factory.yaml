rules:
  - id: sqlmodel-datetime-without-factory
    patterns:
      - pattern-either:
        - patterns:
          - pattern: |
              class $MODEL(SQLModel, table=True):
                  ...
                  $FIELD: datetime | None = None
                  ...
        - patterns:
          - pattern: |
              class $MODEL(SQLModel, table=True):
                  ...
                  $FIELD: Optional[datetime] = None
                  ...
        - patterns:
          - pattern: |
              class $MODEL(SQLModel, table=True):
                  ...
                  $FIELD: datetime | None = Field(...)
                  ...
          - pattern-not: |
              class $MODEL(SQLModel, table=True):
                  ...
                  $FIELD: datetime | None = Field(..., default_factory=..., ...)
                  ...
        - patterns:
          - pattern: |
              class $MODEL(SQLModel, table=True):
                  ...
                  $FIELD: Optional[datetime] = Field(...)
                  ...
          - pattern-not: |
              class $MODEL(SQLModel, table=True):
                  ...
                  $FIELD: Optional[datetime] = Field(..., default_factory=..., ...)
                  ...
    message: >-
      SQLModel table class `$MODEL` has a `datetime | None` field `$FIELD` without
      `default_factory`. Using `= None` or `= Field(default=None)` means SQLModel
      stores `NULL` rather than a server-generated timestamp. Use
      `Field(default=None, default_factory=lambda: datetime.utcnow())` (or
      `datetime.now(timezone.utc)`) to populate the field on insert.
    languages: [python]
    severity: WARNING
    metadata:
      category: correctness
      subcategory: orm
      cwe: ["CWE-1188: Insecure Default Initialization of Resource"]
      confidence: HIGH
      likelihood: HIGH
      impact: MEDIUM
      technology: [python, sqlmodel, sqlalchemy]
      description: >-
        SQLModel datetime field missing default_factory — field will store NULL instead
        of an auto-populated timestamp unless a factory is provided.
