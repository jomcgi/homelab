rules:
  - id: no-wait-until-ready
    pattern: await $BOT.wait_until_ready()
    message: >
      `$BOT.wait_until_ready()` deadlocks when called from a background task
      started before `bot.start()` because the event is never set in that
      execution context. This was the root cause of bugs fixed in PRs #1825 and
      #1826. Use the polling alternative instead:
      `while not $BOT.is_ready(): await asyncio.sleep(2)`
    languages: [python]
    severity: WARNING
    metadata:
      category: correctness
      subcategory: concurrency
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [python, discord.py]
      description: >
        wait_until_ready() deadlocks in background tasks started before
        bot.start(); use is_ready() polling loop instead
