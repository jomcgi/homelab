rules:
  - id: no-hardcoded-secret
    languages: [python]
    severity: ERROR
    message: >-
      Use env vars or pydantic-settings. Secrets injected by 1Password
      Operator.
    metadata:
      category: security
    patterns:
      - pattern-either:
          - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|secret|api_key|apikey|secret_key|private_key|auth_token)
      - pattern-not: $VAR = ""
