rules:
  - id: no-rules-python
    languages: [generic]
    severity: ERROR
    message: >-
      Use @aspect_rules_py, not @rules_python for py_binary, py_library, and
      py_test. This repo uses aspect_rules_py for Python builds. Replace
      '@rules_python//python:defs.bzl' with '@aspect_rules_py//py:defs.bzl'.
    metadata:
      category: best-practices
    paths:
      include:
        - "**/BUILD"
        - "**/BUILD.bazel"
        - "**/*.bzl"
    patterns:
      - pattern: "@rules_python//python:defs.bzl"
