rules:
  - id: single-npm-package-in-apko-genrule
    languages: [generic]
    severity: WARNING
    message: >-
      genrule packages a single node_modules/ source into a tar for an apko
      image. Under pnpm's strict no-hoist layout each package's transitive
      dependencies live in their own node_modules/ subtrees and are not
      reachable from a single package directory. List every transitive
      dependency explicitly in srcs, or use a glob that covers the full
      node_modules/ tree, to avoid missing-module errors at runtime.
    metadata:
      category: correctness
    paths:
      include:
        - "**/BUILD"
        - "**/BUILD.bazel"
    pattern-regex: '(?s)genrule\(.*?srcs\s*=\s*\[\s*"[^"]*node_modules/[^"]*"\s*,?\s*\].*?outs\s*=\s*\[[^\]]*\.tar[^\]]*\]'
