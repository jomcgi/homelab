rules:
  - id: no-discarded-json-marshal
    patterns:
      - pattern-either:
          - pattern: $VAR, _ := json.Marshal(...)
          - pattern: $VAR, _ = json.Marshal(...)
    paths:
      exclude:
        - "*_test.go"
    message: >
      Discarding the error from `json.Marshal` risks sending nil or empty bytes
      downstream. `json.Marshal` can fail (e.g. unsupported types, cyclic
      structures), and ignoring the error means `$VAR` will be `nil` on failure.
      Always check the error: `$VAR, err := json.Marshal(...); if err != nil { ... }`.
    languages: [go]
    severity: WARNING
    metadata:
      category: correctness
      subcategory: error-handling
      confidence: HIGH
      likelihood: MEDIUM
      impact: MEDIUM
      technology: [go]
      description: Discarding json.Marshal error risks sending nil/empty bytes downstream
