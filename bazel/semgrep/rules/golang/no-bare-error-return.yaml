rules:
  - id: no-bare-error-return
    patterns:
      - pattern: return $ERR
      - metavariable-type:
          metavariable: $ERR
          types:
            - error
      - pattern-not: return nil
      - pattern-not: return fmt.Errorf(...)
      - pattern-not: return errors.New(...)
      - pattern-not: return errors.Is(...)
      - pattern-not: return errors.As(...)
      - pattern-not: return fmt.Errorf("%w", ...)
    message: >
      Returning a bare `$ERR` without wrapping loses call-site context. Use
      `fmt.Errorf("your context: %w", $ERR)` so the error chain preserves
      information about where and why the failure occurred. This makes
      debugging significantly easier.
    languages: [go]
    severity: WARNING
    metadata:
      category: maintainability
      subcategory: error-handling
      confidence: MEDIUM
      likelihood: HIGH
      impact: MEDIUM
      technology: [go]
      description: Return bare errors without fmt.Errorf wrapping loses context
