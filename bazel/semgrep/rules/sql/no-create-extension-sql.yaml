rules:
  - id: no-create-extension-sql
    languages: [generic]
    severity: WARNING
    message: >-
      Found `CREATE EXTENSION` in a SQL migration. CNPG (CloudNativePG) manages
      PostgreSQL extensions via image volumes — the `extensions:` block in the
      CNPG Cluster spec. Running `CREATE EXTENSION` in a migration will fail or
      conflict with the operator's extension management. Remove this statement
      and ensure the extension is configured in the CNPG Cluster spec's
      `extensions:` block instead.
    metadata:
      category: correctness
      subcategory: cnpg
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [postgresql, kubernetes, cnpg]
      description: >-
        Detects CREATE EXTENSION statements in SQL migration files. CNPG manages
        extensions via the Cluster spec, not migrations.
      references:
        - https://cloudnative-pg.io/documentation/current/database_import/
    paths:
      include:
        - "**/migrations/*.sql"
    pattern-regex: '(?i)CREATE\s+EXTENSION'
