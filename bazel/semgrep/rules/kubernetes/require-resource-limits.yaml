rules:
  - id: require-resource-limits
    patterns:
      - pattern: |
          containers:
            - name: $CONTAINER
              ...
      - pattern-not: |
          containers:
            - name: $CONTAINER
              ...
              resources:
                ...
                limits:
                  ...
    message: >
      Container `$CONTAINER` is missing `resources.limits`. Without resource
      limits a single misbehaving container can consume all available CPU/memory
      on the node, causing OOMKills for other workloads. Define at minimum a
      memory limit. CPU limits are optional but recommended.
    languages: [yaml]
    severity: WARNING
    metadata:
      category: correctness
      subcategory: kubernetes
      confidence: MEDIUM
      likelihood: HIGH
      impact: HIGH
      technology: [kubernetes]
      description: Kubernetes containers should declare resource limits to prevent unbounded usage
    paths:
      include:
        - "**/chart/templates/**"
