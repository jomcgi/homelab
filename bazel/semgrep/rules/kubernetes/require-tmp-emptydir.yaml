rules:
  - id: require-tmp-emptydir
    languages: [yaml]
    severity: WARNING
    message: >-
      Container has runAsNonRoot: true but is missing a /tmp emptyDir volumeMount.
      Non-root containers cannot write to the default /tmp directory on the host
      filesystem. Add a volumeMount with mountPath: /tmp and a corresponding
      emptyDir volume in the pod spec.
    metadata:
      category: security
    patterns:
      - pattern-inside: |
          containers:
            ...
      - pattern: |
          - ...
            securityContext:
              ...
              runAsNonRoot: true
            ...
      - pattern-not: |
          - ...
            volumeMounts:
              - mountPath: /tmp
                ...
            ...
