rules:
  - id: no-host-network
    languages: [yaml]
    severity: ERROR
    message: >-
      Pod uses host network namespace. This gives the pod access to the
      loopback device and could be used to snoop on network activity of
      other pods on the same node. Remove 'hostNetwork: true'.
    metadata:
      category: security
    patterns:
      - pattern-inside: |
          spec:
            ...
      - pattern: |
          hostNetwork: true
