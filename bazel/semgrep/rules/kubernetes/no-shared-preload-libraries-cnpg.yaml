rules:
  - id: no-shared-preload-libraries-cnpg
    languages: [yaml]
    severity: WARNING
    message: >-
      CNPG 1.22+ supports image volume extensions via the `extensions:` block
      with `image.reference`. Using `shared_preload_libraries` is the legacy
      approach and requires extensions baked into the PostgreSQL image. Remove
      `shared_preload_libraries` and configure extensions using the CNPG Cluster
      spec's `extensions:` block with an OCI image reference instead.
    metadata:
      category: best-practices
    paths:
      include:
        - "**/templates/cnpg*.yaml"
    pattern-regex: "shared_preload_libraries"
