rules:
  - id: pdb-minAvailable-blocks-eviction
    languages: [yaml]
    severity: WARNING
    message: >-
      podDisruptionBudget.minAvailable: 1 on a single-replica deployment (replicaCount: 1
      or absent, which defaults to 1) creates a zero-disruption budget — no pods can be
      evicted voluntarily. This blocks node drains and cluster upgrades. Use
      maxUnavailable: 1 instead of minAvailable: 1, or ensure replicaCount > minAvailable.
      Introduced in PR #1474 and immediately reverted in PR #1482 for exactly this reason.
    metadata:
      category: best-practices
      subcategory: kubernetes
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [kubernetes]
      description: >-
        PodDisruptionBudget with minAvailable >= replicaCount blocks all voluntary
        evictions, preventing node drains and cluster upgrades.
      references:
        - "https://github.com/jomcgi/homelab/pull/1474"
        - "https://github.com/jomcgi/homelab/pull/1482"
    patterns:
      - pattern-either:
          # Case 1: replicaCount is explicitly 1 — minAvailable: 1 leaves zero budget
          - patterns:
              - pattern: |
                  replicaCount: 1
              - pattern: |
                  podDisruptionBudget:
                    enabled: true
                    ...
                    minAvailable: 1
          # Case 2: replicaCount absent (defaults to 1) — same zero-budget outcome
          - patterns:
              - pattern: |
                  podDisruptionBudget:
                    enabled: true
                    ...
                    minAvailable: 1
              - pattern-not: |
                  replicaCount: ...
    paths:
      include:
        - "**/deploy/values.yaml"
        - "*/values.yaml"
