rules:
  - id: require-readiness-probe
    patterns:
      - pattern: |
          containers:
            - name: $CONTAINER
              ...
      - pattern-not: |
          containers:
            - name: $CONTAINER
              ...
              readinessProbe:
                ...
    message: >
      Container `$CONTAINER` is missing a `readinessProbe`. Without it,
      Kubernetes will send traffic to the pod as soon as it starts — before
      the application is ready to serve requests. This causes failed requests
      during rolling updates and cold starts. Add a `readinessProbe` that
      checks application health (e.g. an HTTP /healthz endpoint).
    languages: [yaml]
    severity: WARNING
    metadata:
      category: correctness
      subcategory: kubernetes
      confidence: MEDIUM
      likelihood: HIGH
      impact: MEDIUM
      technology: [kubernetes]
      description: Kubernetes containers should always declare a readinessProbe
    paths:
      include:
        - "**/chart/templates/**"
