# Dev Deploy Service Registry
#
# Maps each deployable chart to its Bazel push targets and Helm value paths.
# Used by the /dev-deploy skill to build, push, and helm-install services
# into ephemeral test-* namespaces.
#
# Structure:
#   chart:           path to Helm chart (relative to repo root)
#   base_values:     overlay values file to use as baseline (optional)
#   images[]:        list of container images the chart deploys
#     name:              human-readable image name
#     push_target:       Bazel target that builds + pushes the image
#     repository:        GHCR image repository
#     helm_tag_key:      Helm --set key for the image tag
#     helm_pull_policy_key: Helm --set key for imagePullPolicy
#   value_overrides: Helm --set flags to disable infra dependencies
#                    (1Password secrets, tunnels, image updater, etc.)

services:
  grimoire:
    chart: charts/grimoire
    base_values: overlays/dev/grimoire/values.yaml
    images:
      - name: frontend
        push_target: "//services/grimoire/frontend:image.push"
        repository: ghcr.io/jomcgi/homelab/services/grimoire-frontend
        helm_tag_key: frontend.image.tag
        helm_pull_policy_key: frontend.image.pullPolicy
      - name: ws-gateway
        push_target: "//services/grimoire/ws-gateway:image.push"
        repository: ghcr.io/jomcgi/homelab/services/grimoire-ws-gateway
        helm_tag_key: wsGateway.image.tag
        helm_pull_policy_key: wsGateway.image.pullPolicy
    value_overrides:
      - "imagePullSecret.enabled=false"
      - "imagePullSecret.create=false"
      - "geminiSecret.enabled=false"
      - "tunnel.enabled=false"
      - "imageUpdater.enabled=false"
      - "networkPolicy.enabled=false"

  marine:
    chart: charts/marine
    base_values: overlays/dev/marine/values.yaml
    images:
      - name: ais-ingest
        push_target: "//services/ais_ingest:image.push"
        repository: ghcr.io/jomcgi/homelab/services/ais_ingest
        helm_tag_key: ingest.image.tag
        helm_pull_policy_key: ingest.image.pullPolicy
      - name: ships-api
        push_target: "//services/ships_api:image.push"
        repository: ghcr.io/jomcgi/homelab/services/ships_api
        helm_tag_key: api.image.tag
        helm_pull_policy_key: api.image.pullPolicy
      - name: ships-frontend
        push_target: "//services/ships_frontend:image.push"
        repository: ghcr.io/jomcgi/homelab/services/ships_frontend
        helm_tag_key: frontend.image.tag
        helm_pull_policy_key: frontend.image.pullPolicy
    value_overrides:
      - "imagePullSecret.enabled=false"
      - "imagePullSecret.create=false"
      - "imageUpdater.enabled=false"
      - "secret.type=manual"
      - "secret.manual.apiKey=dummy-for-testing"
      - "ingest.image.digest="
      - "api.image.digest="
      - "frontend.image.digest="

  stargazer:
    chart: charts/stargazer
    base_values: overlays/dev/stargazer/values.yaml
    images:
      - name: stargazer
        push_target: "//services/stargazer:image.push"
        repository: ghcr.io/jomcgi/homelab/services/stargazer
        helm_tag_key: image.tag
        helm_pull_policy_key: image.pullPolicy
    value_overrides:
      - "imagePullSecret.enabled=false"
      - "imagePullSecret.create=false"
      - "imageUpdater.enabled=false"

  knowledge-graph:
    chart: charts/knowledge-graph
    base_values: overlays/prod/knowledge-graph/values.yaml
    images:
      - name: scraper
        push_target: "//services/knowledge_graph:scraper-image.push"
        repository: ghcr.io/jomcgi/homelab/services/knowledge-graph-scraper
        helm_tag_key: scraper.image.tag
        helm_pull_policy_key: scraper.image.pullPolicy
      - name: embedder
        push_target: "//services/knowledge_graph:embedder-image.push"
        repository: ghcr.io/jomcgi/homelab/services/knowledge-graph-embedder
        helm_tag_key: embedder.image.tag
        helm_pull_policy_key: embedder.image.pullPolicy
      - name: mcp
        push_target: "//services/knowledge_graph:mcp-image.push"
        repository: ghcr.io/jomcgi/homelab/services/knowledge-graph-mcp
        helm_tag_key: mcp.image.tag
        helm_pull_policy_key: mcp.image.pullPolicy
    value_overrides:
      - "imagePullSecret.enabled=false"
      - "imagePullSecret.create=false"

  todo:
    chart: charts/todo
    images:
      - name: todo
        push_target: "//charts/todo/image:image.push"
        repository: ghcr.io/jomcgi/homelab/charts/todo
        helm_tag_key: image.tag
        helm_pull_policy_key: image.pullPolicy
    value_overrides:
      - "imagePullSecret.enabled=false"
      - "imagePullSecret.create=false"
      - "persistence.enabled=false"
      - "git.tokenSecret.name="
