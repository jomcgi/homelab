contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - busybox
    - ca-certificates-bundle
    # Developer tools
    - go
    - nodejs
    - pnpm
    - python-3
    - git
    - gh
    # Formatters (buildifier not available in Wolfi — bundled via Bazel tar layer)
    - ruff
    - shfmt
    - gofumpt

archs:
  - x86_64
  - aarch64

accounts:
  groups:
    - groupname: tools
      gid: 65532
  users:
    - username: tools
      uid: 65532
      gid: 65532
  run-as: 65532
