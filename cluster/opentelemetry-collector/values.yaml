# OpenTelemetry Collector Values
mode: daemonset
image:
  repository: otel/opentelemetry-collector-k8s

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    memory: 256Mi
useGOMEMLIMIT: true

ports:
  otlp:
    enabled: true
  otlp-http:
    enabled: true
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false
  metrics:
    enabled: true

serviceMonitor:
  enabled: true

presets:
  logsCollection:
    enabled: true
  kubernetesAttributes:
    enabled: true
  hostMetrics:
    enabled: true
  kubeletMetrics:
    enabled: true

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  readOnlyRootFilesystem: true

livenessProbe:
  periodSeconds: 10
readinessProbe:
  periodSeconds: 10

# Reference external config
configMap:
  create: false
  existingName: "otel-collector-config"