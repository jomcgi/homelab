apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: github-action-uptime

build:
  artifacts:
  - image: jomcgi/github-webhook-handler
    context: cluster/services/github-webhook-handler/api
    kaniko:
      skipUnusedStages: true
      reproducible: true
      cache:
        cacheCopyLayers: true
      tags:
      - latest
      verbose: debug
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
  cluster:
    dockerConfig:
      secret: docker-cfg

manifests:
  kustomize:
    paths:
    - cluster/services/github-webhook-handler/deploy

deploy:
  statusCheckDeadlineSeconds: 300
  kubectl: {}
        
