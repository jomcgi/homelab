apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: find-good-hikes
build:
  artifacts:
  - image: jomcgi/find-good-hikes
    context: cluster/services/find-good-hikes/app
    kaniko:
      dockerfile: Dockerfile
  cluster:
    dockerConfig:
      secretName: docker-cfg
manifests:
  kustomize:
    paths:
    - cluster/services/find-good-hikes/deploy
deploy:
  kubectl:
    defaultNamespace: find-good-hikes
  statusCheckDeadlineSeconds: 900
