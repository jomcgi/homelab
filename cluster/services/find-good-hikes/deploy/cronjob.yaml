---
# CronJob for regular weather updates (every 4 hours)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: find-good-hikes-weather-update
  namespace: find-good-hikes
  labels:
    app: find-good-hikes
    component: weather-update
spec:
  schedule: "0 */4 * * *"  # Every 4 hours
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: find-good-hikes
            component: weather-update
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
          - name: update-weather
            image: find-good-hikes:latest
            imagePullPolicy: Never
            command: ["python", "main.py", "fetch-weather"]
            env:
            - name: PYTHONUNBUFFERED
              value: "1"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                - ALL
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "500m"
            volumeMounts:
            - name: data
              mountPath: /app/data
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: find-good-hikes-data
          restartPolicy: OnFailure
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

---
# One-time Job for initial data scraping (run manually when needed)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: find-good-hikes-scrape-once
  namespace: find-good-hikes
  labels:
    app: find-good-hikes
    component: initial-scrape
spec:
  schedule: "0 0 31 2 *"  # Feb 31st (never runs automatically)
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: find-good-hikes
            component: initial-scrape
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
          - name: scrape-data
            image: find-good-hikes:latest
            imagePullPolicy: Never
            command: ["python", "main.py", "update"]  # Full update including scraping
            env:
            - name: PYTHONUNBUFFERED
              value: "1"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                - ALL
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                memory: "256Mi"
                cpu: "200m"
              limits:
                memory: "512Mi"
                cpu: "1000m"
            volumeMounts:
            - name: data
              mountPath: /app/data
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: find-good-hikes-data
          restartPolicy: OnFailure
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1