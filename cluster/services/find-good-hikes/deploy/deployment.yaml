apiVersion: apps/v1
kind: Deployment
metadata:
  name: find-good-hikes
  namespace: find-good-hikes
  labels:
    app: find-good-hikes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: find-good-hikes
  template:
    metadata:
      labels:
        app: find-good-hikes
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: check-data
        image: jomcgi/find-good-hikes
        imagePullPolicy: Always
        command: ["/bin/bash", "-c"]
        args:
        - |
          if [ ! -f "/app/data/walks.db" ]; then
            echo "No walks database found in PVC. Checking for baked-in database..."
            if [ -f "/app/walks.db" ]; then
              echo "Found baked-in database. Copying to persistent storage..."
              cp /app/walks.db /app/data/walks.db
              cp /app/forecasts.sqlite.db /app/data/forecasts.sqlite.db 2>/dev/null || true
              cp /app/walkhighlands_cache.sqlite /app/data/walkhighlands_cache.sqlite 2>/dev/null || true
              cp /app/met_weather_cache.sqlite /app/data/met_weather_cache.sqlite 2>/dev/null || true
              echo "Database files copied to persistent storage"
            else
              echo "No baked-in database found. Run this to create initial data:"
              echo "kubectl create job --from=cronjob/find-good-hikes-scrape-once find-good-hikes-initial-scrape"
              echo "Proceeding without walks data - app will show empty results until data is loaded"
            fi
          else
            echo "Walks database found at /app/data/walks.db"
          fi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: data
          mountPath: /app/data
      containers:
      - name: find-good-hikes
        image: jomcgi/find-good-hikes
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "8000"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false 
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            memory: "512Mi"
            cpu: "300m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: find-good-hikes-data
      restartPolicy: Always