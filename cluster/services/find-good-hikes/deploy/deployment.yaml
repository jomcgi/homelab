apiVersion: apps/v1
kind: Deployment
metadata:
  name: find-good-hikes
  namespace: find-good-hikes
  labels:
    app: find-good-hikes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: find-good-hikes
  template:
    metadata:
      labels:
        app: find-good-hikes
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: check-data
        image: find-good-hikes:latest
        imagePullPolicy: Never
        command: ["/bin/bash", "-c"]
        args:
        - |
          if [ ! -f "/app/data/walks.db" ]; then
            echo "No walks database found. Run this to create initial data:"
            echo "kubectl create job --from=cronjob/find-good-hikes-scrape-once find-good-hikes-initial-scrape"
            echo "Proceeding without walks data - app will show empty results until data is loaded"
          else
            echo "Walks database found at /app/data/walks.db"
          fi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: data
          mountPath: /app/data
      containers:
      - name: find-good-hikes
        image: find-good-hikes:latest
        imagePullPolicy: Never  # Use local image for development
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "8000"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false  # SQLite needs write access to data directory
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: find-good-hikes-data
      restartPolicy: Always