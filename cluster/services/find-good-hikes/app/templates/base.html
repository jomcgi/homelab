<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
    <header>
        <h1><a href="/">🥾 Good Hikes Finder</a></h1>
        <p>Find hiking routes with good weather conditions in Scotland</p>
    </header>
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <footer>
        <p>Weather data from <a href="https://api.met.no">met.no</a> | Walking routes from <a href="https://walkhighlands.co.uk">walkhighlands.co.uk</a></p>
    </footer>
</body>
</html>
