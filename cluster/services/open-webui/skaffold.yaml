apiVersion: skaffold/v4beta5
kind: Config
metadata:
  name: open-webui

manifests:
  rawYaml:
    - cluster/services/open-webui/pvc.yaml

deploy:
  statusCheckDeadlineSeconds: 300
  helm:
    releases:
      - name: open-webui
        remoteChart: open-webui/open-webui
        version: 5.26.0
        namespace: open-webui
        createNamespace: true
        upgradeOnChange: true
        wait: true
        valuesFiles:
          - cluster/services/open-webui/values.yaml
  kubectl:
    defaultNamespace: "open-webui"