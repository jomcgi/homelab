# nginx-public-status-conf.conf
server {
    listen 80;
    server_name status.jomcgi.dev; # Good practice, though Cloudflare Tunnel handles the SNI

    # Proxy settings for Uptime Kuma
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade"; # Important for WebSockets if Uptime Kuma uses them
    proxy_set_header Host $host; # Pass the original host (status.jomcgi.dev)
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host; # Some apps use this

    # Your Uptime Kuma internal service
    set $uptime_kuma_service "http://uptime-kuma.uptime-kuma.svc.cluster.local:3001";

    # Public status page itself
    location = /status/public {
        proxy_pass $uptime_kuma_service/status/public;
    }

    # Assets and APIs required by the public status page
    # Inspect your browser's network tab when loading /status/public to get the exact list
    location ~ ^/(css/|js/|img/|fonts/|icon\.svg|manifest\.json|service-worker\.js|api/status-page/) {
        # These requests are proxied to the root of Uptime Kuma,
        # e.g., a request for /css/style.css becomes a proxy_pass to $uptime_kuma_service/css/style.css
        proxy_pass $uptime_kuma_service;
    }

    # Block all other requests to this public domain
    location / {
        return 404; # Or return 403;
    }
}
