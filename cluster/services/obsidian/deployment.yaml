# deployment.yaml (MODIFIED)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian-deployment
  namespace: obsidian
  labels:
    app: obsidian
spec:
  replicas: 1
  selector:
    matchLabels:
      app: obsidian
  template:
    metadata:
      labels:
        app: obsidian
    spec:
      containers:
        - name: obsidian
          image: lscr.io/linuxserver/obsidian:latest
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 3001
              name: https
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Etc/UTC"
            - name: DOCKER_MODS
              value: "linuxserver/mods:universal-package-install"
            - name: INSTALL_PACKAGES
              value: "git|openssh-client"
            - name: GIT_VAULT_DIR
              value: "/config/jomcgi"
            - name: GIT_USER_EMAIL
              value: "jomcgi@jomcgi.dev"
            - name: GIT_USER_NAME
              value: "jomcgi"
            - name: GIT_BRANCH
              value: "main"
          volumeMounts:
            - name: config-volume
              mountPath: /config
            - name: dshm
              mountPath: /dev/shm
            - name: git-ssh-key
              mountPath: /etc/git-secret
              readOnly: true
            - name: git-scripts
              mountPath: /etc/cont-init.d/99-git-setup.sh
              subPath: 99-git-setup.sh
              readOnly: true
            - name: git-sync-service-script
              mountPath: /etc/services.d/git-sync/run
              subPath: git-sync-run.sh
              readOnly: true
          resources:
            requests:
              memory: "500Mi"
              cpu: "250m"
            limits:
              memory: "500Mi"
              cpu: "250m"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
              - ALL
      volumes:
        - name: config-volume
          persistentVolumeClaim:
            claimName: obsidian-config-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: git-ssh-key
          secret:
            secretName: obsidian-repo-deploy-key
            defaultMode: 0400
        - name: git-scripts
          configMap:
            name: git-sync-scripts
            defaultMode: 0755
        - name: git-sync-service-script
          configMap:
            name: git-sync-scripts
            defaultMode: 0755