apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
          grpc:
            endpoint: 0.0.0.0:4317
      github:
        scrapers:
          scraper:
        webhook:
          endpoint: 0.0.0.0:19418
          path: /events
          health_path: /health
    
    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
    
    exporters:
      otlp/honeycomb:
        endpoint: "api.honeycomb.io:443" # US instance
        headers:
          "x-honeycomb-team": ${file:/etc/honeycomb/honeycomb-api-key}  

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp, github]
          processors: [batch]
          exporters: [otlp/honeycomb]