apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
          grpc:
            endpoint: 0.0.0.0:4317
      github:
        scrapers:
          scraper:
        webhook:
          endpoint: 0.0.0.0:19418
          path: /events
          health_path: /health
    
    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
    
    exporters:
      otlp/grafana:
        endpoint: "grafana-k8s-monitoring-alloy-receiver.grafana.svc.cluster.local:4317"
        tls:
          insecure: true
      

    connectors:
      spanmetrics:
        histogram:
          explicit:
            buckets: [3m, 5m, 10m, 30m, 1h, 2h, 4h, 8h, 12h, 24h]  
        exemplars:
          enabled: true
        dimensions_cache_size: 1000
        dimensions:
          - name: trace.root.name
            default: null
        metrics_flush_interval: 15s
        metrics_expiration: 5m
        events:
          enabled: true
          dimensions:
            - name: exception.type
            - name: exception.message

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp, github]
          processors: [batch]
          exporters: [otlp/grafana, spanmetrics]
        metrics:
          receivers: [spanmetrics]
          exporters: [otlp/grafana]