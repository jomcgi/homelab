apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
          grpc:
            endpoint: 0.0.0.0:4317
      github:
        scrapers:
          scraper:
        webhook:
          endpoint: 0.0.0.0:19418
          path: /events
          health_path: /health
    
    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
    
    exporters:
      otlp/grafana:
        endpoint: "http://grafana-k8s-monitoring-alloy-receiver.grafana.svc.cluster.local:4317"


    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp, github]
          processors: [batch]
          exporters: [otlp/grafana]