apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: opentelemetry
  labels:
    app: otel-collector
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: otel-collector
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:latest
        readinessProbe:
          httpGet:
            port: 13133
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            port: 13133
          initialDelaySeconds: 15
          periodSeconds: 20
        args:
        - --config=/conf/config.yaml
        ports:
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
        - containerPort: 19418
          name: github-webhook
        - containerPort: 13133
          name: health-check
        resources:
          requests:
            cpu: 200m
            memory: 400Mi
          limits:
            cpu: 1
            memory: 1Gi
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: config
          mountPath: /conf
        - name: honeycomb-api
          mountPath: /etc/honeycomb
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: otel-collector-config
      - name: honeycomb-api
        secret:
          secretName: otel-collector-secrets