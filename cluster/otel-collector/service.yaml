apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  labels:
    app: otel-collector
spec:
  type: NodePort
  ports:
  - port: 4317
    targetPort: 4317
    nodePort: 30317
    protocol: TCP
    name: otlp-grpc
  - port: 4318
    targetPort: 4318
    nodePort: 30318
    protocol: TCP
    name: otlp-http
  - port: 19418
    targetPort: 19418
    # nodePort: 30319
    protocol: TCP
    name: github-webook
  selector:
    app: otel-collector