apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
          grpc:
            endpoint: 0.0.0.0:4317
      github:
        scrapers:
          scraper:
        webhook:
          endpoint: 0.0.0.0:19418
          path: /events
          health_path: /health
    
    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
      filter-pipeline-url:
        spans:
          include:
            match_type: strict
            attributes:
              - key: cicd.pipeline.run.url.full
                value: exists
      add-uptime-to-github-traces:
        trace_statements:
          - context: span
            statements:
              - set(resource["UPTIME_STATUS"], "down")
              - set(resource["UPTIME_MESSAGE"], "CI/CD deployment status")

    exporters:
      otlp:
        endpoint: "api.honeycomb.io:443" # US instance
        # endpoint: "api.eu1.honeycomb.io:443" # EU instance
        headers:
          "x-honeycomb-team": ${file:/etc/honeycomb/honeycomb-api-key}
      uptime-kuma-gh-actions:
        endpoint: "http://uptime-kuma.uptime-kuma.svc.cluster.local:3001/api/push/6jsi0iFnCb"
        timeout: 5s
        method: POST
        headers:
          Content-Type: "application/json"
        query_params:
          status: "${UPTIME_STATUS}"
          msg: "${UPTIME_MESSAGE}"

    service:
      pipelines:
        traces:
          receivers: [otlp, github]
          processors: [batch]
          exporters: [otlp]
        uptime-kuma-gh-actions:
          receivers: [github]
          processors: [filter-pipeline-url, add-uptime-to-github-traces, batch]
          exporters: [uptime-kuma-gh-actions]