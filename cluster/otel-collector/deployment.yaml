apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  labels:
    app: otel-collector
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:latest
        imagePullPolicy: Always
        readinessProbe:
          httpGet:
            path: /health
            port: github-webook
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: github-webook
          initialDelaySeconds: 15
          periodSeconds: 20
        args:
        - --config=/conf/config.yaml
        ports:
        - containerPort: 4317 # OTLP gRPC
          name: otlp-grpc
        - containerPort: 4318 # OTLP HTTP
          name: otlp-http
        - containerPort: 19418 # github-webhook
          name: github-webhook
        resources:
          requests:
            cpu: 200m
            memory: 400Mi
          limits:
            cpu: 1
            memory: 1Gi
        volumeMounts:
        - name: config
          mountPath: /conf
        - name: honeycomb-api
          mountPath: /etc/honeycomb
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: otel-collector-config
      - name: honeycomb-api
        secret:
          secretName: otel-collector-secrets