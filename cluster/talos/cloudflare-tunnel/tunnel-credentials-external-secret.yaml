apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflared-tunnel-creds-sync
  namespace: cloudflare-tunnel
spec:
  secretStoreRef:
    name: github-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: tunnel-credentials
    creationPolicy: Owner
  data:
  - secretKey: credentials.json
    remoteRef:
      key: CLOUDFLARE_TUNNEL_CREDENTIALS